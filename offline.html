<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBO - Offline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #1e3a5f 0%, #0f2b4d 100%); }
    </style>
</head>
<body class="flex items-center justify-center h-screen">
    <div class="text-center text-white p-8">
        <div class="w-24 h-24 bg-white rounded-3xl flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-wifi-slash text-5xl text-navy"></i>
        </div>
        <h1 class="text-2xl font-black mb-2">Sem Conexão</h1>
        <p class="text-slate-300 mb-6">Você está offline. Conecte-se à internet para continuar.</p>
        <button onclick="location.reload()" class="bg-gold text-navy px-6 py-3 rounded-2xl font-bold">
            <i class="fas fa-sync-alt mr-2"></i> Tentar novamente
        </button>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
</body>
</html>
