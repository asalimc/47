<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBO - Çevrimdışı</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .container {
            text-align: center;
            padding: 2.5rem;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
        }
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        h1 {
            color: #1f2937;
            font-size: 28px;
            margin-bottom: 15px;
        }
        p {
            color: #6b7280;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #ef4444;
            margin-bottom: 25px;
            font-weight: 500;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            background: #ef4444;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            width: 100%;
        }
        button:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(59,130,246,0.4);
        }
        button:active {
            transform: translateY(0);
        }
        .offline-data {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
            color: #9ca3af;
            font-size: 14px;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>İnternet Bağlantısı Yok</h1>
        <div class="status">
            <span class="status-dot"></span>
            <span>Çevrimdışı Mod</span>
        </div>
        <p>SBO Sistemi şu anda çevrimdışı. Yaptığınız değişiklikler cihazınıza kaydediliyor ve bağlantı sağlandığında otomatik olarak senkronize edilecek.</p>
        <button onclick="window.location.reload()">
            🔄 Tekrar Bağlanmayı Dene
        </button>
        <div class="offline-data">
            <i>Verileriniz güvende, endişelenmeyin.</i>
        </div>
    </div>
    
    <script>
        // Bağlantı durumunu periyodik kontrol et
        let checkCount = 0;
        const maxChecks = 30;
        
        function checkConnection() {
            if (navigator.onLine) {
                window.location.reload();
                return;
            }
            
            checkCount++;
            if (checkCount < maxChecks) {
                setTimeout(checkConnection, 2000);
            }
        }
        
        // Sayfa yüklendiğinde kontrol başlat
        window.addEventListener('load', function() {
            setTimeout(checkConnection, 3000);
        });
        
        // Manuel yeniden bağlanma
        window.addEventListener('online', function() {
            window.location.reload();
        });
    </script>
</body>
</html>
