<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASCAFÉ | Pro Live Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700;800&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg: #fdfdfa;
            --card: #ffffff;
            --primary: #0a192f;
            --accent: #c49b11;
            --success: #22c55e;
            --danger: #ef4444;
            --border: #e5e7eb;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body, html { height: 100vh; background: var(--bg); color: var(--primary); overflow-x: hidden; }

        .app-container { max-width: 1400px; margin: 0 auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; min-height: 100vh; }

        .market-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .ticker-card { 
            background: #fff; border: 3px solid var(--border); border-radius: 20px; padding: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .ticker-card label { font-size: 12px; font-weight: 800; color: #64748b; letter-spacing: 1px; margin-bottom: 8px; }
        .ticker-card b { font-family: 'JetBrains Mono'; font-size: clamp(24px, 3vw, 36px); display: flex; align-items: center; gap: 10px; }
        
        .up-flash { animation: flashGreen 1.5s; border-color: var(--success) !important; color: var(--success) !important; }
        .down-flash { animation: flashRed 1.5s; border-color: var(--danger) !important; color: var(--danger) !important; }
        @keyframes flashGreen { 0% { background: var(--success); color: white; } 100% { background: white; } }
        @keyframes flashRed { 0% { background: var(--danger); color: white; } 100% { background: white; } }

        .main-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .product-card { 
            background: white; border-radius: 28px; padding: 30px; border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(10, 25, 47, 0.05); display: flex; flex-direction: column; gap: 20px;
        }
        h2 { font-size: 16px; border-left: 6px solid var(--accent); padding-left: 15px; font-weight: 800; color: var(--primary); }

        .size-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .size-btn { 
            padding: 15px 5px; font-weight: 800; font-size: 12px; background: #f8fafc; 
            border: 2px solid var(--border); border-radius: 14px; cursor: pointer; transition: 0.2s;
        }
        .size-btn.active { background: var(--primary); color: white; border-color: var(--primary); transform: scale(1.03); }

        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .input-group { background: #f1f5f9; padding: 15px; border-radius: 16px; border: 2px solid transparent; transition: 0.3s; }
        .input-group:focus-within { border-color: var(--accent); background: #fff; }
        .input-group label { display: block; font-size: 10px; font-weight: 800; color: #64748b; margin-bottom: 5px; }
        .input-group input { width: 100%; background: transparent; border: none; font-family: 'JetBrains Mono'; font-size: 24px; font-weight: 800; outline: none; color: var(--primary); }

        .data-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 2px dashed #f1f5f9; }
        .data-row span { font-weight: 700; color: #64748b; font-size: 14px; }
        .data-row b { font-family: 'JetBrains Mono'; font-size: 18px; }

        .total-display { 
            background: #f0fdf4; border: 2px solid #dcfce7; padding: 25px; border-radius: 20px; text-align: center; margin-top: 10px;
        }
        .total-display small { font-weight: 800; color: var(--success); letter-spacing: 1px; }
        .total-display b { display: block; font-size: 40px; font-family: 'JetBrains Mono'; color: var(--primary); }

        .action-btn { 
            width: 100%; padding: 22px; border-radius: 20px; border: none; background: var(--primary); 
            color: white; font-weight: 800; font-size: 15px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 25px rgba(10, 25, 47, 0.2);
        }
        .action-btn:hover { transform: translateY(-3px); filter: brightness(1.2); }

        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(10, 25, 47, 0.98); z-index: 10000; justify-content: center; align-items: center; padding: 20px; }
        #pdf-preview { background: white; width: 100%; max-width: 900px; height: 90vh; border-radius: 20px; overflow-y: auto; }

        @media (max-width: 1000px) {
            .main-grid, .market-grid { grid-template-columns: 1fr; }
            .app-container { padding: 10px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="market-grid">
        <div class="ticker-card" id="card-brl" onclick="manualEntry('brl')">
            <label>USD / BRL</label>
            <b id="val-brl">4.96</b>
        </div>
        <div class="ticker-card" id="card-try" onclick="manualEntry('try')">
            <label>USD / TRY</label>
            <b id="val-try">44.91</b>
        </div>
        <div class="ticker-card" id="card-b3" onclick="manualEntry('b3')">
            <label>NY COFFEE (KC=F)</label>
            <b id="val-b3">289.25</b>
        </div>
    </div>

    <div class="main-grid" id="main-content"></div>
</div>

<div id="modal-overlay">
    <div id="pdf-preview">
        <div style="background:var(--primary); padding:15px; display:flex; justify-content:space-between; position:sticky; top:0;">
            <button onclick="downloadFinalPDF()" style="background:var(--success); color:white; border:none; padding:12px 25px; font-weight:800; border-radius:10px; cursor:pointer;">TEKLİFİ İNDİR</button>
            <button onclick="closeModal()" style="background:var(--danger); color:white; border:none; padding:12px 25px; font-weight:800; border-radius:10px; cursor:pointer;">KAPAT</button>
        </div>
        <div id="pdf-wrap"></div>
    </div>
</div>

<script>
let DATA = { try: 44.91, brl: 4.96, b3: 289.25 };

const PRODUCTS = [
    { id: 'min', name: 'BRAZIL MINAS NY2/3 17/18 SSFC', diff: 15 },
    { id: 'san', name: 'BRAZIL SANTOS NY2/3 17/18', diff: 10 }
];

async function liveSync() {
    try {
        const fx = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
        const fxD = await fx.json();
        if(fxD.rates) { updateVal('try', fxD.rates.TRY); updateVal('brl', fxD.rates.BRL); }

        const coffee = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/KC=F?interval=1m&range=1d')}`);
        const cD = await coffee.json();
        const price = JSON.parse(cD.contents).chart.result[0].meta.regularMarketPrice;
        if(price) updateVal('b3', price);
    } catch(e) { console.log("Bağlantı bekleniyor..."); }
}

function updateVal(key, val) {
    const el = document.getElementById(`val-${key}`);
    const card = document.getElementById(`card-${key}`);
    if(!el) return;
    const old = DATA[key];
    if(val.toFixed(2) !== old.toFixed(2)) {
        DATA[key] = val;
        const icon = val > old ? '▲' : '▼';
        el.innerHTML = `${val.toFixed(2)} <span style="font-size:18px">${icon}</span>`;
        card.className = `ticker-card ${val > old ? 'up-flash' : 'down-flash'}`;
        calculateAll();
        setTimeout(() => card.className = 'ticker-card', 1500);
    } else {
        el.innerHTML = `${val.toFixed(2)} <span style="font-size:18px; opacity:0.3">-</span>`;
    }
}

function manualEntry(k) { const v = prompt("Değer girin:", DATA[k]); if(v) updateVal(k, parseFloat(v)); }

function setContainer(id, saca, btn) {
    document.querySelectorAll(`#sel-${id} .size-btn`).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`in-qty-${id}`).value = saca;
    calculateAll();
}

function init() {
    document.getElementById('main-content').innerHTML = PRODUCTS.map(p => `
        <div class="product-card">
            <h2>${p.name}</h2>
            <div class="size-selector" id="sel-${p.id}">
                <button class="size-btn active" onclick="setContainer('${p.id}', 320, this)">20' DC (320)</button>
                <button class="size-btn" onclick="setContainer('${p.id}', 440, this)">40' HC (440)</button>
                <button class="size-btn" onclick="setContainer('${p.id}', 100, this)">LCL (100)</button>
            </div>
            <div class="input-row">
                <div class="input-group"><label>KÂR MARJI (%)</label><input type="number" id="in-kar-${p.id}" value="5" step="0.1" oninput="calculateAll()"></div>
                <div class="input-group"><label>SACA MİKTARI</label><input type="number" id="in-qty-${p.id}" value="320" oninput="calculateAll()"></div>
            </div>
            <div id="res-${p.id}"></div>
            <div class="total-display"><small>TOPLAM HASILAT (USD)</small><b id="total-${p.id}">$ 0</b></div>
            <button class="action-btn" onclick="genPDF('${p.id}')">RESMİ PROFORMA OLUŞTUR</button>
        </div>
    `).join('');
    calculateAll();
}

function calculateAll() {
    PRODUCTS.forEach(p => {
        const kar = (parseFloat(document.getElementById(`in-kar-${p.id}`).value) || 0) / 100;
        const qty = parseFloat(document.getElementById(`in-qty-${p.id}`).value) || 0;
        
        const fob = DATA.b3 + p.diff;
        const ddpMaliyet = (fob + 36) * 1.10;
        const birimSatis = ddpMaliyet * (1 + kar);
        const hasılat = birimSatis * qty;

        const f = (n) => n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
        
        document.getElementById(`res-${p.id}`).innerHTML = `
            <div class="data-row"><span>BİRİM MALİYET (DDP)</span><b>$ ${f(ddpMaliyet)}</b></div>
            <div class="data-row"><span>BİRİM SATIŞ (SACA)</span><b style="color:var(--accent)">$ ${f(birimSatis)}</b></div>
            <div class="data-row" style="border:none"><span>NET KÂR (USD)</span><b style="color:var(--success)">$ ${f((birimSatis - ddpMaliyet) * qty)}</b></div>
        `;
        document.getElementById(`total-${p.id}`).innerText = `$ ${Math.round(hasılat).toLocaleString('en-US')}`;
    });
}

function genPDF(id) {
    const firma = prompt("Müşteri Firma Ünvanı:"); if(!firma) return;
    const p = PRODUCTS.find(x => x.id === id);
    const qty = parseFloat(document.getElementById(`in-qty-${p.id}`).value);
    const kar = (parseFloat(document.getElementById(`in-kar-${p.id}`).value) || 0) / 100;
    
    const fob = DATA.b3 + p.diff;
    const ddp = (fob + 36) * 1.10;
    const unitSaca = ddp * (1 + kar);
    const totalUsd = Math.round(unitSaca * qty);
    const ton = (qty * 60) / 1000;
    
    const usd_ton = totalUsd / ton;
    const try_ton = usd_ton * DATA.try;

    const fmt = (v, d=0) => v.toLocaleString('tr-TR', {minimumFractionDigits: d, maximumFractionDigits: d});

    document.getElementById('pdf-wrap').innerHTML = `
        <div style="padding:50px; background:#fff; color:#0a192f; font-family:Arial, sans-serif; min-height:1100px;">
            <div style="border-bottom:4px solid #0a192f; padding-bottom:20px; display:flex; justify-content:space-between; align-items:center;">
                <div><h1 style="margin:0; font-size:26px; letter-spacing:1px;">ASCAFÉ GLOBAL</h1><p style="font-size:10px; color:#666; margin:0;">BRAZIL - TURKEY | COFFEE TRADING TERMINAL</p></div>
                <div style="text-align:right; font-size:10px;"><b>DATE:</b> ${new Date().toLocaleDateString('tr-TR')}<br><b>REF:</b> ASC-${Math.floor(Math.random()*900000+100000)}</div>
            </div>
            <div style="margin:50px 0;"><small style="color:#888;">QUOTATION FOR:</small><h2 style="margin:5px 0; font-size:28px; border:none; padding:0;">${firma.toUpperCase()}</h2></div>
            <table style="width:100%; border-collapse:collapse; margin-bottom:40px;">
                <thead><tr style="background:#0a192f; color:#fff;"><th style="padding:15px; text-align:left;">DESCRIPTION</th><th style="padding:15px; text-align:center;">QTY</th><th style="padding:15px; text-align:right;">UNIT PRICE ($)</th></tr></thead>
                <tbody><tr><td style="padding:20px 15px; border-bottom:1px solid #eee;"><b>${p.name}</b><br><small style="color:#666;">60kg Export Bags | Basis +${p.diff}</small></td><td style="padding:20px 15px; border-bottom:1px solid #eee; text-align:center;">${fmt(qty)} Saca<br>(${fmt(ton,1)} MT)</td><td style="padding:20px 15px; border-bottom:1px solid #eee; text-align:right; font-weight:bold;">$ ${fmt(unitSaca,2)}</td></tr></tbody>
            </table>
            <div style="display:grid; grid-template-columns: 1fr 1.3fr; gap:30px;">
                <div style="background:#f8fafc; padding:20px; border-radius:15px; border:1px solid #e2e8f0;">
                    <h4 style="border-bottom:2px solid #c49b11; padding-bottom:10px; margin-bottom:15px; font-size:13px;">BİRİM DETAYLARI</h4>
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:12px;"><span>Ton Fiyatı ($)</span><b>$ ${fmt(usd_ton,2)}</b></div>
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:12px;"><span>Kg Fiyatı ($)</span><b>$ ${fmt(usd_ton/1000,2)}</b></div>
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:12px; color:#c49b11;"><span>Ton Fiyatı (₺)</span><b>₺ ${fmt(try_ton,0)}</b></div>
                    <div style="display:flex; justify-content:space-between; font-size:12px; color:#c49b11;"><span>Kg Fiyatı (₺)</span><b>₺ ${fmt(try_ton/1000,2)}</b></div>
                </div>
                <div style="background:#0a192f; color:#fff; padding:30px; border-radius:20px;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:15px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:15px;"><span style="color:#94a3b8;">GRAND TOTAL (USD)</span><b style="font-size:28px; color:#c49b11;">$ ${fmt(totalUsd)}</b></div>
                    <div style="display:flex; justify-content:space-between;"><span style="color:#94a3b8;">TOPLAM TUTAR (TRY)</span><b style="font-size:20px;">₺ ${fmt(totalUsd * DATA.try)}</b></div>
                </div>
            </div>
            <div style="margin-top:80px; font-size:11px; color:#666; border-left:5px solid #0a192f; padding-left:20px;">
                * Delivery: DDP Istanbul Depot.<br>* USD/TRY: ${DATA.try.toFixed(4)} | KC=F: ${DATA.b3.toFixed(2)}<br>* Validity: 48 Hours.
            </div>
        </div>`;
    document.getElementById('modal-overlay').style.display = 'flex';
}

function downloadFinalPDF() { html2pdf().set({ margin:0, filename:'ASCAFE_TEKLIF.pdf', html2canvas:{scale:3}, jsPDF:{unit:'mm', format:'a4'} }).from(document.getElementById('pdf-wrap')).save(); }
function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
window.onload = () => { init(); syncLoop(); };
function syncLoop() { liveSync(); setInterval(liveSync, 30000); }
</script>
</body>
</html>
