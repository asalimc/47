<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASC CAFÉ | Global Trading Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg: #05070a; --card: #0f1218; --primary: #d4af37; 
            --success: #10b981; --danger: #f43f5e; --text: #e2e8f0; --border: #1e293b;
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        html, body { 
            height: 100vh; width: 100vw; overflow: hidden; 
            background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; padding: 12px;
        }
        
        /* Borsa Barı */
        .market-bar { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; 
            height: 10vh; min-height: 70px; flex-shrink: 0; margin-bottom: 10px;
        }
        .m-item { 
            background: var(--card); border-radius: 10px; border: 1px solid var(--border);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.3s;
        }
        .m-item label { font-size: 9px; font-weight: 800; color: var(--primary); letter-spacing: 1px; }
        .m-item b { font-family: 'JetBrains Mono'; font-size: clamp(14px, 1.5vw, 20px); color: #fff; }

        /* Dashboard Grid */
        .container { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; 
            flex-grow: 1; height: 85vh;
        }
        
        @media (max-width: 1024px) { 
            html, body { overflow-y: auto; height: auto; }
            .container { grid-template-columns: 1fr; height: auto; }
            .market-bar { grid-template-columns: 1fr 1fr; height: auto; }
        }

        .p-card { 
            background: var(--card); border-radius: 14px; padding: 15px; 
            border: 1px solid var(--border); display: flex; flex-direction: column;
            justify-content: space-between; overflow: hidden;
        }
        h2 { font-size: 11px; color: var(--primary); border-left: 3px solid var(--primary); padding-left: 10px; margin-bottom: 8px; }

        .qty-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 8px; }
        .qty-btn { background: #1a1f26; border: 1px solid var(--border); color: #fff; padding: 8px 2px; border-radius: 5px; font-size: 8px; font-weight: 800; cursor: pointer; }

        .i-box { background: #07090d; padding: 8px; border-radius: 8px; border: 1px solid var(--border); margin: 4px 0; }
        .i-box label { display: block; font-size: 8px; color: #94a3b8; font-weight: 800; }
        .i-box input { width: 100%; background: transparent; border: none; color: #fff; font-size: 20px; font-weight: 800; outline: none; font-family: 'JetBrains Mono'; }

        .m-list { border-top: 1px solid var(--border); margin: 5px 0; display: flex; flex-direction: column; }
        .m-line { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .m-line span { font-size: 10px; color: #94a3b8; }
        .v-u { font-family: 'JetBrains Mono'; font-weight: 800; font-size: 14px; color: #38bdf8; }

        .profit-panel { background: #1a1202; color: var(--primary); padding: 10px; border-radius: 8px; text-align: center; border: 1px solid var(--primary); }
        .profit-panel b { font-size: 22px; font-family: 'JetBrains Mono'; }

        .btn-pdf { width: 100%; background: var(--primary); color: #000; border: none; padding: 12px; border-radius: 10px; font-weight: 900; cursor: pointer; margin-top: 8px; font-size: 11px; }

        .flash-up { animation: f-up 1s; color: var(--success) !important; }
        .flash-down { animation: f-down 1s; color: var(--danger) !important; }
        @keyframes f-up { 0% { background: rgba(16,185,129,0.2); } 100% { background: transparent; } }
        @keyframes f-down { 0% { background: rgba(244,63,94,0.2); } 100% { background: transparent; } }

        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; }
        #pdf-preview { background: white; width: 95%; height: 95vh; border-radius: 8px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="market-bar">
    <div class="m-item" id="c-brl" onclick="manualIn('brl')"><label>USD/BRL</label><b id="v-brl">5.72</b></div>
    <div class="m-item" id="c-try" onclick="manualIn('try')"><label>USD/TRY</label><b id="v-try">34.35</b></div>
    <div class="m-item" id="c-ny" onclick="manualIn('ny')"><label>NY ARABICA</label><b id="v-ny">301.50</b></div>
    <div class="m-item" id="c-ldn" onclick="manualIn('ldn')"><label>LDN CONILON</label><b id="v-ldn">215.00</b></div>
</div>

<div class="container" id="grid"></div>

<div id="modal-overlay">
    <div id="pdf-preview">
        <div style="background:#000; padding:10px; display:flex; justify-content:space-between; position:sticky; top:0;">
            <button onclick="downloadFinalPDF()" style="background:var(--success); color:white; border:none; padding:10px; font-weight:900; cursor:pointer;">PDF İNDİR</button>
            <button onclick="closeModal()" style="background:var(--danger); color:white; border:none; padding:10px; font-weight:900; cursor:pointer;">KAPAT</button>
        </div>
        <div id="pdf-content"></div>
    </div>
</div>

<script>
const API_KEY = "4dfdfe192bmshe85964c016dba78p18c09ajsn9718915999f6";
let DB = { try: 34.35, brl: 5.72, ny: 301.50, ldn: 215.00 };

const ITEMS = [
    { id: 'mi', name: 'BRAZIL MINAS NY2/3 17/18 SSFC', type: 'NY', diff: 18 },
    { id: 'sa', name: 'BRAZIL SANTOS NY2/3 17/18', type: 'NY', diff: 12 },
    { id: 'co', name: 'BRAZIL CONILON TYPE 7/8', type: 'LDN', diff: 8 }
];

async function sync() {
    try {
        const r = await fetch('https://open.er-api.com/v6/latest/USD');
        const d = await r.json();
        if(d.rates) { update('brl', d.rates.BRL); update('try', d.rates.TRY); }

        const getS = async (sym, key) => {
            const rs = await fetch(`https://yahoo-finance-scraper.p.rapidapi.com/api/chart/${sym}?interval=1d`, {
                headers: { 'x-rapidapi-key': API_KEY, 'x-rapidapi-host': 'yahoo-finance-scraper.p.rapidapi.com' }
            });
            const dj = await rs.json();
            const p = dj.body?.meta?.regularMarketPrice;
            if(p) update(key, p);
        };
        await getS('KC=F', 'ny'); await getS('RC=F', 'ldn');
    } catch(e) { console.warn("Sync error"); }
}

function update(k, v) {
    const el = document.getElementById(`v-${k}`);
    const card = document.getElementById(`c-${k}`);
    const old = DB[k];
    if(v.toFixed(2) !== old.toFixed(2)) {
        DB[k] = v;
        el.innerHTML = v.toFixed(2) + (v > old ? ' ▲' : ' ▼');
        card.className = `m-item ${v > old ? 'flash-up' : 'flash-down'}`;
        calc();
        setTimeout(() => card.className = 'm-item', 2000);
    }
}

function manualIn(k) { const v = prompt("Değer girin:", DB[k]); if(v) update(k, parseFloat(v)); }

function start() {
    document.getElementById('grid').innerHTML = ITEMS.map(i => `
        <div class="p-card">
            <h2>${i.name}</h2>
            <div class="qty-row">
                <button class="qty-btn" onclick="setQ('${i.id}', 320)">320 SC</button>
                <button class="qty-btn" onclick="setQ('${i.id}', 440)">1 CONT</button>
                <button class="qty-btn" onclick="setQ('${i.id}', 16.66)">1 MT</button>
                <button class="qty-btn" onclick="setQ('${i.id}', 416.5)">25 MT</button>
            </div>
            <div class="i-box"><label>KÂR (%)</label><input type="number" id="k_${i.id}" value="6" oninput="calc()"></div>
            <div class="i-box"><label>MİKTAR (SACA)</label><input type="number" id="t_${i.id}" value="320" oninput="calc()"></div>
            <div class="m-list" id="list_${i.id}"></div>
            <div class="profit-panel"><small>NET KÂR</small><br><b id="prof_${i.id}">$ 0</b></div>
            <button class="btn-pdf" onclick="preparePDF('${i.id}')">TEKLİF DETAYI & PDF</button>
        </div>
    `).join('');
    calc();
}

function setQ(id, v) { document.getElementById(`t_${id}`).value = v; calc(); }

function calc() {
    ITEMS.forEach(i => {
        const k = (parseFloat(document.getElementById(`k_${i.id}`).value) || 0) / 100;
        const q = parseFloat(document.getElementById(`t_${i.id}`).value) || 0;
        const borsa = (i.type === 'NY' ? DB.ny : DB.ldn) + i.diff;
        const ddp = (borsa + 36) * 1.10;
        const sat = ddp * (1 + k);
        const f = (n) => Math.round(n).toLocaleString('en-US');

        document.getElementById(`list_${i.id}`).innerHTML = `
            <div class="m-line"><span>BR ALIŞ (REAL)</span><b class="v-u" style="color:var(--primary)">R$ ${f(borsa * DB.brl)}</b></div>
            <div class="m-line"><span>BİRİM SATIŞ (USD)</span><b class="v-u">$ ${f(sat)}</b></div>
            <div class="m-line"><span>TOPLAM SATIŞ (USD)</span><b style="color:var(--primary); font-size:18px">$ ${f(sat * q)}</b></div>
        `;
        document.getElementById(`prof_${i.id}`).innerText = `$ ${f((ddp * k) * q)}`;
    });
}

function preparePDF(id) {
    const firma = prompt("Müşteri Adı:"); if(!firma) return;
    const i = ITEMS.find(x => x.id === id);
    const q = parseFloat(document.getElementById(`t_${i.id}`).value);
    const k = (parseFloat(document.getElementById(`k_${i.id}`).value) || 0) / 100;
    
    const borsa = (i.type === 'NY' ? DB.ny : DB.ldn) + i.diff;
    const fob = borsa;
    const cif = borsa + 24; // Freight
    const ddp = (cif + 12) * 1.10;
    const satis = ddp * (1 + k);
    
    const ton = (q * 60) / 1000;
    const cont = q / 440;
    const f = (n) => Math.round(n).toLocaleString('tr-TR');

    document.getElementById('pdf-content').innerHTML = `
        <div style="padding:40px; color:#111; background:white;">
            <div style="border-bottom:5px solid #d4af37; padding-bottom:15px; margin-bottom:30px; display:flex; justify-content:space-between; align-items:center;">
                <h1 style="margin:0; font-size:32px;">ASC CAFÉ <span style="color:#d4af37;">GLOBAL</span></h1>
                <div style="text-align:right; font-size:11px;"><b>TARİH:</b> ${new Date().toLocaleDateString('tr-TR')}</div>
            </div>
            
            <p><b>ALICI FIRMA:</b> ${firma.toUpperCase()}</p>
            <p><b>ÜRÜN:</b> ${i.name}</p>
            
            <table style="width:100%; border-collapse:collapse; margin:25px 0;">
                <tr style="background:#05070a; color:white; font-size:12px;">
                    <th style="padding:12px; text-align:left;">DETAY</th>
                    <th style="padding:12px; text-align:right;">MİKTAR / BİRİM</th>
                </tr>
                <tr><td style="padding:10px; border-bottom:1px solid #eee;">TOPLAM SACA (BAGS)</td><td style="padding:10px; border-bottom:1px solid #eee; text-align:right;">${f(q)} Saca</td></tr>
                <tr><td style="padding:10px; border-bottom:1px solid #eee;">TOPLAM TONAJ (MT)</td><td style="padding:10px; border-bottom:1px solid #eee; text-align:right;">${ton.toFixed(2)} Ton</td></tr>
                <tr><td style="padding:10px; border-bottom:1px solid #eee;">KONTEYNER (FCL)</td><td style="padding:10px; border-bottom:1px solid #eee; text-align:right;">~ ${cont.toFixed(1)} x 20' FCL</td></tr>
                <tr style="font-weight:900; color:#d4af37;"><td style="padding:10px; border-bottom:1px solid #eee;">BİRİM SATIŞ (DDP)</td><td style="padding:10px; border-bottom:1px solid #eee; text-align:right;">$ ${f(satis)}</td></tr>
            </table>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:40px;">
                <div style="background:#f8fafc; padding:15px; border-radius:5px; font-size:11px;">
                    <b>LOJİSTİK KIRILIMI:</b><br>
                    FOB BRAZIL: $ ${f(fob)} / Saca<br>
                    CIF ISTANBUL: $ ${f(cif)} / Saca<br>
                    DDP TURKEY: $ ${f(ddp)} / Saca
                </div>
                <div style="background:#fff9e6; padding:15px; border-radius:5px; text-align:right;">
                    <b>TOPLAM TUTAR (USD)</b><br>
                    <span style="font-size:24px; font-weight:900;">$ ${f(satis * q)}</span><br>
                    <b>TOPLAM TUTAR (YTL)</b><br>
                    <span style="font-size:20px; color:#856404;">₺ ${f(satis * q * DB.try)}</span>
                </div>
            </div>
            
            <div style="font-size:10px; line-height:1.6; border-top:1px solid #eee; padding-top:15px;">
                <b>NOT:</b> Teklif borsa verileri nedeniyle 24 saat geçerlidir. Ödeme: CAD/LC. Arbitraj: Geneva.
            </div>
        </div>`;
    document.getElementById('modal-overlay').style.display = 'flex';
}

function downloadFinalPDF() {
    html2pdf().set({ margin:0, filename:'ASC_TEKLIF.pdf', html2canvas:{scale:3} })
    .from(document.getElementById('pdf-content')).save();
}
function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
window.onload = () => { sync(); setInterval(sync, 15000); start(); };
</script>
</body>
</html>
