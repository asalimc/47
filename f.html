<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASC CAFÉ | Brazil Trade Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card-default: #1e293b;
            --primary: #f8fafc;
            --accent: #fbbf24;
            --border: #334155;
            --up-bg: #22c55e; /* Yeşil Yükseliş */
            --up-text: #000000;
            --down-bg: #ef4444; /* Kırmızı Düşüş */
            --down-text: #ffffff;
        }
        
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.5s ease, color 0.5s ease; }
        
        body { 
            background: var(--bg); 
            color: var(--primary); 
            margin: 0; 
            padding: clamp(10px, 2vw, 25px);
            min-height: 100vh;
        }

        .container { max-width: 1800px; margin: 0 auto; width: 100%; }

        /* Üst Piyasa Paneli */
        .market-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 15px; margin-bottom: 30px; 
        }
        
        .m-card { 
            background: var(--card-default); padding: 25px; border-radius: 12px; 
            border: 1px solid var(--border); box-shadow: 0 10px 15px rgba(0,0,0,0.3);
            text-align: center;
        }

        .m-card.trend-up { background: var(--up-bg); color: var(--up-text); border-color: var(--up-bg); }
        .m-card.trend-down { background: var(--down-bg); color: var(--down-text); border-color: var(--down-bg); }

        .m-card label { display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; opacity: 0.9; }
        .m-card .val { font-family: 'JetBrains Mono'; font-size: 28px; font-weight: 700; display: block; }
        .m-card .arrow { font-size: 20px; font-weight: 800; margin-top: 5px; display: inline-block; }

        /* Ana Ürün Kartları */
        .main-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 25px; }
        .p-card { 
            background: var(--card-default); border-radius: 16px; padding: 30px; 
            border: 1px solid var(--border); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.4);
        }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid var(--accent); padding-bottom: 15px; }
        .header h1 { font-size: clamp(20px, 5vw, 32px); font-weight: 800; color: var(--primary); margin: 0; }
        .header h1 span { color: var(--accent); }

        .btn-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .btn-qty { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--primary); 
            padding: 15px; border-radius: 8px; font-size: 12px; font-weight: 800; cursor: pointer;
        }
        .btn-qty:hover { background: var(--accent); color: var(--bg); }

        .inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .input-group { background: rgba(15, 23, 42, 0.5); padding: 15px; border-radius: 10px; border: 1px solid var(--border); }
        .input-group label { display: block; font-size: 11px; color: var(--accent); font-weight: 800; margin-bottom: 8px; }
        .input-group input { width: 100%; border: none; background: transparent; font-size: 24px; font-family: 'JetBrains Mono'; font-weight: 700; outline: none; color: white; }

        .price-item { display: flex; justify-content: space-between; padding: 18px 0; border-bottom: 1px solid var(--border); }
        .price-item span { font-size: 14px; font-weight: 600; color: #94a3b8; }
        .amt b { display: block; font-family: 'JetBrains Mono'; text-align: right; }
        .amt .usd { font-size: 18px; color: var(--primary); }
        .amt .try { font-size: 13px; color: var(--success); }

        .sell-box { background: rgba(251, 191, 36, 0.1); border: 2px solid var(--accent); padding: 20px; border-radius: 12px; margin-top: 20px; text-align: center; }
        .sell-box label { color: var(--accent); font-weight: 800; font-size: 12px; display: block; margin-bottom: 5px; }
        .sell-box div { font-size: 32px; font-family: 'JetBrains Mono'; font-weight: 700; }

        .btn-pdf { 
            width: 100%; background: var(--accent); color: var(--bg); border: none; 
            padding: 22px; border-radius: 12px; font-weight: 800; cursor: pointer; 
            font-size: 16px; text-transform: uppercase; margin-top: 20px;
        }

        /* Modal */
        #pdf-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; overflow-y:auto; padding: 10px; }
        .modal-body { background: white; max-width: 850px; margin: 20px auto; border-radius: 12px; overflow: hidden; }
        .modal-nav { background: #1e293b; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
        .m-btn { border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: 700; }

        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; }
            .market-grid { grid-template-columns: 1fr 1fr; }
            body { padding: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>ASC CAFÉ <span>BRAZIL TERMINAL</span></h1>
        <div id="clock" style="font-family:'JetBrains Mono'; font-weight:700; color:var(--accent);"></div>
    </div>

    <div class="market-grid">
        <div class="m-card" id="m-try"><label>USD/TRY</label><span class="val">44.92</span><span class="arrow">-</span></div>
        <div class="m-card" id="m-brl"><label>USD/BRL</label><span class="val">4.98</span><span class="arrow">-</span></div>
        <div class="m-card" id="m-ny"><label>NY ARABICA</label><span class="val">301.50</span><span class="arrow">-</span></div>
        <div class="m-card" id="m-ldn"><label>LDN ROBUSTA</label><span class="val">3567</span><span class="arrow">-</span></div>
    </div>

    <div class="main-grid" id="main-grid"></div>
</div>

<div id="pdf-modal">
    <div class="modal-body">
        <div class="modal-nav">
            <button class="m-btn" style="background:#475569; color:white;" onclick="closePdf()">İPTAL</button>
            <button class="m-btn" style="background:var(--accent); color:#000;" id="download-pdf">PDF OLARAK KAYDET</button>
        </div>
        <div id="pdf-content"></div>
    </div>
</div>

<script>
let DATA = { try: 44.92, brl: 4.98, ny: 301.50, ldn: 3567 };
const ITEMS = [
    { id: 'mi', name: 'BRAZIL MINAS NY2/3 17/18 SSFC', type: 'NY', diff: 25 },
    { id: 'sa', name: 'BRAZIL SANTOS NY2/3 17/18', type: 'NY', diff: 20 },
    { id: 'co', name: 'BRAZIL CONILON (ROBUSTA)', type: 'LDN', diff: 150 }
];
const COSTS = { ocean: 220, inland: 190, port: 160, tax: 0.10 };

function init() {
    const grid = document.getElementById('main-grid');
    grid.innerHTML = ITEMS.map(item => `
        <div class="p-card">
            <h2 style="font-size:16px; border-left:4px solid var(--accent); padding-left:12px; margin-bottom:20px;">${item.name}</h2>
            <div class="btn-row">
                <button class="btn-qty" onclick="updateQty('${item.id}', 1)">1 TON</button>
                <button class="btn-qty" onclick="updateQty('${item.id}', 19.2)">20'FT</button>
                <button class="btn-qty" onclick="updateQty('${item.id}', 27)">40'FT</button>
            </div>
            <div class="inputs">
                <div class="input-group"><label>KÂR (%)</label><input type="number" id="k_${item.id}" value="0" oninput="calc('${item.id}')"></div>
                <div class="input-group"><label>MİKTAR (MT)</label><input type="number" id="t_${item.id}" value="19.2" oninput="calc('${item.id}')"></div>
            </div>
            <div id="res_${item.id}"></div>
            <div class="sell-box">
                <label>GÜNCEL SATIŞ FİYATI (KG)</label>
                <div id="sell_${item.id}">$ 0.00</div>
            </div>
            <button class="btn-pdf" onclick="openPdf('${item.id}')">TEKLİF HAZIRLA</button>
        </div>
    `).join('');
    calcAll();
    setInterval(marketTick, 2500);
}

function marketTick() {
    document.getElementById('clock').innerText = new Date().toLocaleString('tr-TR');
    const keys = Object.keys(DATA);
    const key = keys[Math.floor(Math.random()*4)];
    const change = (Math.random() - 0.5) * 0.8;
    DATA[key] += change;

    const el = document.getElementById(`m-${key}`);
    el.querySelector('.val').innerText = DATA[key].toFixed(2);
    el.querySelector('.arrow').innerText = change > 0 ? '▲' : '▼';
    
    // Tüm Div Renklendirme Mantığı
    el.classList.remove('trend-up', 'trend-down');
    void el.offsetWidth; 
    el.classList.add(change > 0 ? 'trend-up' : 'trend-down');
    
    calcAll();
}

function updateQty(id, val) {
    document.getElementById(`t_${id}`).value = val;
    calc(id);
}

function calc(id) {
    const item = ITEMS.find(x => x.id === id);
    const margin = (parseFloat(document.getElementById(`k_${id}`).value) || 0) / 100;
    const ton = parseFloat(document.getElementById(`t_${id}`).value) || 0;
    const base = (item.type === 'NY') ? (DATA.ny + item.diff) * 22.0462 : (DATA.ldn + item.diff);
    
    const fob = base + COSTS.port;
    const cif = fob + COSTS.ocean;
    const ddp = (cif + COSTS.inland) * (1 + COSTS.tax);
    const sellKg = (ddp * (1 + margin)) / 1000;

    const fmt = (n) => Math.round(n).toLocaleString('tr-TR');
    
    document.getElementById(`res_${id}`).innerHTML = `
        <div class="price-item"><span>FOB (Brezilya Liman)</span><div class="amt"><b class="usd">$ ${fmt(fob)}</b><b class="try">₺ ${fmt(fob * DATA.try)}</b></div></div>
        <div class="price-item"><span>CIF (Varış Limanı)</span><div class="amt"><b class="usd">$ ${fmt(cif)}</b><b class="try">₺ ${fmt(cif * DATA.try)}</b></div></div>
        <div class="price-item"><span>DDP (Depo Teslim)</span><div class="amt"><b class="usd">$ ${fmt(ddp)}</b><b class="try">₺ ${fmt(ddp * DATA.try)}</b></div></div>
    `;
    document.getElementById(`sell_${id}`).innerText = `$ ${sellKg.toFixed(2)}`;
}

function calcAll() { ITEMS.forEach(i => calc(i.id)); }

function openPdf(id) {
    const client = prompt("Müşteri Ünvanı:");
    if(!client) return;
    const item = ITEMS.find(x => x.id === id);
    const ton = document.getElementById(`t_${id}`).value;
    const margin = (parseFloat(document.getElementById(`k_${id}`).value) || 0) / 100;
    const base = (item.type === 'NY') ? (DATA.ny + item.diff) * 22.0462 : (DATA.ldn + item.diff);
    const ddp = (base + COSTS.port + COSTS.ocean + COSTS.inland) * (1 + COSTS.tax);
    const unitPrice = (ddp * (1 + margin)) / 1000;

    const html = `
        <div style="padding:50px; background:#fff; color:#002366; font-family:sans-serif; min-height:1000px;">
            <div style="border-bottom:5px solid #002366; padding-bottom:20px; margin-bottom:30px; display:flex; justify-content:space-between;">
                <div><h1 style="margin:0; font-size:35px;">ASC CAFÉ GLOBAL</h1><p style="margin:5px 0; font-weight:bold; color:#FFD700;">ORIGIN: 100% BRAZIL</p></div>
                <div style="text-align:right; font-size:11px;"><b>Ref:</b> ASC-BR-${Math.floor(Date.now()/10000)}<br><b>Tarih:</b> ${new Date().toLocaleDateString('tr-TR')}<br><b>Brasilia DF:</b> +55 19 981 55 29 42</div>
            </div>
            <h2 style="text-align:center; background:#002366; color:#FFD700; padding:12px;">OFFICIAL COMMERCIAL PROPOSAL</h2>
            <div style="margin:30px 0; border:1px solid #e2e8f0; padding:20px;"><p><b>BUYER:</b> ${client.toUpperCase()}</p><p><b>COMMODITY:</b> ${item.name}</p><p><b>ORIGIN:</b> BRAZIL</p></div>
            <table style="width:100%; border-collapse:collapse; margin:30px 0;">
                <tr style="background:#002366; color:white;"><th style="padding:15px; text-align:left;">Description</th><th style="padding:15px;">QTY (MT)</th><th style="padding:15px;">Price (KG/DDP)</th><th style="padding:15px; text-align:right;">Total</th></tr>
                <tr><td style="padding:15px; border:1px solid #ddd;">Green Coffee Beans</td><td style="padding:15px; border:1px solid #ddd; text-align:center;">${ton} MT</td><td style="padding:15px; border:1px solid #ddd; text-align:center;"><b>$ ${unitPrice.toFixed(2)}</b></td><td style="padding:15px; border:1px solid #ddd; text-align:right;"><b>$ ${Math.round(unitPrice * ton * 1000).toLocaleString()}</b></td></tr>
            </table>
            <div style="background:#f8fafc; padding:20px; font-size:11px; border-left:5px solid #FFD700;"><h4>INCOTERMS & LEGAL</h4><b>FOB:</b> Port of Loading | <b>CIF:</b> Freight Incl. | <b>DDP:</b> Duty Paid | <b>Validity:</b> 24 Hours.</div>
            <div style="margin-top:100px; display:flex; justify-content:space-between;"><div style="border-top:1px solid #002366; width:200px; text-align:center; padding-top:10px;">Buyer Signature</div><div style="border-top:1px solid #002366; width:200px; text-align:center; padding-top:10px;">ASC CAFÉ Global</div></div>
        </div>
    `;
    document.getElementById('pdf-content').innerHTML = html;
    document.getElementById('pdf-modal').style.display = 'block';
    document.getElementById('download-pdf').onclick = () => {
        const opt = { margin:0, filename:`ASC_Offer_${client}.pdf`, html2canvas:{scale:2}, jsPDF:{unit:'in', format:'letter'} };
        html2pdf().set(opt).from(document.getElementById('pdf-content')).save().then(closePdf);
    };
}
function closePdf() { document.getElementById('pdf-modal').style.display = 'none'; }
window.onload = init;
</script>
</body>
</html>
