<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MASTER KAHVE TERMİNALİ</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #001f3f; --white: #ffffff; --blue: #00d4ff; --border: 4px solid #001f3f; }
        * { box-sizing: border-box; font-family: 'Sora', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--white); margin: 0; padding: 10px; color: var(--navy); min-height: 100vh; }
        .header { background: var(--navy); color: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; box-shadow: 0 4px 0px var(--blue); }
        .header h1 { font-size: 14px; margin: 0 0 5px 0; font-weight: 900; text-transform: uppercase; }
        .kur-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .kur-item { background: white; border: var(--border); padding: 8px; border-radius: 10px; }
        .kur-item label { font-size: 9px; font-weight: 900; color: var(--navy); display: block; text-transform: uppercase; }
        .kur-item input { width: 100%; border: none; font-size: 18px; font-weight: 900; color: #d35400; outline: none; background: transparent; }
        .card { background: var(--white); border: var(--border); border-radius: 20px; padding: 15px; box-shadow: 8px 8px 0px var(--navy); margin-bottom: 20px; }
        h2 { font-size: 15px; font-weight: 900; margin: 0 0 12px 0; border-bottom: 4px solid var(--navy); padding-bottom: 4px; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .input-group label { font-size: 8px; font-weight: 900; display: block; margin-bottom: 4px; }
        .input-group input { width: 100%; padding: 10px; border: 2px solid var(--navy); border-radius: 8px; font-size: 16px; font-weight: 900; }
        .summary-box { background: #f1f5f9; padding: 12px; border-radius: 12px; border: 2.5px solid var(--navy); margin-bottom: 12px; }
        .line { display: flex; justify-content: space-between; margin-bottom: 6px; border-bottom: 1.5px solid #cbd5e1; font-size: 11px; }
        .line b { font-weight: 900; color: #000; font-size: 12px; }
        .m-head { font-size: 10px; font-weight: 900; text-transform: uppercase; color: var(--navy); margin: 10px 0 6px; border-left: 4px solid var(--blue); padding-left: 6px; background: rgba(0,212,255,0.1); }
        .price-row { padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; background: var(--navy); color: white; margin-bottom: 6px; }
        .p-val { font-size: 20px; font-weight: 900; color: var(--blue); }
        .profit-final { background: #059669; border: none; }
        #notif-btn { background: #ff4757; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: 900; font-size: 12px; margin-top: 10px; width: 100%; cursor: pointer; box-shadow: 0 4px 0 #b3303c; }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <h1>MASTER KAHVE TERMİNALİ</h1>
        <div class="kur-bar">
            <div class="kur-item"><label>USD / TRY</label><input type="number" id="uTry" value="34.35" oninput="fullSave()"></div>
            <div class="kur-item"><label>USD / BRL</label><input type="number" id="uBrl" value="5.85" oninput="fullSave()"></div>
        </div>
        <button id="notif-btn" onclick="setupPush()">KORUMAYI AKTİF ET (TEST İÇİN ÇİFT TIKLA)</button>
    </header>
    <div id="mainGrid"></div>
</div>

<script>
    const STATS = { gumruk: 0.08, igv: 0.05, kdv: 0.10, navlun: 350, sigorta: 0.015, limanMasraf: 150 };
    const PRODUCTS = [
        { id: 'ara', name: 'ARABICA RIO MINAS', brl: 1191, kar: 30 },
        { id: 'rob', name: 'ROBUSTA CONILON', brl: 886, kar: 5 },
        { id: 'san', name: 'ARABICA SANTOS NY2', brl: 1250, kar: 15 },
        { id: 'bou', name: 'ARABICA BOURBON', brl: 1420, kar: 10 }
    ];

    async function setupPush() {
        if ('serviceWorker' in navigator) {
            try {
                const reg = await navigator.serviceWorker.register('sw.js', { scope: './' });
                const permission = await Notification.requestPermission();
                if (permission === "granted") {
                    updateUI(true);
                    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                    reg.showNotification("SİSTEM AKTİF", { body: "Arka plan koruması devrede.", icon: "https://cdn-icons-png.flaticon.com/512/2933/2933932.png" });
                }
            } catch (e) { alert("Hata: " + e); }
        }
    }

    // Çift tıklama testi için
    document.getElementById('notif-btn').addEventListener('dblclick', async () => {
        alert("5 saniye içinde ekranı kapatın, test bildirimi gelecek.");
        const reg = await navigator.serviceWorker.ready;
        setTimeout(() => {
            reg.showNotification("🚨 MASTER TEST", {
                body: "Ekran kapalıyken bildirim ve titreşim başarılı!",
                requireInteraction: true,
                vibrate: [500, 100, 500, 100, 500]
            });
        }, 5000);
    });

    function updateUI(active) {
        const btn = document.getElementById('notif-btn');
        btn.innerText = active ? "KORUMA AKTİF (ARKA PLAN) ●" : "KORUMAYI AKTİF ET";
        btn.style.background = active ? "#059669" : "#ff4757";
        btn.style.boxShadow = active ? "0 4px 0 #047857" : "0 4px 0 #b3303c";
    }

    function fullSave() {
        localStorage.setItem('uTry', document.getElementById('uTry').value);
        localStorage.setItem('uBrl', document.getElementById('uBrl').value);
        calc();
    }

    async function checkRates() {
        try {
            const res = await fetch('https://open.er-api.com/v6/latest/USD');
            const data = await res.json();
            if(data && data.rates) {
                const oldTry = parseFloat(localStorage.getItem('uTry')) || 0;
                const newTry = data.rates.TRY;
                if (oldTry !== 0 && Math.abs(newTry - oldTry) > 0.02 && Notification.permission === "granted") {
                    const reg = await navigator.serviceWorker.ready;
                    reg.showNotification("KRİTİK KUR DEĞİŞİMİ", { 
                        body: `Dolar: ${newTry.toFixed(2)} TL`, 
                        vibrate: [500, 200, 500],
                        requireInteraction: true 
                    });
                }
                document.getElementById('uTry').value = newTry.toFixed(2);
                document.getElementById('uBrl').value = data.rates.BRL.toFixed(2);
                fullSave();
            }
        } catch (e) {}
    }

    function createCards() {
        const grid = document.getElementById('mainGrid');
        PRODUCTS.forEach(p => {
            grid.innerHTML += `
                <div class="card">
                    <h2>${p.name}</h2>
                    <div class="input-row">
                        <div class="input-group"><label>BRL/60KG</label><input type="number" id="${p.id}In" value="${p.brl}" oninput="calc()"></div>
                        <div class="input-group"><label>TON</label><input type="number" id="${p.id}Ton" value="1" oninput="calc()"></div>
                        <div class="input-group"><label>KÂR %</label><input type="number" id="${p.id}Kar" value="${p.kar}" oninput="calc()"></div>
                    </div>
                    <div class="summary-box" id="${p.id}Summary"></div>
                    <div class="price-row"><span>SATIŞ:</span><span class="p-val" id="${p.id}FinalTl">0 ₺</span></div>
                    <div class="price-row profit-final"><span>KÂR:</span><span class="p-val" id="${p.id}NetProfit" style="color:#afffd0">0 ₺</span></div>
                </div>
            `;
        });
        if (Notification.permission === "granted") updateUI(true);
        checkRates();
        setInterval(checkRates, 300000);
        calc();
    }

    function calc() {
        const tK = parseFloat(document.getElementById('uTry').value) || 0;
        const bK = parseFloat(document.getElementById('uBrl').value) || 0;
        PRODUCTS.forEach(p => {
            const bP = parseFloat(document.getElementById(p.id + 'In').value) || 0;
            const tM = parseFloat(document.getElementById(p.id + 'Ton').value) || 0;
            const kO = parseFloat(document.getElementById(p.id + 'Kar').value) || 0;
            let tBrl = (bP / 60) * 1000;
            let tUsd = tBrl / bK;
            let dTry = (tUsd + STATS.limanMasraf + STATS.navlun) * 1.15 * tK;
            let kS = (dTry / 1000) * (1 + (kO / 100));
            document.getElementById(p.id+'Summary').innerHTML = `
                <div class="m-head">Maliyet Analizi</div>
                <div class="line">USD Ton: <b>${Math.round(tUsd).toLocaleString()} $</b></div>
                <div class="line">DDP TRY: <b>${Math.round(dTry).toLocaleString()} ₺</b></div>
                <div class="line">KG Maliyet: <b>${(dTry/1000).toFixed(2)} ₺</b></div>
            `;
            document.getElementById(p.id+'FinalTl').innerText = Math.round(kS * 1000 * tM).toLocaleString() + " ₺";
            document.getElementById(p.id+'NetProfit').innerText = Math.round((kS * 1000 * tM) - (dTry * tM)).toLocaleString() + " ₺";
        });
    }
    window.onload = createCards;
</script>
</body>
</html>
