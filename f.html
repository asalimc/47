<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASC CAFÉ | Brazil Trade Terminal V12</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg: #f1f5f9; --card: #ffffff; --primary: #0f172a; --accent: #1e40af;
            --success: #15803d; --danger: #b91c1c; --text: #1e293b; --border: #cbd5e1;
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        /* Borsa Dinamik Renk Efektleri */
        @keyframes flash-green { 0% { background: rgba(21, 128, 61, 0.3); } 100% { background: transparent; } }
        @keyframes flash-red { 0% { background: rgba(185, 28, 28, 0.3); } 100% { background: transparent; } }
        .flash-up { animation: flash-green 1s ease-out; color: var(--success) !important; }
        .flash-down { animation: flash-red 1s ease-out; color: var(--danger) !important; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 3px solid var(--primary); padding-bottom: 15px; }
        .header h1 { font-size: 24px; font-weight: 800; color: var(--primary); margin: 0; letter-spacing: -1px; }

        .market-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .m-card { background: var(--card); padding: 18px; border-radius: 8px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); transition: all 0.4s; }
        .m-card label { display: block; font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 8px; }
        .m-card .val-box { display: flex; align-items: center; justify-content: space-between; }
        .m-card .val { font-family: 'JetBrains Mono'; font-size: 22px; font-weight: 700; color: var(--primary); }
        .m-card .arrow { font-size: 18px; font-weight: bold; }

        .main-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: 25px; }
        .p-card { background: var(--card); border-radius: 12px; padding: 25px; border: 1px solid var(--border); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .p-card h2 { font-size: 16px; color: var(--primary); margin: 0 0 20px 0; font-weight: 800; border-left: 6px solid var(--primary); padding-left: 15px; text-transform: uppercase; }

        .btn-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .btn-qty { background: #e2e8f0; border: 1px solid #94a3b8; padding: 12px; border-radius: 6px; font-size: 12px; font-weight: 800; cursor: pointer; color: var(--primary); }
        .btn-qty:hover { background: var(--primary); color: white; }

        .inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .input-group { background: #f8fafc; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; }
        .input-group label { display: block; font-size: 11px; color: #475569; font-weight: 800; margin-bottom: 5px; }
        .input-group input { width: 100%; border: none; background: transparent; font-size: 22px; font-family: 'JetBrains Mono'; font-weight: 700; outline: none; color: var(--primary); }

        .price-list { border-top: 2px solid var(--primary); margin-top: 15px; }
        .price-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #f1f5f9; }
        .price-item span { font-size: 13px; font-weight: 600; color: #334155; }
        .amt { text-align: right; }
        .amt .usd { display: block; font-family: 'JetBrains Mono'; font-weight: 700; color: var(--primary); font-size: 17px; }
        .amt .try { display: block; font-family: 'JetBrains Mono'; font-size: 12px; color: var(--success); font-weight: 600; }

        .profit-box { background: #fff1f2; border: 1px solid #fecdd3; padding: 20px; border-radius: 10px; margin: 20px 0; text-align: center; }
        .profit-box small { font-size: 11px; font-weight: 800; color: var(--danger); text-transform: uppercase; }
        .profit-box div { font-size: 30px; font-family: 'JetBrains Mono'; font-weight: 700; color: var(--danger); }

        .btn-pdf { width: 100%; background: var(--primary); color: white; border: none; padding: 20px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 15px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn-pdf:hover { background: #1e293b; transform: translateY(-2px); }

        /* PDF Önizleme Modalı */
        #pdf-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.9); z-index:10000; overflow-y:auto; padding: 40px 20px; }
        .modal-body { background: white; max-width: 850px; margin: 0 auto; border-radius: 12px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .modal-ctrl { position: sticky; top: 0; background: #f8fafc; padding: 15px 25px; display: flex; justify-content: space-between; border-radius: 12px 12px 0 0; border-bottom: 1px solid #e2e8f0; }
        .btn-close { background: #64748b; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 700; }
        .btn-download { background: var(--success); color: white; border: none; padding: 10px 25px; border-radius: 6px; cursor: pointer; font-weight: 700; }
    </style>
</head>
<body>

<div class="header">
    <h1>ASC CAFÉ GLOBAL <span style="font-weight:400; color:#64748b;">| Brazil Trading V12</span></h1>
    <div id="clock" style="font-family:'JetBrains Mono'; font-size:14px; font-weight:700; color: var(--primary);"></div>
</div>

<div class="market-grid">
    <div class="m-card" id="m-try"><label>USD/TRY</label><div class="val-box"><span class="val">44.92</span><span class="arrow">-</span></div></div>
    <div class="m-card" id="m-brl"><label>USD/BRL</label><div class="val-box"><span class="val">4.98</span><span class="arrow">-</span></div></div>
    <div class="m-card" id="m-ny"><label>NY ARABICA (¢/LB)</label><div class="val-box"><span class="val">301.50</span><span class="arrow">-</span></div></div>
    <div class="m-card" id="m-ldn"><label>LDN ROBUSTA ($/MT)</label><div class="val-box"><span class="val">3567</span><span class="arrow">-</span></div></div>
</div>

<div class="main-grid" id="main-grid"></div>

<div id="pdf-modal">
    <div class="modal-body">
        <div class="modal-ctrl">
            <button class="btn-close" onclick="closePdf()">VAZGEÇ</button>
            <button class="btn-download" id="confirm-pdf">PDF İNDİR VE PAYLAŞ</button>
        </div>
        <div id="pdf-content"></div>
    </div>
</div>

<script>
// Kurumsal Veriler - Sadece Brezilya
let DATA = { try: 44.92, brl: 4.98, ny: 301.50, ldn: 3567 };
const ITEMS = [
    { id: 'mi', name: 'BRAZIL MINAS NY2/3 17/18 SSFC', type: 'NY', diff: 25 },
    { id: 'sa', name: 'BRAZIL SANTOS NY2/3 17/18', type: 'NY', diff: 20 },
    { id: 'co', name: 'BRAZIL CONILON (ROBUSTA)', type: 'LDN', diff: 150 }
];
const COSTS = { ocean: 220, inland: 190, port: 160, tax: 0.10 };

function init() {
    const grid = document.getElementById('main-grid');
    grid.innerHTML = ITEMS.map(item => `
        <div class="p-card">
            <h2>${item.name}</h2>
            <div class="btn-row">
                <button class="btn-qty" onclick="updateQty('${item.id}', 1)">1 TON</button>
                <button class="btn-qty" onclick="updateQty('${item.id}', 19.2)">20'FT (19.2T)</button>
                <button class="btn-qty" onclick="updateQty('${item.id}', 27)">40'FT (27T)</button>
            </div>
            <div class="inputs">
                <div class="input-group"><label>KÂR MARJI (%)</label><input type="number" id="k_${item.id}" value="7" oninput="calc('${item.id}')"></div>
                <div class="input-group"><label>MİKTAR (MT)</label><input type="number" id="t_${item.id}" value="19.2" oninput="calc('${item.id}')"></div>
            </div>
            <div class="price-list" id="res_${item.id}"></div>
            <div class="profit-box">
                <small>PROJEKSİYON NET KÂR</small>
                <div id="prof_${item.id}">$ 0</div>
            </div>
            <button class="btn-pdf" onclick="openPdf('${item.id}')">KURUMSAL TEKLİF OLUŞTUR</button>
        </div>
    `).join('');
    calcAll();
    setInterval(updateMarket, 2000);
}

function updateMarket() {
    document.getElementById('clock').innerText = new Date().toLocaleString('tr-TR');
    if(Math.random() > 0.7) {
        const keys = Object.keys(DATA);
        const key = keys[Math.floor(Math.random()*keys.length)];
        const change = (Math.random() - 0.5) * 0.4;
        DATA[key] += change;

        const el = document.getElementById(`m-${key}`);
        const valEl = el.querySelector('.val');
        const arrowEl = el.querySelector('.arrow');
        
        valEl.innerText = DATA[key].toFixed(2);
        arrowEl.innerText = change > 0 ? '▲' : '▼';
        
        el.classList.remove('flash-up', 'flash-down');
        void el.offsetWidth; // Reflow
        el.classList.add(change > 0 ? 'flash-up' : 'flash-down');
        calcAll();
    }
}

function updateQty(id, val) {
    document.getElementById(`t_${id}`).value = val;
    calc(id);
}

function calc(id) {
    const item = ITEMS.find(x => x.id === id);
    const margin = (parseFloat(document.getElementById(`k_${id}`).value) || 0) / 100;
    const ton = parseFloat(document.getElementById(`t_${id}`).value) || 0;
    
    const base = (item.type === 'NY') ? (DATA.ny + item.diff) * 22.0462 : (DATA.ldn + item.diff);
    const fob = base + COSTS.port;
    const cif = fob + COSTS.ocean;
    const ddp = (cif + COSTS.inland) * (1 + COSTS.tax);
    const sellKg = (ddp * (1 + margin)) / 1000;
    const profit = (ddp * margin) * ton;

    const fmt = (n) => Math.round(n).toLocaleString('tr-TR');

    document.getElementById(`res_${id}`).innerHTML = `
        <div class="price-item"><span>FOB (Free On Board)</span><div class="amt"><b class="usd">$ ${fmt(fob)}</b><b class="try">₺ ${fmt(fob * DATA.try)}</b></div></div>
        <div class="price-item"><span>CIF (Port of Entry)</span><div class="amt"><b class="usd">$ ${fmt(cif)}</b><b class="try">₺ ${fmt(cif * DATA.try)}</b></div></div>
        <div class="price-item" style="border-bottom:2px solid var(--primary)"><span>DDP (Final Delivery)</span><div class="amt"><b class="usd">$ ${fmt(ddp)}</b><b class="try">₺ ${fmt(ddp * DATA.try)}</b></div></div>
        <div class="price-item" style="background:#f8fafc; padding:12px; border-radius:8px; margin-top:8px;">
            <span style="color:var(--primary); font-weight:800;">SATIŞ KG FİYATI</span>
            <b style="color:var(--primary); font-size:18px;">$ ${sellKg.toFixed(2)} / ₺ ${(sellKg * DATA.try).toFixed(2)}</b>
        </div>
    `;
    document.getElementById(`prof_${id}`).innerText = `$ ${fmt(profit)}`;
}

function calcAll() { ITEMS.forEach(i => calc(i.id)); }

function openPdf(id) {
    const client = prompt("Müşteri Ünvanı:");
    if(!client) return;

    const item = ITEMS.find(x => x.id === id);
    const ton = document.getElementById(`t_${id}`).value;
    const margin = (parseFloat(document.getElementById(`k_${id}`).value) || 0) / 100;
    const base = (item.type === 'NY') ? (DATA.ny + item.diff) * 22.0462 : (DATA.ldn + item.diff);
    const ddp = (base + COSTS.port + COSTS.ocean + COSTS.inland) * (1 + COSTS.tax);
    const sellKg = (ddp * (1 + margin)) / 1000;

    const html = `
        <div style="padding:60px; color:#0f172a; background:#fff; font-family:sans-serif;">
            <div style="display:flex; justify-content:space-between; border-bottom:5px solid #0f172a; padding-bottom:20px; margin-bottom:40px;">
                <div>
                    <h1 style="margin:0; font-size:35px; color:#0f172a;">ASC CAFÉ GLOBAL</h1>
                    <p style="margin:5px 0; color:#475569; font-weight:bold; letter-spacing:1px;">100% BRAZIL COFFEE ORIGIN</p>
                </div>
                <div style="text-align:right; font-size:11px; line-height:1.8;">
                    <b>Ref:</b> ASC-BR-${Math.floor(Date.now()/10000)}<br>
                    <b>Tarih:</b> ${new Date().toLocaleDateString('tr-TR')}<br>
                    <b>Brasilia DF Ofisi:</b> +55 19 981 55 29 42
                </div>
            </div>

            <h2 style="text-align:center; background:#0f172a; color:white; padding:12px; border-radius:4px; font-size:18px;">OFFICIAL QUOTATION / RESMİ TEKLİF</h2>
            
            <div style="margin:30px 0; border:1px solid #e2e8f0; padding:25px; border-radius:10px;">
                <p><b>ALICI (BUYER):</b> ${client.toUpperCase()}</p>
                <p><b>ÜRÜN (PRODUCT):</b> ${item.name}</p>
                <p><b>MENŞEİ (ORIGIN):</b> BRAZIL (Brezilya)</p>
                <p><b>TESLİMAT ŞEKLİ:</b> DDP (Tüm Vergiler Ödenmiş)</p>
            </div>

            <table style="width:100%; border-collapse:collapse; margin:40px 0;">
                <thead>
                    <tr style="background:#f1f5f9; border-bottom:2px solid #0f172a;">
                        <th style="padding:15px; text-align:left;">AÇIKLAMA</th>
                        <th style="padding:15px; text-align:center;">MİKTAR (MT)</th>
                        <th style="padding:15px; text-align:center;">BİRİM (KG/DDP)</th>
                        <th style="padding:15px; text-align:right;">TOPLAM TUTAR</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td style="padding:20px; border-bottom:1px solid #e2e8f0;">${item.name} Green Coffee</td>
                        <td style="padding:20px; border-bottom:1px solid #e2e8f0; text-align:center;">${ton} MT</td>
                        <td style="padding:20px; border-bottom:1px solid #e2e8f0; text-align:center; font-weight:bold;">$ ${sellKg.toFixed(2)}</td>
                        <td style="padding:20px; border-bottom:1px solid #e2e8f0; text-align:right; font-weight:bold; font-size:18px;">$ ${Math.round(sellKg * ton * 1000).toLocaleString('tr-TR')}</td>
                    </tr>
                </tbody>
            </table>

            <div style="background:#f8fafc; padding:25px; border-radius:10px; font-size:11px; line-height:1.6; border-left:5px solid #0f172a;">
                <h4 style="margin:0 0 10px 0;">HUKUKİ MADDELER & INCOTERMS</h4>
                <b>FOB:</b> Satıcı malları gemiye yüklemekle yükümlüdür. (Seller's duty ends at vessel loading).<br>
                <b>CIF:</b> Nakliye ve sigorta satıcı tarafından karşılanır. (Freight & Insurance included to port).<br>
                <b>DDP:</b> Kapı teslim, gümrük ve vergiler satıcıya aittir. (Duties paid, door-to-door delivery).<br>
                <b>VALIDITY:</b> Teklif, borsa hareketleri nedeniyle 24 saat geçerlidir. (Valid for 24H).<br>
                <b>ARBITRATION:</b> Uyuşmazlıklarda ICC kuralları geçerlidir. (ICC rules for disputes).
            </div>

            <div style="margin-top:100px; display:flex; justify-content:space-between;">
                <div style="width:200px; text-align:center; border-top:1px solid #0f172a; padding-top:10px; font-size:12px;">Buyer Signature / İmza</div>
                <div style="width:200px; text-align:center; border-top:1px solid #0f172a; padding-top:10px; font-size:12px;">ASC CAFÉ Global Operations</div>
            </div>
        </div>
    `;

    document.getElementById('pdf-content').innerHTML = html;
    document.getElementById('pdf-modal').style.display = 'block';

    document.getElementById('confirm-pdf').onclick = () => {
        const opt = {
            margin: 0,
            filename: `ASC_BRAZIL_${client.replace(/\s+/g, '_')}.pdf`,
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { scale: 3 },
            jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(document.getElementById('pdf-content')).save().then(closePdf);
    };
}

function closePdf() { document.getElementById('pdf-modal').style.display = 'none'; }

window.onload = init;
</script>
</body>
</html>
