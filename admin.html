<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>MB Journal | Süper Yönetim Merkezi</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F8F6F2; --ink: #1A1A1A; --accent: #B08D57; --white: #FFFFFF; }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; display: flex; justify-content: center; padding: 40px; color: var(--ink); }
        .admin-container { width: 100%; max-width: 700px; background: var(--white); padding: 40px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        h2 { font-family: 'Bodoni Moda', serif; text-align: center; margin-bottom: 30px; }
        
        .tabs { display: flex; gap: 15px; margin-bottom: 25px; border-bottom: 1px solid #eee; }
        .tab-btn { padding: 12px 20px; border: none; background: none; cursor: pointer; font-weight: 600; color: #999; border-bottom: 2px solid transparent; transition: 0.3s; }
        .tab-btn.active { color: var(--ink); border-bottom-color: var(--ink); background: #f9f9f9; border-radius: 10px 10px 0 0; }
        
        .form-section { display: none; animation: fadeIn 0.4s; }
        .form-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        label { display: block; margin: 15px 0 5px; font-weight: 600; font-size: 0.85rem; color: var(--accent); }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; outline: none; font-family: inherit; box-sizing: border-box; }
        textarea { resize: vertical; min-height: 200px; line-height: 1.6; }
        
        button { width: 100%; padding: 16px; background: var(--ink); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        button:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .status { margin-top: 20px; text-align: center; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="admin-container">
    <h2>MB Journal Kumanda Merkezi</h2>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('article-sec', this)">Yazı Yayınla</button>
        <button class="tab-btn" onclick="showTab('author-sec', this)">Yazar & Profil</button>
        <button class="tab-btn" onclick="showTab('cat-sec', this)">Kategoriler</button>
    </div>

    <div id="article-sec" class="form-section active">
        <label>Kategori</label>
        <select id="category-select">
            </select>
        
        <label>Kapak Görseli (URL)</label>
        <input type="text" id="img-url" placeholder="Görsel linkini yapıştırın...">
        
        <label>Yazı Başlığı (Türkçe)</label>
        <input type="text" id="tr-title" placeholder="Başlık girin...">
        
        <label>Makale İçeriği (Yazarın Yazacağı Ana Alan)</label>
        <textarea id="tr-body" placeholder="Hikayenizi buraya yazın. Satır başları için Enter kullanabilirsiniz..."></textarea>
        
        <button onclick="handleSave('article')">MAKALE YAYINLA & ÇEVİR</button>
    </div>

    <div id="author-sec" class="form-section">
        <label>Yazar Tam Adı</label>
        <input type="text" id="author-name" placeholder="Örn: Ahmet Çınarbaş">
        
        <label>Uzmanlık / Ünvan</label>
        <input type="text" id="author-bio" placeholder="Örn: Kültürel Arşivci">
        
        <label>Profil Fotoğrafı URL</label>
        <input type="text" id="author-img" placeholder="Fotoğraf linkini buraya koyun...">
        
        <button onclick="handleSave('settings')" style="background:var(--accent)">PROFİLİ GÜNCELLE</button>
    </div>

    <div id="cat-sec" class="form-section">
        <label>Yeni Kategori Adı (Türkçe)</label>
        <input type="text" id="new-cat-tr" placeholder="Örn: SİNEMA">
        
        <label>Portekizce Karşılığı</label>
        <input type="text" id="new-cat-pt" placeholder="Örn: CINEMA">
        
        <button onclick="handleSave('category')" style="background:#444">YENİ KATEGORİYİ LİSTEYE EKLE</button>
    </div>

    <div id="status" class="status"></div>
</div>

<script>
    // GitHub Token Gömüldü
    const GH_TOKEN = "ghp_Ck9rQJbrJ6Pkkz10SRjFcmqnp433Dh2xuYDY";
    const REPO_URL = 'https://api.github.com/repos/asalimc/47/contents/articles.json';

    let journalData = [];

    async function loadData() {
        try {
            const res = await fetch(REPO_URL, { headers: { 'Authorization': `token ${GH_TOKEN}` } });
            const data = await res.json();
            journalData = JSON.parse(decodeURIComponent(escape(atob(data.content))));
            renderCategories();
            fillAuthor();
        } catch (e) { console.error("Veri çekilemedi."); }
    }

    function renderCategories() {
        const select = document.getElementById('category-select');
        const meta = journalData.find(i => i.type === "metadata");
        const cats = meta?.categories || [
            {tr: "MAGAZİN", pt: "CELEBRIDADE"},
            {tr: "GASTRONOMİ", pt: "SABOR"},
            {tr: "ZANAAT", pt: "ARTESANATO"}
        ];
        select.innerHTML = cats.map(c => `<option value="${c.tr} ● ${c.pt}">${c.tr} ● ${c.pt}</option>`).join('');
    }

    function fillAuthor() {
        const meta = journalData.find(i => i.type === "metadata");
        if(meta?.author) {
            document.getElementById('author-name').value = meta.author.name;
            document.getElementById('author-bio').value = meta.author.bio;
            document.getElementById('author-img').value = meta.author.img;
        }
    }

    function showTab(id, btn) {
        document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    async function translateText(text) {
        try {
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=tr|pt`);
            const data = await res.json();
            return data.responseData.translatedText;
        } catch { return text; }
    }

    async function handleSave(mode) {
        const status = document.getElementById('status');
        status.style.color = "orange";
        status.innerText = "GitHub güncelleniyor...";

        try {
            const getFile = await fetch(REPO_URL, { headers: { 'Authorization': `token ${GH_TOKEN}` } });
            const fileData = await getFile.json();
            let content = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));

            if(mode === 'article') {
                const trT = document.getElementById('tr-title').value;
                const trB = document.getElementById('tr-body').value;
                const ptT = await translateText(trT);
                const ptB = await translateText(trB); // Makale içeriğini de çevirir

                content.unshift({
                    id: Date.now(),
                    type: "post",
                    category: document.getElementById('category-select').value,
                    image: document.getElementById('img-url').value,
                    tr: { title: trT, body: trB },
                    pt: { title: ptT, body: ptB },
                    date: new Date().toLocaleDateString('tr-TR'),
                    author: document.getElementById('author-name').value || "Ahmet Çınarbaş"
                });
            } else if(mode === 'settings') {
                let mIdx = content.findIndex(i => i.type === "metadata");
                if(mIdx === -1) { content.push({ type: "metadata", categories: [], author: {} }); mIdx = content.length -1; }
                content[mIdx].author = {
                    name: document.getElementById('author-name').value,
                    bio: document.getElementById('author-bio').value,
                    img: document.getElementById('author-img').value
                };
            } else if(mode === 'category') {
                let mIdx = content.findIndex(i => i.type === "metadata");
                if(mIdx === -1) { content.push({ type: "metadata", categories: [], author: {} }); mIdx = content.length -1; }
                if(!content[mIdx].categories) content[mIdx].categories = [];
                content[mIdx].categories.push({
                    tr: document.getElementById('new-cat-tr').value.toUpperCase(),
                    pt: document.getElementById('new-cat-pt').value.toUpperCase()
                });
            }

            const updated = btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2))));
            const res = await fetch(REPO_URL, {
                method: 'PUT',
                headers: { 'Authorization': `token ${GH_TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: "Journal Update", content: updated, sha: fileData.sha })
            });

            if(res.ok) {
                status.style.color = "green";
                status.innerText = "YAYINLANDI! Sayfa yenileniyor...";
                setTimeout(() => location.reload(), 3000);
            }
        } catch (e) { 
            status.style.color = "red";
            status.innerText = "Bağlantı hatası!"; 
        }
    }

    loadData();
</script>
</body>
</html>
