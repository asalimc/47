<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSP Portal | Yönetim Merkezi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#0b1120] text-slate-300">

    <div class="flex min-h-screen">
        <aside class="w-64 bg-[#111827] border-r border-slate-800 hidden lg:block">
            <div class="p-6">
                <h1 class="text-xl font-bold text-blue-500">MSP <span class="text-white">PORTAL</span></h1>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest">Mardin - Sao Paulo</p>
            </div>
            <nav class="px-4 space-y-1">
                <a href="#" class="flex items-center space-x-3 p-3 bg-blue-600/10 text-blue-400 rounded-lg"><i class="fas fa-home"></i> <span>Panel</span></a>
                <a href="#" class="flex items-center space-x-3 p-3 hover:bg-slate-800 rounded-lg transition"><i class="fas fa-pen-nib"></i> <span>Yazarlar</span></a>
                <a href="#" class="flex items-center space-x-3 p-3 hover:bg-slate-800 rounded-lg transition"><i class="fas fa-ad"></i> <span>Reklam Yönetimi</span></a>
            </nav>
        </aside>

        <main class="flex-1 p-4 lg:p-8">
            <div class="max-w-5xl mx-auto space-y-10">
                
                <section class="bg-[#1e293b] p-6 rounded-2xl border border-slate-700 shadow-2xl">
                    <h2 class="text-xl font-bold mb-6 text-white flex items-center"><i class="fas fa-plus-circle mr-2 text-green-500"></i> Yeni Haber Yayınla</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-4">
                            <input type="text" placeholder="Haber Başlığı" class="w-full bg-[#0f172a] border border-slate-700 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500">
                            <select class="w-full bg-[#0f172a] border border-slate-700 rounded-xl p-3 outline-none">
                                <option>Mardin Gündem</option>
                                <option>Sao Paulo Ekonomi</option>
                                <option>Kültür Köprüsü</option>
                            </select>
                            <textarea placeholder="Haber İçeriği..." rows="4" class="w-full bg-[#0f172a] border border-slate-700 rounded-xl p-3 outline-none"></textarea>
                        </div>
                        <div class="border-2 border-dashed border-slate-700 rounded-xl p-6 flex flex-col items-center justify-center bg-[#0f172a] hover:border-blue-500 transition cursor-pointer">
                            <i class="fas fa-cloud-upload-alt text-4xl text-slate-500 mb-2"></i>
                            <p class="text-sm font-medium">Haber Fotoğrafı Seç</p>
                            <input type="file" class="mt-4 text-xs text-slate-400">
                        </div>
                    </div>
                    <button class="mt-6 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition">YAYINLA</button>
                </section>

                <section class="bg-[#1e293b] p-6 rounded-2xl border border-slate-700">
                    <h2 class="text-xl font-bold mb-6 text-white"><i class="fas fa-bullhorn mr-2 text-yellow-500"></i> Reklam Görseli Güncelle</h2>
                    <div class="flex flex-col md:flex-row gap-4 items-center">
                        <input type="file" class="flex-1 bg-[#0f172a] border border-slate-700 p-2 rounded-lg text-xs">
                        <input type="text" placeholder="Reklam Linki" class="flex-1 bg-[#0f172a] border border-slate-700 p-2 rounded-lg text-sm">
                        <button class="bg-yellow-600 px-6 py-2 rounded-lg text-white font-bold text-sm">GÜNCELLE</button>
                    </div>
                </section>
            </div>
        </main>
    </div>
</body>
</html>
