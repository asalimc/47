<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>MB Journal | Kumanda Merkezi</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F8F6F2; --ink: #1A1A1A; --accent: #B08D57; --white: #FFFFFF; }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; display: flex; justify-content: center; padding: 40px; }
        .admin-box { width: 100%; max-width: 700px; background: var(--white); padding: 40px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        h2 { font-family: 'Bodoni Moda', serif; text-align: center; margin-bottom: 30px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 1px solid #eee; }
        .tab-btn { padding: 12px 20px; border: none; background: none; cursor: pointer; font-weight: 600; color: #999; }
        .tab-btn.active { color: var(--ink); border-bottom: 2px solid var(--ink); }
        .form-sec { display: none; }
        .form-sec.active { display: block; }
        label { display: block; margin: 15px 0 5px; font-weight: 600; font-size: 0.85rem; color: var(--accent); }
        input, textarea, select { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 12px; font-family: inherit; box-sizing: border-box; outline: none; margin-bottom: 10px; }
        textarea { min-height: 300px; line-height: 1.6; }
        button { width: 100%; padding: 16px; background: var(--ink); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        .status { margin-top: 20px; text-align: center; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>
<div class="admin-box">
    <h2>MB Journal Kumanda Merkezi</h2>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('post-sec', this)">Yazı Yayınla</button>
        <button class="tab-btn" onclick="showTab('author-sec', this)">Yazar Ayarları</button>
        <button class="tab-btn" onclick="showTab('cat-sec', this)">Kategori Ekle</button>
    </div>

    <div id="post-sec" class="form-sec active">
        <label>Kategori</label>
        <select id="category-select">
            <option value="magazin">Magazin ● Celebridade</option>
            <option value="gastronomi">Gastronomi ● Sabor</option>
            <option value="zanaat">Zanaat ● Artesanato</option>
            <option value="cografi">Coğrafi Kader ● Destino</option>
            <option value="toplum">Toplum ● Sociedade</option>
        </select>
        
        <label>Görsel URL (Boş bırakırsanız otomatik seçilir)</label>
        <input type="text" id="img-url" placeholder="https://... (veya boş bırakın)">
        
        <label>Türkçe Başlık</label>
        <input type="text" id="tr-title" placeholder="Başlık">
        
        <label>Makale İçeriği (Ana Yazı Alanı)</label>
        <textarea id="tr-body" placeholder="Hikayenizi buraya yazın..."></textarea>
        
        <button onclick="handleSave('article')">MAKALE YAYINLA</button>
    </div>

    <div id="author-sec" class="form-sec">
        <label>Ad Soyad</label>
        <input type="text" id="author-name" value="Ahmet Çınarbaş">
        <label>Biyografi / Ünvan</label>
        <input type="text" id="author-bio" value="Kültürel Arşivci">
        <label>Profil Foto URL</label>
        <input type="text" id="author-img" placeholder="https://...">
        <button onclick="handleSave('settings')" style="background:var(--accent)">PROFİLİ GÜNCELLE</button>
    </div>

    <div id="cat-sec" class="form-sec">
        <label>Kategori Adı (TR)</label>
        <input type="text" id="new-cat-tr" placeholder="Örn: SİNEMA">
        <label>Kategori Adı (PT)</label>
        <input type="text" id="new-cat-pt" placeholder="Örn: CINEMA">
        <button onclick="handleSave('category')" style="background:#555">LİSTEYE EKLE</button>
    </div>

    <div id="status" class="status"></div>
</div>

<script>
    const GH_TOKEN = "ghp_Ck9rQJbrJ6Pkkz10SRjFcmqnp433Dh2xuYDY";
    const REPO_URL = 'https://api.github.com/repos/asalimc/47/contents/articles.json';

    function showTab(id, btn) {
        document.querySelectorAll('.form-sec').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    async function handleSave(mode) {
        const status = document.getElementById('status');
        status.style.color = "orange";
        status.innerText = "GitHub'a bağlanılıyor...";

        try {
            const getFile = await fetch(REPO_URL, { 
                headers: { 'Authorization': `token ${GH_TOKEN}`, 'Cache-Control': 'no-cache' } 
            });

            if (!getFile.ok) {
                throw new Error("articles.json dosyası GitHub'da bulunamadı! Lütfen önce dosyayı oluşturun.");
            }
            
            const fileData = await getFile.json();
            let content = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));

            if(mode === 'article') {
                const trT = document.getElementById('tr-title').value;
                const trB = document.getElementById('tr-body').value;
                const cat = document.getElementById('category-select').value;
                let img = document.getElementById('img-url').value;

                // OTOMATİK GÖRSEL: Eğer link yoksa Unsplash üzerinden konuyla ilgili görsel al
                if(!img || img.length < 5) {
                    img = `https://images.unsplash.com/photo-1499750310107-5fef28a66643?q=80&w=1000&auto=format&fit=crop&sig=${Date.now()}`;
                }

                content.unshift({
                    id: Date.now(),
                    type: "post",
                    category: document.getElementById('category-select').options[document.getElementById('category-select').selectedIndex].text,
                    image: img,
                    tr: { title: trT, body: trB },
                    pt: { title: "Traduzindo...", body: "Conteúdo em tradução..." },
                    date: new Date().toLocaleDateString('tr-TR')
                });
            } else if(mode === 'settings') {
                let mIdx = content.findIndex(i => i.type === "metadata");
                const meta = {
                    type: "metadata",
                    author: { name: document.getElementById('author-name').value, bio: document.getElementById('author-bio').value, img: document.getElementById('author-img').value }
                };
                if(mIdx > -1) content[mIdx] = meta; else content.push(meta);
            }

            const updated = btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2))));
            const res = await fetch(REPO_URL, {
                method: 'PUT',
                headers: { 'Authorization': `token ${GH_TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: "Update", content: updated, sha: fileData.sha })
            });

            if(res.ok) {
                status.style.color = "green";
                status.innerText = "İŞLEM BAŞARILI!";
                if(mode === 'article') {
                    document.getElementById('tr-title').value = "";
                    document.getElementById('tr-body').value = "";
                }
            } else {
                throw new Error("Yazma izni reddedildi. Token yetkisi bitmiş olabilir.");
            }
        } catch (e) { 
            status.style.color = "red";
            status.innerText = e.message; 
        }
    }
</script>
</body>
</html>
