<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>MB Journal | Kumanda Merkezi</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F8F6F2; --ink: #1A1A1A; --accent: #B08D57; --white: #FFFFFF; }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; display: flex; justify-content: center; padding: 40px; color: var(--ink); }
        .admin-container { width: 100%; max-width: 700px; background: var(--white); padding: 40px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        h2 { font-family: 'Bodoni Moda', serif; text-align: center; margin-bottom: 30px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 1px solid #eee; }
        .tab-btn { padding: 12px 20px; border: none; background: none; cursor: pointer; font-weight: 600; color: #999; transition: 0.3s; }
        .tab-btn.active { color: var(--ink); border-bottom: 2px solid var(--ink); }
        .form-section { display: none; }
        .form-section.active { display: block; }
        label { display: block; margin: 15px 0 5px; font-weight: 600; font-size: 0.85rem; color: var(--accent); }
        input, textarea, select { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 12px; outline: none; font-family: inherit; box-sizing: border-box; }
        textarea { min-height: 250px; line-height: 1.6; }
        button { width: 100%; padding: 16px; background: var(--ink); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        .status { margin-top: 20px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="admin-container">
    <h2>MB Journal Kumanda Merkezi</h2>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('article-sec', this)">Yazı Yayınla</button>
        <button class="tab-btn" onclick="showTab('author-sec', this)">Yazar & Profil</button>
        <button class="tab-btn" onclick="showTab('cat-sec', this)">Kategori Ekle</button>
    </div>

    <div id="article-sec" class="form-section active">
        <label>Kategori Seç</label>
        <select id="category-select">
            <option value="Magazin ● Celebridade">Magazin ● Celebridade</option>
            <option value="Gastronomi ● Sabor">Gastronomi ● Sabor</option>
            <option value="Zanaat ● Artesanato">Zanaat ● Artesanato</option>
            <option value="Coğrafi Kader ● Destino">Coğrafi Kader ● Destino</option>
            <option value="Toplum ● Sociedade">Toplum ● Sociedade</option>
        </select>
        
        <label>Kapak Görseli (URL)</label>
        <input type="text" id="img-url" placeholder="Görsel linki...">
        
        <label>Türkçe Başlık</label>
        <input type="text" id="tr-title" placeholder="Yazı başlığı...">
        
        <label>Türkçe İçerik (Makale Alanı)</label>
        <textarea id="tr-body" placeholder="Hikayenizi buraya yazın..."></textarea>
        
        <button onclick="handleSave('article')">YAYINLA & OTOMATİK ÇEVİR</button>
    </div>

    <div id="author-sec" class="form-section">
        <label>Yazar Adı</label>
        <input type="text" id="author-name" placeholder="Ahmet Çınarbaş">
        <label>Ünvan</label>
        <input type="text" id="author-bio" placeholder="Kültürel Arşivci">
        <label>Profil Fotoğrafı URL</label>
        <input type="text" id="author-img" placeholder="Fotoğraf linki">
        <button onclick="handleSave('settings')" style="background:var(--accent)">PROFİLİ GÜNCELLE</button>
    </div>

    <div id="cat-sec" class="form-section">
        <label>Yeni Kategori (Türkçe)</label>
        <input type="text" id="new-cat-tr" placeholder="Örn: SİNEMA">
        <label>Yeni Kategori (Portekizce)</label>
        <input type="text" id="new-cat-pt" placeholder="Örn: CINEMA">
        <button onclick="handleSave('category')" style="background:#555">LİSTEYE EKLE</button>
    </div>

    <div id="status" class="status"></div>
</div>

<script>
    const GH_TOKEN = "ghp_Ck9rQJbrJ6Pkkz10SRjFcmqnp433Dh2xuYDY";
    const REPO_URL = 'https://api.github.com/repos/asalimc/47/contents/articles.json';

    function showTab(id, btn) {
        document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    async function handleSave(mode) {
        const status = document.getElementById('status');
        status.style.color = "orange";
        status.innerText = "İşleniyor...";

        try {
            const getFile = await fetch(REPO_URL, { headers: { 'Authorization': `token ${GH_TOKEN}` } });
            const fileData = await getFile.json();
            let content = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));

            if(mode === 'article') {
                const trT = document.getElementById('tr-title').value;
                const trB = document.getElementById('tr-body').value;
                const tRes = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(trT)}&langpair=tr|pt`);
                const tData = await tRes.json();
                
                content.unshift({
                    id: Date.now(),
                    type: "post",
                    category: document.getElementById('category-select').value,
                    image: document.getElementById('img-url').value,
                    tr: { title: trT, body: trB },
                    pt: { title: tData.responseData.translatedText, body: "Traduzindo..." },
                    date: new Date().toLocaleDateString('tr-TR'),
                    author: document.getElementById('author-name').value || "Ahmet Çınarbaş"
                });
            } else if(mode === 'settings') {
                let mIdx = content.findIndex(i => i.type === "metadata");
                if(mIdx === -1) { content.push({ type: "metadata", author: {} }); mIdx = content.length -1; }
                content[mIdx].author = {
                    name: document.getElementById('author-name').value,
                    bio: document.getElementById('author-bio').value,
                    img: document.getElementById('author-img').value
                };
            } else if(mode === 'category') {
                const newCat = `${document.getElementById('new-cat-tr').value} ● ${document.getElementById('new-cat-pt').value}`;
                const sel = document.getElementById('category-select');
                const opt = document.createElement('option');
                opt.value = newCat; opt.text = newCat;
                sel.add(opt);
            }

            const updated = btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2))));
            const res = await fetch(REPO_URL, {
                method: 'PUT',
                headers: { 'Authorization': `token ${GH_TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: "Journal Update", content: updated, sha: fileData.sha })
            });

            if(res.ok) {
                status.style.color = "green";
                status.innerText = "BAŞARILI!";
                setTimeout(() => { status.innerText = ""; }, 3000);
            }
        } catch (e) { status.innerText = "Hata!"; }
    }
</script>
</body>
</html>
