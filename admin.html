<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>MB Journal | Kumanda Merkezi</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F8F6F2; --ink: #1A1A1A; --accent: #B08D57; --white: #FFFFFF; }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; display: flex; justify-content: center; padding: 40px; }
        .admin-box { width: 100%; max-width: 650px; background: var(--white); padding: 40px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        h2 { font-family: 'Bodoni Moda', serif; text-align: center; margin-bottom: 30px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 1px solid #eee; }
        .tab-btn { padding: 12px 20px; border: none; background: none; cursor: pointer; font-weight: 600; color: #999; }
        .tab-btn.active { color: var(--ink); border-bottom: 2px solid var(--ink); }
        .form-sec { display: none; }
        .form-sec.active { display: block; }
        input, textarea, select { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 12px; font-family: inherit; box-sizing: border-box; outline: none; }
        textarea { min-height: 250px; }
        button { width: 100%; padding: 16px; background: var(--ink); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .status { margin-top: 20px; text-align: center; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>
<div class="admin-box">
    <h2>MB Journal Kumanda Merkezi</h2>
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('post-sec', this)">Yazı Yayınla</button>
        <button class="tab-btn" onclick="showTab('author-sec', this)">Yazar & Profil</button>
    </div>

    <div id="post-sec" class="form-sec active">
        <label style="font-size: 0.8rem; font-weight: 600; color: var(--accent);">Kategori Seç</label>
        <select id="category-select">
            <option>Magazin ● Celebridade</option>
            <option>Gastronomi ● Sabor</option>
            <option>Zanaat ● Artesanato</option>
            <option>Coğrafi Kader ● Destino</option>
            <option>Toplum ● Sociedade</option>
        </select>
        <input type="text" id="img-url" placeholder="Kapak Görseli URL (Örn: https://...)" value="">
        <input type="text" id="tr-title" placeholder="Türkçe Başlık">
        <textarea id="tr-body" placeholder="Türkçe İçerik (Makale Alanı)..."></textarea>
        <button onclick="handleSave('article')">YAYINLA & OTOMATİK ÇEVİR</button>
    </div>

    <div id="author-sec" class="form-sec">
        <input type="text" id="author-name" placeholder="Yazar Adı" value="Ahmet Çınarbaş">
        <input type="text" id="author-bio" placeholder="Ünvan" value="Kültürel Arşivci">
        <input type="text" id="author-img" placeholder="Yazar Fotoğraf URL">
        <button onclick="handleSave('settings')" style="background:var(--accent)">AYARLARI GÜNCELLE</button>
    </div>

    <div id="status" class="status"></div>
</div>

<script>
    // TOKEN BURAYA
    const GH_TOKEN = "ghp_Ck9rQJbrJ6Pkkz10SRjFcmqnp433Dh2xuYDY"; 
    const REPO_URL = 'https://api.github.com/repos/asalimc/47/contents/articles.json';

    function showTab(id, btn) {
        document.querySelectorAll('.form-sec').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    async function handleSave(mode) {
        const status = document.getElementById('status');
        status.style.color = "orange";
        status.innerText = "Bağlanıyor...";

        try {
            const getFile = await fetch(REPO_URL, { 
                headers: { 'Authorization': `token ${GH_TOKEN}`, 'Cache-Control': 'no-cache' } 
            });
            
            if (!getFile.ok) throw new Error("Dosya okunamadı. articles.json mevcut mu?");
            
            const fileData = await getFile.json();
            let content = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));

            if(mode === 'article') {
                const trT = document.getElementById('tr-title').value;
                const trB = document.getElementById('tr-body').value;
                
                status.innerText = "Çeviri yapılıyor...";
                const tRes = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(trT)}&langpair=tr|pt`);
                const tData = await tRes.json();

                content.unshift({
                    id: Date.now(),
                    type: "post",
                    category: document.getElementById('category-select').value,
                    image: document.getElementById('img-url').value,
                    tr: { title: trT, body: trB },
                    pt: { title: tData.responseData.translatedText, body: "Traduzindo..." },
                    date: new Date().toLocaleDateString('tr-TR'),
                    author: document.getElementById('author-name').value
                });
            } else if(mode === 'settings') {
                let mIdx = content.findIndex(i => i.type === "metadata");
                const meta = {
                    type: "metadata",
                    author: { 
                        name: document.getElementById('author-name').value, 
                        bio: document.getElementById('author-bio').value, 
                        img: document.getElementById('author-img').value 
                    }
                };
                if(mIdx > -1) content[mIdx] = meta; else content.push(meta);
            }

            status.innerText = "GitHub'a gönderiliyor...";
            const updated = btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2))));
            const res = await fetch(REPO_URL, {
                method: 'PUT',
                headers: { 'Authorization': `token ${GH_TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: "Journal Update", content: updated, sha: fileData.sha })
            });

            if(res.ok) {
                status.style.color = "green";
                status.innerText = "BAŞARIYLA YAYINLANDI!";
                setTimeout(() => { status.innerText = ""; }, 3000);
            } else {
                const errData = await res.json();
                throw new Error(errData.message);
            }
        } catch (e) { 
            status.style.color = "red";
            status.innerText = "Hata: " + e.message; 
            console.error(e);
        }
    }
</script>
</body>
</html>
