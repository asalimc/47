<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>MB Journal | Kumanda Merkezi</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F8F6F2; --ink: #1A1A1A; --accent: #B08D57; --white: #FFFFFF; }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; display: flex; justify-content: center; padding: 40px; }
        .admin-box { width: 100%; max-width: 700px; background: var(--white); padding: 40px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        h2 { font-family: 'Bodoni Moda', serif; text-align: center; margin-bottom: 30px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 1px solid #eee; }
        .tab-btn { padding: 12px 20px; border: none; background: none; cursor: pointer; font-weight: 600; color: #999; transition: 0.3s; }
        .tab-btn.active { color: var(--ink); border-bottom: 2px solid var(--ink); }
        .form-sec { display: none; }
        .form-sec.active { display: block; }
        label { display: block; margin: 15px 0 5px; font-weight: 600; font-size: 0.85rem; color: var(--accent); }
        input, textarea, select { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 12px; font-family: inherit; box-sizing: border-box; outline: none; }
        textarea { min-height: 280px; line-height: 1.6; }
        button { width: 100%; padding: 16px; background: var(--ink); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .status { margin-top: 20px; text-align: center; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>
<div class="admin-box">
    <h2>MB Journal Kumanda Merkezi</h2>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('post-sec', this)">Yazı Yayınla</button>
        <button class="tab-btn" onclick="showTab('author-sec', this)">Yazar & Profil</button>
        <button class="tab-btn" onclick="showTab('cat-sec', this)">Kategoriler</button>
    </div>

    <div id="post-sec" class="form-sec active">
        <label>Kategori Seç</label>
        <select id="category-select">
            <option value="Magazin">Magazin ● Celebridade</option>
            <option value="Gastronomi">Gastronomi ● Sabor</option>
            <option value="Zanaat">Zanaat ● Artesanato</option>
            <option value="Cografi">Coğrafi Kader ● Destino</option>
            <option value="Toplum">Toplum ● Sociedade</option>
        </select>
        
        <label>Kapak Görseli (Boş bırakırsanız internetten otomatik seçilir)</label>
        <input type="text" id="img-url" placeholder="URL yapıştırın veya boş bırakın...">
        
        <label>Türkçe Başlık</label>
        <input type="text" id="tr-title" placeholder="Yazının başlığını girin...">
        
        <label>Makale İçeriği (Yazının Tamamı)</label>
        <textarea id="tr-body" placeholder="Hikayenizi buraya yazın..."></textarea>
        
        <button onclick="handleSave('article')">YAYINLA & OTOMATİK ÇEVİR</button>
    </div>

    <div id="author-sec" class="form-sec">
        <label>Yazar Adı</label>
        <input type="text" id="author-name" value="Ahmet Çınarbaş">
        <label>Ünvan</label>
        <input type="text" id="author-bio" value="Kültürel Arşivci">
        <label>Profil Fotoğrafı URL</label>
        <input type="text" id="author-img" placeholder="https://...">
        <button onclick="handleSave('settings')" style="background:var(--accent)">PROFİLİ GÜNCELLE</button>
    </div>

    <div id="cat-sec" class="form-sec">
        <label>Yeni Kategori Adı (TR)</label>
        <input type="text" id="new-cat-tr" placeholder="Örn: SİNEMA">
        <label>Yeni Kategori Adı (PT)</label>
        <input type="text" id="new-cat-pt" placeholder="Örn: CINEMA">
        <button onclick="handleSave('category')" style="background:#555">LİSTEYE EKLE</button>
    </div>

    <div id="status" class="status"></div>
</div>

<script>
    const GH_TOKEN = "ghp_Ck9rQJbrJ6Pkkz10SRjFcmqnp433Dh2xuYDY";
    const REPO_URL = 'https://api.github.com/repos/asalimc/47/contents/articles.json';

    function showTab(id, btn) {
        document.querySelectorAll('.form-sec').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    async function handleSave(mode) {
        const status = document.getElementById('status');
        status.style.color = "orange";
        status.innerText = "İşlem yapılıyor...";

        try {
            const getFile = await fetch(REPO_URL, { headers: { 'Authorization': `token ${GH_TOKEN}` } });
            const fileData = await getFile.json();
            let content = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));

            if(mode === 'article') {
                const trT = document.getElementById('tr-title').value;
                const trB = document.getElementById('tr-body').value;
                const cat = document.getElementById('category-select').value;
                let finalImg = document.getElementById('img-url').value;

                // OTOMATIK GÖRSEL SEÇİCİ (Boşsa Unsplash'ten kategoriye göre alır)
                if(!finalImg) {
                    finalImg = `https://source.unsplash.com/featured/?${cat},culture,journal`;
                }

                status.innerText = "Çeviri yapılıyor...";
                const tRes = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(trT)}&langpair=tr|pt`);
                const tData = await tRes.json();

                content.unshift({
                    id: Date.now(),
                    type: "post",
                    category: document.getElementById('category-select').value,
                    image: finalImg,
                    tr: { title: trT, body: trB },
                    pt: { title: tData.responseData.translatedText, body: "Traduzindo..." },
                    date: new Date().toLocaleDateString('tr-TR')
                });
            } else if(mode === 'settings' || mode === 'category') {
                let mIdx = content.findIndex(i => i.type === "metadata");
                if(mIdx === -1) { content.push({ type: "metadata", author: {}, categories: [] }); mIdx = content.length -1; }
                
                if(mode === 'settings') {
                    content[mIdx].author = {
                        name: document.getElementById('author-name').value,
                        bio: document.getElementById('author-bio').value,
                        img: document.getElementById('author-img').value
                    };
                } else {
                    const tr = document.getElementById('new-cat-tr').value;
                    const pt = document.getElementById('new-cat-pt').value;
                    const opt = document.createElement('option');
                    opt.value = tr; opt.text = `${tr} ● ${pt}`;
                    document.getElementById('category-select').add(opt);
                    content[mIdx].categories.push({tr, pt});
                }
            }

            const updated = btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2))));
            const res = await fetch(REPO_URL, {
                method: 'PUT',
                headers: { 'Authorization': `token ${GH_TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: "Journal Update", content: updated, sha: fileData.sha })
            });

            if(res.ok) {
                status.style.color = "green";
                status.innerText = "BAŞARIYLA KAYDEDİLDİ!";
                setTimeout(() => { status.innerText = ""; }, 3000);
            }
        } catch (e) { 
            status.style.color = "red";
            status.innerText = "Hata oluştu! Lütfen JSON dosyanızı ve Token'ı kontrol edin."; 
        }
    }
</script>
</body>
</html>
