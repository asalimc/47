<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>MB Journal | Profesyonel Yönetim</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F8F6F2; --ink: #1A1A1A; --accent: #B08D57; --white: #FFFFFF; }
        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; display: flex; justify-content: center; padding: 40px; color: var(--ink); }
        .admin-container { width: 100%; max-width: 650px; background: var(--white); padding: 40px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        h2 { font-family: 'Bodoni Moda', serif; text-align: center; margin-bottom: 30px; }
        .tabs { display: flex; gap: 15px; margin-bottom: 25px; border-bottom: 1px solid #eee; }
        .tab-btn { padding: 10px 15px; border: none; background: none; cursor: pointer; font-weight: 600; color: #999; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--ink); border-bottom-color: var(--ink); }
        .form-section { display: none; }
        .form-section.active { display: block; }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; outline: none; font-family: inherit; }
        button { width: 100%; padding: 15px; background: var(--ink); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .status { margin-top: 20px; text-align: center; font-size: 0.85rem; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<div class="admin-container">
    <h2>Yönetim Merkezi</h2>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('article-sec', this)">Yazı Yayınla</button>
        <button class="tab-btn" onclick="showTab('author-sec', this)">Yazar & Kategori</button>
    </div>

    <div id="article-sec" class="form-section active">
        <select id="category-select">
            <option value="MAGAZİN">Magazin ● Celebridade</option>
            <option value="GASTRONOMİ">Gastronomi ● Sabor</option>
            <option value="ZANAAT">Zanaat ● Artesanato</option>
            <option value="COĞRAFİ KADER">Coğrafi Kader ● Destino</option>
        </select>
        <input type="text" id="img-url" placeholder="Görsel URL">
        <input type="text" id="tr-title" placeholder="Türkçe Başlık">
        <textarea id="tr-body" rows="6" placeholder="Türkçe İçerik..."></textarea>
        <button onclick="handleSave('article')">YAYINLA & ÇEVİR</button>
    </div>

    <div id="author-sec" class="form-section">
        <input type="text" id="author-name" placeholder="Yazar Adı (Ahmet Çınarbaş)">
        <input type="text" id="author-bio" placeholder="Ünvan (Kültürel Arşivci)">
        <input type="text" id="author-img" placeholder="Yazar Fotoğraf URL">
        <div style="height:1px; background:#eee; margin: 20px 0;"></div>
        <input type="text" id="new-cat" placeholder="Yeni Kategori Ekle (Örn: MÜZİK)">
        <button onclick="handleSave('settings')" style="background:var(--accent)">AYARLARI GÜNCELLE</button>
    </div>

    <div id="status" class="status"></div>
</div>

<script>
    const GH_TOKEN = "ghp_Ck9rQJbrJ6Pkkz10SRjFcmqnp433Dh2xuYDY";
    const REPO_URL = 'https://api.github.com/repos/asalimc/47/contents/articles.json';

    function showTab(id, btn) {
        document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    async function translate(text) {
        try {
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=tr|pt`);
            const data = await res.json();
            return data.responseData.translatedText;
        } catch { return text; }
    }

    async function handleSave(mode) {
        const status = document.getElementById('status');
        status.innerText = "İşlem yapılıyor...";

        try {
            const getFile = await fetch(REPO_URL, { headers: { 'Authorization': `token ${GH_TOKEN}` } });
            const fileData = await getFile.json();
            let content = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));

            if(mode === 'article') {
                const trT = document.getElementById('tr-title').value;
                const trB = document.getElementById('tr-body').value;
                const ptT = await translate(trT);
                const ptB = await translate(trB);

                content.unshift({
                    id: Date.now(),
                    type: "post",
                    category: document.getElementById('category-select').value,
                    image: document.getElementById('img-url').value,
                    tr: { title: trT, body: trB },
                    pt: { title: ptT, body: ptB },
                    date: new Date().toLocaleDateString('tr-TR')
                });
            } else {
                // Ayarları güncelle (Eski metadata varsa sil/güncelle)
                content = content.filter(i => i.type !== "metadata");
                content.push({
                    type: "metadata",
                    author: {
                        name: document.getElementById('author-name').value,
                        bio: document.getElementById('author-bio').value,
                        img: document.getElementById('author-img').value
                    },
                    customCat: document.getElementById('new-cat').value
                });
            }

            const updated = btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2))));
            await fetch(REPO_URL, {
                method: 'PUT',
                headers: { 'Authorization': `token ${GH_TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: "Update Journal", content: updated, sha: fileData.sha })
            });

            status.innerText = "BAŞARIYLA KAYDEDİLDİ!";
        } catch (e) { status.innerText = "Hata oluştu!"; }
    }
</script>
</body>
</html>
