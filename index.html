<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MB | Ahmet Çınarbaş Journal - Mardin & Brazil Cultural Bridge</title>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "NewsArticle",
      "headline": "Mardin ve Brezilya Kültür Hattı",
      "author": {
        "@type": "Person",
        "name": "Ahmet Çınarbaş",
        "jobTitle": "Gazeteci & Kültür Arşivci"
      }
    }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,900&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #F8F6F2; --ink: #1A1A1A; --accent: #B08D57; --white: #FFFFFF;
            --ease: cubic-bezier(0.19, 1, 0.22, 1);
        }
        .seo-hidden { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--ink); font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }

        header {
            padding: 30px 6%; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; background: rgba(248, 246, 242, 0.95); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo-box { display: flex; align-items: center; text-decoration: none; color: var(--ink); }
        .logo-m { font-family: 'Bodoni Moda', serif; font-size: 2.2rem; font-weight: 900; background: var(--ink); color: var(--bg); padding: 0 12px; border-radius: 10px; margin-right: 12px; }
        .logo-text { font-family: 'Bodoni Moda', serif; font-size: 1.1rem; font-weight: 900; line-height: 1; }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 6%; }
        .bento { display: flex; flex-direction: column; gap: 40px; }

        .card {
            background: var(--white); border-radius: 45px; padding: 50px;
            transition: var(--ease) 0.6s; cursor: pointer; border: 1px solid rgba(0,0,0,0.03);
            display: flex; flex-direction: column; justify-content: space-between; 
            min-height: 550px; width: 100%; position: relative; overflow: hidden;
        }
        .card:hover { transform: translateY(-8px); box-shadow: 0 40px 80px rgba(0,0,0,0.08); }

        .tr-line { font-family: 'Bodoni Moda', serif; font-size: 3.8rem; line-height: 1.05; margin-bottom: 15px; display: block; font-weight: 900; letter-spacing: -1.5px; }
        .pt-line { font-family: 'Bodoni Moda', serif; font-size: 3.8rem; line-height: 1.05; display: block; font-weight: 900; letter-spacing: -1.5px; }
        .tag-dual { font-size: 0.8rem; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); margin-bottom: 30px; display: block; }

        .reader { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; overflow-y: auto; padding: 120px 8% 120px; }
        .reader-header { text-align: center; margin-bottom: 80px; }
        .reader-grid { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 1fr auto 1fr; gap: 60px; align-items: start; }
        .reader-text { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.6rem; line-height: 1.7; color: #2D2D2D; }
        .divider { width: 3px; background: var(--accent); height: 100%; min-height: 450px; opacity: 0.8; }
        .meta-info { font-size: 0.75rem; font-weight: 800; color: var(--accent); margin-top: 20px; text-transform: uppercase; letter-spacing: 2px; }

        footer { padding: 100px 6% 50px; background: var(--white); border-top: 1px solid #eee; margin-top: 80px; }
        .footer-grid { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 50px; }
        .footer-bottom { max-content: 1200px; margin: 60px auto 0; padding-top: 30px; border-top: 1px solid #f0f0f0; text-align: center; font-size: 0.7rem; font-weight: 800; opacity: 0.4; letter-spacing: 2px; }

        .close-btn { position: fixed; top: 40px; right: 6%; background: var(--ink); color: white; border: none; padding: 18px 40px; border-radius: 50px; font-weight: 800; cursor: pointer; z-index: 2100; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo-box"><div class="logo-m">MB</div><div class="logo-text">MARDIN<br>BRAZIL</div></a>
    </header>

    <main class="container">
        <div class="bento">
            
            <div class="card" style="background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1555939594-58d7cb561ad1?q=80&w=1000') center/cover; color: white;" onclick="openReader('gastronomy')">
                <div>
                    <span class="tag-dual" style="color: white;">GASTRONOMİ ● GASTRONOMIA</span>
                    <span class="tr-line">İçli Köfte & Quibe Karşılaştırması</span>
                    <span class="pt-line">Kibbeh vs Quibe: Encontro de Sabores</span>
                </div>
                <div class="meta-info" style="color: white; opacity: 0.8;">OKUMA SÜRESİ: 3 DK</div>
            </div>

            </div>
    </main>

    <div id="reader-modal" class="reader">
        <button class="close-btn" onclick="closeReader()">KAPAT ● FECHAR</button>
        <div id="reader-content"></div>
    </div>

    <script>
        const contentData = {
            gastronomy: {
                tag: "GASTRONOMİ ARAŞTIRMASI",
                tr: "Mardin'den Rio'ya: İçli Köftenin Evrimi",
                pt: "De Mardin ao Rio: A Evolução do Quibe",
                textTr: "<b>Mardin İçli Köftesi (Irok/Kütülk):</b> Mardin'de bu lezzet bir zanaattır. Dış harcında 'kitel bulguru' ve irmik kullanılır; harcı ise kuzu kıyması, bol kuru soğan ve Mardin'e özgü 'reyhan' ile aromalandırılır. Haşlama (Kütülk) veya kızartma (Irok) olarak sunulur. Mardin'de içine mutlaka kuyruk yağı ve bazen ceviz eklenir.<br><br><b>Brezilya Quibe'si:</b> 19. yüzyılda Lübnan ve Suriyeli göçmenlerle Brezilya'ya ulaşan bu lezzet, yerelleşerek 'Salgado' kültürünün kalbi olmuştur. Brezilya'da genellikle dana eti tercih edilir. En büyük farkı, içine 'nane' (hortelã) eklenmesi ve yanında mutlaka bir dilim limonla servis edilmesidir. Ayrıca Brezilya'da peynirli (catupiry) versiyonları da oldukça popülerdir.",
                textPt: "<b>Kibbeh de Mardin:</b> Em Mardin, esta iguaria é um artesanato. A massa externa usa trigo 'kitel' e sêmola; o recheio é carne de cordeiro com muita cebola e o toque único do 'manjericão seco' (reyhan). Pode ser cozido ou frito. Em Mardin, o uso de gordura de cauda e nozes é essencial.<br><br><b>Quibe Brasileiro:</b> Trazido por imigrantes libaneses no século XIX, tornou-se o coração dos 'Salgados'. No Brasil, prefere-se carne bovina. A principal diferença é a adição de hortelã fresca e o serviço obrigatório com limão. Versões recheadas com queijo catupiry também são ícones brasileiros."
            }
        };

        function openReader(key) {
            const item = contentData[key];
            const content = document.getElementById('reader-content');
            content.innerHTML = `
                <div class="reader-header"><span class="tag-dual">${item.tag}</span><h1 class="tr-line">${item.tr}</h1><h2 class="pt-line">${item.pt}</h2></div>
                <div class="reader-grid"><div class="reader-text">${item.textTr}</div><div class="divider"></div><div class="reader-text">${item.textPt}</div></div>`;
            document.getElementById('reader-modal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }
        function closeReader() { document.getElementById('reader-modal').style.display = 'none'; document.body.style.overflow = 'auto'; }
    </script>
</body>
</html>
