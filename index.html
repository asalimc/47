<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MB | Ahmet Çınarbaş Journal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,900;1,6..96,900&family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #F8F6F2; 
            --ink: #1A1A1A; 
            --accent: #B08D57; 
            --white: #FFFFFF;
            --ease: cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--ink); font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }

        /* HEADER */
        header {
            padding: 30px 6%; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; background: rgba(248, 246, 242, 0.95); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo-box { display: flex; align-items: center; text-decoration: none; color: var(--ink); }
        .logo-m { 
            font-family: 'Bodoni Moda', serif; font-size: 2.2rem; font-weight: 900; 
            background: var(--ink); color: var(--bg); padding: 0 12px; border-radius: 10px; margin-right: 12px;
        }
        .logo-text { font-family: 'Bodoni Moda', serif; font-size: 1.1rem; font-weight: 900; line-height: 1; }

        /* NAV FILTERS */
        .nav-filters button {
            background: none; border: 1px solid rgba(0,0,0,0.1); color: var(--ink);
            padding: 8px 18px; border-radius: 50px; font-size: 0.7rem; font-weight: 800;
            cursor: pointer; margin-left: 10px; transition: 0.3s;
        }
        .nav-filters button.active { background: var(--ink); color: var(--bg); }

        /* BENTO GRID */
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 6%; }
        .bento { display: grid; grid-template-columns: repeat(12, 1fr); gap: 25px; }

        /* CARDS */
        .card {
            background: var(--white); border-radius: 40px; padding: 40px;
            transition: var(--ease) 0.6s; cursor: pointer; border: 1px solid rgba(0,0,0,0.03);
            display: flex; flex-direction: column; justify-content: space-between; position: relative;
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 30px 60px rgba(176,141,87,0.1); border-color: var(--accent); }

        .card-main { grid-column: span 8; min-height: 550px; color: white; border: none; overflow: hidden; }
        .card-author { grid-column: span 4; align-items: center; text-align: center; }
        .card-side { grid-column: span 4; min-height: 380px; }
        .card-video { grid-column: span 8; padding: 0; height: 380px; overflow: hidden; border-radius: 40px; }

        /* TYPOGRAPHY */
        .tr-line { font-family: 'Bodoni Moda', serif; font-size: 2.2rem; line-height: 1.1; margin-bottom: 12px; display: block; }
        .pt-line { font-size: 0.9rem; font-weight: 600; opacity: 0.8; font-style: italic; display: block; }
        .tag-dual { font-size: 0.6rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 20px; display: block; }

        .author-img { width: 160px; height: 160px; border-radius: 50%; object-fit: cover; margin-bottom: 25px; border: 6px solid var(--bg); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }

        /* READER MODAL */
        .reader {
            position: fixed; inset: 0; background: var(--bg); z-index: 2000;
            display: none; overflow-y: auto; padding: 100px 8% 150px;
        }
        .reader-grid { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1.2fr 1fr; gap: 60px; }
        .reader-tr { font-family: 'Bodoni Moda', serif; font-size: 2.4rem; line-height: 1.2; color: var(--ink); margin-bottom: 30px; }
        .reader-pt { font-size: 1.2rem; line-height: 1.8; color: #555; font-style: italic; border-left: 3px solid var(--accent); padding-left: 30px; }
        .close-btn { position: fixed; top: 40px; right: 6%; background: var(--ink); color: white; border: none; padding: 15px 35px; border-radius: 50px; font-weight: 800; cursor: pointer; z-index: 2100; }

        footer { padding: 80px 6%; background: white; text-align: center; border-top: 1px solid #eee; margin-top: 50px; }

        @media (max-width: 1024px) {
            .card-main, .card-author, .card-side, .card-video { grid-column: span 12; }
            .reader-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo-box">
            <div class="logo-m">MB</div>
            <div class="logo-text">MARDIN<br>BRAZIL</div>
        </a>
        <div class="nav-filters">
            <button id="btn-all" class="active" onclick="filterData('all')">HEPSİ</button>
            <button id="btn-Mardin" onclick="filterData('Mardin')">MARDİN</button>
            <button id="btn-Brazil" onclick="filterData('Brazil')">BRAZIL</button>
        </div>
    </header>

    <main class="container">
        <div class="bento" id="bento-grid"></div>
    </main>

    <div id="reader-modal" class="reader" onclick="if(event.target.id === 'reader-modal') closeR()">
        <button class="close-btn" onclick="closeR()">KAPAT ● FECHAR</button>
        <div id="reader-content"></div>
    </div>

    <footer>
        <div class="logo-text" style="font-size: 1.5rem; margin-bottom: 15px;">MARDINBRAZIL</div>
        <p style="font-size: 0.7rem; font-weight: 800; opacity: 0.5; letter-spacing: 2px;">AHMET ÇINARBAŞ JOURNAL ● ARCHIVE 2026</p>
    </footer>

    <script>
        const myContent = [
            {
                type: "main",
                region: "Brazil",
                tag: "MAGAZİN ● CELEBRIDADE",
                tr: "Rio Karnavalı'nda Mardin Rüzgarı",
                pt: "Vento de Mardin no Carnaval do Rio",
                desc: "ÜNLÜ TASARIMCININ YENİ KOLEKSİYONU →",
                img: "https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?q=80&w=1000",
                contentTR: "Brezilyalı ünlü moda tasarımcısı, son koleksiyonunda Mardin'in gümüş telkari işçiliğinden ilham aldığını açıkladı. Rio sokaklarında Mezopotamya esintileri yankılanıyor.",
                contentPT: "O famoso designer de moda brasileiro revelou que sua última coleção foi inspirada no trabalho de filigrana de prata de Mardin. Ecos da Mesopotâmia ressoam nas ruas do Rio."
            },
            {
                type: "author",
                region: "Mardin",
                name: "Ahmet Çınarbaş",
                title: "Kültürel Arşivci ● Arquivista Cultural",
                bio: "Mardin'den Brezilya'ya uzanan 9 yıllık gazetecilik serüveni.",
                img: "https://pbs.twimg.com/media/GifApT2XEAAqees.jpg"
            },
            {
                type: "side",
                region: "Mardin",
                tag: "KÜLTÜR ● CULTURA",
                tr: "Reyhani ve Samba'nın Kardeşliği",
                pt: "A Irmandade de Reyhani e Samba",
                desc: "İki farklı kıta, iki benzer ritim.",
                contentTR: "Mardin'in avlularında süzülen Reyhani adımları ile Rio'nun favelalarında doğan Samba adımları arasındaki gizli benzerlikleri uzmanlar tartışıyor.",
                contentPT: "Especialistas discutem as semelhanças ocultas entre os passos do Reyhani que deslizam nos pátios de Mardin e o Samba nascido nas favelas do Rio."
            },
            {
                type: "side",
                region: "Brazil",
                tag: "HABER ● NOTÍCIAS",
                tr: "Yeni Gastronomi Rotası",
                pt: "Nova Rota Gastronômica",
                desc: "Sao Paulo'da Mezopotamya mutfağı.",
                contentTR: "Sao Paulo'nun merkezinde açılan yeni restoran, Mardin içli köftesi ile Brezilya'nın ünlü 'Coxinha'sını aynı menüde buluşturuyor.",
                contentPT: "Um novo restaurante aberto no centro de São Paulo reúne o 'kibe' de Mardin e a famosa 'Coxinha' brasileira no mesmo cardápio."
            },
            {
                type: "video",
                region: "Mardin",
                url: "https://www.youtube.com/embed/jg2q0hXy85c"
            },
            {
                type: "side",
                region: "Mardin",
                tag: "KÖŞE YAZISI ● CRÔNICA",
                tr: "Taşın Fısıltısı",
                pt: "Sussurro da Pedra",
                desc: "Mardin'in sarı kalker taşlarının anlattığı bin yıllık hikaye.",
                contentTR: "Taşın hafızası vardır. Mardin'un taşları binlerce yıllık bir hikaye anlatır.",
                contentPT: "A pedra tem memória. As pedras de Mardin contam uma história de milhares de anos."
            }
        ];

        function renderCards(data) {
            const grid = document.getElementById('bento-grid');
            grid.innerHTML = '';
            data.forEach(item => {
                const card = document.createElement('section');
                card.className = 'card';
                if(item.type === 'main') {
                    card.classList.add('card-main');
                    card.style.background = `linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.7)), url('${item.img}') center/cover`;
                    card.innerHTML = `<div><span class="tag-dual" style="color:white; border-color:white;">${item.tag}</span><span class="tr-line" style="font-size:3.2rem;">${item.tr}</span><span class="pt-line" style="color:white;">${item.pt}</span></div><div style="font-weight:800; font-size:0.7rem; color:white;">${item.desc}</div>`;
                } else if(item.type === 'author') {
                    card.classList.add('card-author');
                    card.innerHTML = `<img src="${item.img}" class="author-img"><span class="tr-line" style="font-size:1.8rem;">${item.name}</span><span class="pt-line">${item.title}</span><p style="font-size:0.8rem; margin:20px 0; opacity:0.7;">${item.bio}</p><div style="font-size:0.7rem; font-weight:900; background:var(--ink); color:white; padding:12px 25px; border-radius:100px;">PORTFOLYO</div>`;
                } else if(item.type === 'side') {
                    card.classList.add('card-side');
                    card.innerHTML = `<div><span class="tag-dual">${item.tag}</span><span class="tr-line">${item.tr}</span><span class="pt-line">${item.pt}</span><p style="font-size:0.8rem; opacity:0.6; margin-top:15px;">${item.desc}</p></div><span style="font-size:0.6rem; font-weight:800; opacity:0.4;">2026 ARCHIVE</span>`;
                } else if(item.type === 'video') {
                    card.classList.add('card-video');
                    card.innerHTML = `<iframe src="${item.url}" style="width:100%; height:100%; border:none;"></iframe>`;
                }
                if(item.type !== 'video') card.onclick = () => openR(item);
                grid.appendChild(card);
            });
        }

        function filterData(region) {
            document.querySelectorAll('.nav-filters button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + region).classList.add('active');
            const filtered = region === 'all' ? myContent : myContent.filter(d => d.region === region);
            renderCards(filtered);
        }

        function openR(item) {
            const modal = document.getElementById('reader-modal');
            const content = document.getElementById('reader-content');
            content.innerHTML = item.type === 'author' ? 
                `<div style="text-align:center;"><img src="${item.img}" style="width:180px; border-radius:50%; border:8px solid white;"><h1 style="font-family:'Bodoni Moda'; font-size:3rem; margin-top:20px;">${item.name}</h1><div class="reader-grid" style="margin-top:40px;"><div class="reader-tr">${item.bio}</div><div class="reader-pt">Traduzindo a alma entre Mardin e Brasil.</div></div></div>` :
                `<div class="reader-grid"><div><span class="tag-dual">${item.tag}</span><div class="reader-tr">${item.contentTR || item.tr}</div></div><div><span class="tag-dual">Versão em Português</span><div class="reader-pt">${item.contentPT || item.pt}</div></div></div>`;
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeR() {
            document.getElementById('reader-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onload = () => renderCards(myContent);
    </script>
</body>
</html>
