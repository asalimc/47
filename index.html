<!DOCTYPE html>
<html id="html-root" lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Ahmet ÇINARBAŞ | Derin Bellek Arşivi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { transition: background-color 2s ease, filter 0.5s ease; overflow-x: hidden; font-family: 'Inter', sans-serif; background: #fafafa; position: relative; }
        .hero-title { font-weight: 900; line-height: 0.85; letter-spacing: -0.05em; text-transform: uppercase; }
        .article-body { text-align: justify; font-size: 1.25rem; line-height: 2; color: #0f172a; }
        
        /* Radyo Lambası Efekti */
        @keyframes pulseGlow { 0% { box-shadow: inset 0 0 50px rgba(251, 191, 36, 0.05); } 50% { box-shadow: inset 0 0 100px rgba(251, 191, 36, 0.15); } 100% { box-shadow: inset 0 0 50px rgba(251, 191, 36, 0.05); } }
        .radio-active-glow { animation: pulseGlow 4s infinite ease-in-out; background: #fffdf5 !important; }

        /* Dinamik Haber Bandı (Ticker) */
        .ticker-container { position: fixed; bottom: 0; left: 0; width: 100%; background: #0f172a; color: #fbbf24; padding: 12px 0; z-index: 1000; font-size: 11px; font-weight: 900; text-transform: uppercase; overflow: hidden; border-top: 3px solid #fbbf24; letter-spacing: 1px; }
        .ticker-text { display: inline-block; white-space: nowrap; animation: ticker 40s linear infinite; padding-left: 100%; }
        @keyframes ticker { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }

        /* Görsel Doku */
        .radio-filter { filter: contrast(1.05) sepia(0.12); }
        .radio-filter::after { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.01) 0px, rgba(0,0,0,0.01) 1px, transparent 2px); pointer-events: none; z-index: 9999; }
        
        .archive-card { border-left: 4px solid #1e3a8a; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; background: white; padding: 2.5rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .archive-card:hover { transform: translateY(-5px); border-left-width: 15px; background: #f8fafc; }
        .official-stamp { display: inline-block; border: 4px double #b91c1c; color: #b91c1c; padding: 12px 30px; font-weight: 900; text-transform: uppercase; transform: rotate(-2deg); background: rgba(185, 28, 28, 0.02); }
    </style>
</head>
<body class="p-4 md:p-12 pb-32">

    <main class="max-w-7xl mx-auto">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 mb-24">
            <div class="lg:col-span-8 flex flex-col justify-center">
                <div id="live-tag" class="text-blue-700 font-black text-[10px] tracking-[0.2em] uppercase mb-4 flex items-center gap-2"></div>
                <h1 class="hero-title text-5xl md:text-8xl lg:text-[7.5rem] mb-8" id="main-title"></h1>
                <p class="text-xl text-slate-600 font-light max-w-2xl leading-relaxed" id="main-desc"></p>
            </div>
            <aside class="lg:col-span-4">
                <div class="bg-slate-900 p-10 text-white shadow-2xl text-center border-b-8 border-blue-600">
                    <img src="https://pbs.twimg.com/profile_images/1559852899303317504/pjkJwYHb_400x400.jpg" class="w-36 h-36 rounded-full mx-auto mb-6 border-4 border-blue-500/20 grayscale hover:grayscale-0 transition-all">
                    <h3 class="text-2xl font-black uppercase tracking-tighter">Ahmet ÇINARBAŞ</h3>
                    <p class="text-blue-400 text-[10px] font-bold uppercase mb-6 tracking-[0.3em]" id="author-role"></p>
                    <a href="https://x.com/ahmetcinarbas" target="_blank" class="block border border-slate-700 py-3 text-[10px] font-black uppercase hover:bg-white hover:text-slate-900 transition-all">X / ARCHIVE ACCESS</a>
                </div>
            </aside>
        </div>

        <div id="active-article" class="mb-24 hidden border-y-8 border-slate-900 py-16 bg-white px-6 md:px-24 shadow-2xl">
            <div class="flex flex-wrap items-center justify-between gap-8 mb-16 border-b pb-10">
                <div class="flex items-center gap-6">
                    <button onclick="kapatMakale()" id="btn-close" class="bg-red-950 text-white px-8 py-4 text-[10px] font-black uppercase tracking-widest hover:bg-red-800 transition-colors"></button>
                    <button id="play-btn" onclick="sesKontrol()" class="bg-blue-950 text-white px-10 py-4 text-[10px] font-black uppercase tracking-widest hover:bg-blue-800 transition-colors"></button>
                </div>
                <div class="w-full md:w-80 bg-slate-100 h-1.5 rounded-full overflow-hidden"><div id="audio-bar" class="h-full bg-yellow-500 w-0 transition-all duration-300"></div></div>
            </div>
            <div class="max-w-4xl mx-auto">
                <h2 id="art-title" class="text-4xl md:text-7xl font-black uppercase mb-12 border-l-12 border-blue-900 pl-8 leading-none tracking-tighter"></h2>
                <div id="art-content" class="article-body"></div>
            </div>
        </div>

        <div id="archive-grid" class="grid grid-cols-1 md:grid-cols-2 gap-10"></div>

        <footer class="mt-40 text-center border-t border-slate-200 pt-16">
            <div class="official-stamp" id="sponsor-stamp"></div>
        </footer>
    </main>

    <div class="ticker-container"><div class="ticker-text" id="ticker-content"></div></div>

    <script>
        // GLOBAL DİL MOTORU
        const userLang = (navigator.language || navigator.userLanguage).split('-')[0];
        const langPack = {
            tr: {
                title: "DERİN<br>BELLEK", desc: "Ahmet Çınarbaş'ın analiz odasındasınız. Kadim veriler ve stratejik arşivler sorgulanıyor.", role: "Stratejik Analist & Bellek Koruyucusu", close: "ARŞİVİ KAPAT", play: "RADYOYU AÇ", pause: "DURAKLAT", resume: "DEVAM ET",
                live: "GÜNCEL ANALİZ AKIŞI", sponsor: "Stratejik Destek: Yaşarbey Kahve", intro: "Burası Mezopotamya'nın Sesi. Yaşarbey Kahve sunar. Saat ",
                outro: "Yaşarbey Kahve sundu. Arşiv dosyası mühürlendi. Hoşça kalın.", ticker: "+++ MARDİN KALESİ ANALİZLERİ SÜRÜYOR +++ YAŞARBEY KAHVE YENİ HASAT +++ DİJİTAL BELLEK KORUMA ALTINDA +++"
            },
            en: {
                title: "DEEP<br>MEMORY", desc: "You are in Ahmet Çınarbaş's analysis room. Querying ancient data and strategic archives.", role: "Strategic Analyst & Memory Guardian", close: "CLOSE ARCHIVE", play: "OPEN RADIO", pause: "PAUSE", resume: "RESUME",
                live: "LIVE ANALYSIS STREAM", sponsor: "Strategic Support: Yaşarbey Coffee", intro: "This is Voice of Mesopotamia. Yaşarbey Coffee presents. Current time ",
                outro: "Presented by Yaşarbey Coffee. Archive file sealed. Goodbye.", ticker: "+++ MARDIN CASTLE ANALYSES CONTINUING +++ NEW HARVEST AT YASARBEY COFFEE +++ DIGITAL MEMORY UNDER PROTECTION +++"
            }
        };

        const L = langPack[userLang] || langPack.en;
        const data = {
            spor: { id: "ARCH-SP1969", title: userLang === 'tr' ? "Mardinspor: Bir Şehrin Onuru" : "Mardinspor: Honor of a City", text: userLang === 'tr' ? "Mardinspor, 1969 yılında kurulduğunda sadece bir spor kulübü değil, Mezopotamya'nın kalbinde atan bir damardı. Kırmızı ve lacivert renkler, bu kadim şehrin tozlu sokaklarından 21 Kasım Şehir Stadyumu'nun yeşil çimlerine uzanan bir kimlik beyanıdır. Beleştepe'nin ruhu, taraftarın sarsılmaz inancıyla birleşerek Mardin'in taşlarına kazınmıştır." : "Mardinspor, founded in 1969, was more than a club; it was a pulse in the heart of Mesopotamia. The red and blue colors are a declaration of identity stretching from dusty streets to the green grass of the stadium." },
            tarih: { id: "ARCH-TR099", title: userLang === 'tr' ? "Hitler ve Mardin Portal Sırrı" : "Hitler and Mardin Portal Secret", text: userLang === 'tr' ? "Alman Ahnenerbe cemiyetinin Mezopotamya’ya olan ilgisi, sadece arkeolojik merak değil, ideolojik bir köken arayışıydı. Mardin’in binlerce yıllık taş sokaklarında yürütülen gizli operasyonlar, şehrin altındaki devasa tünel şebekelerinin kadim bir geçit barındırdığı inancıyla şekillenmişti. Mühürlü kapılar hala sessizliğini koruyor." : "Ahnenerbe's interest in Mesopotamia was a quest for ideological origins. Secret operations in Mardin's ancient streets were shaped by the belief in ancient portals hidden within massive tunnel networks beneath the city." }
        };

        // UI YERLEŞTİRME
        document.getElementById('main-title').innerHTML = L.title;
        document.getElementById('main-desc').innerText = L.desc;
        document.getElementById('author-role').innerText = L.role;
        document.getElementById('btn-close').innerText = L.close;
        document.getElementById('play-btn').innerText = L.play;
        document.getElementById('sponsor-stamp').innerText = L.sponsor;
        document.getElementById('ticker-content').innerText = (L.ticker + " ").repeat(5);
        document.getElementById('live-tag').innerText = L.live;

        const grid = document.getElementById('archive-grid');
        Object.keys(data).forEach(key => {
            grid.innerHTML += `
                <div onclick="makaleAc('${key}')" class="archive-card">
                    <span class="text-[10px] font-black text-blue-600 tracking-widest">${data[key].id}</span>
                    <h4 class="text-3xl font-black uppercase mt-3 leading-tight tracking-tighter">${data[key].title}</h4>
                </div>`;
        });

        // SES VE EFEKT MOTORU
        let synth = window.speechSynthesis;
        let utter = null;
        let audioCtx, noiseNode, gainNode, filterNode, vinylNode;

        function playKilitSesi() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(150, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.15);
            g.gain.setValueAtTime(0.2, ctx.currentTime);
            g.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.15);
            osc.connect(g); g.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.15);
        }

        function makaleAc(key) {
            playKilitSesi();
            const item = data[key];
            document.getElementById('art-title').innerText = item.title;
            document.getElementById('art-content').innerText = item.text;
            document.getElementById('active-article').classList.remove('hidden');
            window.scrollTo({ top: document.getElementById('active-article').offsetTop - 50, behavior: 'smooth' });
        }

        function createAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                // Radyo Noise
                noiseNode = audioCtx.createBufferSource();
                const b = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
                const d = b.getChannelData(0);
                for (let i = 0; i < audioCtx.sampleRate * 2; i++) d[i] = Math.random() * 2 - 1;
                noiseNode.buffer = b; noiseNode.loop = true;

                // Plak Çıtırtısı
                vinylNode = audioCtx.createScriptProcessor(4096, 1, 1);
                vinylNode.onaudioprocess = (e) => {
                    const out = e.outputBuffer.getChannelData(0);
                    for (let i = 0; i < 4096; i++) {
                        out[i] = Math.random() > 0.9996 ? (Math.random() * 0.08) : 0;
                    }
                };

                filterNode = audioCtx.createBiquadFilter();
                filterNode.type = 'bandpass'; filterNode.frequency.value = 1500;
                
                gainNode = audioCtx.createGain();
                gainNode.gain.value = 0;

                noiseNode.connect(filterNode); filterNode.connect(gainNode);
                vinylNode.connect(gainNode); gainNode.connect(audioCtx.destination);
                noiseNode.start();
            }
        }

        function sesKontrol() {
            createAudioContext();
            if (synth.speaking && !synth.paused) { 
                synth.pause(); 
                gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.2);
                document.getElementById('play-btn').innerText = L.resume; 
            } else if (synth.paused) { 
                synth.resume(); 
                gainNode.gain.setTargetAtTime(0.0008, audioCtx.currentTime, 0.2);
                document.getElementById('play-btn').innerText = L.pause; 
            } else {
                synth.cancel();
                document.body.classList.add('radio-filter', 'radio-active-glow');
                
                // FREKANS ARAMA (TUNING) SESİ
                let now = audioCtx.currentTime;
                gainNode.gain.setValueAtTime(0.02, now);
                filterNode.frequency.setValueAtTime(200, now);
                filterNode.frequency.exponentialRampToValueAtTime(4000, now + 0.8);
                filterNode.frequency.exponentialRampToValueAtTime(1200, now + 1.8);
                
                const time = new Date().toLocaleTimeString(userLang, { hour: '2-digit', minute: '2-digit' });
                utter = new SpeechSynthesisUtterance(`${L.intro} ${time}. ${document.getElementById('art-content').innerText} ${L.outro}`);
                utter.lang = userLang === 'tr' ? 'tr-TR' : 'en-US';
                utter.rate = 0.85; utter.pitch = 0.5;

                utter.onboundary = (e) => {
                    document.getElementById('audio-bar').style.width = ((e.charIndex / utter.text.length) * 100) + "%";
                };

                utter.onend = () => {
                    gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 1.5);
                    document.body.classList.remove('radio-filter', 'radio-active-glow');
                    document.getElementById('play-btn').innerText = L.play;
                    document.getElementById('audio-bar').style.width = "0%";
                };

                setTimeout(() => { 
                    gainNode.gain.setTargetAtTime(0.0007, audioCtx.currentTime, 1); 
                    synth.speak(utter); 
                }, 2000);
                document.getElementById('play-btn').innerText = L.pause;
            }
        }

        function kapatMakale() { 
            synth.cancel(); 
            if(gainNode) gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.2);
            document.getElementById('active-article').classList.add('hidden'); 
            document.body.classList.remove('radio-filter', 'radio-active-glow'); 
        }
    </script>
</body>
</html>
