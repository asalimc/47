<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASC GLOBAL | Executive Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Inter:wght@300;400;600;800&display=swap');
        :root { --bg: #fdfcfb; --text: #1a1c1e; --gold: #b08d57; --soft-gray: #f4f1ee; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); }
        .font-serif { font-family: 'Playfair Display', serif; }
        .glass-card { background: white; border: 1px solid rgba(0,0,0,0.05); transition: 0.4s ease; border-radius: 24px; }
        .glass-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="ascApp()" x-init="init()">

    <nav class="sticky top-0 z-[100] bg-white/90 backdrop-blur-md border-b border-stone-100 px-8 py-5 flex justify-between items-center">
        <div @click="currentPage = 'home'" class="flex items-center gap-3 cursor-pointer">
            <div class="bg-stone-900 text-white w-10 h-10 flex items-center justify-center rounded-lg font-bold">A</div>
            <h1 class="font-serif text-2xl">ASC <span class="text-stone-400 italic font-light">GLOBAL</span></h1>
        </div>
        <button @click="openAdmin()" class="bg-stone-900 text-white px-6 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest hover:bg-stone-700 transition">
            Yönetim Terminali
        </button>
    </nav>

    <main x-show="currentPage === 'home'" x-cloak x-transition class="max-w-7xl mx-auto px-6 py-12">
        
        <section class="mb-20">
            <div class="flex justify-between items-end mb-10 border-b border-stone-100 pb-4">
                <h2 class="font-serif text-3xl italic">Analiz & <span class="text-stone-400">Strateji</span></h2>
                <span class="text-[10px] font-bold text-stone-400 uppercase tracking-[0.3em]">Kurumsal Kadro</span>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <template x-for="author in authors" :key="author.id">
                    <div @click="viewItem(author, 'author')" class="glass-card p-8 flex items-center gap-8 cursor-pointer group">
                        <div class="w-32 h-32 flex-shrink-0 overflow-hidden rounded-2xl grayscale group-hover:grayscale-0 transition-all duration-700">
                            <img :src="author.photo || 'https://via.placeholder.com/300'" class="w-full h-full object-cover">
                        </div>
                        <div>
                            <p class="text-stone-400 text-[9px] font-bold uppercase tracking-widest mb-1" x-text="author.title"></p>
                            <h3 class="font-serif text-2xl group-hover:text-stone-500 transition" x-text="author.name"></h3>
                            <p class="text-stone-500 text-xs mt-3 line-clamp-2 italic" x-text="author.bio"></p>
                        </div>
                    </div>
                </template>
            </div>
        </section>

        <section>
            <div class="flex justify-between items-end mb-10 border-b border-stone-100 pb-4">
                <h2 class="font-serif text-3xl italic text-stone-900">Güncel <span class="text-stone-400">Akış</span></h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
                <template x-for="news in newsData" :key="news.id">
                    <div @click="viewItem(news, 'news')" class="group cursor-pointer">
                        <div class="aspect-video rounded-[32px] overflow-hidden mb-6 border border-stone-100 shadow-sm">
                            <img :src="news.img || 'https://via.placeholder.com/600'" class="w-full h-full object-cover group-hover:scale-105 transition duration-700">
                        </div>
                        <span class="text-stone-400 text-[9px] font-black uppercase tracking-widest" x-text="news.region"></span>
                        <h4 class="font-serif text-xl mt-2 leading-snug group-hover:text-stone-600 transition" x-text="news.title"></h4>
                    </div>
                </template>
            </div>
        </section>
    </main>

    <div x-show="currentPage === 'reader'" class="fixed inset-0 z-[200] bg-white overflow-y-auto" x-cloak x-transition>
        <div class="max-w-3xl mx-auto py-24 px-8">
            <button @click="currentPage = 'home'" class="fixed top-8 right-8 text-stone-400 hover:text-black text-2xl transition"><i class="fas fa-times"></i></button>
            <span class="text-stone-400 font-bold text-[10px] uppercase tracking-[0.4em] mb-4 block" x-text="selectedItem?.region || selectedItem?.title"></span>
            <h1 class="font-serif text-4xl md:text-6xl italic mb-10" x-text="selectedItem?.title || selectedItem?.name"></h1>
            <img :src="selectedItem?.img || selectedItem?.photo" class="w-full h-96 object-cover rounded-[40px] mb-12 shadow-xl">
            <div class="text-xl text-stone-600 leading-relaxed italic space-y-6" x-html="selectedItem?.body || selectedItem?.bio"></div>
        </div>
    </div>

    <div x-show="currentPage === 'admin'" class="fixed inset-0 z-[300] bg-stone-50 overflow-y-auto p-8" x-cloak>
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-12 border-b border-stone-200 pb-6">
                <h2 class="font-serif text-2xl italic">CMS <span class="text-stone-400">Terminal</span></h2>
                <button @click="currentPage = 'home'" class="bg-stone-900 text-white px-6 py-2 rounded-full text-[10px] font-bold">KAPAT</button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                <div class="bg-white p-10 rounded-[32px] shadow-sm border border-stone-100">
                    <div class="flex gap-4 mb-8">
                        <button @click="mode='news'; resetForm()" :class="mode=='news'?'bg-stone-900 text-white':'bg-stone-100'" class="flex-1 py-3 rounded-xl font-bold text-[10px] uppercase transition">HABER YÖNETİMİ</button>
                        <button @click="mode='author'; resetForm()" :class="mode=='author'?'bg-stone-900 text-white':'bg-stone-100'" class="flex-1 py-3 rounded-xl font-bold text-[10px] uppercase transition">YAZAR YÖNETİMİ</button>
                    </div>

                    <div class="space-y-4">
                        <input x-model="form.title_name" type="text" :placeholder="mode=='news'?'Haber Başlığı':'Yazar İsmi'" class="w-full bg-stone-50 border p-4 rounded-xl outline-none focus:border-stone-400">
                        <input x-model="form.sub_title" type="text" :placeholder="mode=='news'?'Bölge (Mardin/Rio)':'Ünvan (Siyaset Bilimci)'" class="w-full bg-stone-50 border p-4 rounded-xl outline-none">
                        <textarea x-model="form.content" :placeholder="mode=='news'?'Haber Detayı':'Biyografi'" class="w-full bg-stone-50 border p-4 rounded-xl h-40 outline-none"></textarea>
                        <div class="border-2 border-dashed border-stone-200 p-6 rounded-xl text-center relative hover:bg-stone-50">
                            <input type="file" @change="handleFile" class="absolute inset-0 opacity-0 cursor-pointer">
                            <span class="text-[10px] font-bold text-stone-400">GÖRSEL YÜKLE</span>
                        </div>
                        <button @click="save()" class="w-full bg-stone-900 text-white py-4 rounded-xl font-bold uppercase text-xs tracking-widest" x-text="editingId ? 'GÜNCELLE' : 'YAYINLA'"></button>
                    </div>
                </div>

                <div class="space-y-6">
                    <h3 class="font-bold text-[10px] text-stone-400 uppercase tracking-widest" x-text="mode == 'news' ? 'HABER LİSTESİ' : 'YAZAR LİSTESİ'"></h3>
                    <div class="grid gap-4">
                        <template x-for="item in (mode == 'news' ? newsData : authors)" :key="item.id">
                            <div class="bg-white p-4 rounded-2xl flex justify-between items-center border border-stone-100 shadow-sm">
                                <div class="flex items-center gap-4">
                                    <img :src="item.img || item.photo" class="w-10 h-10 rounded-lg object-cover">
                                    <span class="text-xs font-bold" x-text="item.title || item.name"></span>
                                </div>
                                <div class="flex gap-2">
                                    <button @click="editItem(item)" class="text-blue-500 p-2 hover:bg-blue-50 rounded-lg transition"><i class="fas fa-edit"></i></button>
                                    <button @click="deleteItem(item.id)" class="text-red-500 p-2 hover:bg-red-50 rounded-lg transition"><i class="fas fa-trash"></i></button>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function ascApp() {
            return {
                currentPage: 'home', mode: 'news', editingId: null, selectedItem: null,
                form: { title_name: '', sub_title: '', content: '', media: '' },
                newsData: JSON.parse(localStorage.getItem('asc_news_v15')) || [
                    { id: 1, title: 'Mardin Stratejik Araştırmalar Merkezi Açıldı', region: 'Mardin', body: 'Bölgesel kalkınma odaklı yeni merkezimiz faaliyete geçti.', img: 'https://images.unsplash.com/photo-1582236894056-e918b9588667?w=1600' }
                ],
                authors: JSON.parse(localStorage.getItem('asc_authors_v15')) || [
                    { id: 1, name: 'Ahmet Çınarbaş', title: 'Siyaset Bilimci', bio: 'Mardin stratejileri üzerine uzman kadromuzun lideri.', photo: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=800' },
                    { id: 2, name: 'M. Beşir Ayanoğlu', title: 'Hukukçu', bio: 'Uluslararası hukuk ve kurumsal danışmanlık uzmanı.', photo: 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=800' }
                ],
                init() { this.sync(); },
                openAdmin() { if(prompt("Giriş Kodu:") === "Mardin47**") this.currentPage = 'admin'; },
                handleFile(e) {
                    const reader = new FileReader();
                    reader.onload = (f) => this.form.media = f.target.result;
                    reader.readAsDataURL(e.target.files[0]);
                },
                save() {
                    const payload = this.mode === 'news' ? 
                        { id: this.editingId || Date.now(), title: this.form.title_name, region: this.form.sub_title, body: this.form.content, img: this.form.media } :
                        { id: this.editingId || Date.now(), name: this.form.title_name, title: this.form.sub_title, bio: this.form.content, photo: this.form.media };

                    if (this.mode === 'news') {
                        if (this.editingId) this.newsData = this.newsData.map(n => n.id === this.editingId ? payload : n);
                        else this.newsData.unshift(payload);
                    } else {
                        if (this.editingId) this.authors = this.authors.map(a => a.id === this.editingId ? payload : a);
                        else this.authors.push(payload);
                    }
                    this.sync(); this.resetForm();
                },
                editItem(item) {
                    this.editingId = item.id;
                    this.form = {
                        title_name: item.title || item.name,
                        sub_title: item.region || item.title,
                        content: item.body || item.bio,
                        media: item.img || item.photo
                    };
                },
                deleteItem(id) {
                    if(confirm('Silmek istediğinize emin misiniz?')) {
                        if(this.mode === 'news') this.newsData = this.newsData.filter(n => n.id !== id);
                        else this.authors = this.authors.filter(a => a.id !== id);
                        this.sync();
                    }
                },
                viewItem(item, type) { this.selectedItem = item; this.currentPage = 'reader'; window.scrollTo(0,0); },
                sync() { 
                    localStorage.setItem('asc_news_v15', JSON.stringify(this.newsData)); 
                    localStorage.setItem('asc_authors_v15', JSON.stringify(this.authors)); 
                },
                resetForm() { this.form = { title_name: '', sub_title: '', content: '', media: '' }; this.editingId = null; }
            }
        }
    </script>
</body>
</html>
