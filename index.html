<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Global Culture & Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfbf7; --text: #1a1a1a; --muted: #718096; --accent: #c49b66;
            --white: #ffffff; --transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; scroll-behavior: smooth; overflow-x: hidden; }
        #progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent); width: 0%; z-index: 10001; }
        
        /* NAVIGASYON */
        nav { background: rgba(253, 251, 247, 0.9); backdrop-filter: blur(15px); padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.03); }
        .logo { font-family: 'Marcellus', serif; font-size: 2rem; letter-spacing: 3px; cursor: pointer; text-transform: uppercase; }
        .admin-trigger { cursor: pointer; opacity: 0.05; font-size: 10px; padding: 10px; }

        /* YAZAR ŞERİDİ */
        .authors-strip { background: var(--white); padding: 30px 0; display: flex; justify-content: center; gap: 40px; border-bottom: 1px solid #f1f1f1; flex-wrap: wrap; }
        .author-item { cursor: pointer; text-align: center; width: 90px; transition: var(--transition); }
        .author-item img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 1px solid var(--accent); padding: 4px; }
        .author-item span { display: block; font-size: 0.75rem; font-weight: 700; margin-top: 10px; font-family: 'Marcellus'; }

        /* GRID SİSTEMİ */
        .container { max-width: 1400px; margin: 40px auto; display: grid; grid-template-columns: 250px 1fr; gap: 40px; padding: 0 25px; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }

        .news-card { background: var(--white); border-radius: 24px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.02); cursor: pointer; transition: var(--transition); border: 1px solid rgba(0,0,0,0.02); display: flex; flex-direction: column; }
        .news-card:hover { transform: translateY(-10px); box-shadow: 0 30px 60px rgba(0,0,0,0.06); }
        .news-img { width: 100%; height: 250px; object-fit: cover; }
        .card-body { padding: 25px; flex-grow: 1; }
        .card-body h2 { font-family: 'Marcellus', serif; font-size: 1.5rem; margin: 15px 0; line-height: 1.3; }

        /* OVERLAY MODAL */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: none; overflow-y: auto; }
        .close-btn { position: fixed; top: 30px; right: 40px; cursor: pointer; background: var(--text); color: #fff; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .article-wrap { max-width: 800px; margin: 60px auto; padding: 0 20px; }
        .audio-btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; margin-bottom: 20px; font-weight: bold; }

        /* RESPONSIVE */
        @media (max-width: 1024px) { .container { grid-template-columns: 1fr; } .sidebar { display: none; } }
    </style>
</head>
<body>

<div id="progress-bar"></div>

<div id="app">
    <nav>
        <div class="logo" onclick="location.reload()">LUMINA</div>
        <div style="display:flex; align-items:center; gap:20px;">
            <div id="loc-tag" style="font-size: 0.8rem; letter-spacing: 2px; font-weight: 700;">MARDİN • YEREL</div>
            <div class="admin-trigger" onclick="openAdmin()">[L_CORE]</div>
        </div>
    </nav>

    <div class="authors-strip" id="authors-list"></div>

    <div class="container">
        <aside class="sidebar">
            <h4 style="font-family:'Marcellus'; border-bottom:1px solid #eee; padding-bottom:10px;">KATEGORİLER</h4>
            <div id="cat-nav" style="line-height: 2.8; font-size: 0.9rem; cursor: pointer;"></div>
            <div id="ad-sidebar" style="margin-top:40px; border-radius:15px; overflow:hidden;"></div>
        </aside>
        <main class="news-grid" id="main-feed"></main>
    </div>
</div>

<div id="overlay" class="overlay">
    <div class="close-btn" onclick="closeOverlay()">✕</div>
    <div id="overlay-content" class="article-wrap"></div>
</div>

<script>
    const PASS = "47";
    let db = JSON.parse(localStorage.getItem('lumina_v23')) || {
        news: [{id:1, title: "Mardin Gümüşü", text: "Telkari sanatı canlanıyor...", img: "https://images.unsplash.com/photo-1582738411706-bfc8e691d1c2?w=800", cat: "Kültür", author: "ASC"}],
        authors: [{id:1, name: "ASC", bio: "Baş Yazar", img: "https://via.placeholder.com/150"}],
        cats: ['Mardin', 'Brezilya', 'Tasarım', 'Gastronomi'],
        ad: "https://via.placeholder.com/300x500"
    };

    function sync() { localStorage.setItem('lumina_v23', JSON.stringify(db)); renderApp(); }

    async function toBase64(file) {
        return new Promise((res) => {
            const r = new FileReader();
            r.readAsDataURL(file);
            r.onload = () => res(r.result);
        });
    }

    // --- ADMİN PENCERESİ ---
    function openAdmin() {
        if(prompt("Şifre:") !== PASS) return;
        const win = window.open("", "LuminaAdmin", "width=1200,height=900");
        win.document.write(`
            <html><head><title>Admin Hub</title>
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <style>
                body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
                .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
                .box { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
                h2 { color: #c49b66; border-bottom: 1px solid #eee; padding-bottom: 10px; }
                input, textarea, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
                button { background: #1a1a1a; color: #fff; border: none; padding: 12px; border-radius: 20px; cursor: pointer; width: 100%; font-weight: bold; margin-top:5px; }
                .list { margin-top: 15px; max-height: 250px; overflow-y: auto; font-size: 12px; }
                .item { display: flex; justify-content: space-between; align-items:center; padding: 10px; border-bottom: 1px solid #eee; }
                .del { color: red; cursor: pointer; font-weight:bold; }
            </style></head>
            <body>
                <h1 style="text-align:center">Lumina Studio v23</h1>
                <div class="grid">
                    <div class="box">
                        <h2>Haber Yönetimi</h2>
                        <input type="text" id="nt" placeholder="Haber Başlığı">
                        <textarea id="nc" placeholder="Haber İçeriği" rows="4"></textarea>
                        <select id="ncat">${db.cats.map(c=>`<option>${c}</option>`).join('')}</select>
                        <label>Haber Fotoğrafı:</label>
                        <input type="file" id="ni" accept="image/*">
                        <button onclick="window.opener.postMessage('addNews', '*')">Haber Yayınla (ASC)</button>
                        <div class="list">${db.news.map(n=>`<div class="item"><span>${n.title.substring(0,30)}..</span> <span class="del" onclick="window.opener.postMessage({t:'delNews', id:${n.id}}, '*')">SİL</span></div>`).join('')}</div>
                    </div>
                    <div class="box">
                        <h2>Yazar Yönetimi</h2>
                        <input type="text" id="an" placeholder="Yazar Adı">
                        <textarea id="ab" placeholder="Yazar Biyografisi" rows="3"></textarea>
                        <label>Yazar Fotoğrafı:</label>
                        <input type="file" id="ai" accept="image/*">
                        <button onclick="window.opener.postMessage('addAuth', '*')">Yazar Kaydet</button>
                        <div class="list">${db.authors.map(a=>`<div class="item"><span style="color:blue; cursor:pointer" onclick="window.opener.postMessage({t:'showAuthNews', name:'${a.name}'}, '*')">${a.name} (Gör)</span> <span class="del" onclick="window.opener.postMessage({t:'delAuth', id:${a.id}}, '*')">SİL</span></div>`).join('')}</div>
                    </div>
                    <div class="box">
                        <h2>Reklam Yönetimi</h2>
                        <label>Reklam Görseli Değiştir:</label>
                        <input type="file" id="adi" accept="image/*">
                        <button onclick="window.opener.postMessage('upAd', '*')">Reklamı Güncelle</button>
                    </div>
                </div>
            </body></html>
        `);

        window.onmessage = async (e) => {
            const doc = win.document;
            if(e.data === 'addNews') {
                const img = doc.getElementById('ni').files[0] ? await toBase64(doc.getElementById('ni').files[0]) : "https://via.placeholder.com/800";
                db.news.unshift({id: Date.now(), title: doc.getElementById('nt').value, text: doc.getElementById('nc').value, cat: doc.getElementById('ncat').value, author: "ASC", img: img});
                sync(); win.location.reload();
            }
            if(e.data === 'addAuth') {
                const img = doc.getElementById('ai').files[0] ? await toBase64(doc.getElementById('ai').files[0]) : "https://via.placeholder.com/150";
                db.authors.push({id: Date.now(), name: doc.getElementById('an').value, bio: doc.getElementById('ab').value, img: img});
                sync(); win.location.reload();
            }
            if(e.data === 'upAd') {
                if(doc.getElementById('adi').files[0]) {
                    db.ad = await toBase64(doc.getElementById('adi').files[0]);
                    sync(); win.alert("Reklam Güncellendi!");
                }
            }
            if(e.data.t === 'delNews') { db.news = db.news.filter(n=>n.id !== e.data.id); sync(); win.location.reload(); }
            if(e.data.t === 'delAuth') { db.authors = db.authors.filter(a=>a.id !== e.data.id); sync(); win.location.reload(); }
            if(e.data.t === 'showAuthNews') {
                const aNews = db.news.filter(n=>n.author === e.data.name);
                win.alert(e.data.name + " Yazıları:\n" + (aNews.length ? aNews.map(x=> "- " + x.title).join("\n") : "Henüz yazı yok."));
            }
        };
    }

    // --- SESLİ OKUMA ---
    function speak(text) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'tr-TR'; u.rate = 0.95;
        window.speechSynthesis.speak(u);
    }

    // --- RENDER ---
    function renderApp() {
        document.getElementById('authors-list').innerHTML = db.authors.map(a => `
            <div class="author-item" onclick="openAuthor(${a.id})">
                <img src="${a.img}"><span>${a.name}</span>
            </div>`).join('');
        document.getElementById('cat-nav').innerHTML = db.cats.map(c => `<div>• ${c}</div>`).join('');
        document.getElementById('ad-sidebar').innerHTML = `<img src="${db.ad}" style="width:100%; border-radius:15px;">`;
        document.getElementById('main-feed').innerHTML = db.news.map(n => `
            <article class="news-card" onclick="openNews(${n.id})">
                <img src="${n.img}" class="news-img">
                <div class="card-body">
                    <small style="color:var(--accent); font-weight:bold;">${n.cat.toUpperCase()} • ${n.author}</small>
                    <h2>${n.title}</h2>
                </div>
            </article>`).join('');
    }

    function openNews(id) {
        const n = db.news.find(x=>x.id==id);
        const overlay = document.getElementById('overlay');
        overlay.style.display = 'block';
        document.body.style.overflow = 'hidden';
        document.getElementById('overlay-content').innerHTML = `
            <button class="audio-btn" onclick="speak('${n.title.replace(/'/g,"")}. ${n.text.replace(/'/g,"")}')">🔊 Yazıyı Dinle</button>
            <h1 style="font-family:Marcellus; font-size:3rem;">${n.title}</h1>
            <p style="color:var(--accent); font-weight:bold;">Yazar: ${n.author}</p>
            <img src="${n.img}" style="width:100%; border-radius:24px; margin:20px 0;">
            <div style="font-size:1.3rem; line-height:2;">${n.text}</div>
        `;
    }

    function openAuthor(id) {
        const a = db.authors.find(x=>x.id==id);
        const overlay = document.getElementById('overlay');
        overlay.style.display = 'block';
        document.body.style.overflow = 'hidden';
        document.getElementById('overlay-content').innerHTML = `
            <button class="audio-btn" onclick="speak('${a.name}. ${a.bio.replace(/'/g,"")}')">🔊 Biyografiyi Dinle</button>
            <div style="text-align:center">
                <img src="${a.img}" style="width:200px; height:200px; border-radius:50%; border:4px solid var(--accent); padding:5px; object-fit:cover;">
                <h1 style="font-family:Marcellus; font-size:3rem;">${a.name}</h1>
                <p style="font-size:1.2rem; color:var(--muted);">${a.bio}</p>
            </div>
            <hr style="margin:40px 0; border:0; border-top:1px solid #eee;">
            <h3>Yazarın Tüm Yazıları</h3>
            <div class="news-grid">${db.news.filter(n=>n.author === a.name).map(n=>`
                <div class="news-card" onclick="openNews(${n.id})">
                    <img src="${n.img}" style="height:150px; width:100%; object-fit:cover;">
                    <div style="padding:15px;"><h4>${n.title}</h4></div>
                </div>`).join('')}</div>
        `;
    }

    function closeOverlay() { 
        window.speechSynthesis.cancel();
        document.getElementById('overlay').style.display = 'none'; 
        document.body.style.overflow = 'auto';
    }

    window.onscroll = () => {
        let winScroll = document.documentElement.scrollTop;
        let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        document.getElementById("progress-bar").style.width = (winScroll / height) * 100 + "%";
    };

    renderApp();
</script>
</body>
</html>
