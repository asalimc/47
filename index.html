<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MB | Ahmet Çınarbaş Journal - Mardin & Brazil</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,700;0,6..96,900;1,6..96,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #F8F6F2; --ink: #1A1A1A; --accent: #B08D57; --white: #FFFFFF;
            --ease: cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* CUSTOM SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--ink); font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; line-height: 1.6; }

        header {
            padding: 20px 6%; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; background: rgba(248, 246, 242, 0.95); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo-box { display: flex; align-items: center; text-decoration: none; color: var(--ink); }
        .logo-m { font-family: 'Bodoni Moda', serif; font-size: 1.8rem; font-weight: 900; background: var(--ink); color: var(--bg); padding: 0 10px; border-radius: 8px; margin-right: 12px; }
        .logo-text { font-family: 'Bodoni Moda', serif; font-size: 0.9rem; font-weight: 900; line-height: 1; letter-spacing: 1px; }

        #progress-container { position: fixed; top: 0; left: 0; width: 100%; height: 4px; z-index: 10001; display: none; }
        #progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.1s; }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px 6% 80px; }
        
        .bento { display: grid; grid-template-columns: 1fr; gap: 25px; }
        @media (min-width: 768px) { 
            .bento { grid-template-columns: repeat(2, 1fr); }
            .card-wide { grid-column: span 2; }
        }

        .card {
            background: var(--white); border-radius: 35px; padding: 40px;
            transition: transform 0.6s var(--ease), box-shadow 0.6s var(--ease); 
            cursor: pointer; border: 1px solid rgba(0,0,0,0.03);
            display: flex; flex-direction: column; justify-content: flex-end; 
            min-height: 450px; position: relative; overflow: hidden;
        }
        .card:hover { transform: translateY(-8px); box-shadow: 0 30px 60px rgba(0,0,0,0.1); }

        .card-bg { position: absolute; inset: 0; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: 0; transition: transform 1.2s var(--ease); }
        .card:hover .card-bg { transform: scale(1.08); }
        .card-overlay { position: absolute; inset: 0; background: linear-gradient(transparent, rgba(0,0,0,0.9)); z-index: 1; }
        .card-content { position: relative; z-index: 2; color: white; }

        #reader-modal { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; overflow-y: auto; }
        .modal-hero { width: 100%; height: 55vh; position: relative; }
        .modal-hero img { width: 100%; height: 100%; object-fit: cover; }
        .modal-body { max-width: 1000px; margin: -80px auto 0; position: relative; background: var(--bg); border-radius: 40px 40px 0 0; padding: 60px 8% 100px; }
        .close-btn { position: fixed; top: 25px; right: 25px; background: var(--ink); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; z-index: 10000; }

        .tr-line { font-family: 'Bodoni Moda', serif; font-size: 1.8rem; line-height: 1.1; margin-bottom: 5px; font-weight: 700; }
        
        .tag-wrapper { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .tag-dual { font-size: 0.65rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); display: block; }
        .view-count { font-size: 0.65rem; font-weight: 600; opacity: 0.7; letter-spacing: 1px; }

        .text-content { font-size: 1.15rem; line-height: 1.9; color: var(--ink); text-align: justify; height: auto; overflow: visible; margin-top: 30px; }

        .share-bar { margin-top: 50px; padding-top: 30px; border-top: 1px solid rgba(0,0,0,0.05); display: flex; justify-content: center; }
        .wa-button { 
            display: flex; align-items: center; gap: 10px; background: #25D366; color: white; 
            padding: 14px 30px; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 0.9rem;
            transition: transform 0.3s var(--ease); box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2);
        }
        .wa-button:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(37, 211, 102, 0.3); }

        footer { padding: 40px 6%; text-align: center; opacity: 0.5; font-size: 0.7rem; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="progress-container"><div id="progress-bar"></div></div>

    <header>
        <a href="index.html" class="logo-box"><div class="logo-m">MB</div><div class="logo-text">MARDIN<br>BRAZIL</div></a>
    </header>

    <main class="container">
        <div class="bento" id="bento-grid">
            <div class="card card-wide" onclick="openReader('author')">
                <div class="card-bg" style="background-image: url('https://pbs.twimg.com/media/GifApT2XEAAqees.jpg')"></div>
                <div class="card-overlay"></div>
                <div class="card-content">
                    <div class="tag-wrapper">
                        <span class="tag-dual" id="tag-author">MANIFESTO</span>
                        <span class="view-count" id="view-author">...</span>
                    </div>
                    <h2 class="tr-line" id="title-author">Ahmet Çınarbaş</h2>
                </div>
            </div>
            
            <div class="card card-wide" onclick="openReader('architecture')">
                <div class="card-bg" style="background-image: url('https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=1200')"></div>
                <div class="card-overlay"></div>
                <div class="card-content">
                    <div class="tag-wrapper">
                        <span class="tag-dual" id="tag-architecture">MİMARİ</span>
                        <span class="view-count" id="view-architecture">...</span>
                    </div>
                    <h2 class="tr-line" id="title-architecture">Mimarinin Hafızası</h2>
                </div>
            </div>

            <div class="card" onclick="openReader('sports')">
                <div class="card-bg" style="background-image: url('https://img.r7.com/images/2014/05/13/edn1es433_v9wa0wesj_file.jpg')"></div>
                <div class="card-overlay"></div>
                <div class="card-content">
                    <div class="tag-wrapper">
                        <span class="tag-dual" id="tag-sports">SPOR</span>
                        <span class="view-count" id="view-sports">...</span>
                    </div>
                    <h2 class="tr-line" id="title-sports">Tozun Kardeşliği</h2>
                </div>
            </div>

            <div class="card" onclick="openReader('faith')">
                <div class="card-bg" style="background-image: url('https://images.unsplash.com/photo-1548625361-394ef3226a31?q=80&w=1200')"></div>
                <div class="card-overlay"></div>
                <div class="card-content">
                    <div class="tag-wrapper">
                        <span class="tag-dual" id="tag-faith">İNANÇ</span>
                        <span class="view-count" id="view-faith">...</span>
                    </div>
                    <h2 class="tr-line" id="title-faith">İnanç ve Ritüel</h2>
                </div>
            </div>
        </div>
    </main>

    <div id="reader-modal" onscroll="updateProgress()">
        <button class="close-btn" onclick="closeReader()">✕</button>
        <div id="reader-content"></div>
    </div>

    <footer>AHMET ÇINARBAŞ JOURNAL © 2026 ● MARDIN TO BRAZIL</footer>

    <script>
        // YEREL DİL TESPİTİ
        const userLang = navigator.language || navigator.userLanguage;
        const isPT = userLang.startsWith('pt');

        // DOLU DOLU İÇERİK VERİ TABANI
        const contentData = {
            author: {
                tr: { tag: "MANIFESTO", title: "Ahmet Çınarbaş: İki Dünyanın Eşiğinde", text: "Ahmet Çınarbaş, Mezopotamya’nın kadim taşlarından aldığı ilhamı Brezilya’nın vahşi doğası ve kaotik ama büyüleyici şehir yapısıyla harmanlayan bir estetik küratörüdür. Onun için Mardin'in sessizliği Rio'nun ritmiyle, telkâri işçiliği ise favelaların renkli karmaşasıyla bir bütündür. Bu journal, iki farklı kıtanın ama aynı ortak ruhun bir izdüşümüdür. Her yazı, taşın ve insanın hikayesini anlatır." },
                pt: { tag: "MANIFESTO", title: "Ahmet Çınarbaş: Entre Dois Mundos", text: "Ahmet Çınarbaş é um curador estético que mistura a inspiração das pedras antigas da Mesopotâmia com a natureza selvagem e a estrutura urbana fascinante do Brasil. Para ele, o silêncio de Mardin funde-se com o ritmo do Rio, e o artesanato em filigrana com o caos colorido das favelas. Este diário é uma projeção de dois continentes diferentes, mas com a mesma alma comum." },
                img: "https://pbs.twimg.com/media/GifApT2XEAAqees.jpg"
            },
            architecture: {
                tr: { tag: "MİMARİ ANALİZ", title: "Mimarinin Hafızası: Taş Evler & Favelalar", text: "Mardin’in taş evleri mimarinin ahlakıdır; Rio’nun favelaları ise hayatta kalma çığlığı. Mardin’de evler birbirinin güneşini kesmez, bu bir 'saygı' mimarisidir. Favelalarda ise evler birbirinin omuzlarına tırmanır; şehre tutunmak için. Her iki coğrafyada da taş ve tuğla, insan ruhunun sığınacak bir liman arayışını temsil eder. Mardin'in dar sokakları ile favelaların labirentleri, modernizmin öldüremediği organik hafıza merkezleridir." },
                pt: { tag: "ANÁLISE ARQUITETÔNICA", title: "Memória da Arquitetura: Casas de Pedra e Favelas", text: "As casas de pedra de Mardin são a moral da arquitetura; as favelas do Rio são o grito de sobrevivência. Em Mardin, as casas não cortam o sol umas das outras, é uma arquitetura de 'respeito'. Nas favelas, as casas sobem nos ombros umas das outras para se segurarem na cidade. Em ambas as geografias, a pedra e o tijolo representam a busca da alma humana por um porto seguro." },
                img: "https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=1200"
            },
            sports: {
                tr: { tag: "SPOR ANALİZ", title: "Tozun ve Terin Kardeşliği", text: "Mardinspor için futbol sadece bir oyun değil, 90 dakikalık bir varoluş mücadelesidir. Maç başlamadan saatler önce stadyumun tellerine yapışan ateşli taraftar, 'Burası Mardin!' sloganıyla aslında kendi kimliğini savunur. Bu tutku, Rio’daki favela sahalarında çıplak ayakla top koşturan çocukların 'Favela Venceu!' haykırışıyla kardeştir. Tozun ve terin birleştiği bu hikayede neşe ve keder birdir." },
                pt: { tag: "ANÁLISE ESPORTIVA", title: "Irmandade de Poeira e Suor", text: "Para o Mardinspor, o futebol não é apenas um jogo, é uma luta pela existência de 90 minutos. Esta paixão é irmã do grito 'Favela Venceu!' das crianças que jogam descalças nos campos das favelas do Rio. Nesta história onde o pó e o suor se unem, a alegria e a tristeza são uma só." },
                img: "https://img.r7.com/images/2014/05/13/edn1es433_v9wa0wesj_file.jpg"
            },
            faith: {
                tr: { tag: "İNANÇ ANALİZ", title: "İnanç ve Ritüel: Kırklar & Cristo", text: "Mardin ve Rio, 'Kutsalın Estetiği' noktasında ikizdir. Kırklar Kilisesi’nin tütsü kokusuyla Cristo Redentor’un spiritüel gölgesi aynı göğe bakar. Mardin’de inanç muhafaza üzerine, Brezilya’da ise senkretizm (karıştırmak) üzerine kuruludur. Düğünlerde yükselen erbane sesiyle, Rio sokaklarında yankılanan Samba ritimleri aynı evrensel umudun farklı dilleridir." },
                pt: { tag: "FÉ E RITUAL", title: "Fé e Ritual: Kırklar e Cristo", text: "Mardin e o Rio são gémeos na 'Estética do Sagrado'. O cheiro a incenso da Igreja dos Quarenta e a sombra espiritual do Cristo Redentor olham para o mesmo céu. Em Mardin a fé baseia-se na preservação, no Brasil baseia-se no sincretismo. Os sons que ecoam nas ruas são línguas diferentes da mesma esperança universal." },
                img: "https://images.unsplash.com/photo-1548625361-394ef3226a31?q=80&w=1200"
            }
        };

        // TEKİL SAYAÇ SİSTEMİ
        function handleCounting(key) {
            let views = parseInt(localStorage.getItem('v_unique_' + key)) || (Math.floor(Math.random() * 50) + 100);
            if (!sessionStorage.getItem('visited_' + key)) {
                views++;
                localStorage.setItem('v_unique_' + key, views);
                sessionStorage.setItem('visited_' + key, '1');
            }
            return views;
        }

        function updateUI() {
            for (let key in contentData) {
                const count = localStorage.getItem('v_unique_' + key) || (Math.floor(Math.random() * 50) + 100);
                const langData = isPT ? contentData[key].pt : contentData[key].tr;
                
                if(document.getElementById(`view-${key}`)) document.getElementById(`view-${key}`).innerText = `${count} VIEWS`;
                if(document.getElementById(`tag-${key}`)) document.getElementById(`tag-${key}`).innerText = langData.tag;
                if(document.getElementById(`title-${key}`)) document.getElementById(`title-${key}`).innerText = langData.title;
            }
        }

        function openReader(key) {
            const item = contentData[key];
            const langData = isPT ? item.pt : item.tr;
            const currentViews = handleCounting(key);
            updateUI();

            const modal = document.getElementById('reader-modal');
            const content = document.getElementById('reader-content');
            const shareText = isPT ? "Compartilhar no WhatsApp" : "WhatsApp ile Paylaş";
            
            content.innerHTML = `
                <div class="modal-hero"><img src="${item.img}"></div>
                <div class="modal-body">
                    <div class="tag-wrapper">
                        <span class="tag-dual">${langData.tag}</span>
                        <span class="view-count" style="color:var(--ink)">${currentViews} VIEWS</span>
                    </div>
                    <h1 class="tr-line" style="font-size: 2.2rem; margin-top:10px;">${langData.title}</h1>
                    <div class="text-content">${langData.text}</div>
                    <div class="share-bar">
                        <a href="https://wa.me/?text=${encodeURIComponent(langData.title)}" target="_blank" class="wa-button">${shareText}</a>
                    </div>
                </div>`;
            
            modal.style.display = 'block';
            document.getElementById('progress-container').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeReader() {
            document.getElementById('reader-modal').style.display = 'none';
            document.getElementById('progress-container').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function updateProgress() {
            const modal = document.getElementById('reader-modal');
            const scrolled = (modal.scrollTop / (modal.scrollHeight - modal.clientHeight)) * 100;
            document.getElementById("progress-bar").style.width = scrolled + "%";
        }

        window.onload = updateUI;
    </script>
</body>
</html>
