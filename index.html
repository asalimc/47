        .title-pt { font-family: 'Cormorant Garamond'; font-size: 1.4rem; font-style: italic; color: var(--gold); display: block; margin-top: 5px; }

        .lang-col { text-align: justify; font-size: 1rem; color: var(--stone); }
        .pt { color: #777; font-style: italic; border-left: 1px solid var(--clay); padding-left: 40px; }

    fullData.forEach(item => {
        const section = document.createElement('div');
        section.className = 'section';
        section.innerHTML = `
            <div class="img-parallax-wrapper">
                <img src="https://images.unsplash.com/photo-${item.img}?auto=format&fit=crop&q=80&w=1600" class="parallax-img" alt="">
            </div>
            <div class="content-card">
                <div class="section-header">
                    <div class="num">${item.id}</div>
                    <div class="title-box">
                        <span class="title-tr">${item.tr_t}</span>
                        <span class="title-pt">${item.pt_t}</span>
                    </div>
                </div>
                <div class="grid-text">
                    <div class="lang-col tr">${item.tr.map(p => `<p>${p}</p>`).join('')}</div>
                    <div class="lang-col pt">${item.pt.map(p => `<p>${p}</p>`).join('')}</div>
                </div>

                </div>
            </div>
        `;
        root.appendChild(section);

    // SCROLL EVENTS: PARALLAX & BG COLOR
    window.addEventListener('scroll', () => {
        const scrolled = window.pageYOffset;
        
        // Parallax
        document.querySelectorAll('.parallax-img').forEach(img => {
            const rect = img.parentElement.getBoundingClientRect();
            if (rect.top < window.innerHeight && rect.bottom > 0) {
                img.style.transform = `translateY(${-(rect.top * 0.15)}px)`;
            }
        });

        // Dynamic BG
        const scrollPercent = scrolled / (document.documentElement.scrollHeight - window.innerHeight);
        const colorIdx = Math.min(bgColors.length - 1, Math.floor(scrollPercent * bgColors.length));
        document.body.style.backgroundColor = bgColors[colorIdx];
    });
</script>
