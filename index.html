<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARDIN & BRAZIL | ASC 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;1,400&family=Montserrat:wght@300;700;900&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    <style>
        :root { --mardin: #D4A373; --brazil: #064E3B; --dark: #050505; --white: #F5F5F7; }

        body { 
            background-color: #fafaf9;
            background-image: linear-gradient(rgba(0,0,0,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.02) 1px, transparent 1px);
            background-size: 40px 40px; font-family: 'Montserrat', sans-serif; color: var(--dark); overflow-x: hidden;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: default; }

        /* --- HEADER AREA --- */
        header { padding: clamp(80px, 12vh, 150px) 5% 20px; }
        .brand-title { font-family: 'Playfair Display'; font-size: clamp(2.5rem, 9.5vw, 9rem); line-height: 0.8; display: flex; gap: 20px; }
        .brand-title .m-text { color: var(--mardin); }
        .brand-title .b-text { color: var(--brazil); font-weight: 900; }

        /* YAZARLAR HEADER KISMINDA */
        .header-authors { 
            display: flex; gap: 30px; margin-top: 30px; padding: 15px 0;
            border-top: 1px solid rgba(0,0,0,0.05); overflow-x: auto;
        }
        .author-box { display: flex; align-items: center; gap: 12px; white-space: nowrap; }
        .author-box img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--mardin); object-fit: cover; }
        .author-box span { font-size: 10px; font-weight: 900; letter-spacing: 1px; color: var(--dark); }

        /* --- MASTER GRID --- */
        .master-wrapper { padding: 0 5% 80px; display: grid; grid-template-columns: repeat(12, 1fr); gap: 30px; }

        /* --- SEÇİLİ ALAN --- */
        .featured-mask { grid-column: span 8; height: 70vh; border-radius: 50px; overflow: hidden; position: relative; }
        .featured-mask img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.65); }
        .curator-layer { position: absolute; inset: 0; padding: 40px; display: flex; flex-direction: column; justify-content: space-between; z-index: 2; }

        /* --- MAG STACK (SAĞ TARAF) --- */
        .mag-stack { grid-column: span 4; display: flex; flex-direction: column; gap: 25px; }
        .expand-card { background: white; padding: 35px; border-radius: 40px; border: 1px solid rgba(0,0,0,0.03); }

        /* --- VIDEO PORTAL --- */
        .video-portal { grid-column: span 12; display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-top: 20px; }
        .v-container { display: flex; flex-direction: column; gap: 15px; }
        .v-box { height: 40vh; border-radius: 40px; overflow: hidden; background: #000; position: relative; }
        .v-box iframe { width: 100%; height: 100%; border: none; opacity: 0.6; }
        .weather-info { display: flex; justify-content: space-between; padding: 15px 30px; background: white; border-radius: 30px; border: 1px solid rgba(0,0,0,0.03); }

        /* --- OVERLAY --- */
        .interview-overlay { position: fixed; inset: 0; background: var(--white); z-index: 9999; padding: 5vw; display: none; overflow-y: auto; }
        .interview-overlay.active { display: block; }
        .close-interview { position: fixed; top: 40px; right: 40px; background: var(--dark); color: white; padding: 12px 25px; border-radius: 50px; cursor: pointer; font-size: 10px; font-weight: 900; z-index: 10000; }

        /* --- RESPONSIVE --- */
        @media (max-width: 1024px) { 
            .featured-mask, .mag-stack, .video-portal { grid-column: span 12; } 
            .video-portal { grid-template-columns: 1fr; }
            .featured-mask { height: 50vh; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-title"><span class="m-text">MARDIN</span><span class="b-text">BRAZIL</span></div>
        <div class="header-authors">
            <div class="author-box">
                <img src="https://i.pravatar.cc/100?u=elif">
                <span>DR. ELİF MARDİNİ</span>
            </div>
            <div class="author-box">
                <img src="https://i.pravatar.cc/100?u=ricardo">
                <span>PROF. RICARDO SILVA</span>
            </div>
        </div>
    </header>

    <div class="master-wrapper">
        
        <div class="featured-mask">
            <img src="https://images.unsplash.com/photo-1483728642387-6c3bdd6c93e5?auto=format&fit=crop&w=1600">
            <div class="curator-layer">
                <div style="background: var(--mardin); width: fit-content; color: white; padding: 6px 15px; border-radius: 20px; font-size: 9px; font-weight: 900; letter-spacing: 2px;">ÖZEL SÖYLEŞİ</div>
                <div>
                    <h2 style="font-family: 'Playfair Display'; font-size: clamp(1.8rem, 4vw, 3.5rem); color: white; margin-bottom: 20px;">"Taşın Hafızası ve <br>Ormanın Kalbi"</h2>
                    <button onclick="openInterview()" style="background:white; border:none; padding:12px 30px; border-radius:50px; font-weight:900; font-size:9px; cursor:pointer;">OKUMAYA BAŞLA</button>
                </div>
            </div>
        </div>

        <div class="mag-stack">
            <div class="expand-card">
                <span style="font-weight:900; font-size:9px; color:var(--mardin)">HABER DOSYASI</span>
                <h4 style="font-family: 'Playfair Display'; font-size: 1.4rem; margin-top: 10px;">Mezopotamya'nın Sesi</h4>
            </div>
            <div class="expand-card">
                <span style="font-weight:900; font-size:9px; color:var(--brazil)">DENEME</span>
                <h4 style="font-family: 'Playfair Display'; font-size: 1.4rem; margin-top: 10px;">Amazon Dijital Arşivi</h4>
            </div>
        </div>

        <div class="video-portal">
            <div class="v-container">
                <div class="v-box"><iframe src="https://www.youtube.com/embed/3r9cOuTmVu4?autoplay=1&mute=1&loop=1&playlist=3r9cOuTmVu4&controls=0"></iframe></div>
                <div class="weather-info">
                    <div style="font-weight:900; font-size:9px; letter-spacing:1px;">Mardin, TR</div>
                    <div style="font-size:10px;">SAAT: <b id="mardin-time" style="color:var(--mardin)">--:--</b></div>
                </div>
            </div>
            <div class="v-container">
                <div class="v-box"><iframe src="https://www.youtube.com/embed/E6Ndg4pvLh8?autoplay=1&mute=1&loop=1&playlist=E6Ndg4pvLh8&controls=0"></iframe></div>
                <div class="weather-info">
                    <div style="font-weight:900; font-size:9px; letter-spacing:1px;">Manaus, BR</div>
                    <div style="font-size:10px;">SAAT: <b id="brazil-time" style="color:var(--mardin)">--:--</b></div>
                </div>
            </div>
        </div>
    </div>

    <div class="interview-overlay" id="overlay">
        <div class="close-interview" onclick="closeInterview()">KAPAT [X]</div>
        <div style="max-width: 800px; margin: 50px auto;">
            <h1 style="font-family: 'Playfair Display'; font-size: 3rem;">Küratör Arşivi</h1>
            <p style="font-family: 'Lora'; font-size: 1.2rem; line-height: 1.8; margin-top: 30px;">Makaleler ve derin okumalar burada listelenecek.</p>
        </div>
    </div>

    <script>
        function openInterview() { document.getElementById('overlay').classList.add('active'); document.body.style.overflow = 'hidden'; }
        function closeInterview() { document.getElementById('overlay').classList.remove('active'); document.body.style.overflow = 'auto'; }
        function updateClocks() {
            const options = { hour: '2-digit', minute: '2-digit', hour12: false };
            document.getElementById('mardin-time').innerText = new Intl.DateTimeFormat('tr-TR', { ...options, timeZone: 'Europe/Istanbul' }).format(new Date());
            document.getElementById('brazil-time').innerText = new Intl.DateTimeFormat('pt-BR', { ...options, timeZone: 'America/Manaus' }).format(new Date());
        }
        setInterval(updateClocks, 1000); updateClocks();
    </script>
</body>
</html>
