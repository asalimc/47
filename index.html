<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MB | Ahmet Çınarbaş - The Grand Archive 2026</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,700;0,6..96,900;1,6..96,400&family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #F8F6F2; --ink: #1A1A1A; --accent: #B08D57; --white: #FFFFFF; --red: #B22222;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--ink); font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }

        header {
            padding: 15px 6%; display: flex; justify-content: space-between; align-items: center;
            position: fixed; width: 100%; top: 0; z-index: 1000;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .container { max-width: 1400px; margin: 100px auto; padding: 0 5%; }
        .bento { display: grid; grid-template-columns: repeat(6, 1fr); gap: 20px; }
        
        @media (max-width: 900px) {
            .bento { display: flex; flex-direction: column; }
            .card { min-height: 400px !important; }
        }

        .card {
            background: var(--white); border-radius: 30px; min-height: 500px;
            position: relative; overflow: hidden; cursor: pointer;
            display: flex; flex-direction: column; justify-content: flex-end; padding: 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03); transition: all 0.5s ease;
        }
        .card:hover { transform: translateY(-8px); }
        
        .card-full { grid-column: span 6; }
        .card-wide { grid-column: span 4; }
        .card-medium { grid-column: span 3; }
        .card-small { grid-column: span 2; }

        .card-bg { position: absolute; inset: 0; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: 0; transition: transform 1s ease; }
        .card-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.9) 10%, transparent 70%); z-index: 1; }
        .card-content { position: relative; z-index: 2; color: white; }

        .art-main { font-family: 'Bodoni Moda', serif; font-size: 3rem; font-weight: 900; color: var(--ink); }
        .art-sub { font-family: 'Bodoni Moda', serif; font-size: 1.8rem; font-style: italic; color: var(--accent); opacity: 0.5; margin-top: -10px; display: block; }

        /* Reader Modal */
        #reader { position: fixed; inset: 0; background: var(--bg); z-index: 99999; display: none; overflow-y: auto; }
        .hero-section { width: 100%; height: 60vh; position: relative; }
        .hero-section img { width: 100%; height: 100%; object-fit: cover; }
        .hero-mask { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, var(--bg)); }
        
        .modal-body { max-width: 1200px; margin: -80px auto 0; position: relative; z-index: 10; padding: 0 5% 100px; }
        
        .comparison-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        @media (max-width: 768px) { .comparison-grid { grid-template-columns: 1fr; } }

        .text-box { 
            background: white; padding: 40px; border-radius: 30px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            line-height: 2; font-size: 1.15rem; text-align: justify;
        }
        .text-box h3 { margin-bottom: 15px; font-size: 0.9rem; letter-spacing: 2px; color: var(--accent); border-bottom: 1px solid #eee; padding-bottom: 10px; }

        .close-btn { position: fixed; top: 25px; right: 25px; background: var(--ink); color: white; border: none; width: 60px; height: 60px; border-radius: 50%; z-index: 100000; cursor: pointer; font-size: 1.5rem; }

        .footer-seal { width: 120px; height: 120px; background: var(--red); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 60px auto; font-weight: 900; }
        
        b { color: var(--red); }
    </style>
</head>
<body>

    <header>
        <div style="font-family: 'Bodoni Moda', serif; font-size: 1.5rem; font-weight: 900;">MB</div>
        <div id="locale-tag" style="font-size: 0.6rem; font-weight: 800; letter-spacing: 2px; color: var(--accent);">STATION: ONLINE</div>
    </header>

    <main class="container">
        <div class="bento">
            
            <div class="card card-full" onclick="openReader('author')" style="background: white; justify-content: center; align-items: center;">
                <img src="https://pbs.twimg.com/media/GifApT2XEAAqees.jpg" style="width: 150px; height: 150px; border-radius: 50%; object-fit: cover; margin-bottom: 20px; border: 5px solid var(--bg);">
                <div class="art-title-wrap">
                    <h1 class="art-main">Ahmet Çınarbaş</h1>
                    <span class="art-sub">Arquiteto das Almas</span>
                </div>
            </div>

            <div class="card card-wide" onclick="openReader('sports')">
                <div class="card-bg" style="background-image: url('https://img.r7.com/images/2014/05/13/edn1es433_v9wa0wesj_file.jpg')"></div>
                <div class="card-overlay"></div>
                <div class="card-content">
                    <h2 style="font-family: 'Bodoni Moda'; font-size: 2rem;">Tozun ve Terin Kardeşliği</h2>
                    <p>Mardin 1969 & Maracanã Spirits</p>
                </div>
            </div>

            <div class="card card-small" onclick="openReader('silver')">
                <div class="card-bg" style="background-image: url('https://images.unsplash.com/photo-1610555356070-d0efb6505f81?q=80&w=800')"></div>
                <div class="card-overlay"></div>
                <div class="card-content">
                    <h2 style="font-family: 'Bodoni Moda'; font-size: 1.5rem;">Gümüşün Sabrı</h2>
                </div>
            </div>

            <div class="card card-medium" onclick="openReader('cinema')">
                <div class="card-bg" style="background-image: url('https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=1200')"></div>
                <div class="card-overlay"></div>
                <div class="card-content">
                    <h2 style="font-family: 'Bodoni Moda'; font-size: 1.8rem;">Sessizliğin Sineması</h2>
                </div>
            </div>

            <div class="card card-medium" onclick="openReader('faith')">
                <div class="card-bg" style="background-image: url('https://images.unsplash.com/photo-1548625361-394ef3226a31?q=80&w=1200')"></div>
                <div class="card-overlay"></div>
                <div class="card-content">
                    <h2 style="font-family: 'Bodoni Moda'; font-size: 1.8rem;">İnanç ve Ritüel</h2>
                </div>
            </div>

            <div class="card card-wide" onclick="openReader('architecture')">
                <div class="card-bg" style="background-image: url('https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=1200')"></div>
                <div class="card-overlay"></div>
                <div class="card-content">
                    <h2 style="font-family: 'Bodoni Moda'; font-size: 2rem;">Mimarinin Hafızası</h2>
                </div>
            </div>

             <div class="card card-medium" onclick="openReader('food')">
                <div class="card-bg" style="background-image: url('https://www.receitasdemae.com.br/wp-content/uploads/2008/07/Quibe-frito.jpg')"></div>
                <div class="card-overlay"></div>
                <div class="card-content">
                    <h2 style="font-family: 'Bodoni Moda'; font-size: 1.8rem;">İrok'tan Quibe'ye</h2>
                </div>
            </div>

            <div class="card card-medium" onclick="openReader('carnival')">
                <div class="card-bg" style="background-image: url('https://images.unsplash.com/photo-1596707447291-38e9c4d92b8d?q=80&w=800')"></div>
                <div class="card-overlay"></div>
                <div class="card-content">
                    <h2 style="font-family: 'Bodoni Moda'; font-size: 1.8rem;">Rio'da Mardin Rüzgarı</h2>
                </div>
            </div>

        </div>
    </main>

    <div id="reader">
        <button class="close-btn" onclick="closeReader()">✕</button>
        <div id="modal-content"></div>
    </div>

    <script>
        const archive = {
            author: {
                title: "Ahmet Çınarbaş: İki Dünyanın Eşiğinde",
                tr: `Ahmet Çınarbaş, Mezopotamya’nın kadim taşlarından aldığı ilhamı Brezilya’nın vahşi doğasıyla harmanlayan bir <b>estetik küratördür</b>. Onun gözünde Mardin'in bir 'abbara'sı, Rio de Janeiro'nun bir 'beco'su ile aynı sırları fısıldar. Yazıları; hüzün, keder ve bitmek bilmeyen bir umudun manifestosudur.`,
                pt: `Ahmet Çınarbaş é um curador estético que mistura a inspiração das pedras antigas da Mesopotâmia com a natureza selvagem do Brasil. Para ele, uma 'abbara' de Mardin sussurra os mesmos segredos que um 'beco' do Rio de Janeiro.`
            },
            sports: {
                title: "Tozun ve Terin Kardeşliği: Mardin 1969 & Rio",
                tr: `Mart 2026: Mardin 1969 Spor, 55 puanla zirve mücadelesinde! 5-0'lık Adanaspor galibiyeti sonrası 'Beleş Tepe' amcaları ile Rio favela çocukları aynı ruhla top koşturuyor. Bu, yoksulluğun içinden fışkıran bir asalet hikayesidir.`,
                pt: `Março de 2026: Mardin 1969 Spor luta pelo topo com 55 pontos! Após a vitória de 5 a 0 sobre o Adanaspor, os anciãos de Mardin e as crianças das favelas do Rio jogam com a mesma alma.`
            },
            silver: {
                title: "Gümüşün Sabrı: Telkari & Amazonia",
                tr: `Mardin’in Telkarisi, gümüş teli bir dantel gibi işleyen bin yıllık sabırdır. Amazon ormanlarında tohumları ipe dizen yerli kadınlarla aynı kutsal dikkati paylaşırlar.`,
                pt: `A Filigrana de Mardin é a paciência milenar que trabalha o fio de prata como renda. Compartilham a mesma atenção sagrada que as mulheres indígenas da Amazônia.`
            },
            cinema: {
                title: "Sessizliğin Sineması: Mardin & Rio",
                tr: `Mardin bir 'Sessiz Sinema' setidir; her taşı bir karedir. Rio ise 'Cidade de Deus' ruhuyla aksiyon dolu bir avangart yapımdır. İkisinde de yönetmen kaderdir.`,
                pt: `Mardin é um set de 'Cinema Mudo'; cada pedra é um frame. O Rio, com o espírito de 'Cidade de Deus', é uma produção de vanguarda cheia de ação.`
            },
            faith: {
                title: "İnanç ve Ritüel: Kırklar & Cristo Redentor",
                tr: `Kırklar Kilisesi’nden yükselen Süryani duaları, Rio’daki Kurtarıcı İsa heykelinin açtığı kollarda yankılanır. İnancın coğrafyası yoktur, sadece ritmi vardır.`,
                pt: `As orações siríacas da Igreja dos Quarenta ecoam nos braços abertos do Cristo Redentor. A fé não tem geografia, apenas ritmo.`
            },
            architecture: {
                title: "Mimarinin Hafızası: Taş Evler & Favelalar",
                tr: `Mardin’in saygılı taş evleri mimarinin ahlakıdır; Rio’nun kenetlenmiş favelaları ise hayatta kalma çığlığıdır. İkisi de insan kederini koruyan bir kabuktur.`,
                pt: `As casas de pedra de Mardin são a moral da arquitetura; as favelas do Rio são o grito de sobrevivência. Ambas são cascas que protegem a dor humana.`
            },
            food: {
                title: "Gastronomi: İrok'tan Quibe'ye",
                tr: `Mardin’in İrok'u (İçli Köfte), okyanusu aşıp Brezilya plajlarında 'Quibe' olmuştur. Lezzetlerin pasaporta ihtiyacı yoktur.`,
                pt: `O Irok de Mardin cruzou o oceano e tornou-se o 'Quibe' nas praias brasileiras. Sabores não precisam de passaporte.`
            },
            carnival: {
                title: "Rio'da Mardin Rüzgarı",
                tr: `Rio Karnavalı'nın surdo davulları ile Mardin düğünlerindeki erbane sesleri aynı kalp atışıdır. Biri patlama, diğeri bin yıllık yankıdır.`,
                pt: `Os tambores surdo do Carnaval do Rio e os sons de erbane nos casamentos de Mardin são o mesmo batimento cardíaco.`
            }
        };

        function openReader(key) {
            const data = archive[key];
            const modal = document.getElementById('modal-content');
            const isMobile = window.innerWidth <= 768;
            const userLang = navigator.language.startsWith('tr') ? 'tr' : 'pt';

            let bodyHtml = "";

            if (isMobile) {
                // MOBİLDE SADECE TEK DİL
                bodyHtml = `
                    <div class="text-box">
                        <h3>${userLang === 'tr' ? 'ANALİZ // TR' : 'ANÁLISE // PT'}</h3>
                        <p>${data[userLang]}</p>
                    </div>`;
            } else {
                // PC VE TABLETTE İKİ DİL YAN YANA
                bodyHtml = `
                    <div class="comparison-grid">
                        <div class="text-box">
                            <h3>ANALİZ // TÜRKÇE</h3>
                            <p>${data.tr}</p>
                        </div>
                        <div class="text-box" style="border-left: 4px solid var(--accent);">
                            <h3>ANÁLISE // PORTUGUÊS</h3>
                            <p>${data.pt}</p>
                        </div>
                    </div>`;
            }

            modal.innerHTML = `
                <div class="hero-section">
                    <img src="${document.querySelector(`[onclick="openReader('${key}')"] .card-bg`)?.style.backgroundImage.slice(5, -2) || 'https://images.unsplash.com/photo-1455390582262-044cdead277a?q=80&w=1600'}">
                    <div class="hero-mask"></div>
                </div>
                <div class="modal-body">
                    <h1 style="font-family:'Bodoni Moda'; font-size:3rem; margin-bottom:30px; color:var(--ink); text-align:center;">${data.title}</h1>
                    ${bodyHtml}
                    <div class="footer-seal">ASC 2026</div>
                </div>
            `;
            document.getElementById('reader').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeReader() {
            document.getElementById('reader').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
