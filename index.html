<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSP Global | Local Media Integrated</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --main-dark: #0f172a; --accent: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; scroll-behavior: smooth; }
        .msp-title { font-family: 'Playfair Display', serif; }
        .view-node { display: none; }
        .active-view { display: block; animation: fadeUp 0.3s ease; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .admin-sidebar { height: calc(100vh - 4rem); position: sticky; top: 4rem; }
        .img-preview { width: 100%; h: 150px; object-fit: cover; border-radius: 1rem; margin-bottom: 1rem; display: none; border: 2px solid #e2e8f0; }
    </style>
</head>
<body class="text-slate-900 overflow-x-hidden">

    <header class="h-16 bg-white border-b sticky top-0 z-[100] flex items-center shadow-sm">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <div onclick="router('home')" class="cursor-pointer">
                <h1 class="text-xl font-black text-slate-900 tracking-tighter uppercase">MSP<span class="text-red-600">.</span>GLOBAL</h1>
            </div>
            <div class="flex items-center gap-4">
                <div id="lang-tag" class="text-[10px] font-bold px-2 py-1 rounded border uppercase">TR</div>
                <button onclick="router('admin')" class="bg-slate-900 text-white text-[10px] font-black px-4 py-2 rounded-full hover:bg-blue-600 transition shadow-lg">YÖNETİM PANELİ</button>
            </div>
        </div>
    </header>

    <main id="view-home" class="view-node active-view container mx-auto px-4 py-8">
        <div class="grid grid-cols-12 gap-6">
            <div class="col-span-12 lg:col-span-8 space-y-8">
                <div id="dynamic-news" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    </div>
            </div>
            <div class="col-span-12 lg:col-span-4 space-y-6">
                <div id="home-ad-box" class="rounded-[2rem] overflow-hidden shadow-lg"></div>
                <div class="bg-white p-8 rounded-[2rem] shadow-sm border">
                    <h3 class="text-xs font-black uppercase text-slate-400 mb-6 tracking-widest border-l-4 border-blue-900 pl-3">Elit Yazarlar</h3>
                    <div id="home-authors" class="space-y-4"></div>
                </div>
            </div>
        </div>
    </main>

    <main id="view-detail" class="view-node container mx-auto px-4 py-12 max-w-4xl">
        <div class="flex flex-wrap gap-4 justify-between items-center mb-8">
            <button onclick="router('home')" class="text-xs font-black uppercase text-slate-500 hover:text-red-600 transition">← Ana Sayfa</button>
            <div class="flex items-center gap-2 bg-white p-2 rounded-2xl shadow-sm">
                <button onclick="changeFontSize(-2)" class="px-3 py-1 bg-slate-100 rounded-lg text-xs">-</button>
                <button onclick="changeFontSize(2)" class="px-3 py-1 bg-slate-100 rounded-lg text-xs">+</button>
                <button id="btn-audio" onclick="toggleAudio()" class="bg-blue-600 text-white px-4 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest">SESLİ DİNLE</button>
            </div>
        </div>
        <article class="space-y-6">
            <h1 id="det-h1" class="msp-title text-4xl lg:text-6xl font-black text-slate-900 leading-tight"></h1>
            <div class="flex items-center gap-3 border-y py-4 italic text-slate-500 text-sm">
                <img id="det-auth-img" src="" class="w-10 h-10 rounded-full object-cover shadow">
                <span id="det-auth-name" class="font-bold text-blue-900"></span> • MSP Global Özel İçerik
            </div>
            <img id="det-big-img" src="" class="w-full rounded-[2.5rem] shadow-2xl border-4 border-white">
            <div id="det-body" class="text-lg leading-relaxed text-slate-700 space-y-6"></div>
        </article>
    </main>

    <main id="view-admin" class="view-node min-h-screen bg-[#0f172a] text-slate-300">
        <div class="flex flex-col lg:flex-row">
            <aside class="w-full lg:w-64 bg-slate-900 p-6 flex flex-col gap-2 admin-sidebar border-r border-slate-800">
                <button onclick="setMod('haber')" class="flex items-center gap-3 p-4 hover:bg-blue-600/20 rounded-2xl transition text-sm font-bold"><i class="fas fa-newspaper text-blue-500"></i> Haberler</button>
                <button onclick="setMod('yazar')" class="flex items-center gap-3 p-4 hover:bg-emerald-600/20 rounded-2xl transition text-sm font-bold"><i class="fas fa-user-tie text-emerald-500"></i> Yazarlar</button>
                <button onclick="setMod('reklam')" class="flex items-center gap-3 p-4 hover:bg-amber-600/20 rounded-2xl transition text-sm font-bold"><i class="fas fa-ad text-amber-500"></i> Reklamlar</button>
                <div class="mt-auto pt-6 border-t border-slate-800">
                    <button onclick="router('home')" class="w-full p-4 bg-slate-800 rounded-2xl text-[10px] font-black uppercase tracking-widest">Siteye Dön</button>
                </div>
            </aside>

            <section class="flex-1 p-6 lg:p-12 overflow-y-auto h-screen custom-scroll">
                <div class="flex justify-between items-center mb-10">
                    <h2 id="mod-title" class="text-4xl font-black text-white italic tracking-tighter uppercase">Haber Yönetimi</h2>
                    <button onclick="openModal()" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-black text-xs uppercase shadow-xl hover:scale-105 transition-all">+ YENİ EKLE</button>
                </div>

                <div class="bg-slate-900 rounded-[2.5rem] border border-slate-800 overflow-hidden shadow-2xl">
                    <table class="w-full text-left">
                        <thead class="bg-slate-800/50 text-slate-500 text-[10px] uppercase font-black tracking-[0.2em]">
                            <tr><th class="p-6">Görsel</th><th class="p-6">Başlık / İsim</th><th class="p-6">Durum</th><th class="p-6 text-right">İşlemler</th></tr>
                        </thead>
                        <tbody id="admin-table-body" class="divide-y divide-slate-800"></tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 z-[200] bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-xl rounded-[3rem] p-8 lg:p-10 shadow-2xl relative max-h-[90vh] overflow-y-auto">
            <h3 id="modal-head" class="text-3xl font-black mb-8 italic text-slate-900">İçerik Ekle</h3>
            <div id="modal-form" class="space-y-4"></div>
            <div class="mt-8 flex gap-3">
                <button onclick="closeModal()" class="flex-1 bg-slate-100 text-slate-500 py-4 rounded-2xl font-bold text-xs uppercase">Vazgeç</button>
                <button onclick="saveFromModal()" class="flex-[2] bg-blue-600 text-white py-4 rounded-2xl font-black text-xs uppercase shadow-xl">YAYINLA</button>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('msp_local_v1')) || {
            haber: [], yazar: [], reklam: []
        };
        let activeMod = 'haber';
        let editId = null;
        let tempImg = "";

        function router(id) {
            document.querySelectorAll('.view-node').forEach(v => v.classList.remove('active-view'));
            document.getElementById('view-' + id).classList.add('active-view');
            window.scrollTo(0,0);
            if(id === 'home') renderHome();
            if(id === 'admin') renderAdmin();
        }

        function setMod(m) {
            activeMod = m;
            document.getElementById('mod-title').innerText = m.toUpperCase() + " MODÜLÜ";
            renderAdmin();
        }

        // --- LOCAL IMAGE HANDLER (Base64) ---
        function handleFile(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                tempImg = reader.result;
                const prev = document.getElementById('p-preview');
                prev.src = tempImg;
                prev.style.display = 'block';
            };
            if (file) reader.readAsDataURL(file);
        }

        // --- ADMIN ENGINE ---
        function renderAdmin() {
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = '';
            db[activeMod].forEach(item => {
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-800/30 transition">
                        <td class="p-6"><img src="${item.resim || ''}" class="w-12 h-12 rounded-xl object-cover bg-slate-800"></td>
                        <td class="p-6 font-bold text-white text-sm">${item.baslik || item.isim}</td>
                        <td class="p-6"><span class="text-[9px] bg-emerald-500/10 text-emerald-500 px-2 py-1 rounded-full font-black uppercase">Yayında</span></td>
                        <td class="p-6 text-right space-x-3">
                            <button onclick="editItem(${item.id})" class="text-blue-400 hover:text-white"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteItem(${item.id})" class="text-red-500 hover:text-white"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });
        }

        function buildForm(existing = {}) {
            const form = document.getElementById('modal-form');
            tempImg = existing.resim || "";
            form.innerHTML = `
                <div class="space-y-4 text-sm font-bold text-slate-400">
                    <p class="uppercase text-[10px] tracking-widest">Görsel Seçimi (PC'den)</p>
                    <img id="p-preview" src="${tempImg}" class="img-preview" style="${tempImg ? 'display:block' : ''}">
                    <input type="file" onchange="handleFile(event)" class="w-full bg-slate-50 p-4 rounded-2xl border-2 border-dashed">
                    
                    <input id="f-title" type="text" placeholder="${activeMod === 'yazar' ? 'Yazar İsmi' : 'Başlık'}" value="${existing.baslik || existing.isim || ''}" class="w-full bg-slate-50 p-4 rounded-2xl border outline-none text-slate-900">
                    
                    ${activeMod !== 'yazar' ? `<textarea id="f-text" placeholder="İçerik Metni" class="w-full bg-slate-50 p-4 rounded-2xl border h-32 text-slate-900 outline-none">${existing.icerik || ''}</textarea>` : 
                    `<input id="f-bio" type="text" placeholder="Kısa Biyografi" value="${existing.bio || ''}" class="w-full bg-slate-50 p-4 rounded-2xl border text-slate-900 outline-none">`}
                </div>
            `;
        }

        function saveFromModal() {
            const titleVal = document.getElementById('f-title').value;
            let obj = { 
                id: editId || Date.now(), 
                resim: tempImg 
            };

            if(activeMod === 'yazar') {
                obj.isim = titleVal;
                obj.bio = document.getElementById('f-bio').value;
            } else {
                obj.baslik = titleVal;
                obj.icerik = document.getElementById('f-text').value;
            }

            if(editId) {
                const idx = db[activeMod].findIndex(x => x.id === editId);
                db[activeMod][idx] = obj;
            } else {
                db[activeMod].unshift(obj);
            }

            localStorage.setItem('msp_local_v1', JSON.stringify(db));
            closeModal();
            renderAdmin();
        }

        // --- PORTAL ENGINE ---
        function renderHome() {
            const newsGrid = document.getElementById('dynamic-news');
            const authGrid = document.getElementById('home-authors');
            const adBox = document.getElementById('home-ad-box');

            newsGrid.innerHTML = '';
            db.haber.forEach((h, i) => {
                newsGrid.innerHTML += `
                    <div onclick="openNews(${i})" class="bg-white p-6 rounded-[2.5rem] shadow-sm hover:shadow-2xl transition-all cursor-pointer group border border-slate-50">
                        <img src="${h.resim}" class="w-full h-48 object-cover rounded-3xl mb-6 group-hover:scale-95 transition-transform duration-500 shadow-md">
                        <h4 class="font-black text-xl leading-tight text-slate-800 group-hover:text-blue-600 transition">${h.baslik}</h4>
                        <p class="text-xs text-slate-500 mt-4 line-clamp-3 leading-relaxed">${h.icerik}</p>
                    </div>
                `;
            });

            authGrid.innerHTML = '';
            db.yazar.forEach(a => {
                authGrid.innerHTML += `<div class="flex items-center gap-4 p-2 hover:bg-slate-50 rounded-2xl transition"><img src="${a.resim}" class="w-12 h-12 rounded-2xl object-cover shadow-sm"><div><p class="text-xs font-black uppercase text-slate-900">${a.isim}</p><p class="text-[9px] text-slate-400 font-bold uppercase mt-0.5">${a.bio}</p></div></div>`;
            });

            if(db.reklam.length > 0) {
                const ad = db.reklam[0];
                adBox.innerHTML = `<img src="${ad.resim}" class="w-full h-full object-cover"><div class="absolute inset-0 bg-blue-900/40 p-8 flex flex-col justify-end text-white"><span class="text-[9px] font-black uppercase tracking-widest mb-2">Sponsorlu</span><h3 class="msp-title text-3xl italic">${ad.baslik}</h3></div>`;
            }
        }

        function openNews(idx) {
            const h = db.haber[idx];
            document.getElementById('det-h1').innerText = h.baslik;
            document.getElementById('det-body').innerText = h.icerik;
            document.getElementById('det-big-img').src = h.resim;
            const y = db.yazar[0] || { isim: 'MSP Editor', resim: '' };
            document.getElementById('det-auth-name').innerText = y.isim;
            document.getElementById('det-auth-img').src = y.resim;
            router('detail');
        }

        // Yardımcı Fonksiyonlar
        function openModal() { editId = null; buildForm(); document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function deleteItem(id) { if(confirm('Veriyi sil?')) { db[activeMod] = db[activeMod].filter(x=>x.id!==id); localStorage.setItem('msp_local_v1', JSON.stringify(db)); renderAdmin(); }}
        function editItem(id) { editId = id; const itm = db[activeMod].find(x=>x.id===id); buildForm(itm); document.getElementById('modal').classList.remove('hidden'); }
        function changeFontSize(d) { let b=document.getElementById('det-body'); let s=parseInt(window.getComputedStyle(b).fontSize); b.style.fontSize=(s+d)+'px'; }
        function toggleAudio() { if(speechSynthesis.speaking){speechSynthesis.cancel(); document.getElementById('btn-audio').innerText="SESLİ DİNLE";}else{let u=new SpeechSynthesisUtterance(document.getElementById('det-body').innerText); u.lang='tr-TR'; speechSynthesis.speak(u); document.getElementById('btn-audio').innerText="DURDUR"; u.onend=()=>document.getElementById('btn-audio').innerText="SESLİ DİNLE";}}

        window.onload = () => { renderHome(); document.getElementById('lang-tag').innerText = navigator.language.split('-')[0].toUpperCase(); };
    </script>
</body>
</html>
