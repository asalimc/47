<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERIDIAN GLOBAL | Full CMS Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --m-orange: #f59e0b; --m-dark: #0f172a; --gold: linear-gradient(45deg, #d4af37, #f7e7ce, #b8860b); }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; overflow-x: hidden; }
        .meridian-font { font-family: 'Orbitron', sans-serif; }
        .header-author-circle {
            width: 60px; height: 60px; padding: 3px; background: var(--gold);
            border-radius: 50%; cursor: pointer; transition: 0.3s; flex-shrink: 0;
        }
        .header-author-circle:hover { transform: scale(1.1); rotate: 5deg; }
        .header-author-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #000; }
        .view-node { display: none; }
        .active-view { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass-card { background: white; border-radius: 2rem; border: 1px solid rgba(0,0,0,0.05); transition: 0.3s; }
        .glass-card:hover { box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="bg-[#f59e0b] h-10 flex items-center justify-center shadow-lg">
        <p class="meridian-font text-[10px] font-black tracking-[0.4em] text-black uppercase">Brasília - Mardin Intelligence Bridge</p>
    </div>

    <header class="bg-white/90 backdrop-blur-md border-b sticky top-0 z-[100]">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
            <div onclick="router('home')" class="cursor-pointer flex items-center gap-2">
                <div class="bg-black text-white w-10 h-10 flex items-center justify-center rounded-xl meridian-font text-xl">M</div>
                <h1 class="font-black text-2xl tracking-tighter text-slate-900">MSP<span class="text-orange-500">.</span>GLOBAL</h1>
            </div>
            <div id="h-authors" class="flex gap-4 overflow-x-auto no-scrollbar max-w-md md:max-w-xl py-2"></div>
            <button onclick="router('admin')" class="bg-black text-white px-8 py-3 rounded-full text-[10px] font-black uppercase hover:bg-orange-500 transition shadow-lg">YÖNETİM PANELİ</button>
        </div>
        <nav class="bg-slate-50 border-t overflow-x-auto no-scrollbar">
            <div id="h-cats" class="max-w-7xl mx-auto px-4 flex gap-8 py-3 text-[10px] font-black uppercase tracking-widest text-slate-400"></div>
        </nav>
    </header>

    <main id="view-home" class="view-node active-view max-w-7xl mx-auto px-4 py-10">
        <div id="news-flow" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <main id="view-admin" class="view-node min-h-screen bg-slate-950 text-white">
        <div class="flex flex-col md:flex-row min-h-screen">
            <nav class="w-full md:w-64 bg-black p-8 space-y-4 border-r border-white/5">
                <p class="text-[9px] font-black text-slate-600 uppercase tracking-widest mb-6">Master Control</p>
                <button onclick="setTab('cat')" id="t-cat" class="w-full text-left p-4 rounded-2xl font-bold text-xs uppercase hover:bg-orange-500 transition">Kategoriler</button>
                <button onclick="setTab('yazar')" id="t-yazar" class="w-full text-left p-4 rounded-2xl font-bold text-xs uppercase hover:bg-orange-500 transition">Yazarlar</button>
                <button onclick="setTab('haber')" id="t-haber" class="w-full text-left p-4 rounded-2xl font-bold text-xs uppercase hover:bg-orange-500 transition">Köşe Yazıları</button>
                <div class="pt-10"><button onclick="router('home')" class="w-full bg-white/10 p-4 rounded-2xl text-[10px] font-black uppercase">Portala Dön</button></div>
            </nav>
            <section class="flex-1 p-6 md:p-12">
                <div class="flex justify-between items-center mb-12">
                    <h2 id="adm-title" class="text-3xl font-black italic uppercase">Modül</h2>
                    <button onclick="openModal()" class="bg-orange-500 text-black px-8 py-4 rounded-2xl font-black text-xs hover:scale-105 transition">+ YENİ EKLE</button>
                </div>
                <div id="adm-list" class="grid grid-cols-1 gap-4"></div>
            </section>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 z-[200] bg-black/95 backdrop-blur-xl flex items-center justify-center p-4 hidden">
        <div class="bg-white text-black w-full max-w-2xl rounded-[3rem] p-10 shadow-2xl overflow-y-auto max-h-[90vh]">
            <h3 id="modal-title" class="text-2xl font-black mb-8 border-b pb-4">Veri Yönetimi</h3>
            <div id="m-fields" class="space-y-4"></div>
            <div class="mt-10 flex gap-4">
                <button onclick="closeModal()" class="flex-1 font-bold text-slate-400">İPTAL</button>
                <button onclick="saveData()" class="flex-[2] bg-black text-white p-5 rounded-2xl font-black uppercase text-xs">SİSTEME KAYDET</button>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('meridian_db_v3')) || {
            cats: [{id: 'c1', name: 'Mardin Strateji'}],
            yazarlar: [{id: 'y1', isim: 'Ahmet Çınarbaş', unvan: 'Analist', img: 'https://i.pravatar.cc/150?u=1'}],
            haberler: [{id: 'h1', cid: 'c1', yid: 'y1', title: 'Global Köprü', text: 'İçerik...', img: '', date: '02.03.2026'}]
        };

        let activeTab = 'cat';
        let editId = null;
        let tempImg = "";

        function router(v) {
            document.querySelectorAll('.view-node').forEach(n => n.classList.remove('active-view'));
            document.getElementById('view-'+v).classList.add('active-view');
            if(v==='home') renderPortal();
            if(v==='admin') renderAdmin();
        }

        function setTab(t) {
            activeTab = t;
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('bg-orange-500', 'text-black'));
            if(document.getElementById('t-'+t)) document.getElementById('t-'+t).classList.add('bg-orange-500', 'text-black');
            document.getElementById('adm-title').innerText = t === 'cat' ? 'Kategoriler' : (t === 'haber' ? 'Köşe Yazıları' : 'Yazarlar');
            renderAdmin();
        }

        function processImg(e) {
            const r = new FileReader();
            r.onload = () => { tempImg = r.result; document.getElementById('p-img').src = tempImg; document.getElementById('p-img').classList.remove('hidden'); };
            r.readAsDataURL(e.target.files[0]);
        }

        function renderAdmin() {
            const list = document.getElementById('adm-list');
            list.innerHTML = '';
            let data = activeTab === 'cat' ? db.cats : (activeTab === 'haber' ? db.haberler : db.yazarlar);

            data.forEach(item => {
                list.innerHTML += `
                <div class="bg-white/5 border border-white/10 p-5 rounded-3xl flex items-center justify-between group">
                    <div class="flex items-center gap-4">
                        ${item.img ? `<img src="${item.img}" class="w-12 h-12 rounded-xl object-cover">` : '<div class="w-12 h-12 bg-orange-500 rounded-xl flex items-center justify-center text-black font-bold">#</div>'}
                        <div>
                            <p class="font-bold text-lg">${item.name || item.title || item.isim}</p>
                            ${item.yid ? `<p class="text-[10px] text-orange-500 font-bold uppercase">Yazar: ${db.yazarlar.find(y=>y.id===item.yid)?.isim}</p>` : ''}
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="openModal('${item.id}')" class="bg-blue-500/20 text-blue-400 px-4 py-2 rounded-xl text-[10px] font-black">DÜZENLE</button>
                        <button onclick="deleteItem('${item.id}')" class="bg-red-500/20 text-red-500 px-4 py-2 rounded-xl text-[10px] font-black">SİL</button>
                    </div>
                </div>`;
            });
        }

        function openModal(id = null) {
            editId = id;
            tempImg = "";
            const f = document.getElementById('m-fields');
            let item = id ? (activeTab === 'cat' ? db.cats : activeTab === 'yazar' ? db.yazarlar : db.haberler).find(x=>x.id===id) : null;
            if(item) tempImg = item.img || "";

            if(activeTab === 'cat') {
                f.innerHTML = `<input id="f-name" type="text" value="${item?item.name:''}" placeholder="Kategori Adı" class="w-full p-5 bg-slate-100 rounded-2xl font-bold">`;
            } else if(activeTab === 'yazar') {
                f.innerHTML = `
                <div class="h-32 bg-slate-100 rounded-2xl flex items-center justify-center relative border-2 border-dashed">
                    <img id="p-img" src="${tempImg}" class="absolute inset-0 w-full h-full object-cover ${tempImg?'':'hidden'}">
                    <input type="file" onchange="processImg(event)" class="absolute inset-0 opacity-0 cursor-pointer">
                    <span class="text-[10px] font-black opacity-40">FOTOĞRAF DEĞİŞTİR / SEÇ</span>
                </div>
                <input id="f-isim" type="text" value="${item?item.isim:''}" placeholder="İsim Soyisim" class="w-full p-5 bg-slate-100 rounded-2xl font-bold">
                <input id="f-unvan" type="text" value="${item?item.unvan:''}" placeholder="Ünvan" class="w-full p-5 bg-slate-100 rounded-2xl font-bold">`;
            } else {
                let cOpts = db.cats.map(c => `<option value="${c.id}" ${item?.cid===c.id?'selected':''}>${c.name}</option>`).join('');
                let yOpts = db.yazarlar.map(y => `<option value="${y.id}" ${item?.yid===y.id?'selected':''}>${y.isim}</option>`).join('');
                f.innerHTML = `
                <div class="h-32 bg-slate-100 rounded-2xl flex items-center justify-center relative border-2 border-dashed">
                    <img id="p-img" src="${tempImg}" class="absolute inset-0 w-full h-full object-cover ${tempImg?'':'hidden'}">
                    <input type="file" onchange="processImg(event)" class="absolute inset-0 opacity-0 cursor-pointer">
                    <span class="text-[10px] font-black opacity-40">YAZI GÖRSELİ SEÇ</span>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <select id="f-cid" class="w-full p-5 bg-slate-100 rounded-2xl font-bold">${cOpts}</select>
                    <select id="f-yid" class="w-full p-5 bg-slate-100 rounded-2xl font-bold">${yOpts}</select>
                </div>
                <input id="f-title" type="text" value="${item?item.title:''}" placeholder="Yazı Başlığı" class="w-full p-5 bg-slate-100 rounded-2xl font-bold">
                <textarea id="f-text" placeholder="Köşe Yazısı İçeriği..." class="w-full p-5 bg-slate-100 rounded-2xl h-32">${item?item.text:''}</textarea>`;
            }
            document.getElementById('modal').classList.remove('hidden');
        }

        function saveData() {
            let list = activeTab === 'cat' ? db.cats : (activeTab === 'yazar' ? db.yazarlar : db.haberler);
            let item = editId ? list.find(x=>x.id===editId) : { id: 'ID' + Date.now() };

            if(activeTab === 'cat') { item.name = document.getElementById('f-name').value; }
            else if(activeTab === 'yazar') { 
                item.isim = document.getElementById('f-isim').value; 
                item.unvan = document.getElementById('f-unvan').value; 
                item.img = tempImg; 
            } else {
                item.cid = document.getElementById('f-cid').value;
                item.yid = document.getElementById('f-yid').value;
                item.title = document.getElementById('f-title').value;
                item.text = document.getElementById('f-text').value;
                item.img = tempImg; item.date = new Date().toLocaleDateString();
            }

            if(!editId) list.push(item);
            localStorage.setItem('meridian_db_v3', JSON.stringify(db));
            closeModal(); renderAdmin(); renderPortal();
        }

        function deleteItem(id) {
            if(confirm('Veriyi silmek istediğinize emin misiniz?')) {
                if(activeTab === 'cat') db.cats = db.cats.filter(x => x.id !== id);
                if(activeTab === 'yazar') {
                    db.yazarlar = db.yazarlar.filter(x => x.id !== id);
                    db.haberler = db.haberler.filter(x => x.yid !== id); // Yazara ait yazıları da sil
                }
                if(activeTab === 'haber') db.haberler = db.haberler.filter(x => x.id !== id);
                localStorage.setItem('meridian_db_v3', JSON.stringify(db));
                renderAdmin(); renderPortal();
            }
        }

        function renderPortal() {
            const hAuthors = document.getElementById('h-authors');
            const hCats = document.getElementById('h-cats');
            const flow = document.getElementById('news-flow');
            hAuthors.innerHTML = ''; 
            hCats.innerHTML = '<button onclick="filterPortal(\'cat\', \'all\')" class="hover:text-black">Tümü</button>';
            
            db.yazarlar.forEach(y => {
                hAuthors.innerHTML += `
                <div onclick="filterPortal('yazar', '${y.id}')" class="flex flex-col items-center gap-1 cursor-pointer">
                    <div class="header-author-circle"><img src="${y.img}"></div>
                    <span class="text-[8px] font-black uppercase text-slate-400">${y.isim.split(' ')[0]}</span>
                </div>`;
            });

            db.cats.forEach(c => {
                hCats.innerHTML += `<button onclick="filterPortal('cat', '${c.id}')" class="hover:text-black">${c.name}</button>`;
            });

            filterPortal('cat', 'all');
        }

        function filterPortal(type, id) {
            const flow = document.getElementById('news-flow');
            flow.innerHTML = '';
            let filtered = db.haberler;
            if(id !== 'all') {
                filtered = type === 'cat' ? db.haberler.filter(h=>h.cid===id) : db.haberler.filter(h=>h.yid===id);
            }

            filtered.forEach(h => {
                const y = db.yazarlar.find(y=>y.id===h.yid);
                flow.innerHTML += `
                <div class="glass-card p-6 flex flex-col group cursor-pointer">
                    <img src="${h.img || 'https://via.placeholder.com/400x250'}" class="w-full h-48 object-cover rounded-3xl mb-4 group-hover:scale-95 transition">
                    <h3 class="text-xl font-black mb-4 leading-tight">${h.title}</h3>
                    <div class="mt-auto flex items-center justify-between border-t pt-4">
                        <div class="flex items-center gap-2">
                            <img src="${y?.img}" class="w-6 h-6 rounded-full object-cover">
                            <span class="text-[10px] font-bold text-slate-500">${y?.isim}</span>
                        </div>
                        <span class="text-[9px] text-slate-400 font-bold">${h.date}</span>
                    </div>
                </div>`;
            });
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        window.onload = () => { renderPortal(); setTab('cat'); };
    </script>
</body>
</html>
