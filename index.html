<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Global Culture & News</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfbf7; --text: #1a1a1a; --muted: #718096; --accent: #c49b66;
            --white: #ffffff; --transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; scroll-behavior: smooth; }

        /* --- UI COMPONENTS (ARAYÜZ KORUNDU) --- */
        #progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent); width: 0%; z-index: 10001; }
        nav { background: rgba(253, 251, 247, 0.9); backdrop-filter: blur(15px); padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.03); }
        .logo { font-family: 'Marcellus', serif; font-size: 2rem; letter-spacing: 3px; cursor: pointer; text-transform: uppercase; }
        .admin-trigger { cursor: pointer; opacity: 0.02; font-size: 10px; }

        .authors-strip { background: var(--white); padding: 30px 0; display: flex; justify-content: center; gap: 40px; border-bottom: 1px solid #f1f1f1; overflow-x: auto; scrollbar-width: none; }
        .author-item { cursor: pointer; text-align: center; width: 90px; transition: var(--transition); flex: 0 0 auto; }
        .author-item img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 1px solid var(--accent); padding: 4px; }
        .author-item span { display: block; font-size: 0.75rem; font-weight: 700; margin-top: 10px; font-family: 'Marcellus'; }

        .container { max-width: 1400px; margin: 40px auto; display: grid; grid-template-columns: 250px 1fr; gap: 40px; padding: 0 25px; }
        
        #news-feed { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }
        .news-card { background: var(--white); border-radius: 24px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.02); cursor: pointer; transition: var(--transition); border: 1px solid rgba(0,0,0,0.02); display: flex; flex-direction: column; }
        .news-card:hover { transform: translateY(-10px); box-shadow: 0 30px 60px rgba(0,0,0,0.06); }
        .news-img { width: 100%; height: 250px; object-fit: cover; }
        .card-body { padding: 25px; flex-grow: 1; }
        .card-body h2 { font-family: 'Marcellus', serif; font-size: 1.6rem; margin: 10px 0; line-height: 1.2; }

        /* --- ADMIN CMS (FULL KONTROL) --- */
        .admin-panel { display: none; position: fixed; inset: 0; background: #f8f9fa; z-index: 12000; padding: 40px; overflow-y: auto; }
        .cms-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .cms-card { background: #fff; padding: 20px; border-radius: 20px; border: 1px solid #ddd; }
        input, textarea, select { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .btn { padding: 10px 15px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; }
        .btn-gold { background: var(--accent); color: white; }
        .btn-del { background: #ff7675; color: white; font-size: 10px; padding: 5px; margin-left: 5px; }
        .mgmt-list { max-height: 150px; overflow-y: auto; font-size: 12px; border-top: 1px solid #eee; margin-top: 10px; padding-top: 10px; }

        /* Overlay */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: none; overflow-y: auto; padding-bottom: 100px; }
        .close-overlay { position: fixed; top: 30px; right: 40px; cursor: pointer; background: var(--text); color: #fff; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .article-wrap { max-width: 800px; margin: 60px auto; padding: 0 20px; }
    </style>
</head>
<body>

<div id="progress-bar"></div>

<nav>
    <div class="logo" onclick="location.reload()">LUMINA</div>
    <div style="display:flex; align-items:center; gap:20px;">
        <div id="current-city" style="font-size: 0.8rem; letter-spacing: 2px; font-weight: 700;">DETECTING...</div>
        <div class="admin-trigger" onclick="openCMS()">[L_CORE]</div>
    </div>
</nav>

<div id="authors-view" class="authors-strip"></div>

<div class="container">
    <aside class="sidebar-left">
        <h4 style="font-family:'Marcellus'; border-bottom:1px solid #eee; padding-bottom:10px; margin-bottom:15px;">KATEGORİLER</h4>
        <div id="cat-list" style="font-size: 0.9rem; line-height: 2.8;"></div>
    </aside>
    <main id="news-feed"></main>
</div>

<div id="adminPanel" class="admin-panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <h1 style="font-family:'Marcellus'">Lumina Control Center</h1>
        <button class="btn btn-gold" onclick="generateAINews()">AI Haberi Üret</button>
        <button class="btn btn-dark" style="background:#000; color:#fff" onclick="closeCMS()">Kaydet ve Çık</button>
    </div>

    <div class="cms-grid">
        <div class="cms-card">
            <h3>Haber & AI Yönetimi</h3>
            <input type="hidden" id="edit-id">
            <input type="text" id="newsTitle" placeholder="Başlık">
            <textarea id="newsContent" placeholder="İçerik..." rows="3"></textarea>
            <select id="newsCatSelect"></select>
            <input type="file" id="newsImg" accept="image/*">
            <button class="btn btn-gold" style="width:100%" onclick="saveNews()">Haberi Kaydet</button>
            <div id="mgmt-news-list" class="mgmt-list"></div>
        </div>

        <div class="cms-card">
            <h3>Yazarlar</h3>
            <input type="hidden" id="edit-auth-id">
            <input type="text" id="authName" placeholder="Yazar Adı">
            <textarea id="authBio" placeholder="Yazar Biyografisi..."></textarea>
            <button class="btn btn-gold" style="width:100%" onclick="saveAuthor()">Yazarı Kaydet</button>
            <div id="mgmt-auth-list" class="mgmt-list"></div>
        </div>

        <div class="cms-card">
            <h3>Reklam Yönetimi</h3>
            <input type="hidden" id="edit-ad-side">
            <select id="adSideSelect">
                <option value="left">Sol Banner</option>
                <option value="right">Sağ Banner</option>
            </select>
            <input type="text" id="adUrl" placeholder="Reklam Linki">
            <input type="file" id="adFile" accept="image/*">
            <button class="btn btn-gold" style="width:100%" onclick="saveAd()">Reklamı Kaydet</button>
            <div id="mgmt-ad-list" class="mgmt-list"></div>
        </div>
    </div>
</div>

<div id="overlay" class="overlay">
    <div class="close-overlay" onclick="closeAll()">✕</div>
    <div id="overlay-content" class="article-wrap"></div>
</div>

<script>
    const _KEY = "NzQ=";
    let db = JSON.parse(localStorage.getItem('lumina_v13')) || {
        news: [{id:1, title: "Mardin Gümüşü", text: "Telkari sanatı canlanıyor...", img: "https://via.placeholder.com/800", cat: "Kültür"}],
        authors: [{id:1, name: "VEDAT M.", bio: "Kültür Yazarı", img: "https://via.placeholder.com/200"}],
        cats: ['Mardin Ekspres', 'Sao Paulo Night', 'Gastronomi'],
        ads: { left: {img:'', url:'#'}, right: {img:'', url:'#'} }
    };

    function openCMS() { if(prompt("Şifre:") === atob(_KEY).split("").reverse().join("")) document.getElementById('adminPanel').style.display='block'; renderAdmin(); }
    function closeCMS() { document.getElementById('adminPanel').style.display='none'; }
    function sync() { localStorage.setItem('lumina_v13', JSON.stringify(db)); renderApp(); renderAdmin(); }
    function toB64(f) { return new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => r(rd.result); }); }

    // --- NEWS & AI ---
    async function saveNews() {
        const id = document.getElementById('edit-id').value;
        const file = document.getElementById('newsImg').files[0];
        let img = id ? db.news.find(x=>x.id==id).img : "https://via.placeholder.com/800";
        if(file) img = await toB64(file);
        const data = { id: id ? Number(id) : Date.now(), title: document.getElementById('newsTitle').value, text: document.getElementById('newsContent').value, img: img, cat: document.getElementById('newsCatSelect').value };
        if(id) { const idx = db.news.findIndex(x=>x.id==id); db.news[idx] = data; } else { db.news.unshift(data); }
        document.getElementById('edit-id').value = ""; sync();
    }
    function generateAINews() {
        db.news.unshift({ id: Date.now(), title: "AI: Mardin-Brezilya Köprüsü", text: "Yapay zeka tarafından üretilen kültürel analiz metni...", img: "https://via.placeholder.com/800", cat: "Global" });
        sync();
    }

    // --- AUTHORS ---
    async function saveAuthor() {
        const id = document.getElementById('edit-auth-id').value;
        const data = { id: id ? Number(id) : Date.now(), name: document.getElementById('authName').value.toUpperCase(), bio: document.getElementById('authBio').value, img: "https://via.placeholder.com/200" };
        if(id) { const idx = db.authors.findIndex(x=>x.id==id); db.authors[idx] = data; } else { db.authors.push(data); }
        document.getElementById('edit-auth-id').value = ""; sync();
    }

    // --- ADS ---
    async function saveAd() {
        const side = document.getElementById('adSideSelect').value;
        const file = document.getElementById('adFile').files[0];
        if(file) db.ads[side].img = await toB64(file);
        db.ads[side].url = document.getElementById('adUrl').value;
        sync();
    }
    function resetAd(side) { db.ads[side] = {img:'', url:'#'}; sync(); }

    // --- DELETE & EDIT UTILS ---
    function deleteItem(type, id) { db[type] = db[type].filter(x=>x.id != id); sync(); }
    function editNews(id) { const n = db.news.find(x=>x.id==id); document.getElementById('edit-id').value = n.id; document.getElementById('newsTitle').value = n.title; document.getElementById('newsContent').value = n.text; }
    function editAuthor(id) { const a = db.authors.find(x=>x.id==id); document.getElementById('edit-auth-id').value = a.id; document.getElementById('authName').value = a.name; document.getElementById('authBio').value = a.bio; }

    function renderApp() {
        document.getElementById('authors-view').innerHTML = db.authors.map(a => `<div class="author-item" onclick="openAuthor('${a.name.replace(/'/g, "\\'")}', '${a.bio.replace(/'/g, "\\'")}', '${a.img}')"><img src="${a.img}"><span>${a.name}</span></div>`).join('');
        document.getElementById('news-feed').innerHTML = db.news.map(n => `<article class="news-card" onclick="openNews('${n.title.replace(/'/g, "\\'")}', '${n.text.replace(/'/g, "\\'")}', '${n.img}')"><img src="${n.img}" class="news-img"><div class="card-body"><small style="color:var(--accent); font-weight:bold;">${n.cat.toUpperCase()}</small><h2>${n.title}</h2><p>${n.text.substring(0,80)}...</p></div></article>`).join('');
        document.getElementById('cat-list').innerHTML = db.cats.map(c => `<div>• ${c}</div>`).join('');
        document.getElementById('current-city').innerText = navigator.language.includes('pt') ? "SAO PAULO • LOCAL" : "MARDİN • YEREL";
    }

    function renderAdmin() {
        document.getElementById('newsCatSelect').innerHTML = db.cats.map(c => `<option value="${c}">${c}</option>`).join('');
        document.getElementById('mgmt-news-list').innerHTML = db.news.map(n => `<div style="margin-bottom:5px;">${n.title.substring(0,20)} <button onclick="editNews(${n.id})">✏️</button><button onclick="deleteItem('news', ${n.id})" class="btn-del">SİL</button></div>`).join('');
        document.getElementById('mgmt-auth-list').innerHTML = db.authors.map(a => `<div style="margin-bottom:5px;">${a.name} <button onclick="editAuthor(${a.id})">✏️</button><button onclick="deleteItem('authors', ${a.id})" class="btn-del">SİL</button></div>`).join('');
        document.getElementById('mgmt-ad-list').innerHTML = `<div>Sol Reklam <button onclick="resetAd('left')" class="btn-del">SİL</button></div><div style="margin-top:5px;">Sağ Reklam <button onclick="resetAd('right')" class="btn-del">SİL</button></div>`;
    }

    function openNews(title, text, img) {
        document.getElementById('overlay').style.display = 'block';
        document.body.style.overflow = 'hidden';
        document.getElementById('overlay-content').innerHTML = `<h1 style="font-family:'Marcellus'; font-size:3rem;">${title}</h1><button class="btn btn-gold" onclick="speakText('atxt')">Yazıyı Dinle</button><img src="${img}" style="width:100%; border-radius:30px; margin:30px 0;"><div id="atxt" style="font-size:1.3rem; line-height:2;">${text}</div>`;
    }

    function openAuthor(name, bio, img) {
        document.getElementById('overlay').style.display = 'block';
        document.body.style.overflow = 'hidden';
        document.getElementById('overlay-content').innerHTML = `<div style="text-align:center;"><img src="${img}" style="width:150px; border-radius:50%; margin-bottom:20px;"><h1 style="font-family:'Marcellus';">${name}</h1><button class="btn btn-gold" onclick="speakText('btxt')">Biyografiyi Dinle</button><div id="btxt" style="font-size:1.2rem; margin-top:20px; line-height:1.8;">${bio}</div></div>`;
    }

    function speakText(id) { const u = new SpeechSynthesisUtterance(document.getElementById(id).innerText); u.lang = navigator.language; speechSynthesis.speak(u); }
    function closeAll() { speechSynthesis.cancel(); document.getElementById('overlay').style.display = 'none'; document.body.style.overflow = 'auto'; }
    window.onscroll = () => { document.getElementById("progress-bar").style.width = (document.documentElement.scrollTop / (document.documentElement.scrollHeight - document.documentElement.clientHeight)) * 100 + "%"; };

    renderApp();
</script>
</body>
</html>
