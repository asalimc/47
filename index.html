<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumina | Mardin & Brazil Culture Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #f4ecd8; --card-bg: #fdfbf7; --text: #433422; --accent: #a67c52; }
        * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; line-height: 1.6; }
        #progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent); width: 0%; z-index: 10001; }
        nav { background: rgba(244, 236, 216, 0.95); backdrop-filter: blur(15px); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 1000; border-bottom: 1px solid rgba(67, 52, 34, 0.1); }
        .logo { font-family: 'Marcellus', serif; font-size: 1.5rem; letter-spacing: 3px; font-weight: bold; text-transform: uppercase; }
        
        /* Yazarlar Şeridi */
        .authors-strip { background: var(--card-bg); padding: 25px 0; display: flex; gap: 20px; border-bottom: 1px solid rgba(0,0,0,0.05); overflow-x: auto; scrollbar-width: none; padding-left: 5%; }
        .author-item { text-align: center; width: 90px; flex-shrink: 0; cursor: pointer; transition: 0.3s; }
        .author-item:hover { transform: translateY(-5px); }
        .author-item img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); padding: 2px; margin: 0 auto; }
        .author-item span { display: block; font-size: 0.65rem; font-weight: 700; margin-top: 8px; font-family: 'Marcellus'; text-transform: uppercase; letter-spacing: 1px; }

        .container-main { max-width: 1440px; margin: 20px auto; padding: 0 15px; }
        #news-feed { display: grid; grid-template-columns: 1fr; gap: 25px; }
        @media (min-width: 768px) { #news-feed { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1100px) { #news-feed { grid-template-columns: repeat(3, 1fr); } }

        .news-card { background: var(--card-bg); border-radius: 24px; overflow: hidden; border: 1px solid rgba(0,0,0,0.04); transition: 0.4s; position: relative; }
        .event-tag { position: absolute; top: 15px; right: 15px; background: #c2410c; color: white; font-size: 9px; font-weight: 900; padding: 5px 12px; border-radius: 50px; letter-spacing: 1px; }
        .news-img { width: 100%; height: 240px; object-fit: cover; }
        .card-body { padding: 24px; }
        .card-body h2 { font-family: 'Marcellus', serif; font-size: 1.3rem; margin: 12px 0; color: #1a1a1a; line-height: 1.3; }
        .card-body p { font-size: 0.95rem; color: #5c4d3c; font-weight: 300; line-height: 1.7; }

        .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; overflow-y: auto; padding-bottom: 80px; }
        #art-body { font-size: 1.15rem; line-height: 1.9; max-width: 720px; margin: 0 auto; color: #2d2419; }
        .rota-card { background: #efe6cf; border-radius: 15px; padding: 20px; margin: 30px 0; border-left: 5px solid var(--accent); }

        /* Admin Tasarımı */
        #admin-panel { display: none; background: #080808; color: #eee; position: fixed; inset: 0; z-index: 11000; overflow-y: auto; padding: 30px; }
        .input-cms { width: 100%; padding: 14px; margin-bottom: 15px; background: #121212; border: 1px solid #222; border-radius: 12px; color: white; font-size: 0.9rem; }
        .admin-btn { padding: 12px 20px; border-radius: 10px; font-size: 0.75rem; font-weight: 800; background: #1a1a1a; transition: 0.3s; color: #777; letter-spacing: 1px; }
        .admin-btn.active { background: var(--accent); color: white; }
    </style>
</head>
<body>

<div id="progress-bar"></div>
<nav>
    <div class="logo">LUMINA</div>
    <div class="hidden md:block text-[9px] tracking-[4px] font-bold uppercase opacity-60">Kültürel Köprü: Mardin & Brezilya</div>
</nav>

<div id="authors-list" class="authors-strip"></div>

<div class="container-main">
    <main id="news-feed"></main>
</div>

<footer class="py-20 text-center opacity-30">
    <button onclick="toggleAdmin()" class="text-[10px] font-bold tracking-[5px] border-b border-black/20 pb-2">CMS MASTER CONSOLE</button>
</footer>

<div id="overlay" class="overlay">
    <div class="sticky top-0 bg-[#f4ecd8]/95 backdrop-blur-md p-5 flex justify-between items-center z-[10002] border-b border-black/5">
        <div class="text-[10px] font-black tracking-widest opacity-50">STORYTELLING & AMBİYANS</div>
        <button onclick="stopReading(); closeAll();" class="bg-black text-white w-10 h-10 rounded-full font-bold">✕</button>
    </div>
    <div id="overlay-content" class="max-w-3xl mx-auto py-12 px-6"></div>
</div>

<div id="admin-panel">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10 border-b border-white/10 pb-8">
            <h2 class="text-xl font-serif tracking-widest text-accent italic uppercase">Lumina System v3.0</h2>
            <button onclick="toggleAdmin()" class="bg-red-950 text-red-500 px-8 py-3 rounded-xl font-bold text-[10px]">PANELİ KAPAT</button>
        </div>
        <div class="flex gap-4 mb-10 overflow-x-auto pb-2">
            <button onclick="setTab('haber')" id="btn-haber" class="admin-btn active">HABER & ETKİNLİK</button>
            <button onclick="setTab('yazar')" id="btn-yazar" class="admin-btn">YAZARLAR</button>
            <button onclick="setTab('rota')" id="btn-rota" class="admin-btn">KÜLTÜR ROTASI</button>
        </div>
        <div id="admin-content" class="grid grid-cols-1 lg:grid-cols-12 gap-10"></div>
    </div>
</div>

<script>
    const initialData = {
        cats: [{id:'c1',name:'Mardin'},{id:'c2',name:'Brezilya'}],
        yazarlar: [
            {id:'y0', isim:'Haber Merkezi', bio:'Portal Editörü', img:'https://images.unsplash.com/photo-1495020689067-958852a7765e?w=200'},
            {id:'y1', isim:'Gabriel Garcia', bio:'Kültür & Mitoloji', img:'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=200'},
            {id:'y2', isim:'Leyla Mardini', bio:'Yerel Tarihçi', img:'https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=200'}
        ],
        haberler: [
            {
                id:'h1', 
                title:"[CANLI] Şahro Bayramı Hazırlıkları Başladı", 
                text:"Mardin'in kadim köylerinde Süryani halkının büyük bir coşkuyla beklediği Şahro Bayramı için hazırlıklar tüm hızıyla sürüyor. \n\n### Haftalık Kültür Rotası:\nBu hafta Mardin'de rotanız **Kasımiye Medresesi** olsun. Gün batımında Mezopotamya ovasına karşı içeceğiniz bir mırra, size zamanı unutturacak.\n\nSizce Mardin'in en büyüleyici saati hangisi?", 
                img:'https://images.unsplash.com/photo-1582738411706-bfc8e691d1c2?w=800', 
                cid:'c1', yid:'y2', isEvent: true, ambient: 'mistik'
            },
            {
                id:'h2', 
                title:"[ANALİZ] Festa Junina: Brezilya'nın Köy Ruhu", 
                text:"Haziran ayı geldiğinde Brezilya sokakları 'Festa Junina' ile renklenir. Saman şapkalar, kareli gömlekler ve mısır bazlı lezzetler... \n\n### Haftalık Kültür Rotası:\nRio'da iseniz **Santa Teresa**'nın o meşhur sarı tramvayına binin. Tepeden bakıldığında şehir bir masal diyarı gibi görünüyor.\n\nBrezilya'nın bu köylü festivali size de Anadolu'daki hasat şenliklerini hatırlatmıyor mu?", 
                img:'https://images.unsplash.com/photo-1596707323136-22442436f903?w=800', 
                cid:'c2', yid:'y1', isEvent: true, ambient: 'doğa'
            }
        ]
    };

    let db = JSON.parse(localStorage.getItem('lumina_v8_final')) || initialData;
    let activeTab = 'haber', editingId = null, synth = window.speechSynthesis;

    function sync() {
        localStorage.setItem('lumina_v8_final', JSON.stringify(db));
        renderPortal();
        renderAdmin();
    }

    function renderPortal() {
        // Yazarlar Şeridi
        document.getElementById('authors-list').innerHTML = db.yazarlar.map(y => `
            <div class="author-item">
                <img src="${y.img}">
                <span>${y.isim}</span>
            </div>
        `).join('');

        // Haberler
        document.getElementById('news-feed').innerHTML = db.haberler.map((h, i) => `
            <article class="news-card show" onclick="openNews('${h.id}')" style="transition-delay: ${i*50}ms">
                ${h.isEvent ? '<div class="event-tag">YAKLAŞAN</div>' : ''}
                <img src="${h.img}" class="news-img">
                <div class="card-body">
                    <div class="flex justify-between items-center mb-3">
                        <small class="text-accent font-black text-[9px] uppercase tracking-widest">${db.cats.find(c=>c.id===h.cid)?.name}</small>
                        <small class="opacity-40 text-[9px] font-bold">${h.ambient ? h.ambient.toUpperCase() : 'STANDART'}</small>
                    </div>
                    <h2>${h.title}</h2>
                    <p class="line-clamp-3">${h.text.split('###')[0]}</p>
                </div>
            </article>
        `).join('');
    }

    function openNews(hid) {
        const h = db.haberler.find(x => x.id === hid);
        const y = db.yazarlar.find(x => x.id === h.yid);
        document.getElementById('overlay').style.display = 'block';
        document.body.style.overflow = 'hidden';

        let formatted = h.text.replace('### Haftalık Kültür Rotası:', '<div class="rota-card"><strong>Haftalık Kültür Rotası</strong><br>');
        formatted = formatted.split('\n').join('<br>');

        document.getElementById('overlay-content').innerHTML = `
            <h1 class="text-4xl md:text-5xl font-serif mb-8 text-[#1a1a1a]">${h.title}</h1>
            <div class="flex items-center justify-between mb-10 pb-6 border-b border-black/10">
                <div class="flex items-center gap-3">
                    <img src="${y.img}" class="w-12 h-12 rounded-full border border-accent">
                    <span class="text-sm font-bold">${y.isim} <br><small class="opacity-50">${y.bio}</small></span>
                </div>
                <div class="flex gap-3">
                    <button onclick="readOutLoad('${h.ambient}')" class="bg-black text-white px-5 py-3 rounded-full text-[10px] font-black uppercase tracking-widest">🔊 OKU</button>
                    <button onclick="stopReading()" class="bg-white border border-black/10 px-5 py-3 rounded-full text-[10px] font-black uppercase tracking-widest">🛑 DUR</button>
                </div>
            </div>
            <img src="${h.img}" class="w-full rounded-3xl mb-10 shadow-lg">
            <div id="art-body">${formatted}</div>
        `;
    }

    function renderAdmin() {
        const container = document.getElementById('admin-content');
        if(activeTab === 'haber') {
            const h = editingId ? db.haberler.find(x => x.id === editingId) : null;
            container.innerHTML = `
                <div class="lg:col-span-5 bg-[#111] p-6 rounded-2xl border border-white/5 h-fit">
                    <input type="text" id="h-t" value="${h?.title || ''}" placeholder="Başlık [CANLI/ANALİZ]" class="input-cms">
                    <textarea id="h-x" placeholder="Haber metni ve Rota bilgisi..." class="input-cms h-60">${h?.text || ''}</textarea>
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <select id="h-c" class="input-cms m-0">${db.cats.map(c=>`<option value="${c.id}" ${h?.cid===c.id?'selected':''}>${c.name}</option>`).join('')}</select>
                        <select id="h-y" class="input-cms m-0">${db.yazarlar.map(y=>`<option value="${y.id}" ${h?.yid===y.id?'selected':''}>${y.isim}</option>`).join('')}</select>
                    </div>
                    <div class="flex items-center gap-4 mb-4">
                        <label class="text-[10px] uppercase font-bold text-accent"><input type="checkbox" id="h-e" ${h?.isEvent?'checked':''}> Yaklaşan Etkinlik</label>
                        <select id="h-a" class="input-cms m-0 text-[10px] h-8 p-1"><option value="mistik">Mistik</option><option value="doğa">Doğa</option><option value="şehir">Şehir</option></select>
                    </div>
                    <button onclick="saveH()" class="w-full bg-accent text-white py-4 rounded-xl font-black text-[10px] uppercase">VERİYİ SİSTEME GÖNDER</button>
                </div>
                <div class="lg:col-span-7 space-y-3">
                    ${db.haberler.map(x => `<div class="bg-[#111] p-4 rounded-xl flex justify-between items-center"><span class="text-xs truncate w-3/4">${x.title}</span><button onclick="editH('${x.id}')" class="text-accent text-[10px] font-bold">EDIT</button></div>`).join('')}
                </div>`;
        } else if(activeTab === 'yazar') {
            container.innerHTML = `<div class="lg:col-span-12 space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    ${db.yazarlar.map(y => `<div class="bg-[#111] p-6 rounded-2xl text-center"><img src="${y.img}" class="w-16 h-16 rounded-full mx-auto mb-4 border-2 border-accent"><div class="text-sm font-bold">${y.isim}</div><div class="text-[9px] opacity-40 mt-1">${y.bio}</div></div>`).join('')}
                </div>
            </div>`;
        }
    }

    function saveH() {
        const obj = {
            id: editingId || 'h'+Date.now(),
            title: document.getElementById('h-t').value,
            text: document.getElementById('h-x').value,
            cid: document.getElementById('h-c').value,
            yid: document.getElementById('h-y').value,
            isEvent: document.getElementById('h-e').checked,
            ambient: document.getElementById('h-a').value,
            img: 'https://images.unsplash.com/photo-1582738411706-bfc8e691d1c2?w=800'
        };
        if(editingId) {
            const idx = db.haberler.findIndex(h => h.id === editingId);
            db.haberler[idx] = obj;
        } else {
            db.haberler.unshift(obj);
        }
        editingId = null; sync();
    }

    function readOutLoad(type) {
        stopReading();
        // Ses Sentezi
        const u = new SpeechSynthesisUtterance(document.getElementById('art-body').innerText.split('Haftalık Kültür Rotası')[0]);
        u.lang = 'tr-TR'; u.rate = 0.9; synth.speak(u);
    }

    function stopReading() { synth.cancel(); }
    function toggleAdmin() { const p = document.getElementById('admin-panel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; if(p.style.display === 'block') renderAdmin(); }
    function setTab(t) { activeTab = t; document.querySelectorAll('.admin-btn').forEach(b=>b.classList.remove('active')); document.getElementById('btn-'+t).classList.add('active'); renderAdmin(); }
    function editH(id) { editingId = id; renderAdmin(); }
    function closeAll() { document.getElementById('overlay').style.display = 'none'; document.body.style.overflow = 'auto'; }

    window.onscroll = () => { document.getElementById("progress-bar").style.width = (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100 + "%"; };
    window.onload = renderPortal;
</script>
</body>
</html>
