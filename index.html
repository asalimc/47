<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiveCity | Şehrin Nabzı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes pulse-slow { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .live-dot { animation: pulse-slow 2s infinite; }
        body { background: #f0f2f5; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body x-data="{ darkMode: false, time: '', weather: '24°C' }" :class="darkMode ? 'bg-gray-900 text-white' : 'bg-gray-50 text-gray-900'">

    <nav class="sticky top-0 z-50 backdrop-blur-md bg-white/70 border-b p-4 flex justify-between items-center" :class="darkMode ? 'bg-gray-800/80 border-gray-700' : ''">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-green-500 rounded-full live-dot"></div>
            <h1 class="font-bold text-xl tracking-tight">LIVECITY</h1>
        </div>
        <div class="flex gap-4 items-center">
            <span x-text="new Date().toLocaleTimeString('tr-TR')" class="font-mono text-sm"></span>
            <button @click="darkMode = !darkMode" class="p-2 rounded-full hover:bg-gray-200 transition">
                <i data-lucide="moon" x-show="!darkMode"></i>
                <i data-lucide="sun" x-show="darkMode"></i>
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-8 space-y-8">
        
        <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-2 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-3xl p-8 text-white shadow-xl relative overflow-hidden">
                <div class="relative z-10">
                    <h2 class="text-3xl font-bold mb-2">Günaydın, İstanbul!</h2>
                    <p class="opacity-90">Bugün şehirde hava açık, trafik %35 yoğunlukta.</p>
                    <button class="mt-6 bg-white text-indigo-600 px-6 py-2 rounded-full font-semibold hover:scale-105 transition">Etkinlikleri Gör</button>
                </div>
                <i data-lucide="cloud-sun" class="absolute right-[-20px] bottom-[-20px] w-48 h-48 opacity-20"></i>
            </div>
            
            <div :class="darkMode ? 'bg-gray-800' : 'bg-white'" class="rounded-3xl p-6 shadow-sm border border-gray-100 flex flex-col justify-center items-center text-center">
                <p class="text-sm uppercase tracking-widest opacity-60">Hava Kalitesi</p>
                <h3 class="text-5xl font-black my-2">42</h3>
                <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold">ÇOK İYİ</span>
            </div>
        </section>

        <section class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 space-y-4">
                <h3 class="font-bold flex items-center gap-2"><i data-lucide="rss" class="w-4"></i> Canlı Akış</h3>
                <template x-for="i in [1,2,3]">
                    <div :class="darkMode ? 'bg-gray-800 border-gray-700' : 'bg-white'" class="p-4 rounded-2xl border text-sm shadow-sm transition hover:shadow-md cursor-pointer">
                        <span class="text-[10px] font-bold text-blue-500 uppercase">Ulaşım • 5dk önce</span>
                        <p class="mt-1 font-medium">Metrobüs seferlerine ek seferler eklendi.</p>
                    </div>
                </template>
            </div>

            <div class="lg:col-span-3 bg-gray-200 rounded-3xl h-[400px] relative overflow-hidden flex items-center justify-center shadow-inner">
                <span class="text-gray-500 font-medium">Şehir Haritası (Interaktif Katman)</span>
                <div class="absolute bottom-4 left-4 bg-white p-2 rounded-lg shadow-lg flex gap-2">
                    <button class="p-2 hover:bg-gray-100 rounded text-xs">Otoparklar</button>
                    <button class="p-2 hover:bg-gray-100 rounded text-xs">Parklar</button>
                </div>
            </div>
        </section>

    </main>

    <script>
        // İkonları başlat
        lucide.createIcons();
    </script>
</body>
</html>
