<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmet ÇINARBAŞ | Bellek Arşivi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bellek-mavi: #1D4ED8; --bellek-lacivert: #0F172A; --bellek-bg: #F8FAFC;
            --hardal-sari: #EAB308; --sari-golge: rgba(234, 179, 8, 0.3);
        }
        * { font-style: normal !important; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bellek-bg); font-family: 'Plus Jakarta Sans', sans-serif; color: #1e293b; margin: 0; height: 100vh; overflow: hidden; }

        .main-layout { max-width: 1600px; margin: 0 auto; display: grid; grid-template-columns: 1.618fr 1fr; gap: 1.5rem; padding: 1rem; height: 82vh; }

        .glow-card {
            background: #ffffff; border-radius: 40px; 
            box-shadow: 15px 15px 40px var(--sari-golge);
            border: 1px solid rgba(234, 179, 8, 0.3);
            position: relative; overflow: hidden; display: flex; flex-direction: column;
        }

        /* KAYDIRILABİLİR HABER PANELİ */
        .large-news-panel { background: var(--bellek-lacivert) !important; border: none; cursor: grab; user-select: none; }
        .large-news-panel:active { cursor: grabbing; }
        
        .news-slider-container { 
            height: 100%; width: 100%; display: flex; 
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            will-change: transform;
        }
        
        .news-item { min-width: 100%; height: 100%; padding: 5rem; display: flex; flex-direction: column; justify-content: center; pointer-events: none; }
        .news-item button { pointer-events: auto; }

        .news-badge {
            display: inline-block; background: var(--hardal-sari); color: var(--bellek-lacivert);
            padding: 8px 16px; border-radius: 12px; font-size: 11px;
            font-weight: 800; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 2rem; width: max-content;
        }

        .news-main-title {
            font-size: clamp(1.8rem, 2.8vw, 3rem); font-weight: 800; line-height: 1.2; color: white;
            letter-spacing: -0.04em; margin-bottom: 2.5rem;
            background: linear-gradient(to bottom right, #ffffff, #cbd5e1);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .news-action-btn {
            display: inline-flex; items-center; justify-content: center; gap: 12px; background: white;
            color: var(--bellek-lacivert); padding: 20px 40px; border-radius: 24px;
            font-weight: 800; font-size: 12px; text-transform: uppercase;
            letter-spacing: 0.12em; transition: 0.3s; cursor: pointer; width: 100%; max-width: 280px;
            border: none; box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .news-action-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,0,0,0.15); background: var(--bellek-lacivert); color: white; }

        /* YAZAR KARTI */
        .author-card { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 2rem; background: var(--hardal-sari) !important; }
        .author-photo-frame { width: 140px; height: 140px; border-radius: 40px; overflow: hidden; border: 6px solid rgba(255,255,255,0.7); box-shadow: 0 12px 30px rgba(0,0,0,0.15); }
        .basyazar-panel { margin-top: 1.5rem; padding: 2rem; background: rgba(255, 255, 255, 0.95); border-radius: 35px; border-bottom: 8px solid var(--bellek-lacivert); width: 100%; max-width: 380px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .basyazar-label { font-size: 10px; font-weight: 900; color: var(--bellek-lacivert); text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 12px; opacity: 0.6; }
        .basyazar-title-text { font-size: 16px; color: #0f172a; line-height: 1.4; font-weight: 800; margin-bottom: 25px; letter-spacing: -0.02em; }

        /* DETAY OVERLAY */
        #detailsOverlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); display: none; justify-content: flex-end; z-index: 1000; backdrop-filter: blur(30px); }
        .modal-card { background: white; width: 100%; max-width: 750px; height: 100%; padding: 5rem 4rem; border-radius: 70px 0 0 70px; display: flex; flex-direction: column; animation: sideSlide 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes sideSlide { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .modal-content-area { color: #334155; font-size: 1.1rem; line-height: 1.8; font-weight: 500; overflow-y: auto; padding-right: 25px; margin-bottom: 40px; }
        .modal-content-area h4 { color: var(--bellek-lacivert); font-weight: 800; margin-top: 2rem; margin-bottom: 0.5rem; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 0.05em; border-bottom: 2px solid var(--hardal-sari); width: max-content; }

        @media (max-width: 1024px) { 
            .main-layout { grid-template-columns: 1fr; height: auto; overflow-y: auto; } 
            body { overflow: auto; } 
            .modal-card { max-width: 100%; border-radius: 0; padding: 3rem 1.5rem; }
            .news-item { padding: 3rem 2rem; }
        }
    </style>
</head>
<body>

    <header class="max-w-[1600px] mx-auto px-8 py-6 flex justify-between items-center h-[80px]">
        <div class="text-2xl font-black tracking-tighter uppercase">AHMET ÇINARBAŞ <span class="text-blue-700">BELLEK</span></div>
        <div id="location-tag" class="text-[10px] font-black text-slate-400 tracking-[0.4em] uppercase">MARDİN - BRASÍLIA | 2026</div>
    </header>

    <div class="main-layout">
        <div class="glow-card large-news-panel" id="sliderParent">
            <div class="news-slider-container" id="newsSlider"></div>
        </div>

        <div class="flex flex-col gap-6">
            <div class="glow-card author-card">
                <div class="author-photo-frame mb-3">
                    <img src="https://pbs.twimg.com/profile_images/1559852899303317504/pjkJwYHb_400x400.jpg" class="w-full h-full object-cover grayscale">
                </div>
                <h2 class="text-xl font-black text-slate-900 tracking-tighter uppercase">Ahmet Çınarbaş</h2>
                <span id="author-role" class="text-slate-800 font-extrabold text-[10px] tracking-[0.3em] uppercase mb-1"></span>
                
                <div class="basyazar-panel">
                    <span id="basyazar-label" class="basyazar-label"></span>
                    <h3 id="basyazar-title" class="basyazar-title-text"></h3>
                    <button id="basyazar-btn" onclick="openAuthorArticle()" class="news-action-btn"></button>
                </div>
            </div>

            <div class="glow-card flex flex-col items-center justify-center h-[110px] bg-slate-900">
                <p id="sponsor-label" class="text-[8px] font-black text-yellow-500 tracking-[0.4em] uppercase mb-1"></p>
                <h3 class="text-xl text-white font-black uppercase tracking-tighter">Yaşarbey Kahve</h3>
                <p id="sponsor-sub" class="text-white/40 text-[8px] font-bold uppercase tracking-[0.2em]"></p>
            </div>
        </div>
    </div>

    <div id="detailsOverlay" onclick="if(event.target == this) closeDetails()">
        <div class="modal-card">
            <span id="modalCategory" class="text-yellow-600 font-black text-[11px] tracking-[0.5em] uppercase border-b-2 border-yellow-600 pb-2 mb-8 w-max"></span>
            <h2 id="modalTitle" class="text-3xl font-black text-slate-900 mb-8 tracking-tighter leading-tight"></h2>
            <div id="modalContent" class="modal-content-area"></div>
            <button id="modal-close-btn" onclick="closeDetails()" class="mt-auto bg-slate-900 text-white py-6 rounded-2xl font-black text-xs uppercase tracking-[0.4em] hover:bg-blue-700 transition-all"></button>
        </div>
    </div>

    <script>
        const translations = {
            tr: {
                role: "Gazeteci & Başyazar", label: "Günün Başyazısı", btn: "MAKALEYİ OKU →", newsBtn: "DETAYI GÖR →",
                sponsor: "Kültür Sponsoru", sub: "Mezopotamya'dan Brezilya'ya", close: "PANELİ KAPAT ×",
                cat: "BAŞYAZAR ÖZEL", newsCat: "BELLEK DOSYASI",
                title: "Mardin ve Ouro Preto – İki Taş Şehrin Hikâyesi",
                body: `<p>Dünya haritasına baktığınızda birbirinden binlerce kilometre uzakta, farklı kıtalarda yer alan iki şehir dikkatinizi çekebilir: Türkiye’nin doğusunda Mardin ve Brezilya’nın Minas Gerais eyaletinde Ouro Preto.</p>
                       <h4>Ekonomi: Taşın Üzerine Kurulu Geçim</h4>
                       <p>Mardin’in ekonomisi uzun yıllar tarım ve küçük ölçekli ticarete dayanmış, son yıllarda ise turizmle yeniden şekillenmiştir. Ouro Preto ise sömürge döneminde altın madenciliğiyle Brezilya’nın kalbi olmuş, bugün ise kültürel turizmle ayakta durmaktadır.</p>
                       <h4>Siyaset: Merkez ve Çevre</h4>
                       <p>Mardin, Türkiye’nin merkez-çevre ilişkilerinde “çevre”yi temsil eder. Ouro Preto ise Brezilya’da sömürge döneminde siyasi bir merkezdi; bugün daha çok kültürel miras üzerinden kimlik kazanıyor.</p>
                       <h4>Kültür: Çok Seslilik ve Barok</h4>
                       <p>Mardin’in dar sokaklarında cami minaresiyle kilise çanı yan yana yükselir. Ouro Preto’da ise Katolik barok kiliseler şehrin ruhunu belirler.</p>
                       <p>Belki de bu iki şehir bize şunu hatırlatıyor: Taş, sadece bir yapı malzemesi değil; bir toplumun hafızasıdır.</p>`,
                news: [
                    { title: "Dijital Mühürleme: Mardin'den Brezilya'ya", content: "DREX dijital para birimi güvenliğinde Mezopotamya mühür teknikleri inceleniyor." },
                    { title: "Amazon Havzasında Mardin Su Sistemleri", content: "Bin yıllık kehriz sistemleri Amazon'un korunması için model oluyor." },
                    { title: "Rio Karnavalı ve Reyhani Ritmi", content: "İki kıtanın ritmik benzerlikleri Ahmet Çınarbaş'ın merceğinde." }
                ]
            },
            pt: {
                role: "Jornalista & Editorialista", label: "Editorial do Dia", btn: "LER ARTIGO →", newsBtn: "VER DETALHES →",
                sponsor: "Patrocinador Cultural", sub: "Da Mesopotâmia ao Brasil", close: "FECHAR PAINEL ×",
                cat: "EDITORIAL ESPECIAL", newsCat: "ARQUIVO DE MEMÓRIA",
                title: "Mardin e Ouro Preto – A História de Duas Cidades de Pedra",
                body: `<p>Ao olhar para o mapa múndi, duas cidades situadas a milhares de quilômetros de distância podem chamar sua atenção: Mardin, no leste da Turquia, e Ouro Preto, em Minas Gerais, Brasil.</p>
                       <h4>Economia: Subsistência Sobre a Pedra</h4>
                       <p>A economia de Mardin baseou-se na agricultura, remodelando-se através do turismo. Ouro Preto foi o coração do Brasil com a mineração de ouro, hoje sustentando-se pelo turismo cultural.</p>
                       <h4>Política: Entre o Centro e a Periferia</h4>
                       <p>Mardin representa a "periferia" na Turquia. Ouro Preto já foi um centro político; hoje ganha identidade através do seu patrimônio.</p>
                       <h4>Cultura: Polifonia e Barroco</h4>
                       <p>Nas ruas de Mardin, o minarete e o sino erguem-se lado a lado. Em Ouro Preto, as igrejas barrocas definem a alma da cidade.</p>
                       <p>Talvez estas duas cidades nos lembrem: a pedra não é apenas construção; é a memória de uma sociedade.</p>`,
                news: [
                    { title: "Selagem Digital: De Mardin ao Brasil", content: "Técnicas mesopotâmicas analisadas na segurança da moeda DREX." },
                    { title: "Sistemas de Água de Mardin na Amazônia", content: "Sistemas milenares de 'kehriz' servem de modelo para a Amazônia." },
                    { title: "Carnaval do Rio e o Ritmo Reyhani", content: "As semelhanças rítmicas de dois continentes sob a ótica de Ahmet Çınarbaş." }
                ]
            }
        };

        const currentLang = navigator.language.startsWith('pt') ? 'pt' : 'tr';
        const t = translations[currentLang];

        function init() {
            document.getElementById('author-role').innerText = t.role;
            document.getElementById('basyazar-label').innerText = t.label;
            document.getElementById('basyazar-title').innerText = t.title;
            document.getElementById('basyazar-btn').innerText = t.btn;
            document.getElementById('sponsor-label').innerText = t.sponsor;
            document.getElementById('sponsor-sub').innerText = t.sub;
            document.getElementById('modal-close-btn').innerText = t.close;
            renderNews();
            setupInteractions();
        }

        function renderNews() {
            const container = document.getElementById('newsSlider');
            container.innerHTML = t.news.map((n, i) => `
                <div class="news-item">
                    <span class="news-badge">${t.newsCat}</span>
                    <h1 class="news-main-title">${n.title}</h1>
                    <button onclick="openDetails(${i})" class="news-action-btn">${t.newsBtn}</button>
                </div>`).join('');
        }

        // SLIDER ETKİLEŞİM MOTORU (TOUCH & MOUSE)
        let slideIdx = 0;
        let startX = 0;
        let isDragging = false;
        let autoPlayTimer;

        function setupInteractions() {
            const parent = document.getElementById('sliderParent');
            const slider = document.getElementById('newsSlider');

            // Mouse Events
            parent.addEventListener('mousedown', (e) => { isDragging = true; startX = e.pageX; clearInterval(autoPlayTimer); });
            window.addEventListener('mouseup', () => { isDragging = false; });
            parent.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const x = e.pageX;
                const walk = x - startX;
                if (Math.abs(walk) > 100) {
                    walk > 0 ? changeSlide(-1) : changeSlide(1);
                    isDragging = false;
                }
            });

            // Touch Events (Mobile)
            parent.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; clearInterval(autoPlayTimer); }, {passive: true});
            parent.addEventListener('touchend', (e) => {
                const endX = e.changedTouches[0].clientX;
                const walk = endX - startX;
                if (Math.abs(walk) > 50) {
                    walk > 0 ? changeSlide(-1) : changeSlide(1);
                }
                startAutoPlay();
            }, {passive: true});

            startAutoPlay();
        }

        function changeSlide(dir) {
            slideIdx = (slideIdx + dir + t.news.length) % t.news.length;
            document.getElementById('newsSlider').style.transform = `translateX(-${slideIdx * 100}%)`;
        }

        function startAutoPlay() {
            clearInterval(autoPlayTimer);
            autoPlayTimer = setInterval(() => changeSlide(1), 7000);
        }

        function openAuthorArticle() {
            document.getElementById('modalCategory').innerText = t.cat;
            document.getElementById('modalTitle').innerText = t.title;
            document.getElementById('modalContent').innerHTML = t.body;
            document.getElementById('detailsOverlay').style.display = 'flex';
        }

        function openDetails(i) {
            document.getElementById('modalCategory').innerText = t.newsCat;
            document.getElementById('modalTitle').innerText = t.news[i].title;
            document.getElementById('modalContent').innerHTML = `<p>${t.news[i].content}</p>`;
            document.getElementById('detailsOverlay').style.display = 'flex';
        }

        function closeDetails() { document.getElementById('detailsOverlay').style.display = 'none'; }

        init();
    </script>
</body>
</html>
