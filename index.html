<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Cultural Intelligence Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #f4ecd8; --card-bg: #fdfbf7; --text: #433422; --accent: #a67c52; --admin-bg: #050505; }
        * { -webkit-font-smoothing: antialiased; box-sizing: border-box; scroll-behavior: smooth; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.8s; margin: 0; }
        
        /* --- ARAYÜZ (UI) STİLLERİ --- */
        .compass-sidebar { position: fixed; right: 0; top: 20%; height: 50%; width: 5px; background: var(--accent); opacity: 0.3; transition: 0.5s; z-index: 2000; cursor: pointer; border-radius: 10px 0 0 10px; }
        .compass-sidebar:hover { width: 280px; opacity: 1; background: #1a1a1a; color: white; padding: 30px; }
        .compass-content { display: none; }
        .compass-sidebar:hover .compass-content { display: block; }

        .authors-strip { background: var(--card-bg); padding: 25px 5%; display: flex; gap: 30px; border-bottom: 1px solid rgba(0,0,0,0.05); overflow-x: auto; scrollbar-width: none; }
        .author-item { text-align: center; min-width: 90px; }
        .author-item img { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); margin: 0 auto; transition: 0.3s; }

        .news-card { background: var(--card-bg); border-radius: 30px; overflow: hidden; cursor: pointer; transition: 0.5s; border: 1px solid rgba(0,0,0,0.03); }
        .news-card:hover { transform: translateY(-10px); box-shadow: 0 30px 60px rgba(0,0,0,0.1); }
        
        .parallax-box { height: 450px; overflow: hidden; border-radius: 40px; position: relative; margin: 40px 0; background: #eee; }
        .parallax-box img { width: 100%; height: 160%; object-fit: cover; position: absolute; top: -30%; transition: 0.1s linear; }

        .term { border-bottom: 2px dotted var(--accent); cursor: help; font-weight: 700; color: var(--accent); }
        
        /* --- MASTER CONSOLE (ADMIN) STİLLERİ --- */
        #admin-panel { display: none; background: var(--admin-bg); color: #fff; position: fixed; inset: 0; z-index: 10000; overflow-y: auto; padding: 50px; }
        .input-dark { background: #0f0f0f; border: 1px solid #222; border-radius: 12px; padding: 12px; width: 100%; color: #eee; outline: none; }
        .input-dark:focus { border-color: var(--accent); }
        .glass-card { background: rgba(20, 20, 20, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; padding: 30px; }
    </style>
</head>
<body>

<div class="compass-sidebar">
    <div class="compass-content">
        <h4 class="font-serif text-accent tracking-[3px] text-xs mb-6 uppercase">Dijital Pusula</h4>
        <div id="ui-compass-data" class="space-y-6 text-[11px] font-bold uppercase tracking-widest">
            </div>
    </div>
</div>

<nav class="flex justify-between items-center px-[5%] py-6 bg-white/80 backdrop-blur-md sticky top-0 z-[1000] border-b border-black/5">
    <div class="logo font-serif text-2xl tracking-[5px] font-black uppercase">Lumina</div>
    <div id="wisdom-banner" class="text-[10px] font-black tracking-[3px] uppercase opacity-40 italic"></div>
</nav>

<div id="ui-authors" class="authors-strip"></div>

<div class="max-w-[1440px] mx-auto p-10">
    <main id="ui-news-feed" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12"></main>
</div>

<div id="article-overlay" class="fixed inset-0 bg-[#f4ecd8] hidden z-[5000] overflow-y-auto">
    <div class="sticky top-0 bg-[#f4ecd8]/95 p-6 border-b border-black/5 flex justify-between items-center px-[5%]">
        <div id="ui-article-author" class="flex items-center gap-4"></div>
        <button onclick="closeArticle()" class="w-12 h-12 rounded-full border border-black/10 text-xl">✕</button>
    </div>
    <div id="ui-article-content" class="max-w-4xl mx-auto py-24 px-8"></div>
</div>

<footer class="py-20 text-center">
    <button onclick="toggleAdmin()" class="opacity-20 text-[9px] tracking-[6px] font-bold border-b border-black uppercase">Core System V11 | Master Console</button>
</footer>

<div id="admin-panel">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-end mb-16 border-b border-white/10 pb-10">
            <div>
                <h1 class="text-4xl font-serif">MASTER <span class="text-accent">CONSOLE</span></h1>
                <p class="text-[10px] font-black text-stone-500 mt-2 tracking-[5px] uppercase">Arayüz & IQ Senkronizasyon Merkezi</p>
            </div>
            <button onclick="toggleAdmin()" class="bg-red-600 px-10 py-3 rounded-full text-[10px] font-black uppercase">Kaydet ve Kapat</button>
        </div>

        <div class="grid grid-cols-12 gap-10">
            <div class="col-span-12 lg:col-span-8 glass-card border-l-4 border-accent">
                <h2 class="text-xs font-black text-stone-400 mb-8 uppercase tracking-widest">Yeni Hikaye & IQ Analiz Tanımı</h2>
                <div class="grid grid-cols-2 gap-6">
                    <input id="in-title" type="text" placeholder="Başlık" class="input-master input-dark col-span-2 text-xl font-serif">
                    <textarea id="in-text" placeholder="Hikaye metni..." class="input-master input-dark col-span-2 h-40"></textarea>
                    <input id="in-img" type="text" placeholder="Kapak Görsel URL (Parallax)" class="input-master input-dark">
                    <input id="in-dna-m" type="number" placeholder="Mardin DNA %" class="input-master input-dark">
                    <select id="in-author" class="input-master input-dark"></select>
                    <select id="in-type" class="input-master input-dark">
                        <option>Mistik</option><option>Tarihi</option><option>Modern</option>
                    </select>
                    <button onclick="publishNews()" class="col-span-2 bg-accent py-5 rounded-2xl text-black font-black uppercase tracking-widest text-xs">Arayüze Gönder</button>
                </div>
            </div>

            <div class="col-span-12 lg:col-span-4 space-y-10">
                <div class="glass-card">
                    <h2 class="text-xs font-black text-stone-400 mb-6 uppercase tracking-widest">Pusula Senkronu</h2>
                    <input id="in-dist" placeholder="Mesafe (KM)" class="input-master input-dark mb-4">
                    <input id="in-temp-m" placeholder="Mardin Hava" class="input-master input-dark mb-4">
                    <input id="in-temp-r" placeholder="Rio Hava" class="input-master input-dark mb-4">
                    <button onclick="updateCompass()" class="w-full bg-stone-800 py-3 rounded-xl text-[10px] font-bold uppercase">Pusulayı Güncelle</button>
                </div>
                <div class="glass-card">
                    <h2 class="text-xs font-black text-stone-400 mb-6 uppercase tracking-widest">Sözlük & Bilgelik</h2>
                    <input id="in-term" placeholder="Terim" class="input-dark mb-3">
                    <input id="in-desc" placeholder="Açıklama" class="input-dark mb-3">
                    <button onclick="addGlossary()" class="w-full border border-white/10 py-3 rounded-xl text-[10px] font-bold uppercase mb-6">Sözlüğe Ekle</button>
                    <input id="in-wisdom" placeholder="Günün Bilgeliği..." class="input-dark mb-3">
                    <button onclick="addWisdom()" class="w-full border border-white/10 py-3 rounded-xl text-[10px] font-bold uppercase">Banner Güncelle</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- VERİ TABANI (LocalStorage Entegre) ---
    let db = JSON.parse(localStorage.getItem('lumina_db')) || {
        authors: [
            {id: 'y1', name: 'Caner Elmas', img: 'https://i.pravatar.cc/150?u=9'},
            {id: 'y2', name: 'Livia Santos', img: 'https://i.pravatar.cc/150?u=5'}
        ],
        news: [
            {id: 1, aid: 'y1', title: 'Abbaraların Sessizliği', text: 'Mardin sokaklarında her taşın bir ruhu vardır. Abbara tünellerinden geçerken zamanın durduğunu hissedersiniz.', img: 'https://images.unsplash.com/photo-1582738411706-bfc8e691d1c2?w=800', dna: 85, type: 'Mistik'},
            {id: 2, aid: 'y2', title: 'Amazon Ruhu', text: 'Brezilya ormanlarında Samba ritmi doğanın kalbiyle birleşir.', img: 'https://images.unsplash.com/photo-1516026672322-bc52d61a55d5?w=800', dna: 20, type: 'Modern'}
        ],
        glossary: { 'Abbara': 'Taş geçit.', 'Samba': 'Brezilya dansı.' },
        compass: { dist: '10.840 KM', mardin: '24°C', rio: '31°C' },
        wisdoms: ["Gelenek, küllere tapmak değil, ateşi korumaktır."]
    };

    function saveDB() { localStorage.setItem('lumina_db', JSON.stringify(db)); renderUI(); }

    // --- ARAYÜZ MOTORU (Render) ---
    function renderUI() {
        // Yazarlar
        document.getElementById('ui-authors').innerHTML = db.authors.map(a => `
            <div class="author-item"><img src="${a.img}"><span class="block mt-3 font-bold text-[10px] uppercase tracking-widest opacity-60">${a.name}</span></div>
        `).join('');

        // Haberler
        document.getElementById('ui-news-feed').innerHTML = db.news.map(h => `
            <article class="news-card" onclick="openArticle(${h.id})">
                <img src="${h.img}" class="w-full h-72 object-cover">
                <div class="p-8">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[9px] font-black uppercase text-accent tracking-[3px]">${h.type}</span>
                        <span class="text-[9px] font-bold opacity-30 tracking-[2px]">DNA MATCH %${h.dna}</span>
                    </div>
                    <h2 class="text-xl font-serif mb-4 leading-tight">${h.title}</h2>
                    <p class="text-sm opacity-50 line-clamp-2">${h.text}</p>
                </div>
            </article>
        `).join('');

        // Pusula
        document.getElementById('ui-compass-data').innerHTML = `
            <div class="flex justify-between border-b border-white/10 pb-2"><span>Mesafe</span><span>${db.compass.dist}</span></div>
            <div class="flex justify-between border-b border-white/10 pb-2"><span>Mardin</span><span>${db.compass.mardin}</span></div>
            <div class="flex justify-between border-b border-white/10 pb-2"><span>Rio</span><span>${db.compass.rio}</span></div>
        `;

        // Bilgelik
        document.getElementById('wisdom-banner').innerText = db.wisdoms[db.wisdoms.length - 1];

        // Admin Yazar Select Güncelle
        document.getElementById('in-author').innerHTML = db.authors.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
    }

    // --- MAKALE VE SES MOTORU ---
    const synth = window.speechSynthesis;
    function openArticle(id) {
        const h = db.news.find(x => x.id === id);
        const a = db.authors.find(x => x.id === h.aid);
        let txt = h.text;
        Object.keys(db.glossary).forEach(term => {
            const reg = new RegExp(term, 'g');
            txt = txt.replace(reg, `<span class="term" title="${db.glossary[term]}">${term}</span>`);
        });

        document.getElementById('ui-article-author').innerHTML = `
            <img src="${a.img}" class="w-10 h-10 rounded-full border border-accent">
            <span class="text-[10px] font-black uppercase tracking-widest">${a.name}</span>
            <div class="flex gap-2 ml-4">
                <button onclick="speak()" class="text-[9px] font-black border border-accent px-4 py-1 rounded-full text-accent hover:bg-accent hover:text-white transition">🔊 OKU</button>
                <button onclick="stopS()" class="text-[9px] font-black border border-red-800 px-4 py-1 rounded-full text-red-800 hover:bg-red-800 hover:text-white transition">🛑 DUR</button>
            </div>
        `;

        document.getElementById('ui-article-content').innerHTML = `
            <h1 class="text-6xl font-serif mb-12 leading-tight">${h.title}</h1>
            <div class="parallax-box"><img src="${h.img}" id="parallax-img"></div>
            <div id="p-text" class="text-2xl font-light leading-relaxed text-justify">${txt}</div>
        `;

        document.getElementById('article-overlay').style.display = 'block';
        const overlay = document.getElementById('article-overlay');
        overlay.onscroll = () => {
            const img = document.getElementById('parallax-img');
            if(img) img.style.top = (overlay.scrollTop * 0.15) - 300 + 'px';
        };
    }

    // --- ADMIN FONKSİYONLARI ---
    function publishNews() {
        const n = {
            id: Date.now(),
            aid: document.getElementById('in-author').value,
            title: document.getElementById('in-title').value,
            text: document.getElementById('in-text').value,
            img: document.getElementById('in-img').value,
            dna: document.getElementById('in-dna-m').value,
            type: document.getElementById('in-type').value
        };
        db.news.unshift(n); saveDB();
    }

    function updateCompass() {
        db.compass = {
            dist: document.getElementById('in-dist').value,
            mardin: document.getElementById('in-temp-m').value,
            rio: document.getElementById('in-temp-r').value
        };
        saveDB();
    }

    function addGlossary() {
        db.glossary[document.getElementById('in-term').value] = document.getElementById('in-desc').value;
        saveDB();
    }

    function addWisdom() {
        db.wisdoms.push(document.getElementById('in-wisdom').value);
        saveDB();
    }

    function speak() { synth.cancel(); const u = new SpeechSynthesisUtterance(document.getElementById('p-text').innerText); u.lang='tr-TR'; synth.speak(u); }
    function stopS() { synth.cancel(); }
    function closeArticle() { stopS(); document.getElementById('article-overlay').style.display = 'none'; }
    function toggleAdmin() { const p = document.getElementById('admin-panel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; }

    window.onload = renderUI;
</script>
</body>
</html>
