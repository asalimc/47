<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASC GLOBAL | The Sovereign</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@200;400;900&display=swap');
        
        :root { --gold: #ffb800; --navy: #05070a; --accent: #1e40af; }
        body { font-family: 'Inter', sans-serif; background: var(--navy); color: white; overflow-x: hidden; }
        .font-sync { font-family: 'Syncopate', sans-serif; }

        /* Full Screen Split (Görseldeki Orijinal Tasarım) */
        .hero-wrap { height: 100vh; display: flex; position: relative; overflow: hidden; }
        .side { width: 50%; height: 100%; display: flex; flex-direction: column; justify-content: center; padding: 5%; transition: 0.8s cubic-bezier(0.2, 1, 0.2, 1); cursor: pointer; position: relative; z-index: 2; }
        .side:hover { width: 60%; }
        .side:hover + .side { width: 40%; }
        
        .mardin-bg { background: linear-gradient(to right, #0a1128, #05070a); border-right: 1px solid rgba(255,255,255,0.05); }
        .rio-bg { background: linear-gradient(to left, #061a14, #05070a); }

        /* Floating Center Logo */
        .center-brand {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            pointer-events: none;
            text-align: center;
        }
        .main-logo { font-size: 12vw; line-height: 0.8; font-weight: 900; letter-spacing: -0.05em; opacity: 0.1; }
        .main-logo-filled { font-size: 4vw; font-weight: 900; color: white; letter-spacing: -0.02em; }

        /* Clock Cards */
        .clock-card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            padding: 2rem;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            width: fit-content;
            margin-top: 2rem;
        }

        /* Portal Sections */
        .section-card {
            background: #ffffff05;
            border-radius: 40px;
            border: 1px solid #ffffff10;
            padding: 40px;
            transition: 0.4s;
        }
        .section-card:hover { background: #ffffff08; border-color: var(--gold); }

        [x-cloak] { display: none !important; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--gold); }
    </style>
</head>
<body x-data="portalControl()" x-init="init()">

    <nav class="fixed top-0 w-full z-[100] px-12 py-8 flex justify-between items-center mix-blend-difference">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-white text-black flex items-center justify-center font-black rounded-lg">A</div>
            <span class="font-sync text-xl tracking-tighter text-white">ASC GLOBAL</span>
        </div>
        <button @click="openAdmin()" class="bg-white text-black px-10 py-3 rounded-full font-black text-[10px] tracking-widest hover:bg-amber-500 transition">TERMINAL</button>
    </nav>

    <section x-show="currentPage === 'home'" class="hero-wrap" x-transition.opacity>
        <div class="center-brand">
            <div class="main-logo font-sync">ASC</div>
            <div class="main-logo-filled font-sync">GLOBAL</div>
        </div>

        <div @click="viewRegion('Mardin')" class="side mardin-bg group">
            <div class="relative z-20">
                <h2 class="font-sync text-6xl italic mb-4 opacity-50 group-hover:opacity-100 transition">MARDİN</h2>
                <div class="clock-card">
                    <div class="text-4xl font-black text-blue-500 mb-2" x-text="mardinTime"></div>
                    <div class="text-[10px] tracking-[0.4em] font-bold text-slate-500">MARDIN TIME / TR</div>
                </div>
            </div>
        </div>

        <div @click="viewRegion('Sao Paulo')" class="side rio-bg group items-end text-right">
            <div class="relative z-20">
                <h2 class="font-sync text-6xl italic mb-4 opacity-50 group-hover:opacity-100 transition">RIO</h2>
                <div class="clock-card ml-auto">
                    <div class="text-4xl font-black text-green-500 mb-2" x-text="rioTime"></div>
                    <div class="text-[10px] tracking-[0.4em] font-bold text-slate-500">RIO TIME / BR</div>
                </div>
            </div>
        </div>
    </section>

    <main x-show="currentPage === 'home'" class="py-32 px-12 max-w-[1600px] mx-auto space-y-32">
        
        <section class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            <template x-for="author in authors">
                <div @click="viewItem(author)" class="section-card flex items-center gap-8 cursor-pointer group">
                    <img :src="author.photo || 'https://via.placeholder.com/200'" class="w-32 h-32 rounded-[30px] border-2 border-amber-500 grayscale group-hover:grayscale-0 transition duration-500">
                    <div>
                        <p class="text-amber-500 font-black text-[10px] tracking-[0.4em] mb-2" x-text="author.title"></p>
                        <h3 class="text-3xl font-black uppercase" x-text="author.name"></h3>
                        <p class="text-slate-500 text-xs mt-4 line-clamp-2" x-text="author.bio"></p>
                    </div>
                </div>
            </template>
        </section>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <template x-for="n in newsData">
                <div @click="viewItem(n)" class="section-card group cursor-pointer">
                    <div class="h-64 rounded-[30px] overflow-hidden mb-8">
                        <img :src="n.img" class="w-full h-full object-cover group-hover:scale-110 transition duration-1000">
                    </div>
                    <span class="bg-white/10 px-4 py-1 rounded-full text-[9px] font-black tracking-widest uppercase mb-4 inline-block" x-text="n.region"></span>
                    <h4 class="text-xl font-black leading-tight group-hover:text-amber-500 transition" x-text="n.title"></h4>
                </div>
            </template>
        </section>
    </main>

    <div x-show="currentPage === 'reader'" class="fixed inset-0 z-[1000] bg-black overflow-y-auto" x-cloak x-transition>
        <div class="max-w-[900px] mx-auto py-32 px-8">
            <button @click="currentPage = 'home'" class="fixed top-12 right-12 text-white text-4xl hover:rotate-90 transition"><i class="fas fa-times"></i></button>
            <h1 class="font-sync text-4xl md:text-7xl mb-12 italic leading-none" x-text="selectedItem?.title || selectedItem?.name"></h1>
            <img :src="selectedItem?.img || selectedItem?.photo" class="w-full h-[500px] object-cover rounded-[50px] mb-16 shadow-2xl">
            <div class="text-2xl text-slate-300 leading-relaxed font-light italic" x-html="selectedItem?.body || selectedItem?.bio"></div>
        </div>
    </div>

    <div x-show="currentPage === 'admin'" class="fixed inset-0 z-[2000] bg-[#05070a] p-12 overflow-y-auto" x-cloak>
        <div class="max-w-[1200px] mx-auto">
            <div class="flex justify-between items-center mb-20 border-b border-white/5 pb-10">
                <h2 class="font-sync text-2xl uppercase tracking-tighter">ASC <span class="text-amber-500">TERMINAL</span></h2>
                <button @click="currentPage = 'home'" class="text-red-500 font-black text-[10px] tracking-widest border border-red-500/20 px-8 py-3 rounded-full">EXIT_SESSION</button>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-20">
                <div class="space-y-8">
                    <div class="flex gap-4">
                        <button @click="editorType = 'news'" :class="editorType === 'news' ? 'bg-amber-500 text-black' : 'bg-white/5'" class="px-8 py-3 rounded-full font-black text-[10px]">BROADCAST</button>
                        <button @click="editorType = 'author'" :class="editorType === 'author' ? 'bg-amber-500 text-black' : 'bg-white/5'" class="px-8 py-3 rounded-full font-black text-[10px]">OPERATIVE</button>
                    </div>
                    <div class="space-y-4">
                        <template x-if="editorType === 'news'">
                            <div class="space-y-4">
                                <input x-model="newsForm.title" type="text" placeholder="Headline" class="w-full bg-white/5 p-6 rounded-2xl outline-none border border-white/5 focus:border-amber-500 transition">
                                <select x-model="newsForm.region" class="w-full bg-white/5 p-6 rounded-2xl outline-none border border-white/5">
                                    <option value="Mardin">Mardin</option>
                                    <option value="Sao Paulo">Sao Paulo</option>
                                    <option value="Global">Global</option>
                                </select>
                                <textarea x-model="newsForm.body" placeholder="Log entry..." class="w-full bg-white/5 p-6 rounded-2xl h-48 outline-none border border-white/5 focus:border-amber-500 transition"></textarea>
                            </div>
                        </template>
                        <template x-if="editorType === 'author'">
                            <div class="space-y-4">
                                <input x-model="authorForm.name" type="text" placeholder="Name" class="w-full bg-white/5 p-6 rounded-2xl outline-none">
                                <input x-model="authorForm.title" type="text" placeholder="Title" class="w-full bg-white/5 p-6 rounded-2xl outline-none">
                                <textarea x-model="authorForm.bio" placeholder="Bio..." class="w-full bg-white/5 p-6 rounded-2xl h-32 outline-none"></textarea>
                            </div>
                        </template>
                        <div class="border-2 border-dashed border-white/10 p-10 rounded-3xl text-center group cursor-pointer hover:bg-white/5 relative">
                            <input type="file" @change="handleUpload" class="absolute inset-0 opacity-0 cursor-pointer">
                            <span class="text-[10px] font-black text-slate-500 group-hover:text-amber-500">UPLOAD_MEDIA_ASSET</span>
                        </div>
                        <button @click="saveData()" class="w-full bg-white text-black py-6 rounded-2xl font-black tracking-[0.4em] text-xs hover:bg-amber-500 transition-all">SYNC_DATABASE</button>
                    </div>
                </div>

                <div class="bg-white/5 p-8 rounded-3xl">
                    <h3 class="text-amber-500 font-black text-[10px] tracking-widest mb-10">ACTIVE_INVENTORY</h3>
                    <div class="space-y-4">
                        <template x-for="(n, idx) in newsData" :key="n.id">
                            <div class="flex items-center justify-between p-4 bg-black/40 rounded-xl group border border-white/5">
                                <span class="text-[10px] font-bold truncate max-w-[200px]" x-text="n.title"></span>
                                <button @click="deleteNews(idx)" class="text-red-500 hover:text-white"><i class="fas fa-trash"></i></button>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function portalControl() {
            return {
                currentPage: 'home', editorType: 'news', selectedItem: null,
                mardinTime: '', rioTime: '',
                newsForm: { title: '', region: 'Mardin', body: '', img: '' },
                authorForm: { name: '', title: '', bio: '', photo: '' },

                newsData: JSON.parse(localStorage.getItem('asc_v12_news')) || [
                    { id: 1, title: 'Mardin Intelligence Center: Phase 4 Online', region: 'Mardin', body: 'The historical corridor is now protected by quantum encryption nodes...', img: 'https://images.unsplash.com/photo-1582236894056-e918b9588667?w=1600' },
                    { id: 2, title: 'Sao Paulo Finance: Block-Sovereignty Plan', region: 'Sao Paulo', body: 'Digital assets integration confirmed for municipal governance...', img: 'https://images.unsplash.com/photo-1543059180-87383af5bd1f?w=1600' },
                    { id: 3, title: 'Global 2026 Strategy: The Meridian Axis', region: 'Global', body: 'New trade agreements between Mesopotamia and South America...', img: 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=1600' }
                ],
                authors: JSON.parse(localStorage.getItem('asc_v12_authors')) || [
                    { id: 1, name: 'Ahmet Çınarbaş', title: 'Political Scientist', bio: 'Strategic operations director for ASC Global Mardin HQ.', photo: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400' },
                    { id: 2, name: 'M. Beşir Ayanoğlu', title: 'Legal Counsel', bio: 'International digital law and sovereign governance expert.', photo: 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=400' }
                ],

                init() { 
                    this.updateClocks();
                    setInterval(() => this.updateClocks(), 1000);
                    this.sync(); 
                },
                updateClocks() {
                    const now = new Date();
                    this.mardinTime = now.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                    this.rioTime = new Date(now.getTime() - (6 * 60 * 60 * 1000)).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                },
                handleUpload(e) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        if(this.editorType === 'news') this.newsForm.img = reader.result;
                        else this.authorForm.photo = reader.result;
                    };
                    reader.readAsDataURL(e.target.files[0]);
                },
                openAdmin() { if(prompt("ACCESS_KEY:") === "Mardin47**") this.currentPage = 'admin'; },
                saveData() {
                    if(this.editorType === 'news') this.newsData.unshift({...this.newsForm, id: Date.now()});
                    else this.authors.push({...this.authorForm, id: Date.now()});
                    this.sync(); this.resetForms(); alert("SYNC_COMPLETE");
                },
                deleteNews(idx) { this.newsData.splice(idx, 1); this.sync(); },
                viewItem(item) { this.selectedItem = item; this.currentPage = 'reader'; window.scrollTo(0,0); },
                sync() { localStorage.setItem('asc_v12_news', JSON.stringify(this.newsData)); localStorage.setItem('asc_v12_authors', JSON.stringify(this.authors)); },
                resetForms() { this.newsForm = { title: '', region: 'Mardin', body: '', img: '' }; this.authorForm = { name: '', title: '', bio: '', photo: '' }; }
            }
        }
    </script>
</body>
</html>
