<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Ahmet Çınarbaş | Derin Arşiv</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        * { font-style: normal !important; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background-color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; color: #1e293b; margin: 0; overflow-x: hidden; }

        .main-layout { max-width: 1440px; margin: 0 auto; display: grid; grid-template-columns: 1.618fr 1fr; gap: 2rem; padding: 2rem; min-height: 90vh; }
        @media (max-width: 1024px) { .main-layout { grid-template-columns: 1fr; padding: 1rem; } }

        .archive-slider-box { 
            background: #ffffff; border-radius: 40px; padding: 4rem; color: #1e293b; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.05); border: 1px solid #e2e8f0;
            display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden;
        }
        @media (max-width: 640px) { .archive-slider-box { padding: 2.5rem 1.5rem; border-radius: 24px; } }

        .slider-wrapper { 
            display: flex; overflow-x: auto; scroll-snap-type: x mandatory; 
            scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
            gap: 0; cursor: grab; scrollbar-width: none; 
        }
        .slider-wrapper::-webkit-scrollbar { display: none; }
        .slider-wrapper:active { cursor: grabbing; }

        .archive-slide { min-width: 100%; scroll-snap-align: start; position: relative; padding: 1rem; flex-shrink: 0; }
        
        .file-number { position: absolute; top: -20px; right: 0; font-size: 10rem; font-weight: 900; opacity: 0.05; color: #64748b; pointer-events: none; }
        .on-air-indicator { position: absolute; top: 30px; right: 40px; display: none; align-items: center; gap: 8px; color: #ef4444; font-weight: 800; font-size: 11px; letter-spacing: 2px; }
        .pulse { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .audio-controls { margin-top: 2.5rem; display: flex; align-items: center; gap: 1rem; background: #f1f5f9; padding: 0.8rem 1.5rem; border-radius: 16px; width: fit-content; position: relative; z-index: 20; }
        .progress-container { width: 120px; height: 6px; background: #e2e8f0; border-radius: 3px; cursor: pointer; position: relative; }
        .progress-bar { width: 0%; height: 100%; background: #2563eb; border-radius: 3px; }

        .action-btn { background: #1e293b; color: white; padding: 0.9rem 1.8rem; border-radius: 14px; font-weight: 700; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; transition: all 0.2s; cursor: pointer; }
        
        .sidebar-gold { display: flex; flex-direction: column; gap: 1.5rem; }
        .author-card { background: white; border-radius: 40px; padding: 2.5rem; text-align: center; border: 1px solid #e2e8f0; }
        .profile-img { width: 140px; height: 140px; border-radius: 40px; object-fit: cover; margin: 0 auto 1.5rem; border: 6px solid #f8fafc; }
        .sponsor-card { background: #2563eb; color: white; border-radius: 40px; padding: 2rem; text-align: center; }
    </style>
</head>
<body>

    <header class="max-w-[1440px] mx-auto px-8 py-8 flex justify-between items-center">
        <div class="text-xl font-black tracking-tighter uppercase">AHMET ÇINARBAŞ <span class="text-blue-600">BELLEK</span></div>
        <div class="text-[9px] font-bold opacity-40 uppercase tracking-[0.3em]">ARŞİV 2026</div>
    </header>

    <div class="main-layout">
        <main class="archive-slider-box" id="mainContainer">
            <div id="status-light" class="on-air-indicator"><span class="pulse"></span> CANLI KAYIT</div>
            
            <div class="slider-wrapper" id="mainSlider">
                <div class="archive-slide">
                    <div class="file-number">01</div>
                    <span class="text-blue-600 font-bold uppercase tracking-widest text-[10px] mb-4 block">Hınzır Kapısı & Ahnenerbe</span>
                    <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight text-slate-900 leading-tight mb-6">Mühürlü <br>Gerçekler</h1>
                    <div class="audio-controls">
                        <button onclick="toggleAudio('hinzir')" class="action-btn" id="btn-hinzir">Dinle</button>
                        <div class="progress-container" onclick="seek(event, 'hinzir')"><div id="prog-hinzir" class="progress-bar"></div></div>
                    </div>
                </div>

                <div class="archive-slide">
                    <div class="file-number">02</div>
                    <span class="text-blue-600 font-bold uppercase tracking-widest text-[10px] mb-4 block">Mardinspor Ruhu</span>
                    <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight text-slate-900 leading-tight mb-6">Kırmızı <br>Lacivert</h1>
                    <div class="audio-controls">
                        <button onclick="toggleAudio('mardinspor')" class="action-btn" id="btn-mardinspor">Dinle</button>
                        <div class="progress-container" onclick="seek(event, 'mardinspor')"><div id="prog-mardinspor" class="progress-bar"></div></div>
                    </div>
                </div>

                <div class="archive-slide">
                    <div class="file-number">03</div>
                    <span class="text-blue-600 font-bold uppercase tracking-widest text-[10px] mb-4 block">Tarihin Katmanları</span>
                    <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight text-slate-900 leading-tight mb-6">Gizli <br>Mezopotamya</h1>
                    <div class="audio-controls">
                        <button onclick="toggleAudio('tarih')" class="action-btn" id="btn-tarih">Dinle</button>
                        <div class="progress-container" onclick="seek(event, 'tarih')"><div id="prog-tarih" class="progress-bar"></div></div>
                    </div>
                </div>
            </div>

            <div class="flex gap-3 mt-10">
                <div class="w-12 h-1.5 bg-blue-600 rounded-full transition-all" id="dot0"></div>
                <div class="w-3 h-1.5 bg-slate-200 rounded-full transition-all" id="dot1"></div>
                <div class="w-3 h-1.5 bg-slate-200 rounded-full transition-all" id="dot2"></div>
            </div>
        </main>

        <aside class="sidebar-gold">
            <div class="author-card">
                <img src="https://pbs.twimg.com/profile_images/1559852899303317504/pjkJwYHb_400x400.jpg" class="profile-img">
                <h2 class="text-2xl font-black text-slate-900 mb-1">Ahmet Çınarbaş</h2>
                <p class="text-blue-600 font-bold text-[10px] tracking-widest mb-4 uppercase">Gazeteci Yazar</p>
                <p class="text-slate-500 text-sm font-medium leading-relaxed px-4">Mezopotamya'nın mühürlü kodlarını araştıran kadim arşivci.</p>
            </div>
            <div class="sponsor-card">
                <h3 class="text-2xl font-black uppercase tracking-tighter">Yaşarbey Kahve</h3>
                <p class="text-[9px] font-bold mt-1 opacity-80 uppercase tracking-widest">Kültür Sponsoru</p>
            </div>
        </aside>
    </div>

    <script>
        const synth = window.speechSynthesis;
        let utter = null, isPaused = false, currentKey = '', lastCharIndex = 0;
        let audioCtx, noiseNode, gainNode;
        const slider = document.getElementById('mainSlider');
        let autoPlayInterval;

        const texts = {
            hinzir: `Hınzır Kapısı ve Ahnenerbe. Burada dinleyeceğiniz bilgiler tarih kitaplarında yok. Hınzır, milattan önce 2400'lü yıllarda kurulan ve günümüzde hâlâ sessizce varlığını sürdüren bir tarikattır. Genetik olarak saf olmayan insanları ruhsal kapının dışında tutmak asıl amaçtır. 1904'te Mor Yakup Manastırı'nın alt katmanında tuhaf bir mekanizma bulundu. Bu sistem Görünmeyen Sesler denen bir teknolojiyi açığa çıkarıyordu. Baron Rudolf von Sebottendorf, Mardin'deki yapıyı çözmek için Adolf Hitler'e danıştı. Hitler'in asıl ilgisi Anunnakilereydi. Mardin'deki kapı sadece belirli genetik frekansla açılmaktadır. Kapının ardında Anunnakilerin bir alt sınıfı olan Cin türü varlıklar vardır. Baron 1942'de kaybolurken notuna şöyle yazdı: Geri döneceğim ama zamanın içinden değil, altından. Gerçekler açıklanırsa dinler ve bilim aynı anda çökebilir.`,
            mardinspor: `Mardinspor Ruhu. Renkleri asil Kırmızı laciverttir. Beleş Tepe’ye tırmanan mahzun ama gururlu bakışlar bir maçtan fazlasıdır. Tribünde halka tatlı satanların kokusu, kulağına dayadığı radyodan diğer maçları dinleyen o kadim taraftarlar. Tellere yapışan, atletini sallayan ateşli adamlar. Bileti olmayan çocukları paltosunun altında stada sokan koca yürekli insanlar. Paylaşmayı, acıyı ve sevinci aynı anda yaşamaktır Mardinspor. Kırmızı sevgimiz, lacivert kaderimizdir.`,
            tarih: `Mardin'in Bilinmeyen Tarihi. Bir: Şehir yerin yedi kat altına uzanan devasa bir mağara sistemi üzerindedir. İki: Kale surları ovadan gelen frekansları kıran bir akustik aynadır. Üç: Çarşının altında hiç sönmeyen bir enerji merkezi vardır. Dört: Kapı tokmakları yer altına giriş yetkisini gösteren şifre anahtarlarıdır. Beş: Şahmeran hikayesi hibrit bir neslin genetik hatırasıdır. Altı: Mardin zamanın dikey aktığı, taşların ışığı emip ovaya geri verdiği bir mekandır.`
        };

        // OTOMATİK AKIŞ (3 SANİYE)
        function startAutoPlay() {
            autoPlayInterval = setInterval(() => {
                let next = (Math.round(slider.scrollLeft / slider.clientWidth) + 1) % 3;
                slider.scrollTo({ left: next * slider.clientWidth, behavior: 'smooth' });
            }, 3000);
        }
        function stopAutoPlay() { clearInterval(autoPlayInterval); }
        startAutoPlay();
        
        // KULLANICI ETKİLEŞİMİNDE OTOMATİĞİ DURDUR
        slider.addEventListener('touchstart', stopAutoPlay);
        slider.addEventListener('mousedown', stopAutoPlay);

        // MASAÜSTÜ DRAG (KAYDIRMA) ÇÖZÜMÜ
        let isDown = false, startX, scrollLeft;
        slider.addEventListener('mousedown', (e) => {
            isDown = true; slider.classList.add('active');
            startX = e.pageX - slider.offsetLeft;
            scrollLeft = slider.scrollLeft;
            slider.style.scrollSnapType = 'none';
        });
        slider.addEventListener('mouseleave', () => { isDown = false; slider.style.scrollSnapType = 'x mandatory'; });
        slider.addEventListener('mouseup', () => { isDown = false; slider.style.scrollSnapType = 'x mandatory'; });
        slider.addEventListener('mousemove', (e) => {
            if(!isDown) return;
            e.preventDefault();
            const x = e.pageX - slider.offsetLeft;
            const walk = (x - startX) * 2;
            slider.scrollLeft = scrollLeft - walk;
        });

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < buffer.length; i++) data[i] = Math.random() * 2 - 1;
                noiseNode = audioCtx.createBufferSource();
                noiseNode.buffer = buffer; noiseNode.loop = true;
                gainNode = audioCtx.createGain(); gainNode.gain.value = 0.002;
                noiseNode.connect(gainNode); gainNode.connect(audioCtx.destination);
                noiseNode.start();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function toggleAudio(key) {
            initAudio();
            stopAutoPlay();
            if (currentKey === key && synth.speaking) {
                if (isPaused) { synth.resume(); isPaused = false; document.getElementById('btn-'+key).innerText = 'Durdur'; }
                else { synth.pause(); isPaused = true; document.getElementById('btn-'+key).innerText = 'Devam Et'; }
            } else {
                synth.cancel();
                setTimeout(() => { startSpeaking(key, 0); }, 50);
            }
        }

        function startSpeaking(key, startPos) {
            currentKey = key; isPaused = false;
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            const fullText = texts[key];
            utter = new SpeechSynthesisUtterance(fullText.substring(startPos));
            utter.lang = 'tr-TR';
            
            // MOBİL HASSASİYET: Normal hızda ama duygu yüklü (vurgulu)
            utter.rate = isMobile ? 1.0 : 0.8; 
            utter.pitch = 0.95; 

            utter.onboundary = (e) => {
                lastCharIndex = startPos + e.charIndex;
                const progress = (lastCharIndex / fullText.length) * 100;
                document.getElementById('prog-'+key).style.width = progress + '%';
                
                // Noktalama işaretlerinde hafif beklemeler (Vakur esler)
                if (fullText[lastCharIndex] === '.') { synth.pause(); setTimeout(() => synth.resume(), 300); }
            };

            utter.onstart = () => {
                document.getElementById('status-light').style.display = 'flex';
                document.getElementById('btn-'+key).innerText = 'Durdur';
            };

            utter.onend = () => {
                if(!isPaused) {
                    document.getElementById('status-light').style.display = 'none';
                    document.getElementById('btn-'+key).innerText = 'Dinle';
                    document.getElementById('prog-'+key).style.width = '0%';
                }
            };
            synth.speak(utter);
        }

        function seek(event, key) {
            const rect = event.currentTarget.getBoundingClientRect();
            const percent = (event.clientX - rect.left) / rect.width;
            startSpeaking(key, Math.floor(texts[key].length * percent));
        }

        slider.addEventListener('scroll', () => {
            const idx = Math.round(slider.scrollLeft / slider.clientWidth);
            for(let i=0; i<3; i++) {
                const dot = document.getElementById('dot'+i);
                if(dot) {
                    dot.style.width = i === idx ? '48px' : '12px';
                    dot.style.backgroundColor = i === idx ? '#2563eb' : '#e2e8f0';
                }
            }
        });
    </script>
</body>
</html>
