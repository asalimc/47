<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmet Çınarbaş | Modern Gallery Archive 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-charcoal: #2A2B2D;
            --light-grey: #F0F0F0;
            --medium-grey: #D5D5D5;
            --accent-gold: #A68966;
            --white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            color: var(--dark-charcoal);
            line-height: 1.7;
            background-color: var(--light-grey);
            display: flex; /* Ana layout için flex */
            min-height: 100vh;
        }

        /* --- SABİT YAN MENÜ (SOL) --- */
        .sidebar-nav {
            width: 250px; /* Menü genişliği */
            min-width: 200px;
            background-color: var(--dark-charcoal);
            color: var(--white);
            padding: 40px 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .sidebar-title {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 30px;
            color: var(--accent-gold);
            line-height: 1.1;
        }
        .nav-list { list-style: none; width: 100%; }
        .nav-list li { margin-bottom: 10px; }
        .nav-list a {
            display: block;
            padding: 8px 15px;
            color: var(--medium-grey);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 400;
            transition: all 0.3s ease;
            border-radius: 3px;
        }
        .nav-list a:hover, .nav-list a.active {
            background-color: rgba(255,255,255,0.08);
            color: var(--white);
            padding-left: 20px;
        }
        .sidebar-footer {
            margin-top: auto; /* Footer'ı alta it */
            font-size: 0.7rem;
            color: var(--medium-grey);
            text-align: center;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-top: 1px dashed rgba(255,255,255,0.1);
            padding-top: 20px;
        }

        /* --- ANA İÇERİK ALANI (SAĞ) --- */
        .main-content {
            margin-left: 250px; /* Menü genişliği kadar boşluk */
            flex-grow: 1; /* Kalan alanı kapla */
            padding: 60px 80px; /* Genel içerik boşluğu */
            background-color: var(--white); /* İçerik kartları beyaz */
            box-shadow: -5px 0 15px rgba(0,0,0,0.03); /* Hafif gölge */
            min-height: 100vh;
        }

        /* Başlıklar ve açılış yazıları */
        .intro-header {
            text-align: center;
            margin-bottom: 80px;
            padding-bottom: 40px;
            border-bottom: 1px solid var(--medium-grey);
        }
        .intro-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 700;
            line-height: 1.1;
            color: var(--dark-charcoal);
        }
        .intro-subtitle {
            font-size: 0.8rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--accent-gold);
            margin-top: 20px;
        }

        /* BÖLÜM KARTLARI */
        .section-card {
            margin-bottom: 100px; /* Bölümler arası boşluk */
            border-bottom: 1px solid var(--medium-grey);
            padding-bottom: 60px;
        }
        .section-card:last-of-type { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

        .image-container {
            width: 100%;
            height: 55vh; /* Görsel yüksekliği */
            overflow: hidden;
            margin-bottom: 40px;
            border-radius: 4px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
            filter: grayscale(80%) brightness(0.9);
        }
        .section-card:hover .image-container img {
            transform: scale(1.05);
            filter: grayscale(0%) brightness(1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 30px;
        }
        .card-num {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.8rem;
            font-weight: 300;
            font-style: italic;
            color: var(--accent-gold);
        }
        .card-title-box { text-align: right; }
        .card-title-tr {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--dark-charcoal);
            line-height: 1.1;
        }
        .card-title-pt {
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            color: var(--medium-grey);
            margin-top: 5px;
        }

        .text-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }
        .text-col {
            text-align: justify;
            font-size: 0.95rem;
            hyphens: auto;
        }
        .text-col p { margin-bottom: 15px; }
        .text-col p:last-child { margin-bottom: 0; }
        .text-col.portuguese {
            color: #777;
            border-left: 1px solid var(--medium-grey);
            padding-left: 30px;
            font-style: italic;
        }

        .card-seal {
            margin-top: 50px;
            padding-top: 25px;
            border-top: 1px dashed var(--medium-grey);
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            color: var(--accent-gold);
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .s-circle {
            width: 30px; height: 30px;
            border: 1px solid var(--accent-gold);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            font-size: 0.8em;
        }

        /* --- MOBİL UYARLAMA --- */
        @media (max-width: 900px) {
            body { flex-direction: column; }
            .sidebar-nav {
                width: 100%;
                height: auto;
                position: relative;
                padding: 20px;
                border-right: none;
                border-bottom: 1px solid rgba(255,255,255,0.05);
            }
            .sidebar-title { font-size: 1.8rem; margin-bottom: 20px; }
            .nav-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; }
            .nav-list li { margin-bottom: 0; }
            .nav-list a { padding: 5px 10px; font-size: 0.8rem; }
            .sidebar-footer { margin-top: 20px; padding-top: 15px; }

            .main-content { margin-left: 0; padding: 40px 25px; }
            .intro-header { margin-bottom: 50px; }
            .intro-title { font-size: 3rem; }
            .text-grid { grid-template-columns: 1fr; gap: 30px; }
            .text-col.portuguese { border-left: none; border-top: 1px solid var(--medium-grey); padding-left: 0; padding-top: 30px; }
            .image-container { height: 40vh; margin-bottom: 30px; }
            .section-card { margin-bottom: 70px; padding-bottom: 40px; }
            .card-header { flex-direction: column; align-items: flex-start; margin-bottom: 25px; }
            .card-title-box { text-align: left; margin-top: 10px; }
            .card-title-tr { font-size: 1.8rem; }
            .card-title-pt { font-size: 0.9rem; }
            .card-num { margin-bottom: 10px; }
        }
    </style>
</head>
