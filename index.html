<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSP Global | Master Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .msp-title { font-family: 'Playfair Display', serif; }
        .view-node { display: none; }
        .active-view { display: block; animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .admin-sidebar { height: calc(100vh - 4rem); position: sticky; top: 4rem; }
        .img-preview { width: 100%; height: 160px; object-fit: cover; border-radius: 1rem; display: none; margin-top: 10px; border: 2px solid #e2e8f0; }
    </style>
</head>
<body class="text-slate-900 overflow-x-hidden">

    <header class="h-16 bg-white border-b sticky top-0 z-[100] flex items-center shadow-sm">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <div onclick="router('home')" class="cursor-pointer">
                <h1 class="text-xl font-black tracking-tighter uppercase">MSP<span class="text-red-600">.</span>GLOBAL</h1>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="router('admin')" class="bg-slate-900 text-white text-[10px] font-black px-4 py-2 rounded-full hover:bg-blue-600 transition shadow-lg uppercase">ADMİN DASHBOARD</button>
            </div>
        </div>
    </header>

    <main id="view-home" class="view-node active-view container mx-auto px-4 py-8">
        <div class="grid grid-cols-12 gap-6">
            <div class="col-span-12 lg:col-span-8 space-y-8" id="news-container">
                <div class="text-center py-20 bg-white rounded-[3rem] border-2 border-dashed border-slate-200" id="no-news">
                    <p class="text-slate-400 font-bold italic">Henüz haber eklenmemiş. Admin panelinden ilk haberi paylaşın!</p>
                </div>
            </div>
            
            <aside class="col-span-12 lg:col-span-4 space-y-6">
                <div id="ad-space" class="rounded-[2.5rem] overflow-hidden shadow-xl min-h-[300px] bg-slate-200 flex items-center justify-center italic text-slate-400">Reklam Alanı</div>
                <div class="bg-white p-8 rounded-[3.5rem] shadow-sm border border-slate-100">
                    <h3 class="text-xs font-black uppercase text-slate-400 mb-6 tracking-widest border-l-4 border-red-600 pl-3">Yazarlar</h3>
                    <div id="author-list-home" class="space-y-4"></div>
                </div>
            </aside>
        </div>
    </main>

    <main id="view-detail" class="view-node container mx-auto px-4 py-12 max-w-4xl">
        <button onclick="router('home')" class="mb-8 text-xs font-black uppercase text-slate-400 hover:text-blue-600 transition">← Geri Dön</button>
        <div class="flex flex-col gap-6">
            <h1 id="det-title" class="msp-title text-4xl lg:text-6xl font-black leading-tight"></h1>
            <div class="flex items-center gap-4 bg-white p-3 rounded-2xl shadow-sm w-max border">
                <button onclick="changeSize(-2)" class="px-3 py-1 font-bold">A-</button>
                <button onclick="changeSize(2)" class="px-3 py-1 font-bold border-x">A+</button>
                <button onclick="speakContent()" id="speech-btn" class="px-4 py-1 text-[10px] font-black uppercase text-blue-600">DİNLE</button>
            </div>
            <img id="det-img" src="" class="w-full rounded-[3rem] shadow-2xl">
            <div id="det-content" class="text-lg leading-relaxed text-slate-700 space-y-6"></div>
        </div>
    </main>

    <main id="view-admin" class="view-node min-h-screen bg-[#0f172a] text-slate-300">
        <div class="flex flex-col lg:flex-row">
            <aside class="w-full lg:w-72 bg-slate-900 border-r border-slate-800 p-6 admin-sidebar flex flex-col gap-2">
                <p class="text-[10px] font-black text-slate-500 uppercase px-4 mb-4">Master Yönetim</p>
                <button onclick="setMod('haber')" class="flex items-center gap-4 p-4 hover:bg-blue-600/10 rounded-2xl transition text-sm font-bold"><i class="fas fa-newspaper text-blue-500"></i> Haberler</button>
                <button onclick="setMod('yazar')" class="flex items-center gap-4 p-4 hover:bg-emerald-600/10 rounded-2xl transition text-sm font-bold"><i class="fas fa-user-pen text-emerald-500"></i> Köşe Yazarları</button>
                <button onclick="setMod('reklam')" class="flex items-center gap-4 p-4 hover:bg-amber-600/10 rounded-2xl transition text-sm font-bold"><i class="fas fa-ad text-amber-500"></i> Reklamlar</button>
                <button onclick="router('home')" class="mt-auto p-4 bg-slate-800 rounded-2xl text-[10px] font-black uppercase tracking-widest text-center">Siteye Dön</button>
            </aside>

            <section class="flex-1 p-6 lg:p-12 overflow-y-auto h-screen">
                <div class="flex justify-between items-center mb-10">
                    <h2 id="mod-head" class="text-3xl font-black text-white italic uppercase">Haber Yönetimi</h2>
                    <button onclick="openModal()" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-black text-xs uppercase shadow-xl hover:bg-blue-500">+ YENİ EKLE</button>
                </div>

                <div class="bg-slate-900 rounded-[2.5rem] border border-slate-800 overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-800/50 text-slate-500 text-[10px] font-black uppercase">
                            <tr><th class="p-6">Görsel</th><th class="p-6">Başlık</th><th class="p-6 text-right">İşlemler</th></tr>
                        </thead>
                        <tbody id="admin-table" class="divide-y divide-slate-800"></tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 z-[200] bg-black/90 backdrop-blur-md flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-xl rounded-[3rem] p-10 relative max-h-[90vh] overflow-y-auto shadow-2xl">
            <h3 id="modal-title" class="text-3xl font-black mb-8 italic">İçerik Detayları</h3>
            <div id="form-body" class="space-y-4">
                <img id="m-preview" src="" class="img-preview">
                <label class="block p-6 border-2 border-dashed border-slate-200 rounded-2xl cursor-pointer text-center text-xs font-bold text-slate-400">
                    Görsel Seç (Local)
                    <input type="file" class="hidden" onchange="fileToBase64(event)">
                </label>
                <input id="m-title" type="text" placeholder="Başlık / İsim" class="w-full p-4 bg-slate-50 rounded-2xl border outline-none">
                <textarea id="m-text" placeholder="İçerik Metni" class="w-full p-4 bg-slate-50 rounded-2xl border h-32 outline-none"></textarea>
                <input id="m-sub" type="text" placeholder="Alt Başlık / Görevi (Haber ise Yazar Adı)" class="w-full p-4 bg-slate-50 rounded-2xl border outline-none">
            </div>
            <div class="mt-8 flex gap-4">
                <button onclick="closeModal()" class="flex-1 p-4 font-bold text-slate-400">İptal</button>
                <button onclick="saveData()" class="flex-[2] bg-blue-600 text-white p-4 rounded-2xl font-black uppercase text-xs shadow-lg">Yayınla / Kaydet</button>
            </div>
        </div>
    </div>

    <script>
        // Veritabanı (LocalStorage)
        let db = JSON.parse(localStorage.getItem('msp_master_db')) || { haber: [], yazar: [], reklam: [] };
        let activeMod = 'haber';
        let editId = null;
        let activeImg = "";

        // Router & Mod
        function router(id) {
            document.querySelectorAll('.view-node').forEach(v => v.classList.remove('active-view'));
            document.getElementById('view-' + id).classList.add('active-view');
            if(id === 'home') renderPortal();
            if(id === 'admin') renderAdmin();
            window.scrollTo(0,0);
        }

        function setMod(m) {
            activeMod = m;
            document.getElementById('mod-head').innerText = m.toUpperCase() + " YÖNETİMİ";
            renderAdmin();
        }

        // Resim İşleme
        function fileToBase64(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                activeImg = reader.result;
                const prev = document.getElementById('m-preview');
                prev.src = activeImg;
                prev.style.display = 'block';
            };
            if(file) reader.readAsDataURL(file);
        }

        // Admin CRUD
        function renderAdmin() {
            const table = document.getElementById('admin-table');
            table.innerHTML = '';
            db[activeMod].forEach(item => {
                table.innerHTML += `
                    <tr class="hover:bg-slate-800/30">
                        <td class="p-6"><img src="${item.img}" class="w-12 h-12 rounded-xl object-cover bg-slate-800"></td>
                        <td class="p-6 font-bold text-white text-sm">${item.title}</td>
                        <td class="p-6 text-right space-x-4">
                            <button onclick="editItem(${item.id})" class="text-blue-400"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteItem(${item.id})" class="text-red-500"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });
        }

        function openModal() {
            editId = null; activeImg = "";
            document.getElementById('modal-title').innerText = "Yeni Ekle: " + activeMod;
            document.getElementById('m-preview').style.display = 'none';
            document.getElementById('m-title').value = '';
            document.getElementById('m-text').value = '';
            document.getElementById('m-sub').value = '';
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function saveData() {
            const obj = {
                id: editId || Date.now(),
                img: activeImg,
                title: document.getElementById('m-title').value,
                text: document.getElementById('m-text').value,
                sub: document.getElementById('m-sub').value
            };
            if(editId) {
                const idx = db[activeMod].findIndex(x => x.id === editId);
                db[activeMod][idx] = obj;
            } else {
                db[activeMod].unshift(obj);
            }
            localStorage.setItem('msp_master_db', JSON.stringify(db));
            closeModal();
            renderAdmin();
        }

        function editItem(id) {
            editId = id;
            const item = db[activeMod].find(x => x.id === id);
            document.getElementById('m-title').value = item.title;
            document.getElementById('m-text').value = item.text;
            document.getElementById('m-sub').value = item.sub;
            activeImg = item.img;
            const prev = document.getElementById('m-preview');
            prev.src = activeImg; prev.style.display = 'block';
            document.getElementById('modal').classList.remove('hidden');
        }

        function deleteItem(id) {
            if(confirm('Silmek istediğinize emin misiniz?')) {
                db[activeMod] = db[activeMod].filter(x => x.id !== id);
                localStorage.setItem('msp_master_db', JSON.stringify(db));
                renderAdmin();
            }
        }

        // Portal Görüntüleme
        function renderPortal() {
            const newsCont = document.getElementById('news-container');
            const authorCont = document.getElementById('author-list-home');
            const adCont = document.getElementById('ad-space');

            // Haberler
            if(db.haber.length > 0) {
                newsCont.innerHTML = '';
                db.haber.forEach((h, i) => {
                    newsCont.innerHTML += `
                        <div onclick="openDetail(${i})" class="bg-white p-6 rounded-[2.5rem] shadow-sm hover:shadow-xl transition cursor-pointer border border-slate-50 group">
                            <img src="${h.img}" class="w-full h-64 object-cover rounded-[2rem] mb-6 group-hover:scale-[0.98] transition">
                            <h2 class="msp-title text-3xl font-black mb-3">${h.title}</h2>
                            <p class="text-xs font-bold text-red-600 uppercase tracking-widest">${h.sub}</p>
                        </div>
                    `;
                });
            }

            // Yazarlar
            authorCont.innerHTML = '';
            db.yazar.forEach(y => {
                authorCont.innerHTML += `
                    <div class="flex items-center gap-3 p-2 hover:bg-slate-50 rounded-2xl transition">
                        <img src="${y.img}" class="w-10 h-10 rounded-full object-cover">
                        <div><p class="text-xs font-black uppercase text-slate-800">${y.title}</p><p class="text-[9px] text-slate-400 font-bold uppercase">${y.sub}</p></div>
                    </div>
                `;
            });

            // Reklam
            if(db.reklam.length > 0) {
                const ad = db.reklam[0];
                adCont.innerHTML = `<img src="${ad.img}" class="w-full h-full object-cover"><div class="absolute inset-0 bg-black/20 p-8 flex flex-col justify-end text-white"><h4 class="msp-title text-2xl font-bold italic">${ad.title}</h4></div>`;
                adCont.classList.add('relative');
            }
        }

        function openDetail(idx) {
            const h = db.haber[idx];
            document.getElementById('det-title').innerText = h.title;
            document.getElementById('det-img').src = h.img;
            document.getElementById('det-content').innerText = h.text;
            router('detail');
        }

        // Ekstra Fonksiyonlar
        function changeSize(d) { let c = document.getElementById('det-content'); let s = parseInt(window.getComputedStyle(c).fontSize); c.style.fontSize = (s + d) + 'px'; }
        function speakContent() { if(speechSynthesis.speaking) { speechSynthesis.cancel(); document.getElementById('speech-btn').innerText = "DİNLE"; } else { let u = new SpeechSynthesisUtterance(document.getElementById('det-content').innerText); u.lang = 'tr-TR'; speechSynthesis.speak(u); document.getElementById('speech-btn').innerText = "DURDUR"; u.onend = () => document.getElementById('speech-btn').innerText = "DİNLE"; }}

        window.onload = () => { renderPortal(); };
    </script>
</body>
</html>
