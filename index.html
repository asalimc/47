<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASC GLOBAL | v33 Operations Center</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@1,900&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fff; color: #111; scroll-behavior: smooth; }
        .font-serif { font-family: 'Crimson Pro', serif; }
        
        /* DASHBOARD ÖZEL STİLLERİ (image_0abf5c esintili) */
        .sidebar-item { @apply flex items-center gap-3 px-6 py-4 text-sm font-semibold transition-all cursor-pointer border-l-4 border-transparent; }
        .sidebar-item.active { @apply bg-orange-50 text-orange-700 border-orange-700; }
        .sidebar-item:hover:not(.active) { @apply bg-gray-50 text-black border-gray-200; }
        
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid #f0f0f0; }
        [x-cloak] { display: none !important; }

        /* Scrollbar Gizleme */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body x-data="ascOps()" x-init="init()">

    <div x-show="!adminOpen" class="min-h-screen">
        <header class="p-10 text-center border-b border-gray-100 sticky top-0 bg-white/80 backdrop-blur-md z-40">
            <h1 class="font-serif text-6xl italic font-black tracking-tighter">ASC <span class="text-orange-700 not-italic uppercase text-4xl">Global</span></h1>
            <p class="text-[9px] font-black uppercase tracking-[0.5em] mt-2 text-gray-400">Intelligence Syndicate</p>
            <button @click="authModal = true" class="absolute right-10 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center hover:bg-black hover:text-white transition-all">
                <i class="fas fa-lock text-xs"></i>
            </button>
        </header>

        <main class="max-w-6xl mx-auto py-20 px-6 text-center">
            <div class="space-y-10">
                <template x-for="news in newsData" :key="news.id">
                    <article class="group cursor-pointer border-b border-gray-50 pb-12">
                        <span class="text-orange-700 font-bold text-[10px] uppercase tracking-widest" x-text="news.region"></span>
                        <h2 class="text-5xl font-serif italic font-black my-4 group-hover:underline" x-text="news.title"></h2>
                        <p class="text-gray-400 max-w-2xl mx-auto" x-text="news.body.substring(0, 150) + '...'"></p>
                    </article>
                </template>
            </div>
        </main>
    </div>

    <template x-if="authModal">
        <div class="fixed inset-0 z-[5000] bg-black/95 backdrop-blur-xl flex items-center justify-center p-6">
            <div class="w-full max-w-sm text-center">
                <div class="mb-8 inline-flex w-20 h-20 rounded-3xl bg-orange-700 items-center justify-center shadow-2xl shadow-orange-700/40">
                    <i class="fas fa-fingerprint text-white text-3xl"></i>
                </div>
                <h2 class="text-white font-serif italic text-3xl mb-10">Syndicate Access</h2>
                <input x-model="tempPass" type="password" @keyup.enter="checkAuth()" placeholder="Terminal Code" 
                       class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-center text-white text-xl tracking-[1em] outline-none focus:border-orange-700 transition-all mb-4">
                <button @click="checkAuth()" class="w-full bg-orange-700 text-white py-5 rounded-2xl font-black uppercase tracking-widest hover:scale-105 transition-all">Authenticate</button>
                <p @click="authModal = false" class="mt-8 text-gray-500 text-[10px] font-black uppercase cursor-pointer tracking-widest">Abort Access</p>
            </div>
        </div>
    </template>

    <div x-show="adminOpen" x-cloak class="fixed inset-0 z-[6000] bg-[#f4f7fe] flex overflow-hidden">
        
        <aside class="w-72 bg-white border-r border-gray-100 flex flex-col shadow-xl">
            <div class="p-8 border-b border-gray-50">
                <h3 class="font-serif italic text-2xl font-black italic">Atelier <span class="text-orange-700 not-italic text-sm uppercase font-black">v33</span></h3>
            </div>
            
            <nav class="flex-1 py-6 overflow-y-auto no-scrollbar">
                <div class="sidebar-item" :class="adminTab === 'news' ? 'active' : ''" @click="adminTab = 'news'">
                    <i class="fas fa-file-alt w-5 text-center"></i> <span>Haber Akışı</span>
                </div>
                <div class="sidebar-item" :class="adminTab === 'authors' ? 'active' : ''" @click="adminTab = 'authors'">
                    <i class="fas fa-user-tie w-5 text-center"></i> <span>Yazarlar Kurulu</span>
                </div>
                <div class="sidebar-item" :class="adminTab === 'ads' ? 'active' : ''" @click="adminTab = 'ads'">
                    <i class="fas fa-ad w-5 text-center"></i> <span>Reklam Yönetimi</span>
                </div>
                <div class="sidebar-item" :class="adminTab === 'analytics' ? 'active' : ''" @click="adminTab = 'analytics'">
                    <i class="fas fa-chart-line w-5 text-center"></i> <span>Analitik Veriler</span>
                </div>
            </nav>

            <div class="p-6 border-t border-gray-50">
                <button @click="logout()" class="w-full bg-red-50 text-red-600 py-4 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-red-600 hover:text-white transition-all">
                    Güvenli Çıkış
                </button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-10">
            
            <header class="flex justify-between items-center mb-12">
                <div>
                    <h2 class="text-2xl font-black text-slate-800 uppercase tracking-tight" x-text="adminTab === 'news' ? 'Haber Yönetimi' : (adminTab === 'authors' ? 'Yazar Yönetimi' : 'Reklam Masası')"></h2>
                    <p class="text-xs text-slate-400 font-medium">Syndicate Kontrol Paneli • <span x-text="today"></span></p>
                </div>
                <div class="flex items-center gap-4">
                    <div class="bg-white px-4 py-2 rounded-lg shadow-sm border border-gray-100 text-[10px] font-bold text-green-600 flex items-center gap-2">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> SYSTEM ONLINE
                    </div>
                </div>
            </header>

            <div class="grid grid-cols-12 gap-8">
                
                <div class="col-span-12 lg:col-span-8 space-y-6">
                    <div class="bg-white p-8 rounded-[32px] shadow-sm border border-gray-50 space-y-6">
                        <div x-show="adminTab !== 'ads'">
                            <label class="text-[10px] font-black uppercase text-gray-400 mb-2 block tracking-widest">İçerik Başlığı</label>
                            <input x-model="form.main" type="text" class="w-full text-2xl font-semibold border-b-2 border-gray-50 focus:border-orange-700 outline-none py-3 transition-all" placeholder="Başlık giriniz...">
                        </div>
                        
                        <div x-show="adminTab !== 'ads'">
                            <label class="text-[10px] font-black uppercase text-gray-400 mb-2 block tracking-widest">Kategori / Ünvan</label>
                            <input x-model="form.sub" type="text" class="w-full text-sm font-medium border-b border-gray-50 focus:border-orange-700 outline-none py-2 transition-all" placeholder="Örn: STRATEJİ veya HUKUKÇU">
                        </div>

                        <div x-show="adminTab !== 'ads'">
                            <label class="text-[10px] font-black uppercase text-gray-400 mb-2 block tracking-widest">Detaylı Metin</label>
                            <textarea x-model="form.content" class="w-full h-64 text-base leading-relaxed border-none focus:ring-0 outline-none resize-none no-scrollbar" placeholder="İçeriği buraya dökün..."></textarea>
                        </div>

                        <div x-show="adminTab === 'ads'" class="text-center py-10 space-y-6">
                            <i class="fas fa-bullhorn text-5xl text-gray-100"></i>
                            <h4 class="text-lg font-bold">Reklam Görseli Güncelleme</h4>
                            <p class="text-xs text-gray-400">Yüklediğiniz görsel tüm sayfalardaki reklam alanlarında anında güncellenir.</p>
                        </div>
                    </div>
                </div>

                <div class="col-span-12 lg:col-span-4 space-y-6">
                    <div class="bg-white p-6 rounded-[32px] shadow-sm border border-gray-50 text-center">
                        <label class="text-[10px] font-black uppercase text-gray-400 mb-4 block tracking-widest">Görsel Varlık</label>
                        <input type="file" @change="handleFile" id="mediaUpload" class="hidden">
                        <label for="mediaUpload" class="cursor-pointer group block">
                            <div class="w-full aspect-square rounded-2xl bg-slate-50 border-2 border-dashed border-slate-200 flex items-center justify-center overflow-hidden group-hover:border-orange-700 transition-all">
                                <img x-show="form.media || (adminTab === 'ads' && adImage)" :src="adminTab === 'ads' ? adImage : form.media" class="w-full h-full object-cover">
                                <div x-show="!form.media && !(adminTab === 'ads' && adImage)" class="text-center">
                                    <i class="fas fa-cloud-upload-alt text-3xl text-slate-300 mb-2 group-hover:text-orange-700"></i>
                                    <p class="text-[9px] font-bold text-slate-400">GÖRSEL SEÇ</p>
                                </div>
                            </div>
                        </label>
                        <p class="text-[9px] text-slate-300 mt-4 italic">Not: Görsel otomatik optimize edilir.</p>
                    </div>

                    <button @click="save()" class="w-full bg-black text-white py-6 rounded-[32px] font-black uppercase tracking-[0.2em] shadow-2xl shadow-black/20 hover:bg-orange-700 transition-all flex items-center justify-center gap-3">
                        <i class="fas fa-paper-plane text-xs"></i>
                        Sisteme İşle
                    </button>
                </div>

            </div>
        </main>
    </div>

    <script>
        function ascOps() {
            return {
                adminOpen: false, authModal: false, adminTab: 'news',
                tempPass: '',
                form: { main: '', sub: '', content: '', media: '' },
                today: new Date().toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' }),
                adImage: localStorage.getItem('asc_ad_v33') || '',
                
                newsData: JSON.parse(localStorage.getItem('asc_news_v33')) || [
                    { id: 1, title: 'Brezilya Ormanlarından Mardin Sokaklarına', region: 'STRATEJİ', body: 'Küresel ticaretin yeni rotası üzerine derinlemesine bir analiz.', img: 'https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?w=1600' }
                ],
                authors: JSON.parse(localStorage.getItem('asc_authors_v33')) || [
                    { id: 1, name: 'Ahmet Çınarbaş', title: 'Siyaset Bilimci', bio: 'Küresel analizler.', photo: 'https://i.ibb.co/LhqZz4H/ahmet.jpg' }
                ],

                init() { this.sync(); },

                checkAuth() {
                    if(this.tempPass === "47") {
                        this.authModal = false;
                        this.adminOpen = true;
                        this.tempPass = '';
                    } else {
                        alert("Erişim Reddedildi: Terminal Kodu Geçersiz.");
                    }
                },

                handleFile(e) {
                    const reader = new FileReader();
                    reader.onload = (f) => {
                        if(this.adminTab === 'ads') {
                            this.adImage = f.target.result;
                            localStorage.setItem('asc_ad_v33', this.adImage);
                        } else {
                            this.form.media = f.target.result;
                        }
                    };
                    reader.readAsDataURL(e.target.files[0]);
                },

                save() {
                    if(this.adminTab === 'ads') {
                        alert("Reklam Sistemi Güncellendi.");
                        return;
                    }
                    
                    const isNews = this.adminTab === 'news';
                    const payload = {
                        id: Date.now(),
                        title: isNews ? this.form.main : undefined,
                        name: !isNews ? this.form.main : undefined,
                        region: isNews ? this.form.sub : undefined,
                        title: !isNews ? this.form.sub : (isNews ? this.form.sub : undefined),
                        body: isNews ? this.form.content : undefined,
                        bio: !isNews ? this.form.content : undefined,
                        img: isNews ? this.form.media : undefined,
                        photo: !isNews ? this.form.media : undefined
                    };

                    if (isNews) this.newsData.unshift(payload);
                    else this.authors.push(payload);
                    
                    this.sync();
                    this.form = { main: '', sub: '', content: '', media: '' };
                    alert("Veri Güvenli Şekilde Buluta İşlendi.");
                },

                logout() { this.adminOpen = false; },
                sync() {
                    localStorage.setItem('asc_news_v33', JSON.stringify(this.newsData));
                    localStorage.setItem('asc_authors_v33', JSON.stringify(this.authors));
                }
            }
        }
    </script>
</body>
</html>
