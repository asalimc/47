<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MB | Ahmet Çınarbaş Journal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,700;900&family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #F8F6F2; --ink: #1A1A1A; --accent: #B08D57; --white: #FFFFFF;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--ink); font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }

        /* HEADER & NAV */
        header {
            padding: 30px 6%; display: flex; justify-content: space-between; align-items: center;
            position: fixed; width: 100%; top: 0; z-index: 1000;
            background: rgba(248, 246, 242, 0.8); backdrop-filter: blur(20px);
        }
        .logo-m { font-family: 'Bodoni Moda', serif; font-size: 1.8rem; font-weight: 900; background: var(--ink); color: var(--bg); padding: 5px 15px; border-radius: 12px; }

        /* PROGRESS BAR */
        #progress-container { position: fixed; top: 0; left: 0; width: 100%; height: 5px; z-index: 10001; display: none; }
        #progress-bar { height: 100%; background: var(--accent); width: 0%; }

        /* BENTO GRID FOCUS EFFECT */
        .container { max-width: 1400px; margin: 120px auto 100px; padding: 0 6%; }
        .bento { display: grid; grid-template-columns: repeat(6, 1fr); gap: 30px; }

        /* Bir karta hover yapınca diğerlerini söndür */
        .bento:has(.card:hover) .card:not(:hover) {
            opacity: 0.25; filter: blur(4px) grayscale(1); transform: scale(0.96);
        }

        /* CARD CORE */
        .card {
            background: var(--white); border-radius: 50px; min-height: 500px;
            position: relative; overflow: hidden; cursor: pointer;
            transition: all 0.9s var(--ease); display: flex; flex-direction: column; justify-content: flex-end; padding: 50px;
        }
        .card:hover { transform: translateY(-20px) scale(1.02); z-index: 10; box-shadow: 0 60px 120px rgba(0,0,0,0.15); }

        .card-full { grid-column: span 6; }
        .card-wide { grid-column: span 4; }
        .card-medium { grid-column: span 3; }
        .card-small { grid-column: span 2; }

        .card-bg {
            position: absolute; inset: -20%; width: 140%; height: 140%;
            background-size: cover; background-position: center;
            z-index: 0; transition: transform 0.1s linear; /* JS Paralaks için */
        }
        .card-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.95) 10%, transparent 70%); z-index: 1; }
        
        .card-content { position: relative; z-index: 2; color: white; }
        .tag { font-size: 0.7rem; font-weight: 800; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; margin-bottom: 20px; display: block; }
        .title-tr { font-family: 'Bodoni Moda', serif; font-size: 2.8rem; line-height: 1; margin-bottom: 10px; }
        .title-pt { font-family: 'Bodoni Moda', serif; font-size: 1.6rem; font-weight: 300; opacity: 0.6; font-style: italic; }

        /* READER MODAL */
        #reader { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; overflow-y: auto; }
        .modal-hero { width: 100%; height: 70vh; overflow: hidden; position: relative; }
        .modal-hero img { width: 100%; height: 100%; object-fit: cover; }
        
        .modal-body { max-width: 1000px; margin: -150px auto 0; background: var(--bg); position: relative; border-radius: 80px 80px 0 0; padding: 100px 10%; }
        
        /* Metin Giriş Animasyonu */
        .reveal { opacity: 0; transform: translateY(30px); transition: 1s var(--ease); }
        .active .reveal { opacity: 1; transform: translateY(0); }

        .reader-grid { display: grid; grid-template-columns: 1.3fr 1fr; gap: 80px; margin-top: 60px; }
        .text-tr { font-size: 1.4rem; line-height: 2.2; text-align: justify; font-weight: 300; }
        .text-pt { font-size: 1.2rem; line-height: 2; color: #666; font-style: italic; border-left: 6px solid var(--accent); padding-left: 40px; }

        .close-btn { position: fixed; top: 40px; right: 50px; background: var(--ink); color: white; border: none; width: 70px; height: 70px; border-radius: 50%; cursor: pointer; z-index: 10000; font-size: 2rem; transition: 0.5s; }
        .close-btn:hover { background: var(--accent); transform: rotate(90deg); }

        @media (max-width: 900px) {
            .bento { grid-template-columns: 1fr; }
            .card-full, .card-wide, .card-medium, .card-small { grid-column: span 1; }
            .reader-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="progress-container"><div id="progress-bar"></div></div>

    <header>
        <div class="logo-m">MB</div>
        <div style="font-weight: 800; letter-spacing: 5px; font-size: 0.6rem; opacity: 0.5;">ARCHIVE / 2026</div>
    </header>

    <main class="container">
        <div class="bento">
            
            <div class="card card-full" onclick="openReader('author')" style="background: white; justify-content: center; text-align: center;">
                <div class="card-content" style="color: var(--ink);">
                    <img src="https://pbs.twimg.com/media/GifApT2XEAAqees.jpg" style="width: 180px; height: 180px; border-radius: 50%; object-fit: cover; margin-bottom: 30px; border: 10px solid var(--bg);">
                    <span class="tag">CURATOR</span>
                    <h2 class="title-tr" style="font-size: 4rem;">Ahmet Çınarbaş</h2>
                    <h3 class="title-pt">Pontes entre Memórias</h3>
                </div>
            </div>

            <div class="card card-wide" onclick="openReader('carnaval')">
                <div class="card-bg" style="background-image: url('https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?q=80&w=1200')"></div>
                <div class="card-overlay"></div>
                <div class="card-content">
                    <span class="tag">CULTURAL BLEND</span>
                    <h2 class="title-tr">Rio'da Mardin Rüzgarı</h2>
                    <h3 class="title-pt">Ecos da Mesopotâmia</h3>
                </div>
            </div>

            <div class="card card-small" onclick="openReader('craft')">
                <div class="card-bg" style="background-image: url('https://images.unsplash.com/photo-1573408301185-9146fe634ad0?q=80&w=1200')"></div>
                <div class="card-overlay"></div>
                <div class="card-content">
                    <span class="tag">HANDCRAFT</span>
                    <h2 class="title-tr">Gümüşün Sabrı</h2>
                    <h3 class="title-pt">Mãos Sagradas</h3>
                </div>
            </div>

            <div class="card card-medium" onclick="openReader('gastronomy')">
                <div class="card-bg" style="background-image: url('https://images.unsplash.com/photo-1555939594-58d7cb561ad1?q=80&w=1200')"></div>
                <div class="card-overlay"></div>
                <div class="card-content">
                    <span class="tag">FLAVOR JOURNEY</span>
                    <h2 class="title-tr">Irok & Quibe</h2>
                    <h3 class="title-pt">Sabor de Fronteira</h3>
                </div>
            </div>

            <div class="card card-medium" onclick="openReader('sinop')">
                <div class="card-bg" style="background-image: url('https://images.unsplash.com/photo-1440778303588-435521a205bc?q=80&w=1200')"></div>
                <div class="card-overlay"></div>
                <div class="card-content">
                    <span class="tag">GEOGRAPHY</span>
                    <h2 class="title-tr">İki Sinop'un Öyküsü</h2>
                    <h3 class="title-pt">Paralelos Opostos</h3>
                </div>
            </div>

        </div>
    </main>

    <div id="reader" onscroll="updateProgress()">
        <button class="close-btn" onclick="closeReader()">✕</button>
        <div id="reader-content"></div>
    </div>

    <script>
        const contentData = {
            author: { 
                tag: "MANIFESTO", tr: "İki Kıta, Tek Bir Ruhun Hikayesi", pt: "Dois Continentes, Uma Alma",
                img: "https://images.unsplash.com/photo-1455390582262-044cdead277a?q=80&w=1200", 
                textTr: "Mardin’in dar sokaklarında yankılanan çekiç sesleri ile Rio’nun sahillerinde duyulan perküsyon vuruşları aslında aynı şeyi anlatır: Hayatta kalma ve güzellik yaratma arzusu. Ben Ahmet Çınarbaş; bu journal ile bir köprü kuruyorum. Mezopotamya’nın taş sessizliğini Amazon’un gürültülü yeşiliyle tanıştırıyorum. Kültür, sadece geçmişte kalan bir miras değil, bugün her adımda yeniden yazdığımız bir senaryodur. Hoş geldiniz; bu yolculukta zamanın ve sınırların ötesine geçiyoruz.",
                textPt: "Os sons de martelos ecoando nas ruas estreitas de Mardin e as batidas de percussão nas praias do Rio contam a mesma história: o desejo de sobreviver e criar beleza. Eu, Ahmet Çınarbaş, construo uma ponte com este jornal. Apresento o silêncio de pedra da Mesopotâmia ao verde barulhento da Amazônia. A cultura não é apenas uma herança do passado, mas um roteiro que reescrevemos a cada passo hoje. Bem-vindo; nesta jornada, ultrapassamos o tempo e as fronteiras."
            },
            carnaval: { 
                tag: "KÜLTÜR ARŞİVİ", tr: "Rio Karnavalı'nda Telkari Estetiği", pt: "Estética da Filigrana no Carnaval",
                img: "https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?q=80&w=1200",
                textTr: "Görsel bir devrim olarak nitelendirilen bu yılki Rio Karnavalı'nda, bazı büyük Samba okullarının kostümlerinde Mardin'e özgü telkari motiflerinin geometrik izdüşümleri görüldü. Işığın metal üzerindeki oyunu, Rio'nun güneşli atmosferinde adeta Mezopotamya'nın bin yıllık gümüş sanatını canlandırdı. Bu sadece bir tesadüf değil; Brezilyalı sanatçıların kökleri Ortadoğu'ya dayanan derin bir zarafet arayışının sonucudur. İki uç dünyanın sanatsal dansı, Sambodromo’da tarih yazdı.", 
                textPt: "No Carnaval do Rio deste ano, descrito como uma revolução visual, projeções geométricas de motivos de filigrana típicos de Mardin foram vistas nos figurinos de algumas grandes escolas de samba. O jogo de luz sobre o metal reviveu a arte milenar da prata da Mesopotâmia na atmosfera ensolarada do Rio. Isso não é apenas coincidência; é o resultado da profunda busca dos artistas brasileiros por uma elegância enraizada no Oriente Médio." 
            },
            craft: { 
                tag: "ZANAATIN RUHU", tr: "Ateşin ve Sabrın Dansı: Gümüş", pt: "A Dança do Fogo e da Paciência",
                img: "https://images.unsplash.com/photo-1573408301185-9146fe634ad0?q=80&w=1200",
                textTr: "Telkari, gümüşün ruhuna dokunmaktır. Bir ustanın elinde milimetrik teller, birer şiire dönüşene kadar binlerce kez eğilir, bükülür. Bu sabır, Brezilya'nın yerli halklarının orman meyvelerinden ve tohumlarından takı yaparken gösterdiği kutsal bekleyişle aynıdır. Modern dünyanın 'hız' takıntısına karşı bir başkaldırıdır zanaat. Mardin’de gümüşün ateşteki imtihanı, Amazon’da doğanın sunduğu mucizelere dönüşür. İkisi de insan elinin tanrısal bir dokunuşudur.",
                textPt: "A filigrana é tocar a alma da prata. Nas mãos de um mestre, fios milimétricos são dobrados milhares de vezes até se tornarem poesia. Essa paciência é a mesma espera sagrada que os povos indígenas do Brasil demonstram ao fazer joias com sementes e frutos da floresta. O artesanato é uma rebelião contra a obsessão do mundo moderno pela 'velocidade'. O teste da prata no fogo em Mardin transforma-se em milagres oferecidos pela natureza na Amazônia."
            },
            gastronomy: { 
                tag: "GASTRONOMİK KÖPRÜ", tr: "Sofraların Ortak Hafızası: Irok ve Quibe", pt: "Memória Comum das Mesas: Quibe",
                img: "https://images.unsplash.com/photo-1555939594-58d7cb561ad1?q=80&w=1200",
                textTr: "Bir Mardin evinde sofraya gelen sıcak bir içli köfte ile São Paulo’nun bir köşebaşında yediğiniz Quibe arasındaki bağ, sadece bir tarif benzerliği değildir. Bu, 19. yüzyılda gemilerle başlayan büyük göçün, okyanusları aşan lezzet mirasıdır. Mardin’in baharatlı Irok’u, Brezilya mutfağının en sevilen atıştırmalığına dönüşürken, aslında kültürel asimilasyonun değil, kültürel zenginleşmenin simgesi olmuştur. Bir lokmada hem Mezopotamya’yı hem de Brezilya’yı tatmak, tarihin en lezzetli oyunudur.",
                textPt: "O vínculo entre um 'içli köfte' quente servido numa casa em Mardin e o 'Quibe' que se come numa esquina de São Paulo não é apenas uma semelhança de receita. É o legado de sabor da grande migração que começou com navios no século XIX, atravessando oceanos. Enquanto o Irok temperado de Mardin se tornava o lanche mais amado da culinária brasileira, tornou-se símbolo não de assimilação, mas de enriquecimento cultural."
            },
            sinop: { 
                tag: "COĞRAFİ KADER", tr: "Binlerce Kilometre, Tek Bir İsim", pt: "Milhares de Quilômetros, Um Nome",
                img: "https://images.unsplash.com/photo-1440778303588-435521a205bc?q=80&w=1200",
                textTr: "Türkiye'nin Karadeniz kıyısındaki kadim Sinop ile Brezilya'nın Mato Grosso eyaletindeki modern Sinop şehri arasındaki bağ, haritadaki bir hata değil, bir vizyon birliğidir. Karadeniz'in hırçın dalgalarını kucaklayan liman kenti ile Amazon’un kalbinde bir tarım devine dönüşen şehir... İkisi de bulundukları coğrafyanın direnç noktalarıdır. İsimleri aynı, kaderleri benzer olan bu iki nokta, MB Journal için dünyanın ne kadar küçük ve birbirine ne kadar muhtaç olduğunun en somut kanıtıdır.",
                textPt: "O vínculo entre a antiga Sinop na costa do Mar Negro na Turquia e a moderna cidade de Sinop no estado de Mato Grosso no Brasil não é um erro no mapa, mas uma união de visões. A cidade portuária que abraça as ondas revoltas do Mar Negro e a cidade que se transformou num gigante agrícola no coração da Amazônia... Ambas são pontos de resistência em suas geografias."
            }
        };

        // PARALLAX EFFECT
        document.addEventListener('mousemove', (e) => {
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                const bg = card.querySelector('.card-bg');
                const x = (window.innerWidth - e.pageX * 2) / 100;
                const y = (window.innerHeight - e.pageY * 2) / 100;
                if(bg) bg.style.transform = `translateX(${x}px) translateY(${y}px) scale(1.15)`;
            });
        });

        function openReader(key) {
            const item = contentData[key];
            const modal = document.getElementById('reader');
            const content = document.getElementById('reader-content');
            
            content.innerHTML = `
                <div class="modal-hero"><img src="${item.img}"></div>
                <div class="modal-body">
                    <span class="tag reveal">${item.tag}</span>
                    <h1 class="title-tr reveal" style="font-size: 4rem;">${item.tr}</h1>
                    <h2 class="title-pt reveal" style="font-size: 2rem; margin-bottom: 50px;">${item.pt}</h2>
                    <div class="reader-grid">
                        <div class="text-tr reveal">${item.textTr}</div>
                        <div class="text-pt reveal">${item.textPt}</div>
                    </div>
                </div>`;
            modal.style.display = 'block';
            document.getElementById('progress-container').style.display = 'block';
            document.body.style.overflow = 'hidden';
            
            setTimeout(() => modal.classList.add('active'), 100);
        }

        function closeReader() {
            const modal = document.getElementById('reader');
            modal.classList.remove('active');
            setTimeout(() => {
                modal.style.display = 'none';
                document.getElementById('progress-container').style.display = 'none';
                document.body.style.overflow = 'auto';
            }, 500);
        }

        function updateProgress() {
            const modal = document.getElementById('reader');
            const scrolled = (modal.scrollTop / (modal.scrollHeight - modal.clientHeight)) * 100;
            document.getElementById("progress-bar").style.width = scrolled + "%";
        }
    </script>
</body>
</html>
