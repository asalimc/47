<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MB | Ahmet Çınarbaş Journal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,900;1,6..96,900&family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #F8F6F2; 
            --ink: #1A1A1A; 
            --accent: #B08D57; 
            --white: #FFFFFF;
            --ease: cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--ink); font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }

        header {
            padding: 30px 6%; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; background: rgba(248, 246, 242, 0.95); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo-box { display: flex; align-items: center; text-decoration: none; color: var(--ink); }
        .logo-m { 
            font-family: 'Bodoni Moda', serif; font-size: 2.2rem; font-weight: 900; 
            background: var(--ink); color: var(--bg); padding: 0 12px; border-radius: 10px; margin-right: 12px;
        }
        .logo-text { font-family: 'Bodoni Moda', serif; font-size: 1.1rem; font-weight: 900; line-height: 1; }

        .nav-filters button {
            background: none; border: 1px solid rgba(0,0,0,0.1); color: var(--ink);
            padding: 8px 18px; border-radius: 50px; font-size: 0.7rem; font-weight: 800;
            cursor: pointer; margin-left: 10px; transition: 0.3s;
        }
        .nav-filters button.active { background: var(--ink); color: var(--bg); }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 6%; }
        .bento { display: flex; flex-direction: column; gap: 40px; }

        .card {
            background: var(--white); border-radius: 45px; padding: 50px;
            transition: var(--ease) 0.6s; cursor: pointer; border: 1px solid rgba(0,0,0,0.03);
            display: flex; flex-direction: column; justify-content: space-between; 
            min-height: 550px; width: 100%; position: relative; overflow: hidden;
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 30px 60px rgba(176,141,87,0.15); border-color: var(--accent); }

        .card-author { align-items: center; text-align: center; justify-content: center; min-height: 450px; border: 2px solid var(--accent); }

        .tr-line { font-family: 'Bodoni Moda', serif; font-size: 3.2rem; line-height: 1.1; margin-bottom: 15px; display: block; font-weight: 900; }
        .pt-line { font-family: 'Bodoni Moda', serif; font-size: 1.8rem; line-height: 1.2; opacity: 0.8; font-style: italic; display: block; }
        .tag-dual { font-size: 0.75rem; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 25px; display: block; }

        .author-img { width: 170px; height: 170px; border-radius: 50%; object-fit: cover; margin-bottom: 25px; border: 6px solid var(--bg); }

        /* READER MODAL */
        .reader {
            position: fixed; inset: 0; background: var(--bg); z-index: 2000;
            display: none; overflow-y: auto; padding: 80px 8% 120px;
        }
        .reader-grid { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; }
        .reader-tr, .reader-pt { font-family: 'Bodoni Moda', serif; font-size: 2.2rem; line-height: 1.3; color: var(--ink); font-weight: 400; }
        .reader-pt { font-style: italic; color: #444; } 
        
        .close-btn { position: fixed; top: 40px; right: 6%; background: var(--ink); color: white; border: none; padding: 15px 35px; border-radius: 50px; font-weight: 800; cursor: pointer; z-index: 2100; transition: 0.3s; }
        .close-btn:hover { background: var(--accent); }

        footer { padding: 80px 6%; background: white; text-align: center; border-top: 1px solid #eee; margin-top: 50px; }

        @media (max-width: 900px) {
            .reader-grid { grid-template-columns: 1fr; gap: 40px; }
            .tr-line { font-size: 2.4rem; }
            .pt-line { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo-box">
            <div class="logo-m">MB</div>
            <div class="logo-text">MARDIN<br>BRAZIL</div>
        </a>
        <div class="nav-filters">
            <button id="btn-all" class="active" onclick="filterData('all')">HEPSİ</button>
            <button id="btn-Mardin" onclick="filterData('Mardin')">MARDİN</button>
            <button id="btn-Brazil" onclick="filterData('Brazil')">BRAZIL</button>
        </div>
    </header>

    <main class="container">
        <div class="bento" id="bento-grid"></div>
    </main>

    <div id="reader-modal" class="reader" onclick="if(event.target.id === 'reader-modal') closeR()">
        <button class="close-btn" onclick="closeR()">KAPAT ● FECHAR</button>
        <div id="reader-content"></div>
    </div>

    <footer>
        <div class="logo-text" style="font-size: 1.5rem; margin-bottom: 15px;">MARDINBRAZIL</div>
        <p style="font-size: 0.7rem; font-weight: 800; opacity: 0.5; letter-spacing: 2px;">AHMET ÇINARBAŞ JOURNAL ● ARCHIVE 2026</p>
    </footer>

    <script>
        const myContent = [
            {
                type: "author",
                region: "Mardin",
                name: "Ahmet Çınarbaş",
                title: "Kültürel Arşivci ● Arquivista Cultural",
                bio: "Mardin'den Brezilya'ya uzanan 9 yıllık gazetecilik serüveni.",
                img: "https://pbs.twimg.com/media/GifApT2XEAAqees.jpg",
                columnTitleTR: "Taşın Fısıltısı",
                columnTitlePT: "Sussurro da Pedra",
                columnTextTR: "Taşın hafızası vardır. Mardin'in sarı kalker taşlarına dokunduğunuzda, binlerce yıllık bir hikaye anlatır. Mezopotamya'nın bu sessiz tanıkları, Rio'nun granit tepeleriyle aynı dili konuşur: Sabır.",
                columnTextPT: "A pedra tem memória. Quando você toca nas pedras de calcário amarelo de Mardin, elas contam uma história de milhares de anos. Estas testemunhas silenciosas da Mesopotâmia falam a mesma língua que as colinas de granito do Rio: Paciência."
            },
            {
                type: "main",
                region: "Brazil",
                tag: "MAGAZİN ● CELEBRIDADE",
                tr: "Rio Karnavalı'nda Mardin Rüzgarı",
                pt: "Vento de Mardin no Carnaval do Rio",
                desc: "ÜNLÜ TASARIMCININ YENİ KOLEKSİYONU →",
                img: "https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?q=80&w=1000",
                contentTR: "Brezilyalı ünlü moda tasarımcısı, son koleksiyonunda Mardin'in gümüş telkari işçiliğinden ilham aldığını açıkladı.",
                contentPT: "O famoso designer de moda brasileiro revelou que sua última coleção foi inspirada no trabalho de filigrana de prata de Mardin."
            },
            {
                type: "main",
                region: "Brazil",
                tag: "GASTRONOMİ ● GASTRONOMIA",
                tr: "Kültürlerin Lezzet Buluşması",
                pt: "Encontro de Sabores das Culturas",
                desc: "SAO PAULO'DA MARDİN MUTFAĞI →",
                img: "https://images.unsplash.com/photo-1555939594-58d7cb561ad1?q=80&w=1000",
                contentTR: "Sao Paulo'nun kalbinde Mardin mutfağının eşsiz baharatları Brezilya yerel lezzetleriyle harmanlanıyor.",
                contentPT: "No coração de São Paulo, as especiarias únicas da culinária de Mardin se misturam com os sabores locais brasileiros."
            },
            {
                type: "main",
                region: "Mardin",
                tag: "KÜLTÜR ● CULTURA",
                tr: "İki Kıta Tek Ruh",
                pt: "Dois Continentes Um Só Espírito",
                desc: "REYHANİ VE SAMBA RİTMİ →",
                img: "https://images.unsplash.com/photo-1508700115892-45ecd05ae2ad?q=80&w=1000",
                contentTR: "Mardin'in Reyhani oyunu ile Rio'nun Samba'sı arasındaki ritmik kardeşliği keşfedin.",
                contentPT: "Descubra a irmandade rítmica entre a dança Reyhani de Mardin e o Samba do Rio."
            },
            {
                type: "main",
                region: "all",
                tag: "TOPLUM ● SOCIEDADE",
                tr: "Halk Benzerlikleri",
                pt: "Semelhanças Populares",
                desc: "İNSAN HİKAYELERİ →",
                img: "https://images.unsplash.com/photo-1523438885200-e635ba2c371e?q=80&w=1000",
                contentTR: "Sıcakkanlılık, misafirperverlik ve derin aile bağları... Mardin ve Brezilya halkı arasındaki şaşırtıcı benzerlikler.",
                contentPT: "Calor humano, hospitalidade e laços familiares profundos... As semelhanças surpreendentes entre o povo de Mardin e o brasileiro."
            }
        ];

        function renderCards(data) {
            const grid = document.getElementById('bento-grid');
            grid.innerHTML = '';
            data.forEach(item => {
                const card = document.createElement('section');
                card.className = 'card';
                
                if(item.type === 'main') {
                    card.style.background = `linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.8)), url('${item.img}') center/cover`;
                    card.style.color = "white";
                    card.innerHTML = `
                        <div>
                            <span class="tag-dual" style="color:white; border-color:white;">${item.tag}</span>
                            <span class="tr-line">${item.tr}</span>
                            <span class="pt-line">${item.pt}</span>
                        </div>
                        <div style="font-weight:800; font-size:0.75rem; letter-spacing:2px;">${item.desc}</div>
                    `;
                } else if(item.type === 'author') {
                    card.classList.add('card-author');
                    card.innerHTML = `
                        <img src="${item.img}" class="author-img">
                        <span class="tr-line" style="margin-bottom:5px;">${item.name}</span>
                        <span class="pt-line" style="font-size:1.1rem; opacity:0.6; margin-bottom:20px;">${item.title}</span>
                        <p style="font-size:0.95rem; opacity:0.7; max-width:600px; line-height:1.6; margin-bottom:30px;">${item.bio}</p>
                        <div style="font-size:0.75rem; font-weight:900; background:var(--ink); color:white; padding:15px 40px; border-radius:100px;">KÖŞE YAZISINI OKU ● LER COLUNA</div>
                    `;
                }
                card.onclick = () => openR(item);
                grid.appendChild(card);
            });
        }

        function filterData(region) {
            document.querySelectorAll('.nav-filters button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + region).classList.add('active');
            const filtered = region === 'all' ? myContent : myContent.filter(d => d.region === region || d.region === 'all');
            renderCards(filtered);
        }

        function openR(item) {
            const modal = document.getElementById('reader-modal');
            const content = document.getElementById('reader-content');
            
            if(item.type === 'author') {
                content.innerHTML = `
                <div style="text-align:center; margin-bottom:80px;">
                    <img src="${item.img}" style="width:140px; border-radius:50%; border:6px solid white; box-shadow:0 10px 30px rgba(0,0,0,0.1);">
                    <h1 style="font-family:'Bodoni Moda'; font-size:3.5rem; margin-top:20px;">${item.name}</h1>
                </div>
                <div class="reader-grid">
                    <div>
                        <span class="tag-dual">KÖŞE YAZISI</span>
                        <h2 style="font-family:'Bodoni Moda'; font-size:2.8rem; margin-bottom:25px; font-weight:900;">${item.columnTitleTR}</h2>
                        <div class="reader-tr">${item.columnTextTR}</div>
                    </div>
                    <div>
                        <span class="tag-dual">CRÔNICA</span>
                        <h2 style="font-family:'Bodoni Moda'; font-size:2.8rem; margin-bottom:25px; font-weight:900; font-style:italic;">${item.columnTitlePT}</h2>
                        <div class="reader-pt">${item.columnTextPT}</div>
                    </div>
                </div>`;
            } else {
                content.innerHTML = `
                <div class="reader-grid">
                    <div>
                        <span class="tag-dual">${item.tag}</span>
                        <h2 style="font-family:'Bodoni Moda'; font-size:2.8rem; margin-bottom:25px; font-weight:900;">${item.tr}</h2>
                        <div class="reader-tr">${item.contentTR || item.tr}</div>
                    </div>
                    <div>
                        <span class="tag-dual">VERSÃO EM PORTUGUÊS</span>
                        <h2 style="font-family:'Bodoni Moda'; font-size:2.8rem; margin-bottom:25px; font-weight:900; font-style:italic;">${item.pt}</h2>
                        <div class="reader-pt">${item.contentPT || item.pt}</div>
                    </div>
                </div>`;
            }
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeR() {
            document.getElementById('reader-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onload = () => renderCards(myContent);
    </script>
</body>
</html>
