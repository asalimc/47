<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
<title>Brezilya Robusta | Kurumsal Satış Platformu</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f4f6f9;
  color: #1a2a3e;
  line-height: 1.5;
}

:root {
  --primary: #0a2540;
  --primary-light: #1a3a5c;
  --gold: #d4af37;
  --gold-light: #e8c857;
  --white: #ffffff;
  --gray-50: #f8f9fc;
  --gray-100: #f1f3f8;
  --gray-200: #e4e8f0;
  --gray-300: #d1d8e6;
  --gray-600: #5a6e8a;
}

/* RESPONSIVE - MOBIL FIRST */
.container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 16px;
  padding-bottom: 100px;
}

/* Telefon için padding düzenlemesi */
@media (min-width: 768px) {
  .container {
    padding: 24px;
    padding-bottom: 100px;
  }
}

/* Header - Mobil */
.header {
  background: var(--white);
  border-bottom: 1px solid var(--gray-200);
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-top {
  max-width: 1280px;
  margin: 0 auto;
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}

@media (min-width: 768px) {
  .header-top {
    padding: 16px 24px;
  }
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
}

@media (min-width: 768px) {
  .logo-icon {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    font-size: 1.4rem;
  }
}

.logo-text h1 {
  font-size: 1rem;
  font-weight: 700;
  color: var(--primary);
}

@media (min-width: 768px) {
  .logo-text h1 {
    font-size: 1.2rem;
  }
}

.logo-text p {
  font-size: 0.55rem;
  color: var(--gray-600);
}

@media (min-width: 768px) {
  .logo-text p {
    font-size: 0.65rem;
  }
}

.header-actions {
  display: flex;
  gap: 8px;
}

.btn-outline, .btn-primary {
  padding: 6px 12px;
  font-size: 0.6rem;
  border-radius: 30px;
}

@media (min-width: 768px) {
  .btn-outline, .btn-primary {
    padding: 8px 18px;
    font-size: 0.7rem;
  }
}

/* STATS BANNER - Mobil */
.stats-banner {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
  color: var(--white);
  display: flex;
  flex-direction: column;
  text-align: center;
  gap: 12px;
}

@media (min-width: 768px) {
  .stats-banner {
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 32px;
    flex-direction: row;
    justify-content: space-between;
    text-align: left;
  }
}

.stats-info h3 {
  font-size: 0.65rem;
  opacity: 0.7;
}

.stats-info h2 {
  font-size: 1.3rem;
  margin: 6px 0;
}

@media (min-width: 768px) {
  .stats-info h2 {
    font-size: 1.8rem;
  }
}

/* PARAMETRE KARTI - Mobil */
.params-card {
  background: var(--white);
  border-radius: 20px;
  padding: 16px;
  margin-bottom: 20px;
}

@media (min-width: 768px) {
  .params-card {
    border-radius: 24px;
    padding: 24px;
    margin-bottom: 24px;
  }
}

.params-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

@media (min-width: 768px) {
  .params-grid {
    gap: 16px;
  }
}

@media (min-width: 1024px) {
  .params-grid {
    grid-template-columns: repeat(4, 1fr);
  }
}

.param-field label {
  font-size: 0.55rem;
}

.param-field input {
  padding: 10px 12px;
  font-size: 0.8rem;
}

@media (min-width: 768px) {
  .param-field input {
    padding: 12px 14px;
    font-size: 0.85rem;
  }
}

/* FİLTRE TABS - Mobil (yatay kaydırma) */
.filter-tabs {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 8px;
  margin-bottom: 16px;
}

.filter-tabs::-webkit-scrollbar {
  display: none;
}

.filter-tab {
  padding: 6px 16px;
  font-size: 0.65rem;
  white-space: nowrap;
}

@media (min-width: 768px) {
  .filter-tab {
    padding: 8px 20px;
    font-size: 0.7rem;
  }
}

/* ACTION BAR - Mobil */
.action-bar {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 20px;
}

@media (min-width: 480px) {
  .action-bar {
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
  }
}

.sort-group {
  display: flex;
  gap: 8px;
  justify-content: center;
}

.sort-btn, .action-chip {
  padding: 6px 12px;
  font-size: 0.6rem;
}

@media (min-width: 768px) {
  .sort-btn, .action-chip {
    padding: 8px 16px;
    font-size: 0.65rem;
  }
}

/* ÜRÜN GRID - Mobil (1 kolon) */
.products-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
}

@media (min-width: 768px) {
  .products-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
  }
}

@media (min-width: 1024px) {
  .products-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

.product-card {
  padding: 16px;
  border-radius: 18px;
}

@media (min-width: 768px) {
  .product-card {
    padding: 20px;
    border-radius: 20px;
  }
}

.coc-code {
  font-size: 1rem;
}

@media (min-width: 768px) {
  .coc-code {
    font-size: 1.1rem;
  }
}

.price-main {
  font-size: 1.3rem;
}

@media (min-width: 768px) {
  .price-main {
    font-size: 1.6rem;
  }
}

/* BOTTOM NAV - Mobil */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--white);
  border-top: 1px solid var(--gray-200);
  padding: 8px 12px;
  z-index: 100;
}

@media (min-width: 768px) {
  .bottom-nav {
    padding: 10px 24px;
  }
}

.nav-container {
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  justify-content: space-around;
}

.nav-item {
  padding: 6px 10px;
  font-size: 0.5rem;
}

@media (min-width: 768px) {
  .nav-item {
    padding: 8px 16px;
    font-size: 0.55rem;
  }
}

.nav-item span:first-child {
  font-size: 0.9rem;
}

@media (min-width: 768px) {
  .nav-item span:first-child {
    font-size: 1.1rem;
  }
}

/* MODAL - Mobil */
.modal-container {
  padding: 20px;
  border-radius: 24px;
  max-width: 90%;
}

@media (min-width: 768px) {
  .modal-container {
    padding: 28px;
    border-radius: 28px;
    max-width: 500px;
  }
}

/* PDF PREVIEW - Mobil */
.pdf-header {
  padding: 12px;
  gap: 8px;
  flex-wrap: wrap;
}

@media (min-width: 768px) {
  .pdf-header {
    padding: 16px;
    gap: 12px;
  }
}

.pdf-content {
  padding: 20px;
}

@media (min-width: 768px) {
  .pdf-content {
    padding: 32px;
  }
}

/* TOAST */
.toast {
  bottom: 80px;
  padding: 10px 20px;
  font-size: 0.7rem;
}

@media (min-width: 768px) {
  .toast {
    bottom: 90px;
    padding: 12px 24px;
    font-size: 0.75rem;
  }
}

.hidden {
  display: none !important;
}
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">🇧🇷</div>
      <div class="logo-text">
        <h1>Brezilya Robusta</h1>
        <p>PREMIUM COFFEE TRADING</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn-outline" onclick="fetchLiveRates()">🔄</button>
      <button class="btn-primary" id="modeBtn" onclick="toggleMode()">👤 Müşteri</button>
    </div>
  </div>
</header>

<div class="container">
  <div class="stats-banner">
    <div class="stats-info">
      <h3>HOŞ GELDİNİZ</h3>
      <h2>Brezilya <span style="color: var(--gold);">Robusta</span></h2>
      <p>Premium kahve ticaret platformu</p>
    </div>
    <div class="stats-update">
      <div class="update-badge" id="lastUpdate">--</div>
    </div>
  </div>

  <div class="params-card" id="paramsCard">
    <div class="card-header-section" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:10px;">
      <div style="display:flex; align-items:center; gap:8px;">
        <div style="width:3px; height:16px; background:var(--gold); border-radius:2px;"></div>
        <h3 style="font-size:0.7rem; font-weight:600;">PARAMETRELER</h3>
      </div>
      <button class="btn-gold" onclick="openBulkUpdate()" style="background:var(--gold); border:none; padding:6px 12px; border-radius:30px; font-size:0.6rem; font-weight:600;">📊 Toplu</button>
    </div>
    <div class="params-grid">
      <div class="param-field"><label>USD/BRL</label><input type="number" id="usdbrl" value="5.10" step="0.01"></div>
      <div class="param-field"><label>USD/TRY</label><input type="number" id="usdtry" value="44.70" step="0.01"></div>
      <div class="param-field"><label>Navlun $/kg</label><input type="number" id="freight" value="0.47" step="0.01"></div>
      <div class="param-field"><label>Vergi %</label><input type="number" id="taxRate" value="10.5" step="0.5"></div>
      <div class="param-field"><label>Kar ₺/kg</label><input type="number" id="profit" value="20" step="1"></div>
      <div class="param-field"><label>Miktar ton</label><input type="number" id="ton" value="20" step="0.1"></div>
    </div>
  </div>

  <div class="filter-tabs" id="filterTabs">
    <div class="filter-tab active" data-priority="all">Tümü</div>
    <div class="filter-tab" data-priority="1">P1</div>
    <div class="filter-tab" data-priority="2">P2</div>
    <div class="filter-tab" data-priority="3">P3</div>
    <div class="filter-tab" data-priority="4">P4</div>
    <div class="filter-tab" data-priority="5">P5</div>
  </div>

  <div class="action-bar">
    <div class="sort-group">
      <button class="sort-btn" onclick="setSort('priority')">📌 Öncelik</button>
      <button class="sort-btn" onclick="setSort('price')">💰 Fiyat</button>
    </div>
    <div class="action-group">
      <button class="action-chip" id="favFilterBtn" onclick="toggleFavFilter()">⭐ Favoriler</button>
    </div>
  </div>

  <div class="products-grid" id="productsGrid"></div>
</div>

<div class="bottom-nav">
  <div class="nav-container">
    <button class="nav-item" onclick="scrollToTop()"><span>🏠</span><span>Ana</span></button>
    <button class="nav-item" onclick="scrollToProducts()"><span>☕</span><span>Ürünler</span></button>
    <button class="nav-item" onclick="generatePDF()"><span>📄</span><span>PDF</span></button>
    <button class="nav-item" onclick="openHistory()"><span>📜</span><span>Geçmiş</span></button>
    <button class="nav-item" onclick="openEditor()"><span>✎</span><span>Yönet</span></button>
  </div>
</div>

<script>
let cocData = [
  { coc: 'COC-01', p: 1, rs: 1915 }, { coc: 'COC-02', p: 1, rs: 1905 }, { coc: 'COC-03', p: 1, rs: 1895 },
  { coc: 'COC-04', p: 2, rs: 1885 }, { coc: 'COC-05', p: 2, rs: 1845 }, { coc: 'COC-06', p: 2, rs: 1662 },
  { coc: 'COC-07', p: 3, rs: 1630 }, { coc: 'COC-08', p: 3, rs: 1615 },
  { coc: 'COC-09', p: 4, rs: 1477 }, { coc: 'COC-10', p: 4, rs: 1442 }, { coc: 'COC-11', p: 4, rs: 1320 }, { coc: 'COC-12', p: 4, rs: 1257 },
  { coc: 'COC-13', p: 5, rs: 870 }, { coc: 'COC-14', p: 5, rs: 870 }, { coc: 'COC-15', p: 5, rs: 750 }, { coc: 'COC-16', p: 5, rs: 630 }
];

let salesMode = false;
let currentFilter = 'all';
let currentSort = 'priority';
let showOnlyFav = false;
let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
let offerHistory = JSON.parse(localStorage.getItem('offerHistory') || '[]');

function calcPrices(rs, usdbrl, usdtry, freight, taxRate, profit) {
  let usdkg = (rs / 60) / usdbrl;
  let fobTon = (usdkg * usdtry) * 1000;
  let cifTon = ((usdkg + freight) * usdtry) * 1000;
  let ddpTon = cifTon * (1 + taxRate / 100);
  let sellTon = ddpTon + (profit * 1000);
  let marginPct = (profit * 1000) / ddpTon * 100;
  return { fobTon, cifTon, ddpTon, sellTon, marginPct };
}

async function fetchLiveRates() {
  showToast('Güncelleniyor...');
  try {
    const response = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
    const data = await response.json();
    if (data.rates.BRL) document.getElementById('usdbrl').value = data.rates.BRL.toFixed(4);
    if (data.rates.TRY) document.getElementById('usdtry').value = data.rates.TRY.toFixed(4);
    document.getElementById('lastUpdate').innerHTML = new Date().toLocaleTimeString('tr-TR');
    showToast('Kurlar güncellendi');
    render();
  } catch(e) { showToast('API hatası'); }
}

function toggleFavorite(cocName) {
  favorites.includes(cocName) ? favorites = favorites.filter(f => f !== cocName) : favorites.push(cocName);
  localStorage.setItem('favorites', JSON.stringify(favorites));
  render();
}

function toggleFavFilter() {
  showOnlyFav = !showOnlyFav;
  document.getElementById('favFilterBtn').classList.toggle('active', showOnlyFav);
  render();
}

function openBulkUpdate() {
  let modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.style.position = 'fixed';
  modal.style.top = '0';
  modal.style.left = '0';
  modal.style.right = '0';
  modal.style.bottom = '0';
  modal.style.background = 'rgba(10,37,64,0.9)';
  modal.style.display = 'flex';
  modal.style.alignItems = 'center';
  modal.style.justifyContent = 'center';
  modal.style.zIndex = '1000';
  modal.style.padding = '16px';
  modal.innerHTML = `<div class="modal-container" style="background:white; border-radius:24px; padding:20px; max-width:90%; width:100%;"><h3 style="margin-bottom:16px;">Toplu Güncelleme</h3><div class="param-field"><label>Yüzde (%)</label><input type="number" id="bulkPercent" value="0" step="1" style="width:100%; padding:10px; border-radius:12px; border:1px solid #e4e8f0; margin:8px 0;"></div><div class="param-field"><label>Alan</label><select id="bulkAction" style="width:100%; padding:10px; border-radius:12px; margin:8px 0;"><option value="profit">Kar Hedefi</option><option value="rs">RS Değeri</option></select></div><div class="modal-buttons" style="display:flex; gap:10px; margin-top:16px;"><button class="btn-gold" onclick="applyBulkUpdate()" style="flex:1; padding:10px; background:#d4af37; border:none; border-radius:30px; font-weight:600;">Uygula</button><button class="btn-outline" onclick="closeModal(this)" style="flex:1; padding:10px; background:transparent; border:1px solid #e4e8f0; border-radius:30px;">İptal</button></div></div>`;
  document.body.appendChild(modal);
  window.applyBulkUpdate = () => {
    let percent = parseFloat(document.getElementById('bulkPercent').value) || 0;
    let action = document.getElementById('bulkAction').value;
    let multiplier = 1 + (percent / 100);
    if (action === 'profit') {
      let p = parseFloat(document.getElementById('profit').value) || 0;
      document.getElementById('profit').value = (p * multiplier).toFixed(2);
      showToast(`Kar %${percent} güncellendi`);
    } else {
      cocData.forEach(c => c.rs = Math.round(c.rs * multiplier));
      localStorage.setItem('cocData', JSON.stringify(cocData));
      showToast(`RS %${percent} güncellendi`);
    }
    modal.remove();
    render();
  };
}

function saveToHistory() {
  let usdbrl = parseFloat(document.getElementById('usdbrl').value);
  let usdtry = parseFloat(document.getElementById('usdtry').value);
  let ton = parseFloat(document.getElementById('ton').value);
  let total = 0;
  cocData.forEach(c => total += calcPrices(c.rs, usdbrl, usdtry, parseFloat(document.getElementById('freight').value), parseFloat(document.getElementById('taxRate').value), parseFloat(document.getElementById('profit').value)).sellTon * ton);
  offerHistory.unshift({ date: new Date().toISOString(), total, usdbrl, usdtry, ton });
  if (offerHistory.length > 10) offerHistory.pop();
  localStorage.setItem('offerHistory', JSON.stringify(offerHistory));
}

function openHistory() {
  if (!offerHistory.length) { showToast('Geçmiş yok'); return; }
  let modal = document.createElement('div');
  modal.style.position = 'fixed';
  modal.style.top = '0';
  modal.style.left = '0';
  modal.style.right = '0';
  modal.style.bottom = '0';
  modal.style.background = 'rgba(10,37,64,0.9)';
  modal.style.display = 'flex';
  modal.style.alignItems = 'center';
  modal.style.justifyContent = 'center';
  modal.style.zIndex = '1000';
  modal.style.padding = '16px';
  let html = `<div class="modal-container" style="background:white; border-radius:24px; padding:20px; max-width:90%; width:100%; max-height:80vh; overflow-y:auto;"><h3 style="margin-bottom:16px;">Teklif Geçmişi</h3>`;
  offerHistory.forEach((h, idx) => {
    html += `<div style="background:#f8f9fc; padding:12px; border-radius:16px; margin-bottom:12px; cursor:pointer;" onclick="loadHistory(${idx})"><div style="font-size:0.65rem; color:#d4af37;">${new Date(h.date).toLocaleString('tr-TR')}</div><div style="font-size:0.9rem; font-weight:700;">₺ ${Math.round(h.total).toLocaleString()}</div><div style="font-size:0.6rem;">USD/BRL:${h.usdbrl} | ${h.ton} ton</div></div>`;
  });
  html += `<button class="btn-outline" onclick="closeModal(this)" style="width:100%; padding:10px; background:transparent; border:1px solid #e4e8f0; border-radius:30px; margin-top:8px;">Kapat</button></div>`;
  modal.innerHTML = html;
  document.body.appendChild(modal);
  window.loadHistory = (idx) => {
    let h = offerHistory[idx];
    document.getElementById('usdbrl').value = h.usdbrl;
    document.getElementById('usdtry').value = h.usdtry;
    document.getElementById('ton').value = h.ton;
    modal.remove();
    render();
    showToast('Geçmiş yüklendi');
  };
}

function getPDFHTML() {
  let usdbrl = parseFloat(document.getElementById('usdbrl').value);
  let usdtry = parseFloat(document.getElementById('usdtry').value);
  let freight = parseFloat(document.getElementById('freight').value);
  let taxRate = parseFloat(document.getElementById('taxRate').value);
  let profit = parseFloat(document.getElementById('profit').value);
  let ton = parseFloat(document.getElementById('ton').value);
  let totalSell = 0, rows = '';
  cocData.forEach(c => {
    let p = calcPrices(c.rs, usdbrl, usdtry, freight, taxRate, profit);
    totalSell += p.sellTon * ton;
    rows += `<tr><td style="padding:10px;"><b>${c.coc}</b></td><td style="text-align:center">${c.p}</td><td style="text-align:right">₺ ${Math.round(p.fobTon).toLocaleString()}</td><td style="text-align:right">₺ ${Math.round(p.cifTon).toLocaleString()}</td><td style="text-align:right">₺ ${Math.round(p.ddpTon).toLocaleString()}</td><td style="text-align:right">₺ ${Math.round(p.sellTon).toLocaleString()}</td><td style="text-align:center">${p.marginPct.toFixed(1)}%</td></tr>`;
  });
  return `<div style="font-family:Inter; max-width:800px; margin:0 auto;"><div style="background:#0a2540; padding:24px; text-align:center;"><h1 style="color:#d4af37;">BREZİLYA ROBUSTA</h1><p style="color:white;">RESMİ TEKLİF</p></div><div style="padding:24px;"><div style="background:#f8f9fc; padding:16px; border-radius:12px;"><h3>PARAMETRELER</h3><table style="width:100%"><tr><td>USD/BRL: ${usdbrl}</td><td>USD/TRY: ${usdtry}</td><td>Navlun: $${freight}</td></tr><tr><td>Vergi: ${taxRate}%</td><td>Kar: ₺${profit}</td><td>Miktar: ${ton} ton</td></tr></table></div><h3>ÜRÜNLER</h3><table style="width:100%; border-collapse:collapse;"><thead><tr style="background:#d4af37;"><th>COC</th><th>P</th><th>FOB</th><th>CIF</th><th>DDP</th><th>SATIŞ</th><th>KAR%</th></tr></thead><tbody>${rows}</tbody><tfoot><tr style="background:#0a2540; color:#d4af37;"><td colspan="5"><b>TOPLAM</b></td><td><b>₺ ${Math.round(totalSell).toLocaleString()}</b></td><td></td></tr></tfoot></table><div style="margin-top:20px; padding:12px; background:#f8f9fc; border-left:4px solid #d4af37;"><p>Geçerlilik: ${new Date(Date.now()+7*24*60*60*1000).toLocaleDateString('tr-TR')}</p></div></div></div>`;
}

async function generatePDF() {
  let content = getPDFHTML();
  let preview = document.createElement('div');
  preview.style.position = 'fixed';
  preview.style.top = '0';
  preview.style.left = '0';
  preview.style.right = '0';
  preview.style.bottom = '0';
  preview.style.background = 'rgba(10,37,64,0.95)';
  preview.style.zIndex = '2000';
  preview.style.overflow = 'auto';
  preview.style.padding = '16px';
  preview.innerHTML = `<div style="position:sticky; top:0; background:white; padding:12px; border-radius:30px; display:flex; gap:8px; justify-content:center; margin-bottom:16px; flex-wrap:wrap;"><button class="btn-gold" onclick="window.dlPDF()" style="background:#d4af37; border:none; padding:8px 16px; border-radius:30px; font-weight:600;">📥 İndir</button><button class="btn-primary" onclick="window.clPDF()" style="background:#0a2540; color:white; border:none; padding:8px 16px; border-radius:30px;">✖ Kapat</button></div><div style="background:white; max-width:800px; margin:0 auto; padding:20px; border-radius:20px;" id="pdfContent">${content}</div>`;
  document.body.appendChild(preview);
  window.dlPDF = () => { html2pdf().set({ margin: 0.5, filename: `Teklif_${new Date().toLocaleDateString('tr-TR')}.pdf` }).from(document.getElementById('pdfContent')).save(); saveToHistory(); };
  window.clPDF = () => preview.remove();
}

function render() {
  let usdbrl = parseFloat(document.getElementById('usdbrl').value) || 1;
  let usdtry = parseFloat(document.getElementById('usdtry').value) || 1;
  let freight = parseFloat(document.getElementById('freight').value) || 0;
  let taxRate = parseFloat(document.getElementById('taxRate').value) || 0;
  let profit = parseFloat(document.getElementById('profit').value) || 0;
  let ton = parseFloat(document.getElementById('ton').value) || 0;

  let filtered = [...cocData];
  if (currentFilter !== 'all') filtered = filtered.filter(c => c.p == currentFilter);
  if (showOnlyFav) filtered = filtered.filter(c => favorites.includes(c.coc));
  if (currentSort === 'price') filtered.sort((a, b) => calcPrices(a.rs, usdbrl, usdtry, freight, taxRate, profit).sellTon - calcPrices(b.rs, usdbrl, usdtry, freight, taxRate, profit).sellTon);
  else filtered.sort((a, b) => a.p - b.p || b.rs - a.rs);

  let container = document.getElementById('productsGrid');
  container.innerHTML = '';
  filtered.forEach(c => {
    let p = calcPrices(c.rs, usdbrl, usdtry, freight, taxRate, profit);
    let isFav = favorites.includes(c.coc);
    container.innerHTML += `<div class="product-card p${c.p}" style="background:white; border-radius:18px; padding:16px; box-shadow:0 2px 8px rgba(0,0,0,0.04); border:1px solid #e4e8f0;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
        <span style="font-weight:800;">${c.coc}</span>
        <div style="display:flex; gap:8px;"><span class="fav-star" style="cursor:pointer; color:${isFav ? '#d4af37' : '#ccc'};" onclick="toggleFavorite('${c.coc}')">${isFav ? '★' : '☆'}</span><span style="font-size:0.55rem; padding:4px 10px; background:#f1f3f8; border-radius:30px;">P${c.p}</span></div>
      </div>
      <div style="font-size:1.3rem; font-weight:800;">₺ ${Math.round(p.sellTon).toLocaleString()}<small style="font-size:0.65rem;">/TON</small></div>
      <div class="${salesMode ? 'hidden' : ''}" style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:12px 0; padding:10px 0; border-top:1px solid #e4e8f0; border-bottom:1px solid #e4e8f0;">
        <div style="display:flex; justify-content:space-between;"><span style="font-size:0.6rem;">FOB</span><span style="font-size:0.7rem; font-weight:600;">₺ ${Math.round(p.fobTon).toLocaleString()}</span></div>
        <div style="display:flex; justify-content:space-between;"><span style="font-size:0.6rem;">CIF</span><span style="font-size:0.7rem; font-weight:600;">₺ ${Math.round(p.cifTon).toLocaleString()}</span></div>
        <div style="display:flex; justify-content:space-between;"><span style="font-size:0.6rem;">DDP</span><span style="font-size:0.7rem; font-weight:600;">₺ ${Math.round(p.ddpTon).toLocaleString()}</span></div>
        <div style="display:flex; justify-content:space-between;"><span style="font-size:0.6rem;">Kâr</span><span style="font-size:0.7rem; font-weight:600;">%${p.marginPct.toFixed(1)}</span></div>
      </div>
      ${ton > 0 ? `<div style="background:#f8f9fc; padding:10px; border-radius:14px; text-align:center; font-size:0.7rem; font-weight:600;">💰 ${ton} TON: ₺ ${Math.round(p.sellTon * ton).toLocaleString()}</div>` : ''}
    </div>`;
  });
  document.getElementById('paramsCard').classList.toggle('hidden', salesMode);
  document.getElementById('modeBtn').innerHTML = salesMode ? '👑 Satış' : '👤 Müşteri';
}

function toggleMode() { salesMode = !salesMode; render(); }
function setSort(type) { currentSort = type; render(); }
function setFilter(priority) {
  currentFilter = priority;
  document.querySelectorAll('.filter-tab').forEach(el => el.classList.toggle('active', el.dataset.priority === priority));
  render();
}
function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
function scrollToProducts() { document.getElementById('productsGrid').scrollIntoView({ behavior: 'smooth' }); }
function showToast(msg) { let t = document.createElement('div'); t.className = 'toast'; t.style.position = 'fixed'; t.style.bottom = '80px'; t.style.left = '50%'; t.style.transform = 'translateX(-50%)'; t.style.background = '#0a2540'; t.style.color = '#d4af37'; t.style.padding = '10px 20px'; t.style.borderRadius = '50px'; t.style.fontSize = '0.7rem'; t.style.zIndex = '1100'; t.innerText = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2000); }
function closeModal(btn) { btn.closest('.modal-overlay')?.remove(); }

function openEditor() {
  let modal = document.createElement('div');
  modal.style.position = 'fixed';
  modal.style.top = '0';
  modal.style.left = '0';
  modal.style.right = '0';
  modal.style.bottom = '0';
  modal.style.background = 'rgba(10,37,64,0.9)';
  modal.style.display = 'flex';
  modal.style.alignItems = 'center';
  modal.style.justifyContent = 'center';
  modal.style.zIndex = '1000';
  modal.style.padding = '16px';
  let listHtml = '';
  cocData.forEach((c, idx) => {
    listHtml += `<div style="margin-bottom:12px; padding:12px; background:#f8f9fc; border-radius:16px;"><b>${c.coc}</b><div style="display:flex; gap:8px; margin-top:8px;"><input type="number" id="p_${idx}" value="${c.p}" min="1" max="5" style="width:70px; padding:8px; border-radius:12px; border:1px solid #e4e8f0;"><input type="number" id="rs_${idx}" value="${c.rs}" step="1" style="width:100px; padding:8px; border-radius:12px; border:1px solid #e4e8f0;"><button onclick="window.delCoc(${idx})" style="background:#d4af37; border:none; padding:6px 12px; border-radius:20px;">Sil</button></div></div>`;
  });
  modal.innerHTML = `<div style="background:white; border-radius:24px; padding:20px; max-width:90%; width:100%; max-height:80vh; overflow-y:auto;"><h3 style="margin-bottom:16px;">Ürün Yönetimi</h3>${listHtml}<div style="display:flex; flex-wrap:wrap; gap:8px; margin:12px 0;"><button class="btn-gold" onclick="window.addCoc()" style="flex:1; padding:10px; background:#d4af37; border:none; border-radius:30px;">+ Yeni</button><button class="btn-gold" onclick="window.importExcel()" style="flex:1; padding:10px; background:#d4af37; border:none; border-radius:30px;">📎 İçe Aktar</button><button class="btn-gold" onclick="window.exportExcel()" style="flex:1; padding:10px; background:#d4af37; border:none; border-radius:30px;">📎 Dışa Aktar</button></div><div style="display:flex; gap:8px;"><button class="btn-primary" onclick="window.saveCoc()" style="flex:1; padding:10px; background:#0a2540; color:white; border:none; border-radius:30px;">💾 Kaydet</button><button class="btn-outline" onclick="window.resetCoc()" style="flex:1; padding:10px; background:transparent; border:1px solid #e4e8f0; border-radius:30px;">⟳ Sıfırla</button><button class="btn-outline" onclick="closeModal(this)" style="flex:1; padding:10px; background:transparent; border:1px solid #e4e8f0; border-radius:30px;">Kapat</button></div></div>`;
  document.body.appendChild(modal);
  
  window.delCoc = (idx) => { if(cocData.length>1) cocData.splice(idx,1); openEditor(); };
  window.addCoc = () => { cocData.push({ coc: `COC-${String(cocData.length+1).padStart(2,'0')}`, p: 3, rs: 1500 }); openEditor(); };
  window.importExcel = () => { let input = document.createElement('input'); input.type = 'file'; input.accept = '.xlsx'; input.onchange = (e) => { let file = e.target.files[0]; let reader = new FileReader(); reader.onload = (evt) => { let data = new Uint8Array(evt.target.result); let workbook = XLSX.read(data, { type: 'array' }); let sheet = workbook.Sheets[workbook.SheetNames[0]]; let rows = XLSX.utils.sheet_to_json(sheet, { header: 1 }); let newData = []; for(let i=1;i<rows.length;i++) { if(rows[i][0] && rows[i][1] && rows[i][2]) newData.push({ coc: String(rows[i][0]), p: parseInt(rows[i][1])||3, rs: parseFloat(rows[i][2])||0 }); } if(newData.length) { cocData = newData; localStorage.setItem('cocData', JSON.stringify(cocData)); render(); showToast('İçe aktarıldı'); modal.remove(); } }; reader.readAsArrayBuffer(file); }; input.click(); };
  window.exportExcel = () => { let wsData = [['COC','Priority','RS']]; cocData.forEach(c => wsData.push([c.coc, c.p, c.rs])); let ws = XLSX.utils.aoa_to_sheet(wsData); let wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'COC'); XLSX.writeFile(wb, `COC_${new Date().toLocaleDateString('tr-TR')}.xlsx`); };
  window.saveCoc = () => { for(let i=0;i<cocData.length;i++) { let pv = document.getElementById(`p_${i}`); let rv = document.getElementById(`rs_${i}`); if(pv) cocData[i].p = parseInt(pv.value)||3; if(rv) cocData[i].rs = parseFloat(rv.value)||0; } localStorage.setItem('cocData', JSON.stringify(cocData)); render(); modal.remove(); showToast('Kaydedildi'); };
  window.resetCoc = () => { cocData = [ { coc: 'COC-01', p: 1, rs: 1915 }, { coc: 'COC-02', p: 1, rs: 1905 }, { coc: 'COC-03', p: 1, rs: 1895 }, { coc: 'COC-04', p: 2, rs: 1885 }, { coc: 'COC-05', p: 2, rs: 1845 }, { coc: 'COC-06', p: 2, rs: 1662 }, { coc: 'COC-07', p: 3, rs: 1630 }, { coc: 'COC-08', p: 3, rs: 1615 }, { coc: 'COC-09', p: 4, rs: 1477 }, { coc: 'COC-10', p: 4, rs: 1442 }, { coc: 'COC-11', p: 4, rs: 1320 }, { coc: 'COC-12', p: 4, rs: 1257 }, { coc: 'COC-13', p: 5, rs: 870 }, { coc: 'COC-14', p: 5, rs: 870 }, { coc: 'COC-15', p: 5, rs: 750 }, { coc: 'COC-16', p: 5, rs: 630 } ]; localStorage.removeItem('cocData'); render(); modal.remove(); showToast('Sıfırlandı'); };
}

let saved = localStorage.getItem('cocData');
if (saved) cocData = JSON.parse(saved);
document.querySelectorAll('.filter-tab').forEach(el => el.addEventListener('click', () => setFilter(el.dataset.priority)));
['usdbrl','usdtry','freight','taxRate','profit','ton'].forEach(id => document.getElementById(id).addEventListener('input', () => render()));
fetchLiveRates();
render();
</script>
</body>
</html>
