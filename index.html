        .main-header p { font-size: 0.8rem; letter-spacing: 8px; color: var(--accent); text-transform: uppercase; }

        .archive-section { margin-bottom: 200px; opacity: 0; transform: translateY(30px); transition: 1s all ease-out; }
        .archive-section.visible { opacity: 1; transform: translateY(0); }

        .image-box img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(30%); transition: 1.5s ease; }

        li.className = 'nav-item';
        li.innerHTML = `<a href="#section-${item.id}" class="nav-link">${item.id} — ${item.tr_t}</a>`;
        sideNav.appendChild(li);

        // İçerik
        const div = document.createElement('section');
        div.className = 'archive-section';
        div.id = `section-${item.id}`;
        div.innerHTML = `
            <div class="image-box">
                <img src="https://images.unsplash.com/photo-${item.img}?auto=format&fit=crop&q=80&w=1600" alt="${item.tr_t}">
            </div>
            <div class="section-meta">
                <div class="section-num">${item.id}</div>
                <div class="section-title">
                    <span class="title-tr">${item.tr_t}</span>
                    <span class="title-pt">${item.pt_t}</span>
                </div>
            </div>
            <div class="grid-container">
                <div class="lang-col tr-col">
                    ${item.tr.map(p => `<p>${p}</p>`).join('')}
                </div>
                <div class="lang-col pt-col">
                    ${item.pt.map(p => `<p>${p}</p>`).join('')}
                </div>
            </div>
            <div class="seal-footer">
                <div class="seal-circle">AÇ</div>
                <div class="seal-text">Ahmet Çınarbaş // Interactive Series // Complete Edition 2026</div>
            </div>
        `;
        root.appendChild(div);
    });

    // Scroll Animasyonu
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) entry.target.classList.add('visible');
        });
    }, { threshold: 0.15 });

    document.querySelectorAll('.archive-section').forEach(section => observer.observe(section));
</script>
</body>
</html>
