<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Luxury Management Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfbf7; --text: #1a1a1a; --muted: #718096; --accent: #c49b66;
            --white: #ffffff; --glass: rgba(253, 251, 247, 0.98); --transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Nav & Progress */
        #progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent); width: 0%; z-index: 11000; }
        nav { background: var(--glass); backdrop-filter: blur(15px); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.03); }
        .logo { font-family: 'Marcellus', serif; font-size: clamp(1.4rem, 4vw, 1.8rem); letter-spacing: 3px; cursor: pointer; }
        .admin-entry { cursor: pointer; opacity: 0.05; font-size: 0.7rem; }

        /* YAZARLAR ŞERİDİ (Responsive Story) */
        .authors-strip { 
            background: var(--white); padding: 20px 0; display: flex; 
            justify-content: flex-start; gap: 25px; border-bottom: 1px solid #f1f1f1; 
            overflow-x: auto; scrollbar-width: none; padding-left: 5%; 
        }
        .authors-strip::-webkit-scrollbar { display: none; }
        .author-item { flex: 0 0 auto; text-align: center; width: 80px; transition: var(--transition); cursor: pointer; }
        .author-item img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); padding: 2px; }
        .author-item span { display: block; font-size: 0.7rem; font-weight: 700; margin-top: 5px; font-family: 'Marcellus'; white-space: nowrap; }

        /* ANA KONTEYNIR */
        .container { 
            max-width: 1400px; margin: 20px auto; display: grid; 
            grid-template-columns: 250px 1fr 300px; gap: 30px; padding: 0 20px; 
        }

        /* MERMER SLIDER (Responsive) */
        .main-stage { position: relative; background: #fff; border-radius: clamp(20px, 5vw, 40px); overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.03); height: clamp(450px, 70vh, 650px); }
        .slide { position: absolute; inset: 0; opacity: 0; transition: var(--transition); display: none; cursor: pointer; }
        .slide.active { opacity: 1; display: flex; flex-direction: column; }
        .slide-img { width: 100%; height: 55%; object-fit: cover; }
        .slide-content { padding: clamp(20px, 5vw, 40px); flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .slide-content h2 { font-family: 'Marcellus', serif; font-size: clamp(1.5rem, 5vw, 2.5rem); margin: 0 0 10px 0; line-height: 1.1; }

        /* OVERLAY (Detay Sayfası) */
        .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 10005; display: none; overflow-y: auto; }
        .close-btn { position: fixed; top: 20px; right: 20px; background: #1a1a1a; color: #fff; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10010; }
        .article-wrap { max-width: 800px; margin: 60px auto; padding: 0 20px; }
        .article-title { font-family: 'Marcellus', serif; font-size: clamp(2rem, 8vw, 3.5rem); line-height: 1.1; margin-bottom: 20px; }
        .article-main-img { width: 100%; border-radius: 20px; margin-bottom: 25px; box-shadow: 0 15px 30px rgba(0,0,0,0.08); }
        .article-text { font-size: clamp(1.1rem, 4vw, 1.35rem); line-height: 1.8; color: #2d3436; }

        /* ADMİN PANELİ (Full Responsive Glass) */
        .admin-panel { display: none; position: fixed; inset: 0; background: rgba(244, 244, 242, 0.98); z-index: 11001; padding: clamp(15px, 5vw, 40px); overflow-y: auto; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .admin-card { background: #fff; padding: 20px; border-radius: 15px; border: 1px solid #eee; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; font-family: inherit; font-size: 16px; }
        .btn { padding: 12px 20px; border-radius: 50px; border: none; cursor: pointer; font-weight: 700; transition: 0.3s; width: 100%; margin-top: 10px; }
        .btn-gold { background: var(--accent); color: #fff; }
        .btn-danger { background: #e74c3c; color: #fff; margin-top: 5px; font-size: 12px; padding: 8px; }

        /* Sidebar & Ad */
        .sidebar-left { display: block; }
        .ad-box { background: #eee; border-radius: 25px; height: 500px; overflow: hidden; border: 1px dashed #ccc; position: sticky; top: 100px; }

        /* RESPONSIVE BREAKPOINTS */
        @media (max-width: 1100px) {
            .container { grid-template-columns: 1fr; }
            .sidebar-left { display: none; }
            .sidebar-right { display: none; }
            .authors-strip { justify-content: flex-start; padding-left: 20px; }
        }

        @media (max-width: 600px) {
            nav { padding: 10px 20px; }
            .main-stage { height: 500px; }
            .article-wrap { margin: 40px auto; }
        }
    </style>
</head>
<body>

<div id="progress-bar"></div>

<nav>
    <div class="logo" onclick="location.reload()">LUMINA</div>
    <div class="admin-entry" onclick="authAdmin()">[CORE]</div>
</nav>

<div id="authors-view" class="authors-strip"></div>

<div class="container">
    <aside class="sidebar-left">
        <h3 style="font-family:'Marcellus'; border-bottom: 1px solid #eee; padding-bottom:10px;">Kategoriler</h3>
        <div id="cat-view" style="line-height: 2.5; cursor: pointer; color: var(--muted); font-size: 0.9rem;"></div>
    </aside>

    <main class="main-stage" id="slider-view"></main>

    <aside class="sidebar-right">
        <div id="ad-view" class="ad-box"></div>
    </aside>
</div>

<div id="adminPanel" class="admin-panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="font-family:'Marcellus'; margin:0;">Lumina Core</h2>
        <button class="btn" onclick="closeAdmin()" style="background:#000; color:#fff; width:auto;">Kapat</button>
    </div>

    <div class="admin-grid">
        <div class="admin-card">
            <h3>İçerik Ekle</h3>
            <select id="dataType">
                <option value="news">Haber (Slider)</option>
                <option value="article">Makale</option>
                <option value="column">Köşe Yazısı</option>
            </select>
            <input type="text" id="dataTitle" placeholder="Başlık">
            <textarea id="dataContent" placeholder="İçerik..." rows="5"></textarea>
            <select id="dataCatSelect"></select>
            <label style="font-size:12px; color:var(--muted)">Fotoğraf Seç:</label>
            <input type="file" id="dataImg" accept="image/*">
            <button class="btn btn-gold" onclick="saveData()">Yayınla</button>
        </div>

        <div class="admin-card">
            <h3>Yazar & Reklam</h3>
            <input type="text" id="authName" placeholder="Yazar Adı">
            <input type="text" id="authBio" placeholder="Biyografi">
            <input type="file" id="authImg" accept="image/*">
            <button class="btn btn-gold" onclick="saveAuthor()">Yazar Ekle</button>
            <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
            <input type="text" id="adLink" placeholder="Reklam Linki">
            <input type="file" id="adImg" accept="image/*">
            <button class="btn btn-gold" onclick="saveAd()">Reklamı Güncelle</button>
        </div>
    </div>

    <div class="admin-card" style="margin-top:20px;">
        <h3>Yönetim Masası (Düzenle/Sil)</h3>
        <div id="management-view"></div>
    </div>
</div>

<div id="overlay" class="overlay">
    <div class="close-btn" onclick="closeOverlay()">✕</div>
    <div id="overlay-content"></div>
</div>

<script>
    // --- GÜVENLİK (47) ---
    const _V = "NzQ="; 
    function authAdmin() {
        const p = prompt("Security Key:");
        if (p === atob(_V).split("").reverse().join("")) {
            document.getElementById('adminPanel').style.display = 'block';
            renderAdmin();
        }
    }

    // --- DB ---
    let db = JSON.parse(localStorage.getItem('lumina_v3')) || {
        news: [{id:1, title: 'Mardin Telkari Mirası', content: 'Gümüşün ruhu Mardin sokaklarında...', img: 'https://images.unsplash.com/photo-1582738411706-bfc8e691d1c2', cat: 'Kültür'}],
        articles: [], columns: [],
        authors: [{id:1, name: 'Vedat M.', bio: 'Kadim Şehirler Uzmanı', img: 'https://images.unsplash.com/photo-1472099645785-5658abf4ff4e'}],
        categories: ['Kültür', 'Moda', 'Gastronomi', 'Tasarım'],
        ad: {img: '', link: '#'}
    };

    function sync() { localStorage.setItem('lumina_v3', JSON.stringify(db)); renderApp(); }
    function toBase64(file) { return new Promise((r) => { const reader = new FileReader(); reader.readAsDataURL(file); reader.onload = () => r(reader.result); }); }

    // --- FUNCTIONS ---
    async function saveData() {
        const type = document.getElementById('dataType').value;
        const file = document.getElementById('dataImg').files[0];
        let img = "https://via.placeholder.com/800";
        if(file) img = await toBase64(file);

        db[type].push({
            id: Date.now(),
            title: document.getElementById('dataTitle').value,
            content: document.getElementById('dataContent').value,
            cat: document.getElementById('dataCatSelect').value,
            img: img
        });
        sync(); renderAdmin(); alert("Başarılı!");
    }

    async function saveAuthor() {
        const file = document.getElementById('authImg').files[0];
        let img = "https://via.placeholder.com/200";
        if(file) img = await toBase64(file);
        db.authors.push({ id: Date.now(), name: document.getElementById('authName').value, bio: document.getElementById('authBio').value, img: img });
        sync(); renderAdmin();
    }

    async function saveAd() {
        const file = document.getElementById('adImg').files[0];
        if(file) db.ad.img = await toBase64(file);
        db.ad.link = document.getElementById('adLink').value;
        sync(); alert("Reklam Aktif!");
    }

    function deleteItem(type, id) {
        if(confirm("Siliniyor?")) { db[type] = db[type].filter(x => x.id !== id); sync(); renderAdmin(); }
    }

    // --- RENDER ---
    function renderApp() {
        // Authors
        document.getElementById('authors-view').innerHTML = db.authors.map(a => `
            <div class="author-item" onclick="openAuthor(${a.id})">
                <img src="${a.img}">
                <span>${a.name.toUpperCase()}</span>
            </div>
        `).join('');

        // Slider
        document.getElementById('slider-view').innerHTML = db.news.length ? db.news.map((n, i) => `
            <div class="slide ${i === 0 ? 'active' : ''}" onclick="openDetail('news', ${n.id})">
                <img src="${n.img}" class="slide-img">
                <div class="slide-content">
                    <small style="color:var(--accent); font-weight:800; letter-spacing:1px;">${n.cat.toUpperCase()}</small>
                    <h2>${n.title}</h2>
                    <p style="color:var(--muted); font-size:0.9rem;">Haberin devamı için dokunun...</p>
                </div>
            </div>
        `).join('') : '<div style="padding:40px; text-align:center;">Henüz haber eklenmedi.</div>';

        // Cats & Ad
        document.getElementById('cat-view').innerHTML = db.categories.map(c => `<div>• ${c}</div>`).join('');
        document.getElementById('dataCatSelect').innerHTML = db.categories.map(c => `<option value="${c}">${c}</option>`).join('');
        document.getElementById('ad-view').innerHTML = `<a href="${db.ad.link}" target="_blank" style="display:block; height:100%; background:url('${db.ad.img}') center/cover #eee;"></a>`;
    }

    function openDetail(type, id) {
        const item = db[type].find(x => x.id === id);
        const overlay = document.getElementById('overlay-content');
        document.getElementById('overlay').style.display = 'block';
        overlay.innerHTML = `
            <div class="article-wrap">
                <small style="color:var(--accent); font-weight:700;">${item.cat.toUpperCase()}</small>
                <h1 class="article-title">${item.title}</h1>
                <div style="background:#f1f2f6; padding:15px; border-radius:12px; margin-bottom:20px; display:flex; align-items:center; gap:10px;">
                    <button class="btn btn-gold" style="width:auto; margin:0;" onclick="speak('main-txt')">▶ Dinle</button>
                    <span style="font-size:0.8rem;">Yapay Zeka Okuyucu</span>
                </div>
                <img src="${item.img}" class="article-main-img">
                <div id="main-txt" class="article-text">${item.content}</div>
            </div>
        `;
    }

    function openAuthor(id) {
        const a = db.authors.find(x => x.id === id);
        const overlay = document.getElementById('overlay-content');
        document.getElementById('overlay').style.display = 'block';
        overlay.innerHTML = `
            <div class="article-wrap" style="text-align:center;">
                <img src="${a.img}" style="width:140px; height:140px; border-radius:50%; border:3px solid var(--accent); margin-bottom:15px;">
                <h1 class="article-title">${a.name}</h1>
                <p class="article-text" id="a-bio">${a.bio}</p>
                <button class="btn btn-gold" style="width:auto;" onclick="speak('a-bio')">Biyografiyi Dinle</button>
            </div>
        `;
    }

    function renderAdmin() {
        const types = ['news', 'articles', 'columns', 'authors'];
        let html = '';
        types.forEach(t => {
            if(db[t].length) {
                html += `<h4 style="margin-top:20px; border-bottom:1px solid #eee;">${t.toUpperCase()}</h4>`;
                db[t].forEach(item => {
                    html += `<div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0;">
                        <span style="font-size:14px;">${item.title || item.name}</span>
                        <button class="btn-danger" onclick="deleteItem('${t}', ${item.id})">Sil</button>
                    </div>`;
                });
            }
        });
        document.getElementById('management-view').innerHTML = html || 'Henüz veri yok.';
    }

    function closeOverlay() { speechSynthesis.cancel(); document.getElementById('overlay').style.display = 'none'; }
    function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }
    function speak(id) { const m = new SpeechSynthesisUtterance(document.getElementById(id).innerText); m.lang='tr-TR'; speechSynthesis.speak(m); }

    // Init
    renderApp();

    // Slider Logic
    setInterval(() => {
        const slides = document.querySelectorAll('.slide');
        if(slides.length < 2) return;
        let active = document.querySelector('.slide.active');
        active.classList.remove('active');
        let next = active.nextElementSibling || slides[0];
        next.classList.add('active');
    }, 5000);

    window.onscroll = () => {
        let winScroll = document.documentElement.scrollTop;
        let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        document.getElementById("progress-bar").style.width = (winScroll / height) * 100 + "%";
    };
</script>

</body>
</html>
