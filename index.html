<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brasília Digital | Official City Operating System</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #F1F5F9; 
            color: #0F172A; 
            font-style: normal !important; 
        }

        * { font-style: normal !important; }

        /* Yaşarbey Kahve Modernist UI */
        .premium-card { 
            background: #FFFFFF; 
            border-radius: 28px; 
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.02), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
        }

        #map { 
            height: 100%; width: 100%; border-radius: 28px; z-index: 1;
        }

        /* Custom Marker Styles */
        .marker-pin {
            width: 20px; height: 20px; border-radius: 50% 50% 50% 0;
            background: #0057B7; position: absolute;
            transform: rotate(-45deg); left: 50%; top: 50%; margin: -10px 0 0 -10px;
            border: 2px solid white;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body x-data="portalCore()" class="overflow-hidden">

    <nav class="h-20 bg-white/90 backdrop-blur-md border-b border-slate-200 sticky top-0 z-[1000] px-8">
        <div class="max-w-[1800px] mx-auto h-full flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="p-2 bg-[#0057B7] rounded-xl shadow-lg shadow-blue-200">
                    <svg width="28" height="28" viewBox="0 0 100 100" fill="none">
                        <circle cx="50" cy="50" r="40" stroke="white" stroke-width="12"/>
                        <path d="M50 20V80M20 50H80" stroke="#FFD700" stroke-width="12"/>
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl font-black tracking-tighter uppercase text-slate-900">Brasília<span class="text-[#0057B7]">OS</span></h1>
                    <p class="text-[10px] font-bold text-slate-400 tracking-widest uppercase">Parceiro: Yaşarbey Kahve</p>
                </div>
            </div>

            <div class="hidden lg:flex gap-10">
                <button class="text-sm font-bold text-slate-900 border-b-2 border-[#0057B7] pb-1">Mapa Interativo</button>
                <button class="text-sm font-bold text-slate-500 hover:text-slate-900">Cultura & Lazer</button>
                <button class="text-sm font-bold text-slate-500 hover:text-slate-900">Transparência</button>
                <button class="text-sm font-bold text-slate-500 hover:text-slate-900">Turismo</button>
            </div>

            <div class="flex items-center gap-6">
                <div class="hidden md:block text-right">
                    <p class="text-sm font-black text-slate-900" x-text="time"></p>
                    <p class="text-[10px] font-bold text-[#0057B7] uppercase tracking-widest">Tempo Real</p>
                </div>
                <button class="bg-slate-100 p-3 rounded-2xl hover:bg-slate-200 transition">
                    <i data-lucide="bell-ring" class="w-5 h-5 text-slate-600"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-[1800px] mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 h-[calc(100vh-80px)]">
        
        <div class="lg:col-span-3 flex flex-col gap-6 overflow-hidden">
            
            <div class="grid grid-cols-2 gap-4">
                <div class="premium-card p-4 flex flex-col items-center justify-center text-center">
                    <i data-lucide="thermometer-sun" class="text-orange-500 mb-2"></i>
                    <span class="text-xl font-black">28°C</span>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Brasília Agora</span>
                </div>
                <div class="premium-card p-4 flex flex-col items-center justify-center text-center border-l-4 border-green-500">
                    <i data-lucide="wind" class="text-green-500 mb-2"></i>
                    <span class="text-xl font-black">Boa</span>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Qualid. Ar</span>
                </div>
            </div>

            <div class="premium-card flex-1 flex flex-col overflow-hidden">
                <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                    <h3 class="font-black uppercase text-xs tracking-widest text-slate-500">Próximos Eventos</h3>
                    <i data-lucide="calendar" class="w-4 h-4 text-[#0057B7]"></i>
                </div>
                <div class="flex-1 overflow-y-auto p-4 space-y-3 no-scrollbar">
                    <template x-for="event in events" :key="event.id">
                        <div @click="selectEvent(event)" 
                             class="p-4 rounded-2xl border border-transparent hover:border-[#0057B7] hover:bg-blue-50/50 cursor-pointer transition-all group"
                             :class="selectedEvent?.id === event.id ? 'bg-blue-50 border-[#0057B7]' : 'bg-white'">
                            <div class="flex justify-between items-start">
                                <span class="text-[10px] font-black uppercase px-2 py-0.5 rounded bg-slate-100 text-slate-500" x-text="event.type"></span>
                                <span class="text-[10px] font-bold text-[#0057B7]" x-text="event.time"></span>
                            </div>
                            <h4 class="font-bold text-sm mt-2 text-slate-900 group-hover:text-[#0057B7]" x-text="event.name"></h4>
                            <div class="flex items-center gap-1 mt-2 text-[11px] text-slate-400 font-medium">
                                <i data-lucide="map-pin" class="w-3 h-3"></i>
                                <span x-text="event.location"></span>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div class="bg-[#0057B7] rounded-[28px] p-6 text-white relative overflow-hidden group">
                <div class="relative z-10">
                    <h4 class="font-black text-lg">Mola por conta da Yaşarbey?</h4>
                    <p class="text-xs opacity-80 mt-2 font-medium">Encontre a cafeteria mais próxima no Plano Piloto e recarregue suas energias.</p>
                    <button class="mt-4 bg-[#FFD700] text-slate-900 px-6 py-2.5 rounded-xl text-xs font-black uppercase tracking-tighter hover:scale-105 transition">
                        Ver Unidades
                    </button>
                </div>
                <i data-lucide="coffee" class="absolute -right-4 -bottom-4 w-24 h-24 opacity-10 group-hover:rotate-12 transition-transform"></i>
            </div>
        </div>

        <div class="lg:col-span-9 relative">
            <div class="premium-card h-full overflow-hidden relative shadow-2xl">
                <div id="map"></div>
                
                <template x-if="selectedEvent">
                    <div class="absolute bottom-10 left-10 z-[1000] w-80 bg-white p-6 rounded-[32px] shadow-2xl border border-slate-100 animate-in slide-in-from-bottom-5">
                        <div class="flex justify-between items-start mb-4">
                            <span class="bg-blue-600 text-white text-[10px] font-black px-3 py-1 rounded-full uppercase" x-text="selectedEvent.type"></span>
                            <button @click="selectedEvent = null" class="text-slate-400 hover:text-slate-900"><i data-lucide="x" class="w-5 h-5"></i></button>
                        </div>
                        <h3 class="text-xl font-black text-slate-900 leading-tight" x-text="selectedEvent.name"></h3>
                        <p class="text-sm text-slate-500 mt-3 leading-relaxed" x-text="selectedEvent.desc"></p>
                        
                        <div class="mt-6 flex items-center gap-4 border-t border-slate-100 pt-4">
                            <div class="flex-1">
                                <p class="text-[10px] font-black text-slate-400 uppercase">Horário</p>
                                <p class="text-sm font-bold text-slate-900" x-text="selectedEvent.time"></p>
                            </div>
                            <button class="bg-[#0057B7] text-white p-3 rounded-xl hover:bg-blue-700 transition">
                                <i data-lucide="navigation-2" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                </template>

                <div class="absolute top-6 left-1/2 -translate-x-1/2 z-[1000] flex gap-2">
                    <button class="bg-white/90 backdrop-blur px-6 py-2.5 rounded-full text-xs font-black shadow-xl border border-slate-200 hover:bg-[#0057B7] hover:text-white transition">TODOS</button>
                    <button class="bg-white/90 backdrop-blur px-6 py-2.5 rounded-full text-xs font-black shadow-xl border border-slate-200 hover:bg-[#0057B7] hover:text-white transition uppercase">Monumentos</button>
                    <button class="bg-white/90 backdrop-blur px-6 py-2.5 rounded-full text-xs font-black shadow-xl border border-slate-200 hover:bg-[#0057B7] hover:text-white transition uppercase text-[#0057B7]">Yaşarbey Coffee</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        function portalCore() {
            return {
                time: '',
                map: null,
                selectedEvent: null,
                events: [
                    { id: 1, name: 'Concerto Sinfônico na Alvorada', type: 'Música', time: '19:30', location: 'Concha Acústica', coords: [-15.7924, -47.8504], desc: 'Uma noite inesquecível com a Orquestra Sinfônica do Teatro Nacional Claudio Santoro sob as estrelas.' },
                    { id: 2, name: 'Exposição Centenário Niemeyer', type: 'Cultura', time: '10:00 - 18:00', location: 'Museu Nacional', coords: [-15.7982, -47.8755], desc: 'Uma retrospectiva completa da vida e obra do maior arquiteto do Brasil, Oscar Niemeyer.' },
                    { id: 3, name: 'Circuito Esportivo Eixo', type: 'Esporte', time: '08:00', location: 'Eixo Monumental', coords: [-15.7997, -47.8641], desc: 'O Eixo Monumental fechado para carros e aberto para a vida. Ciclismo, corrida e lazer para toda a família.' },
                    { id: 4, name: 'Workshop de Café Especial', type: 'Gastronomia', time: '15:00', location: 'Yaşarbey Coffee - Lago Sul', coords: [-15.8236, -47.8710], desc: 'Aprenda os segredos da torra perfeita com os mestres da Yaşarbey Kahve. Inscrições gratuitas.' }
                ],
                
                init() {
                    this.updateTime();
                    setInterval(() => this.updateTime(), 1000);
                    lucide.createIcons();

                    // Harita Başlatma
                    this.map = L.map('map', { zoomControl: false, attributionControl: false }).setView([-15.7938, -47.8828], 13);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(this.map);

                    // Markerları Ekle
                    this.events.forEach(event => {
                        const marker = L.marker(event.coords, {
                            icon: L.divIcon({
                                className: 'custom-marker',
                                html: `<div style="background-color: #0057B7; width:12px; height:12px; border-radius:50%; border:3px solid white; box-shadow: 0 0 10px rgba(0,87,183,0.4)"></div>`
                            })
                        }).addTo(this.map);

                        marker.on('click', () => this.selectEvent(event));
                    });
                },

                updateTime() {
                    this.time = new Date().toLocaleTimeString('pt-BR', { hour12: false });
                },

                selectEvent(event) {
                    this.selectedEvent = event;
                    this.map.flyTo(event.coords, 15, { duration: 1.2 });
                    // Re-init icons for dynamic element
                    setTimeout(() => lucide.createIcons(), 50);
                }
            }
        }
    </script>
</body>
</html>
