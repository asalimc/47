<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumina | Mardin & Brazil Heritage</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --bg: #f4ecd8; 
            --card-bg: #fdfbf7;
            --text: #433422; 
            --accent: #a67c52; 
        }
        * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; scroll-behavior: smooth; overflow-x: hidden; line-height: 1.6; }
        body::before { content: ""; position: fixed; inset: 0; opacity: 0.04; pointer-events: none; z-index: 9999; background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png'); }
        #progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent); width: 0%; z-index: 10001; }
        nav { background: rgba(244, 236, 216, 0.9); backdrop-filter: blur(15px); padding: 12px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 1000; border-bottom: 1px solid rgba(67, 52, 34, 0.08); }
        .logo { font-family: 'Marcellus', serif; font-size: 1.5rem; letter-spacing: 3px; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .authors-strip { background: var(--card-bg); padding: 20px 0; display: flex; justify-content: flex-start; md:justify-content: center; gap: 15px; border-bottom: 1px solid rgba(0,0,0,0.05); overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding-left: 5%; padding-right: 5%; }
        .authors-strip::-webkit-scrollbar { display: none; }
        .author-item { cursor: pointer; text-align: center; width: 85px; flex-shrink: 0; transition: transform 0.3s; }
        .author-item img { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; border: 1.5px solid var(--accent); padding: 2px; margin: 0 auto; filter: sepia(20%); }
        .author-item span { display: block; font-size: 0.6rem; font-weight: 700; margin-top: 8px; font-family: 'Marcellus'; text-transform: uppercase; white-space: nowrap; letter-spacing: 1px; }
        .container-main { max-width: 1440px; margin: 20px auto; padding: 0 15px; }
        #news-feed { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { #news-feed { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1100px) { #news-feed { grid-template-columns: repeat(3, 1fr); } }
        .news-card { background: var(--card-bg); border-radius: 20px; overflow: hidden; box-shadow: 0 4px 20px rgba(67, 52, 34, 0.04); cursor: pointer; transition: all 0.4s ease; border: 1px solid rgba(0,0,0,0.03); opacity: 0; transform: translateY(15px); }
        .news-card.show { opacity: 1; transform: translateY(0); }
        .news-img { width: 100%; height: 220px; object-fit: cover; transition: 0.5s; }
        .card-body { padding: 22px; }
        .card-body h2 { font-family: 'Marcellus', serif; font-size: 1.25rem; margin: 10px 0; line-height: 1.4; color: #2d2419; }
        .card-body p { font-size: 0.9rem; color: #5c4d3c; line-height: 1.7; font-weight: 300; }
        .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; overflow-y: auto; padding-bottom: 100px; }
        #art-body { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 400; color: #2d2419; max-width: 700px; margin: 0 auto; font-size: 1.15rem; line-height: 1.8; }
        #art-body br { content: ""; display: block; margin: 1.5em 0; }
        #admin-panel { display: none; background: #0b0b0b; color: #d1d1d1; position: fixed; inset: 0; z-index: 11000; overflow-y: auto; padding: 20px; }
        .input-cms { width: 100%; padding: 12px 15px; margin-bottom: 12px; background: #161616; border: 1px solid #2a2a2a; border-radius: 10px; color: white; font-size: 0.85rem; outline: none; }
        .admin-btn { padding: 10px 16px; border-radius: 8px; font-size: 0.7rem; font-weight: 700; background: #1a1a1a; transition: 0.3s; letter-spacing: 1px; color: #888; }
        .admin-btn.active { background: var(--accent); color: white; }
    </style>
</head>
<body>

<div id="progress-bar"></div>
<nav>
    <div class="logo" onclick="location.reload()">LUMINA</div>
    <div class="hidden md:block text-[9px] tracking-[3px] font-bold uppercase opacity-50">Mardin • Brezilya • Kültür Portalı</div>
</nav>

<div id="authors-list" class="authors-strip"></div>

<div class="container-main">
    <main id="news-feed"></main>
</div>

<footer class="py-16 text-center opacity-40">
    <button onclick="toggleAdmin()" class="text-[9px] font-bold tracking-[4px] uppercase border-b border-stone-400 pb-1">CMS MASTER ACCESS</button>
</footer>

<div id="overlay" class="overlay">
    <div class="sticky top-0 bg-[#f4ecd8]/90 backdrop-blur-md p-4 flex justify-between items-center z-[10002] border-bottom border-black/5">
        <div class="text-[10px] font-bold tracking-widest opacity-40">LUMINA READER MODE</div>
        <button onclick="stopReading(); closeAll();" class="bg-black text-white w-9 h-9 rounded-full flex items-center justify-center font-bold">✕</button>
    </div>
    <div id="overlay-content" class="max-w-screen-md mx-auto py-10 px-5"></div>
</div>

<div id="admin-panel">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-10 border-b border-white/5 pb-8">
            <h2 class="text-lg font-serif tracking-[4px] text-accent uppercase">Lumina Master CMS</h2>
            <button onclick="toggleAdmin()" class="text-[10px] font-bold border border-red-900 text-red-500 px-8 py-3 rounded-xl">KAPAT</button>
        </div>
        <div class="flex gap-3 mb-8"><button onclick="setTab('haber')" id="btn-haber" class="admin-btn active">HABERLER</button><button onclick="setTab('cat')" id="btn-cat" class="admin-btn">KATEGORİLER</button></div>
        <div id="admin-content" class="grid grid-cols-1 lg:grid-cols-12 gap-8"></div>
    </div>
</div>

<script>
    const initialData = {
        cats: [{id:'c1',name:'Mardin'},{id:'c2',name:'Brezilya'},{id:'c3',name:'Gastronomi'},{id:'c4',name:'Arkeoloji'},{id:'c5',name:'Yaşam'}],
        yazarlar: [
            {id:'y0', isim:'Haber Merkezi', bio:'Lumina Kurumsal', img:'https://images.unsplash.com/photo-1495020689067-958852a7765e?w=400'},
            {id:'y1', isim:'Aziz Sancar', bio:'Bilim Yazarı', img:'https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=400'},
            {id:'y2', isim:'Gabriel Garcia', bio:'Edebiyat & Kültür', img:'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=400'}
        ],
        haberler: [
            {id:'h1', title:"Mezopotamya'nın Altın Saati: Mardin", text:"Mardin'in dar sokaklarında gün batımı, taşların lisanını değiştirir. Abbaraların altından geçen rüzgar, Süryani şarabının ve taze kavrulmuş kahvenin kokusunu taşır. Artuklu döneminden kalma medreseler, gökyüzüyle kurulan bin yıllık bağın sessiz tanıklarıdır. Şehrin her penceresi, bir zamanlar deniz olan ama şimdi bereketli bir ovaya dönüşmüş Mezopotamya'ya açılır. Burada zaman dikey değil, döngüsel akar.", img:'https://images.unsplash.com/photo-1582738411706-bfc8e691d1c2?w=1000', cid:'c1', yid:'y0'},
            {id:'h2', title:"Rio de Janeiro: İki Dünya Arasında", text:"Corcovado Dağı'nın tepesinden bakıldığında Rio, doğanın ve betonun vahşi bir dansı gibidir. Copacabana sahilindeki dalgalar, kentin bitmek bilmeyen enerjisini kıyıya taşır. Favela'ların renkli karmaşasından, modern mimarinin keskin hatlarına kadar Brezilya, her adımda başka bir sürpriz sunar. Karnaval sadece bir eğlence değil, bir halkın hayata karşı duruşu, sömürge geçmişinden gelen bir direniş ve kutlama biçimidir.", img:'https://images.unsplash.com/photo-1483729558449-99ef09a8c325?w=1000', cid:'c2', yid:'y0'},
            {id:'h3', title:"Baharatların Gizli Yolu: Mardin Mutfağı", text:"İçli köftenin sanata dönüştüğü, sumak ve kişnişin etle buluştuğu o eşsiz durak. Mardin mutfağı, İpek Yolu üzerindeki tüm medeniyetlerin birer tutam baharat bıraktığı dev bir kazandır. Kaburga dolmasından, mahlep kokulu çöreklere kadar her lezzet, binlerce yıllık bir tarifin bugünkü izdüşümüdür. Burada yemek sadece karın doyurmak değil, misafire duyulan kadim bir saygı gösterisidir.", img:'https://images.unsplash.com/photo-1506368249639-73a05d6f6488?w=1000', cid:'c3', yid:'y0'},
            {id:'h4', title:"Amazonların Kalbi: Yeşil Cehennemden Cennete", text:"Dünyanın akciğerleri Amazon ormanları, Brezilya'nın en büyük hazinesi ve aynı zamanda en büyük yarasıdır. Manaus'tan başlayan nehir yolculukları, modern insanın hiç görmediği bir biyoçeşitlilik sunar. Nehrin siyah ve sarı sularının birbirine karışmadan aktığı o mucizevi nokta, doğanın insanoğluna verdiği en büyük derslerden biridir. Yerli kabilelerin binlerce yıldır koruduğu bu ekosistem, gezegenin geleceği için kritik bir öneme sahiptir.", img:'https://images.unsplash.com/photo-1516026672322-bc52d61a55d5?w=1000', cid:'c2', yid:'y0'},
            {id:'h5', title:"Güneydoğu'nun Arkeolojik Mirası: Dara", text:"Mezopotamya'nın Efes'i olarak anılan Dara Antik Kenti, devasa su sarnıçları ve kaya mezarlarıyla ziyaretçilerini büyülüyor. Roma İmparatorluğu'nun doğudaki en önemli garnizon şehirlerinden biri olan bu alan, askeri mimarinin ve mühendisliğin zirve noktasını temsil ediyor. Kazı çalışmaları devam ettikçe, toprağın altından çıkan her taş, tarih kitaplarını yeniden yazmamıza neden oluyor.", img:'https://images.unsplash.com/photo-1563802379532-62886477e098?w=1000', cid:'c4', yid:'y0'},
            {id:'h6', title:"Salvador de Bahia: Afrika'nın Brezilya'daki İzi", text:"Brezilya'nın ilk başkenti Salvador, kolonyal mimarisi ve Capoeira ritimleriyle ruhu olan bir şehirdir. Pelourinho meydanında yürürken, Afrika kökenli Brezilyalıların kültürel mirasını her köşe başında hissedersiniz. Baharatlı yemekleri, renkli giysileri ve dini törenleriyle bu şehir, Brezilya'nın çok kültürlü yapısının en saf halidir.", img:'https://images.unsplash.com/photo-1596707323136-22442436f903?w=1000', cid:'c2', yid:'y0'}
        ]
    };

    let db = JSON.parse(localStorage.getItem('lumina_v6_core')) || initialData;
    let activeTab = 'haber', tempImg = "", editingId = null;
    let synth = window.speechSynthesis;

    function sync() {
        localStorage.setItem('lumina_v6_core', JSON.stringify(db));
        renderPortal();
        renderAdmin();
        editingId = null;
        tempImg = "";
    }

    function renderPortal() {
        const authorsList = document.getElementById('authors-list');
        authorsList.innerHTML = db.yazarlar.filter(y => y.id !== 'y0').map(y => `
            <div class="author-item">
                <img src="${y.img}">
                <span>${y.isim}</span>
            </div>
        `).join('');

        const feed = document.getElementById('news-feed');
        feed.innerHTML = db.haberler.map((h, i) => `
            <article class="news-card show" onclick="openNews('${h.id}')" style="transition-delay: ${i*50}ms">
                <img src="${h.img}" class="news-img">
                <div class="card-body">
                    <div class="flex justify-between items-center mb-3">
                        <small class="text-accent font-bold uppercase tracking-widest text-[8px]">${db.cats.find(c=>c.id===h.cid)?.name}</small>
                        <small class="opacity-30 font-bold text-[8px] uppercase">${Math.ceil(h.text.length/400)} DK OKUMA</small>
                    </div>
                    <h2>${h.title}</h2>
                    <p class="line-clamp-3">${h.text}</p>
                </div>
            </article>
        `).join('');
    }

    function openNews(hid) {
        const h = db.haberler.find(x => x.id === hid); 
        const y = db.yazarlar.find(x => x.id === h.yid);
        document.getElementById('overlay').style.display = 'block';
        document.body.style.overflow = 'hidden';
        document.getElementById('overlay-content').innerHTML = `
            <div class="mb-8">
                <h1 class="text-3xl md:text-5xl font-serif mb-6 leading-tight text-[#2d2419]">${h.title}</h1>
                <div class="flex items-center justify-between py-4 border-y border-black/5">
                    <div class="flex items-center gap-3">
                        <img src="${y.img}" class="w-10 h-10 rounded-full object-cover">
                        <div>
                            <div class="text-xs font-bold">${y.isim}</div>
                            <div class="text-[8px] opacity-40 uppercase font-black tracking-widest">${y.bio}</div>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="readOutLoad()" class="px-4 py-2 bg-accent text-white rounded-full text-[10px] font-bold uppercase tracking-widest">🔊 OKU</button>
                        <button onclick="stopReading()" class="px-4 py-2 bg-stone-200 text-stone-700 rounded-full text-[10px] font-bold uppercase tracking-widest">🛑 DUR</button>
                    </div>
                </div>
            </div>
            <img src="${h.img}" class="w-full rounded-2xl mb-8 shadow-sm">
            <div id="art-body">
                ${h.text.split('. ').join('.<br><br>')}
            </div>`;
    }

    // CMS ve Genel Fonksiyonlar
    function renderAdmin() {
        const container = document.getElementById('admin-content');
        let formHtml = "", listHtml = "";
        if(activeTab === 'haber') {
            const h = editingId ? db.haberler.find(x => x.id === editingId) : null;
            formHtml = `<div class="lg:col-span-4 bg-[#111] p-5 rounded-2xl border border-white/5 h-fit">
                <input type="text" id="h-t" value="${h?.title || ''}" placeholder="Başlık" class="input-cms">
                <textarea id="h-x" placeholder="İçerik..." class="input-cms h-32">${h?.text || ''}</textarea>
                <select id="h-c" class="input-cms">${db.cats.map(c=>`<option value="${c.id}" ${h?.cid===c.id?'selected':''}>${c.name}</option>`).join('')}</select>
                <input type="file" onchange="handleImg(event)" class="text-[10px] mb-4 opacity-40">
                <button onclick="saveH()" class="w-full bg-accent text-white py-3 rounded-xl font-bold text-[10px] uppercase">Kaydet</button>
            </div>`;
            listHtml = db.haberler.map(x => `<div class="flex justify-between items-center p-4 bg-[#111] rounded-xl mb-3"><span class="text-[11px] truncate w-2/3">${x.title}</span><div class="flex gap-3"><button onclick="editH('${x.id}')" class="text-accent text-[9px]">EDIT</button><button onclick="del('haberler','${x.id}')" class="text-red-900 text-[9px]">SIL</button></div></div>`).join('');
        }
        container.innerHTML = formHtml + `<div class="lg:col-span-8 overflow-y-auto max-h-[70vh]">${listHtml}</div>`;
    }

    function saveH() {
        const t = document.getElementById('h-t').value, x = document.getElementById('h-x').value;
        if(!t || !x) return alert("Boş bırakmayın");
        if(editingId) {
            let item = db.haberler.find(i => i.id === editingId);
            item.title = t; item.text = x; item.cid = document.getElementById('h-c').value;
            if(tempImg) item.img = tempImg;
        } else {
            db.haberler.unshift({id:'h'+Date.now(), title:t, text:x, cid:document.getElementById('h-c').value, yid:'y0', img:tempImg || 'https://images.unsplash.com/photo-1499750310107-5fef28a66643?w=1000'});
        }
        sync();
    }

    function readOutLoad() { stopReading(); const u = new SpeechSynthesisUtterance(document.getElementById('art-body').innerText); u.lang = 'tr-TR'; u.rate = 0.9; synth.speak(u); }
    function stopReading() { synth.cancel(); }
    function toggleAdmin() { const p = document.getElementById('admin-panel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; if(p.style.display === 'block') renderAdmin(); }
    function setTab(t) { activeTab = t; renderAdmin(); }
    function closeAll() { document.getElementById('overlay').style.display = 'none'; document.body.style.overflow = 'auto'; }
    function editH(id) { editingId = id; renderAdmin(); }
    function del(k, id) { if(confirm('Silinsin mi?')) { db[k] = db[k].filter(x => x.id !== id); sync(); } }
    function handleImg(e) { const fr = new FileReader(); fr.onload = () => { tempImg = fr.result; }; fr.readAsDataURL(e.target.files[0]); }

    window.onscroll = () => { let s = document.documentElement.scrollTop, h = document.documentElement.scrollHeight - document.documentElement.clientHeight; document.getElementById("progress-bar").style.width = (s / h) * 100 + "%"; };
    window.onload = renderPortal;
</script>
</body>
</html>
