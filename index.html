<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MB | Ahmet Çınarbaş Journal</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F8F6F2; --ink: #1A1A1A; --accent: #B08D57; --white: #FFFFFF; --ease: cubic-bezier(0.19, 1, 0.22, 1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--ink); font-family: 'Plus Jakarta Sans', sans-serif; line-height: 1.6; }
        header { padding: 20px 6%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; background: rgba(248, 246, 242, 0.95); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .logo-box { display: flex; align-items: center; text-decoration: none; color: var(--ink); }
        .logo-m { font-family: 'Bodoni Moda', serif; font-size: 1.8rem; font-weight: 900; background: var(--ink); color: var(--bg); padding: 0 10px; border-radius: 8px; margin-right: 12px; }
        .logo-text { font-family: 'Bodoni Moda', serif; font-size: 0.9rem; font-weight: 900; line-height: 1; letter-spacing: 1px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 6%; }
        .bento { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }
        .card { background: var(--white); border-radius: 35px; padding: 45px; transition: transform 0.6s var(--ease), box-shadow 0.6s var(--ease); cursor: pointer; border: 1px solid rgba(0,0,0,0.03); min-height: 520px; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 40px 80px rgba(0,0,0,0.12); }
        .card-bg { position: absolute; inset: 0; background-size: cover; background-position: center; z-index: 0; transition: transform 0.6s var(--ease); }
        .card:hover .card-bg { transform: scale(1.05); }
        .card-overlay { position: absolute; inset: 0; background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.85)); z-index: 1; }
        .card-content { position: relative; z-index: 2; color: white; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
        .card-author { background: var(--white); text-align: center; justify-content: center; }
        .author-img { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; margin: 0 auto 20px; border: 5px solid var(--bg); }
        .tr-line { font-family: 'Bodoni Moda', serif; font-size: 2.4rem; line-height: 1.1; margin-bottom: 8px; display: block; font-weight: 700; }
        .pt-line { font-family: 'Bodoni Moda', serif; font-size: 2rem; opacity: 0.7; font-weight: 400; display: block; }
        .tag-dual { font-size: 0.75rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 15px; display: block; }
        .entry-no { font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; opacity: 0.5; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px; }
        #reader-modal { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; overflow-y: auto; padding: 80px 6%; }
        .reader-text { font-size: 1.2rem; line-height: 1.8; text-align: justify; }
        .close-btn { position: fixed; top: 30px; right: 6%; background: var(--ink); color: white; border: none; padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: 800; z-index: 10000; }
        .mini-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .mini-card { background: white; padding: 20px; border-radius: 15px; border: 1px solid rgba(0,0,0,0.05); cursor: pointer; font-size: 0.9rem; }
    </style>
</head>
<body>
    <header>
        <a href="#" class="logo-box"><div class="logo-m">MB</div><div class="logo-text">MARDIN<br>BRAZIL</div></a>
    </header>
    <main class="container">
        <div class="bento" id="bento-grid">
            <div class="card card-author">
                <img src="https://pbs.twimg.com/media/GifApT2XEAAqees.jpg" class="author-img">
                <span class="tag-dual">KÜLTÜREL ARŞİVCİ</span>
                <span class="tr-line" style="color:var(--ink); font-size: 1.8rem;">Ahmet Çınarbaş</span>
                <p style="font-size: 0.9rem; opacity: 0.6;">Mardin'den Brezilya'ya uzanan bir kültür köprüsü.</p>
            </div>
        </div>
    </main>
    <div id="reader-modal">
        <button class="close-btn" onclick="closeReader()">KAPAT</button>
        <div id="reader-content"></div>
    </div>
    <script>
        let articles = [];
        async function loadData() {
            const res = await fetch('https://raw.githubusercontent.com/asalimc/47/main/articles.json?v=' + Date.now());
            articles = await res.json();
            renderGrid();
        }
        function renderGrid() {
            const grid = document.getElementById('bento-grid');
            const author = grid.firstElementChild;
            grid.innerHTML = ''; grid.appendChild(author);
            articles.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openReader(item);
                card.innerHTML = `<div class="card-bg" style="background-image: url('${item.image}')"></div><div class="card-overlay"></div><div class="card-content"><div><span class="tag-dual" style="color:white;">${item.category}</span><span class="tr-line">${item.tr.title}</span><span class="pt-line">${item.pt.title}</span></div><div class="entry-no">JOURNAL ENTRY #00${index + 1}</div></div>`;
                grid.appendChild(card);
            });
        }
        function openReader(item) {
            const modal = document.getElementById('reader-modal');
            const content = document.getElementById('reader-content');
            const related = articles.filter(a => a.category === item.category && a.id !== item.id);
            content.innerHTML = `<div style="max-width:900px; margin:0 auto;"><span class="tag-dual">${item.category}</span><h1 class="tr-line" style="font-size:3rem;">${item.tr.title}</h1><h2 class="pt-line" style="margin-bottom:40px;">${item.pt.title}</h2><div style="display:grid; grid-template-columns: 1fr 1fr; gap:50px;"><div class="reader-text">${item.tr.body.replace(/\n/g, '<br>')}</div><div class="reader-text" style="opacity:0.7;">${item.pt.body.replace(/\n/g, '<br>')}</div></div><hr style="margin:50px 0; opacity:0.1;"><h4 class="tag-dual">ARŞİVDEN DİĞERLERİ</h4><div class="mini-grid">${articles.map(a => `<div class="mini-card" onclick='openReader(${JSON.stringify(a).replace(/'/g, "&apos;")})'><b>${a.tr.title}</b><br><small>${a.date}</small></div>`).join('')}</div></div>`;
            modal.style.display = 'block'; document.body.style.overflow = 'hidden';
        }
        function closeReader() { document.getElementById('reader-modal').style.display = 'none'; document.body.style.overflow = 'auto'; }
        loadData();
    </script>
</body>
</html>
