<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Obsidian v14 | Professional CMS</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Inter:wght@100;300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { --bg: #F9F9F7; --accent: #C5A059; --text: #1A1A1A; --dark: #0A0A0A; }
        * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; transition: 0.5s; }
        .serif { font-family: 'Cormorant Garamond', serif; }
        
        /* Modal Engine */
        .modal-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 100000; overflow-y: auto; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Bento Grid */
        .bento-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 30px; padding: 40px 5%; }
        .bento-item { border-radius: 40px; overflow: hidden; position: relative; cursor: pointer; border: 1px solid rgba(0,0,0,0.05); transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); height: 550px; }
        .bento-item:hover { transform: scale(0.99); box-shadow: 0 40px 80px rgba(0,0,0,0.06); }

        /* Admin Dashboard */
        #admin-panel { display: none; position: fixed; inset: 0; background: #070707; color: white; z-index: 200000; flex-direction: row; }
        .admin-sidebar { width: 300px; border-right: 1px solid #1A1A1A; padding: 50px 40px; background: #050505; }
        .admin-main { flex: 1; padding: 60px 10%; overflow-y: auto; }
        .admin-card { background: #0F0F0F; border: 1px solid #1F1F1F; border-radius: 30px; padding: 30px; }
        .input-lux { background: #151515; border: 1px solid #222; border-radius: 15px; padding: 15px; width: 100%; color: white; outline: none; transition: 0.3s; }
        .input-lux:focus { border-color: var(--accent); background: #1A1A1A; }
        
        .highlight { color: var(--accent); font-weight: 700; transition: 0.2s; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="no-scrollbar">

<nav class="sticky top-0 z-[5000] px-12 py-6 flex justify-between items-center bg-white/80 backdrop-blur-2xl border-b border-black/5">
    <div class="flex items-center gap-16">
        <h1 class="serif text-4xl font-light uppercase tracking-tighter cursor-pointer" onclick="location.reload()">Lumina</h1>
        <div id="ui-global-info" class="hidden xl:flex gap-8 text-[10px] font-black uppercase tracking-[4px] opacity-30">
            </div>
    </div>
    <button onclick="toggleAdmin('flex')" class="group flex items-center gap-3 bg-black text-white px-6 py-3 rounded-full hover:bg-accent transition transform active:scale-95">
        <span class="text-[10px] font-black uppercase tracking-widest">Master Console</span>
        <i data-lucide="layout-grid" class="w-4 h-4"></i>
    </button>
</nav>

<header class="px-[5%] py-24 flex flex-col md:flex-row justify-between items-end border-b border-black/5">
    <div class="max-w-5xl">
        <p class="text-[12px] font-black uppercase tracking-[10px] text-accent mb-8">Cultural Intelligence v14</p>
        <h2 class="serif text-8xl md:text-[10rem] font-light leading-[0.85] tracking-tighter">Mardin & <br><i>Sao Paulo</i></h2>
    </div>
    <div class="text-right mt-12 md:mt-0">
        <div class="bg-white p-10 rounded-[50px] shadow-sm border border-black/5 inline-block">
            <p class="text-[10px] font-black opacity-20 uppercase tracking-[4px] mb-2">Distance Engine</p>
            <p id="ui-distance" class="serif text-5xl font-bold tracking-tighter">10.604 KM</p>
        </div>
    </div>
</header>

<section id="ui-feed" class="bento-grid"></section>

<div id="article-modal" class="modal-overlay">
    <div class="p-10 flex justify-between items-center sticky top-0 bg-white/90 backdrop-blur-xl z-10">
        <button onclick="closeModals()" class="flex items-center gap-3 font-black text-[10px] uppercase opacity-40 hover:opacity-100 transition"><i data-lucide="chevron-left"></i> Kapat</button>
        <button id="tts-btn" onclick="toggleKaraoke()" class="bg-black text-white px-12 py-4 rounded-full font-black text-[10px] uppercase tracking-[4px] hover:bg-accent transition">Sesli Deneyim</button>
    </div>
    <div id="article-content" class="max-w-4xl mx-auto py-24 px-10"></div>
</div>

<div id="admin-panel">
    <div class="admin-sidebar">
        <h2 class="serif text-4xl italic text-accent mb-16 tracking-tighter">Lumina Core</h2>
        <nav class="space-y-8">
            <button onclick="switchTab('news')" class="flex items-center gap-5 text-white/40 hover:text-white transition uppercase text-[11px] font-black tracking-[3px]"><i data-lucide="edit-3"></i> İçerik Yaz</button>
            <button onclick="switchTab('global')" class="flex items-center gap-5 text-white/40 hover:text-white transition uppercase text-[11px] font-black tracking-[3px]"><i data-lucide="globe"></i> Global Ayarlar</button>
            <button onclick="switchTab('list')" class="flex items-center gap-5 text-white/40 hover:text-white transition uppercase text-[11px] font-black tracking-[3px]"><i data-lucide="database"></i> Arşiv Yönetimi</button>
        </nav>
        <button onclick="toggleAdmin('none')" class="mt-32 w-full py-5 bg-red-950/20 text-red-500 border border-red-900/30 rounded-2xl text-[11px] font-black uppercase tracking-widest hover:bg-red-900/40 transition">Sistemi Kapat</button>
    </div>
    
    <div class="admin-main">
        <div id="tab-news" class="admin-tab">
            <div class="flex justify-between items-center mb-12">
                <h3 class="serif text-5xl italic">Yeni Bir Hikaye Anlat</h3>
                <span class="text-[10px] opacity-40 uppercase tracking-[4px]">Status: Writing</span>
            </div>
            <div class="grid grid-cols-12 gap-10">
                <div class="col-span-8 space-y-6">
                    <input id="in-news-title" placeholder="Makale Başlığı..." class="input-lux text-3xl serif py-8">
                    <textarea id="in-news-text" placeholder="Kültürel derinliğe dalın..." class="input-lux h-80 text-lg leading-relaxed"></textarea>
                </div>
                <div class="col-span-4 space-y-6">
                    <div class="admin-card">
                        <label class="text-[10px] font-black uppercase opacity-40 mb-6 block">Kapak Görseli</label>
                        <input type="file" id="in-news-file" class="hidden" onchange="handleFile(this, 'news-preview')">
                        <label for="in-news-file" class="cursor-pointer block border-2 border-dashed border-white/5 p-12 text-center rounded-3xl hover:border-accent transition hover:bg-white/5 group">
                            <i data-lucide="image-plus" class="mx-auto mb-4 opacity-20 group-hover:opacity-100 transition"></i>
                            <span class="text-[9px] font-black uppercase opacity-40">Görsel Seç</span>
                        </label>
                        <img id="news-preview" class="mt-6 w-full h-48 object-cover rounded-3xl hidden shadow-2xl">
                        <button onclick="addNews()" class="mt-8 w-full bg-accent text-black font-black py-5 rounded-2xl text-[11px] uppercase tracking-[4px] hover:scale-[1.02] transition">Dünyaya Duyur</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-global" class="admin-tab hidden">
            <h3 class="serif text-5xl italic mb-12">Global Parametreler</h3>
            <div class="grid grid-cols-2 gap-8">
                <div class="admin-card">
                    <label class="text-[10px] font-black opacity-30 uppercase mb-4 block">Mardin İklimi</label>
                    <input id="in-glob-mardin" class="input-lux" placeholder="Örn: 24°C Güneşli">
                </div>
                <div class="admin-card">
                    <label class="text-[10px] font-black opacity-30 uppercase mb-4 block">Sao Paulo İklimi</label>
                    <input id="in-glob-sp" class="input-lux" placeholder="Örn: 21°C Yağmurlu">
                </div>
                <button onclick="saveGlobal()" class="col-span-2 bg-white text-black font-black py-6 rounded-2xl text-[11px] uppercase tracking-[5px]">Senkronize Et</button>
            </div>
        </div>
    </div>
</div>

<script>
    // --- DATABASE ---
    let DB = JSON.parse(localStorage.getItem('LUMINA_V14_DB')) || {
        global: { mardin: '24°C', sp: '21°C', dist: '10.604 KM' },
        news: [
            { id: 1, title: 'Kasımiye\'den Avenida Paulista\'ya', text: 'Mardin\'in taş sessizliği ile Sao Paulo\'nun beton gürültüsü arasındaki o görünmez bağ, insanlığın mimari tutkusunda gizlidir. Biri gökyüzüne yatay, diğeri dikey uzanır.', img: 'https://images.unsplash.com/photo-1582738411706-bfc8e691d1c2?w=1200', type: 'Mimari' }
        ]
    };

    function sync() { localStorage.setItem('LUMINA_V14_DB', JSON.stringify(DB)); render(); }

    // --- AUTOMATION ---
    function updateHeaderInfo() {
        const mTime = new Date().toLocaleTimeString('tr-TR', { timeZone: 'Europe/Istanbul', hour: '2-digit', minute: '2-digit' });
        const sTime = new Date().toLocaleTimeString('tr-TR', { timeZone: 'America/Sao_Paulo', hour: '2-digit', minute: '2-digit' });
        document.getElementById('ui-global-info').innerHTML = `
            <span>Mardin ${mTime} • ${DB.global.mardin}</span>
            <span class="opacity-20">/</span>
            <span>Sao Paulo ${sTime} • ${DB.global.sp}</span>
        `;
    }
    setInterval(updateHeaderInfo, 1000);

    // --- RENDER ---
    function render() {
        lucide.createIcons();
        document.getElementById('ui-distance').innerText = DB.global.dist;
        
        const feed = document.getElementById('ui-feed');
        feed.innerHTML = DB.news.map((n, idx) => `
            <div class="bento-item ${idx % 3 === 0 ? 'col-span-12 lg:col-span-8' : 'col-span-12 lg:col-span-4'}" onclick="openArticle(${n.id})">
                <img src="${n.img}" class="absolute inset-0 w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent"></div>
                <div class="absolute bottom-0 p-12 text-white">
                    <span class="text-[10px] font-black uppercase tracking-[6px] text-accent mb-6 block">${n.type}</span>
                    <h3 class="serif text-5xl md:text-6xl leading-[0.9] tracking-tighter">${n.title}</h3>
                </div>
            </div>
        `).join('');
    }

    // --- FILE HANDLING ---
    let tempImg = "";
    function handleFile(input, previewId) {
        const reader = new FileReader();
        reader.onload = (e) => {
            tempImg = e.target.result;
            const p = document.getElementById(previewId);
            p.src = e.target.result; p.classList.remove('hidden');
        };
        reader.readAsDataURL(input.files[0]);
    }

    // --- MODAL & KARAOKE ---
    function openArticle(id) {
        const n = DB.news.find(x => x.id === id);
        document.getElementById('article-content').innerHTML = `
            <h1 class="serif text-7xl md:text-9xl text-center leading-[0.85] tracking-tighter mb-20">${n.title}</h1>
            <div id="karaoke-text" class="serif text-4xl leading-relaxed text-justify opacity-80 first-letter:text-9xl first-letter:text-accent">
                ${n.text.split(' ').map(w => `<span>${w}</span>`).join(' ')}
            </div>
        `;
        document.getElementById('article-modal').style.display = 'block';
    }

    function toggleKaraoke() {
        const spans = document.querySelectorAll('#karaoke-text span');
        const utter = new SpeechSynthesisUtterance(document.getElementById('karaoke-text').innerText);
        utter.lang = 'tr-TR'; utter.rate = 0.9;
        let i = 0;
        utter.onboundary = (e) => {
            if (e.name === 'word') {
                spans.forEach(s => s.classList.remove('highlight'));
                if(spans[i]) spans[i].classList.add('highlight');
                i++;
            }
        };
        window.speechSynthesis.speak(utter);
    }

    // --- ADMIN ---
    function toggleAdmin(s) { document.getElementById('admin-panel').style.display = s; }
    function switchTab(t) { document.querySelectorAll('.admin-tab').forEach(x => x.classList.add('hidden')); document.getElementById('tab-'+t).classList.remove('hidden'); }
    
    function addNews() {
        const n = { id: Date.now(), title: document.getElementById('in-news-title').value, text: document.getElementById('in-news-text').value, img: tempImg || 'https://via.placeholder.com/1200', type: 'Kültürel Analiz' };
        DB.news.unshift(n); sync(); toggleAdmin('none');
    }

    function saveGlobal() {
        DB.global.mardin = document.getElementById('in-glob-mardin').value;
        DB.global.sp = document.getElementById('in-glob-sp').value;
        sync();
    }

    function closeModals() { window.speechSynthesis.cancel(); document.querySelectorAll('.modal-overlay').forEach(m => m.style.display='none'); }

    window.onload = () => { render(); updateHeaderInfo(); };
</script>
</body>
</html>
