<section id="dinamik-haberler" class="container mx-auto px-4 mt-12 grid grid-cols-1 md:grid-cols-3 gap-6">
    </section>

<script>
    window.onload = function() {
        const dinamikAlan = document.getElementById('dinamik-haberler');
        const veriler = JSON.parse(localStorage.getItem('msp_haberler')) || [];

        veriler.reverse().forEach(haber => {
            dinamikAlan.innerHTML += `
                <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm hover:shadow-xl transition-all cursor-pointer">
                    <span class="text-[10px] font-black text-blue-600 uppercase tracking-widest">${haber.kategori}</span>
                    <h3 class="msp-title text-xl font-bold mt-2 leading-tight">${haber.baslik}</h3>
                    <p class="text-xs text-slate-500 mt-3 line-clamp-3">${haber.icerik}</p>
                    <div class="mt-4 pt-4 border-t flex justify-between items-center">
                        <span class="text-[10px] font-bold text-slate-400 italic">${haber.yazar}</span>
                        <span class="text-[9px] font-black text-slate-300 uppercase">${haber.tarih}</span>
                    </div>
                </div>
            `;
        });
    }
</script>
