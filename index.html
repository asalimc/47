<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MB | Ahmet Çınarbaş Journal - Deep Analysis</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,700;0,6..96,900;1,6..96,400&family=Plus+Jakarta+Sans:wght@200;300;400;500;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #F8F6F2; --ink: #1A1A1A; --accent: #B08D57; --white: #FFFFFF;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* MINIMAL CURSOR */
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        #cursor {
            position: fixed; width: 8px; height: 8px; background: var(--accent);
            border-radius: 50%; pointer-events: none; z-index: 999999;
            transition: transform 0.1s ease-out;
        }

        body { background: var(--bg); color: var(--ink); font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }

        header {
            padding: 40px 6%; display: flex; justify-content: space-between; align-items: center;
            position: fixed; width: 100%; top: 0; z-index: 1000;
            background: rgba(248, 246, 242, 0.6); backdrop-filter: blur(20px);
        }
        .logo { font-family: 'Bodoni Moda', serif; font-size: 2.2rem; font-weight: 900; letter-spacing: -2px; }

        .container { max-width: 1400px; margin: 180px auto 100px; padding: 0 6%; }
        .bento { display: grid; grid-template-columns: repeat(6, 1fr); gap: 40px; }
        
        .bento:has(.card:hover) .card:not(:hover) {
            opacity: 0.15; filter: blur(12px); transform: scale(0.96);
        }

        .card {
            background: var(--white); border-radius: 60px; min-height: 550px;
            position: relative; overflow: hidden; 
            transition: all 1s var(--ease); display: flex; flex-direction: column; justify-content: flex-end; padding: 60px;
        }
        .card:hover { transform: translateY(-20px); z-index: 10; box-shadow: 0 50px 100px rgba(0,0,0,0.1); }
        
        .card-full { grid-column: span 6; }
        .card-wide { grid-column: span 4; }
        .card-medium { grid-column: span 3; }
        .card-small { grid-column: span 2; }

        .card-bg {
            position: absolute; inset: -5%; width: 110%; height: 110%;
            background-size: cover; background-position: center;
            z-index: 0; transition: transform 0.3s ease-out;
        }
        .card-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.85) 5%, transparent 60%); z-index: 1; }
        
        .card-content { position: relative; z-index: 2; color: white; pointer-events: none; }
        .tag { font-size: 0.7rem; font-weight: 800; letter-spacing: 5px; color: var(--accent); margin-bottom: 20px; display: block; text-transform: uppercase; }
        .title-tr { font-family: 'Bodoni Moda', serif; font-size: 3rem; line-height: 1; margin-bottom: 12px; font-weight: 900; }
        .title-pt { font-family: 'Bodoni Moda', serif; font-size: 1.8rem; font-weight: 300; opacity: 0.6; font-style: italic; }

        #reader { position: fixed; inset: 0; background: var(--bg); z-index: 99999; display: none; overflow-y: auto; cursor: auto; }
        
        .hero-banner { width: 100%; height: 80vh; position: relative; overflow: hidden; }
        .hero-banner img { width: 100%; height: 100%; object-fit: cover; animation: slowZoom 30s infinite alternate; }
        @keyframes slowZoom { from { transform: scale(1); } to { transform: scale(1.2); } }

        .modal-body { max-width: 1300px; margin: 0 auto; padding: 100px 6% 150px; }
        .reader-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 100px; margin-top: 80px; }
        
        .text-tr, .text-pt { 
            font-size: 1.4rem; line-height: 2.2; font-weight: 300; color: var(--ink); text-align: justify;
        }
        .text-pt { font-style: italic; color: #555; border-left: 1px solid rgba(0,0,0,0.1); padding-left: 80px; }

        .close-btn { position: fixed; top: 40px; right: 40px; background: var(--ink); color: white; border: none; width: 70px; height: 70px; border-radius: 50%; font-size: 2rem; z-index: 100000; display: flex; align-items: center; justify-content: center; transition: 0.4s; }
        .close-btn:hover { background: var(--accent); transform: scale(1.1) rotate(90deg); }

        footer { padding: 100px 6%; text-align: center; opacity: 0.2; font-weight: 800; letter-spacing: 12px; font-size: 0.7rem; }

        @media (max-width: 1024px) {
            .reader-grid { grid-template-columns: 1fr; gap: 60px; }
            .text-pt { padding-left: 0; border-left: none; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 60px; }
        }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div id="progress-container" style="position: fixed; top:0; width:100%; height:6px; z-index:100001;"><div id="progress-bar" style="height:100%; background:var(--accent); width:0%;"></div></div>

    <header>
        <div class="logo">MB</div>
        <div style="font-weight: 600; letter-spacing: 4px; font-size: 0.7rem;">JOURNAL / 2026</div>
    </header>

    <main class="container">
        <div class="bento">
            
            <div class="card card-full" onclick="openReader('author')">
                <div class="card-content" style="color: var(--ink); text-align: center;">
                    <img src="https://pbs.twimg.com/media/GifApT2XEAAqees.jpg" style="width: 220px; height: 220px; border-radius: 50%; object-fit: cover; margin-bottom: 40px; border: 12px solid var(--bg);">
                    <span class="tag">CURATORIAL ANALYSE</span>
                    <h2 class="title-tr" style="font-size: 4.5rem;">Ahmet Çınarbaş</h2>
                    <h3 class="title-pt">Análise Profunda: Mardin e Brasil</h3>
                </div>
            </div>

            <div class="card card-wide" onclick="openReader('carnaval')">
                <div class="card-bg" style="background-image: url('https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?q=80&w=1200')"></div>
                <div class="card-overlay"></div>
                <div class="card-content">
                    <span class="tag">CULTURE</span>
                    <h2 class="title-tr">Rio'da Telkari Estetiği</h2>
                    <h3 class="title-pt">Ecos da Filigrana</h3>
                </div>
            </div>

            <div class="card card-small" onclick="openReader('craft')">
                <div class="card-bg" style="background-image: url('https://images.unsplash.com/photo-1573408301185-9146fe634ad0?q=80&w=1200')"></div>
                <div class="card-overlay"></div>
                <div class="card-content">
                    <span class="tag">CRAFT</span>
                    <h2 class="title-tr">Gümüşün Sabrı</h2>
                    <h3 class="title-pt">Paciência Eterna</h3>
                </div>
            </div>

            <div class="card card-medium" onclick="openReader('gastronomy')">
                <div class="card-bg" style="background-image: url('https://images.unsplash.com/photo-1555939594-58d7cb561ad1?q=80&w=1200')"></div>
                <div class="card-overlay"></div>
                <div class="card-content">
                    <span class="tag">FLAVOR</span>
                    <h2 class="title-tr">İçli Köfte'den Quibe'ye</h2>
                    <h3 class="title-pt">Pontes de Sabor</h3>
                </div>
            </div>

            <div class="card card-medium" onclick="openReader('sinop')">
                <div class="card-bg" style="background-image: url('https://images.unsplash.com/photo-1440778303588-435521a205bc?q=80&w=1200')"></div>
                <div class="card-overlay"></div>
                <div class="card-content">
                    <span class="tag">GEOGRAPHY</span>
                    <h2 class="title-tr">İki Sinop Öyküsü</h2>
                    <h3 class="title-pt">Espelhos Distantes</h3>
                </div>
            </div>

        </div>
    </main>

    <div id="reader" onscroll="updateProgress()">
        <button class="close-btn" onclick="closeReader()">✕</button>
        <div id="reader-content"></div>
    </div>

    <footer>MB JOURNAL 2026</footer>

    <script>
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
        });

        const contentData = {
            author: { 
                tr: "İki Kıta, Tek Bir Ruh: Türkiye ve Brezilya Arasındaki Derin Bağlar", 
                pt: "Dois Continentes, Uma Só Alma: Os Laços Profundos entre Turquia e Brasil",
                img: "https://images.unsplash.com/photo-1455390582262-044cdead277a?q=80&w=1600",
                textTr: "Türkiye ve Brezilya, coğrafi olarak birbirlerinden okyanuslar kadar uzak olsalar da, toplumsal hafıza ve yaşam kültürü açısından şaşırtıcı benzerlikler taşır. Bu journal projesinde, Ahmet Çınarbaş’ın gözünden bu benzerlikleri sadece yüzeysel değil, tarihsel ve sosyolojik bir perspektifle ele alıyoruz. İlk ortak paydamız 'Misafirperverlik ve Sofra Kültürü'dür. Mardin’in dar sokaklarında bir yabancıyı evine davet eden samimiyet ile Brezilya’nın 'casa aberta' (açık ev) geleneği, insanın insana duyduğu güvenin ortak bir tezahürüdür. <br><br> İkinci büyük benzerlik ise 'Göç ve Kültürel Hibritleşme' alanında karşımıza çıkar. 19. yüzyılın sonunda Levant bölgesinden Güney Amerika’ya dalga dalga yayılan göçler, Brezilya’nın dokusuna derin bir Ortadoğu estetiği aşılamıştır. Bu durum, sadece gastronomiyi (Quibe örneğinde olduğu gibi) değil, mimariyi ve müziği de etkilemiştir. Mardin’in taş binalarındaki el işçiliği sabrı, Brezilya yerli halklarının doğayla kurduğu zanaat ilişkisinde yankı bulur. Ayrıca, her iki toplumun da kaostan estetik yaratma becerisi, karnaval ve düğün geleneklerinde kendisini gösterir. Acıyı bile bir neşe tınısıyla harmanlayan bu ruh hali, her iki ülkenin de en büyük savunma mekanizmasıdır. Bu analiz, sınırların yapay olduğunu ve insan ruhunun her yerde aynı temel ihtiyaçlar üzerine inşa edildiğini göstermeyi amaçlar.",
                textPt: "Embora a Turquia e o Brasil estejam geograficamente distantes como oceanos, eles carregam semelhanças surpreendentes em termos de memória social e cultura de vida. Neste projeto, através dos olhos de Ahmet Çınarbaş, abordamos essas semelhanças não apenas de forma superficial, mas através de uma perspectiva histórica e sociológica. O primeiro denominador comum é a 'Cultura da Hospitalidade e da Mesa'. A sinceridade de convidar um estranho para entrar em casa nas ruas estreitas de Mardin e a tradição brasileira de 'casa aberta' são manifestações comuns da confiança humana. <br><br> A segunda grande semelhança surge no campo da 'Migração e Hibridismo Cultural'. As ondas migratórias que se espalharam da região do Levante para a América do Sul no final do século XIX infundiram uma estética profunda do Oriente Médio no tecido brasileiro. Isso afetou não apenas a gastronomia (como no caso do Quibe), mas também a arquitetura e a música. A paciência do artesanato manual nos edifícios de pedra de Mardin encontra eco na relação artesanal que os povos indígenas do Brasil estabelecem com a natureza. Além disso, a capacidade de ambas as sociedades de criar estética a partir do caos manifesta-se no carnaval e nas tradições de casamento. Este estado de espírito, que mistura até a dor com um tom de alegria, é o maior mecanismo de defesa de ambos os países. Esta análise visa mostrar que as fronteiras são artificiais e que a alma humana é construída sobre as mesmas necessidades fundamentais em todos os lugares."
            },
            carnaval: { 
                tr: "Rio Karnavalı'nda Mezopotamya İzleri", pt: "Vestígios da Mesopotâmia no Carnaval do Rio",
                img: "https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?q=80&w=1600",
                textTr: "Görsel bir şölenin ötesinde, Rio Karnavalı aslında bir hikaye anlatıcılığı platformudur. Bu yılki tasarımlarda Mardin'in telkari motiflerinin geometrik izdüşümleri podyumda devleşti. Gümüşün ateşteki imtihanı, Rio'nun güneşli atmosferinde metalik kostümlere dönüşerek binlerce yıllık bir geleneği Brezilya'nın kalbine taşıdı. Bu, sanatın evrensel dilinin en somut kanıtıdır.",
                textPt: "Além de um espetáculo visual, o Carnaval do Rio é uma plataforma de narrativa. Nos designs deste ano, as projeções geométricas dos motivos de filigrana de Mardin tornaram-se gigantes na passarela. O teste da prata no fogo transformou-se em figurinos metálicos na atmosfera ensolarada do Rio, levando uma tradição milenar ao coração do Brasil. Esta é a prova mais concreta da linguagem universal da arte."
            },
            craft: { 
                tr: "Zanaatın Ortak Dili: Sabır", pt: "A Linguagem Comum do Ofício: Paciência",
                img: "https://images.unsplash.com/photo-1573408301185-9146fe634ad0?q=80&w=1600",
                textTr: "Mardin'de gümüşü işleyen usta ile Amazon ormanlarında tohumlardan takı yapan yerli halk arasındaki benzerlik 'sabır'dır. Modern dünyanın hızına inat, her iki coğrafyada da el emeği kutsaldır. Gümüşün tellerle örülmesi ile tohumların iplikle buluşması, insan elinin doğaya bıraktığı en zarif imzadır.",
                textPt: "A semelhança entre o mestre que trabalha a prata em Mardin e os povos indígenas que fazem joias com sementes na floresta amazônica é a 'paciência'. Contra a velocidade do mundo moderno, o trabalho manual é sagrado em ambas as geografias. O tecer da prata com fios e o encontro das sementes com o fio é a assinatura mais elegante que a mão humana deixa na natureza."
            },
            gastronomy: { 
                tr: "İçli Köfte'nin Okyanus Ötesi Yolculuğu", pt: "A Jornada Transatlántica do Quibe",
                img: "https://images.unsplash.com/photo-1555939594-58d7cb561ad1?q=80&w=1600",
                textTr: "Mardin'in Irok'u (içli köfte), 19. yüzyılda gemilerle Brezilya'ya ulaştı ve orada 'Quibe' ismini aldı. Bugün Brezilya mutfağının en temel parçalarından biri olan bu lezzet, göçün ve kültürel etkileşimin en lezzetli mirasıdır. Bir lokmada hem Mezopotamya'nın baharatlarını hem de Brezilya'nın bereketli topraklarını hissedebilirsiniz.",
                textPt: "O Irok de Mardin (quibe) chegou ao Brasil em navios no século XIX e ali recebeu o nome de 'Quibe'. Este sabor, que é hoje uma das partes mais fundamentais da culinária brasileira, é o legado mais saboroso da migração e da interação cultural. Em uma mordida, você pode sentir tanto as especiarias da Mesopotâmia quanto as terras férteis do Brasil."
            },
            sinop: { 
                tr: "İki Sinop: Haritaları Aşan Benzerlik", pt: "Duas Sinops: Uma Semelhança Além dos Mapas",
                img: "https://images.unsplash.com/photo-1440778303588-435521a205bc?q=80&w=1600",
                textTr: "Türkiye'nin kuzeyindeki Sinop ile Brezilya'daki Sinop şehirleri arasındaki isim benzerliği, aslında bir kader ortaklığıdır. İkisi de bulundukları bölgelerin direnç noktalarıdır. Biri Karadeniz'in mavisiyle, diğeri Amazon'un yeşiliyle sarmalanmıştır. Bu iki şehir, dünyayı kuzeyden güneye bağlayan gizli bir köprünün ayakları gibidir.",
                textPt: "A semelhança de nome entre a cidade de Sinop no norte da Turquia e a cidade de Sinop no Brasil é, na verdade, uma parceria de destino. Ambas são pontos de resistência em suas regiões. Uma está envolta no azul do Mar Negro, a outra no verde da Amazônia. Estas duas cidades são como os pilares de uma ponte oculta que liga o mundo de norte a sul."
            }
        };

        function openReader(key) {
            const item = contentData[key];
            const modal = document.getElementById('reader');
            const content = document.getElementById('reader-content');
            
            content.innerHTML = `
                <div class="hero-banner"><img src="${item.img}"></div>
                <div class="modal-body">
                    <h1 class="title-tr" style="font-size: 3.5rem; color:var(--accent); text-align:center;">${item.tr}</h1>
                    <h2 class="title-pt" style="font-size: 2rem; margin-bottom: 80px; color:var(--ink); text-align:center;">${item.pt}</h2>
                    <div class="reader-grid">
                        <div class="text-tr">${item.textTr}</div>
                        <div class="text-pt">${item.textPt}</div>
                    </div>
                </div>`;
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
            modal.scrollTop = 0;
            document.getElementById('progress-container').style.display = 'block';
        }

        function closeReader() {
            document.getElementById('reader').style.display = 'none';
            document.body.style.overflow = 'auto';
            document.getElementById('progress-container').style.display = 'none';
        }

        function updateProgress() {
            const modal = document.getElementById('reader');
            const scrolled = (modal.scrollTop / (modal.scrollHeight - modal.clientHeight)) * 100;
            document.getElementById("progress-bar").style.width = scrolled + "%";
        }
    </script>
</body>
</html>
