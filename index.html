<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Cultural Intelligence v11</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #f4ecd8; --card-bg: #fdfbf7; --text: #433422; --accent: #a67c52; --admin-bg: #050505; }
        * { -webkit-font-smoothing: antialiased; box-sizing: border-box; scroll-behavior: smooth; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }
        
        /* Pusula (Sidebar) */
        .compass-sidebar { position: fixed; right: 0; top: 20%; height: 60%; width: 5px; background: var(--accent); opacity: 0.4; transition: 0.5s; z-index: 2000; cursor: pointer; border-radius: 10px 0 0 10px; }
        .compass-sidebar:hover { width: 280px; opacity: 1; background: #1a1a1a; color: white; padding: 30px; box-shadow: -10px 0 50px rgba(0,0,0,0.2); }
        .compass-content { display: none; }
        .compass-sidebar:hover .compass-content { display: block; }

        /* Yazarlar */
        .authors-strip { background: var(--card-bg); padding: 20px 5%; display: flex; gap: 40px; border-bottom: 1px solid rgba(0,0,0,0.05); overflow-x: auto; scrollbar-width: none; }
        .author-item { text-align: center; min-width: 100px; transition: 0.3s; }
        .author-item img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); margin-bottom: 10px; }

        /* Haber Kartları */
        .news-feed { min-height: 600px; display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 40px; padding: 50px 5%; }
        .news-card { background: var(--card-bg); border-radius: 35px; overflow: hidden; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        .news-card:hover { transform: translateY(-15px); box-shadow: 0 40px 80px rgba(0,0,0,0.1); }
        
        /* Parallax */
        .parallax-box { height: 450px; overflow: hidden; border-radius: 40px; position: relative; margin: 40px 0; background: #ddd; }
        .parallax-box img { width: 100%; height: 160%; object-fit: cover; position: absolute; top: -30%; transition: 0.1s linear; }

        /* Admin Panel */
        #admin-panel { display: none; background: var(--admin-bg); color: #fff; position: fixed; inset: 0; z-index: 10000; overflow-y: auto; padding: 50px; }
        .input-master { background: #111; border: 1px solid #333; border-radius: 15px; padding: 15px; width: 100%; color: #eee; outline: none; transition: 0.3s; }
        .input-master:focus { border-color: var(--accent); }
        
        .term { border-bottom: 2px dotted var(--accent); cursor: help; font-weight: 700; color: var(--accent); }
    </style>
</head>
<body>

<div class="compass-sidebar">
    <div class="compass-content">
        <h4 class="font-serif text-accent tracking-[5px] text-xs mb-8 uppercase">Dijital Pusula</h4>
        <div id="ui-compass" class="space-y-6 text-[11px] font-bold uppercase tracking-widest text-stone-400">
            </div>
    </div>
</div>

<nav class="flex justify-between items-center px-[5%] py-8 bg-white/50 backdrop-blur-xl sticky top-0 z-[1000]">
    <div class="logo font-serif text-3xl tracking-[8px] font-black uppercase">Lumina</div>
    <div id="ui-wisdom" class="text-[10px] font-black tracking-[4px] uppercase opacity-40 italic"></div>
</nav>

<div id="ui-authors" class="authors-strip"></div>

<main id="ui-news-feed" class="news-feed"></main>

<div id="article-overlay" class="fixed inset-0 bg-[#f4ecd8] hidden z-[5000] overflow-y-auto">
    <div class="sticky top-0 bg-[#f4ecd8]/95 p-6 border-b border-black/5 flex justify-between items-center px-[5%]">
        <div id="ui-article-meta" class="flex items-center gap-6"></div>
        <button onclick="closeArticle()" class="text-2xl opacity-30 hover:opacity-100">✕</button>
    </div>
    <div id="ui-article-body" class="max-w-4xl mx-auto py-24 px-8"></div>
</div>

<footer class="py-20 text-center">
    <button onclick="toggleAdmin()" class="opacity-20 text-[9px] tracking-[8px] font-bold border-b border-black uppercase">CORE SYSTEM V11 | MASTER CONSOLE</button>
</footer>

<div id="admin-panel">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-end mb-16 border-b border-white/10 pb-10">
            <div>
                <h1 class="text-4xl font-serif">MASTER <span class="text-accent">CONSOLE</span></h1>
                <p class="text-[10px] font-black text-stone-500 mt-2 tracking-[5px] uppercase">Kültürel IQ & Arayüz Kontrolörü</p>
            </div>
            <button onclick="toggleAdmin()" class="bg-red-600 px-10 py-3 rounded-full text-[10px] font-black uppercase tracking-widest">Paneli Kapat</button>
        </div>

        <div class="grid grid-cols-12 gap-10">
            <div class="col-span-12 lg:col-span-7 space-y-6">
                <div class="p-8 border border-white/5 rounded-[30px] bg-white/5">
                    <h2 class="text-xs font-black text-accent mb-6 uppercase tracking-widest">İçerik & IQ Tanımı</h2>
                    <div class="space-y-4">
                        <input id="adm-title" placeholder="Makale Başlığı" class="input-master font-serif text-xl">
                        <textarea id="adm-text" placeholder="Hikaye..." class="input-master h-40 resize-none"></textarea>
                        <div class="grid grid-cols-2 gap-4">
                            <input id="adm-img" placeholder="Görsel URL (Parallax)" class="input-master">
                            <input id="adm-dna" type="number" placeholder="DNA Match % (0-100)" class="input-master">
                        </div>
                        <div class="grid grid-cols-3 gap-4">
                            <select id="adm-author" class="input-master"></select>
                            <select id="adm-type" class="input-master">
                                <option>Mistik</option><option>Tarihi</option><option>Modern</option>
                            </select>
                            <button onclick="publishContent()" class="bg-accent text-black font-black uppercase text-[10px] rounded-xl tracking-widest">Yayınla</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-span-12 lg:col-span-5 space-y-8">
                <div class="p-8 border border-white/5 rounded-[30px] bg-white/5">
                    <h2 class="text-xs font-black text-accent mb-6 uppercase tracking-widest">Pusula & Global Veri</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <input id="adm-dist" placeholder="Mesafe (KM)" class="input-master">
                        <input id="adm-m-temp" placeholder="Mardin Derece" class="input-master">
                        <input id="adm-r-temp" placeholder="Rio Derece" class="input-master">
                        <button onclick="saveCompass()" class="bg-stone-800 py-3 rounded-xl font-bold text-[10px] uppercase">Pusulayı Eşitle</button>
                    </div>
                </div>
                <div class="p-8 border border-white/5 rounded-[30px] bg-white/5 text-center">
                    <h3 class="text-[10px] font-black opacity-30 uppercase tracking-[5px]">Sözlük & Bilgelik</h3>
                    <button class="mt-4 text-accent text-xs font-bold border-b border-accent">YÖNETİMİ AÇ</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- VERİ TABANI ---
    let db = JSON.parse(localStorage.getItem('lumina_v11')) || {
        authors: [
            {id: 'a1', name: 'Caner Elmas', img: 'https://i.pravatar.cc/150?u=1'},
            {id: 'a2', name: 'Livia Santos', img: 'https://i.pravatar.cc/150?u=2'}
        ],
        news: [
            {id: 1, aid: 'a1', title: 'Mezopotamya\'nın Altın Kapısı', text: 'Mardin sokaklarında her Abbara bir zaman tünelidir. Taşların fısıltısını duymak için durmanız yeterli.', img: 'https://images.unsplash.com/photo-1582738411706-bfc8e691d1c2?w=800', dna: 92, type: 'Mistik'},
            {id: 2, aid: 'a2', title: 'Rio Karnavalı ve Gelecek', text: 'Amazon ruhu ile modern dünyanın dansı burada başlar. Samba bir ritimden fazlasıdır.', img: 'https://images.unsplash.com/photo-1516026672322-bc52d61a55d5?w=800', dna: 35, type: 'Modern'}
        ],
        compass: { dist: '10.840 KM', mardin: '24°C', rio: '31°C' },
        wisdom: 'Sabır taşın kalbinde, neşe sokağın ritmindedir.'
    };

    function save() { localStorage.setItem('lumina_v11', JSON.stringify(db)); render(); }

    // --- RENDER MOTORU ---
    function render() {
        // Yazarlar
        document.getElementById('ui-authors').innerHTML = db.authors.map(a => `
            <div class="author-item"><img src="${a.img}"><p class="font-black text-[10px] uppercase opacity-60">${a.name}</p></div>
        `).join('');

        // Haberler
        document.getElementById('ui-news-feed').innerHTML = db.news.map(n => `
            <article class="news-card" onclick="openH(${n.id})">
                <img src="${n.img}" class="w-full h-72 object-cover">
                <div class="p-8">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[9px] font-black text-accent uppercase tracking-widest">${n.type}</span>
                        <span class="text-[9px] font-bold opacity-30">DNA %${n.dna}</span>
                    </div>
                    <h2 class="text-xl font-serif mb-4 leading-tight">${n.title}</h2>
                    <p class="text-sm opacity-50 line-clamp-2">${n.text}</p>
                </div>
            </article>
        `).join('');

        // Pusula & Bilgelik
        document.getElementById('ui-compass').innerHTML = `
            <div class="flex justify-between border-b border-white/5 pb-2"><span>Mesafe</span><span class="text-white">${db.compass.dist}</span></div>
            <div class="flex justify-between border-b border-white/5 pb-2"><span>Mardin</span><span class="text-white">${db.compass.mardin}</span></div>
            <div class="flex justify-between border-b border-white/5 pb-2"><span>Rio</span><span class="text-white">${db.compass.rio}</span></div>
        `;
        document.getElementById('ui-wisdom').innerText = db.wisdom;

        // Admin Select
        document.getElementById('adm-author').innerHTML = db.authors.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
    }

    // --- MAKALE & SES ---
    const synth = window.speechSynthesis;
    function openH(id) {
        const h = db.news.find(x => x.id === id);
        const a = db.authors.find(x => x.id === h.aid);
        
        document.getElementById('ui-article-meta').innerHTML = `
            <img src="${a.img}" class="w-12 h-12 rounded-full border border-accent">
            <span class="text-[11px] font-black uppercase tracking-widest">${a.name}</span>
            <div class="flex gap-2">
                <button onclick="speak()" class="text-[9px] font-bold border border-accent px-4 py-1 rounded-full text-accent hover:bg-accent hover:text-white transition">OKU</button>
                <button onclick="stopS()" class="text-[9px] font-bold border border-red-800 px-4 py-1 rounded-full text-red-800 hover:bg-red-800 hover:text-white transition">DUR</button>
            </div>
        `;

        document.getElementById('ui-article-body').innerHTML = `
            <h1 class="text-6xl font-serif mb-12 leading-tight">${h.title}</h1>
            <div class="parallax-box"><img src="${h.img}" id="para-img"></div>
            <div id="p-text" class="text-2xl font-light leading-relaxed text-justify">${h.text}</div>
            <div class="mt-20 p-10 bg-black text-white rounded-[40px] text-center">
                <p class="text-[10px] font-bold uppercase tracking-[5px] text-accent mb-4">Kültürel IQ Analizi</p>
                <h3 class="text-4xl font-serif">%${h.dna} Mardin Mistiği • %${100-h.dna} Rio Modernizmi</h3>
            </div>
        `;

        document.getElementById('article-overlay').style.display = 'block';
        const overlay = document.getElementById('article-overlay');
        overlay.onscroll = () => {
            const img = document.getElementById('para-img');
            if(img) img.style.top = (overlay.scrollTop * 0.15) - 250 + 'px';
        };
    }

    // --- ADMIN FONKSİYONLARI ---
    function publishContent() {
        const n = {
            id: Date.now(),
            aid: document.getElementById('adm-author').value,
            title: document.getElementById('adm-title').value,
            text: document.getElementById('adm-text').value,
            img: document.getElementById('adm-img').value,
            dna: document.getElementById('adm-dna').value,
            type: document.getElementById('adm-type').value
        };
        db.news.unshift(n); save();
    }

    function saveCompass() {
        db.compass = {
            dist: document.getElementById('adm-dist').value,
            mardin: document.getElementById('adm-m-temp').value,
            rio: document.getElementById('adm-r-temp').value
        };
        save();
    }

    function toggleAdmin() { const p = document.getElementById('admin-panel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; }
    function speak() { synth.cancel(); const u = new SpeechSynthesisUtterance(document.getElementById('p-text').innerText); u.lang='tr-TR'; synth.speak(u); }
    function stopS() { synth.cancel(); }
    function closeArticle() { stopS(); document.getElementById('article-overlay').style.display = 'none'; }

    window.onload = render;
</script>
</body>
</html>
