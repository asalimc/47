<style>
    /* Detay Görünümü İçin */
    #view-detail { background: white; }
    .reading-content { line-height: 1.8; color: #334155; }
    .stat-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); }
    .control-btn { @apply p-2 hover:bg-slate-100 rounded-lg transition-all; }
</style>

<main id="view-detail" class="view-node max-w-4xl mx-auto px-4 py-10">
    <button onclick="router('home')" class="mb-8 flex items-center gap-2 text-xs font-black uppercase tracking-widest text-slate-400 hover:text-orange-500">
        <i class="fa-solid fa-arrow-left"></i> Geri Dön
    </button>
    
    <div id="detail-content">
        </div>
</main>

<script>
    // --- SESLİ OKUMA SİSTEMİ ---
    let speech = new SpeechSynthesisUtterance();
    let isReading = false;

    function toggleSpeech(text) {
        if (isReading) {
            window.speechSynthesis.cancel();
            isReading = false;
            document.getElementById('speak-btn').innerHTML = '<i class="fa-solid fa-play mr-2"></i> Dinle';
        } else {
            speech.text = text;
            speech.lang = 'tr-TR';
            speech.rate = 1;
            window.speechSynthesis.speak(speech);
            isReading = true;
            document.getElementById('speak-btn').innerHTML = '<i class="fa-solid fa-stop mr-2"></i> Durdur';
            speech.onend = () => { isReading = false; document.getElementById('speak-btn').innerHTML = '<i class="fa-solid fa-play mr-2"></i> Dinle'; };
        }
    }

    // --- METİN BOYUTU SİSTEMİ ---
    let currentFontSize = 18;
    function changeFontSize(delta) {
        currentFontSize += delta;
        document.getElementById('news-body').style.fontSize = currentFontSize + 'px';
    }

    // --- DETAY SAYFASI RENDER ---
    function openNews(id) {
        const h = db.haberler.find(x => x.id === id);
        const y = db.yazarlar.find(x => x.id === h.yid);
        const c = db.cats.find(x => x.id === h.cid);
        
        router('detail');
        
        document.getElementById('detail-content').innerHTML = `
            <div class="mb-10 text-center">
                <span class="text-orange-500 font-black text-xs uppercase tracking-widest">${c ? c.name : ''}</span>
                <h1 class="text-4xl md:text-6xl font-black mt-4 mb-6 leading-tight">${h.title}</h1>
                <div class="flex items-center justify-center gap-6 border-y py-6">
                    <div class="flex items-center gap-3">
                        <img src="${y.img}" class="w-12 h-12 rounded-full object-cover ring-2 ring-orange-500">
                        <div class="text-left">
                            <p class="font-black text-sm uppercase">${y.isim}</p>
                            <p class="text-[10px] text-slate-400 font-bold">${y.unvan}</p>
                        </div>
                    </div>
                    <div class="h-10 w-[1px] bg-slate-200"></div>
                    <div class="flex flex-col items-start">
                        <p class="text-[10px] font-black text-slate-400 uppercase">Yayın Tarihi</p>
                        <p class="text-xs font-bold">${h.date}</p>
                    </div>
                </div>
            </div>

            <div class="flex justify-between items-center mb-8 sticky top-24 bg-white/80 backdrop-blur py-4 z-50 px-4 rounded-2xl border">
                <div class="flex gap-2">
                    <button id="speak-btn" onclick="toggleSpeech('${h.text.replace(/'/g, "\\'")}')" class="bg-black text-white px-6 py-2 rounded-xl text-[10px] font-black uppercase flex items-center transition hover:bg-orange-500">
                        <i class="fa-solid fa-play mr-2"></i> Dinle
                    </button>
                </div>
                <div class="flex items-center gap-4">
                    <span class="text-[10px] font-black text-slate-400">METİN BOYUTU</span>
                    <button onclick="changeFontSize(-2)" class="control-btn font-bold">A-</button>
                    <button onclick="changeFontSize(2)" class="control-btn font-bold">A+</button>
                </div>
            </div>

            <img src="${h.img}" class="w-full h-[500px] object-cover rounded-[3rem] mb-12 shadow-2xl">
            
            <div id="news-body" class="reading-content text-lg leading-relaxed space-y-6 mb-20">
                ${h.text.replace(/\n/g, '<br>')}
            </div>
        `;
    }

    // --- GELİŞMİŞ ADMİN DASHBOARD (Admin görünümünü güncelle) ---
    function renderAdmin() {
        const list = document.getElementById('adm-list');
        list.innerHTML = '';
        
        // İstatistik Paneli
        if(list.innerHTML === '') {
            const stats = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                    <div class="stat-card p-8 rounded-[2rem]">
                        <p class="text-slate-500 text-[10px] font-black uppercase">Toplam Haber</p>
                        <h4 class="text-4xl font-black meridian-font text-orange-500 mt-2">${db.haberler.length}</h4>
                    </div>
                    <div class="stat-card p-8 rounded-[2rem]">
                        <p class="text-slate-500 text-[10px] font-black uppercase">Aktif Yazar</p>
                        <h4 class="text-4xl font-black meridian-font text-orange-500 mt-2">${db.yazarlar.length}</h4>
                    </div>
                    <div class="stat-card p-8 rounded-[2rem]">
                        <p class="text-slate-500 text-[10px] font-black uppercase">Kategoriler</p>
                        <h4 class="text-4xl font-black meridian-font text-orange-500 mt-2">${db.cats.length}</h4>
                    </div>
                </div>
            `;
            list.insertAdjacentHTML('beforebegin', ''); // Eğer istersen başlığın hemen altına ekleyebilirsin
        }

        let data = activeTab === 'cat' ? db.cats : (activeTab === 'haber' ? db.haberler : db.yazarlar);

        data.forEach(item => {
            list.innerHTML += `
                <div class="bg-white/5 border border-white/10 p-6 rounded-[2rem] flex items-center justify-between group hover:bg-white/10 transition">
                    <div class="flex items-center gap-6">
                        ${item.img ? `<img src="${item.img}" class="w-16 h-16 rounded-2xl object-cover shadow-lg">` : '<div class="w-16 h-16 bg-orange-500 rounded-2xl flex items-center justify-center text-black font-bold text-2xl">#</div>'}
                        <div>
                            <p class="text-xs text-orange-500 font-black uppercase mb-1">${activeTab}</p>
                            <p class="font-bold text-lg">${item.name || item.title || item.isim}</p>
                        </div>
                    </div>
                    <div class="flex gap-4">
                        <button onclick="deleteItem('${item.id}')" class="w-12 h-12 rounded-full border border-red-500/20 text-red-500 flex items-center justify-center hover:bg-red-500 hover:text-white transition">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                </div>`;
        });
    }

    // Portal Haber Kartlarını Güncelle (Tıklama ekle)
    function filterByCat(cid) {
        const flow = document.getElementById('news-flow');
        flow.innerHTML = '';
        let filtered = cid === 'all' ? db.haberler : db.haberler.filter(h => h.cid === cid);

        filtered.forEach(h => {
            const yazar = db.yazarlar.find(y => y.id === h.yid);
            const cat = db.cats.find(c => c.id === h.cid);
            flow.innerHTML += `
                <div onclick="openNews('${h.id}')" class="glass-card p-6 flex flex-col group cursor-pointer">
                    <div class="overflow-hidden rounded-[1.5rem] mb-6">
                        <img src="${h.img}" class="w-full h-52 object-cover group-hover:scale-110 transition duration-500">
                    </div>
                    <span class="text-[9px] font-black uppercase text-orange-500 mb-2">${cat ? cat.name : ''}</span>
                    <h3 class="text-xl font-black mb-4 leading-tight group-hover:text-orange-500 transition">${h.title}</h3>
                    <div class="mt-auto flex items-center justify-between border-t pt-4">
                        <div class="flex items-center gap-2">
                            <img src="${yazar.img}" class="w-6 h-6 rounded-full object-cover">
                            <span class="text-[10px] font-bold text-slate-500">${yazar.isim}</span>
                        </div>
                        <span class="text-[9px] text-slate-400 font-bold">${h.date}</span>
                    </div>
                </div>`;
        });
    }
</script>
