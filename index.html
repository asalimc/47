<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSP Global | Premium Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-main: #f3f4f9; 
            --card-white: #ffffff;
            --msp-blue: #3b82f6;
            --text-dark: #1e293b;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-dark); }
        .msp-title { font-family: 'Playfair Display', serif; }
        
        /* Görseldeki Soft Kavisli Yapı */
        .glass-card { 
            background: var(--card-white); 
            border-radius: 3.5rem; 
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.8);
        }

        /* Yazar Kartları (2. Resimdeki Stil) */
        .author-slot {
            background: #f8fafc;
            border-radius: 2.5rem;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .author-slot:hover {
            transform: translateY(-5px);
            background: white;
            box-shadow: 0 15px 30px rgba(0,0,0,0.05);
            border-color: #e2e8f0;
        }
        .author-img {
            width: 65px;
            height: 65px;
            border-radius: 1.8rem;
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Haber Görsel Kilidi */
        .news-img {
            width: 100%;
            aspect-ratio: 16/10;
            object-fit: cover;
            border-radius: 3rem;
        }

        /* Admin & View Switch */
        .view-node { display: none; animation: fadeIn 0.5s ease; }
        .active-view { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <nav class="h-24 flex items-center bg-white/50 backdrop-blur-md sticky top-0 z-[100]">
        <div class="container mx-auto px-8 flex justify-between items-center">
            <div onclick="router('home')" class="cursor-pointer">
                <h1 class="text-2xl font-black tracking-tighter italic uppercase text-slate-800">MSP<span class="text-blue-600">.</span>GLOBAL</h1>
                <p class="text-[8px] font-bold tracking-[0.4em] text-slate-400 -mt-1 uppercase">Local Media Integration</p>
            </div>
            <div class="flex items-center gap-6">
                <button onclick="router('home')" class="text-[10px] font-bold uppercase tracking-widest text-slate-500 hover:text-blue-600 transition">Ana Sayfa</button>
                <button onclick="router('admin')" class="bg-slate-900 text-white text-[10px] font-black px-8 py-4 rounded-full shadow-2xl hover:bg-blue-600 transition uppercase tracking-widest">Yönetim Paneli</button>
            </div>
        </div>
    </nav>

    <main id="view-home" class="view-node active-view container mx-auto px-6 py-10">
        <div class="grid grid-cols-12 gap-10">
            
            <div class="col-span-12 lg:col-span-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                    <div class="space-y-8">
                        <div class="flex items-center gap-3 ml-4">
                            <span class="w-1.5 h-6 bg-amber-500 rounded-full"></span>
                            <h2 class="text-xs font-black uppercase tracking-widest text-slate-400">Mardin Flow</h2>
                        </div>
                        <div id="mardin-list" class="space-y-10"></div>
                    </div>
                    <div class="space-y-8">
                        <div class="flex items-center gap-3 ml-4">
                            <span class="w-1.5 h-6 bg-emerald-500 rounded-full"></span>
                            <h2 class="text-xs font-black uppercase tracking-widest text-slate-400">Brazil Flow</h2>
                        </div>
                        <div id="brazil-list" class="space-y-10"></div>
                    </div>
                </div>
            </div>

            <aside class="col-span-12 lg:col-span-4 space-y-10">
                <div class="glass-card p-10">
                    <div class="flex items-center gap-3 mb-10">
                        <span class="w-1.5 h-6 bg-blue-600 rounded-full"></span>
                        <h3 class="text-xs font-black uppercase tracking-[0.2em] text-slate-800">KÖŞE YAZARLARI</h3>
                    </div>
                    <div id="author-list" class="space-y-4">
                        </div>
                </div>

                <div id="ad-area" class="relative group cursor-pointer overflow-hidden rounded-[4rem] shadow-2xl">
                    </div>
            </aside>
        </div>
    </main>

    <main id="view-detail" class="view-node container mx-auto px-6 py-16 max-w-4xl">
        <button onclick="router('home')" class="mb-12 text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-blue-600 flex items-center gap-2">
            <i class="fas fa-chevron-left"></i> Geri Dön
        </button>
        <div id="detail-box"></div>
    </main>

    <main id="view-admin" class="view-node bg-white min-h-screen">
        <div class="flex flex-col lg:flex-row min-h-screen">
            <div class="w-full lg:w-80 bg-slate-50 p-10 border-r flex flex-col gap-3">
                <h4 class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-6">Veri Merkezi</h4>
                <button onclick="setMod('haber')" id="b-haber" class="text-left p-5 rounded-3xl font-bold text-sm transition uppercase">Haberler</button>
                <button onclick="setMod('yazar')" id="b-yazar" class="text-left p-5 rounded-3xl font-bold text-sm transition uppercase">Yazarlar</button>
                <button onclick="setMod('reklam')" id="b-reklam" class="text-left p-5 rounded-3xl font-bold text-sm transition uppercase">Reklamlar</button>
                <button onclick="router('home')" class="mt-auto bg-red-50 text-red-600 p-5 rounded-3xl font-black text-[10px] uppercase">Güvenli Çıkış</button>
            </div>
            <div class="flex-1 p-12">
                <div class="flex justify-between items-center mb-12">
                    <h2 id="adm-title" class="text-4xl font-black italic">Modül</h2>
                    <button onclick="openModal()" class="bg-blue-600 text-white px-10 py-5 rounded-full font-black text-xs shadow-xl shadow-blue-200">YENİ EKLE</button>
                </div>
                <div class="bg-slate-50 rounded-[3rem] p-4"><table class="w-full text-left"><tbody id="adm-table"></tbody></table></div>
            </div>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 z-[200] bg-slate-900/40 backdrop-blur-xl flex items-center justify-center p-6 hidden">
        <div class="bg-white w-full max-w-xl rounded-[4rem] p-12 shadow-2xl relative overflow-y-auto max-h-[90vh]">
            <h3 class="text-2xl font-black italic mb-8">İçerik Editörü</h3>
            <div class="space-y-4">
                <img id="prev" src="" class="w-full h-44 object-cover rounded-[2.5rem] hidden shadow-inner">
                <input type="file" onchange="encode(event)" class="w-full p-6 bg-slate-50 rounded-3xl border-2 border-dashed text-xs font-bold uppercase">
                <select id="in-loc" class="w-full p-5 bg-slate-100 rounded-3xl font-bold text-xs outline-none">
                    <option value="Mardin">Mardin</option>
                    <option value="Brezilya">Brezilya</option>
                </select>
                <input id="in-title" type="text" placeholder="Başlık / İsim" class="w-full p-6 bg-slate-100 rounded-3xl font-bold outline-none border-none">
                <textarea id="in-text" placeholder="Metin içeriği..." class="w-full p-6 bg-slate-100 rounded-3xl h-40 outline-none border-none"></textarea>
                <input id="in-sub" type="text" placeholder="Yazar Branşı veya Kategori" class="w-full p-6 bg-slate-100 rounded-3xl text-xs font-bold outline-none border-none">
            </div>
            <div class="mt-10 flex gap-4">
                <button onclick="closeModal()" class="flex-1 font-bold text-slate-400">Vazgeç</button>
                <button onclick="save()" class="flex-[2] bg-blue-600 text-white p-6 rounded-3xl font-black uppercase text-xs shadow-lg">Değişiklikleri Kaydet</button>
            </div>
        </div>
    </div>

    <script>
        // DATA
        let db = JSON.parse(localStorage.getItem('msp_final_v1')) || { haber: [], yazar: [], reklam: [] };
        let current = 'haber';
        let editId = null;
        let bufferImg = "";

        function router(v) {
            document.querySelectorAll('.view-node').forEach(n => n.classList.remove('active-view'));
            document.getElementById('view-'+v).classList.add('active-view');
            if(v==='home') renderHome();
            if(v==='admin') renderAdmin();
            window.scrollTo(0,0);
        }

        function encode(e) {
            const f = e.target.files[0];
            const r = new FileReader();
            r.onloadend = () => { bufferImg = r.result; document.getElementById('prev').src = bufferImg; document.getElementById('prev').classList.remove('hidden'); };
            if(f) r.readAsDataURL(f);
        }

        // ADMIN
        function setMod(m) {
            current = m;
            document.querySelectorAll('aside button, .w-80 button').forEach(b => b.classList.remove('bg-blue-600', 'text-white'));
            document.getElementById('b-'+m).classList.add('bg-blue-600', 'text-white');
            document.getElementById('adm-title').innerText = m.toUpperCase();
            renderAdmin();
        }

        function renderAdmin() {
            const t = document.getElementById('adm-table'); t.innerHTML = '';
            db[current].forEach(i => {
                t.innerHTML += `
                    <tr class="border-b border-white/50">
                        <td class="p-6 w-24"><img src="${i.img}" class="w-14 h-14 rounded-2xl object-cover shadow-md"></td>
                        <td class="p-6 font-bold text-slate-700">${i.title}</td>
                        <td class="p-6 text-right">
                            <button onclick="editItem('${i.id}')" class="text-blue-500 mr-4"><i class="fas fa-pen"></i></button>
                            <button onclick="delItem('${i.id}')" class="text-red-400"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
            });
        }

        function save() {
            const obj = {
                id: editId || 'ID'+Date.now(),
                title: document.getElementById('in-title').value,
                text: document.getElementById('in-text').value,
                sub: document.getElementById('in-sub').value,
                loc: document.getElementById('in-loc').value,
                img: bufferImg || 'https://via.placeholder.com/800'
            };
            if(editId) {
                const idx = db[current].findIndex(x => x.id === editId);
                db[current][idx] = obj;
            } else { db[current].unshift(obj); }
            localStorage.setItem('msp_final_v1', JSON.stringify(db));
            closeModal(); renderAdmin();
        }

        function delItem(id) { if(confirm('Silinsin mi?')) { db[current] = db[current].filter(x => x.id !== id); localStorage.setItem('msp_final_v1', JSON.stringify(db)); renderAdmin(); } }

        function editItem(id) {
            editId = id; const itm = db[current].find(x => x.id === id);
            document.getElementById('in-title').value = itm.title;
            document.getElementById('in-text').value = itm.text;
            document.getElementById('in-sub').value = itm.sub;
            document.getElementById('in-loc').value = itm.loc || 'Mardin';
            bufferImg = itm.img; document.getElementById('prev').src = itm.img; document.getElementById('prev').classList.remove('hidden');
            document.getElementById('modal').classList.remove('hidden');
        }

        // HOME
        function renderHome() {
            const mBox = document.getElementById('mardin-list');
            const bBox = document.getElementById('brazil-list');
            const aBox = document.getElementById('author-list');
            const rBox = document.getElementById('ad-area');

            mBox.innerHTML = ''; bBox.innerHTML = ''; aBox.innerHTML = '';

            db.haber.forEach(h => {
                const card = `
                <div onclick="openDet('haber','${h.id}')" class="glass-card p-8 group cursor-pointer transition-all hover:shadow-2xl">
                    <img src="${h.img}" class="news-img mb-8 group-hover:scale-[0.98] transition">
                    <h3 class="msp-title text-2xl font-black mb-4 leading-tight">${h.title}</h3>
                    <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">${h.sub}</p>
                </div>`;
                if(h.loc === 'Mardin') mBox.innerHTML += card; else bBox.innerHTML += card;
            });

            db.yazar.forEach(y => {
                aBox.innerHTML += `
                <div onclick="openDet('yazar','${y.id}')" class="author-slot">
                    <img src="${y.img}" class="author-img">
                    <div>
                        <h4 class="text-[11px] font-black uppercase tracking-wider text-slate-800">${y.title}</h4>
                        <p class="text-[9px] font-bold text-blue-500 uppercase mt-1 tracking-widest">${y.sub}</p>
                    </div>
                </div>`;
            });

            if(db.reklam.length > 0) {
                const r = db.reklam[0];
                rBox.innerHTML = `
                <img src="${r.img}" class="w-full h-[500px] object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-slate-900/90 via-transparent p-12 flex flex-col justify-end text-white">
                    <p class="text-[9px] font-black uppercase tracking-[0.3em] mb-4 opacity-60 italic">Sponsorlu İçerik</p>
                    <h4 class="msp-title text-4xl mb-6">${r.title}</h4>
                    <button class="bg-white text-slate-900 py-5 rounded-3xl font-black text-xs uppercase tracking-widest">Keşfet</button>
                </div>`;
            }
        }

        function openDet(type, id) {
            const i = db[type].find(x => x.id === id);
            const box = document.getElementById('detail-box');
            if(type === 'haber') {
                box.innerHTML = `<h1 class="msp-title text-6xl font-black mb-10 leading-tight">${i.title}</h1>
                                <img src="${i.img}" class="w-full rounded-[4rem] shadow-2xl mb-12 border-8 border-white">
                                <div class="text-xl leading-relaxed text-slate-600 space-y-6">${i.text}</div>`;
            } else {
                box.innerHTML = `<div class="flex flex-col md:flex-row gap-16 items-center">
                                    <img src="${i.img}" class="w-80 h-80 rounded-[4rem] object-cover shadow-2xl">
                                    <div>
                                        <h1 class="msp-title text-5xl font-black mb-4">${i.title}</h1>
                                        <p class="text-blue-600 font-black uppercase tracking-[0.3em] text-sm mb-10">${i.sub}</p>
                                        <div class="text-xl text-slate-600 leading-relaxed italic border-l-4 border-slate-200 pl-8">${i.text}</div>
                                    </div>
                                </div>`;
            }
            router('detail');
        }

        function openModal() { editId = null; bufferImg = ""; document.getElementById('prev').classList.add('hidden'); document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        window.onload = () => { renderHome(); setMod('haber'); };
    </script>
</body>
</html>
