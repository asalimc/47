<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARDIN & BRAZIL | ASC 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;1,600&family=Montserrat:wght@300;600;900&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    <style>
        :root { --mardin: #D4A373; --brazil: #064E3B; --dark: #0a0a0a; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f8f8fa; color: var(--dark); font-family: 'Montserrat', sans-serif; line-height: 1.5; overflow-x: hidden; }

        /* HEADER */
        header { padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Playfair Display'; font-size: 2.2rem; text-decoration: none; color: inherit; font-weight: 900; }
        .logo span { color: var(--brazil); }
        .profile-area { display: flex; align-items: center; gap: 12px; background: white; padding: 5px 15px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s; }
        .profile-area:hover { transform: scale(1.05); }

        /* GRID SYSTEM */
        .container { padding: 20px 5%; display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; max-width: 1600px; margin: 0 auto; }

        /* LEFT HERO */
        .hero { grid-column: span 8; height: 600px; border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        .hero img { width: 100%; height: 100%; object-fit: cover; }
        .hero-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 40px; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); color: white; }

        /* RIGHT PANEL */
        .side-stack { grid-column: span 4; display: grid; grid-template-rows: repeat(2, 1fr); gap: 20px; }
        .card { background: white; border-radius: 35px; padding: 30px; display: flex; flex-direction: column; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.02); }
        .card-tag { font-size: 9px; font-weight: 900; color: var(--mardin); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }

        /* VIDEO SECTION */
        .video-container { grid-column: span 12; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .video-card { height: 300px; border-radius: 35px; overflow: hidden; position: relative; background: #000; }
        .video-card video { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }

        /* FOOTER */
        footer { background: white; padding: 60px 5%; margin-top: 50px; border-top: 1px solid #eee; display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; }
        .footer-col h4 { font-size: 10px; font-weight: 900; letter-spacing: 2px; margin-bottom: 20px; color: var(--mardin); }
        .footer-col p { font-size: 12px; color: #666; }

        /* MODAL (YAZAR PANELİ) */
        .modal { position: fixed; inset: 0; background: white; z-index: 2000; display: none; overflow-y: auto; padding: 5%; }
        .btn-close { position: absolute; top: 30px; right: 5%; background: var(--dark); color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-size: 10px; font-weight: 900; }

        /* SMART BUTTONS */
        .btn-speak { background: var(--brazil); color: white; border: none; padding: 8px 20px; border-radius: 50px; font-size: 9px; font-weight: 900; cursor: pointer; margin-top: 15px; }

        @media (max-width: 1024px) { .hero, .side-stack, .video-container { grid-column: span 12; } .video-container { grid-template-columns: 1fr; } footer { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">MARDIN<span>BRAZIL</span></a>
        <div class="profile-area" onclick="openAuthor()">
            <img src="https://pbs.twimg.com/media/GifApT2XEAAqees.jpg" style="width:30px; height:30px; border-radius:50%; object-fit:cover;">
            <span id="nav-portfolio" style="font-size: 10px; font-weight: 900;">AC PORTFOLIO</span>
        </div>
    </header>

    <div class="container">
        <div class="hero">
            <img src="https://pbs.twimg.com/media/GIlW38KWEAALcYB?format=jpg&name=large">
            <div class="hero-info">
                <span id="tag-exclusive" style="background:var(--brazil); padding:4px 12px; border-radius:20px; font-size:8px; font-weight:900;"></span>
                <h2 id="main-title" style="font-family:'Playfair Display'; font-size: 2.5rem; margin: 10px 0;"></h2>
                <button class="btn-speak" onclick="toggleAudio()">🔊 <span id="btn-text"></span></button>
            </div>
        </div>

        <div class="side-stack">
            <div class="card">
                <span id="tag-news" class="card-tag"></span>
                <div id="news-content" style="font-family:'Lora'; font-size: 0.9rem;"></div>
            </div>
            <div class="card" style="background:var(--brazil); color:white;">
                <span id="tag-event" class="card-tag" style="color:white; opacity:0.6;"></span>
                <div id="event-content" style="font-weight:600;"></div>
            </div>
        </div>

        <div class="video-container">
            <div class="video-card">
                <div style="position:absolute; bottom:20px; left:20px; color:white; z-index:2; font-size:10px; font-weight:900;">MARDIN DOCUMENTARY</div>
                <video muted loop autoplay><source src="https://assets.mixkit.co/videos/preview/mixkit-flying-over-a-golden-field-of-wheat-4100-large.mp4" type="video/mp4"></video>
            </div>
            <div class="video-card">
                <div style="position:absolute; bottom:20px; left:20px; color:white; z-index:2; font-size:10px; font-weight:900;">AMAZON EXPEDITION</div>
                <video muted loop autoplay><source src="https://assets.mixkit.co/videos/preview/mixkit-forest-stream-in-the-sunlight-401-large.mp4" type="video/mp4"></video>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-col">
            <h4 id="f-about-tag"></h4>
            <p id="f-about-desc"></p>
        </div>
        <div class="footer-col">
            <h4 id="f-contact-tag"></h4>
            <p>info@asc2026.com<br>Mardin / Rio de Janeiro</p>
        </div>
        <div class="footer-col">
            <h4 id="f-legal-tag"></h4>
            <p>© 2026 MARDIN BRAZIL ASC. All Rights Reserved.</p>
        </div>
    </footer>

    <div id="authorModal" class="modal">
        <button class="btn-close" onclick="closeAuthor()">CLOSE // KAPAT</button>
        <div style="max-width:800px; margin: 80px auto; text-align: center;">
            <img src="https://pbs.twimg.com/media/GifApT2XEAAqees.jpg" style="width:150px; height:150px; border-radius:50%; margin-bottom:30px;">
            <h1 style="font-family:'Playfair Display'; font-size: 3rem;">Ahmet Çınarbaş</h1>
            <p id="author-bio" style="font-family:'Lora'; font-size: 1.4rem; line-height: 1.8; margin-top: 30px;"></p>
        </div>
    </div>

    <script>
        const translations = {
            tr: {
                portfolio: "AC PORTFOLYO",
                exclusive: "ÖZEL RÖPORTAJ",
                title: "Taşın Hafızası ve Ormanın Kalbi",
                btnListen: "DİNLE", btnStop: "DURDUR",
                newsTag: "GÜNCEL", news: "Mardin 2026 hazırlıkları başladı. Taş evlerde dijital sanat yükseliyor.",
                eventTag: "ETKİNLİK", event: "14 Mart: Mezopotamya Tasarım Zirvesi",
                fAbout: "HAKKIMIZDA", fAboutDesc: "Mardin ve Brezilya arasındaki kültürel ve dijital köprüyü kuran resmi platform.",
                fContact: "İLETİŞİM", fLegal: "YASAL",
                bio: "Küratör olarak amacım, Mezopotamya'nın binlerce yıllık taş hafızası ile Amazon'un hayat dolu orman ritmini dijital bir düzlemde birleştirmektir. Mardin'in sarı kalker taşları bir hikaye anlatırken, Brezilya'nın yeşil kalbi buna cevap verir."
            },
            pt: {
                portfolio: "AC PORTFÓLIO",
                exclusive: "ENTREVISTA EXCLUSIVA",
                title: "A Memória da Pedra e o Coração da Floresta",
                btnListen: "OUVIR", btnStop: "PARAR",
                newsTag: "NOTÍCIAS", news: "As preparações para Mardin 2026 começaram. A arte digital sobe nas casas de pedra.",
                eventTag: "EVENTO", event: "14 de Março: Cúpula de Design da Mesopotâmia",
                fAbout: "SOBRE NÓS", fAboutDesc: "A plataforma oficial que constrói a ponte cultural e digital entre Mardin e o Brasil.",
                fContact: "CONTATO", fLegal: "LEGAL",
                bio: "Como curador, meu objetivo é unir a memória milenar de pedra da Mesopotâmia com o ritmo vibrante da Amazônia em um plano digital."
            }
        };

        const userLang = navigator.language.startsWith('pt') ? 'pt' : 'tr';
        const d = translations[userLang];

        function init() {
            document.getElementById('nav-portfolio').innerText = d.portfolio;
            document.getElementById('tag-exclusive').innerText = d.exclusive;
            document.getElementById('main-title').innerText = d.title;
            document.getElementById('btn-text').innerText = d.btnListen;
            document.getElementById('tag-news').innerText = d.newsTag;
            document.getElementById('news-content').innerText = d.news;
            document.getElementById('tag-event').innerText = d.eventTag;
            document.getElementById('event-content').innerText = d.event;
            document.getElementById('f-about-tag').innerText = d.fAbout;
            document.getElementById('f-about-desc').innerText = d.fAboutDesc;
            document.getElementById('f-contact-tag').innerText = d.fContact;
            document.getElementById('f-legal-tag').innerText = d.fLegal;
            document.getElementById('author-bio').innerText = d.bio;
        }

        function openAuthor() { document.getElementById('authorModal').style.display = 'block'; }
        function closeAuthor() { document.getElementById('authorModal').style.display = 'none'; }

        let isSpeaking = false;
        function toggleAudio() {
            if (isSpeaking) { window.speechSynthesis.cancel(); isSpeaking = false; document.getElementById('btn-text').innerText = d.btnListen; }
            else {
                const utterance = new SpeechSynthesisUtterance(d.bio);
                utterance.lang = userLang === 'pt' ? 'pt-BR' : 'tr-TR';
                utterance.onend = () => { isSpeaking = false; document.getElementById('btn-text').innerText = d.btnListen; };
                window.speechSynthesis.speak(utterance);
                isSpeaking = true; document.getElementById('btn-text').innerText = d.btnStop;
            }
        }
        window.onload = init;
    </script>
</body>
</html>
