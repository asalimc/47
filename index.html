<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERIDIAN GLOBAL | Author Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --m-orange: #f59e0b; --m-dark: #0f172a; --gold: linear-gradient(45deg, #d4af37, #f7e7ce, #b8860b); }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: var(--m-dark); }
        .meridian-font { font-family: 'Orbitron', sans-serif; }
        
        /* Header Menüsündeki Altın Daireli Yazarlar (unnamed.jpg Stili) */
        .header-author-circle {
            width: 55px; height: 55px;
            padding: 3px;
            background: var(--gold);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .header-author-circle:hover { transform: scale(1.1); }
        .header-author-circle img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid black;
        }

        .view-node { display: none; animation: fadeIn 0.4s ease; }
        .active-view { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .glass-card { background: white; border-radius: 2.5rem; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div class="bg-[#f59e0b] h-12 flex items-center justify-center shadow-md overflow-hidden">
        <div class="flex items-center gap-8 animate-marquee whitespace-nowrap">
            <span class="meridian-font text-xs font-black tracking-[0.3em]">MERIDIAN PORTAL</span>
        </div>
    </div>

    <header class="bg-white border-b sticky top-0 z-[100] shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-4">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div onclick="router('home')" class="cursor-pointer flex items-center gap-3">
                    <div class="bg-black text-white w-10 h-10 flex items-center justify-center rounded-xl meridian-font text-xl">M</div>
                    <h1 class="font-black text-2xl">MSP<span class="text-orange-500">.</span>GLOBAL</h1>
                </div>
                
                <div id="header-authors-list" class="flex gap-4 overflow-x-auto pb-2 no-scrollbar">
                    </div>

                <div class="flex gap-4">
                    <button onclick="router('admin')" class="bg-black text-white px-6 py-3 rounded-full text-[10px] font-black uppercase hover:bg-orange-500 transition">DashBoard</button>
                </div>
            </div>
        </div>
    </header>

    <main id="view-home" class="view-node active-view max-w-7xl mx-auto px-6 py-12">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div class="lg:col-span-8 space-y-12">
                <div class="flex items-center gap-4"><span class="w-2 h-8 bg-orange-500 rounded-full"></span><h2 class="text-xl font-black italic">SON HABERLER</h2></div>
                <div id="home-news-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
            </div>
            <aside class="lg:col-span-4" id="home-sidebar-ad"></aside>
        </div>
    </main>

    <main id="view-author-detail" class="view-node max-w-5xl mx-auto px-6 py-12">
        <div id="author-profile-header" class="mb-16"></div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8" id="author-articles-grid"></div>
    </main>

    <main id="view-admin" class="view-node min-h-screen bg-slate-950 text-white">
        <div class="flex flex-col md:flex-row h-full">
            <nav class="w-full md:w-72 bg-black p-8 space-y-2">
                <p class="text-[10px] font-black text-slate-600 uppercase mb-8 tracking-widest">Master Admin</p>
                <button onclick="setAdminTab('yazar')" id="tab-yazar" class="w-full text-left p-4 rounded-2xl font-bold text-xs uppercase hover:bg-white/10 transition">Yazar Yönetimi</button>
                <button onclick="setAdminTab('haber')" id="tab-haber" class="w-full text-left p-4 rounded-2xl font-bold text-xs uppercase hover:bg-white/10 transition">Haber/Yazı Ekle</button>
                <button onclick="router('home')" class="w-full mt-20 bg-orange-500 text-black p-4 rounded-2xl font-black text-xs uppercase">Siteden Çık</button>
            </nav>
            <section class="flex-1 p-8 md:p-12 overflow-y-auto">
                <div class="flex justify-between items-center mb-10">
                    <h2 id="admin-title" class="text-3xl font-black italic uppercase">Modül</h2>
                    <button onclick="openModal()" class="bg-white text-black px-8 py-4 rounded-xl font-black text-xs">+ YENİ KAYIT</button>
                </div>
                <div id="admin-data-list" class="space-y-4"></div>
            </section>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 z-[200] bg-black/95 backdrop-blur-xl flex items-center justify-center p-4 hidden">
        <div class="bg-white text-black w-full max-w-2xl rounded-[3rem] p-10 shadow-2xl relative overflow-y-auto max-h-[90vh]">
            <h3 class="text-2xl font-black italic mb-8 border-b pb-4">Meridian Veri Girişi</h3>
            <div id="modal-fields" class="space-y-4">
                </div>
            <div class="mt-10 flex gap-4">
                <button onclick="closeModal()" class="flex-1 font-bold text-slate-400 uppercase text-xs">Vazgeç</button>
                <button onclick="handleSave()" class="flex-[2] bg-blue-600 text-white p-5 rounded-2xl font-black uppercase text-xs shadow-xl">Veriyi Kilitle</button>
            </div>
        </div>
    </div>

    <script>
        // DATABASE INITIALIZATION
        let db = JSON.parse(localStorage.getItem('meridian_pro_v1')) || {
            yazarlar: [], // {id, isim, unvan, biyografi, img}
            icerikler: [] // {id, yazarId, baslik, metin, kategori, img, tarih}
        };

        let activeTab = 'yazar';
        let editId = null;
        let tempImg = "";

        function router(id) {
            document.querySelectorAll('.view-node').forEach(v => v.classList.remove('active-view'));
            document.getElementById('view-' + id).classList.add('active-view');
            if(id === 'home') renderPortal();
            if(id === 'admin') renderAdminList();
            window.scrollTo(0,0);
        }

        // IMAGE HANDLER
        function processImg(e) {
            const r = new FileReader();
            r.onload = () => { tempImg = r.result; document.getElementById('img-prev').src = tempImg; document.getElementById('img-prev').classList.remove('hidden'); };
            if(e.target.files[0]) r.readAsDataURL(e.target.files[0]);
        }

        // ADMIN TAB MANAGEMENT
        function setAdminTab(tab) {
            activeTab = tab;
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('bg-white/20', 'text-orange-500'));
            document.getElementById('tab-' + tab).classList.add('bg-white/20', 'text-orange-500');
            document.getElementById('admin-title').innerText = tab === 'yazar' ? "YAZAR KADROSU" : "İÇERİK VE MAKALELER";
            renderAdminList();
        }

        function renderAdminList() {
            const list = document.getElementById('admin-data-list');
            list.innerHTML = '';
            const target = activeTab === 'yazar' ? db.yazarlar : db.icerikler;

            target.forEach(item => {
                list.innerHTML += `
                    <div class="bg-white/5 border border-white/10 p-5 rounded-3xl flex items-center justify-between group hover:bg-white/10 transition">
                        <div class="flex items-center gap-5">
                            <img src="${item.img}" class="w-14 h-14 rounded-2xl object-cover border border-white/20">
                            <div>
                                <p class="font-bold text-sm text-white">${item.isim || item.baslik}</p>
                                <p class="text-[10px] text-orange-500 uppercase font-black">${item.unvan || item.kategori || ''}</p>
                            </div>
                        </div>
                        <div class="flex gap-4">
                            <button onclick="editEntry('${item.id}')" class="text-blue-400 hover:text-white transition"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteEntry('${item.id}')" class="text-red-500 hover:text-white transition"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>`;
            });
        }

        // MODAL & SAVE
        function openModal() {
            editId = null; tempImg = "";
            const fields = document.getElementById('modal-fields');
            if(activeTab === 'yazar') {
                fields.innerHTML = `
                    <div class="h-40 bg-slate-100 rounded-3xl relative overflow-hidden flex items-center justify-center border-2 border-dashed">
                        <img id="img-prev" class="absolute inset-0 w-full h-full object-cover hidden">
                        <input type="file" onchange="processImg(event)" class="absolute inset-0 opacity-0 cursor-pointer">
                        <span class="text-[10px] font-black uppercase text-slate-400">Yazar Fotoğrafı Seç</span>
                    </div>
                    <input id="f-name" type="text" placeholder="Yazar Ad Soyad" class="w-full p-5 bg-slate-100 rounded-2xl font-bold outline-none">
                    <input id="f-unvan" type="text" placeholder="Ünvan (Örn: Siyaset Bilimci)" class="w-full p-5 bg-slate-100 rounded-2xl font-bold outline-none">
                    <textarea id="f-bio" placeholder="Yazar Kısa Biyografisi..." class="w-full p-5 bg-slate-100 rounded-2xl h-32 outline-none"></textarea>
                `;
            } else {
                let yazarOptions = db.yazarlar.map(y => `<option value="${y.id}">${y.isim}</option>`).join('');
                fields.innerHTML = `
                    <div class="h-40 bg-slate-100 rounded-3xl relative overflow-hidden flex items-center justify-center border-2 border-dashed">
                        <img id="img-prev" class="absolute inset-0 w-full h-full object-cover hidden">
                        <input type="file" onchange="processImg(event)" class="absolute inset-0 opacity-0 cursor-pointer">
                        <span class="text-[10px] font-black uppercase text-slate-400">Kapak Görseli Seç</span>
                    </div>
                    <select id="f-yid" class="w-full p-5 bg-slate-100 rounded-2xl font-bold outline-none">
                        <option value="">Yazar Seçin...</option>
                        ${yazarOptions}
                    </select>
                    <input id="f-title" type="text" placeholder="Makale Başlığı" class="w-full p-5 bg-slate-100 rounded-2xl font-bold outline-none">
                    <select id="f-cat" class="w-full p-5 bg-slate-100 rounded-2xl font-bold outline-none">
                        <option value="Mardin">Mardin Sütunu</option>
                        <option value="Brezilya">Brezilya Sütunu</option>
                        <option value="Dunya">Dünya Gündemi</option>
                    </select>
                    <textarea id="f-text" placeholder="İçerik Metni..." class="w-full p-5 bg-slate-100 rounded-2xl h-44 outline-none"></textarea>
                `;
            }
            document.getElementById('modal').classList.remove('hidden');
        }

        function handleSave() {
            if(activeTab === 'yazar') {
                const entry = {
                    id: editId || 'Y' + Date.now(),
                    isim: document.getElementById('f-name').value,
                    unvan: document.getElementById('f-unvan').value,
                    bio: document.getElementById('f-bio').value,
                    img: tempImg || 'https://via.placeholder.com/300'
                };
                if(editId) {
                    const idx = db.yazarlar.findIndex(x => x.id === editId);
                    db.yazarlar[idx] = entry;
                } else { db.yazarlar.unshift(entry); }
            } else {
                const entry = {
                    id: editId || 'I' + Date.now(),
                    yazarId: document.getElementById('f-yid').value,
                    baslik: document.getElementById('f-title').value,
                    metin: document.getElementById('f-text').value,
                    kategori: document.getElementById('f-cat').value,
                    img: tempImg || 'https://via.placeholder.com/800',
                    tarih: new Date().toLocaleDateString()
                };
                if(editId) {
                    const idx = db.icerikler.findIndex(x => x.id === editId);
                    db.icerikler[idx] = entry;
                } else { db.icerikler.unshift(entry); }
            }
            localStorage.setItem('meridian_pro_v1', JSON.stringify(db));
            closeModal();
            renderAdminList();
            renderPortal();
        }

        function deleteEntry(id) {
            if(confirm('Kayıt silinsin mi?')) {
                if(activeTab === 'yazar') db.yazarlar = db.yazarlar.filter(x => x.id !== id);
                else db.icerikler = db.icerikler.filter(x => x.id !== id);
                localStorage.setItem('meridian_pro_v1', JSON.stringify(db));
                renderAdminList();
                renderPortal();
            }
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        // PORTAL RENDERING
        function renderPortal() {
            const hList = document.getElementById('header-authors-list');
            const newsGrid = document.getElementById('home-news-grid');
            
            hList.innerHTML = '';
            newsGrid.innerHTML = '';

            // Header'daki Altın Daireli Yazarlar (unnamed.jpg Stili)
            db.yazarlar.forEach(y => {
                hList.innerHTML += `
                    <div class="flex flex-col items-center gap-1 min-w-[70px]">
                        <div onclick="showAuthorArticles('${y.id}')" class="header-author-circle">
                            <img src="${y.img}">
                        </div>
                        <span class="text-[8px] font-black uppercase text-center w-full truncate">${y.isim.split(' ')[0]}</span>
                    </div>
                `;
            });

            // Ana Sayfa Haberler
            db.icerikler.forEach(i => {
                const yazar = db.yazarlar.find(y => y.id === i.yazarId) || {isim: 'Anonim'};
                newsGrid.innerHTML += `
                    <div class="glass-card p-6 group cursor-pointer hover:shadow-2xl transition">
                        <img src="${i.img}" class="w-full h-52 object-cover rounded-[2rem] mb-6 group-hover:scale-95 transition duration-500">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-[9px] font-black uppercase bg-orange-500 px-3 py-1 rounded-full">${i.kategori}</span>
                            <span class="text-[9px] font-bold text-slate-400">${i.tarih}</span>
                        </div>
                        <h3 class="text-xl font-black mb-4 leading-tight">${i.baslik}</h3>
                        <p class="text-xs font-bold text-blue-600 uppercase">Yazar: ${yazar.isim}</p>
                    </div>
                `;
            });
        }

        function showAuthorArticles(yid) {
            const yazar = db.yazarlar.find(y => y.id === yid);
            const yazilari = db.icerikler.filter(i => i.yazarId === yid);
            
            document.getElementById('author-profile-header').innerHTML = `
                <div class="flex flex-col md:flex-row items-center gap-10 bg-black text-white p-12 rounded-[4rem]">
                    <div class="header-author-circle !w-44 !h-44">
                        <img src="${yazar.img}">
                    </div>
                    <div class="flex-1 text-center md:text-left">
                        <h1 class="text-5xl font-black italic mb-2">${yazar.isim}</h1>
                        <p class="text-orange-500 font-black uppercase tracking-widest mb-6">${yazar.unvan}</p>
                        <p class="text-slate-400 text-lg italic leading-relaxed max-w-2xl">${yazar.bio}</p>
                    </div>
                </div>
            `;

            const grid = document.getElementById('author-articles-grid');
            grid.innerHTML = yazilari.length ? '' : '<p class="text-center col-span-2 py-20 font-bold opacity-30 italic">Bu yazarın henüz bir yazısı bulunmuyor.</p>';
            
            yazilari.forEach(i => {
                grid.innerHTML += `
                    <div class="glass-card p-8 hover:bg-orange-50 transition group cursor-pointer">
                        <h3 class="text-2xl font-black mb-4 group-hover:text-orange-600">${i.baslik}</h3>
                        <p class="text-slate-500 line-clamp-3 mb-6">${i.metin.substring(0,150)}...</p>
                        <div class="flex justify-between items-center border-t pt-4">
                            <span class="text-[10px] font-black uppercase tracking-widest text-orange-500">${i.kategori}</span>
                            <span class="text-[10px] font-bold text-slate-400">${i.tarih}</span>
                        </div>
                    </div>
                `;
            });

            router('author-detail');
        }

        window.onload = () => { renderPortal(); setAdminTab('yazar'); };
    </script>
</body>
</html>
