<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumina | Mardin & Brazil Culture Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #f4ecd8; --card-bg: #fdfbf7; --text: #433422; --accent: #a67c52; }
        * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; line-height: 1.6; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Şehir Modları */
        body.mardin-mode { --bg: #f4ecd8; }
        body.brazil-mode { --bg: #e8f4ec; }

        nav { background: rgba(244, 236, 216, 0.95); backdrop-filter: blur(15px); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 1000; border-bottom: 1px solid rgba(67, 52, 34, 0.1); }
        .logo { font-family: 'Marcellus', serif; font-size: 1.5rem; letter-spacing: 4px; font-weight: bold; text-transform: uppercase; }

        /* Yazarlar ve Günün Notu */
        .authors-strip { background: var(--card-bg); padding: 20px 0; display: flex; gap: 25px; border-bottom: 1px solid rgba(0,0,0,0.05); overflow-x: auto; scrollbar-width: none; padding-left: 5%; }
        .author-item { text-align: center; min-width: 80px; cursor: pointer; }
        .author-item img { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); margin: 0 auto; }
        .author-item span { display: block; font-size: 0.6rem; font-weight: 700; margin-top: 6px; font-family: 'Marcellus'; text-transform: uppercase; }
        
        .wisdom-banner { text-align: center; padding: 15px; font-style: italic; font-size: 0.85rem; opacity: 0.8; border-bottom: 1px solid rgba(0,0,0,0.03); letter-spacing: 0.5px; color: var(--accent); }

        /* Kartlar */
        .container-main { max-width: 1400px; margin: 20px auto; padding: 0 20px; }
        #news-feed { display: grid; grid-template-columns: 1fr; gap: 30px; transition: 0.5s; }
        @media (min-width: 768px) { #news-feed { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1150px) { #news-feed { grid-template-columns: repeat(3, 1fr); } }

        .news-card { background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid rgba(0,0,0,0.04); transition: 0.4s; cursor: pointer; position: relative; }
        .news-img { width: 100%; height: 260px; object-fit: cover; }
        .card-body { padding: 25px; }
        .card-body h2 { font-family: 'Marcellus', serif; font-size: 1.3rem; margin-bottom: 10px; color: #1a1a1a; }

        /* İnteraktif Sözlük */
        .term { border-bottom: 1.5px dashed var(--accent); cursor: help; position: relative; font-weight: 500; }
        .term:hover::after { content: attr(data-desc); position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: white; padding: 10px; border-radius: 8px; font-size: 0.75rem; width: 200px; z-index: 100; font-style: normal; line-height: 1.4; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        /* Ses Kontrol */
        .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; overflow-y: auto; }
        .audio-bar { position: sticky; top: 0; background: rgba(244, 236, 216, 0.98); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; z-index: 100; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .btn-speak { background: #1a1a1a; color: white; padding: 12px 24px; border-radius: 50px; font-size: 11px; font-weight: 900; letter-spacing: 1px; }
        .btn-stop { background: white; color: #1a1a1a; border: 2px solid #1a1a1a; margin-left: 10px; }

        /* Admin */
        #admin-panel { display: none; background: #080808; color: #fff; position: fixed; inset: 0; z-index: 11000; overflow-y: auto; padding: 40px; }
        .admin-input { width: 100%; padding: 15px; background: #151515; border: 1px solid #333; border-radius: 12px; color: white; margin-bottom: 15px; font-size: 0.9rem; }
        .admin-tab-btn { padding: 10px 20px; font-size: 0.7rem; font-weight: 800; border-radius: 8px; background: #1a1a1a; color: #666; }
        .admin-tab-btn.active { background: var(--accent); color: white; }
    </style>
</head>
<body class="mardin-mode">

<nav>
    <div class="logo">LUMINA</div>
    <div class="flex gap-6 items-center">
        <button onclick="switchMode('mardin')" title="Mardin Modu" class="text-xl">☀️</button>
        <button onclick="switchMode('brazil')" title="Brezilya Modu" class="text-xl">🌴</button>
    </div>
</nav>

<div id="authors-list" class="authors-strip"></div>
<div id="wisdom-bar" class="wisdom-banner">"Taşın sabrı, suyun ritmiyle buluşuyor."</div>

<div class="container-main">
    <main id="news-feed"></main>
</div>

<footer class="py-20 text-center">
    <button onclick="toggleAdmin()" class="opacity-20 text-[9px] tracking-[5px] uppercase font-bold border-b border-black pb-1">Master Console</button>
</footer>

<div id="overlay" class="overlay">
    <div class="audio-bar">
        <div>
            <button onclick="playAudio()" class="btn-speak">🔊 METNİ SESLENDİR</button>
            <button onclick="stopAudio()" class="btn-speak btn-stop">🛑 DURDUR</button>
        </div>
        <button onclick="closeOverlay()" class="w-10 h-10 bg-black text-white rounded-full font-bold">✕</button>
    </div>
    <div id="overlay-content" class="max-w-3xl mx-auto py-16 px-8"></div>
</div>

<div id="admin-panel">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10 border-b border-white/10 pb-6">
            <h2 class="text-2xl font-serif text-accent uppercase">Lumina Core CMS v7.0</h2>
            <button onclick="toggleAdmin()" class="bg-red-900 px-6 py-2 rounded-full text-[10px] font-bold">PANELİ KAPAT</button>
        </div>
        
        <div class="flex gap-3 mb-10">
            <button onclick="setTab('content')" id="tab-content" class="admin-tab-btn active">İÇERİK YÖNETİMİ</button>
            <button onclick="setTab('glossary')" id="tab-glossary" class="admin-tab-btn">KÜLTÜR SÖZLÜĞÜ</button>
            <button onclick="setTab('wisdom')" id="tab-wisdom" class="admin-tab-btn">GÜNÜN BİLGELİĞİ</button>
        </div>

        <div id="admin-body" class="grid grid-cols-1 lg:grid-cols-12 gap-10"></div>
    </div>
</div>

<script>
    const data = {
        authors: [
            {id:'y1', name:'Gabriel Garcia', bio:'Mitoloji Uzmanı', img:'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=200'},
            {id:'y2', name:'Leyla Mardini', bio:'Tarihçi', img:'https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=200'}
        ],
        glossary: [
            {term: 'Abbara', desc: 'Mardin sokaklarında evlerin altından geçen kemerli geçitler.'},
            {term: 'Mırra', desc: 'Mezopotamya\'ya özgü, acı ve yoğun kıvamlı geleneksel kahve.'},
            {term: 'Capoeira', desc: 'Brezilyalı kölelerin geliştirdiği, dans ve müziği harmanlayan savunma sanatı.'}
        ],
        wisdoms: [
            "Mardin'de taşlar fısıldar, Rio'da dalgalar şarkı söyler.",
            "Sabır taşın kalbinde, neşe sokağın ritmindedir.",
            "İki coğrafya, tek bir insanlık ruhu."
        ],
        news: [
            {id:'h1', cat:'mardin', aid:'y2', title:"Abbara: Taşın Altındaki Gizli Şehir", text:"Mardin sokaklarında yürürken bir Abbara ile karşılaştığınızda, zaman durur. Bu kemerli yapılar, şehri güneşin sıcağından koruyan birer zırh gibidir. Mırra kokusunun sindiği bu geçitler, bin yıllık bir komşuluk hukukunun mimari tezahürüdür.", img:'https://images.unsplash.com/photo-1582738411706-bfc8e691d1c2?w=800'},
            {id:'h2', cat:'brazil', aid:'y1', title:"Rio'nun Ruhu: Capoeira ve Özgürlük", text:"Sahilde yankılanan Berimbau sesi, Capoeira ritminin başladığının habercisidir. Bu sadece bir dövüş sanatı değil, Brezilya halkının özgürlük arayışının dansa dönüşmüş halidir. Her hareket bir hikaye, her ritim bir direniştir.", img:'https://images.unsplash.com/photo-1596707323136-22442436f903?w=800'}
        ]
    };

    let activeTab = 'content';
    const synth = window.speechSynthesis;

    function renderPortal() {
        // Yazarlar
        document.getElementById('authors-list').innerHTML = data.authors.map(a => `<div class="author-item"><img src="${a.img}"><span>${a.name}</span></div>`).join('');
        
        // Günün Notu (Rastgele)
        document.getElementById('wisdom-bar').innerText = data.wisdoms[Math.floor(Math.random()*data.wisdoms.length)];

        // Haberler
        document.getElementById('news-feed').innerHTML = data.news.map(h => `
            <article class="news-card" onclick="openArticle('${h.id}')">
                <img src="${h.img}" class="news-img">
                <div class="card-body">
                    <small class="text-accent font-bold uppercase text-[9px] tracking-widest">${h.cat === 'mardin' ? 'Mardin' : 'Brezilya'}</small>
                    <h2 class="font-serif mt-2">${h.title}</h2>
                    <p class="line-clamp-2 text-sm opacity-60 mt-2">${h.text}</p>
                </div>
            </article>
        `).join('');
    }

    function openArticle(id) {
        const h = data.news.find(x => x.id === id);
        const a = data.authors.find(x => x.id === h.aid);
        document.getElementById('overlay').style.display = 'block';
        document.body.style.overflow = 'hidden';

        // Sözlük Entegrasyonu (Metin içindeki kelimeleri bulup linkleme)
        let processedText = h.text;
        data.glossary.forEach(g => {
            const regex = new RegExp(g.term, "g");
            processedText = processedText.replace(regex, `<span class="term" data-desc="${g.desc}">${g.term}</span>`);
        });

        document.getElementById('overlay-content').innerHTML = `
            <h1 class="text-5xl font-serif mb-8 leading-tight">${h.title}</h1>
            <div class="flex items-center gap-4 mb-10 pb-6 border-b border-black/5">
                <img src="${a.img}" class="w-12 h-12 rounded-full border border-accent">
                <div class="text-xs uppercase font-bold tracking-widest">${a.name} • ${a.bio}</div>
            </div>
            <img src="${h.img}" class="w-full rounded-3xl mb-12 shadow-2xl">
            <div id="read-target" class="text-xl leading-relaxed text-justify font-light">${processedText}</div>
        `;
    }

    function renderAdmin() {
        const body = document.getElementById('admin-body');
        if(activeTab === 'content') {
            body.innerHTML = `
                <div class="lg:col-span-5">
                    <input type="text" id="adm-h-t" placeholder="Başlık" class="admin-input">
                    <textarea id="adm-h-x" placeholder="Haber metni..." class="admin-input h-48"></textarea>
                    <select id="adm-h-c" class="admin-input"><option value="mardin">Mardin</option><option value="brazil">Brezilya</option></select>
                    <button onclick="saveH()" class="w-full bg-accent py-4 rounded-xl font-bold">YAYINLA</button>
                </div>
                <div class="lg:col-span-7 space-y-2">${data.news.map(n => `<div class="p-4 bg-[#111] rounded-xl text-xs flex justify-between"><span>${n.title}</span><span class="text-accent">${n.cat.toUpperCase()}</span></div>`).join('')}</div>`;
        } else if(activeTab === 'glossary') {
            body.innerHTML = `
                <div class="lg:col-span-5">
                    <input type="text" id="adm-g-t" placeholder="Terim (Örn: Abbara)" class="admin-input">
                    <input type="text" id="adm-g-d" placeholder="Açıklama" class="admin-input">
                    <button onclick="saveG()" class="w-full bg-accent py-4 rounded-xl font-bold">SÖZLÜĞE EKLE</button>
                </div>
                <div class="lg:col-span-7 space-y-2">${data.glossary.map(g => `<div class="p-4 bg-[#111] rounded-xl text-xs"><strong>${g.term}:</strong> ${g.desc}</div>`).join('')}</div>`;
        } else if(activeTab === 'wisdom') {
            body.innerHTML = `
                <div class="lg:col-span-12">
                    <input type="text" id="adm-w" placeholder="Yeni Bilgelik Notu..." class="admin-input">
                    <button onclick="saveW()" class="bg-accent px-10 py-4 rounded-xl font-bold mb-6">EKLE</button>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">${data.wisdoms.map(w => `<div class="p-4 bg-[#111] rounded-xl text-xs italic">${w}</div>`).join('')}</div>
                </div>`;
        }
    }

    function switchMode(m) {
        document.body.className = m + '-mode';
        const feed = document.getElementById('news-feed');
        feed.style.opacity = '0';
        setTimeout(() => {
            data.news = m === 'mardin' ? data.news.sort((a,b) => a.cat === 'mardin' ? -1 : 1) : data.news.sort((a,b) => a.cat === 'brazil' ? -1 : 1);
            renderPortal();
            feed.style.opacity = '1';
        }, 500);
    }

    function saveH() {
        const t = document.getElementById('adm-h-t').value, x = document.getElementById('adm-h-x').value, c = document.getElementById('adm-h-c').value;
        data.news.unshift({id:'h'+Date.now(), title:t, text:x, cat:c, aid:'y1', img:'https://images.unsplash.com/photo-1582738411706-bfc8e691d1c2?w=800'});
        renderAdmin(); renderPortal();
    }

    function saveG() {
        const t = document.getElementById('adm-g-t').value, d = document.getElementById('adm-g-d').value;
        data.glossary.push({term:t, desc:d}); renderAdmin();
    }

    function saveW() {
        const w = document.getElementById('adm-w').value;
        data.wisdoms.push(w); renderAdmin(); renderPortal();
    }

    function playAudio() { synth.cancel(); const u = new SpeechSynthesisUtterance(document.getElementById('read-target').innerText); u.lang='tr-TR'; synth.speak(u); }
    function stopAudio() { synth.cancel(); }
    function toggleAdmin() { const p = document.getElementById('admin-panel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; if(p.style.display==='block') renderAdmin(); }
    function setTab(t) { activeTab = t; document.querySelectorAll('.admin-tab-btn').forEach(b=>b.classList.remove('active')); document.getElementById('tab-'+t).classList.add('active'); renderAdmin(); }
    function closeOverlay() { stopAudio(); document.getElementById('overlay').style.display='none'; document.body.style.overflow='auto'; }

    window.onload = renderPortal;
</script>
</body>
</html>
