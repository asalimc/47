<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASC GLOBAL | v30 Editorial Authority</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,200..900;1,200..900&family=Inter:wght@100..900&display=swap');
        
        :root { --brand: #c2410c; --bg-soft: #fcfcfc; }
        body { font-family: 'Inter', sans-serif; background-color: #fff; color: #111; }
        .font-serif { font-family: 'Crimson Pro', serif; }

        /* GAZETE MİZANPAJI */
        .news-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 1px; background: #eee; border: 1px solid #eee; }
        .news-grid > * { background: #fff; padding: 2rem; }
        
        .span-8 { grid-column: span 8; }
        .span-4 { grid-column: span 4; }
        .span-12 { grid-column: span 12; }

        /* TYPOGRAPHY */
        .headline-1 { font-size: clamp(2.5rem, 5vw, 4.5rem); line-height: 0.95; letter-spacing: -0.04em; font-weight: 800; }
        .drop-cap::first-letter { float: left; font-size: 5rem; line-height: 0.7; padding: 0.5rem 0.7rem 0 0; font-family: 'Crimson Pro'; font-weight: 900; color: var(--brand); }

        /* ANIMASYONLAR */
        .hover-lift { transition: transform 0.3s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        .hover-lift:hover { transform: translateY(-5px); }

        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="ascMaster()" x-init="init()">

    <template x-if="authModal">
        <div class="fixed inset-0 z-[5000] flex items-center justify-center bg-black/95 backdrop-blur-sm">
            <div class="w-full max-w-md p-10 text-center">
                <h2 class="font-serif text-white text-4xl italic mb-8">HUB Access</h2>
                <input x-model="tempPass" type="password" placeholder="Terminal Şifresi" 
                       @keyup.enter="checkAuth()"
                       class="w-full bg-white/10 border border-white/20 text-white p-5 rounded-xl mb-4 text-center focus:border-orange-600 outline-none">
                <button @click="checkAuth()" class="w-full bg-orange-700 text-white py-4 rounded-xl font-bold uppercase tracking-widest">Giriş Yap</button>
                <button @click="authModal = false" class="mt-6 text-gray-500 text-xs uppercase tracking-widest">İptal</button>
            </div>
        </div>
    </template>

    <header class="border-b-4 border-black px-8 py-4 flex justify-between items-center sticky top-0 bg-white z-[100]">
        <div class="flex gap-4 text-[10px] font-black uppercase tracking-tighter">
            <span x-text="today"></span>
            <span class="text-gray-300">|</span>
            <span>Mardin-Sao Paulo Transit: <span class="text-green-600">Active</span></span>
        </div>
        <div @click="currentPage = 'home'" class="cursor-pointer">
            <h1 class="font-serif text-5xl font-black italic tracking-tighter">ASC <span class="text-orange-700 not-italic uppercase">Global</span></h1>
        </div>
        <button @click="authModal = true" class="group flex items-center gap-3">
            <span class="text-[10px] font-black uppercase tracking-widest group-hover:text-orange-700 transition-colors">Yönetim</span>
            <div class="w-10 h-10 rounded-full border border-black flex items-center justify-center group-hover:bg-black group-hover:text-white transition-all">
                <i class="fas fa-terminal text-xs"></i>
            </div>
        </button>
    </header>

    <main x-show="currentPage === 'home'" x-cloak class="max-w-[1700px] mx-auto">
        
        <div class="news-grid">
            <div class="span-8 border-r border-gray-100">
                <template x-if="newsData[0]">
                    <article @click="viewItem(newsData[0])" class="group cursor-pointer">
                        <div class="overflow-hidden mb-8 aspect-video bg-gray-100 rounded-sm">
                            <img :src="newsData[0].img" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-1000">
                        </div>
                        <span class="text-orange-700 font-bold text-xs uppercase tracking-widest" x-text="newsData[0].region"></span>
                        <h2 class="headline-1 font-serif italic my-6 group-hover:underline" x-text="newsData[0].title"></h2>
                        <p class="text-gray-500 text-lg leading-relaxed max-w-2xl" x-text="newsData[0].body"></p>
                    </article>
                </template>
            </div>

            <div class="span-4 flex flex-col gap-8">
                <h3 class="text-[10px] font-black uppercase tracking-[0.3em] border-b border-black pb-2">Son Analizler</h3>
                <template x-for="news in newsData.slice(1, 4)" :key="news.id">
                    <div @click="viewItem(news)" class="group cursor-pointer border-b border-gray-100 pb-6">
                        <p class="text-[9px] font-bold text-orange-700 uppercase mb-2" x-text="news.region"></p>
                        <h4 class="font-serif text-2xl font-black group-hover:text-orange-800" x-text="news.title"></h4>
                    </div>
                </template>
                
                <div class="mt-auto bg-gray-50 p-6 rounded-xl border border-dashed border-gray-200">
                    <p class="text-[8px] font-bold text-gray-400 uppercase mb-4 text-center tracking-widest">Global Partner</p>
                    <img :src="adImage || 'https://via.placeholder.com/300x300?text=Premium+Ad'" class="w-full grayscale opacity-50 hover:opacity-100 transition-opacity">
                </div>
            </div>
        </div>

        <div class="bg-black text-white py-20 px-12">
            <div class="flex justify-between items-end mb-16">
                <h2 class="font-serif text-6xl italic">Meridien Hub</h2>
                <p class="text-[10px] font-light tracking-[0.5em] text-gray-400 uppercase underline underline-offset-8">Editorial Intelligence</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-12">
                <template x-for="author in authors" :key="author.id">
                    <div @click="viewItem(author)" class="group cursor-pointer border-l border-white/10 pl-8 hover:border-orange-600 transition-all">
                        <img :src="author.photo" class="w-20 h-20 rounded-full mb-6 grayscale group-hover:grayscale-0 transition-all">
                        <span class="text-[9px] font-black text-orange-500 uppercase tracking-widest" x-text="author.title"></span>
                        <h4 class="text-xl font-bold mt-2" x-text="author.name"></h4>
                        <p class="text-gray-500 text-xs mt-4 line-clamp-2 italic" x-text="author.bio"></p>
                    </div>
                </template>
            </div>
        </div>

    </main>

    <div x-show="currentPage === 'reader'" class="fixed inset-0 z-[2000] bg-white overflow-y-auto" x-cloak>
        <nav class="p-8 flex justify-between items-center border-b border-gray-50 sticky top-0 bg-white/90 backdrop-blur-md">
            <button @click="currentPage = 'home'" class="text-[10px] font-black uppercase tracking-widest flex items-center gap-2">
                <i class="fas fa-arrow-left"></i> Akışa Dön
            </button>
            <div class="font-serif italic font-black text-2xl tracking-tighter">ASC GLOBAL</div>
            <div class="w-20"></div>
        </nav>

        <article class="max-w-4xl mx-auto py-24 px-8">
            <header class="text-center mb-20">
                <span class="text-orange-700 font-bold text-sm uppercase tracking-widest" x-text="selectedItem?.region"></span>
                <h1 class="font-serif italic text-7xl lg:text-8xl font-black my-10 tracking-tighter leading-none" x-text="selectedItem?.title || selectedItem?.name"></h1>
                <p class="text-gray-400 font-bold text-xs uppercase tracking-widest">Yayın Tarihi: <span x-text="today"></span></p>
            </header>

            <img :src="selectedItem?.img || selectedItem?.photo" class="w-full aspect-[16/9] object-cover mb-20 shadow-2xl rounded-sm">
            
            <div class="drop-cap text-xl leading-relaxed text-gray-800" x-html="selectedItem?.body || selectedItem?.bio"></div>
        </article>
    </div>

    <div x-show="currentPage === 'admin'" class="fixed inset-0 z-[3000] bg-[#f8f8f8] overflow-y-auto" x-cloak>
        <div class="max-w-6xl mx-auto py-20 px-8">
            <div class="flex justify-between items-center mb-16 bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="font-serif text-4xl italic font-black">Atelier v30</h2>
                <div class="flex gap-2">
                    <button @click="adminTab = 'news'" :class="adminTab === 'news' ? 'bg-black text-white' : 'bg-gray-100 text-gray-400'" class="px-8 py-3 rounded-xl text-[10px] font-black uppercase">Haberler</button>
                    <button @click="adminTab = 'authors'" :class="adminTab === 'authors' ? 'bg-black text-white' : 'bg-gray-100 text-gray-400'" class="px-8 py-3 rounded-xl text-[10px] font-black uppercase">Yazarlar</button>
                    <button @click="currentPage = 'home'" class="px-6 py-3 bg-red-50 text-red-500 rounded-xl font-black text-[10px] uppercase">Çıkış</button>
                </div>
            </div>

            <div class="grid grid-cols-12 gap-12">
                <div class="col-span-8 space-y-8 bg-white p-12 rounded-[40px] shadow-sm border border-gray-100">
                    <input x-model="form.main" type="text" placeholder="Başlık / İsim" class="w-full text-4xl font-serif italic border-b-2 border-gray-50 focus:border-black outline-none py-4">
                    <input x-model="form.sub" type="text" placeholder="Kategori / Etiket" class="w-full text-sm border-b border-gray-50 focus:border-black outline-none py-4">
                    <textarea x-model="form.content" placeholder="İçerik..." class="w-full h-96 text-lg leading-relaxed border-none focus:ring-0 outline-none resize-none"></textarea>
                </div>
                
                <div class="col-span-4 space-y-8">
                    <div class="bg-white p-10 rounded-[40px] shadow-sm border border-gray-100 text-center">
                        <input type="file" @change="handleFile" id="adminMedia" class="hidden">
                        <label for="adminMedia" class="cursor-pointer group block">
                            <div class="w-full aspect-square bg-gray-50 rounded-3xl flex items-center justify-center mb-6 overflow-hidden border-2 border-dashed border-gray-200 group-hover:border-black transition-all">
                                <img x-show="form.media" :src="form.media" class="w-full h-full object-cover">
                                <i x-show="!form.media" class="fas fa-image text-4xl text-gray-200"></i>
                            </div>
                            <span class="text-[10px] font-black uppercase tracking-widest text-gray-400 group-hover:text-black">Görsel Yükle</span>
                        </label>
                    </div>
                    <button @click="save()" class="w-full bg-orange-700 text-white py-8 rounded-[40px] font-black text-xl uppercase tracking-widest shadow-xl shadow-orange-700/20 hover:scale-105 transition-all">Sisteme İşle</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function ascMaster() {
            return {
                currentPage: 'home', adminTab: 'news', selectedItem: null,
                authModal: false, tempPass: '',
                form: { main: '', sub: '', content: '', media: '' },
                today: new Date().toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' }),
                adImage: localStorage.getItem('asc_ad_v30') || '',
                
                newsData: JSON.parse(localStorage.getItem('asc_news_v30')) || [
                    { id: 1, title: 'Brezilya Ormanlarından Mardin Sokaklarına: Bir Küresel Akış', region: 'STRATEJİ', body: 'Küresel ticaretin yeni rotası, Amazon havzasının dinamizmi ile Mezopotamya’nın kadim ticaret aklını birleştiriyor. Bu koridor sadece konteyner taşımıyor, yeni bir ekonomik lisan inşa ediyor.', img: 'https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?w=1600' }
                ],
                authors: JSON.parse(localStorage.getItem('asc_authors_v30')) || [
                    { id: 1, name: 'Ahmet Çınarbaş', title: 'Political Scientist', bio: 'Analizleriyle küresel dengeleri yorumlar.', photo: 'https://i.ibb.co/LhqZz4H/ahmet.jpg' },
                    { id: 2, name: 'M. Beşir Ayanoğlu', title: 'Legal Counsel', bio: 'Uluslararası hukuk stratejisti.', photo: 'https://i.ibb.co/vYm6D6T/besir.jpg' }
                ],

                init() { this.sync(); },
                
                checkAuth() {
                    if(this.tempPass === "47") {
                        this.authModal = false;
                        this.currentPage = 'admin';
                        this.tempPass = '';
                    } else {
                        alert("Erişim Reddedildi.");
                    }
                },

                handleFile(e) {
                    const reader = new FileReader();
                    reader.onload = (f) => this.form.media = f.target.result;
                    reader.readAsDataURL(e.target.files[0]);
                },

                save() {
                    const isNews = this.adminTab === 'news';
                    const payload = {
                        id: Date.now(),
                        title: isNews ? this.form.main : undefined,
                        name: !isNews ? this.form.main : undefined,
                        region: isNews ? this.form.sub : undefined,
                        title: !isNews ? this.form.sub : (isNews ? this.form.sub : undefined),
                        body: isNews ? this.form.content : undefined,
                        bio: !isNews ? this.form.content : undefined,
                        img: isNews ? this.form.media : undefined,
                        photo: !isNews ? this.form.media : undefined
                    };

                    if (isNews) this.newsData.unshift(payload);
                    else this.authors.push(payload);
                    
                    this.sync();
                    this.form = { main: '', sub: '', content: '', media: '' };
                    alert("Veri Güvenli Şekilde İşlendi.");
                },

                viewItem(item) { this.selectedItem = item; this.currentPage = 'reader'; window.scrollTo(0,0); },
                sync() {
                    localStorage.setItem('asc_news_v30', JSON.stringify(this.newsData));
                    localStorage.setItem('asc_authors_v30', JSON.stringify(this.authors));
                }
            }
        }
    </script>
</body>
</html>
