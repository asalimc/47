<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASC GLOBAL | The Global Editor v28</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,700;1,900&family=Instrument+Sans:wght@400;500;700&display=swap');
        
        :root { --accent: #c2410c; --bg: #ffffff; --text: #000000; }

        body { font-family: 'Instrument Sans', sans-serif; background-color: var(--bg); color: var(--text); }
        .font-serif { font-family: 'Playfair Display', serif; }

        /* MAGASIN GRID SYSTEM */
        .magazine-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 2.5rem;
        }

        /* TYPOGRAPHY RULES */
        .headline-xl { font-size: 5rem; line-height: 0.9; letter-spacing: -0.05em; font-weight: 900; }
        .article-body { font-size: 1.3rem; line-height: 1.85; color: #1a1a1a; }
        .drop-cap-luxury::first-letter {
            float: left; font-family: 'Playfair Display'; font-size: 6rem;
            line-height: 0.7; padding: 0.5rem 1rem 0 0; font-weight: 900; color: var(--accent);
        }

        /* ADMIN PURE STYLE */
        .luxury-field {
            background: #fff !important;
            border: 1px solid #e5e7eb !important;
            border-radius: 0;
            border-bottom: 2px solid #000 !important;
            padding: 1.5rem 1rem;
            font-size: 1.1rem;
            width: 100%;
            transition: 0.3s;
        }
        .luxury-field:focus { background: #fafafa !important; outline: none; border-bottom-color: var(--accent) !important; }

        /* HOVER EFFECTS */
        .img-reveal { overflow: hidden; position: relative; }
        .img-reveal img { transition: transform 1.2s cubic-bezier(0.19, 1, 0.22, 1); }
        .group:hover .img-reveal img { transform: scale(1.08); }

        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="ascEngine()" x-init="init()">

    <header class="border-b border-black py-8 px-10 sticky top-0 bg-white/90 backdrop-blur-md z-[1000]">
        <div class="flex justify-between items-center">
            <div class="flex gap-6 text-[10px] font-bold uppercase tracking-[0.3em] hidden lg:flex">
                <a href="#" class="hover:text-orange-700">Dünya</a>
                <a href="#" class="hover:text-orange-700">Strateji</a>
                <a href="#" class="hover:text-orange-700">Kültür</a>
            </div>
            
            <div @click="currentPage = 'home'" class="cursor-pointer text-center">
                <h1 class="font-serif text-5xl font-black italic tracking-tighter leading-none">ASC <span class="text-orange-700 not-italic uppercase">Global</span></h1>
                <p class="text-[8px] font-bold tracking-[0.6em] mt-2 opacity-40">INTELLIGENCE & EDITORIAL</p>
            </div>

            <div class="flex items-center gap-6">
                <button @click="openAdmin()" class="bg-black text-white px-8 py-3 text-[10px] font-black uppercase tracking-widest hover:bg-orange-700 transition-all">
                    Açık İstihbarat
                </button>
            </div>
        </div>
    </header>

    <main x-show="currentPage === 'home'" x-cloak class="max-w-[1500px] mx-auto px-10 py-16">
        
        <div class="magazine-grid">
            
            <div class="col-span-12 lg:col-span-8 space-y-24">
                
                <template x-for="(news, index) in newsData" :key="news.id">
                    <article @click="viewItem(news)" class="group cursor-pointer border-b border-gray-100 pb-20">
                        <div class="grid grid-cols-1 md:grid-cols-12 gap-12">
                            <div class="md:col-span-5 space-y-6 order-2 md:order-1">
                                <span class="text-orange-700 font-black text-xs uppercase tracking-widest" x-text="news.region"></span>
                                <h2 :class="index === 0 ? 'text-5xl lg:text-7xl' : 'text-4xl lg:text-5xl'" 
                                    class="font-serif font-black italic tracking-tighter leading-[0.9] group-hover:text-orange-800 transition-colors" 
                                    x-text="news.title"></h2>
                                <p class="text-gray-500 line-clamp-3 italic leading-relaxed text-lg" x-text="news.body"></p>
                                <div class="pt-4 flex items-center gap-4">
                                    <div class="w-8 h-px bg-black"></div>
                                    <span class="text-[10px] font-black uppercase tracking-widest">Okumaya Devam Et</span>
                                </div>
                            </div>
                            <div class="md:col-span-7 order-1 md:order-2">
                                <div class="img-reveal aspect-[4/3] bg-gray-100 shadow-2xl">
                                    <img :src="news.img" class="w-full h-full object-cover">
                                </div>
                            </div>
                        </div>
                    </article>
                </template>

            </div>

            <div class="col-span-12 lg:col-span-4 space-y-20">
                
                <section class="bg-[#fafafa] p-10">
                    <h3 class="font-serif text-3xl font-black italic mb-10 border-b border-black pb-4">Köşe Yazarları</h3>
                    <div class="space-y-12">
                        <template x-for="author in authors" :key="author.id">
                            <div @click="viewItem(author)" class="group cursor-pointer flex items-center gap-6">
                                <div class="w-20 h-20 rounded-full overflow-hidden border border-gray-200 p-1 group-hover:border-orange-700 transition-all">
                                    <img :src="author.photo" class="w-full h-full object-cover rounded-full grayscale group-hover:grayscale-0">
                                </div>
                                <div>
                                    <p class="text-[9px] font-black uppercase text-orange-700 tracking-widest mb-1" x-text="author.title"></p>
                                    <h4 class="text-xl font-bold group-hover:underline" x-text="author.name"></h4>
                                </div>
                            </div>
                        </template>
                    </div>
                </section>

                <div class="sticky top-40 text-center">
                    <p class="text-[9px] font-black text-gray-300 uppercase tracking-[0.4em] mb-4 text-center">Reklam / İş Birliği</p>
                    <div class="w-[300px] h-[300px] mx-auto border border-gray-100 flex items-center justify-center bg-white shadow-lg overflow-hidden relative group">
                        <img x-show="adImage" :src="adImage" class="w-full h-full object-cover">
                        <div x-show="!adImage" class="p-8 border-2 border-dashed border-gray-50 flex flex-col items-center">
                            <i class="fas fa-plus text-gray-100 text-5xl mb-4"></i>
                            <span class="text-[9px] font-black text-gray-200">REKLAM ALANI</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <div x-show="currentPage === 'reader'" class="fixed inset-0 z-[2000] bg-white overflow-y-auto" x-cloak x-transition:enter="transition duration-500" x-transition:enter-start="opacity-0 translate-y-20">
        <nav class="sticky top-0 bg-white/95 border-b border-gray-100 p-6 flex justify-between items-center z-[2001]">
            <button @click="currentPage = 'home'" class="text-[10px] font-black uppercase tracking-widest hover:text-orange-700 transition-colors">
                <i class="fas fa-times mr-2"></i> Kapat
            </button>
            <div class="font-serif italic font-black text-2xl">ASC <span class="text-orange-700">Global</span></div>
            <div class="flex gap-4">
                <i class="fab fa-twitter text-gray-400 cursor-pointer hover:text-sky-500"></i>
                <i class="fab fa-facebook text-gray-400 cursor-pointer hover:text-blue-600"></i>
            </div>
        </nav>

        <article class="max-w-[1400px] mx-auto py-24 px-10">
            <header class="max-w-4xl mx-auto text-center mb-24">
                <span class="text-orange-700 font-black text-xs uppercase tracking-[0.5em] block mb-10" x-text="selectedItem?.region || 'ANALİZ'"></span>
                <h1 class="headline-xl font-serif italic mb-12" x-text="selectedItem?.title || selectedItem?.name"></h1>
                <div class="flex items-center justify-center gap-4 text-gray-400 font-bold text-[10px] uppercase tracking-widest">
                    <span>Yayın Kurulu</span>
                    <div class="w-1 h-1 bg-gray-200 rounded-full"></div>
                    <span x-text="new Date().toLocaleDateString('tr-TR')"></span>
                </div>
            </header>

            <div class="w-full h-[80vh] bg-gray-100 mb-24 overflow-hidden shadow-2xl">
                <img :src="selectedItem?.img || selectedItem?.photo" class="w-full h-full object-cover">
            </div>

            <div class="max-w-3xl mx-auto article-body drop-cap-luxury" x-html="selectedItem?.body || selectedItem?.bio"></div>
        </article>
    </div>

    <div x-show="currentPage === 'admin'" class="fixed inset-0 z-[3000] bg-white overflow-y-auto" x-cloak>
        <div class="max-w-5xl mx-auto py-24 px-10">
            <div class="flex justify-between items-end mb-20 border-b border-black pb-10">
                <div>
                    <h2 class="text-6xl font-serif font-black italic tracking-tighter">Editör Masası</h2>
                    <p class="text-[10px] font-black text-orange-700 uppercase tracking-[0.4em] mt-2">v28 Content Intelligence</p>
                </div>
                <div class="flex gap-4">
                    <button @click="adminTab = 'news'" :class="adminTab === 'news' ? 'bg-black text-white' : 'bg-gray-50'" class="px-8 py-3 text-[10px] font-black uppercase tracking-widest transition-all">Makale</button>
                    <button @click="adminTab = 'authors'" :class="adminTab === 'authors' ? 'bg-black text-white' : 'bg-gray-50'" class="px-8 py-3 text-[10px] font-black uppercase tracking-widest transition-all">Yazar</button>
                    <button @click="adminTab = 'ads'" :class="adminTab === 'ads' ? 'bg-orange-700 text-white' : 'bg-gray-50'" class="px-8 py-3 text-[10px] font-black uppercase tracking-widest transition-all">Reklam</button>
                    <button @click="currentPage = 'home'" class="bg-red-50 w-12 h-12 flex items-center justify-center text-red-600 hover:bg-red-600 hover:text-white transition-all">X</button>
                </div>
            </div>

            <div x-show="adminTab !== 'ads'" class="grid grid-cols-12 gap-16">
                <div class="col-span-12 lg:col-span-8 space-y-12">
                    <div class="space-y-4">
                        <label class="text-[10px] font-black uppercase tracking-widest text-gray-400">Ana Başlık</label>
                        <input x-model="form.main" type="text" class="luxury-field font-serif text-3xl font-bold" placeholder="Manşet buraya...">
                    </div>
                    <div class="space-y-4">
                        <label class="text-[10px] font-black uppercase tracking-widest text-gray-400">Alt Bilgi / Bölge</label>
                        <input x-model="form.sub" type="text" class="luxury-field" placeholder="Örn: Mardin / Stratejik Rapor">
                    </div>
                    <div class="space-y-4">
                        <label class="text-[10px] font-black uppercase tracking-widest text-gray-400">Gövde Metni</label>
                        <textarea x-model="form.content" class="luxury-field h-[500px] leading-relaxed" placeholder="Anlatıyı buraya dökün..."></textarea>
                    </div>
                </div>

                <div class="col-span-12 lg:col-span-4 space-y-12">
                    <div class="border border-dashed border-gray-200 p-12 text-center bg-[#fafafa]">
                        <input type="file" @change="handleFile" id="mainMedia" class="hidden">
                        <label for="mainMedia" class="cursor-pointer group">
                            <i class="fas fa-camera text-4xl text-gray-200 group-hover:text-black transition-colors mb-4 block"></i>
                            <span class="text-[10px] font-black uppercase tracking-widest text-gray-400">Görsel Seç</span>
                        </label>
                    </div>
                    <button @click="save()" class="w-full bg-black text-white py-10 font-black text-xl uppercase tracking-widest hover:bg-orange-700 transition-all shadow-2xl">YAYINLA</button>
                    
                    <div class="pt-10 border-t border-gray-100">
                        <h4 class="text-[10px] font-black uppercase text-gray-300 mb-6 tracking-[0.3em]">Arşivdeki Kayıtlar</h4>
                        <div class="max-h-[300px] overflow-y-auto space-y-2">
                            <template x-for="item in (adminTab === 'news' ? newsData : authors)" :key="item.id">
                                <div class="flex justify-between items-center p-4 bg-gray-50 text-[10px] font-bold uppercase tracking-widest">
                                    <span class="truncate w-40" x-text="item.title || item.name"></span>
                                    <button @click="deleteItem(item.id)" class="text-red-500">Sil</button>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>

            <div x-show="adminTab === 'ads'" class="text-center py-20 space-y-12">
                <div class="w-[300px] h-[300px] mx-auto border-4 border-black flex items-center justify-center overflow-hidden">
                    <img :src="adImage">
                </div>
                <input type="file" @change="handleAdUpload" id="adUpload" class="hidden">
                <label for="adUpload" class="inline-block bg-black text-white px-16 py-6 font-black text-sm uppercase tracking-widest cursor-pointer shadow-2xl">Görseli Değiştir</label>
            </div>
        </div>
    </div>

    <script>
        function ascEngine() {
            return {
                currentPage: 'home', adminTab: 'news', selectedItem: null,
                form: { main: '', sub: '', content: '', media: '' },
                adImage: localStorage.getItem('asc_ad_v28') || '',
                
                newsData: JSON.parse(localStorage.getItem('asc_news_v28')) || [
                    { id: 1, title: 'Kürsel Ticarette Mardin Manifestosu', region: 'STRATEJİ', body: 'Brezilya ve Türkiye arasındaki yeni dijital koridor, Mardin’in tarihi derinliğiyle modern lojistiği birleştiriyor. İpek Yolu’nun bu yeni versiyonu sadece ürün değil, kültürel veri taşıyor. Uzmanlar bu hattın önümüzdeki 10 yılın en karlı rotası olacağını öngörüyor.', img: 'https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?w=1600' }
                ],
                authors: JSON.parse(localStorage.getItem('asc_authors_v28')) || [
                    { id: 1, name: 'Ahmet Çınarbaş', title: 'Stratejist', bio: 'Küresel jeopolitik analizler uzmanı.', photo: 'https://i.ibb.co/LhqZz4H/ahmet.jpg' },
                    { id: 2, name: 'M. Beşir Ayanoğlu', title: 'Hukuk Danışmanı', bio: 'Uluslararası hukuk uzmanı.', photo: 'https://i.ibb.co/vYm6D6T/besir.jpg' }
                ],

                init() { this.sync(); },
                openAdmin() { if(prompt("Sistem Giriş Şifresi:") === "47") this.currentPage = 'admin'; },
                
                handleFile(e) {
                    const reader = new FileReader();
                    reader.onload = (f) => this.form.media = f.target.result;
                    reader.readAsDataURL(e.target.files[0]);
                },
                handleAdUpload(e) {
                    const reader = new FileReader();
                    reader.onload = (f) => {
                        this.adImage = f.target.result;
                        localStorage.setItem('asc_ad_v28', this.adImage);
                    };
                    reader.readAsDataURL(e.target.files[0]);
                },

                save() {
                    const isNews = this.adminTab === 'news';
                    const payload = isNews ? 
                        { id: Date.now(), title: this.form.main, region: this.form.sub, body: this.form.content, img: this.form.media } :
                        { id: Date.now(), name: this.form.main, title: this.form.sub, bio: this.form.content, photo: this.form.media };

                    if (isNews) this.newsData.unshift(payload);
                    else this.authors.push(payload);
                    this.sync(); this.form = { main: '', sub: '', content: '', media: '' };
                    alert("Yayın Başarılı.");
                },

                deleteItem(id) {
                    if(confirm('Kayıt silinsin mi?')) {
                        if(this.adminTab === 'news') this.newsData = this.newsData.filter(n => n.id !== id);
                        else this.authors = this.authors.filter(a => a.id !== id);
                        this.sync();
                    }
                },

                viewItem(item) { this.selectedItem = item; this.currentPage = 'reader'; window.scrollTo(0,0); },
                sync() { 
                    localStorage.setItem('asc_news_v28', JSON.stringify(this.newsData)); 
                    localStorage.setItem('asc_authors_v28', JSON.stringify(this.authors)); 
                }
            }
        }
    </script>
</body>
</html>
