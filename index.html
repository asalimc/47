<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumina | Mardin & Brazil Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #f4ecd8; --card-bg: #fdfbf7; --text: #433422; --accent: #a67c52; }
        * { -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; overflow-x: hidden; line-height: 1.6; }
        #progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent); width: 0%; z-index: 10001; }
        nav { background: rgba(244, 236, 216, 0.9); backdrop-filter: blur(15px); padding: 12px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 1000; border-bottom: 1px solid rgba(67, 52, 34, 0.08); }
        .logo { font-family: 'Marcellus', serif; font-size: 1.5rem; letter-spacing: 3px; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .authors-strip { background: var(--card-bg); padding: 20px 0; display: flex; gap: 15px; border-bottom: 1px solid rgba(0,0,0,0.05); overflow-x: auto; scrollbar-width: none; padding-left: 5%; }
        .author-item { text-align: center; width: 85px; flex-shrink: 0; cursor: pointer; }
        .author-item img { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; border: 1.5px solid var(--accent); margin: 0 auto; }
        .author-item span { display: block; font-size: 0.6rem; font-weight: 700; margin-top: 8px; font-family: 'Marcellus'; text-transform: uppercase; }
        .container-main { max-width: 1440px; margin: 20px auto; padding: 0 15px; }
        #news-feed { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { #news-feed { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1100px) { #news-feed { grid-template-columns: repeat(3, 1fr); } }
        .news-card { background: var(--card-bg); border-radius: 20px; overflow: hidden; cursor: pointer; transition: all 0.4s ease; border: 1px solid rgba(0,0,0,0.03); opacity: 0; transform: translateY(15px); }
        .news-card.show { opacity: 1; transform: translateY(0); }
        .news-img { width: 100%; height: 220px; object-fit: cover; }
        .card-body { padding: 22px; }
        .card-body h2 { font-family: 'Marcellus', serif; font-size: 1.25rem; margin: 10px 0; color: #2d2419; }
        .card-body p { font-size: 0.9rem; color: #5c4d3c; font-weight: 300; }
        .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; overflow-y: auto; padding-bottom: 100px; }
        #art-body { font-size: 1.15rem; line-height: 1.8; max-width: 700px; margin: 0 auto; }
        .infografik { background: rgba(166, 124, 82, 0.05); border-left: 4px solid var(--accent); padding: 15px; margin: 20px 0; font-size: 0.95rem; }
        #admin-panel { display: none; background: #0b0b0b; color: #d1d1d1; position: fixed; inset: 0; z-index: 11000; overflow-y: auto; padding: 20px; }
        .input-cms { width: 100%; padding: 12px; margin-bottom: 10px; background: #161616; border: 1px solid #2a2a2a; border-radius: 10px; color: white; font-size: 0.85rem; }
        .admin-btn { padding: 10px 16px; border-radius: 8px; font-size: 0.7rem; font-weight: 700; background: #1a1a1a; transition: 0.3s; color: #888; }
        .admin-btn.active { background: var(--accent); color: white; }
    </style>
</head>
<body>

<div id="progress-bar"></div>
<nav>
    <div class="logo" onclick="location.reload()">LUMINA</div>
    <div class="hidden md:block text-[9px] tracking-[3px] font-bold uppercase opacity-50">Mardin & Brazil Cultural Newsroom</div>
</nav>

<div id="authors-list" class="authors-strip"></div>

<div class="container-main">
    <main id="news-feed"></main>
</div>

<footer class="py-16 text-center opacity-40">
    <button onclick="toggleAdmin()" class="text-[9px] font-bold tracking-[4px] uppercase border-b border-stone-400 pb-1">CMS MASTER ACCESS</button>
</footer>

<div id="overlay" class="overlay">
    <div class="sticky top-0 bg-[#f4ecd8]/90 backdrop-blur-md p-4 flex justify-between items-center z-[10002]">
        <div class="text-[10px] font-bold tracking-widest opacity-40 uppercase">Storytelling Mode</div>
        <button onclick="stopReading(); closeAll();" class="bg-black text-white w-9 h-9 rounded-full">✕</button>
    </div>
    <div id="overlay-content" class="max-w-screen-md mx-auto py-10 px-5"></div>
</div>

<div id="admin-panel">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-8 border-b border-white/5 pb-6">
            <h2 class="text-lg font-serif tracking-[3px] text-accent uppercase">Lumina Master CMS v2.0</h2>
            <button onclick="toggleAdmin()" class="text-[10px] font-bold border border-red-900 text-red-500 px-6 py-2 rounded-xl">KAPAT</button>
        </div>
        <div class="flex gap-3 mb-8">
            <button onclick="setTab('haber')" id="btn-haber" class="admin-btn active">İÇERİK YÖNETİMİ</button>
            <button onclick="setTab('analiz')" id="btn-analiz" class="admin-btn">ANALİZ & SEO</button>
        </div>
        <div id="admin-content" class="grid grid-cols-1 lg:grid-cols-12 gap-8"></div>
    </div>
</div>

<script>
    const initialData = {
        cats: [{id:'c1',name:'Mardin'},{id:'c2',name:'Brezilya'},{id:'c3',name:'Mitoloji'},{id:'c4',name:'Gastronomi'}],
        yazarlar: [{id:'y0', isim:'Haber Merkezi', bio:'Kültür Editörü', img:'https://images.unsplash.com/photo-1495020689067-958852a7765e?w=400'}],
        haberler: [
            {
                id:'h1', 
                title:"[ANALİZ] Mezopotamya ve Amazon: Yılanların Dansı", 
                text:"Gözlerinizi kapatın ve binlerce yıl öncesine gidin... Bir yanda Mezopotamya'nın kavurucu güneşinde taş duvarlara kazınmış Şahmeran, diğer yanda Amazon'un balta girmemiş ormanlarında ateş saçan Boitatá. \n\n### Karşılaştırmalı Mitoloji Tablosu:\n* **Şahmeran (Mardin):** Bilgelik, fedakarlık ve yer altı krallığı.\n* **Boitatá (Brezilya):** Koruyuculuk, ateşin gücü ve nehirlerin bekçisi.\n\nHer iki kültür de doğayı koruyan bir 'yılan figürü' etrafında birleşiyor. Bu bir tesadüf mü, yoksa insanlık hafızasının ortak bir yankısı mı? \n\n**Sizin bu efsanelerle ilgili bir çocukluk anınız var mı?**", 
                img:'https://images.unsplash.com/photo-1516026672322-bc52d61a55d5?w=1000', 
                cid:'c3', 
                yid:'y0',
                seo: 'mardin mitolojisi, brezilya efsaneleri, şahmeran boitata'
            },
            {
                id:'h2', 
                title:"[CANLI] Rio Karnavalı Hazırlıkları: Perde Arkası", 
                text:"Şu anda Rio sokaklarında davul sesleri yükseliyor! Samba okulları son provalarını yaparken, kostüm atölyelerinde binlerce boncuk tek tek dikiliyor. \n\n**İstatistiklerle Karnaval:**\n1. Beklenen Turist: 2.1 Milyon\n2. Ekonomik Katkı: 4 Milyar Real\n3. Katılımcı Okul Sayısı: 12 Elit Grup\n\nMardin'in sessiz sokaklarının aksine, Rio şu an dünyanın en gürültülü ve renkli noktası. \n\n**Karnaval ruhunu Türkiye'de yaşasaydınız hangi şehirde kutlardınız?**", 
                img:'https://images.unsplash.com/photo-1596707323136-22442436f903?w=1000', 
                cid:'c2', 
                yid:'y0',
                seo: 'rio karnavalı canlı, brezilya turları'
            },
            {
                id:'h3', 
                title:"[ÖZEL] Lezzet Köprüsü: Peynir ve Mahlep", 
                text:"Mardin'in kadim Süryani çöreği ile Brezilya'nın meşhur Pão de Queijo'su arasında hiç ummadığınız bir bağ var: Sıcak bir karşılama. \n\n**Lezzet Karşılaştırması:**\n- **Süryani Çöreği:** Mahlep, tarçın ve hurmanın mistik uyumu.\n- **Pão de Queijo:** Manyok nişastası ve yoğun peynirin yumuşak dokusu.\n\nİpek Yolu'ndan Amazon nehir kıyılarına uzanan bu lezzet yolculuğunda ortak nokta, hamurun içine gizlenen 'ev' kokusudur. \n\n**Sizce hangi lezzet Türk damak tadına daha yakın?**", 
                img:'https://images.unsplash.com/photo-1506368249639-73a05d6f6488?w=1000', 
                cid:'c4', 
                yid:'y0',
                seo: 'mardin yemekleri, brezilya mutfağı'
            }
        ]
    };

    let db = JSON.parse(localStorage.getItem('lumina_v7_core')) || initialData;
    let activeTab = 'haber', editingId = null, synth = window.speechSynthesis;

    function sync() {
        localStorage.setItem('lumina_v7_core', JSON.stringify(db));
        renderPortal();
        renderAdmin();
    }

    function renderPortal() {
        const feed = document.getElementById('news-feed');
        feed.innerHTML = db.haberler.map((h, i) => `
            <article class="news-card show" onclick="openNews('${h.id}')" style="transition-delay: ${i*50}ms">
                <img src="${h.img}" class="news-img">
                <div class="card-body">
                    <div class="flex justify-between items-center mb-3">
                        <small class="text-accent font-bold uppercase tracking-widest text-[8px]">${db.cats.find(c=>c.id===h.cid)?.name}</small>
                        <small class="opacity-30 font-bold text-[8px] uppercase">ANALİZ</small>
                    </div>
                    <h2>${h.title}</h2>
                    <p class="line-clamp-3">${h.text.replace(/###/g, '').replace(/\*/g, '')}</p>
                </div>
            </article>
        `).join('');
    }

    function openNews(hid) {
        const h = db.haberler.find(x => x.id === hid);
        document.getElementById('overlay').style.display = 'block';
        document.body.style.overflow = 'hidden';
        
        let formattedText = h.text
            .split('\n\n').map(p => {
                if(p.startsWith('###')) return `<h3 class="text-accent font-serif mt-6 mb-2">${p.replace('###','')}</h3>`;
                if(p.includes('* **')) return `<div class="infografik">${p.replace(/\*/g, '')}</div>`;
                return `<p class="mb-4">${p}</p>`;
            }).join('');

        document.getElementById('overlay-content').innerHTML = `
            <h1 class="text-4xl font-serif mb-8 leading-tight">${h.title}</h1>
            <div class="flex gap-4 mb-8 border-y border-black/5 py-4">
                <button onclick="readOutLoad()" class="bg-accent text-white px-6 py-2 rounded-full text-[10px] font-bold">🔊 SESLİ REHBER</button>
                <button onclick="stopReading()" class="bg-stone-200 px-6 py-2 rounded-full text-[10px] font-bold">🛑 DURDUR</button>
            </div>
            <img src="${h.img}" class="w-full rounded-2xl mb-8">
            <div id="art-body">${formattedText}</div>`;
    }

    function renderAdmin() {
        const container = document.getElementById('admin-content');
        if(activeTab === 'haber') {
            const h = editingId ? db.haberler.find(x => x.id === editingId) : null;
            container.innerHTML = `
                <div class="lg:col-span-5 bg-[#111] p-6 rounded-2xl h-fit">
                    <h4 class="text-[10px] text-accent font-bold mb-4 uppercase">İçerik Editörü</h4>
                    <input type="text" id="h-t" value="${h?.title || ''}" placeholder="Başlık (örn: [CANLI] ...)" class="input-cms">
                    <textarea id="h-x" placeholder="Haber metni, listeler ve sorular..." class="input-cms h-64">${h?.text || ''}</textarea>
                    <input type="text" id="h-s" value="${h?.seo || ''}" placeholder="SEO Etiketleri (virgülle ayır)" class="input-cms">
                    <select id="h-c" class="input-cms">${db.cats.map(c=>`<option value="${c.id}" ${h?.cid===c.id?'selected':''}>${c.name}</option>`).join('')}</select>
                    <button onclick="saveH()" class="w-full bg-accent text-white py-3 rounded-xl font-bold text-[10px] uppercase mt-4">Sisteme İşle</button>
                </div>
                <div class="lg:col-span-7">
                    ${db.haberler.map(x => `<div class="flex justify-between items-center p-4 bg-[#111] rounded-xl mb-3">
                        <div class="text-[11px] truncate w-2/3">${x.title}</div>
                        <div class="flex gap-3"><button onclick="editH('${x.id}')" class="text-accent text-[9px]">DÜZENLE</button></div>
                    </div>`).join('')}
                </div>`;
        } else {
            container.innerHTML = `<div class="lg:col-span-12 p-10 text-center opacity-40 uppercase tracking-widest">SEO Analiz Modülü Aktif: Tüm içerikler Google kriterlerine göre indeksleniyor.</div>`;
        }
    }

    function saveH() {
        const t = document.getElementById('h-t').value, x = document.getElementById('h-x').value, s = document.getElementById('h-s').value, c = document.getElementById('h-c').value;
        if(editingId) {
            let i = db.haberler.find(h => h.id === editingId);
            i.title = t; i.text = x; i.seo = s; i.cid = c;
        } else {
            db.haberler.unshift({id:'h'+Date.now(), title:t, text:x, seo:s, cid:c, yid:'y0', img:'https://images.unsplash.com/photo-1499750310107-5fef28a66643?w=1000'});
        }
        editingId = null; sync();
    }

    function readOutLoad() { 
        stopReading(); 
        const u = new SpeechSynthesisUtterance(document.getElementById('art-body').innerText); 
        u.lang = 'tr-TR'; u.rate = 0.85; u.pitch = 0.9; synth.speak(u); 
    }
    function stopReading() { synth.cancel(); }
    function toggleAdmin() { const p = document.getElementById('admin-panel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; if(p.style.display === 'block') renderAdmin(); }
    function setTab(t) { activeTab = t; renderAdmin(); }
    function editH(id) { editingId = id; renderAdmin(); }
    function closeAll() { document.getElementById('overlay').style.display = 'none'; document.body.style.overflow = 'auto'; }

    window.onscroll = () => { document.getElementById("progress-bar").style.width = (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100 + "%"; };
    window.onload = renderPortal;
</script>
</body>
</html>
