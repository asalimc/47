<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmet ÇINARBAŞ | Mezopotamya'nın Sesi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bellek-mavi: #1D4ED8; 
            --bellek-bg: #F8FAFC;
            --sari-golge: rgba(245, 158, 11, 0.18);
        }
        * { font-style: normal !important; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body { background-color: var(--bellek-bg); font-family: 'Plus Jakarta Sans', sans-serif; color: #1e293b; margin: 0; overflow-x: hidden; }

        .main-layout { 
            max-width: 1600px; margin: 0 auto; 
            display: grid; grid-template-columns: 1.618fr 1fr; 
            gap: 2rem; padding: 1.5rem; height: 85vh;
        }
        @media (max-width: 1024px) { 
            .main-layout { grid-template-columns: 1fr; height: auto; } 
        }

        .glow-card {
            background: #ffffff; border-radius: 40px; 
            box-shadow: 20px 20px 60px var(--sari-golge), -15px -15px 60px rgba(29, 78, 216, 0.04);
            border: 1px solid rgba(251, 191, 36, 0.25);
            position: relative; overflow: hidden; height: 100%;
        }

        .slider-container { height: 100%; width: 100%; position: relative; }
        .slider-wrapper { 
            display: flex; height: 100%; transition: transform 0.8s cubic-bezier(0.65, 0, 0.35, 1); 
        }

        .archive-slide { 
            min-width: 100%; height: 100%; padding: 4rem; 
            display: flex; flex-direction: column; justify-content: center; position: relative; 
        }

        .audio-wave { display: none; align-items: center; gap: 4px; height: 20px; }
        .audio-playing .audio-wave { display: flex; }
        .bar { width: 3px; background: white; border-radius: 10px; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { height: 6px; } 50% { height: 20px; } }

        .progress-container { width: 100%; height: 8px; background: rgba(0,0,0,0.05); border-radius: 4px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: var(--bellek-mavi); transition: width 0.1s linear; }

        .file-number { position: absolute; top: 10px; right: 40px; font-size: 10rem; font-weight: 900; opacity: 0.03; pointer-events: none; }
        
        .premium-sponsor-text {
            background: linear-gradient(to right, #ffffff 20%, #fde68a 40%, #fde68a 60%, #ffffff 80%);
            background-size: 200% auto;
            color: #fff;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
            font-weight: 800;
        }
        @keyframes shine { to { background-position: 200% center; } }

        .sidebar-grid { display: grid; grid-template-rows: 1.618fr 1fr; gap: 2rem; height: 100%; }
    </style>
</head>
<body>

    <header class="max-w-[1600px] mx-auto px-6 py-8 flex justify-between items-center text-slate-900 h-[100px]">
        <div class="text-xl md:text-2xl font-black tracking-tighter uppercase">AHMET ÇINARBAŞ <span class="text-blue-700">BELLEK</span></div>
        <div class="text-[9px] font-black text-slate-400 tracking-[0.4em] uppercase">ARCHIVE 2026</div>
    </header>

    <div class="main-layout">
        <div class="glow-card">
            <div class="slider-container">
                <div class="slider-wrapper" id="mainSlider">
                    <div class="archive-slide">
                        <div class="file-number">01</div>
                        <span class="text-amber-600 font-black uppercase tracking-[0.3em] text-[10px] mb-4 block">DOSYA: SÜLEYMAN’IN MÜHRÜ</span>
                        <h1 class="text-5xl md:text-7xl font-black tracking-tighter text-slate-900 leading-[0.85] mb-10">Kayıp<br>Kapılar</h1>
                        <div class="bg-amber-50/50 p-8 rounded-[2.5rem] border border-amber-100">
                            <div class="flex items-center gap-6">
                                <button onclick="handleAudio('muhur')" class="bg-slate-900 text-white px-10 py-5 rounded-2xl font-black text-[11px] tracking-widest uppercase flex items-center gap-4" id="btn-muhur">
                                    <span id="label-muhur">YAYINI BAŞLAT</span>
                                    <div class="audio-wave"><div class="bar"></div><div class="bar" style="animation-delay:0.2s"></div><div class="bar" style="animation-delay:0.4s"></div></div>
                                </button>
                                <div class="flex-1"><div class="progress-container"><div id="prog-muhur" class="progress-bar"></div></div></div>
                            </div>
                        </div>
                    </div>
                    <div class="archive-slide">
                        <div class="file-number">02</div>
                        <span class="text-blue-600 font-black uppercase tracking-[0.3em] text-[10px] mb-4 block">DOSYA: HINZIR KAPISI</span>
                        <h1 class="text-6xl md:text-8xl font-black tracking-tighter text-slate-900 leading-[0.85] mb-10">Mühürlü<br>Gerçekler</h1>
                        <div class="bg-slate-50 p-8 rounded-[2.5rem] border border-slate-100">
                            <div class="flex items-center gap-6">
                                <button onclick="handleAudio('hinzir')" class="bg-slate-900 text-white px-10 py-5 rounded-2xl font-black text-[11px] tracking-widest uppercase flex items-center gap-4" id="btn-hinzir">
                                    <span id="label-hinzir">YAYINI BAŞLAT</span>
                                    <div class="audio-wave"><div class="bar"></div><div class="bar" style="animation-delay:0.2s"></div><div class="bar" style="animation-delay:0.4s"></div></div>
                                </button>
                                <div class="flex-1"><div class="progress-container"><div id="prog-hinzir" class="progress-bar"></div></div></div>
                            </div>
                        </div>
                    </div>
                    <div class="archive-slide">
                        <div class="file-number">03</div>
                        <span class="text-blue-600 font-black uppercase tracking-[0.3em] text-[10px] mb-4 block">DOSYA: MARDİNSPOR</span>
                        <h1 class="text-6xl md:text-8xl font-black tracking-tighter text-slate-900 leading-[0.85] mb-10">Kırmızı<br>Lacivert</h1>
                        <div class="bg-slate-50 p-8 rounded-[2.5rem] border border-slate-100">
                            <div class="flex items-center gap-6">
                                <button onclick="handleAudio('mardinspor')" class="bg-slate-900 text-white px-10 py-5 rounded-2xl font-black text-[11px] tracking-widest uppercase flex items-center gap-4" id="btn-mardinspor">
                                    <span id="label-mardinspor">YAYINI BAŞLAT</span>
                                    <div class="audio-wave"><div class="bar"></div><div class="bar" style="animation-delay:0.2s"></div><div class="bar" style="animation-delay:0.4s"></div></div>
                                </button>
                                <div class="flex-1"><div class="progress-container"><div id="prog-mardinspor" class="progress-bar"></div></div></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="sidebar-grid">
            <div class="glow-card p-10 flex flex-col justify-center items-center text-center border-b-[8px] border-amber-500">
                <img src="https://pbs.twimg.com/profile_images/1559852899303317504/pjkJwYHb_400x400.jpg" class="w-32 h-32 md:w-40 md:h-40 rounded-[2.5rem] object-cover mb-6 grayscale shadow-xl">
                <h2 class="text-2xl font-black text-slate-900 tracking-tighter">Ahmet Çınarbaş</h2>
                <p class="text-amber-600 font-black text-[10px] tracking-[0.4em] uppercase mb-4">Gazeteci Yazar</p>
                <div class="p-4 bg-slate-50 rounded-2xl text-[11px] font-bold text-slate-400 border border-slate-100 uppercase tracking-tighter">"Mezopotamya'nın mühürlü kodlarını araştıran kadim arşivci."</div>
            </div>

            <div class="glow-card p-8 text-center bg-slate-900 text-white flex flex-col justify-center items-center">
                <p class="text-[9px] font-black tracking-[0.4em] uppercase opacity-50 mb-2">Kültür Sponsoru</p>
                <h3 class="text-4xl font-black tracking-tighter uppercase premium-sponsor-text">Yaşarbey Kahve</h3>
            </div>
        </div>
    </div>

    <script>
        const slider = document.getElementById('mainSlider');
        let currentIdx = 0, isSpeaking = false, isPaused = false;
        
        let slideTimer = setInterval(() => {
            if (!isSpeaking && !isPaused) {
                currentIdx = (currentIdx + 1) % 3;
                slider.style.transform = `translateX(-${currentIdx * 100}%)`;
            }
        }, 3000);

        const synth = window.speechSynthesis;
        let audioCtx, noiseNode, gainNode;

        const texts = {
            muhur: `Dünyanın bazı sırları vardır ki, kitaplarda açık açık yazmaz. İşte Süleyman’ın Mührü de böyle bir sırdır. Tarihin bilinen zamanlarında yaşamış büyük krallardan biri olan Hazreti Süleyman, yalnızca bir kral değil; doğanın, görünmeyen alemlerin, yıldızların ve yer altı varlıklarının da dilini bilen bir bilgeler bilgesiydi. Onun elinde taşıdığı mühür, sadece bir sembol değil, adeta evrenin kilitlerini açan bir anahtardı. O mühür altı köşeli bir yıldız biçimindeydi. Bugün ona hexagram diyorlar, kimileri Davud Yıldızı olarak bilir, kimileri ise onu Süleyman’ın kudret nişanesi olarak tanımlar. Ama özünde bu sembol, ruhla maddeyi, yukarıyla aşağıyı, eril ve dişil enerjileri dengeleyen büyük bir bilgelik haritasıdır. Eskiler, bu sembolün sadece taşlara kazınmadığını, zamanın içine gizlendiğini söyler. Süleyman bu mühürle cinlere, rüzgârlara, hayvanlara ve doğanın tüm unsurlarına hükmedebiliyordu. Ancak bu hüküm, bir zorbalıktan değil; bilgelikten, anlayıştan ve İlahi düzenin farkındalığından doğuyordu. Hazreti Süleyman’ın en büyük sırlarından biri de elindeki yüzüktü. Bu yüzük, öyle sıradan bir yüzük değildi. Rivayetlere göre, Tanrı’dan doğrudan gelen bir izinle yapılmıştı ve üzerinde İlahi İsimlerin mühürlenmiş hali vardı. Bu yüzük sayesinde, sadece doğaya değil, cinlere ve görünmeyen varlıklara da hükmedebiliyordu. Cinler, onun emrine boyun eğerdi; kimini saray inşa etmek için görevlendirir, kimini madenlerden cevher çıkarmakla yükümlü kılardı. Bu yüzük, onların üzerinde bir tür ilahi kontrol sistemiydi. Cinlerin gücü bastırılmamış, yönlendirilmişti. Ve bu yönlendirme, evrensel dengenin korunması içindi. Süleyman’ın bu mühürle mühürlediği sırlar arasında öyle bilgiler vardı ki, yeryüzünün kaderini değiştirecek güçteydi. Ve işte tam da bu nedenle, o bilgiler bir yerlere saklandı. Sadece zamanın ruhuna uygun olanlar, bu sırlara ulaşabilecek şekilde ayarlandı. İşte bu noktada devreye çokça konuşulan ama az bilinen bir yer giriyor: Bermuda Üçgeni. Bermuda Üçgeni, Atlantik Okyanusu’nda, Bermuda, Miami ve Porto Riko arasındaki gizemli bölge. Nice uçakların, gemilerin hiçbir iz bırakmadan kaybolduğu bu alan, sadece deniz kazalarının değil, bilinmeyen bir şeyin izlerini taşıyor olabilir mi? Ezoterik gelenekler, bu bölgenin yeryüzündeki enerji kapılarından biri olduğunu söyler. Bazılarına göre burası zamanın eğildiği, boyutların inceldiği, hatta kayıp kıtaların yankılarının hâlâ duyulabildiği bir geçittir. Bu noktada bazı öğreticiler ve ezoterik kaynaklar, Süleyman’ın mühürlediği bilgilerin bir kısmının bu bölgede saklı olduğunu dile getirir. Çünkü mühür sadece hükmetmek için değil, korumak için de kullanılmıştır. Atlantis’in bilgeleri, Lemurya’nın ışık taşıyıcıları ve kadim uygarlıkların son kalıntıları, belki de bu mühürle korunmuştur. Kim bilir, kaybolan gemiler bir felaketin değil, başka bir boyuta açılan kapının içine çekilmiştir. Bu düşünce ilk başta fantastik gibi gelebilir, ama tarihin tozlu sayfaları arasında benzer motiflerin, sembollerin, hikâyelerin izleri bir araya getirildiğinde insan ister istemez durup düşünmeye başlar. Süleyman’ın Mührü bugün hâlâ pek çok gizli toplulukta, inisiyatik öğreti içinde, hatta tasavvufî yorumlarda karşımıza çıkar. Masonik ritüellerde onun tapınağı simgesel bir merkezdir. Kabala’da, Tanrı’nın isminin mühürlendiği semboldür. Sufi gelenekte ise insan kalbinin içinde açılması gereken bir sır kapısıdır. Ve işin ilginci, bu sembolün yüzyıllar boyunca hem batıda hem doğuda aynı biçimde korunmuş olmasıdır. Bu kadar kadim bir sembolün, farklı coğrafyalarda aynı anlama gelmesi gerçekten de düşündürücüdür.`,
            hinzir: `Burda dinleyeceğiniz tarih kitaplarında yok, internette parça parça fısıldanmış hâlde bile değil. Bunlar ne geçmişte resmiyet kazanmış ne de gelecekte doğrulanacak. Çünkü bazı gerçekler doğrulandığı an sistem çöker. Hınzır Tarikatı: Kapının Koruyucuları mı Yoksa İnsanlık Deneyi mi? Hınzır, eski Sümer tabletlerinde yeraltı kapısı anlamına gelir. Ancak bu sadece kelime anlamıyla sınırlı değildir. Hınzır, milattan önce 2400lü yıllarda kurulan ve günümüzde hâlâ sessizce varlığını sürdüren bir tarikattır. Bu yapı, görünürde bir ruhsal gelişim okulu gibi dursa da, asıl amacı çok daha karanlıktır: Genetik olarak saf olmayan insanları ruhsal kapının dışında tutmak. Hınzırın kurucusu olduğuna inanılan kişi, Sümer dilinde Gizli Gölge anlamına gelen bir varlıktan bahseder: Zun-Na-Ra. Bu figür hiçbir heykelde, tablette ya da çizimde yer almaz. Çünkü onun görünüşü, görenlerin aklını bozacak kadar kompleks yapılıdır. Onun verdiği bilgileri korumakla görevli ilk insanlar zamanla bir tarikat haline dönüşür. İşte o tarikat, tarihte ilk kez Mardin bölgesinde fiziksel olarak örgütlenir. Mardin: Taşların Altında Gizlenen Portal. Mardin, sadece tarihi taş evleriyle değil, taşların altındaki boşluklar ile de tanınmalıdır. 1904 yılında, Fransız Arkeolog Émile de Saurac, Mardin civarındaki Mor Yakup Manastırının alt katmanında tuhaf bir mekanizma buldu. Bu, antik Anunnaki sembolleri taşıyan bir düzeneğe bağlıydı. Baron Rudolf von Sebottendorf: Zamansızlıkla Anlaşma Yapan Adam. Ganzir Tarikatının Avrupalı uzantısı haline gelen Baron, Mardindeki yapıyı çözmek için Adolf Hitlere danışır. Hitler'in Anunnaki Takıntısı. 1936 yılında, SS subayı Wilhelm Tesch, Mardine gizli bir ekip gönderir. Amaç, Mor Yakup Manastırının altındaki kapıyı yeniden aktive etmektir. Mardindeki taş kapının sırrı çözüldüğünde, onun yalnızca bir geçiş noktası değil, başka bir boyuta açılan bir rezonans köprüsü olduğu anlaşılır. Anunnakiler ve Cinler: Aynı Kaynaktan Gelen Farklı Enerjiler. Halk arasında cin olarak bilinen varlıklar, düşük rezonanslı Anunnaki kırılmalarıdır. Mardinde açılan kapının ardından ortaya çıkan ilk varlık Azura-Na adında bir cin-entegrasyon varlığıdır. Zamanın Altında Yaşayanlar. Baronun kaybolduğu gün Berlindeki saatler aniden durur. Aynı saatlerde Mardinde, bir çobanın kaybolduğu rapor edilir. Gerçekler Neden Hiçbir Zaman Açıklanmadı? Çünkü bu gerçek açıklanırsa, dinler, bilim ve tarih aynı anda çökebilir. Hınzır Tarikatı halen aktif. Hınzır Kapısı ve Anunnaki Bağlantısı: Yeraltı Dünyasının Sırları. Hınzır Kapısı, Mezopotamya mitolojisinde, tanrıça Ereshkigalin yönettiği yeraltı dünyasına giriş kapısıdır. Bu kapı evrensel sırların ve insanlığın kökenine dair derin soruların anahtarıdır. Hınzır, sadece bir efsane mi, yoksa evrenin derinliklerine açılan bir kapı mı?`,
            mardinspor: `Mardinspor Ruhu. Renkleri asil Kırmızı laciverttir. Beleş Tepe’ye tırmanan mahzun ama gururlu bakışlar bir maçtan fazlasıdır. Tribünde halka tatlı satanların kokusu, kulağına dayadığı radyodan diğer maçları dinleyen o kadim taraftarlar. Mardinspor bir sevdadır.`
        };

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < buffer.length; i++) data[i] = Math.random() * 2 - 1;
                noiseNode = audioCtx.createBufferSource();
                noiseNode.buffer = buffer; noiseNode.loop = true;
                gainNode = audioCtx.createGain(); gainNode.gain.value = 0;
                noiseNode.connect(gainNode); gainNode.connect(audioCtx.destination);
                noiseNode.start();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function handleAudio(key) {
            initAudio();
            if (isSpeaking && !isPaused) {
                synth.pause(); isPaused = true;
                gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.2);
                document.getElementById('label-'+key).innerText = "DEVAM ET";
                document.getElementById('btn-'+key).classList.remove('audio-playing');
            } else if (isPaused) {
                synth.resume(); isPaused = false;
                gainNode.gain.setTargetAtTime(0.006, audioCtx.currentTime, 0.2);
                document.getElementById('label-'+key).innerText = "DURAKLAT";
                document.getElementById('btn-'+key).classList.add('audio-playing');
            } else {
                startProgram(key);
            }
        }

        function startProgram(key) {
            synth.cancel();
            isSpeaking = true; isPaused = false;
            
            const now = new Date();
            const h = now.getHours();
            const m = now.getMinutes() < 10 ? "sıfır " + now.getMinutes() : now.getMinutes();
            const intro = `Saat ${h} ${m}. Burası Mezopotamyanın sesi, Yaşarbey Sponsorluğunda proğram başlıyor. `;
            
            const utter = new SpeechSynthesisUtterance(intro + texts[key]);
            utter.lang = 'tr-TR'; utter.rate = 0.92;

            utter.onstart = () => {
                document.getElementById('btn-'+key).classList.add('audio-playing');
                document.getElementById('label-'+key).innerText = "DURAKLAT";
                gainNode.gain.setTargetAtTime(0.006, audioCtx.currentTime, 0.5);
            };

            utter.onend = () => {
                isSpeaking = false; isPaused = false;
                gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5);
                document.getElementById('btn-'+key).classList.remove('audio-playing');
                document.getElementById('label-'+key).innerText = "YAYINI BAŞLAT";
                document.getElementById('prog-'+key).style.width = '0%';
            };

            utter.onboundary = (e) => {
                const totalLen = intro.length + texts[key].length;
                document.getElementById('prog-'+key).style.width = (e.charIndex / totalLen * 100) + '%';
            };
            synth.speak(utter);
        }
    </script>
</body>
</html>
