<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARDIN x BRAZIL | Living Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;1,400&family=Montserrat:wght@300;700;900&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --mardin: #d4a373; --brazil: #009b3a; --dark: #050505; 
            --white: #ffffff; --dynamic-weight: 700;
        }

        /* Tema Ayarları */
        body.theme-mardin { --theme-accent: var(--mardin); --bg: #fdfaf5; }
        body.theme-brazil { --theme-accent: var(--brazil); --bg: #f5fdf7; }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: default; } /* Fare Normal Yapıldı */
        
        body { 
            background: var(--bg, #fafaf9); font-family: 'Montserrat', sans-serif; 
            color: var(--dark); overflow-x: hidden; transition: background 1s ease;
        }

        /* Glassmorphism Ticker */
        .glass-ticker {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 1200px; padding: 12px 25px;
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px; z-index: 5000; overflow: hidden;
        }
        .ticker-content { display: flex; white-space: nowrap; font-size: 10px; font-weight: 900; letter-spacing: 2px; animation: slide 20s linear infinite; }
        @keyframes slide { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        header { padding: 140px 5% 40px; display: flex; justify-content: space-between; align-items: flex-end; }
        .brand-title { font-family: 'Playfair Display'; font-size: clamp(3rem, 10vw, 8rem); line-height: 0.8; letter-spacing: -5px; }
        .brand-title span { font-weight: var(--dynamic-weight); }

        .master-wrapper { padding: 0 5% 60px; display: grid; grid-template-columns: repeat(12, 1fr); gap: 30px; }

        /* Ana Görsel Bölümü */
        .featured-mask { grid-column: span 12; height: 60vh; border-radius: 40px; overflow: hidden; position: relative; }
        @media (min-width: 1024px) { .featured-mask { grid-column: span 12; height: 75vh; } }
        .featured-mask img { width: 100%; height: 100%; object-fit: cover; }

        /* --- YAN YANA VİDEO PORTALI (GÜNCELLENDİ) --- */
        .video-container {
            grid-column: span 12; display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
            margin-top: 20px; height: 50vh;
        }
        @media (max-width: 768px) { .video-container { grid-template-columns: 1fr; height: 80vh; } }

        .video-box { 
            position: relative; border-radius: 30px; overflow: hidden; background: #000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); transition: transform 0.4s ease;
        }
        .video-box:hover { transform: scale(1.02); }
        .video-box iframe { width: 100%; height: 100%; border: none; opacity: 0.8; }
        
        .video-label {
            position: absolute; bottom: 20px; left: 20px; color: white;
            font-family: 'Playfair Display'; font-size: 1.5rem; font-style: italic;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5); pointer-events: none;
        }

        /* Footer */
        footer { padding: 60px 5%; background: white; border-top: 1px solid #eee; text-align: center; }
    </style>
</head>
<body class="theme-mardin">

    <div class="glass-ticker">
        <div class="ticker-content" id="dynamic-ticker">
            CONNECTING MARDIN & BRAZIL ● LIVE DATA FEED ACTIVE ● CULTURAL SYNERGY 100% ●
        </div>
    </div>

    <header>
        <div class="brand-title">MARDIN<br><span id="brazil-text" style="color:var(--brazil)">BRAZIL</span></div>
        <div style="writing-mode: vertical-rl; font-size: 10px; font-weight: 900; letter-spacing: 5px; opacity: 0.3;">
            <span id="local-time">00:00</span> © 2026
        </div>
    </header>

    <div class="master-wrapper">
        <div class="featured-mask">
            <img src="https://images.unsplash.com/photo-1548013146-72479768bbaa?auto=format&fit=crop&w=1600">
            <div style="position: absolute; inset: 0; background: linear-gradient(transparent, rgba(0,0,0,0.7)); padding: 40px; display: flex; flex-direction: column; justify-content: flex-end; color: white;">
                <h2 style="font-family: 'Playfair Display'; font-size: 3rem;">Sentezin Ruhu</h2>
                <p style="font-family: 'Lora'; opacity: 0.8;">İki farklı dünya, tek bir dijital platformda buluşuyor.</p>
            </div>
        </div>

        <div class="video-container">
            <div class="video-box">
                <iframe src="https://www.youtube.com/embed/3r9cOuTmVu4?autoplay=1&mute=1&loop=1&playlist=3r9cOuTmVu4&controls=0" allow="autoplay"></iframe>
                <div class="video-label">Mardin, Turkey</div>
            </div>
            <div class="video-box">
                <iframe src="https://www.youtube.com/embed/E6Ndg4pvLh8?autoplay=1&mute=1&loop=1&playlist=E6Ndg4pvLh8&controls=0" allow="autoplay"></iframe>
                <div class="video-label">Amazon, Brazil</div>
            </div>
        </div>
    </div>

    <footer>
        <h2 style="font-family: 'Playfair Display'; font-size: 2rem;">M|B</h2>
        <p style="font-size: 10px; letter-spacing: 3px; margin-top: 10px; opacity: 0.5;">THE LIVING INTERFACE PROJECT</p>
    </footer>

    <script>
        // Akıllı Dil ve Tema Kontrolü
        function initApp() {
            const userLang = navigator.language.startsWith('tr') ? 'tr' : 'en';
            const isBrazil = true; // Varsayılan Brezilya teması (Mardin için false yapın)

            document.body.className = isBrazil ? "theme-brazil" : "theme-mardin";

            const tickerText = {
                tr: "● CANLI VERİ AKIŞI AKTİF ● MARDİN VE BREZİLYA SENKRONİZE EDİLDİ ● 2026 VİZYONU ●",
                en: "● LIVE DATA FEED ACTIVE ● MARDIN & BRAZIL SYNCHRONIZED ● 2026 VISION ●"
            };
            document.getElementById('dynamic-ticker').innerText = (tickerText[userLang] + " ").repeat(10);
        }

        // Canlı Saat
        setInterval(() => {
            const now = new Date();
            document.getElementById('local-time').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        }, 1000);

        window.onload = initApp;
    </script>
</body>
</html>
