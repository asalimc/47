<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAZETECİ AHMET ÇINARBAŞ | Brezilya Arşivi</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600;900&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --mardin: #D4A373; 
            --brazil: #064E3B; 
            --dark: #0c0c0c; 
            --radius: 45px;
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f4f4f7; font-family: 'Montserrat', sans-serif; }

        /* HEADER TASARIMI */
        header { 
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(255,255,255,0.9); 
            backdrop-filter: blur(20px); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        /* 1. LOGO ESTETİĞİ */
        .logo { 
            font-family: 'Montserrat', sans-serif; 
            font-size: 1.5rem; 
            text-decoration: none; 
            color: #000; 
            letter-spacing: -1px;
            transition: var(--transition);
        }
        .logo .mardin-part { font-weight: 900; color: #000; }
        .logo .brazil-part { font-weight: 300; font-style: italic; color: var(--mardin); margin-left: 2px; }
        .logo:hover { letter-spacing: 0px; }

        /* 2. VERIFIED & PROFILE AREA */
        .profile-section { display: flex; align-items: center; gap: 15px; position: relative; }
        
        .name-box { text-align: right; }
        .author-name { 
            font-size: 11px; 
            font-weight: 900; 
            display: flex; 
            align-items: center; 
            gap: 5px; 
            justify-content: flex-end;
        }

        /* VERIFIED TOOLTIP */
        .verified-badge { 
            color: #1DA1F2; 
            font-size: 14px; 
            cursor: help; 
            position: relative;
        }
        .verified-badge:hover::after {
            content: "Resmi Gazeteci Arşivi";
            position: absolute;
            top: 25px;
            right: 0;
            background: var(--dark);
            color: white;
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 10px;
            white-space: nowrap;
            font-weight: 400;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            z-index: 100;
        }

        .job-title { font-size: 9px; color: #888; font-weight: 600; display: block; }

        /* 3. PROFIL AYDINLATMASI (GLOW) */
        .profile-img-wrapper {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            position: relative;
            transition: var(--transition);
            cursor: pointer;
        }
        .profile-img-wrapper img { 
            width: 100%; 
            height: 100%; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 2px solid white;
            position: relative;
            z-index: 2;
        }
        .profile-img-wrapper::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 50%;
            background: var(--mardin);
            opacity: 0;
            transition: var(--transition);
            filter: blur(8px);
            z-index: 1;
        }
        .profile-img-wrapper:hover::before { opacity: 0.6; transform: scale(1.2); }
        .profile-img-wrapper:hover { transform: scale(1.05); }

        /* GRID & CARDS (Önceki yapı korunuyor) */
        .container { display: grid; grid-template-columns: repeat(12, 1fr); gap: 25px; padding: 25px 5%; max-width: 1600px; margin: 0 auto; }
        .hero { grid-column: span 8; height: 500px; border-radius: var(--radius); overflow: hidden; position: relative; background: #000; cursor: pointer; }
        .hero img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; transition: 1s; }
        .hero:hover img { transform: scale(1.05); opacity: 0.9; }
        .side-stack { grid-column: span 4; display: flex; flex-direction: column; gap: 25px; }
        .card { flex: 1; background: var(--dark); border-radius: 35px; padding: 30px; color: white; transition: var(--transition); border: 1px solid rgba(255,255,255,0.05); }
        .card:hover { border-color: var(--mardin); transform: translateY(-5px); }

    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">
            <span class="mardin-part">MARDIN</span><span class="brazil-part">BRAZIL</span>
        </a>

        <div class="profile-section">
            <div class="name-box">
                <div class="author-name">
                    AHMET ÇINARBAŞ 
                    <span class="verified-badge">●</span>
                </div>
                <span class="job-title">GAZETECİ</span>
            </div>
            <div class="profile-img-wrapper" onclick="alert('Arşiv Sayfasına Gidiliyor...')">
                <img src="https://pbs.twimg.com/media/GifApT2XEAAqees.jpg" alt="Ahmet Çınarbaş">
            </div>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <img src="https://pbs.twimg.com/media/GIlW38KWEAALcYB?format=jpg&name=small" alt="Brezilya">
            <div style="position:absolute; bottom:40px; left:40px; color:white;">
                <h1 style="font-family:'Playfair Display'; font-size:3rem;">Röportaj: Brezilya</h1>
            </div>
        </section>

        <aside class="side-stack">
            <div class="card">
                <span style="font-size:10px; color:var(--mardin); font-weight:900; letter-spacing:2px;">GOOGLE NEWS</span>
                <p style="margin-top:15px; font-weight:600;">Mardin Gastronomi Fuarı Başladı</p>
            </div>
            <div class="card">
                <span style="font-size:10px; color:var(--mardin); font-weight:900; letter-spacing:2px;">GOOGLE CALENDAR</span>
                <p style="margin-top:15px; font-weight:600;">Rio Karnavalı Hazırlıkları</p>
            </div>
        </aside>
    </main>

</body>
</html>
