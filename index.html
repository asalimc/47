<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Global Culture & News</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfbf7; --text: #1a1a1a; --muted: #718096; --accent: #c49b66;
            --white: #ffffff; --transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; overflow-x: hidden; }

        /* --- UI COMPONENTS --- */
        #progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent); width: 0%; z-index: 10001; }
        nav { background: rgba(253, 251, 247, 0.9); backdrop-filter: blur(15px); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.03); }
        .logo { font-family: 'Marcellus', serif; font-size: 1.8rem; letter-spacing: 3px; cursor: pointer; text-transform: uppercase; }
        .admin-trigger { cursor: pointer; opacity: 0.05; font-size: 10px; }

        .authors-strip { background: var(--white); padding: 25px 0; display: flex; justify-content: center; gap: 20px; border-bottom: 1px solid #f1f1f1; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .author-item { cursor: pointer; text-align: center; width: 85px; transition: var(--transition); flex: 0 0 auto; }
        .author-item img { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; border: 1px solid var(--accent); padding: 3px; }
        .author-item span { display: block; font-size: 0.7rem; font-weight: 700; margin-top: 8px; font-family: 'Marcellus'; }

        .container { max-width: 1400px; margin: 30px auto; display: grid; grid-template-columns: 250px 1fr; gap: 30px; padding: 0 20px; }
        #news-feed { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        
        .news-card { background: var(--white); border-radius: 20px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.02); cursor: pointer; transition: var(--transition); display: flex; flex-direction: column; height: 100%; border: 1px solid rgba(0,0,0,0.02); }
        .news-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .news-img { width: 100%; height: 220px; object-fit: cover; }
        .card-body { padding: 20px; flex-grow: 1; }
        .card-body h2 { font-family: 'Marcellus', serif; font-size: 1.4rem; margin: 10px 0; line-height: 1.2; }

        /* --- ADMIN CMS (FULL RESPONSIVE) --- */
        .admin-panel { display: none; position: fixed; inset: 0; background: #f4f7f6; z-index: 12000; padding: 20px; overflow-y: auto; }
        .cms-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .cms-card { background: #fff; padding: 20px; border-radius: 15px; border: 1px solid #ddd; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stat-card { background: var(--accent); color: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; text-align: center; }
        
        /* Analytics Table */
        .analyt-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        .analyt-table th, .analyt-table td { padding: 8px; text-align: left; border-bottom: 1px solid #eee; }

        /* Overlay */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: none; overflow-y: auto; padding-bottom: 80px; }
        .close-overlay { position: fixed; top: 20px; right: 20px; cursor: pointer; background: var(--text); color: #fff; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .article-wrap { max-width: 800px; margin: 40px auto; padding: 0 20px; }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
            .sidebar-left { display: none; }
            .logo { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div id="progress-bar"></div>

<nav>
    <div class="logo" onclick="location.reload()">LUMINA</div>
    <div style="display:flex; align-items:center; gap:15px;">
        <div id="current-city" style="font-size: 0.7rem; letter-spacing: 1px; font-weight: 700;">LOCALIZING...</div>
        <div class="admin-trigger" onclick="openCMS()">[L_CORE]</div>
    </div>
</nav>

<div id="authors-view" class="authors-strip"></div>

<div class="container">
    <aside class="sidebar-left">
        <h4 id="ui-cats" style="font-family:'Marcellus'; border-bottom:1px solid #eee; padding-bottom:10px;">CATEGORIES</h4>
        <div id="cat-list" style="font-size: 0.9rem; line-height: 2.5;"></div>
        <div id="ad-left" onclick="trackClick('ad-left')" style="margin-top:20px; border-radius:15px; overflow:hidden; cursor:pointer;"></div>
    </aside>
    <main id="news-feed"></main>
</div>

<div id="adminPanel" class="admin-panel">
    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
        <h2 style="font-family:'Marcellus'">Lumina Analytics & Control</h2>
        <button class="btn" style="background:#000; color:#fff; padding:10px 20px; border-radius:50px;" onclick="closeCMS()">Exit Panel</button>
    </div>

    <div class="cms-grid">
        <div class="cms-card" style="grid-column: span 2;">
            <h3>Ziyaretçi ve Tıklama Analitiği</h3>
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap:10px;">
                <div class="stat-card"><small>Toplam Ziyaret</small><div id="stat-total-v" style="font-size:24px; font-weight:bold;">0</div></div>
                <div class="stat-card"><small>Haber Tıklama</small><div id="stat-news-c" style="font-size:24px; font-weight:bold;">0</div></div>
                <div class="stat-card"><small>Reklam Tıklama</small><div id="stat-ad-c" style="font-size:24px; font-weight:bold;">0</div></div>
            </div>
            <table class="analyt-table">
                <thead><tr><th>Ülke/Cihaz</th><th>Giriş</th><th>Süre</th><th>Tarih</th></tr></thead>
                <tbody id="analyt-logs"></tbody>
            </table>
        </div>
        
        <div class="cms-card">
            <h3>Haber & AI Motoru</h3>
            <button class="btn" style="width:100%; background:#6c5ce7; color:white; margin-bottom:10px;" onclick="generateAINews()">AI Haber Üret</button>
            <input type="hidden" id="edit-id"><input type="text" id="newsTitle" placeholder="Başlık">
            <textarea id="newsContent" placeholder="İçerik..." rows="3"></textarea>
            <button class="btn" style="width:100%; background:var(--accent); color:white;" onclick="saveNews()">Kaydet</button>
            <div id="mgmt-news-list" style="max-height:150px; overflow-y:auto; margin-top:10px;"></div>
        </div>
    </div>
</div>

<div id="overlay" class="overlay">
    <div class="close-overlay" onclick="closeAll()">✕</div>
    <div id="overlay-content" class="article-wrap"></div>
</div>

<script>
    const _KEY = "NzQ=";
    let db = JSON.parse(localStorage.getItem('lumina_v14')) || {
        news: [{id:1, title: "Mardin Gümüşü", text: "Telkari sanatı canlanıyor...", img: "https://via.placeholder.com/800", cat: "Culture", clicks: 0}],
        authors: [{id:1, name: "VEDAT M.", bio: "Culture Writer", img: "https://via.placeholder.com/150", clicks: 0}],
        cats: ['Express', 'Society', 'Heritage'],
        ads: { left: {img:'', url:'#', clicks:0}, right: {img:'', url:'#', clicks:0} },
        stats: { totalViews: 0, newsClicks: 0, adClicks: 0, logs: [] }
    };

    // --- GLOBAL DİL ALGISI & YERELLEŞTİRME ---
    const userLang = navigator.language || navigator.userLanguage;
    const isPT = userLang.includes('pt');
    const isTR = userLang.includes('tr');

    const i18n = {
        tr: { cats: "KATEGORİLER", listen: "Yazıyı Dinle", local: "MARDİN • YEREL", msg: "Hoş geldiniz" },
        pt: { cats: "CATEGORIAS", listen: "Ouvir Artigo", local: "SAO PAULO • LOCAL", msg: "Bem-vindo" },
        en: { cats: "CATEGORIES", listen: "Listen Article", local: "GLOBAL • NEWS", msg: "Welcome" }
    };
    const lang = isTR ? i18n.tr : (isPT ? i18n.pt : i18n.en);

    // --- ANALYTICS ENGINE ---
    function initStats() {
        const sessionStart = Date.now();
        db.stats.totalViews++;
        const log = {
            loc: userLang.toUpperCase(),
            device: window.innerWidth < 600 ? "Mobile" : "Desktop",
            time: new Date().toLocaleTimeString(),
            duration: "Aktif..."
        };
        db.stats.logs.unshift(log);
        if(db.stats.logs.length > 20) db.stats.logs.pop();
        sync();

        window.addEventListener('beforeunload', () => {
            const stay = Math.round((Date.now() - sessionStart) / 1000);
            db.stats.logs[0].duration = stay + " sn";
            localStorage.setItem('lumina_v14', JSON.stringify(db));
        });
    }

    function trackClick(type, id) {
        if(type === 'news') { db.stats.newsClicks++; const n = db.news.find(x=>x.id==id); if(n) n.clicks++; }
        if(type === 'ad-left') { db.stats.adClicks++; db.ads.left.clicks++; if(db.ads.left.url !== '#') window.open(db.ads.left.url); }
        sync();
    }

    // --- CMS CORE ---
    function openCMS() { if(prompt("Pass:") === atob(_KEY).split("").reverse().join("")) document.getElementById('adminPanel').style.display='block'; renderAdmin(); }
    function closeCMS() { document.getElementById('adminPanel').style.display='none'; }
    function sync() { localStorage.setItem('lumina_v14', JSON.stringify(db)); renderApp(); renderAdmin(); }

    async function saveNews() {
        const id = document.getElementById('edit-id').value;
        const data = { id: id ? Number(id) : Date.now(), title: document.getElementById('newsTitle').value, text: document.getElementById('newsContent').value, img: "https://via.placeholder.com/800", cat: "Global", clicks: 0 };
        if(id) { const idx = db.news.findIndex(x=>x.id==id); db.news[idx] = data; } else { db.news.unshift(data); }
        sync();
    }

    function generateAINews() {
        db.news.unshift({ id: Date.now(), title: "AI: Global Cultural Synthesis", text: "Automated analysis of Mardin and Sao Paulo...", img: "https://via.placeholder.com/800", cat: "AI News", clicks: 0 });
        sync();
    }

    // --- RENDER ---
    function renderApp() {
        document.getElementById('ui-cats').innerText = lang.cats;
        document.getElementById('current-city').innerText = lang.local;
        
        document.getElementById('authors-view').innerHTML = db.authors.map(a => `<div class="author-item" onclick="openAuthor('${a.name}', '${a.bio}', '${a.img}')"><img src="${a.img}"><span>${a.name}</span></div>`).join('');
        document.getElementById('news-feed').innerHTML = db.news.map(n => `<article class="news-card" onclick="trackClick('news', ${n.id}); openNews('${n.title.replace(/'/g, "\\'")}', '${n.text.replace(/'/g, "\\'")}', '${n.img}')"><img src="${n.img}" class="news-img"><div class="card-body"><small style="color:var(--accent); font-weight:bold;">${n.cat.toUpperCase()}</small><h2>${n.title}</h2><p>${n.text.substring(0,80)}...</p></div></article>`).join('');
        document.getElementById('cat-list').innerHTML = db.cats.map(c => `<div>• ${c}</div>`).join('');
        document.getElementById('ad-left').innerHTML = db.ads.left.img ? `<img src="${db.ads.left.img}" style="width:100%">` : `<div style="height:200px; background:#eee; display:flex; align-items:center; justify-content:center; color:#ccc;">BANNER</div>`;
    }

    function renderAdmin() {
        document.getElementById('stat-total-v').innerText = db.stats.totalViews;
        document.getElementById('stat-news-c').innerText = db.stats.newsClicks;
        document.getElementById('stat-ad-c').innerText = db.stats.adClicks;
        document.getElementById('analyt-logs').innerHTML = db.stats.logs.map(l => `<tr><td>${l.loc} / ${l.device}</td><td>${l.time}</td><td>${l.duration}</td><td>Today</td></tr>`).join('');
        document.getElementById('mgmt-news-list').innerHTML = db.news.map(n => `<div style="font-size:11px; margin-bottom:5px;">${n.title.substring(0,15)}.. (${n.clicks} tık) <button onclick="deleteItem('news', ${n.id})">X</button></div>`).join('');
    }

    function openNews(title, text, img) {
        document.getElementById('overlay').style.display = 'block';
        document.body.style.overflow = 'hidden';
        document.getElementById('overlay-content').innerHTML = `<h1 style="font-family:'Marcellus'; font-size:2.5rem;">${title}</h1><button class="btn" style="background:var(--accent); color:white; border-radius:50px; padding:10px 20px; border:none; cursor:pointer;" onclick="speakText('atxt')">${lang.listen}</button><img src="${img}" style="width:100%; border-radius:20px; margin:20px 0;"><div id="atxt" style="font-size:1.2rem; line-height:1.8;">${text}</div>`;
    }

    function openAuthor(name, bio, img) {
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('overlay-content').innerHTML = `<div style="text-align:center;"><img src="${img}" style="width:120px; border-radius:50%; margin-bottom:15px;"><h2 style="font-family:'Marcellus';">${name}</h2><button class="btn" style="background:var(--accent); color:white; border-radius:50px; padding:8px 15px; border:none;" onclick="speakText('btxt')">${lang.listen}</button><p id="btxt" style="margin-top:20px;">${bio}</p></div>`;
    }

    function speakText(id) { const u = new SpeechSynthesisUtterance(document.getElementById(id).innerText); u.lang = userLang; speechSynthesis.speak(u); }
    function closeAll() { speechSynthesis.cancel(); document.getElementById('overlay').style.display = 'none'; document.body.style.overflow = 'auto'; }
    function deleteItem(type, id) { db[type] = db[type].filter(x=>x.id != id); sync(); }

    initStats();
    renderApp();
</script>
</body>
</html>
