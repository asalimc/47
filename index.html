<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumina | Global Culture & Heritage</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --bg: #f4ecd8; 
            --card-bg: #fdfbf7;
            --text: #433422; 
            --accent: #a67c52; 
        }
        
        * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; scroll-behavior: smooth; overflow-x: hidden; line-height: 1.6; }
        
        body::before { content: ""; position: fixed; inset: 0; opacity: 0.04; pointer-events: none; z-index: 9999; background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png'); }

        #progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent); width: 0%; z-index: 10001; }
        
        nav { background: rgba(244, 236, 216, 0.9); backdrop-filter: blur(15px); padding: 12px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 1000; border-bottom: 1px solid rgba(67, 52, 34, 0.08); }
        .logo { font-family: 'Marcellus', serif; font-size: 1.5rem; letter-spacing: 3px; cursor: pointer; text-transform: uppercase; font-weight: bold; }

        .authors-strip { background: var(--card-bg); padding: 20px 0; display: flex; justify-content: flex-start; md:justify-content: center; gap: 15px; border-bottom: 1px solid rgba(0,0,0,0.05); overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding-left: 5%; padding-right: 5%; }
        .authors-strip::-webkit-scrollbar { display: none; }
        .author-item { cursor: pointer; text-align: center; width: 85px; flex-shrink: 0; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .author-item:active { transform: scale(0.95); }
        .author-item img { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; border: 1.5px solid var(--accent); padding: 2px; margin: 0 auto; filter: sepia(20%); }
        .author-item span { display: block; font-size: 0.6rem; font-weight: 700; margin-top: 8px; font-family: 'Marcellus'; text-transform: uppercase; white-space: nowrap; letter-spacing: 1px; }

        .container-main { max-width: 1440px; margin: 20px auto; padding: 0 15px; }
        #news-feed { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 20px; 
        }
        @media (min-width: 768px) { #news-feed { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1100px) { #news-feed { grid-template-columns: repeat(3, 1fr); } }

        .news-card { background: var(--card-bg); border-radius: 20px; overflow: hidden; box-shadow: 0 4px 20px rgba(67, 52, 34, 0.04); cursor: pointer; transition: all 0.4s ease; border: 1px solid rgba(0,0,0,0.03); opacity: 0; transform: translateY(15px); }
        .news-card.show { opacity: 1; transform: translateY(0); }
        .news-card:hover { transform: translateY(-8px); box-shadow: 0 15px 35px rgba(67, 52, 34, 0.08); }
        .news-img { width: 100%; height: 220px; object-fit: cover; transition: 0.5s; }
        .news-card:hover .news-img { transform: scale(1.03); }
        .card-body { padding: 22px; }
        .card-body h2 { font-family: 'Marcellus', serif; font-size: 1.25rem; margin: 10px 0; line-height: 1.4; color: #2d2419; }
        .card-body p { font-size: 0.9rem; color: #5c4d3c; line-height: 1.7; font-weight: 300; }

        .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; overflow-y: auto; padding-bottom: 100px; }
        #art-body { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 400; color: #2d2419; max-width: 700px; margin: 0 auto; }
        #art-body br { content: ""; display: block; margin: 1.5em 0; }

        #admin-panel { display: none; background: #0b0b0b; color: #d1d1d1; position: fixed; inset: 0; z-index: 11000; overflow-y: auto; padding: 20px; }
        .input-cms { width: 100%; padding: 12px 15px; margin-bottom: 12px; background: #161616; border: 1px solid #2a2a2a; border-radius: 10px; color: white; font-size: 0.85rem; outline: none; transition: 0.3s; }
        .input-cms:focus { border-color: var(--accent); background: #1c1c1c; }
        .admin-btn { padding: 10px 16px; border-radius: 8px; font-size: 0.7rem; font-weight: 700; background: #1a1a1a; transition: 0.3s; letter-spacing: 1px; color: #888; }
        .admin-btn.active { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(166, 124, 82, 0.3); }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(166, 124, 82, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div id="progress-bar"></div>
<nav>
    <div class="logo" onclick="location.reload()">LUMINA</div>
    <div class="hidden md:block text-[9px] tracking-[3px] font-bold uppercase opacity-50">Mardin • Kehribar Gökyüzü</div>
    <div class="md:hidden text-[8px] font-black opacity-40">v6.0</div>
</nav>

<div id="authors-list" class="authors-strip"></div>

<div class="container-main">
    <main id="news-feed"></main>
</div>

<footer class="py-16 text-center opacity-40 hover:opacity-100 transition">
    <button onclick="toggleAdmin()" class="text-[9px] font-bold tracking-[4px] uppercase border-b border-stone-400 pb-1">CMS MASTER ACCESS</button>
</footer>

<div id="overlay" class="overlay">
    <div class="sticky top-0 bg-[#f4ecd8]/90 backdrop-blur-md p-4 flex justify-between items-center z-[10002] border-bottom border-black/5">
         <div class="reader-bar">
            <div class="reader-btn px-3 py-1 bg-black/5 rounded-full cursor-pointer" onclick="readOutLoad()">🔊 OKU</div>
            <div class="reader-btn px-3 py-1 bg-black/5 rounded-full cursor-pointer" onclick="stopReading()">🛑 DUR</div>
        </div>
        <button onclick="stopReading(); closeAll();" class="bg-black text-white w-9 h-9 rounded-full flex items-center justify-center font-bold">✕</button>
    </div>
    <div id="overlay-content" class="max-w-screen-md mx-auto py-10 px-5"></div>
</div>

<div id="admin-panel">
    <div class="max-w-5xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-10 border-b border-white/5 pb-8">
            <div>
                <h2 class="text-lg font-serif tracking-[4px] text-accent italic uppercase">Lumina Master CMS</h2>
                <p class="text-[9px] opacity-30 uppercase tracking-[2px] mt-1">Core Database Interface</p>
            </div>
            <button onclick="toggleAdmin()" class="w-full md:w-auto text-[10px] font-bold border border-red-900/50 text-red-500 px-8 py-3 rounded-xl hover:bg-red-500 hover:text-white transition">PANELİ KAPAT</button>
        </div>
        
        <div class="flex gap-3 mb-8 overflow-x-auto pb-2 no-scrollbar">
            <button onclick="setTab('haber')" id="btn-haber" class="admin-btn active uppercase">Haberler</button>
            <button onclick="setTab('yazar')" id="btn-yazar" class="admin-btn uppercase">Yazarlar</button>
            <button onclick="setTab('cat')" id="btn-cat" class="admin-btn uppercase">Kategoriler</button>
        </div>

        <div id="admin-content" class="grid grid-cols-1 lg:grid-cols-12 gap-8"></div>
    </div>
</div>

<script>
    const initialData = {
        cats: [{id:'c1',name:'Mardin'},{id:'c2',name:'Dünya'},{id:'c3',name:'Analiz'},{id:'c4',name:'Mutfak'},{id:'c5',name:'Sanat'}],
        yazarlar: [
            {id:'y0', isim:'Haber Merkezi', bio:'Lumina Kurumsal', img:'https://images.unsplash.com/photo-1495020689067-958852a7765e?w=400'},
            {id:'y1', isim:'Ahmet ÇINARBAŞ', bio:'Siyasi Analist', img:'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=400'},
            {id:'y2', isim:'Selin IŞIK', bio:'Kültür Sanat Yazarı', img:'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=400'},
            {id:'y3', isim:'Marco Polo', bio:'Gastronomi Gezgini', img:'https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=400'}
        ],
        haberler: [
            {id:'h1', title:"Taşın Belleği: Mardin'in Mimari Mirası", text:"Mardin, sadece bir şehir değil; Mezopotamya'nın kalbinde yükselen bir açık hava müzesidir. Şehrin dar sokaklarında yürürken, her taşın altında binlerce yıllık bir hikaye yatar. Artuklu mimarisinin en zarif örneklerini sunan evler, güneşin batışıyla birlikte altın rengine bürünür.", img:'https://images.unsplash.com/photo-1582738411706-bfc8e691d1c2?w=1000', cid:'c1', yid:'y0'},
            {id:'h2', title:"Tokyo'nun Sessizliği: Modernite ve Gelenek", text:"Shibuya Kavşağı'nın bitmek bilmeyen gürültüsünden sadece on dakika uzaklıkta, Meiji Tapınağı'nın ormanında tam bir sessizlik hakimdir. Tokyo, bu zıtlıkların şehridir.", img:'https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?w=1000', cid:'c2', yid:'y0'}
        ]
    };

    let db = JSON.parse(localStorage.getItem('lumina_v6_core')) || initialData;
    let activeTab = 'haber', tempImg = "", editingId = null;
    let synth = window.speechSynthesis;

    function sync() {
        localStorage.setItem('lumina_v6_core', JSON.stringify(db));
        renderPortal();
        renderAdmin();
        editingId = null;
        tempImg = "";
    }

    function renderPortal() {
        // Haber Merkezi yazar şeridinde gözükmesin istiyorsanız filter ekleyebilirsiniz
        const authorsList = document.getElementById('authors-list');
        authorsList.innerHTML = db.yazarlar.filter(y => y.id !== 'y0').map(y => `
            <div class="author-item" onclick="openAuthor('${y.id}')">
                <img src="${y.img}">
                <span>${y.isim}</span>
            </div>
        `).join('');

        const feed = document.getElementById('news-feed');
        feed.innerHTML = db.haberler.map((h, i) => `
            <article class="news-card show" onclick="openNews('${h.id}')" style="transition-delay: ${i*50}ms">
                <img src="${h.img}" class="news-img">
                <div class="card-body">
                    <div class="flex justify-between items-center mb-3">
                        <small class="text-accent font-bold uppercase tracking-widest text-[8px]">${db.cats.find(c=>c.id===h.cid)?.name}</small>
                        <small class="opacity-30 font-bold text-[8px] uppercase">${Math.ceil(h.text.length/400)} DK OKUMA</small>
                    </div>
                    <h2>${h.title}</h2>
                    <p class="line-clamp-3">${h.text}</p>
                </div>
            </article>
        `).join('');
    }

    function renderAdmin() {
        const container = document.getElementById('admin-content');
        let formHtml = "", listHtml = "";

        if(activeTab === 'haber') {
            const h = editingId ? db.haberler.find(x => x.id === editingId) : null;
            formHtml = `<div class="lg:col-span-4 bg-[#111] p-5 rounded-2xl border border-white/5 h-fit lg:sticky lg:top-4">
                <h3 class="text-accent text-[9px] font-black mb-4 uppercase tracking-[2px]">${h ? 'Düzenle' : 'Yeni Haber'}</h3>
                <input type="text" id="h-t" value="${h?.title || ''}" placeholder="Haber Başlığı" class="input-cms">
                <textarea id="h-x" placeholder="Haber İçeriği..." class="input-cms h-32">${h?.text || ''}</textarea>
                <select id="h-c" class="input-cms">${db.cats.map(c=>`<option value="${c.id}" ${h?.cid===c.id?'selected':''}>${c.name}</option>`).join('')}</select>
                <div class="text-[9px] opacity-40 mb-2 uppercase tracking-widest">Atanan: Haber Merkezi</div>
                <input type="file" onchange="handleImg(event)" class="text-[10px] mb-4 opacity-40">
                <button onclick="saveH()" class="w-full bg-accent text-white py-3 rounded-xl font-bold tracking-widest text-[10px] uppercase">Haberi Yayınla</button>
            </div>`;
            listHtml = db.haberler.map(x => `<div class="flex justify-between items-center p-4 bg-[#111] rounded-xl border border-white/5 mb-3">
                <div class="truncate mr-4 w-2/3"><span class="text-[11px] font-medium">${x.title}</span></div>
                <div class="flex gap-3">
                    <button onclick="editH('${x.id}')" class="text-accent text-[9px] font-bold">EDİT</button>
                    <button onclick="del('haberler','${x.id}')" class="text-red-900 text-[9px] font-bold">SİL</button>
                </div>
            </div>`).join('');
        } else if(activeTab === 'cat') {
            formHtml = `<div class="lg:col-span-4"><input type="text" id="c-n" placeholder="Kategori Adı" class="input-cms"><button onclick="saveC()" class="w-full bg-accent py-3 rounded-xl font-bold text-[10px] uppercase">Ekle</button></div>`;
            listHtml = db.cats.map(c => `<div class="flex justify-between p-4 bg-[#111] rounded-xl mb-2"><span class="text-xs">${c.name}</span><button onclick="del('cats','${c.id}')" class="text-red-900 text-[10px] font-bold">SİL</button></div>`).join('');
        } else if(activeTab === 'yazar') {
            const y = editingId ? db.yazarlar.find(x => x.id === editingId) : null;
            formHtml = `<div class="lg:col-span-4 bg-[#111] p-5 rounded-2xl h-fit">
                <input type="text" id="y-i" value="${y?.isim || ''}" placeholder="İsim" class="input-cms">
                <input type="text" id="y-b" value="${y?.bio || ''}" placeholder="Biyo" class="input-cms">
                <input type="file" onchange="handleImg(event)" class="text-[10px] mb-4">
                <button onclick="saveY()" class="w-full bg-accent py-3 rounded-xl font-bold text-[10px] uppercase">Kaydet</button>
            </div>`;
            listHtml = db.yazarlar.filter(y => y.id !== 'y0').map(y => `<div class="flex items-center justify-between p-4 bg-[#111] rounded-xl mb-3">
                <div class="flex items-center gap-3"><img src="${y.img}" class="w-7 h-7 rounded-full object-cover opacity-60"><span class="text-[11px] font-medium">${y.isim}</span></div>
                <div class="flex gap-3"><button onclick="editY('${y.id}')" class="text-accent text-[9px] font-bold">EDİT</button><button onclick="del('yazarlar','${y.id}')" class="text-red-900 text-[10px] font-bold">SİL</button></div>
            </div>`).join('');
        }

        container.innerHTML = formHtml + `<div class="lg:col-span-8 overflow-y-auto max-h-[60vh] lg:max-h-[75vh] pr-2 custom-scroll">${listHtml}</div>`;
    }

    function saveH() {
        const t = document.getElementById('h-t').value, x = document.getElementById('h-x').value;
        if(!t || !x) return alert("Hata: Boş alan!");
        if(editingId) {
            let item = db.haberler.find(i => i.id === editingId);
            item.title = t; item.text = x; item.cid = document.getElementById('h-c').value;
            // Yazar her zaman Haber Merkezi (y0) kalır
            if(tempImg) item.img = tempImg;
        } else {
            db.haberler.unshift({
                id:'h'+Date.now(), 
                title:t, 
                text:x, 
                cid:document.getElementById('h-c').value, 
                yid:'y0', 
                img:tempImg || 'https://images.unsplash.com/photo-1499750310107-5fef28a66643?w=1000'
            });
        }
        sync();
    }
    
    function saveC() { const n = document.getElementById('c-n').value; if(n) db.cats.push({id:'c'+Date.now(), name:n}); sync(); }
    function saveY() {
        const i = document.getElementById('y-i').value, b = document.getElementById('y-b').value;
        if(editingId) {
            let item = db.yazarlar.find(x => x.id === editingId);
            item.isim = i; item.bio = b; if(tempImg) item.img = tempImg;
        } else {
            db.yazarlar.push({id:'y'+Date.now(), isim:i, bio:b, img:tempImg || 'https://via.placeholder.com/400'});
        }
        sync();
    }
    function del(k, id) { if(confirm('Silinsin mi?')) { db[k] = db[k].filter(x => x.id !== id); sync(); } }
    function editH(id) { editingId = id; renderAdmin(); }
    function editY(id) { editingId = id; renderAdmin(); }
    function handleImg(e) { const fr = new FileReader(); fr.onload = () => { tempImg = fr.result; }; fr.readAsDataURL(e.target.files[0]); }

    function openNews(hid) {
        const h = db.haberler.find(x => x.id === hid); const y = db.yazarlar.find(x => x.id === h.yid);
        document.getElementById('overlay').style.display = 'block';
        document.body.style.overflow = 'hidden';
        document.getElementById('overlay-content').innerHTML = `
            <div class="mb-8">
                <h1 class="text-3xl md:text-5xl font-serif mb-6 leading-tight text-[#2d2419]">${h.title}</h1>
                <div class="flex items-center gap-3 py-4 border-y border-black/5">
                    <img src="${y.img}" class="w-10 h-10 rounded-full object-cover">
                    <div><div class="text-xs font-bold">${y.isim}</div><div class="text-[8px] opacity-40 uppercase font-black tracking-widest">${y.bio}</div></div>
                </div>
            </div>
            <img src="${h.img}" class="w-full rounded-2xl mb-8 shadow-sm">
            <div id="art-body" class="leading-[1.8] text-[1.1rem] md:text-[1.2rem] text-stone-800">
                ${h.text.split('. ').join('.<br><br>')}
            </div>`;
    }

    function readOutLoad() { stopReading(); const u = new SpeechSynthesisUtterance(document.getElementById('art-body').innerText); u.lang = 'tr-TR'; u.rate = 0.9; synth.speak(u); }
    function stopReading() { synth.cancel(); }
    function toggleAdmin() { 
        const p = document.getElementById('admin-panel'); 
        p.style.display = p.style.display === 'block' ? 'none' : 'block'; 
        if(p.style.display === 'block') { renderAdmin(); document.body.style.overflow = 'hidden'; }
        else { document.body.style.overflow = 'auto'; }
    }
    function setTab(t) { activeTab = t; editingId = null; document.querySelectorAll('.admin-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-'+t).classList.add('active'); renderAdmin(); }
    function closeAll() { document.getElementById('overlay').style.display = 'none'; document.body.style.overflow = 'auto'; }

    window.onscroll = () => { let s = document.documentElement.scrollTop, h = document.documentElement.scrollHeight - document.documentElement.clientHeight; document.getElementById("progress-bar").style.width = (s / h) * 100 + "%"; };
    window.onload = renderPortal;
</script>
</body>
</html>
