<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Pro News System</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfbf7; --text: #1a1a1a; --muted: #718096; --accent: #c49b66;
            --white: #ffffff; --glass: rgba(253, 251, 247, 0.98); --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            --shadow: 0 20px 40px rgba(0,0,0,0.04);
        }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }

        /* --- UI COMPONENTS --- */
        .top-bar { background: #1a1a1a; color: #fff; padding: 8px 5%; font-size: 11px; display: flex; justify-content: space-between; align-items: center; }
        .flash-news { flex: 1; margin-left: 20px; white-space: nowrap; overflow: hidden; }
        
        nav { background: var(--glass); backdrop-filter: blur(15px); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .logo { font-family: 'Marcellus', serif; font-size: 1.8rem; letter-spacing: 4px; cursor: pointer; }
        .admin-trigger { cursor: pointer; opacity: 0.02; font-size: 10px; }

        /* Authors Strip (Responsive) */
        .authors-container { background: var(--white); padding: 25px 0; border-bottom: 1px solid #eee; display: flex; gap: 20px; overflow-x: auto; scrollbar-width: none; padding-left: 5%; }
        .author-card { flex: 0 0 auto; text-align: center; width: 70px; cursor: pointer; transition: var(--transition); }
        .author-card:hover { transform: translateY(-5px); }
        .author-card img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); padding: 2px; background: #fff; }
        .author-card span { display: block; font-size: 10px; font-weight: 700; margin-top: 8px; font-family: 'Marcellus'; text-transform: uppercase; }

        /* Main Grid */
        .main-layout { max-width: 1400px; margin: 20px auto; display: grid; grid-template-columns: 260px 1fr 300px; gap: 30px; padding: 0 20px; }

        /* Headline Slider */
        .headline-stage { position: relative; background: #fff; border-radius: 30px; overflow: hidden; box-shadow: var(--shadow); height: 550px; }
        .slide { position: absolute; inset: 0; opacity: 0; transition: var(--transition); display: none; }
        .slide.active { opacity: 1; display: flex; flex-direction: column; }
        .slide-img { width: 100%; height: 65%; object-fit: cover; }
        .slide-info { padding: 30px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .slide-info h2 { font-family: 'Marcellus'; font-size: 2rem; line-height: 1.2; margin-top: 10px; }

        /* Ad Regions */
        .ad-box { background: #f4f4f2; border: 1px dashed #ccc; border-radius: 20px; min-height: 250px; overflow: hidden; position: relative; }
        .ad-box img { width: 100%; height: 100%; object-fit: cover; }

        /* --- ADMIN PANEL --- */
        .admin-panel { display: none; position: fixed; inset: 0; background: #f8f9fa; z-index: 2000; padding: 40px; overflow-y: auto; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 20px; }
        .cms-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; }
        .cms-card { background: #fff; padding: 25px; border-radius: 20px; border: 1px solid #e0e0e0; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .cms-card h3 { margin-bottom: 20px; font-family: 'Marcellus'; color: var(--accent); }
        
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 12px; font-family: inherit; }
        .btn { padding: 12px 25px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-gold { background: var(--accent); color: #fff; }
        .btn-dark { background: #1a1a1a; color: #fff; }
        .btn-sm { padding: 5px 12px; font-size: 11px; }
        .btn-del { background: #e74c3c; color: #fff; }

        /* Tables */
        .mgmt-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        .mgmt-table tr { border-bottom: 1px solid #f0f0f0; }
        .mgmt-table td { padding: 12px 5px; }

        /* Overlay */
        .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1500; display: none; overflow-y: auto; padding: 60px 20px; }
        .close-overlay { position: fixed; top: 20px; right: 20px; background: #000; color: #fff; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1600; }

        /* Responsive Breakpoints */
        @media (max-width: 1200px) { .main-layout { grid-template-columns: 200px 1fr; } .sidebar-right { display: none; } }
        @media (max-width: 850px) { 
            .main-layout { grid-template-columns: 1fr; } 
            .sidebar-left { display: none; } 
            .logo { font-size: 1.4rem; }
            .headline-stage { height: 450px; }
            .slide-info h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <span>BORSA: 9,120.45 (+1.2%)</span>
    <div class="flash-news">
        <marquee scrollamount="6" id="flash-text">Lumina Haber Sistemi: Yapay Zeka Desteği ve WebP Teknolojisi ile Yayında.</marquee>
    </div>
</div>

<nav>
    <div class="logo" onclick="location.reload()">LUMINA</div>
    <div class="admin-trigger" onclick="openCMS()">[LUMINA_CORE]</div>
</nav>

<div id="authors-view" class="authors-container"></div>

<main class="main-layout">
    <aside class="sidebar-left">
        <h4 style="font-family:'Marcellus'; margin-bottom:15px;">Kategoriler</h4>
        <div id="cat-list" style="line-height: 2.5; font-size: 14px; color: var(--muted);"></div>
        <div class="ad-box" id="ad-left" style="margin-top:40px;"></div>
    </aside>

    <section>
        <div class="headline-stage" id="slider-view"></div>
        <div id="news-grid" style="margin-top:40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;"></div>
    </section>

    <aside class="sidebar-right">
        <div class="ad-box" id="ad-right" style="height:600px;"></div>
    </aside>
</main>

<div id="adminPanel" class="admin-panel">
    <div class="admin-header">
        <h1>Lumina Enterprise CMS v9</h1>
        <button class="btn btn-dark" onclick="closeCMS()">Kaydet ve Çık</button>
    </div>

    <div class="cms-grid">
        <div class="cms-card">
            <h3>Haber & AI Yönetimi</h3>
            <input type="hidden" id="edit-id">
            <input type="text" id="newsTitle" placeholder="Haber Başlığı">
            <textarea id="newsContent" placeholder="Haber İçeriği..." rows="4"></textarea>
            <select id="newsCat"></select>
            <input type="file" id="newsImg" accept="image/*">
            <button class="btn btn-gold" style="width:100%" onclick="saveNews()">Haberi Yayınla / Güncelle</button>
            
            <div style="max-height:200px; overflow-y:auto; margin-top:20px;">
                <table class="mgmt-table" id="mgmt-news"></table>
            </div>
        </div>

        <div class="cms-card">
            <h3>Yazar Yönetimi</h3>
            <input type="text" id="authName" placeholder="Yazar Adı Soyadı">
            <textarea id="authBio" placeholder="Biyografi..." rows="2"></textarea>
            <input type="file" id="authFile" accept="image/*">
            <button class="btn btn-dark" style="width:100%" onclick="saveAuthor()">Yazar Ekle / Güncelle</button>
            
            <div style="max-height:200px; overflow-y:auto; margin-top:20px;">
                <table class="mgmt-table" id="mgmt-authors"></table>
            </div>
        </div>

        <div class="cms-card">
            <h3>Reklam Alanları</h3>
            <select id="adPosition">
                <option value="left">Sol Sütun (300x250)</option>
                <option value="right">Sağ Sütun (Skyscraper)</option>
            </select>
            <input type="text" id="adUrl" placeholder="Reklam Yönlendirme Linki">
            <input type="file" id="adImgFile" accept="image/*">
            <button class="btn btn-gold" style="width:100%" onclick="saveAd()">Reklamı Aktifleştir</button>
            <div id="mgmt-ads" style="margin-top:15px;"></div>
        </div>
    </div>
</div>

<div id="overlay" class="overlay">
    <div class="close-overlay" onclick="closeOverlay()">✕</div>
    <div id="overlay-body" style="max-width:800px; margin:auto;"></div>
</div>

<script>
    const _PASS = "NzQ="; // Şifre: 47
    let db = JSON.parse(localStorage.getItem('lumina_v9')) || {
        news: [{id:1, title: 'Lumina Yeni Nesil Arayüzüyle Yayında', content: 'Modern, hızlı ve responsive tasarım...', img: '', cat: 'Teknoloji', views: 0}],
        authors: [{id:1, name: 'Lumina Editor', bio: 'Yönetici yazar.', img: ''}],
        categories: ['Gündem', 'Ekonomi', 'Yaşam', 'Teknoloji', 'Gastronomi'],
        ads: { left: {img: '', url: '#'}, right: {img: '', url: '#'} }
    };

    function openCMS() { if(prompt("CMS Erişim:") === atob(_PASS).split("").reverse().join("")) { document.getElementById('adminPanel').style.display='block'; renderAdmin(); } }
    function closeCMS() { document.getElementById('adminPanel').style.display='none'; }
    function sync() { localStorage.setItem('lumina_v9', JSON.stringify(db)); renderApp(); renderAdmin(); }
    function toB64(f) { return new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => r(rd.result); }); }

    // --- ACTIONS ---
    async function saveNews() {
        const id = document.getElementById('edit-id').value;
        const file = document.getElementById('newsImg').files[0];
        let img = id ? db.news.find(x=>x.id==id).img : "https://via.placeholder.com/800";
        if(file) img = await toB64(file);

        const data = {
            id: id ? Number(id) : Date.now(),
            title: document.getElementById('newsTitle').value,
            content: document.getElementById('newsContent').value,
            cat: document.getElementById('newsCat').value,
            img: img, views: 0
        };

        if(id) { const idx = db.news.findIndex(x=>x.id==id); db.news[idx] = data; }
        else { db.news.unshift(data); }
        
        document.getElementById('edit-id').value = "";
        sync(); alert("Haber Güncellendi.");
    }

    async function saveAuthor() {
        const file = document.getElementById('authFile').files[0];
        let img = "https://via.placeholder.com/100";
        if(file) img = await toB64(file);
        db.authors.push({ id: Date.now(), name: document.getElementById('authName').value, bio: document.getElementById('authBio').value, img: img });
        sync();
    }

    async function saveAd() {
        const pos = document.getElementById('adPosition').value;
        const file = document.getElementById('adImgFile').files[0];
        if(file) db.ads[pos].img = await toB64(file);
        db.ads[pos].url = document.getElementById('adUrl').value;
        sync(); alert("Reklam Alanı Güncellendi.");
    }

    function deleteItem(type, id) { if(confirm("Silmek istediğinize emin misiniz?")) { db[type] = db[type].filter(x=>x.id != id); sync(); } }
    
    function editNews(id) {
        const n = db.news.find(x=>x.id==id);
        document.getElementById('edit-id').value = n.id;
        document.getElementById('newsTitle').value = n.title;
        document.getElementById('newsContent').value = n.content;
        document.getElementById('newsCat').value = n.cat;
    }

    // --- RENDER ---
    function renderApp() {
        // Authors
        document.getElementById('authors-view').innerHTML = db.authors.map(a => `
            <div class="author-card" onclick="openAuthorDetail(${a.id})">
                <img src="${a.img || 'https://via.placeholder.com/60'}">
                <span>${a.name}</span>
            </div>
        `).join('');

        // Slider
        document.getElementById('slider-view').innerHTML = db.news.slice(0,5).map((n, i) => `
            <div class="slide ${i===0?'active':''}" onclick="openNewsDetail(${n.id})">
                <img src="${n.img}" class="slide-img">
                <div class="slide-info">
                    <small style="color:var(--accent); font-weight:800;">${n.cat.toUpperCase()}</small>
                    <h2>${n.title}</h2>
                </div>
            </div>
        `).join('');

        // News Grid
        document.getElementById('news-grid').innerHTML = db.news.slice(5).map(n => `
            <div style="background:#fff; border-radius:20px; overflow:hidden; cursor:pointer;" onclick="openNewsDetail(${n.id})">
                <img src="${n.img}" style="width:100%; height:180px; object-fit:cover;">
                <div style="padding:15px;">
                    <small style="color:var(--accent);">${n.cat}</small>
                    <h3 style="font-size:16px; margin-top:5px;">${n.title}</h3>
                </div>
            </div>
        `).join('');

        document.getElementById('cat-list').innerHTML = db.categories.map(c => `<div>• ${c}</div>`).join('');
        document.getElementById('ad-left').innerHTML = db.ads.left.img ? `<a href="${db.ads.left.url}"><img src="${db.ads.left.img}"></a>` : '';
        document.getElementById('ad-right').innerHTML = db.ads.right.img ? `<a href="${db.ads.right.url}"><img src="${db.ads.right.img}"></a>` : '';
    }

    function renderAdmin() {
        document.getElementById('newsCat').innerHTML = db.categories.map(c => `<option value="${c}">${c}</option>`).join('');
        
        document.getElementById('mgmt-news').innerHTML = db.news.map(n => `
            <tr><td>${n.title.substring(0,25)}...</td>
            <td align="right">
                <button class="btn btn-dark btn-sm" onclick="editNews(${n.id})">Düzenle</button>
                <button class="btn btn-del btn-sm" onclick="deleteItem('news', ${n.id})">Sil</button>
            </td></tr>`).join('');

        document.getElementById('mgmt-authors').innerHTML = db.authors.map(a => `
            <tr><td>${a.name}</td>
            <td align="right"><button class="btn btn-del btn-sm" onclick="deleteItem('authors', ${a.id})">Sil</button></td></tr>`).join('');
    }

    function openNewsDetail(id) {
        const n = db.news.find(x=>x.id==id);
        n.views++; 
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('overlay-body').innerHTML = `
            <img src="${n.img}" style="width:100%; border-radius:25px; margin-bottom:20px;">
            <h1 style="font-family:'Marcellus'; font-size:2.5rem; margin-bottom:20px;">${n.title}</h1>
            <p style="font-size:1.2rem; line-height:1.8; color:#444;">${n.content}</p>
        `;
    }

    function closeOverlay() { document.getElementById('overlay').style.display='none'; }

    renderApp();
    setInterval(() => {
        let active = document.querySelector('.slide.active');
        if(!active) return;
        active.classList.remove('active');
        let next = active.nextElementSibling || document.querySelector('.slide');
        next.classList.add('active');
    }, 6000);
</script>

</body>
</html>
