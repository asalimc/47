<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <style>
        /* Arayüzü koruyan eklemeler */

        /* 1. SESLİ MAKALE OYNATICI (AUDIO UI) */
        .audio-player {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #fff;
            padding: 15px 25px;
            border-radius: 50px;
            border: 1px solid var(--mardin);
            margin-bottom: 30px;
            max-width: fit-content;
        }
        .play-pause-btn {
            width: 35px;
            height: 35px;
            background: var(--rio);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
        }
        .audio-wave {
            display: flex;
            gap: 3px;
            align-items: center;
        }
        .wave-bar {
            width: 3px;
            height: 15px;
            background: var(--mardin);
            border-radius: 2px;
        }

        /* 2. CANLI HABER BANDI (NEWS TICKER) */
        .news-ticker-container {
            background: white;
            border-bottom: 1px solid #eee;
            overflow: hidden;
            white-space: nowrap;
            padding: 10px 0;
            display: flex;
            align-items: center;
        }
        .ticker-label {
            background: var(--rio);
            color: white;
            padding: 5px 15px;
            font-size: 10px;
            font-weight: 900;
            margin-left: 20px;
            z-index: 2;
        }
        .ticker-text-wrapper {
            display: inline-block;
            animation: tickerScroll 30s linear infinite;
        }
        @keyframes tickerScroll {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* 3. SOSYAL KANIT MODÜLÜ (USER PRESENCE) */
        .user-counter-badge {
            font-size: 11px;
            color: #777;
            text-align: right;
            margin-top: -20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="news-ticker-container">
        <div class="ticker-label">SON DAKİKA</div>
        <div class="ticker-text-wrapper">
            <span style="margin-right: 50px;">• Brezilyalı süper model Adriana, Mardin'in dar sokaklarında görüldü.</span>
            <span style="margin-right: 50px;">• Rio Karnavalı'nın bu yılki teması: Mezopotamya Güneşi!</span>
            <span style="margin-right: 50px;">• Yeni "Samba-Reyhani" albümü Spotify global listelerinde yükseliyor.</span>
        </div>
    </div>

    <div class="wrapper">
        
        <div class="user-counter-badge">
            <span style="color: green;">●</span> Şu an bu makaleyi 142 kişi okuyor.
        </div>

        <div class="audio-player">
            <div class="play-pause-btn">▶</div>
            <div style="font-size: 12px; font-weight: bold;">BU HABERİ DİNLE</div>
            <div class="audio-wave">
                <div class="wave-bar" style="height: 10px;"></div>
                <div class="wave-bar" style="height: 20px;"></div>
                <div class="wave-bar" style="height: 15px;"></div>
                <div class="wave-bar" style="height: 25px;"></div>
            </div>
            <span style="font-size: 10px; color: #888;">04:22</span>
        </div>

        <article class="main-article">
            </article>

    </div>

    </body>
</html>
