<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Portal | Mardin & Brazil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .page-fade { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans" x-data="portalControl()" x-init="init()">

    <nav class="sticky top-0 z-[100] glass border-b border-slate-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div @click="page = 'home'" class="text-2xl font-black tracking-tighter uppercase italic cursor-pointer text-blue-700">ASC PORTAL</div>
            
            <div class="hidden md:flex space-x-8 text-[11px] font-black uppercase tracking-widest">
                <button @click="page = 'home'" :class="page === 'home' ? 'text-blue-600' : 'text-slate-500 hover:text-blue-600'">Ana Sayfa</button>
                <button @click="page = 'haberler'" :class="page === 'haberler' ? 'text-blue-600' : 'text-slate-500 hover:text-blue-600'">Haberler</button>
                <button @click="page = 'yazarlar'" :class="page === 'yazarlar' ? 'text-blue-600' : 'text-slate-500 hover:text-blue-600'">Yazarlar</button>
                <button @click="page = 'iletisim'" :class="page === 'iletisim' ? 'text-blue-600' : 'text-slate-500 hover:text-blue-600'">İletişim</button>
            </div>

            <div class="flex space-x-4 text-[10px] font-mono border-l pl-4 border-slate-200 text-slate-400">
                <div class="text-right leading-tight">Mardin<br><span class="text-blue-600 font-bold" x-text="mTime"></span></div>
                <div class="text-left leading-tight">Brazil<br><span class="text-emerald-600 font-bold" x-text="bTime"></span></div>
            </div>
        </div>
    </nav>

    <main class="min-h-screen">

        <div x-show="page === 'home'" class="page-fade">
            <header class="relative h-[50vh] flex items-center justify-center bg-slate-900 text-white overflow-hidden">
                <img src="https://images.unsplash.com/photo-1590424744295-827054f76785?auto=format&fit=crop&q=80&w=1600" class="absolute w-full h-full object-cover opacity-40">
                <div class="relative text-center">
                    <h1 class="text-5xl md:text-7xl font-black italic tracking-tighter">MARDİN / BRAZIL</h1>
                    <p class="mt-4 text-blue-200 tracking-[0.4em] uppercase text-sm">Global Haber & Kültür Hattı</p>
                </div>
            </header>
            
            <section class="max-w-7xl mx-auto px-6 py-16">
                <h2 class="text-2xl font-black uppercase mb-10 border-l-4 border-blue-600 pl-4">Manşetler</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <template x-for="news in newsData">
                        <div @click="showNews(news)" class="bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all cursor-pointer border border-slate-100 group">
                            <div class="h-52 overflow-hidden"><img :src="news.img" class="w-full h-full object-cover group-hover:scale-110 transition duration-700"></div>
                            <div class="p-6">
                                <span class="text-blue-600 text-[9px] font-black uppercase" x-text="news.tag"></span>
                                <h3 class="font-bold text-lg my-2 group-hover:text-blue-600" x-text="news.title"></h3>
                                <p class="text-slate-500 text-sm line-clamp-2" x-text="news.desc"></p>
                            </div>
                        </div>
                    </template>
                </div>
            </section>
        </div>

        <div x-show="page === 'detail'" class="page-fade max-w-4xl mx-auto px-6 py-16" x-cloak>
            <button @click="page = 'home'" class="mb-8 text-xs font-black uppercase tracking-widest text-slate-400 hover:text-blue-600 italic">← Geri Dön</button>
            <img :src="activeNews?.img" class="w-full h-[45vh] object-cover rounded-[2.5rem] shadow-2xl mb-10 border-4 border-white">
            <h1 class="text-4xl md:text-6xl font-black leading-tight mb-6" x-text="activeNews?.title"></h1>
            <div class="text-slate-600 leading-relaxed text-lg italic border-l-4 border-slate-200 pl-6 mb-8" x-text="activeNews?.desc"></div>
            <div class="text-slate-800 leading-loose space-y-4" x-html="activeNews?.body"></div>
        </div>

        <div x-show="page === 'yazarlar'" class="page-fade max-w-7xl mx-auto px-6 py-20" x-cloak>
            <h2 class="text-4xl font-black text-center mb-16 uppercase tracking-widest italic">Kıdemli Yazarlar</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                <template x-for="author in authors">
                    <div class="bg-slate-900 text-white p-10 rounded-[2.5rem] shadow-2xl flex flex-col items-center text-center hover:scale-[1.02] transition">
                        <img :src="author.photo" class="w-24 h-24 rounded-full border-4 border-blue-500 mb-6 object-cover shadow-lg">
                        <h3 class="text-2xl font-bold mb-1" x-text="author.name"></h3>
                        <span class="text-blue-400 font-black uppercase text-[10px] tracking-[0.2em] mb-4" x-text="author.title"></span>
                        <p class="text-slate-400 text-sm leading-relaxed" x-text="author.bio"></p>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="page === 'iletisim'" class="page-fade max-w-2xl mx-auto px-6 py-20" x-cloak>
            <h2 class="text-3xl font-black mb-8 uppercase text-center italic tracking-widest">Bize Ulaşın</h2>
            <form class="space-y-4 bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100">
                <input type="text" placeholder="Adınız" class="w-full p-4 bg-slate-50 rounded-xl outline-none focus:ring-2 ring-blue-500">
                <input type="email" placeholder="E-posta" class="w-full p-4 bg-slate-50 rounded-xl outline-none focus:ring-2 ring-blue-500">
                <textarea placeholder="Mesajınız" rows="5" class="w-full p-4 bg-slate-50 rounded-xl outline-none focus:ring-2 ring-blue-500"></textarea>
                <button type="button" class="w-full bg-blue-600 text-white p-4 rounded-xl font-black uppercase tracking-widest hover:bg-slate-900 transition shadow-lg">Gönder</button>
            </form>
        </div>

    </main>

    <footer class="bg-white border-t border-slate-200 py-10 text-center">
        <p class="text-[9px] font-black uppercase tracking-[0.6em] text-slate-300 italic">&copy; 2026 ASC GLOBAL PORTAL - MARDIN / BRAZIL</p>
    </footer>

    <script>
        function portalControl() {
            return {
                page: 'home',
                activeNews: null,
                mTime: '',
                bTime: '',
                newsData: [
                    { tag: 'Mardin', title: 'Tarihi Konaklarda Restorasyon Seferberliği', desc: 'Mardin Valiliği, 10 adet tarihi konağın turizme kazandırılması için dev bütçe ayırdı.', img: 'https://images.unsplash.com/photo-1528642463366-20ba5d3f000c?w=1000', body: 'Proje kapsamında Artuklu bölgesindeki tescilli yapılar aslına uygun olarak restore edilecek. Mardin’in eşsiz taş işçiliğiyle bezenmiş bu yapılar, butik otel ve kültür merkezi olarak hizmet verecek. Yerel halk için de yeni iş imkanları yaratılması hedefleniyor.' },
                    { tag: 'Brazil', title: 'Amazon Ormanlarında Dijital Takip Dönemi', desc: 'Brezilya uzay ajansı, yapay zeka destekli uydularla orman yangınlarını anlık izleyecek.', img: 'https://images.unsplash.com/photo-1516307361401-e323ad26de92?w=1000', body: 'Yapay zeka teknolojisi, dumanı ve ısı değişimlerini henüz yangın büyümeden tespit ederek ekiplere bildirecek. Bu sistemin, orman tahribatını %40 oranında azaltması bekleniyor. Brezilya, çevre teknolojilerinde dünya lideri olmayı hedefliyor.' },
                    { tag: 'Ekonomi', title: 'Mardin-Rio Ticaret Forumu Başladı', desc: 'İki bölgenin iş insanları, tarım ve tekstil odaklı yeni bir serbest ticaret hattı kuruyor.', img: 'https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=1000', body: 'Forumun ilk gününde Mardin tekstil ürünlerinin Brezilya pazarına girmesi konusunda mutabakata varıldı. Brezilya’nın tropikal meyveleri ise Türkiye üzerinden Avrupa pazarına ulaştırılacak. Bu ticaret köprüsü binlerce kişiye istihdam sağlayacak.' }
                ],
                authors: [
                    { name: 'Prof. Dr. Ahmet Salim', title: 'Kıdemli Analist', bio: 'Mezopotamya tarihi ve Latin Amerika stratejileri uzmanı.', photo: 'https://i.pravatar.cc/150?u=asalim' },
                    { name: 'Isabella Mendes', title: 'Kültür Editörü', bio: 'Sao Paulo Üniversitesi’nde Türk-Brezilya kültürü araştırmacısı.', photo: 'https://i.pravatar.cc/150?u=isabella' }
                ],
                init() {
                    this.updateTime();
                    setInterval(() => this.updateTime(), 1000);
                },
                updateTime() {
                    const n = new Date();
                    this.mTime = new Intl.DateTimeFormat('tr-TR', { hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'Europe/Istanbul' }).format(n);
                    this.bTime = new Intl.DateTimeFormat('tr-TR', { hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'America/Sao_Paulo' }).format(n);
                },
                showNews(news) {
                    this.activeNews = news;
                    this.page = 'detail';
                    window.scrollTo(0, 0);
                }
            }
        }
    </script>
</body>
</html>
