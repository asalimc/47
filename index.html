<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASC GLOBAL | Ultra Contrast v21</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap');
        
        /* TEMEL OKUNABİLİRLİK AYARLARI */
        :root { 
            --bg-site: #ffffff; 
            --text-main: #000000; /* Saf Siyah */
            --text-muted: #1e293b; /* Koyu Gri/Lacivert */
            --gold-accent: #b45309; /* Daha koyu, okunabilir altın */
            --admin-bg: #f8fafc;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-site); 
            color: var(--text-main); 
            line-height: 1.6;
        }

        .font-serif { font-family: 'Playfair Display', serif; }

        /* OKUNABİLİR ADMİN GİRİŞLERİ */
        .admin-field {
            background-color: #ffffff !important;
            color: #000000 !important; /* Yazılar net siyah */
            border: 2px solid #0f172a !important; /* Belirgin çerçeve */
            font-size: 16px !important;
            font-weight: 600 !important;
            padding: 15px !important;
            border-radius: 12px !important;
            width: 100%;
        }

        .admin-label {
            color: #0f172a !important;
            font-weight: 800 !important;
            text-transform: uppercase;
            font-size: 12px;
            margin-bottom: 5px;
            display: block;
        }

        /* REKLAM ALANI SINIRLAYICI */
        .ad-box {
            width: 300px;
            height: 300px;
            border: 3px solid #0f172a;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 20px;
        }
        .ad-box img { max-width: 100%; max-height: 100%; object-fit: contain; }

        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="ascEngine()" x-init="init()">

    <nav class="sticky top-0 z-[100] bg-white border-b-2 border-black px-8 py-4 flex justify-between items-center">
        <div @click="currentPage = 'home'" class="flex items-center gap-3 cursor-pointer">
            <div class="bg-black text-white w-10 h-10 flex items-center justify-center rounded-lg font-black">A</div>
            <h1 class="font-serif text-2xl font-black">ASC <span class="text-orange-700">GLOBAL</span></h1>
        </div>
        <button @click="openAdmin()" class="bg-black text-white px-6 py-2 rounded-lg font-bold text-xs uppercase tracking-tighter hover:bg-orange-700 transition-all">
            ADMİN PANELİ
        </button>
    </nav>

    <main x-show="currentPage === 'home'" x-cloak class="max-w-7xl mx-auto px-6 py-12">
        
        <div class="mb-16">
            <h2 class="font-serif text-4xl font-black mb-8 border-l-8 border-black pl-4">ANALİZ MERKEZİ</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <template x-for="author in authors" :key="author.id">
                    <div @click="viewItem(author, 'author')" class="bg-white border-2 border-black p-6 rounded-2xl flex items-center gap-6 cursor-pointer hover:bg-stone-50 transition-all">
                        <img :src="author.photo" class="w-24 h-24 rounded-xl object-cover border-2 border-black">
                        <div>
                            <p class="text-orange-700 font-black text-xs uppercase" x-text="author.title"></p>
                            <h3 class="text-2xl font-black" x-text="author.name"></h3>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
            <div class="lg:col-span-8">
                <h2 class="font-serif text-4xl font-black mb-8 border-l-8 border-black pl-4">STRATEJİK RAPORLAR</h2>
                <div class="grid gap-12">
                    <template x-for="news in newsData" :key="news.id">
                        <div @click="viewItem(news, 'news')" class="cursor-pointer group">
                            <img :src="news.img" class="w-full h-80 object-cover rounded-3xl border-2 border-black mb-6">
                            <span class="bg-black text-white px-3 py-1 text-xs font-bold rounded" x-text="news.region"></span>
                            <h3 class="text-3xl font-black mt-3 group-hover:text-orange-700 transition-all" x-text="news.title"></h3>
                        </div>
                    </template>
                </div>
            </div>

            <div class="lg:col-span-4 space-y-12">
                <div>
                    <p class="font-black text-xs mb-4 uppercase text-center">SPONSORLU ALAN</p>
                    <div class="ad-box mx-auto shadow-xl">
                        <img :src="adImage || 'https://via.placeholder.com/300x300?text=REKLAM+YOK'" alt="Reklam">
                    </div>
                </div>

                <div class="bg-black text-white p-8 rounded-3xl shadow-2xl">
                    <h3 class="font-serif text-2xl mb-4 italic text-orange-400">Meridian Portal</h3>
                    <p class="text-sm font-medium mb-6 leading-relaxed">Mardin ve Brezilya hattındaki tüm küresel analizler tek merkezde.</p>
                    <div class="text-[10px] font-black opacity-50 uppercase tracking-widest">© 2026 ASC GLOBAL NETWORK</div>
                </div>
            </div>
        </div>
    </main>

    <div x-show="currentPage === 'admin'" class="fixed inset-0 z-[1000] bg-slate-100 overflow-y-auto p-8" x-cloak>
        <div class="max-w-4xl mx-auto bg-white border-4 border-black p-10 rounded-[40px] shadow-2xl">
            <div class="flex justify-between items-center mb-10 border-b-4 border-black pb-6">
                <h2 class="text-3xl font-black uppercase" x-text="adminTab === 'news' ? 'HABER YÖNETİMİ' : (adminTab === 'authors' ? 'YAZAR YÖNETİMİ' : 'REKLAM AYARLARI')"></h2>
                <div class="flex gap-2">
                    <button @click="adminTab = 'news'" class="px-4 py-2 bg-black text-white font-bold rounded-lg text-xs">HABER</button>
                    <button @click="adminTab = 'authors'" class="px-4 py-2 bg-black text-white font-bold rounded-lg text-xs">YAZAR</button>
                    <button @click="adminTab = 'ads'" class="px-4 py-2 bg-orange-700 text-white font-bold rounded-lg text-xs">REKLAM</button>
                    <button @click="currentPage = 'home'" class="px-4 py-2 bg-red-600 text-white font-bold rounded-lg text-xs">X</button>
                </div>
            </div>

            <template x-if="adminTab === 'ads'">
                <div class="text-center py-10 space-y-6">
                    <div class="ad-box mx-auto shadow-inner border-dashed border-4 border-slate-300">
                        <img :src="adImage" x-show="adImage">
                        <p x-show="!adImage" class="text-slate-400 font-bold">ÖNİZLEME</p>
                    </div>
                    <input type="file" @change="handleAdUpload" id="adFile" class="hidden">
                    <label for="adFile" class="inline-block bg-black text-white px-10 py-4 rounded-xl font-black cursor-pointer hover:bg-orange-700 transition-all">
                        YENİ REKLAM GÖRSELİ SEÇ
                    </label>
                </div>
            </template>

            <div x-show="adminTab !== 'ads'" class="space-y-6 bg-slate-50 p-8 rounded-3xl border-2 border-black mb-10">
                <div>
                    <label class="admin-label">BAŞLIK / İSİM</label>
                    <input x-model="form.main" type="text" class="admin-field" placeholder="Net bir başlık yazın">
                </div>
                <div>
                    <label class="admin-label">BÖLGE / ÜNVAN</label>
                    <input x-model="form.sub" type="text" class="admin-field" placeholder="Örn: Mardin / Siyaset Bilimci">
                </div>
                <div>
                    <label class="admin-label">İÇERİK METNİ</label>
                    <textarea x-model="form.content" class="admin-field h-40" placeholder="İçeriği buraya detaylıca yazın"></textarea>
                </div>
                <div>
                    <label class="admin-label">GÖRSEL YÜKLE</label>
                    <input type="file" @change="handleFile" class="bg-white border-2 border-black w-full p-3 rounded-xl font-bold">
                </div>
                <button @click="save()" class="w-full bg-orange-700 text-white py-5 rounded-2xl font-black text-xl shadow-xl hover:bg-black transition-all">KAYDET VE YAYINLA</button>
            </div>

            <div x-show="adminTab !== 'ads'" class="space-y-4">
                <template x-for="item in (adminTab === 'news' ? newsData : authors)" :key="item.id">
                    <div class="bg-white border-2 border-black p-4 rounded-xl flex justify-between items-center">
                        <div class="flex items-center gap-4">
                            <img :src="item.img || item.photo" class="w-12 h-12 rounded-lg object-cover border border-black">
                            <span class="font-black" x-text="item.title || item.name"></span>
                        </div>
                        <button @click="deleteItem(item.id)" class="text-red-600 font-black px-4 py-2 hover:bg-red-50 rounded-lg">SİL</button>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <div x-show="currentPage === 'reader'" class="fixed inset-0 z-[2000] bg-white overflow-y-auto p-6 md:p-20" x-cloak>
        <button @click="currentPage = 'home'" class="fixed top-8 right-8 bg-black text-white w-12 h-12 rounded-full font-black">X</button>
        <div class="max-w-3xl mx-auto">
            <p class="text-orange-700 font-black uppercase mb-4" x-text="selectedItem?.region || selectedItem?.title"></p>
            <h1 class="font-serif text-5xl md:text-7xl font-black mb-10 leading-tight" x-text="selectedItem?.title || selectedItem?.name"></h1>
            <img :src="selectedItem?.img || selectedItem?.photo" class="w-full h-auto rounded-3xl border-2 border-black mb-12 shadow-2xl">
            <div class="text-xl md:text-2xl font-medium leading-loose text-black" x-html="selectedItem?.body || selectedItem?.bio"></div>
        </div>
    </div>

    <script>
        function ascEngine() {
            return {
                currentPage: 'home', adminTab: 'news', editingId: null, selectedItem: null,
                form: { main: '', sub: '', content: '', media: '' },
                adImage: localStorage.getItem('asc_ad_v21') || '',
                
                newsData: JSON.parse(localStorage.getItem('asc_news_v21')) || [
                    { id: 1, title: 'Mardin - Sao Paulo Ticaret Protokolü', region: 'Mardin / TR', body: 'Küresel ticaretin yeni kalbi Mardin lojistik üssü üzerinden şekilleniyor...', img: 'https://images.unsplash.com/photo-1582236894056-e918b9588667?w=1600' }
                ],
                authors: JSON.parse(localStorage.getItem('asc_authors_v21')) || [
                    { id: 1, name: 'Ahmet Çınarbaş', title: 'Siyaset Bilimci', bio: 'Küresel jeopolitik analizler ve bölgesel stratejiler uzmanı.', photo: 'https://i.ibb.co/LhqZz4H/ahmet.jpg' },
                    { id: 2, name: 'M. Beşir Ayanoğlu', title: 'Hukukçu', bio: 'Uluslararası hukuk ve kurumsal yönetim kıdemli danışmanı.', photo: 'https://i.ibb.co/vYm6D6T/besir.jpg' }
                ],

                init() { this.sync(); },
                openAdmin() { if(prompt("ŞİFRE:") === "47") this.currentPage = 'admin'; },
                
                handleFile(e) {
                    const reader = new FileReader();
                    reader.onload = (f) => this.form.media = f.target.result;
                    reader.readAsDataURL(e.target.files[0]);
                },
                handleAdUpload(e) {
                    const reader = new FileReader();
                    reader.onload = (f) => {
                        this.adImage = f.target.result;
                        localStorage.setItem('asc_ad_v21', this.adImage);
                    };
                    reader.readAsDataURL(e.target.files[0]);
                },

                save() {
                    const isNews = this.adminTab === 'news';
                    const payload = isNews ? 
                        { id: Date.now(), title: this.form.main, region: this.form.sub, body: this.form.content, img: this.form.media } :
                        { id: Date.now(), name: this.form.main, title: this.form.sub, bio: this.form.content, photo: this.form.media };

                    if (isNews) this.newsData.unshift(payload);
                    else this.authors.push(payload);
                    
                    this.sync(); this.resetForm();
                    alert("Sistem Güncellendi!");
                },

                deleteItem(id) {
                    if(confirm('Silinsin mi?')) {
                        if(this.adminTab === 'news') this.newsData = this.newsData.filter(n => n.id !== id);
                        else this.authors = this.authors.filter(a => a.id !== id);
                        this.sync();
                    }
                },

                viewItem(item) { this.selectedItem = item; this.currentPage = 'reader'; window.scrollTo(0,0); },
                sync() { 
                    localStorage.setItem('asc_news_v21', JSON.stringify(this.newsData)); 
                    localStorage.setItem('asc_authors_v21', JSON.stringify(this.authors)); 
                },
                resetForm() { this.form = { main: '', sub: '', content: '', media: '' }; }
            }
        }
    </script>
</body>
</html>
