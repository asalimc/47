<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina v20 | Editorial Intelligence</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Inter:wght@100;300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { 
            --bg: #F5F5F0; /* Görseldeki orijinal soft krem */
            --accent: #C5A059; 
            --text: #1A1A1A; 
            --admin-glass: rgba(255, 255, 255, 0.7);
        }
        * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .serif { font-family: 'Cormorant Garamond', serif; }
        
        /* --- KÖŞE YAZARLARI ŞERİDİ (Yeni Eklenen Kısım) --- */
        .columnists-section {
            background: white;
            border-bottom: 1px solid rgba(0,0,0,0.03);
            padding: 20px 5%;
            display: flex;
            align-items: center;
            gap: 40px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .columnists-section::-webkit-scrollbar { display: none; }
        .columnist-node {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-shrink: 0;
            cursor: pointer;
            transition: 0.3s;
        }
        .columnist-node:hover { opacity: 0.7; }
        .columnist-avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 1px solid rgba(0,0,0,0.05); }
        .columnist-meta { display: flex; flex-direction: column; }
        .columnist-name { font-[10px]; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
        .columnist-title { font-size: 11px; font-family: 'Cormorant Garamond', serif; italic; opacity: 0.5; }

        /* --- BENTO GRID & DİĞERLERİ (Aynı Kaldı) --- */
        .bento-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px; padding: 40px 5%; }
        .bento-item { border-radius: 40px; overflow: hidden; position: relative; height: 500px; transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); cursor: pointer; border: 1px solid rgba(0,0,0,0.03); }
        .bento-item:hover { transform: scale(0.99); }

        .atlas-box { background: #0A0A0A; padding: 60px 5%; border-radius: 60px; margin: 0 5% 20px 5%; position: relative; height: 380px; overflow: hidden; }
        .pulse { position: absolute; width: 10px; height: 10px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 20px var(--accent); animation: pulse-ring 2s infinite; }
        @keyframes pulse-ring { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }

        /* --- ADMIN PANEL (Soft & Modern Dashboard) --- */
        #admin-panel { 
            display: none; position: fixed; inset: 0; 
            background: rgba(245, 245, 240, 0.85); backdrop-filter: blur(40px); 
            z-index: 99999; padding: 40px; 
            animation: neuralIn 0.5s ease-out;
        }
        @keyframes neuralIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .admin-wrap { background: white; width: 100%; height: 100%; border-radius: 50px; display: flex; overflow: hidden; box-shadow: 0 60px 120px rgba(0,0,0,0.1); }
        .admin-sidebar { width: 300px; border-right: 1px solid rgba(0,0,0,0.03); padding: 60px 40px; }
        .admin-body { flex: 1; padding: 80px; overflow-y: auto; }
        
        .nav-btn { width: 100%; text-align: left; padding: 15px 0; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; color: rgba(0,0,0,0.2); transition: 0.3s; display: flex; align-items: center; gap: 15px; }
        .nav-btn.active { color: var(--accent); }
        
        .soft-input { background: #F9F9F7; border: 1px solid transparent; border-radius: 20px; padding: 20px; width: 100%; outline: none; transition: 0.3s; }
        .soft-input:focus { border-color: var(--accent); background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
    </style>
</head>
<body>

<nav class="sticky top-0 z-[5000] px-10 py-6 flex justify-between items-center bg-white/80 backdrop-blur-2xl border-b border-black/5">
    <div class="flex items-center gap-12">
        <h1 class="serif text-4xl font-light uppercase tracking-tighter">Lumina</h1>
        <div id="top-clock" class="hidden lg:flex gap-6 text-[10px] font-black uppercase tracking-[3px] opacity-30"></div>
    </div>
    <button onclick="toggleAdmin('flex')" class="w-12 h-12 rounded-full bg-black text-white flex items-center justify-center hover:bg-accent transition shadow-xl">
        <i data-lucide="command" class="w-5 h-5"></i>
    </button>
</nav>

<div class="columnists-section no-scrollbar">
    <div class="text-[8px] font-black uppercase tracking-[4px] opacity-20 mr-4">Featured Columnists</div>
    <div class="columnist-node">
        <img class="columnist-avatar" src="https://i.pravatar.cc/100?img=11">
        <div class="columnist-meta">
            <span class="columnist-name">M. Al-Khafaji</span>
            <span class="columnist-title">Mimari Etik</span>
        </div>
    </div>
    <div class="columnist-node">
        <img class="columnist-avatar" src="https://i.pravatar.cc/100?img=32">
        <div class="columnist-meta">
            <span class="columnist-name">Elena Rossi</span>
            <span class="columnist-title">Dijital Antropoloji</span>
        </div>
    </div>
    <div class="columnist-node">
        <img class="columnist-avatar" src="https://i.pravatar.cc/100?img=44">
        <div class="columnist-meta">
            <span class="columnist-name">Can Mardinli</span>
            <span class="columnist-title">Taşın Şiiri</span>
        </div>
    </div>
</div>

<section class="atlas-box">
    <div class="pulse" style="top: 45%; left: 58%;"></div> 
    <div class="pulse" style="top: 70%; left: 32%;"></div> 
    <svg class="absolute inset-0 w-full h-full opacity-10" style="stroke: var(--accent); stroke-width: 1;">
        <path d="M 750 150 Q 550 250 400 300" fill="transparent"/>
    </svg>
    <div class="absolute bottom-12 left-12 flex items-end gap-12 text-white">
        <div>
            <p class="text-[9px] font-black uppercase tracking-[5px] text-accent mb-2">Distance Engine</p>
            <p id="dist-val" class="serif text-6xl font-light">10.840 KM</p>
        </div>
        <div class="serif italic text-2xl opacity-40 mb-1">Mardin — Rio de Janeiro</div>
    </div>
</section>

<section id="feed" class="bento-grid"></section>

<div id="admin-panel">
    <div class="admin-wrap">
        <div class="admin-sidebar">
            <div class="serif text-3xl italic text-accent mb-20">Lumina Admin</div>
            <nav>
                <button onclick="tab('stat')" class="nav-btn active" id="b-stat"><i data-lucide="activity"></i> Raporlar</button>
                <button onclick="tab('new')" class="nav-btn" id="b-new"><i data-lucide="pen"></i> Yeni İçerik</button>
                <button onclick="toggleAdmin('none')" class="mt-40 nav-btn text-red-400"><i data-lucide="log-out"></i> Kapat</button>
            </nav>
        </div>
        <div class="admin-body no-scrollbar">
            <div id="t-stat">
                <h2 class="serif text-7xl font-light mb-12">Veri <i>Akışı</i></h2>
                <div class="grid grid-cols-2 gap-8">
                    <div class="p-12 bg-gray-50 rounded-[40px] border border-black/5">
                        <span class="text-[10px] font-black opacity-30 tracking-widest uppercase">Okunma</span>
                        <p class="text-6xl serif mt-4">12.4K</p>
                    </div>
                    <div class="p-12 bg-gray-50 rounded-[40px] border border-black/5">
                        <span class="text-[10px] font-black opacity-30 tracking-widest uppercase">Etkileşim</span>
                        <p class="text-6xl serif text-accent mt-4">88%</p>
                    </div>
                </div>
            </div>
            <div id="t-new" class="hidden">
                <h2 class="serif text-7xl font-light mb-12">Yeni Yazı</h2>
                <div class="space-y-6">
                    <input id="p-title" placeholder="Başlık" class="soft-input serif text-3xl">
                    <textarea id="p-text" placeholder="Hikaye burada başlar..." class="soft-input h-48"></textarea>
                    <button onclick="post()" class="px-16 py-5 bg-black text-white rounded-full font-black text-[10px] uppercase tracking-widest hover:bg-accent transition">Yayınla</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('LUMINA_DB')) || {
        news: [{ id: 1, title: 'Sarı Taşların Şiiri', text: 'Mardin...', img: 'https://images.unsplash.com/photo-1582738411706-bfc8e691d1c2?w=800', type: 'Kültür' }]
    };

    function render() {
        lucide.createIcons();
        document.getElementById('feed').innerHTML = data.news.map((n, i) => `
            <div class="bento-item ${i % 3 === 0 ? 'col-span-8' : 'col-span-4'}">
                <img src="${n.img}" class="absolute inset-0 w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent"></div>
                <div class="absolute bottom-10 p-10 text-white">
                    <span class="text-[9px] font-black uppercase tracking-[4px] text-accent mb-3 block">${n.type}</span>
                    <h3 class="serif text-5xl leading-tight">${n.title}</h3>
                </div>
            </div>
        `).join('');
    }

    function toggleAdmin(v) { document.getElementById('admin-panel').style.display = v; }
    function tab(t) { 
        document.getElementById('t-stat').classList.add('hidden'); document.getElementById('t-new').classList.add('hidden');
        document.getElementById('t-'+t).classList.remove('hidden');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('b-'+t).classList.add('active');
    }

    function post() {
        const n = { id: Date.now(), title: document.getElementById('p-title').value, text: document.getElementById('p-text').value, img: 'https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=800', type: 'Yeni Era' };
        data.news.unshift(n); localStorage.setItem('LUMINA_DB', JSON.stringify(data)); render(); toggleAdmin('none');
    }

    setInterval(() => {
        const now = new Date();
        document.getElementById('top-clock').innerText = `MARDIN ${now.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'})} • 24°C / RIO 18:04 • 31°C`;
    }, 1000);

    window.onload = render;
</script>
</body>
</html>
