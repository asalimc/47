<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MB | Ahmet Çınarbaş Journal - Mardin & Brazil</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #F8F6F2; --ink: #1A1A1A; --accent: #B08D57; --white: #FFFFFF;
            --ease: cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--ink); font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; line-height: 1.6; }

        header {
            padding: 20px 6%; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; background: rgba(248, 246, 242, 0.95); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo-box { display: flex; align-items: center; text-decoration: none; color: var(--ink); }
        .logo-m { font-family: 'Bodoni Moda', serif; font-size: 1.8rem; font-weight: 900; background: var(--ink); color: var(--bg); padding: 0 10px; border-radius: 8px; margin-right: 12px; }
        .logo-text { font-family: 'Bodoni Moda', serif; font-size: 0.9rem; font-weight: 900; line-height: 1; letter-spacing: 1px; }

        #progress-container { position: fixed; top: 0; left: 0; width: 100%; height: 4px; z-index: 10001; display: none; }
        #progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.1s; }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px 6% 80px; }
        .bento { display: flex; flex-direction: column; gap: 30px; }

        .card {
            background: var(--white); border-radius: 35px; padding: 45px;
            transition: transform 0.6s var(--ease), box-shadow 0.6s var(--ease); 
            cursor: pointer; border: 1px solid rgba(0,0,0,0.03);
            display: flex; flex-direction: column; justify-content: space-between; 
            min-height: 520px; width: 100%; position: relative; overflow: hidden;
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 40px 80px rgba(0,0,0,0.12); }

        .card-bg { position: absolute; inset: -5%; width: 110%; height: 110%; background-size: cover; background-position: center; z-index: 0; transition: transform 0.6s var(--ease); }
        .card:hover .card-bg { transform: scale(1.05); }
        .card-overlay { position: absolute; inset: 0; background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.85)); z-index: 1; }
        .card-content { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; justify-content: space-between; flex: 1; }

        .card-author { align-items: center; text-align: center; justify-content: center; background: var(--white); min-height: 400px; }
        .author-img { width: 160px; height: 160px; border-radius: 50%; object-fit: cover; margin-bottom: 25px; border: 6px solid var(--bg); }

        .tr-line { font-family: 'Bodoni Moda', serif; font-size: 2.6rem; line-height: 1.1; margin-bottom: 8px; display: block; font-weight: 700; letter-spacing: -1px; }
        .pt-line { font-family: 'Bodoni Moda', serif; font-size: 2.2rem; line-height: 1.1; display: block; font-weight: 400; opacity: 0.7; }
        .tag-dual { font-size: 0.75rem; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 20px; display: block; }
        .entry-no { font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; opacity: 0.5; margin-top: 25px; text-transform: uppercase; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 15px; width: fit-content; }

        /* READER MODAL */
        #reader-modal { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; overflow-y: auto; padding: 100px 6% 60px; }
        .reader-header { text-align: center; margin-bottom: 60px; max-width: 900px; margin-left: auto; margin-right: auto; }
        .reader-grid { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr; gap: 50px; }
        .reader-text { font-size: 1.25rem; line-height: 1.9; color: #2D2D2D; text-align: justify; }
        .reader-text b { color: var(--ink); display: block; margin-top: 40px; font-weight: 800; font-size: 1.4rem; font-family: 'Bodoni Moda', serif; border-bottom: 1px solid var(--accent); width: fit-content; margin-bottom: 15px; }
        
        /* EKSTRA İÇERİK (Yazar Arşivi & İlgili) */
        .mini-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .mini-card { background: white; padding: 20px; border-radius: 15px; border: 1px solid rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s; }
        .mini-card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .mini-card b { display: block; font-size: 0.9rem; margin-bottom: 5px; }
        .mini-card span { font-size: 0.7rem; color: var(--accent); font-weight: 700; }

        .divider { width: 100%; height: 1px; background: rgba(0,0,0,0.05); margin: 60px 0; }
        .close-btn { position: fixed; top: 30px; right: 6%; background: var(--ink); color: white; border: none; padding: 15px 35px; border-radius: 50px; font-weight: 800; cursor: pointer; z-index: 10000; }

        footer { padding: 80px 6%; text-align: center; border-top: 1px solid rgba(0,0,0,0.05); background: var(--white); }
        
        @media (min-width: 768px) { .reader-grid { grid-template-columns: 1fr 1px 1fr; gap: 60px; } .divider-v { width: 1px; height: auto; background: rgba(176,141,87,0.2); } }
    </style>
</head>
<body>

    <div id="progress-container"><div id="progress-bar"></div></div>

    <header>
        <a href="#" class="logo-box"><div class="logo-m">MB</div><div class="logo-text">MARDIN<br>BRAZIL</div></a>
    </header>

    <main class="container">
        <div class="bento" id="bento-grid">
            <div class="card card-author" onclick="showAuthorDetails()">
                <img src="https://pbs.twimg.com/media/GifApT2XEAAqees.jpg" class="author-img">
                <div class="card-content">
                    <div>
                        <span class="tag-dual">KÖŞE YAZARI ● COLUNISTA</span>
                        <span class="tr-line">Ahmet Çınarbaş</span>
                        <span class="pt-line">Arquivista Cultural</span>
                    </div>
                    <div class="entry-no">JOURNAL ENTRY #000</div>
                </div>
            </div>
            
            </div>
    </main>

    <div id="reader-modal" onscroll="updateProgress()">
        <button class="close-btn" onclick="closeReader()">KAPAT ● FECHAR</button>
        <div id="reader-content-area">
            </div>
    </div>

    <footer><div class="footer-bottom">AHMET ÇINARBAŞ JOURNAL © 2026 ● MARDIN TO BRAZIL</div></footer>

    <script>
        let allArticles = [];

        // GITHUB'DAN VERİLERİ ÇEK
        async function loadArticles() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/asalimc/47/main/articles.json?t=' + Date.now());
                allArticles = await response.json();
                renderCards();
            } catch (e) {
                console.error("Veri yüklenemedi:", e);
            }
        }

        // KARTLARI EKRANA BAS
        function renderCards() {
            const bentoGrid = document.getElementById('bento-grid');
            // Sadece yazar kartını bırak, diğerlerini temizle
            const authorCard = bentoGrid.firstElementChild;
            bentoGrid.innerHTML = '';
            bentoGrid.appendChild(authorCard);

            allArticles.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openDetailedReader(item.id);
                card.innerHTML = `
                    <div class="card-bg" style="background-image: url('${item.image}')"></div>
                    <div class="card-overlay"></div>
                    <div class="card-content" style="color: white;">
                        <div>
                            <span class="tag-dual" style="color: white;">${item.category}</span>
                            <span class="tr-line">${item.tr.title}</span>
                            <span class="pt-line">${item.pt.title}</span>
                        </div>
                        <div class="entry-no">JOURNAL ENTRY #00${index + 1}</div>
                    </div>
                `;
                bentoGrid.appendChild(card);
            });
        }

        // OKUMA MODU (DETAYLI)
        function openDetailedReader(id) {
            const item = allArticles.find(a => a.id === id);
            const modal = document.getElementById('reader-modal');
            const contentArea = document.getElementById('reader-content-area');
            
            // İlgili Yazılar (Aynı kategori)
            const related = allArticles.filter(a => a.category === item.category && a.id !== id);
            
            contentArea.innerHTML = `
                <div class="reader-header" style="margin-top:100px;">
                    <span class="tag-dual">${item.category}</span>
                    <h1 class="tr-line">${item.tr.title}</h1>
                    <h2 class="pt-line">${item.pt.title}</h2>
                </div>
                <div class="reader-grid">
                    <div class="reader-text">${item.tr.body.replace(/\n/g, '<br>')}</div>
                    <div class="divider-v"></div>
                    <div class="reader-text">${item.pt.body.replace(/\n/g, '<br>')}</div>
                </div>
                
                <div class="container">
                    <div class="divider"></div>
                    <h4 class="tag-dual">Kategorideki Diğer Yazılar</h4>
                    <div class="mini-grid">
                        ${related.map(r => `
                            <div class="mini-card" onclick="openDetailedReader(${r.id})">
                                <b>${r.tr.title}</b>
                                <span>${r.category}</span>
                            </div>
                        `).join('')}
                    </div>

                    <div class="divider"></div>
                    <h4 class="tag-dual">Ahmet Çınarbaş Arşivi</h4>
                    <div class="mini-grid">
                        ${allArticles.map(a => `
                            <div class="mini-card" onclick="openDetailedReader(${a.id})">
                                <b>${a.tr.title}</b>
                                <span>${a.date}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            modal.style.display = 'block';
            document.getElementById('progress-container').style.display = 'block';
            document.body.style.overflow = 'hidden';
            modal.scrollTop = 0;
        }

        // YAZAR DETAYI (ENTRY #000)
        function showAuthorDetails() {
            // Yazar için özel bir modal içeriği buraya gelebilir
            alert("Ahmet Çınarbaş: Kültürel Arşivci ve Köşe Yazarı.");
        }

        function closeReader() {
            document.getElementById('reader-modal').style.display = 'none';
            document.getElementById('progress-container').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function updateProgress() {
            const modal = document.getElementById('reader-modal');
            const scrolled = (modal.scrollTop / (modal.scrollHeight - modal.clientHeight)) * 100;
            document.getElementById("progress-bar").style.width = scrolled + "%";
        }

        // Sayfa açıldığında verileri çek
        loadArticles();
    </script>
</body>
</html>
