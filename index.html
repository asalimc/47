<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASC GLOBAL | Executive Enterprise v18</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Inter:wght@300;400;600;700;900&display=swap');
        
        :root { --ivory: #fcfaf7; --navy: #0f172a; --gold: #c5a358; --slate: #475569; }

        body { font-family: 'Inter', sans-serif; background-color: var(--ivory); color: var(--navy); scroll-behavior: smooth; }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        /* Gelişmiş Reklam Alanı Sınırlayıcı */
        .ad-container { width: 300px; height: 300px; overflow: hidden; display: flex; align-items: center; justify-content: center; background: white; border-radius: 24px; border: 1px solid rgba(0,0,0,0.05); }
        .ad-container img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* Admin Okunabilirlik ve Netlik */
        .admin-field { background: #ffffff !important; color: #1e293b !important; border: 1.5px solid #e2e8f0 !important; font-weight: 500; font-size: 14px; }
        .admin-field:focus { border-color: var(--gold) !important; outline: none; box-shadow: 0 0 0 3px rgba(197, 163, 88, 0.1); }
        .admin-label { color: #64748b; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; display: block; }

        [x-cloak] { display: none !important; }
        .transition-soft { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body x-data="ascEngine()" x-init="init()">

    <nav class="sticky top-0 z-[100] bg-white/90 backdrop-blur-xl border-b border-stone-100 px-10 py-5 flex justify-between items-center shadow-sm">
        <div @click="currentPage = 'home'" class="flex items-center gap-4 cursor-pointer group">
            <div class="bg-navy text-white w-12 h-12 flex items-center justify-center rounded-2xl font-black text-xl group-hover:bg-gold transition-soft">A</div>
            <h1 class="font-serif text-3xl">ASC <span class="text-stone-400 italic font-light">GLOBAL</span></h1>
        </div>
        <button @click="openAdmin()" class="bg-navy text-white px-10 py-3.5 rounded-full font-bold text-[10px] uppercase tracking-widest hover:bg-gold hover:shadow-xl transition-soft">
            YÖNETİM TERMİNALİ
        </button>
    </nav>

    <main x-show="currentPage === 'home'" x-cloak class="max-w-[1440px] mx-auto px-8 py-16">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-16">
            
            <div class="lg:col-span-9 space-y-24">
                
                <section>
                    <div class="flex items-end gap-4 mb-12 border-b border-stone-100 pb-6">
                        <h2 class="font-serif text-5xl italic">Yazarlar</h2>
                        <span class="text-stone-300 text-sm mb-2 italic">/ Stratejik Akıl Grubu</span>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                        <template x-for="author in authors" :key="author.id">
                            <div @click="viewItem(author, 'author')" class="bg-white p-8 rounded-[40px] flex items-center gap-8 cursor-pointer hover:shadow-2xl hover:-translate-y-2 transition-soft border border-stone-50 group">
                                <div class="w-28 h-28 flex-shrink-0 overflow-hidden rounded-[30px] shadow-lg">
                                    <img :src="author.photo" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-soft">
                                </div>
                                <div>
                                    <p class="text-gold font-black text-[9px] uppercase tracking-widest mb-1" x-text="author.title"></p>
                                    <h3 class="font-serif text-3xl group-hover:text-gold transition-soft" x-text="author.name"></h3>
                                </div>
                            </div>
                        </template>
                    </div>
                </section>

                <section>
                    <div class="flex items-end gap-4 mb-12 border-b border-stone-100 pb-6">
                        <h2 class="font-serif text-5xl italic">Raporlar</h2>
                        <span class="text-stone-300 text-sm mb-2 italic">/ Global Akış</span>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                        <template x-for="news in newsData" :key="news.id">
                            <div @click="viewItem(news, 'news')" class="group cursor-pointer">
                                <div class="aspect-[16/10] rounded-[50px] overflow-hidden mb-8 shadow-xl">
                                    <img :src="news.img" class="w-full h-full object-cover group-hover:scale-110 transition-soft duration-1000">
                                </div>
                                <div class="px-4">
                                    <span class="text-slate-400 text-[10px] font-black uppercase tracking-widest" x-text="news.region"></span>
                                    <h4 class="font-serif text-3xl mt-3 leading-tight group-hover:text-gold transition-soft" x-text="news.title"></h4>
                                </div>
                            </div>
                        </template>
                    </div>
                </section>
            </div>

            <div class="lg:col-span-3 space-y-12">
                <div class="sticky top-32 space-y-12">
                    <div class="text-center">
                        <p class="text-[10px] font-black text-stone-300 uppercase tracking-[0.4em] mb-6">İş Ortağı Reklamı</p>
                        <div class="ad-container mx-auto shadow-2xl border border-stone-100">
                            <img :src="adImage || 'https://via.placeholder.com/300x300?text=ASC+REKLAM'" alt="Reklam">
                        </div>
                    </div>

                    <div class="bg-navy p-10 rounded-[50px] text-white shadow-2xl relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-24 h-24 bg-gold/10 rounded-full -mr-12 -mt-12"></div>
                        <h3 class="font-serif text-2xl italic mb-6 text-gold">Haftalık Analiz</h3>
                        <p class="text-xs text-slate-400 leading-relaxed mb-8">Küresel olayların perde arkasını e-posta ile alın.</p>
                        <button class="w-full py-4 rounded-2xl bg-white/5 border border-white/10 text-[10px] font-bold uppercase tracking-widest hover:bg-gold hover:text-navy transition-soft">Abonelik Başlat</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div x-show="currentPage === 'admin'" class="fixed inset-0 z-[2000] bg-stone-100 flex overflow-hidden" x-cloak>
        <div class="w-80 bg-navy p-10 flex flex-col justify-between">
            <div class="space-y-12">
                <div class="border-b border-white/10 pb-8 text-center">
                    <h2 class="font-serif text-white text-3xl italic">ASC CMS</h2>
                    <p class="text-[9px] text-gold font-bold uppercase tracking-[0.3em] mt-2">v18 Enterprise</p>
                </div>
                <nav class="space-y-3">
                    <button @click="adminTab = 'news'" :class="adminTab === 'news' ? 'bg-gold text-navy shadow-lg' : 'text-slate-400 hover:bg-white/5'" class="w-full text-left px-8 py-5 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-soft">Haber Yönetimi</button>
                    <button @click="adminTab = 'authors'" :class="adminTab === 'authors' ? 'bg-gold text-navy shadow-lg' : 'text-slate-400 hover:bg-white/5'" class="w-full text-left px-8 py-5 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-soft">Yazar Yönetimi</button>
                    <button @click="adminTab = 'ads'" :class="adminTab === 'ads' ? 'bg-gold text-navy shadow-lg' : 'text-slate-400 hover:bg-white/5'" class="w-full text-left px-8 py-5 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-soft">Reklam Ayarları</button>
                </nav>
            </div>
            <button @click="currentPage = 'home'" class="w-full bg-red-500/10 text-red-400 py-5 rounded-2xl text-[10px] font-black uppercase hover:bg-red-500 hover:text-white transition-soft">Sistemden Çık</button>
        </div>

        <div class="flex-grow p-16 overflow-y-auto">
            <div class="max-w-4xl mx-auto">
                <div class="flex justify-between items-center mb-12">
                    <h3 class="text-4xl font-serif italic text-navy" x-text="tabName()"></h3>
                    <button x-show="adminTab !== 'ads'" @click="resetForm(); showForm = true" class="bg-navy text-white px-10 py-4 rounded-2xl font-bold text-xs uppercase shadow-xl hover:scale-105 transition-soft">+ YENİ KAYIT</button>
                </div>

                <template x-if="adminTab === 'ads'">
                    <div class="bg-white p-12 rounded-[50px] shadow-sm border border-stone-200 text-center space-y-8">
                        <div class="ad-container mx-auto bg-stone-50 border-2 border-dashed border-stone-200 shadow-inner">
                            <img :src="adImage || 'https://via.placeholder.com/300x300?text=REKLAM+YOK'" class="rounded-xl">
                        </div>
                        <div class="max-w-sm mx-auto">
                            <input type="file" @change="handleAdUpload" class="hidden" id="adFile">
                            <label for="adFile" class="block w-full bg-navy text-white py-5 rounded-2xl font-bold text-[10px] uppercase tracking-widest cursor-pointer hover:bg-gold transition-soft shadow-xl">BİLGİSAYARDAN GÖRSEL SEÇ</label>
                            <p class="mt-6 text-slate-400 text-xs italic font-medium">Görsel boyutunuz ne olursa olsun otomatik olarak 300x300 alanına sığdırılacaktır.</p>
                        </div>
                    </div>
                </template>

                <div x-show="showForm && adminTab !== 'ads'" class="bg-white p-12 rounded-[50px] shadow-2xl mb-12 border border-stone-100">
                    <div class="grid grid-cols-2 gap-8 mb-8">
                        <div class="space-y-1">
                            <label class="admin-label">Ana Başlık / Tam İsim</label>
                            <input x-model="form.main" type="text" class="admin-field w-full p-5 rounded-2xl outline-none">
                        </div>
                        <div class="space-y-1">
                            <label class="admin-label">Bölge / Uzmanlık Ünvanı</label>
                            <input x-model="form.sub" type="text" class="admin-field w-full p-5 rounded-2xl outline-none">
                        </div>
                        <div class="col-span-2 space-y-1">
                            <label class="admin-label">Metin İçeriği (Okuma Modu Detayı)</label>
                            <textarea x-model="form.content" class="admin-field w-full p-5 rounded-2xl h-56 outline-none resize-none"></textarea>
                        </div>
                        <div class="col-span-2">
                            <label class="admin-label">Görsel Materyal</label>
                            <div class="border-2 border-dashed border-stone-100 p-12 rounded-3xl text-center relative hover:bg-stone-50 transition-soft group">
                                <input type="file" @change="handleFile" class="absolute inset-0 opacity-0 cursor-pointer">
                                <i class="fas fa-cloud-upload-alt text-3xl text-stone-200 mb-4 group-hover:text-gold transition-soft"></i>
                                <span class="block text-[10px] font-bold text-slate-400 tracking-widest uppercase">Dosya Yüklemek İçin Tıklayın</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-4">
                        <button @click="save()" class="flex-grow bg-navy text-white py-6 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl hover:bg-gold transition-soft">SİSTEMİ GÜNCELLE</button>
                        <button @click="showForm = false" class="px-12 bg-stone-100 text-slate-500 rounded-2xl font-bold text-xs uppercase hover:bg-stone-200 transition-soft">VAZGEÇ</button>
                    </div>
                </div>

                <div x-show="adminTab !== 'ads'" class="space-y-4">
                    <template x-for="item in (adminTab === 'news' ? newsData : authors)" :key="item.id">
                        <div class="bg-white p-6 rounded-[30px] flex items-center justify-between shadow-sm border border-stone-100 hover:shadow-md transition-soft">
                            <div class="flex items-center gap-6">
                                <img :src="item.img || item.photo" class="w-16 h-16 rounded-2xl object-cover shadow-md">
                                <div>
                                    <h4 class="font-bold text-navy text-lg" x-text="item.title || item.name"></h4>
                                    <p class="text-[10px] font-black text-gold uppercase tracking-widest" x-text="item.region || item.title"></p>
                                </div>
                            </div>
                            <div class="flex gap-3">
                                <button @click="editItem(item)" class="w-12 h-12 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center hover:bg-blue-600 hover:text-white transition-soft shadow-sm"><i class="fas fa-pen"></i></button>
                                <button @click="deleteItem(item.id)" class="w-12 h-12 rounded-xl bg-red-50 text-red-600 flex items-center justify-center hover:bg-red-600 hover:text-white transition-soft shadow-sm"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>

    <div x-show="currentPage === 'reader'" class="fixed inset-0 z-[3000] bg-white overflow-y-auto" x-cloak x-transition:enter="transition-soft" x-transition:enter-start="opacity-0 translate-y-10">
        <div class="max-w-3xl mx-auto py-32 px-10">
            <button @click="currentPage = 'home'" class="fixed top-12 right-12 w-16 h-16 bg-stone-100 rounded-full flex items-center justify-center text-navy hover:bg-navy hover:text-white transition-soft shadow-xl text-xl"><i class="fas fa-times"></i></button>
            <span class="text-gold font-black text-xs uppercase tracking-[0.5em] mb-6 block" x-text="selectedItem?.region || selectedItem?.title"></span>
            <h1 class="font-serif text-6xl md:text-8xl italic mb-12
