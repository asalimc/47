<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina v17 | Soft Intelligence</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Inter:wght@100;300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { --bg: #F9F9F7; --soft-admin: #F4F4F1; --accent: #C5A059; --text: #1A1A1A; --dark: #0A0A0A; }
        * { -webkit-font-smoothing: antialiased; box-sizing: border-box; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; margin: 0; }
        .serif { font-family: 'Cormorant Garamond', serif; }
        
        /* Modal & Overlays */
        .modal-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 100000; overflow-y: auto; }
        
        /* Bento Grid */
        .bento-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px; padding: 20px 5%; }
        .bento-item { border-radius: 40px; overflow: hidden; position: relative; cursor: pointer; border: 1px solid rgba(0,0,0,0.05); height: 500px; }
        .bento-item:hover { transform: scale(0.98); box-shadow: 0 30px 60px rgba(0,0,0,0.05); }

        /* --- THE SOFT DASHBOARD (Dünyanın En İyisi) --- */
        #admin-panel { display: none; position: fixed; inset: 0; background: var(--soft-admin); z-index: 200000; flex-direction: row; animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .admin-sidebar { width: 320px; background: #fff; border-right: 1px solid rgba(0,0,0,0.04); padding: 50px 30px; display: flex; flex-direction: column; }
        .admin-main { flex: 1; padding: 60px 5%; overflow-y: auto; background: var(--soft-admin); }
        
        .admin-nav-btn { width: 100%; text-align: left; padding: 18px 24px; border-radius: 20px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: rgba(0,0,0,0.3); margin-bottom: 10px; display: flex; align-items: center; gap: 15px; }
        .admin-nav-btn.active { background: var(--bg); color: var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        
        .admin-card { background: #fff; border: 1px solid rgba(0,0,0,0.03); border-radius: 35px; padding: 35px; box-shadow: 0 4px 20px rgba(0,0,0,0.01); }
        .input-lux { background: #F9F9F7; border: 1px solid rgba(0,0,0,0.05); border-radius: 20px; padding: 20px 25px; width: 100%; color: var(--text); outline: none; font-size: 14px; }
        .input-lux:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 5px rgba(197, 160, 89, 0.05); }

        /* Atlas v13 Koruma */
        .atlas-container { background: var(--dark); padding: 60px 5%; border-radius: 60px; margin: 40px 5%; position: relative; height: 400px; overflow: hidden; }
        .pulse-point { position: absolute; width: 12px; height: 12px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 20px var(--accent); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }

        .highlight { color: var(--accent); font-weight: 700; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="no-scrollbar">

<nav class="sticky top-0 z-[5000] px-10 py-6 flex justify-between items-center bg-white/70 backdrop-blur-2xl border-b border-black/5">
    <div class="flex items-center gap-12">
        <h1 class="serif text-4xl font-light uppercase tracking-tighter">Lumina</h1>
        <div id="ui-global-clock" class="hidden lg:flex gap-6 text-[10px] font-black uppercase tracking-[3px] opacity-40"></div>
    </div>
    <div class="flex items-center gap-6">
        <button onclick="toggleAdmin('flex')" class="w-12 h-12 rounded-full bg-black text-white flex items-center justify-center hover:bg-accent transition shadow-lg">
            <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
        </button>
    </div>
</nav>

<header class="px-[5%] py-20 flex flex-col md:flex-row justify-between items-end border-b border-black/5">
    <div class="max-w-4xl">
        <p class="text-[11px] font-black uppercase tracking-[8px] text-accent mb-6">Master Console v17</p>
        <h2 class="serif text-8xl md:text-9xl font-light leading-none tracking-tighter">Mardin <br><i class="font-light">Sao Paulo</i></h2>
    </div>
    <div class="text-right mt-10 md:mt-0">
        <div class="bg-white p-10 rounded-[50px] shadow-sm border border-black/5">
            <p class="text-[9px] font-black opacity-20 uppercase tracking-widest mb-2">Distance Engine</p>
            <p id="ui-distance" class="serif text-6xl font-bold">10.604 KM</p>
        </div>
    </div>
</header>

<section class="atlas-container">
    <div class="pulse-point" style="top: 42%; left: 58%;"></div> 
    <div class="pulse-point" style="top: 75%; left: 32%;"></div> 
    <svg class="absolute inset-0 w-full h-full pointer-events-none" style="stroke: var(--accent); stroke-width: 1; stroke-dasharray: 8; opacity: 0.3;">
        <path d="M 720 160 Q 550 250 400 300" fill="transparent"/>
    </svg>
    <div class="absolute bottom-12 left-12 text-white/30 serif italic text-2xl">Transcontinental Bridge: Middle East — South America</div>
</section>

<section id="ui-feed" class="bento-grid"></section>

<div id="admin-panel">
    <div class="admin-sidebar shadow-2xl shadow-black/5">
        <div class="mb-20">
            <h2 class="serif text-4xl italic text-accent">Lumina OS</h2>
            <p class="text-[9px] font-black uppercase tracking-[4px] opacity-20 mt-2">Soft Interface</p>
        </div>
        <nav class="flex-1">
            <button onclick="switchTab('dash')" class="admin-nav-btn active" id="btn-dash"><i data-lucide="pie-chart" class="w-4 h-4"></i> Dashboard</button>
            <button onclick="switchTab('news')" class="admin-nav-btn" id="btn-news"><i data-lucide="pen-tool" class="w-4 h-4"></i> İçerik Atölyesi</button>
            <button onclick="switchTab('settings')" class="admin-nav-btn" id="btn-settings"><i data-lucide="globe" class="w-4 h-4"></i> Sistem Ayarları</button>
        </nav>
        <button onclick="toggleAdmin('none')" class="mt-auto w-full py-5 border border-black/5 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-red-50 hover:text-red-500 transition">Sistemi Kilitle</button>
    </div>
    
    <div class="admin-main no-scrollbar">
        <div id="tab-dash" class="admin-tab">
            <div class="flex justify-between items-end mb-12">
                <h3 class="serif text-6xl italic">Genel Bakış</h3>
            </div>
            <div class="grid grid-cols-3 gap-8 mb-12">
                <div class="admin-card">
                    <p class="text-[10px] uppercase font-black opacity-30 mb-4 tracking-widest">Kültürel IQ</p>
                    <p class="text-5xl serif text-accent font-light">%98.4</p>
                </div>
                <div class="admin-card">
                    <p class="text-[10px] uppercase font-black opacity-30 mb-4 tracking-widest">İçerik Akışı</p>
                    <p class="text-5xl serif font-light">Aktif</p>
                </div>
                <div class="admin-card">
                    <p class="text-[10px] uppercase font-black opacity-30 mb-4 tracking-widest">Sistem Hızı</p>
                    <p class="text-5xl serif text-green-500 font-light">12ms</p>
                </div>
            </div>
        </div>

        <div id="tab-news" class="admin-tab hidden">
            <h3 class="serif text-6xl italic mb-12">Yeni Hikaye Oluştur</h3>
            <div class="admin-card">
                <div class="space-y-6">
                    <input id="in-news-title" placeholder="Makale Başlığı" class="input-lux serif text-2xl">
                    <textarea id="in-news-text" placeholder="Hikayenin ruhunu buraya dök..." class="input-lux h-64 resize-none"></textarea>
                    <div class="grid grid-cols-2 gap-6">
                        <div class="relative">
                            <input type="file" id="in-news-file" class="hidden" onchange="handleFile(this, 'news-preview')">
                            <label for="in-news-file" class="flex items-center justify-center border-2 border-dashed border-black/5 rounded-3xl p-10 cursor-pointer hover:border-accent group">
                                <div class="text-center">
                                    <i data-lucide="image" class="mx-auto mb-2 opacity-20 group-hover:text-accent group-hover:opacity-100"></i>
                                    <span class="text-[9px] font-black uppercase tracking-widest opacity-40">Görsel Seç</span>
                                </div>
                            </label>
                        </div>
                        <div id="news-preview-box" class="rounded-3xl overflow-hidden border border-black/5 bg-gray-50 flex items-center justify-center">
                            <img id="news-preview" class="w-full h-full object-cover hidden">
                            <p id="preview-placeholder" class="text-[9px] font-black uppercase opacity-20 tracking-widest">Önizleme Yok</p>
                        </div>
                    </div>
                    <button onclick="addNews()" class="w-full bg-black text-white py-6 rounded-3xl font-black text-[11px] uppercase tracking-[4px] hover:bg-accent transition transform active:scale-[0.98]">Yayınla</button>
                </div>
            </div>
        </div>

        <div id="tab-settings" class="admin-tab hidden">
            <h3 class="serif text-6xl italic mb-12">Global Parametreler</h3>
            <div class="admin-card max-w-2xl">
                <div class="space-y-6">
                    <div>
                        <label class="text-[9px] font-black uppercase tracking-widest opacity-40 mb-3 block">Mardin İklimi</label>
                        <input id="in-glob-mardin" placeholder="Örn: 26°C" class="input-lux">
                    </div>
                    <div>
                        <label class="text-[9px] font-black uppercase tracking-widest opacity-40 mb-3 block">Sao Paulo İklimi</label>
                        <input id="in-glob-sp" placeholder="Örn: 22°C" class="input-lux">
                    </div>
                    <button onclick="saveQuickGlobal()" class="w-full bg-accent text-white py-6 rounded-3xl font-black text-[11px] uppercase tracking-[4px]">Güncelle</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="article-modal" class="modal-overlay">
    <div class="p-10 flex justify-between items-center sticky top-0 bg-white/90 backdrop-blur-md z-10">
        <button onclick="closeModals()" class="font-black text-[10px] uppercase opacity-40 flex items-center gap-2"><i data-lucide="chevron-left" class="w-4 h-4"></i> Geri Dön</button>
        <button id="tts-btn" onclick="toggleKaraoke()" class="bg-black text-white px-10 py-4 rounded-full font-black text-[10px] uppercase tracking-[3px]">Sesli Deneyim</button>
    </div>
    <div id="article-content" class="max-w-4xl mx-auto py-24 px-10"></div>
</div>

<script>
    let DB = JSON.parse(localStorage.getItem('LUMINA_V17_DB')) || {
        global: { mardin: '26°C', sp: '22°C', dist: '10.604 KM' },
        news: [
            { id: 1, title: 'Betonun ve Taşın Şiiri', text: 'Mardin bin yıllık taş evleri, Sao Paulo brütalist gökdelenleriyle aynı dili konuşur: Hafıza.', img: 'https://images.unsplash.com/photo-1582738411706-bfc8e691d1c2?w=1200', type: 'Mimari' }
        ]
    };

    function sync() { localStorage.setItem('LUMINA_V17_DB', JSON.stringify(DB)); render(); }

    function updateClocks() {
        const mardinTime = new Date().toLocaleTimeString('tr-TR', { timeZone: 'Europe/Istanbul', hour: '2-digit', minute: '2-digit' });
        const spTime = new Date().toLocaleTimeString('tr-TR', { timeZone: 'America/Sao_Paulo', hour: '2-digit', minute: '2-digit' });
        document.getElementById('ui-global-clock').innerHTML = `
            <span>Mardin ${mardinTime} • ${DB.global.mardin}</span>
            <span class="opacity-10">|</span>
            <span>Sao Paulo ${spTime} • ${DB.global.sp}</span>
        `;
    }
    setInterval(updateClocks, 1000);

    function render() {
        lucide.createIcons();
        document.getElementById('ui-distance').innerText = DB.global.dist;
        const feed = document.getElementById('ui-feed');
        feed.innerHTML = DB.news.map((n, idx) => `
            <div class="bento-item ${idx % 3 === 0 ? 'col-span-8' : 'col-span-4'}" onclick="openArticle(${n.id})">
                <img src="${n.img}" class="absolute inset-0 w-full h-full object-cover transition duration-700 hover:scale-105">
                <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent"></div>
                <div class="absolute bottom-0 p-12 text-white">
                    <span class="text-[9px] font-black uppercase tracking-[5px] text-accent mb-4 block">${n.type}</span>
                    <h3 class="serif text-6xl leading-tight tracking-tighter">${n.title}</h3>
                </div>
            </div>
        `).join('');
    }

    let lastUploadedImg = "";
    function handleFile(input, previewId) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            lastUploadedImg = e.target.result;
            const preview = document.getElementById(previewId);
            preview.src = e.target.result;
            preview.classList.remove('hidden');
            document.getElementById('preview-placeholder').classList.add('hidden');
        };
        reader.readAsDataURL(file);
    }

    function openArticle(id) {
        const n = DB.news.find(x => x.id === id);
        document.getElementById('article-content').innerHTML = `
            <h1 class="serif text-8xl leading-[0.85] tracking-tighter mb-16 text-center">${n.title}</h1>
            <div id="karaoke-text" class="serif text-4xl leading-relaxed text-justify opacity-80">
                ${n.text.split(' ').map(word => `<span>${word}</span>`).join(' ')}
            </div>
        `;
        document.getElementById('article-modal').style.display = 'block';
    }

    function toggleKaraoke() {
        const spans = document.querySelectorAll('#karaoke-text span');
        const utter = new SpeechSynthesisUtterance(document.getElementById('karaoke-text').innerText);
        utter.lang = 'tr-TR'; utter.rate = 0.9;
        let wordIndex = 0;
        utter.onboundary = (event) => {
            if (event.name === 'word') {
                spans.forEach(s => s.classList.remove('highlight'));
                if(spans[wordIndex]) spans[wordIndex].classList.add('highlight');
                wordIndex++;
            }
        };
        window.speechSynthesis.speak(utter);
    }

    function toggleAdmin(val) { document.getElementById('admin-panel').style.display = val; }
    
    function switchTab(t) { 
        document.querySelectorAll('.admin-tab').forEach(x => x.classList.add('hidden')); 
        document.querySelectorAll('.admin-nav-btn').forEach(x => x.classList.remove('active'));
        document.getElementById('tab-'+t).classList.remove('hidden'); 
        document.getElementById('btn-'+t).classList.add('active');
    }
    
    function addNews() {
        const n = { id: Date.now(), title: document.getElementById('in-news-title').value, text: document.getElementById('in-news-text').value, img: lastUploadedImg || 'https://via.placeholder.com/1200', type: 'Kültür' };
        DB.news.unshift(n); sync(); toggleAdmin('none');
    }

    function saveQuickGlobal() {
        DB.global.mardin = document.getElementById('in-glob-mardin').value || DB.global.mardin;
        DB.global.sp = document.getElementById('in-glob-sp').value || DB.global.sp;
        sync();
    }

    function closeModals() { window.speechSynthesis.cancel(); document.querySelectorAll('.modal-overlay').forEach(m => m.style.display='none'); }

    window.onload = () => { render(); updateClocks(); };
</script>
</body>
</html>
