<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mardin Brazil Journal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 15px; }
        .tag { color: #888; font-size: 0.8rem; text-transform: uppercase; }
        h2 { margin: 10px 0; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="grid" id="main-grid">
        <p>Veriler yükleniyor...</p>
    </div>

    <script type="importmap">
        {
          "imports": {
            "@neondatabase/serverless": "https://cdn.jsdelivr.net/npm/@neondatabase/serverless@0.9.0/dist/index.mjs"
          }
        }
    </script>

    <script type="module">
        import { neon } from '@neondatabase/serverless';

        async function init() {
            // BURAYI GÜNCELLE: Neon Dashboard -> Connection String kısmındaki linki buraya yapıştır
            const databaseUrl = 'YOUR_NEON_CONNECTION_STRING_HERE';
            const sql = neon(databaseUrl);

            try {
                const rows = await sql`SELECT * FROM articles ORDER BY id DESC`;
                const grid = document.getElementById('main-grid');
                
                if (rows.length === 0) {
                    grid.innerHTML = "<p>Henüz veri eklenmemiş.</p>";
                    return;
                }

                grid.innerHTML = rows.map(item => `
                    <div class="card">
                        <img src="${item.img || 'https://via.placeholder.com/300'}" alt="Image">
                        <div class="card-body">
                            <span class="tag">${item.tag}</span>
                            <h2>${item.tr}</h2>
                        </div>
                    </div>
                `).join('');

            } catch (err) {
                console.error("Bağlantı Hatası:", err);
                document.getElementById('main-grid').innerHTML = `<p style="color:red;">Hata: ${err.message}</p>`;
            }
        }

        init();
    </script>
</body>
</html>
