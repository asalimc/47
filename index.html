<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mardin Haber TV // Brasil - Ahmet Çınarbaş</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;700;900&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #f2f0e9;
            --ink: #0f0f0f;
            --mh-red: #d32f2f;
            --mh-grey: #263238;
            --border: rgba(0,0,0,0.12);
            --transition: cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Reset & Base */
        * { margin: 0; padding: 0; box-sizing: border-box; font-style: normal !important; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); color: var(--ink); font-family: 'Inter', sans-serif; overflow-x: hidden; line-height: 1.5; }

        /* Navigation Responsive */
        nav { 
            padding: 20px 6%; display: flex; justify-content: space-between; align-items: center; 
            position: fixed; top: 0; width: 100%; z-index: 2000; 
            border-bottom: 1px solid var(--border); background: rgba(242,240,233,0.85); backdrop-filter: blur(15px); 
        }
        .nav-logo { font-family: 'Playfair Display', serif; font-size: clamp(1.2rem, 3vw, 1.8rem); font-weight: 900; }
        .nav-meta { font-size: clamp(8px, 2vw, 11px); font-weight: 900; color: var(--mh-red); border: 2px solid var(--mh-red); padding: 4px 10px; text-transform: uppercase; }

        /* Hero Full Responsive */
        .hero { display: grid; grid-template-columns: 1.2fr 0.8fr; min-height: 100vh; border-bottom: 1px solid var(--border); padding-top: 70px; }
        .hero-text { padding: 40px 10%; display: flex; flex-direction: column; justify-content: center; background: #fff; border-right: 1px solid var(--border); }
        .hero-visual { background: url('https://pbs.twimg.com/profile_images/1559852899303317504/pjkJwYHb_400x400.jpg') center/cover; filter: grayscale(1); min-height: 350px; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 8vw, 6.5rem); line-height: 0.9; margin-bottom: 25px; letter-spacing: -2px; }
        .hero p { font-family: 'Cormorant Gramond', serif; font-size: clamp(1.2rem, 3vw, 1.8rem); border-left: 4px solid var(--mh-red); padding-left: 20px; color: #444; max-width: 550px; }

        /* Video Area Responsive */
        .video-wrapper { width: 100%; background: var(--mh-grey); padding: 60px 0; position: relative; z-index: 1000; }
        .video-container { max-width: 1000px; margin: 0 auto; padding: 0 5%; }
        .video-box { position: relative; padding-bottom: 56.25%; height: 0; border: 8px solid #fff; box-shadow: 0 40px 80px rgba(0,0,0,0.5); }
        .video-box iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

        /* Gallery Grid Responsive */
        .gallery-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); }
        .gallery-item { 
            background: #fff; padding: clamp(30px, 5vw, 60px) 30px; aspect-ratio: 1/1.2; 
            display: flex; flex-direction: column; justify-content: flex-end; 
            transition: 0.4s; cursor: pointer !important; position: relative; z-index: 10;
        }
        .gallery-item:hover { background: var(--bg); transform: translateY(-5px); z-index: 20; }
        .gallery-item * { pointer-events: none; } /* Metinlerin tıklamayı engellemesini önler */

        .gallery-item h3 { font-family: 'Playfair Display', serif; font-size: clamp(1.3rem, 3vw, 2rem); margin-bottom: 10px; line-height: 1.1; }
        .gallery-item span { font-size: 9px; font-weight: 900; color: var(--mh-red); letter-spacing: 2px; text-transform: uppercase; }

        /* Portal Detalhes Full Screen */
        #portal { 
            position: fixed; inset: 0; background: var(--bg); 
            z-index: 99999; display: none; overflow-y: auto; padding: 100px 8%; 
        }
        .portal-close { 
            position: fixed; top: 30px; right: 30px; background: var(--mh-red); 
            color: white; border: none; padding: 12px 25px; font-weight: 900; 
            cursor: pointer; z-index: 100000; text-transform: uppercase; font-size: 12px;
        }
        .portal-content { max-width: 850px; margin: 0 auto; }
        .portal-content h2 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 6vw, 4rem); color: var(--mh-red); margin-bottom: 30px; line-height: 1; }
        .portal-text p { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.2rem, 2.5vw, 1.5rem); margin-bottom: 25px; text-align: justify; color: #222; }

        /* Footer Responsive */
        footer { padding: 40px 6%; display: flex; flex-wrap: wrap; justify-content: space-between; gap: 20px; background: #fff; font-size: 9px; font-weight: 900; letter-spacing: 2px; }

        /* Media Queries for Mobile/Tablet */
        @media (max-width: 1024px) {
            .hero { grid-template-columns: 1fr; }
            .hero-text { order: 2; padding: 60px 6%; }
            .hero-visual { order: 1; min-height: 300px; height: 40vh; }
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .gallery-grid { grid-template-columns: 1fr; }
            .nav-meta { display: none; } /* Mobilde logoyu rahatlatır */
            .portal-close { top: 15px; right: 15px; padding: 10px 20px; }
        }
    </style>
</head>
<body>
