<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Global Culture & News</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #fdfbf7;
            --text: #1a1a1a;
            --muted: #718096;
            --accent: #c49b66;
            --white: #ffffff;
            --transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; scroll-behavior: smooth; }

        /* --- OKUMA İLERLEME VE SES KONTROL --- */
        #progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent); width: 0%; z-index: 10001; }
        
        /* Navigasyon */
        nav { background: rgba(253, 251, 247, 0.9); backdrop-filter: blur(15px); padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.03); }
        .logo { font-family: 'Marcellus', serif; font-size: 2rem; letter-spacing: 3px; cursor: pointer; text-transform: uppercase; }

        /* Yazarlar - Yatay Kaydırma */
        .authors-strip { background: var(--white); padding: 30px 0; display: flex; justify-content: center; gap: 40px; border-bottom: 1px solid #f1f1f1; overflow-x: auto; }
        .author-item { cursor: pointer; text-align: center; width: 90px; flex-shrink: 0; transition: var(--transition); }
        .author-item:hover { transform: translateY(-5px); }
        .author-item img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 1px solid var(--accent); padding: 4px; margin: 0 auto; }
        .author-item span { display: block; font-size: 0.75rem; font-weight: 700; margin-top: 10px; font-family: 'Marcellus'; text-transform: uppercase; }

        /* Ana Grid */
        .container-main { max-width: 1400px; margin: 40px auto; display: grid; grid-template-columns: 280px 1fr 300px; gap: 40px; padding: 0 25px; }

        /* Haber Kartı */
        .news-card { background: var(--white); border-radius: 24px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.02); cursor: pointer; transition: var(--transition); border: 1px solid rgba(0,0,0,0.02); margin-bottom: 40px; }
        .news-card:hover { transform: translateY(-10px); box-shadow: 0 30px 60px rgba(0,0,0,0.06); }
        .news-img { width: 100%; height: 480px; object-fit: cover; }
        .card-body { padding: 35px; }
        .card-body h2 { font-family: 'Marcellus', serif; font-size: 2.2rem; margin: 0 0 15px 0; line-height: 1.2; }
        .card-body p { color: var(--muted); font-size: 1.1rem; line-height: 1.7; }

        /* DETAY PANELİ (MODAL) */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: none; overflow-y: auto; padding-bottom: 100px; }
        .close-overlay { position: fixed; top: 30px; right: 40px; cursor: pointer; background: var(--text); color: #fff; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10000; }

        /* OKUYUCU DOSTU METİN SİSTEMİ */
        .article-wrap { max-width: 800px; margin: 60px auto; padding: 0 20px; }
        .article-title { font-family: 'Marcellus', serif; font-size: 3.8rem; line-height: 1.1; margin-bottom: 30px; }
        .article-text { font-size: 1.35rem; line-height: 2; color: #2d3436; font-weight: 400; letter-spacing: -0.01em; }

        /* SESLENDİRME PANELİ */
        .audio-player { background: #f1f2f6; border-radius: 15px; padding: 20px; margin: 30px 0; display: flex; align-items: center; gap: 20px; }
        .play-btn { width: 50px; height: 50px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .play-btn svg { fill: white; width: 20px; }

        /* Sidebarlar */
        .side-title { font-family: 'Marcellus'; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 20px; font-size: 1.2rem; }
        .ad-space { background: #eee; height: 500px; border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #999; border: 1px dashed #ccc; position: sticky; top: 100px; }
        .ad-space img { width: 100%; height: 100%; object-fit: cover; }

        /* Admin Styles */
        #admin-panel { display: none; background: #1a202c; color: white; position: fixed; inset: 0; z-index: 11000; overflow-y: auto; padding: 50px; }
        .admin-nav { display: flex; gap: 20px; margin-bottom: 40px; border-bottom: 1px solid #4a5568; padding-bottom: 20px; }
        .admin-nav button { color: #a0aec0; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; }
        .admin-nav button.active { color: var(--accent); }
        
        @media (max-width: 1100px) { .container-main { grid-template-columns: 1fr; } .sidebar-left, .sidebar-right { display: none; } }
    </style>
</head>
<body>

<div id="progress-bar"></div>

<nav>
    <div class="logo" onclick="renderPortal()">LUMINA</div>
    <div id="current-city" style="font-size: 0.8rem; letter-spacing: 2px; font-weight: 700;">MARDİN • YEREL</div>
</nav>

<div id="authors-list" class="authors-strip"></div>

<div class="container-main">
    <aside class="sidebar-left">
        <div class="side-title">KATEGORİLER</div>
        <div id="categories-list" style="font-size: 0.9rem; line-height: 2.5; cursor: pointer;"></div>
    </aside>

    <main id="news-feed"></main>

    <aside class="sidebar-right">
        <div class="side-title">SPONSORLU</div>
        <div id="ad-sidebar" class="ad-space">REKLAM ALANI</div>
    </aside>
</div>

<footer style="padding: 100px 5%; text-align: center; background: white; border-top: 1px solid #eee;">
    <p style="font-family: 'Marcellus'; opacity: 0.5;">LUMINA &copy; 2026</p>
    <button onclick="toggleAdmin()" style="margin-top: 20px; font-size: 10px; opacity: 0.3; letter-spacing: 2px;">SİSTEM TERMİNALİ</button>
</footer>

<div id="overlay" class="overlay">
    <div class="close-overlay" onclick="closeAll()">✕</div>
    <div id="overlay-content" class="article-wrap"></div>
</div>

<div id="admin-panel">
    <div class="flex justify-between items-center mb-10">
        <h2 class="text-3xl font-black italic underline decoration-accent">LUMINA CONTROL PANEL</h2>
        <button onclick="toggleAdmin()" class="bg-red-500 px-6 py-2 rounded-full text-xs font-bold">PANELİ KAPAT</button>
    </div>

    <div class="admin-nav">
        <button onclick="setTab('haber')" id="btn-haber" class="active">Haber Yönetimi</button>
        <button onclick="setTab('yazar')" id="btn-yazar">Yazarlar</button>
        <button onclick="setTab('cat')" id="btn-cat">Kategoriler</button>
        <button onclick="setTab('reklam')" id="btn-reklam">Reklamlar</button>
    </div>

    <div id="admin-content" class="grid grid-cols-1 md:grid-cols-2 gap-10">
        </div>
</div>

<script>
    // VERİTABANI BAŞLATMA
    let db = JSON.parse(localStorage.getItem('lumina_db')) || {
        cats: [{id: 'c1', name: 'Mardin Ekspres'}, {id: 'c2', name: 'Sao Paulo Night'}],
        yazarlar: [{id: 'y1', isim: 'Vedat Mardinli', bio: 'Tarihçi & Kültür Yazarı', img: 'https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=200'}],
        haberler: [{
            id: 'h1', cid: 'c1', yid: 'y1', 
            title: "Mardin'in Gümüş İşlemeli Geceleri", 
            text: "Binlerce yıllık gümüş işleme sanatı, genç tasarımcıların elinde yeniden şekilleniyor. Telkari sanatı artık Sao Paulo podyumlarında.", 
            img: 'https://images.unsplash.com/photo-1582738411706-bfc8e691d1c2?w=1200'
        }],
        reklamlar: [{id: 'r1', ad: 'Lumina Premium', img: '', link: '#'}]
    };

    let activeTab = 'haber';
    let tempImg = "";

    // GÖRSEL İŞLEME
    function handleImg(e) {
        const reader = new FileReader();
        reader.onload = () => { tempImg = reader.result; };
        reader.readAsDataURL(e.target.files[0]);
    }

    // PANEL GEÇİŞLERİ
    function toggleAdmin() {
        const p = document.getElementById('admin-panel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
        renderAdmin();
    }

    function setTab(tab) {
        activeTab = tab;
        document.querySelectorAll('.admin-nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + tab).classList.add('active');
        renderAdmin();
    }

    // ADMIN RENDER
    function renderAdmin() {
        const content = document.getElementById('admin-content');
        let formHtml = "";
        let listHtml = "";

        if(activeTab === 'haber') {
            let cOpts = db.cats.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            let yOpts = db.yazarlar.map(y => `<option value="${y.id}">${y.isim}</option>`).join('');
            formHtml = `
                <div class="bg-gray-800 p-8 rounded-3xl">
                    <h3 class="mb-5 font-bold">YENİ HABER EKLE</h3>
                    <input type="text" id="h-title" placeholder="Haber Başlığı" class="w-full p-4 mb-4 bg-gray-700 rounded-xl">
                    <select id="h-cat" class="w-full p-4 mb-4 bg-gray-700 rounded-xl">${cOpts}</select>
                    <select id="h-yazar" class="w-full p-4 mb-4 bg-gray-700 rounded-xl">${yOpts}</select>
                    <input type="file" onchange="handleImg(event)" class="mb-4">
                    <textarea id="h-text" placeholder="Haber İçeriği" class="w-full p-4 mb-4 bg-gray-700 rounded-xl h-40"></textarea>
                    <button onclick="saveHaber()" class="w-full bg-accent p-4 rounded-xl font-bold">KAYDET</button>
                </div>`;
            listHtml = db.haberler.map(h => `<div class="p-4 border-b border-gray-700 flex justify-between"><span>${h.title}</span><button onclick="deleteItem('haberler', '${h.id}')" class="text-red-400">Sil</button></div>`).join('');
        } else if(activeTab === 'yazar') {
            formHtml = `
                <div class="bg-gray-800 p-8 rounded-3xl">
                    <h3 class="mb-5 font-bold">YENİ YAZAR EKLE</h3>
                    <input type="text" id="y-name" placeholder="Yazar İsmi" class="w-full p-4 mb-4 bg-gray-700 rounded-xl">
                    <input type="text" id="y-bio" placeholder="Kısa Bio" class="w-full p-4 mb-4 bg-gray-700 rounded-xl">
                    <input type="file" onchange="handleImg(event)" class="mb-4">
                    <button onclick="saveYazar()" class="w-full bg-accent p-4 rounded-xl font-bold">KAYDET</button>
                </div>`;
            listHtml = db.yazarlar.map(y => `<div class="p-4 border-b border-gray-700 flex justify-between"><span>${y.isim}</span><button onclick="deleteItem('yazarlar', '${y.id}')" class="text-red-400">Sil</button></div>`).join('');
        } else if(activeTab === 'cat') {
            formHtml = `
                <div class="bg-gray-800 p-8 rounded-3xl">
                    <h3 class="mb-5 font-bold">YENİ KATEGORİ EKLE</h3>
                    <input type="text" id="c-name" placeholder="Kategori Adı" class="w-full p-4 mb-4 bg-gray-700 rounded-xl">
                    <button onclick="saveCat()" class="w-full bg-accent p-4 rounded-xl font-bold">KAYDET</button>
                </div>`;
            listHtml = db.cats.map(c => `<div class="p-4 border-b border-gray-700 flex justify-between"><span>${c.name}</span><button onclick="deleteItem('cats', '${c.id}')" class="text-red-400">Sil</button></div>`).join('');
        } else if(activeTab === 'reklam') {
            formHtml = `
                <div class="bg-gray-800 p-8 rounded-3xl">
                    <h3 class="mb-5 font-bold">REKLAM GÜNCELLE</h3>
                    <input type="text" id="r-name" placeholder="Reklam Adı" class="w-full p-4 mb-4 bg-gray-700 rounded-xl">
                    <input type="file" onchange="handleImg(event)" class="mb-4">
                    <button onclick="saveReklam()" class="w-full bg-accent p-4 rounded-xl font-bold">KAYDET</button>
                </div>`;
            listHtml = db.reklamlar.map(r => `<div class="p-4 border-b border-gray-700 flex justify-between"><span>${r.ad}</span><button onclick="deleteItem('reklamlar', '${r.id}')" class="text-red-400">Sil</button></div>`).join('');
        }

        content.innerHTML = formHtml + `<div class="bg-gray-800 p-8 rounded-3xl"><h3>MEVCUT KAYITLAR</h3><div class="mt-5">${listHtml}</div></div>`;
    }

    // KAYIT FONKSİYONLARI
    function saveHaber() {
        const item = {
            id: 'h' + Date.now(),
            title: document.getElementById('h-title').value,
            cid: document.getElementById('h-cat').value,
            yid: document.getElementById('h-yazar').value,
            text: document.getElementById('h-text').value,
            img: tempImg || 'https://images.unsplash.com/photo-1582738411706-bfc8e691d1c2?w=1200'
        };
        db.haberler.unshift(item);
        finalize();
    }

    function saveYazar() {
        const item = { id: 'y' + Date.now(), isim: document.getElementById('y-name').value, bio: document.getElementById('y-bio').value, img: tempImg };
        db.yazarlar.push(item);
        finalize();
    }

    function saveCat() {
        db.cats.push({id: 'c' + Date.now(), name: document.getElementById('c-name').value});
        finalize();
    }

    function saveReklam() {
        db.reklamlar = [{id: 'r1', ad: document.getElementById('r-name').value, img: tempImg}];
        finalize();
    }

    function deleteItem(key, id) {
        db[key] = db[key].filter(x => x.id !== id);
        finalize();
    }

    function finalize() {
        localStorage.setItem('lumina_db', JSON.stringify(db));
        tempImg = "";
        renderAdmin();
        renderPortal();
    }

    // PORTAL RENDER (ÖN YÜZ)
    function renderPortal() {
        // Kategoriler
        const catList = document.getElementById('categories-list');
        catList.innerHTML = db.cats.map(c => `<div onclick="filterNews('${c.id}')">• ${c.name}</div>`).join('');

        // Yazarlar
        const authList = document.getElementById('authors-list');
        authList.innerHTML = db.yazarlar.map(y => `
            <div class="author-item" onclick="openAuthor('${y.isim}', '${y.bio}', '${y.img}')">
                <img src="${y.img || 'https://via.placeholder.com/200'}">
                <span>${y.isim.split(' ')[0]} ${y.isim.split(' ')[1] ? y.isim.split(' ')[1][0] + '.' : ''}</span>
            </div>
        `).join('');

        // Reklam
        const adBox = document.getElementById('ad-sidebar');
        if(db.reklamlar[0] && db.reklamlar[0].img) {
            adBox.innerHTML = `<img src="${db.reklamlar[0].img}">`;
        } else {
            adBox.innerText = "SPONSORLU ALAN";
        }

        filterNews('all');
    }

    function filterNews(cid) {
        const feed = document.getElementById('news-feed');
        let filtered = cid === 'all' ? db.haberler : db.haberler.filter(h => h.cid === cid);
        
        feed.innerHTML = filtered.map(h => {
            const catName = db.cats.find(c => c.id === h.cid)?.name || "KÜLTÜR";
            return `
                <article class="news-card" onclick="openNews('${h.title.replace(/'/g, "\\'")}', '${h.text.replace(/'/g, "\\'")}', '${h.img}')">
                    <img src="${h.img}" class="news-img">
                    <div class="card-body">
                        <small style="color:var(--accent); font-weight:bold; text-transform:uppercase;">${catName}</small>
                        <h2>${h.title}</h2>
                        <p>${h.text.substring(0, 120)}...</p>
                    </div>
                </article>
            `;
        }).join('');
    }

    // OKUMA VE SESLENDİRME
    function openNews(title, text, img) {
        const content = document.getElementById('overlay-content');
        document.getElementById('overlay').style.display = 'block';
        document.body.style.overflow = 'hidden';

        content.innerHTML = `
            <h1 class="article-title">${title}</h1>
            <div class="audio-player">
                <button class="play-btn" onclick="speakText('article-main-text')">
                    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </button>
                <div>
                    <strong style="font-size:0.9rem;">Yazıyı Dinle</strong><br>
                    <small style="color:var(--muted)">Yapay Zeka Seslendirme Aktif</small>
                </div>
            </div>
            <img src="${img}" style="width:100%; border-radius:30px; margin-bottom:40px;">
            <div id="article-main-text" class="article-text">${text}</div>
        `;
    }

    function openAuthor(name, bio, img) {
        const content = document.getElementById('overlay-content');
        document.getElementById('overlay').style.display = 'block';
        document.body.style.overflow = 'hidden';
        content.innerHTML = `
            <div style="text-align:center;">
                <img src="${img}" style="width:180px; height:180px; border-radius:50%; border:4px solid var(--accent); padding:5px; margin-bottom:20px; object-fit:cover; margin-left:auto; margin-right:auto;">
                <h1 class="article-title">${name}</h1>
                <p style="font-size:1.3rem; color:var(--muted);">${bio}</p>
            </div>
        `;
    }

    function speakText(id) {
        speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(document.getElementById(id).innerText);
        utterance.lang = 'tr-TR';
        speechSynthesis.speak(utterance);
    }

    function closeAll() {
        speechSynthesis.cancel();
        document.getElementById('overlay').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    window.onscroll = function() {
        let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
        let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        document.getElementById("progress-bar").style.width = (winScroll / height) * 100 + "%";
    };

    window.onload = renderPortal;
</script>

</body>
</html>
