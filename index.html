<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARDIN & BRAZIL | ASC 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;1,600&family=Montserrat:wght@300;600;900&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    <style>
        :root { --mardin: #D4A373; --brazil: #064E3B; --dark: #0a0a0a; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f8f8fa; color: var(--dark); font-family: 'Montserrat', sans-serif; line-height: 1.5; overflow-x: hidden; }

        /* HEADER */
        header { padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Playfair Display'; font-size: 2.2rem; text-decoration: none; color: inherit; font-weight: 900; }
        .logo span { color: var(--brazil); }

        .profile-area { display: flex; align-items: center; gap: 12px; background: white; padding: 5px 15px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        /* GRID SYSTEM */
        .container { padding: 20px 5% 50px; display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; max-width: 1600px; margin: 0 auto; }

        /* LEFT HERO (RÖPORTAJ) */
        .hero { grid-column: span 8; height: 600px; border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        .hero img { width: 100%; height: 100%; object-fit: cover; }
        .hero-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 40px; background: linear-gradient(to top, rgba(0,0,0,0.7), transparent); color: white; }
        .hero-info h2 { font-family: 'Playfair Display'; font-size: clamp(1.8rem, 3.5vw, 3rem); line-height: 1.1; margin-top: 10px; }

        /* RIGHT PANEL */
        .side-stack { grid-column: span 4; display: grid; grid-template-rows: repeat(2, 1fr); gap: 20px; }
        .card { background: white; border-radius: 35px; padding: 30px; display: flex; flex-direction: column; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.02); }
        .card-tag { font-size: 9px; font-weight: 900; color: var(--mardin); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
        
        /* GÜNÜN KARESİ KARTI */
        .photo-card { padding: 0; overflow: hidden; position: relative; }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; }
        .loc-tag { position: absolute; top: 20px; right: 20px; background: white; padding: 5px 12px; border-radius: 10px; font-size: 8px; font-weight: 900; }

        /* SMART TTS BUTTON */
        .btn-speak { background: var(--brazil); color: white; border: none; padding: 8px 20px; border-radius: 50px; font-size: 9px; font-weight: 900; cursor: pointer; margin-top: 15px; display: inline-flex; align-items: center; gap: 8px; }

        /* RESPONSIVE */
        @media (max-width: 1024px) { .hero, .side-stack { grid-column: span 12; } .hero { height: 400px; } }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">MARDIN<span>BRAZIL</span></a>
        <div class="profile-area">
            <img src="https://pbs.twimg.com/media/GifApT2XEAAqees.jpg" style="width:30px; height:30px; border-radius:50%; object-fit:cover;">
            <span style="font-size: 10px; font-weight: 900;">AC PORTFOLIO</span>
        </div>
    </header>

    <div class="container">
        <div class="hero">
            <img src="https://pbs.twimg.com/media/GIlW38KWEAALcYB?format=jpg&name=large">
            <div class="hero-info">
                <span id="tag-exclusive" style="background:var(--brazil); padding:4px 12px; border-radius:20px; font-size:8px; font-weight:900;">ÖZEL RÖPORTAJ</span>
                <h2 id="main-title">"Taşın Hafızası ve Ormanın Kalbi"</h2>
                <p id="sub-title" style="font-family:'Lora'; font-size: 1rem; opacity: 0.9; margin-top: 5px;"></p>
                
                <button class="btn-speak" onclick="toggleAudio()">
                    <span id="btn-icon">🔊</span> <span id="btn-text">DİNLE / OUVIR</span>
                </button>
            </div>
        </div>

        <div class="side-stack">
            <div class="card">
                <span id="tag-events" class="card-tag">ETKİNLİKLER // EVENTOS</span>
                <div id="event-content" style="font-family:'Lora'; font-size: 0.95rem; color: #444; line-height: 1.6;">
                    </div>
            </div>

            <div class="card photo-card">
                <span id="loc-label" class="loc-tag">MARDIN, TR</span>
                <img id="daily-img" src="https://images.unsplash.com/photo-1582260600078-fa6c88825832?auto=format&fit=crop&w=800">
                <div style="position:absolute; bottom:20px; left:20px; color:white; font-size:10px; font-weight:900; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">
                    <span id="tag-photo-day">GÜNÜN KARESİ // IMAGEM DO DIA</span>
                </div>
            </div>
        </div>

        <div id="full-article" style="display:none;"></div>
    </div>

    <script>
        const translations = {
            tr: {
                exclusive: "ÖZEL RÖPORTAJ",
                title: "\"Taşın Hafızası ve Ormanın Kalbi\"",
                subtitle: "Doğanın ve tarihin dijital buluşması.",
                events: "<b>14.03.2026:</b> Mezopotamya Tasarım Zirvesi<br><b>22.03.2026:</b> Manaus Dijital Sanat Bienali",
                btnListen: "DİNLE",
                btnStop: "DURDUR",
                article: "Mardin'in sarı kalker taşları binlerce yıllık bir hikaye anlatırken, Amazon'un devasa yaprakları geleceğin nefesini tutuyor. 2026 yılında bu iki uç noktayı dijital bir köprüyle bağladık. Taşın içindeki matematiksel desenleri, ormanın biyolojik ritmiyle senkronize ettik. Bu sadece bir sergi değil, iki coğrafyanın ruhsal birleşimidir."
            },
            pt: {
                exclusive: "ENTREVISTA EXCLUSIVA",
                title: "\"A Memória da Pedra e o Coração da Floresta\"",
                subtitle: "O encontro digital da natureza e da história.",
                events: "<b>14.03.2026:</b> Cúpula de Design da Mesopotâmia<br><b>22.03.2026:</b> Bienal de Arte Digital de Manaus",
                btnListen: "OUVIR",
                btnStop: "PARAR",
                article: "Enquanto as pedras calcárias amarelas de Mardin contam uma história de milhares de anos, as folhas gigantes da Amazônia guardam o fôlego do futuro. Em 2026, conectamos esses dois extremos com uma ponte digital. Sincronizamos os padrões matemáticos dentro da pedra com o ritmo biológico da floresta."
            }
        };

        const userLang = navigator.language.startsWith('pt') ? 'pt' : 'tr';
        const data = translations[userLang];

        function applyLanguage() {
            document.getElementById('tag-exclusive').innerText = data.exclusive;
            document.getElementById('main-title').innerText = data.title;
            document.getElementById('sub-title').innerText = data.subtitle;
            document.getElementById('event-content').innerHTML = data.events;
            document.getElementById('btn-text').innerText = data.btnListen;
            document.getElementById('full-article').innerText = data.article;
            
            if(userLang === 'pt') {
                document.getElementById('daily-img').src = "https://images.unsplash.com/photo-1483728642387-6c3bdd6c93e5?auto=format&fit=crop&w=800";
                document.getElementById('loc-label').innerText = "RIO, BR";
            }
        }

        let isSpeaking = false;
        function toggleAudio() {
            if (isSpeaking) {
                window.speechSynthesis.cancel();
                document.getElementById('btn-text').innerText = data.btnListen;
                document.getElementById('btn-icon').innerText = "🔊";
                isSpeaking = false;
            } else {
                const utterance = new SpeechSynthesisUtterance(data.article);
                utterance.lang = userLang === 'pt' ? 'pt-BR' : 'tr-TR';
                utterance.onend = () => {
                    isSpeaking = false;
                    document.getElementById('btn-text').innerText = data.btnListen;
                    document.getElementById('btn-icon').innerText = "🔊";
                };
                window.speechSynthesis.speak(utterance);
                document.getElementById('btn-text').innerText = data.btnStop;
                document.getElementById('btn-icon').innerText = "⏹";
                isSpeaking = true;
            }
        }

        window.onload = applyLanguage;
    </script>
</body>
</html>
