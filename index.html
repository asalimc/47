<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASC Global Portal | Mardin & Rio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'tr', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        [x-cloak] { display: none !important; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        * { font-style: normal !important; transition: all 0.3s ease; }
        .hero-split { height: 65vh; display: flex; overflow: hidden; border-bottom: 8px solid #1e3a8a; }
        .goog-te-banner-frame.skiptranslate { display: none !important; }
        body { top: 0px !important; }
        /* Mobil Uyumluluk Ayarları */
        @media (max-width: 768px) {
            .hero-split { height: 50vh; flex-direction: column; }
            .hero-split img { width: 100%; height: 50%; }
        }
    </style>
</head>
<body x-data="portalApp()" x-init="init()">

    <nav class="sticky top-0 z-[100] bg-white/95 backdrop-blur-md border-b border-slate-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 md:px-6 py-3 flex justify-between items-center">
            <div @click="currentPage = 'home'" class="text-xl md:text-2xl font-black tracking-tighter cursor-pointer text-blue-900 uppercase">
                <span class="bg-blue-900 text-white px-2 rounded">ASC</span> PORTAL
            </div>
            
            <div class="flex items-center gap-3">
                <div id="google_translate_element" class="hidden md:block"></div>
                <button @click="loginAdmin()" class="bg-slate-900 text-white px-4 py-2 rounded-full text-[10px] font-black uppercase hover:bg-blue-700 shadow-lg transition-all">YÖNETİM PANELİ</button>
            </div>
        </div>
    </nav>

    <main>
        <div x-show="currentPage === 'home'" class="animate-in fade-in duration-500">
            
            <header class="relative hero-split">
                <img src="https://images.unsplash.com/photo-1544830154-1505c215f79a?auto=format&fit=crop&q=80&w=1000" class="hero-img grayscale-[10%] hover:grayscale-0 object-cover" alt="Mardin">
                <img src="https://images.unsplash.com/photo-1483728642387-6c3bdd6c93e5?auto=format&fit=crop&q=80&w=1000" class="hero-img grayscale-[10%] hover:grayscale-0 object-cover" alt="Rio">
                <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                    <h1 class="text-white text-4xl md:text-8xl font-black uppercase tracking-tighter text-center px-4 drop-shadow-2xl">
                        MARDİN <span class="text-blue-400">&</span> RIO
                    </h1>
                </div>
            </header>

            <section class="py-12 md:py-16 bg-slate-900">
                <div class="max-w-7xl mx-auto px-6">
                    <h2 class="text-blue-400 text-[10px] font-black uppercase tracking-[0.5em] mb-10 text-center md:text-left">KÖŞE YAZARLARI</h2>
                    <div class="flex md:grid md:grid-cols-4 gap-6 pb-6 overflow-x-auto snap-x">
                        <template x-for="(author, index) in authors" :key="index">
                            <div @click="openAuthor(author)" class="min-w-[260px] snap-center bg-slate-800 p-6 rounded-[2.5rem] border border-slate-700 hover:border-blue-500 cursor-pointer text-center group transition shadow-2xl">
                                <img :src="author.photo || 'https://via.placeholder.com/150'" class="w-24 h-24 rounded-full mx-auto object-cover mb-4 border-2 border-slate-600 group-hover:border-blue-400 transition shadow-lg">
                                <h3 class="text-white font-black uppercase text-sm mb-1" x-text="author.name"></h3>
                                <p class="text-blue-400 text-[9px] font-bold uppercase tracking-widest" x-text="author.title"></p>
                            </div>
                        </template>
                    </div>
                </div>
            </section>

            <section class="max-w-7xl mx-auto px-4 md:px-6 py-16">
                <h2 class="text-3xl md:text-5xl font-black uppercase tracking-tighter mb-12 text-slate-900 border-l-8 border-blue-900 pl-6 uppercase">Manşetler</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 md:gap-12">
                    <template x-for="(news, index) in newsData" :key="index">
                        <div @click="openNews(news)" class="group cursor-pointer bg-white rounded-[3rem] overflow-hidden shadow-md hover:shadow-2xl transition-all duration-500">
                            <img :src="news.img || 'https://via.placeholder.com/800x600'" class="h-72 w-full object-cover group-hover:scale-110 transition duration-700">
                            <div class="p-8">
                                <span class="text-blue-600 font-black text-[10px] uppercase tracking-widest" x-text="news.tag"></span>
                                <h3 class="text-xl md:text-2xl font-black uppercase my-4 leading-tight group-hover:text-blue-800 transition" x-text="news.title"></h3>
                                <p class="text-slate-500 text-sm line-clamp-3 leading-relaxed" x-text="news.desc"></p>
                            </div>
                        </div>
                    </template>
                </div>
            </section>
        </div>

        <div x-show="currentPage === 'news-detail' || currentPage === 'author-detail'" class="max-w-4xl mx-auto px-6 py-12 md:py-24" x-cloak>
            <button @click="currentPage = 'home'" class="mb-8 font-black text-xs uppercase text-blue-700 tracking-widest bg-blue-50 px-4 py-2 rounded-full">← ANA SAYFAYA DÖN</button>
            
            <template x-if="currentPage === 'news-detail'">
                <div class="animate-in slide-in-from-bottom-5">
                    <img :src="selectedNews?.img" class="w-full h-[40vh] md:h-[60vh] object-cover rounded-[3rem] shadow-2xl mb-10 border-4 border-white">
                    <h1 class="text-4xl md:text-6xl font-black uppercase tracking-tighter mb-8 text-slate-900" x-text="selectedNews?.title"></h1>
                    <div class="text-xl leading-relaxed text-slate-800 bg-white p-8 rounded-[2rem] shadow-sm" x-html="selectedNews?.body"></div>
                </div>
            </template>

            <template x-if="currentPage === 'author-detail'">
                <div class="text-center animate-in zoom-in-95">
                    <img :src="selectedAuthor?.photo" class="w-48 h-48 rounded-full mx-auto object-cover shadow-2xl mb-8 border-8 border-white">
                    <h1 class="text-4xl font-black uppercase mb-2 text-slate-900" x-text="selectedAuthor?.name"></h1>
                    <p class="text-blue-600 font-bold uppercase tracking-widest text-sm mb-10" x-text="selectedAuthor?.title"></p>
                    <div class="text-lg leading-relaxed text-slate-700 bg-white p-10 rounded-[3rem] border shadow-sm" x-text="selectedAuthor?.bio"></div>
                </div>
            </template>
        </div>

        <div x-show="currentPage === 'admin'" class="max-w-7xl mx-auto px-6 py-20" x-cloak>
            <div class="flex flex-col md:flex-row justify-between items-center mb-16 gap-6 bg-white p-8 rounded-[2rem] shadow-sm border">
                <h2 class="text-4xl md:text-5xl font-black uppercase tracking-tighter">SİSTEM <span class="text-blue-600">YÖNETİMİ</span></h2>
                <button @click="currentPage = 'home'" class="w-full md:w-auto bg-red-600 text-white px-10 py-4 rounded-full font-black uppercase text-xs shadow-xl hover:bg-black transition">GÜVENLİ ÇIKIŞ</button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                <div class="bg-white p-8 md:p-10 rounded-[3rem] shadow-xl border border-slate-100">
                    <h3 class="text-2xl font-black mb-8 uppercase text-blue-800 border-b pb-4">Yazar Ekle</h3>
                    <div class="space-y-4">
                        <input x-model="newAuthor.name" type="text" placeholder="Ad Soyad" class="w-full p-4 rounded-2xl bg-slate-50 outline-none border focus:ring-2 ring-blue-500">
                        <input x-model="newAuthor.title" type="text" placeholder="Ünvan (Örn: Editör)" class="w-full p-4 rounded-2xl bg-slate-50 outline-none border focus:ring-2 ring-blue-500">
                        <div class="flex flex-col gap-2">
                            <label class="text-[10px] font-black uppercase ml-2 text-slate-400">Yazar Fotoğrafı Seç (Galeriden)</label>
                            <input type="file" @change="handleFileUpload($event, 'author')" class="text-xs bg-slate-50 p-4 rounded-2xl border-dashed border-2 border-slate-200">
                        </div>
                        <textarea x-model="newAuthor.bio" placeholder="Yazar Biyografisi" class="w-full p-4 rounded-2xl bg-slate-50 outline-none border h-32 focus:ring-2 ring-blue-500"></textarea>
                        <button @click="addAuthor()" class="w-full bg-blue-800 text-white py-5 rounded-2xl font-black uppercase tracking-widest hover:bg-black">SİSTEME KAYDET</button>
                    </div>
                </div>

                <div class="bg-white p-8 md:p-10 rounded-[3rem] shadow-xl border border-slate-100">
                    <h3 class="text-2xl font-black mb-8 uppercase text-emerald-800 border-b pb-4">Yeni Haber Yayınla</h3>
                    <div class="space-y-4">
                        <input x-model="newNews.title" type="text" placeholder="Haber Başlığı" class="w-full p-4 rounded-2xl bg-slate-50 outline-none border focus:ring-2 ring-emerald-500">
                        <input x-model="newNews.tag" type="text" placeholder="Kategori (Örn: Mardin)" class="w-full p-4 rounded-2xl bg-slate-50 outline-none border focus:ring-2 ring-emerald-500">
                        <div class="flex flex-col gap-2">
                            <label class="text-[10px] font-black uppercase ml-2 text-slate-400">Haber Görseli Seç (Galeriden)</label>
                            <input type="file" @change="handleFileUpload($event, 'news')" class="text-xs bg-slate-50 p-4 rounded-2xl border-dashed border-2 border-slate-200">
                        </div>
                        <textarea x-model="newNews.desc" placeholder="Kısa Özet" class="w-full p-4 rounded-2xl bg-slate-50 outline-none border h-20 focus:ring-2 ring-emerald-500"></textarea>
                        <textarea x-model="newNews.body" placeholder="Haber İçeriği" class="w-full p-4 rounded-2xl bg-slate-50 outline-none border h-32 focus:ring-2 ring-emerald-500"></textarea>
                        <button @click="addNews()" class="w-full bg-emerald-800 text-white py-5 rounded-2xl font-black uppercase tracking-widest hover:bg-black">HABERİ YAYINLA</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t py-12 text-center mt-20">
        <p class="text-[10px] font-black uppercase tracking-[0.6em] text-slate-400">ASC GLOBAL PORTAL &copy; 2026</p>
    </footer>

    <script>
        function portalApp() {
            return {
                currentPage: 'home',
                selectedNews: null,
                selectedAuthor: null,
                mTime: '', bTime: '',
                
                newAuthor: { name: '', title: '', bio: '', photo: '' },
                newNews: { title: '', tag: '', desc: '', img: '', body: '' },

                authors: JSON.parse(localStorage.getItem('final_authors')) || [
                    { name: 'Ahmet Salim', title: 'Baş Editör', bio: 'Mezopotamya üzerine uzman araştırmacı.', photo: 'https://i.pravatar.cc/150?u=1' },
                    { name: 'Dr. Isabella Mendes', title: 'Stratejist', bio: 'Brezilya ekonomi ve kültür uzmanı.', photo: 'https://i.pravatar.cc/150?u=2' }
                ],
                newsData: JSON.parse(localStorage.getItem('final_news')) || [
                    { title: 'Mardin Mimarisinde Taş Sanatı', tag: 'Mardin', desc: 'Binlerce yıllık taş işçiliği korunuyor.', img: 'https://images.unsplash.com/photo-1582236894056-e918b9588667?w=800', body: 'Detaylı içerik burada...' },
                    { title: 'Rio Karnavalı ve Ekonomi', tag: 'Rio', desc: 'Festivalin şehre katkısı rekor kırdı.', img: 'https://images.unsplash.com/photo-1516307361401-e323ad26de92?w=800', body: 'Detaylı içerik burada...' }
                ],

                init() {
                    setInterval(() => {
                        const n = new Date();
                        this.mTime = new Intl.DateTimeFormat('tr-TR', { hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'Europe/Istanbul' }).format(n);
                        this.bTime = new Intl.DateTimeFormat('tr-TR', { hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'America/Sao_Paulo' }).format(n);
                    }, 1000);
                },

                handleFileUpload(event, type) {
                    const file = event.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        if(type === 'author') this.newAuthor.photo = reader.result;
                        else this.newNews.img = reader.result;
                    }
                    reader.readAsDataURL(file);
                },

                loginAdmin() {
                    const pass = prompt("Sistem Şifresini Giriniz:");
                    // Şifre tam olarak: Mardin47**
                    if (pass === "Mardin47**") {
                        this.currentPage = 'admin';
                        window.scrollTo(0,0);
                    } else {
                        alert("Hatalı Şifre! Lütfen 'Mardin47**' olarak tekrar deneyin.");
                    }
                },

                addAuthor() { 
                    if(!this.newAuthor.name) return;
                    this.authors.push({...this.newAuthor}); 
                    this.save(); 
                    this.newAuthor = {name:'', title:'', bio:'', photo:''}; 
                    alert("Yazar eklendi!");
                },
                addNews() { 
                    if(!this.newNews.title) return;
                    this.newsData.push({...this.newNews}); 
                    this.save(); 
                    this.newNews = {title:'', tag:'', desc:'', img:'', body:''}; 
                    alert("Haber yayınlandı!");
                },
                save() {
                    localStorage.setItem('final_authors', JSON.stringify(this.authors));
                    localStorage.setItem('final_news', JSON.stringify(this.newsData));
                },
                openNews(news) { this.selectedNews = news; this.currentPage = 'news-detail'; window.scrollTo(0,0); },
                openAuthor(author) { this.selectedAuthor = author; this.currentPage = 'author-detail'; window.scrollTo(0,0); }
            }
        }
    </script>
</body>
</html>
