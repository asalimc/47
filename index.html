<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARDIN & RIO | Ultra Elite Portal</title>
    <style>
        :root {
            --mardin: #d4a373;
            --rio: #0077b6;
            --dark: #121212;
            --white: #ffffff;
            --accent: #e76f51;
        }

        /* 1. KÜLTÜR TAKVİMİ (AGENDA) */
        .calendar-section {
            background: var(--white);
            padding: 40px;
            border-radius: 25px;
            margin: 40px 0;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }
        .calendar-section h3 { 
            font-family: 'Playfair Display', serif; 
            font-size: 2rem; 
            margin-bottom: 30px; 
            border-left: 6px solid var(--rio);
            padding-left: 15px;
        }
        .event-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        .event-card {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 15px;
            transition: 0.3s;
        }
        .event-card:hover { border-color: var(--mardin); background: #fffaf0; }
        .date-box {
            background: var(--dark);
            color: white;
            min-width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .date-box span { font-size: 0.7rem; color: var(--mardin); }

        /* 2. MOBİL ALT MENÜ (DOCK BAR) */
        .mobile-dock {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(10px);
            width: 90%;
            max-width: 400px;
            height: 65px;
            border-radius: 35px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 20px;
            z-index: 9999;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            display: none; /* Masaüstünde gizle */
        }
        .dock-item {
            color: #888;
            text-align: center;
            font-size: 10px;
            text-decoration: none;
            transition: 0.3s;
        }
        .dock-item.active { color: var(--mardin); }
        .dock-icon { font-size: 20px; display: block; margin-bottom: 2px; }

        /* 3. MOBİL UYUMLULUK */
        @media (max-width: 768px) {
            .mobile-dock { display: flex; } /* Sadece mobilde göster */
            .calendar-section { margin-bottom: 100px; } /* Dock için boşluk */
            .sidebar-widget { display: none; } /* Mobilde sidebar'ı gizle veya alta at */
        }

        /* Ekstra Estetik: Hover Efektleri */
        .btn-glow {
            background: var(--rio);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 119, 182, 0.3);
            transition: 0.3s;
        }
        .btn-glow:hover { transform: scale(1.05); box-shadow: 0 8px 20px rgba(0, 119, 182, 0.5); }
    </style>
</head>
<body>

    <div class="wrapper">
        
        <section class="calendar-section">
            <h3>KÜLTÜR AJANDASI</h3>
            <div class="event-grid">
                <div class="event-card">
                    <div class="date-box">15 <span>MART</span></div>
                    <div class="event-info">
                        <strong style="font-size: 0.9rem;">Mardin Film Festivali</strong>
                        <p style="font-size: 0.75rem; color: #666;">Açılış: Tarihi Kışla</p>
                    </div>
                </div>
                <div class="event-card">
                    <div class="date-box">22 <span>MART</span></div>
                    <div class="event-info">
                        <strong style="font-size: 0.9rem;">Rio Jazz Geceleri</strong>
                        <p style="font-size: 0.75rem; color: #666;">Ipanema Sahil Sahnesi</p>
                    </div>
                </div>
                <div class="event-card">
                    <div class="date-box">05 <span>NİSAN</span></div>
                    <div class="event-info">
                        <strong style="font-size: 0.9rem;">Gastro-Sentez Fuarı</strong>
                        <p style="font-size: 0.75rem; color: #666;">Mardin-Rio Ortak Mutfağı</p>
                    </div>
                </div>
            </div>
            <div style="text-align: center; margin-top: 30px;">
                <button class="btn-glow">TÜM TAKVİMİ GÖR</button>
            </div>
        </section>

    </div>

    <div class="mobile-dock">
        <a href="#" class="dock-item active">
            <span class="dock-icon">🏠</span> Anasayfa
        </a>
        <a href="#" class="dock-item">
            <span class="dock-icon">📰</span> Haberler
        </a>
        <a href="#" class="dock-item">
            <span class="dock-icon">🔥</span> Düello
        </a>
        <a href="#" class="dock-item">
            <span class="dock-icon">👤</span> Profil
        </a>
    </div>

    </body>
</html>
