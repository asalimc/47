<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARDIN & RIO | The Masterpiece 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;1,400&family=Montserrat:wght@300;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --mardin: #d4a373; --rio: #0077b6; --dark: #121212; --bg: #f9f7f2; }
        
        /* Tasarımı bozmayan özel imleç */
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; }
        #cursor { position: fixed; width: 15px; height: 15px; border: 1px solid var(--dark); border-radius: 50%; pointer-events: none; z-index: 10000; transition: transform 0.15s ease-out; background: rgba(0,0,0,0.05); }

        body { background-color: var(--bg); font-family: 'Montserrat', sans-serif; overflow-x: hidden; }

        /* HEADER - Tipografi Zenginleştirme */
        header { background: white; padding: 120px 20px; text-align: center; border-bottom: 5px solid var(--mardin); position: relative; }
        header h1 { font-family: 'Playfair Display'; font-size: 7rem; letter-spacing: -6px; transition: 0.8s cubic-bezier(0.23, 1, 0.32, 1); }
        header h1:hover { letter-spacing: -2px; }
        header h1 span { color: var(--rio); }

        /* NAV - Glassmorphism */
        nav { background: rgba(255,255,255,0.7); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); padding: 25px; }
        nav ul { display: flex; justify-content: center; list-style: none; gap: 50px; }
        nav a { font-weight: 900; font-size: 10px; text-transform: uppercase; color: var(--dark); text-decoration: none; letter-spacing: 3px; transition: 0.4s; }
        nav a:hover { color: var(--rio); transform: scale(1.1); }

        .wrapper { max-width: 1300px; margin: 80px auto; padding: 0 40px; }

        /* HABER KARTLARI - Hover Derinliği */
        .gastro-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 50px; }
        .flip-card { height: 550px; perspective: 2500px; }
        .flip-inner { position: relative; width: 100%; height: 100%; transition: 1s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .flip-card:hover .flip-inner { transform: rotateY(180deg); }
        .flip-front, .flip-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 40px; overflow: hidden; }
        .flip-front { background-size: cover; background-position: center; display: flex; align-items: flex-end; }
        .front-overlay { background: linear-gradient(transparent, rgba(0,0,0,0.85)); width: 100%; padding: 50px; color: white; }
        .flip-back { color: white; transform: rotateY(180deg); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 60px; text-align: center; }

        /* VIDEO - Tam Sinematik (Fixed & Working) */
        .video-container { position: relative; width: 100%; height: 600px; border-radius: 40px; overflow: hidden; margin: 100px 0; background: #000; box-shadow: 0 50px 100px rgba(0,0,0,0.3); }
        .video-container iframe { position: absolute; top:0; left:0; width:100%; height:100%; border:0; transform: scale(1.1); filter: contrast(1.1) brightness(0.9); }

        /* MODAL / DETAY */
        .detail-overlay { position: fixed; inset: 0; z-index: 10001; display: none; flex-direction: column; overflow-y: auto; color: white; padding: 20px; transition: 0.5s; }
        .detail-container { max-width: 900px; margin: 100px auto; }
        .close-detail { position: fixed; top: 50px; right: 60px; font-size: 5rem; cursor: pointer; color: white; line-height: 1; }

        /* Kaydırma Çubuğu Zenginleştirme */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: linear-gradient(var(--mardin), var(--rio)); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <header>
        <p style="font-size: 12px; font-weight: 900; letter-spacing: 5px; opacity: 0.4; margin-bottom: 30px;">THE SOUL OF TWO CITIES • 2026</p>
        <h1>MARDIN<span>RIO</span></h1>
    </header>

    <nav>
        <ul>
            <li><a href="#explore">CHRONICLES</a></li>
            <li><a href="#news">COLLECTION</a></li>
            <li><a href="#editor">VISION</a></li>
        </ul>
    </nav>

    <div class="wrapper">
        <div class="gastro-grid">
            <div class="flip-card" data-title="Golden Hour in Mesopotamia" data-color="var(--mardin)" data-img="https://images.unsplash.com/photo-1548013146-72479768bbaa?auto=format&fit=crop&w=1200" data-info="Mardin'in kadim taşları, günün son ışıklarıyla altına dönüşürken Rio'nun gece lambalarıyla birleşiyor.">
                <div class="flip-inner">
                    <div class="flip-front" style="background-image: url('https://images.unsplash.com/photo-1548013146-72479768bbaa?auto=format&fit=crop&w=800');">
                        <div class="front-overlay"><h4 style="font-family:'Playfair Display'; font-size:2.5rem;">The Golden Legacy</h4></div>
                    </div>
                    <div class="flip-back" style="background: var(--mardin);">
                        <h2 style="font-family:'Playfair Display'; font-size:3rem;">MARDİN</h2>
                        <p style="font-size: 1.2rem; font-style: italic; opacity: 0.8; margin-top: 20px;">Stone whispering to the sky.</p>
                    </div>
                </div>
            </div>

            <div class="flip-card" data-title="Tropical Modernism" data-color="var(--rio)" data-img="https://images.unsplash.com/photo-1516908205727-40afad9449a8?auto=format&fit=crop&w=1200" data-info="Rio de Janeiro'nun tropikal dokusu, modern teknolojiyle harmanlanarak 2026'nın sürdürülebilir vizyonunu oluşturuyor.">
                <div class="flip-inner">
                    <div class="flip-front" style="background-image: url('https://images.unsplash.com/photo-1516908205727-40afad9449a8?auto=format&fit=crop&w=800');">
                        <div class="front-overlay"><h4 style="font-family:'Playfair Display'; font-size:2.5rem;">The Tropical Rhythm</h4></div>
                    </div>
                    <div class="flip-back" style="background: var(--rio);">
                        <h2 style="font-family:'Playfair Display'; font-size:3rem;">RIO</h2>
                        <p style="font-size: 1.2rem; font-style: italic; opacity: 0.8; margin-top: 20px;">Ocean breathing through the city.</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="explore" class="video-container">
            <iframe src="https://www.youtube.com/embed/S_8qMvT2MvA?autoplay=1&mute=1&loop=1&playlist=S_8qMvT2MvA&controls=0&showinfo=0&rel=0" allow="autoplay; encrypted-media"></iframe>
        </div>
    </div>

    <div id="detailOverlay" class="detail-overlay">
        <span class="close-detail" onclick="closeDetail()">&times;</span>
        <div class="detail-container">
            <img id="modalImg" style="width:100%; border-radius:40px; margin-bottom:50px; box-shadow: 0 50px 100px rgba(0,0,0,0.5);" src="">
            <div id="modalText" style="font-family:'Lora';"></div>
        </div>
    </div>

    <script>
        // İMLEÇ TAKİBİ
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // KART ETKİLEŞİMİ VE DETAY AÇMA
        document.querySelectorAll('.flip-card').forEach(card => {
            card.addEventListener('mouseenter', () => cursor.style.transform = 'scale(5)');
            card.addEventListener('mouseleave', () => cursor.style.transform = 'scale(1)');
            
            card.addEventListener('click', () => {
                const overlay = document.getElementById('detailOverlay');
                overlay.style.backgroundColor = card.dataset.color;
                document.getElementById('modalImg').src = card.dataset.img;
                document.getElementById('modalText').innerHTML = `
                    <h2 style="font-family:'Playfair Display'; font-size:5rem; line-height:1.1; margin-bottom:30px;">${card.dataset.title}</h2>
                    <p style="font-size:1.8rem; line-height:1.8; opacity:0.9;">${card.dataset.info}</p>
                `;
                overlay.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            });
        });

        function closeDetail() {
            document.getElementById('detailOverlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
