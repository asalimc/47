<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASC GLOBAL | Master Command</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;700;900&display=swap');
        
        :root { --gold: #f59e0b; --navy: #020617; --blue-accent: #2563eb; }
        
        body { font-family: 'Inter', sans-serif; background: var(--navy); color: white; overflow-x: hidden; }
        .font-sync { font-family: 'Syncopate', sans-serif; }

        /* Background Watermark - Görseldeki dev yazı */
        .bg-watermark {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 25vw;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.02);
            z-index: -1;
            white-space: nowrap;
            pointer-events: none;
            line-height: 0.8;
        }

        /* Glass Cards - Tam Kalite */
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            transition: all 0.5s cubic-bezier(0.2, 1, 0.2, 1);
        }
        .glass-panel:hover {
            border-color: var(--gold);
            background: rgba(15, 23, 42, 0.8);
            transform: translateY(-5px);
        }

        /* Diagonal Hero Split - Görsel WA0011 */
        .diagonal-hero {
            position: relative;
            height: 60vh;
            background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 8px solid var(--gold);
        }
        .hero-line {
            position: absolute;
            width: 100px; height: 150%;
            background: var(--gold);
            transform: rotate(25deg);
            box-shadow: 0 0 100px rgba(245, 158, 11, 0.2);
        }

        /* Custom Scroll */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="portalCore()" x-init="init()">

    <div class="bg-watermark font-sync">ASC GLOBAL</div>

    <nav class="fixed top-0 w-full z-[1000] p-10 flex justify-between items-center">
        <div @click="currentPage = 'home'" class="flex items-center gap-4 cursor-pointer">
            <div class="bg-blue-600 text-white w-12 h-12 flex items-center justify-center rounded-2xl font-black text-2xl shadow-2xl">A</div>
            <span class="font-sync text-xl tracking-tighter">ASC <span class="text-blue-500">GLOBAL</span></span>
        </div>
        <div class="flex items-center gap-8">
            <div class="hidden lg:flex gap-10 text-[10px] font-black uppercase tracking-[0.4em] text-slate-500">
                <a href="#" class="hover:text-white transition">Mardin</a>
                <a href="#" class="hover:text-white transition">Sao Paulo</a>
                <a href="#" class="hover:text-white transition">Intelligence</a>
            </div>
            <button @click="openAdmin()" class="bg-white text-black px-10 py-4 rounded-full font-black text-[10px] tracking-widest hover:bg-gold transition shadow-2xl">
                TERMINAL_v13
            </button>
        </div>
    </nav>

    <main x-show="currentPage === 'home'" x-transition.opacity class="pt-32 pb-20 px-10 max-w-[1700px] mx-auto">
        
        <div class="diagonal-hero rounded-[50px] mb-20">
            <div class="hero-line"></div>
            
            <div class="relative z-10 w-full flex justify-around items-center px-20">
                <div @click="viewItem(authors[0])" class="text-center group cursor-pointer">
                    <p class="text-gold font-black text-[10px] tracking-[0.5em] mb-4">SİYASET BİLİMCİ</p>
                    <div class="relative inline-block">
                        <img :src="authors[0].photo" class="w-48 h-48 rounded-[50px] border-4 border-gold/30 group-hover:border-gold transition-all duration-500 object-cover grayscale group-hover:grayscale-0">
                    </div>
                    <h2 class="font-sync text-4xl mt-6 italic" x-text="authors[0].name"></h2>
                </div>

                <div class="hidden lg:block font-sync text-8xl opacity-10 italic">VS</div>

                <div @click="viewItem(authors[1])" class="text-center group cursor-pointer">
                    <p class="text-gold font-black text-[10px] tracking-[0.5em] mb-4">HUKUKÇU</p>
                    <div class="relative inline-block">
                        <img :src="authors[1].photo" class="w-48 h-48 rounded-[50px] border-4 border-gold/30 group-hover:border-gold transition-all duration-500 object-cover grayscale group-hover:grayscale-0">
                    </div>
                    <h2 class="font-sync text-4xl mt-6 italic" x-text="authors[1].name"></h2>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            
            <div class="lg:col-span-3 space-y-8">
                <div class="glass-panel p-10 border-l-8 border-blue-600">
                    <h4 class="font-sync text-[10px] text-slate-500 mb-6">MARDIN_NODE</h4>
                    <div class="text-5xl font-black font-mono tracking-tighter" x-text="mardinTime"></div>
                    <p class="text-[10px] text-blue-500 font-bold mt-2 uppercase tracking-widest">Local Time / TR</p>
                </div>
                <div class="glass-panel p-10 border-l-8 border-green-600">
                    <h4 class="font-sync text-[10px] text-slate-500 mb-6">RIO_NODE</h4>
                    <div class="text-5xl font-black font-mono tracking-tighter" x-text="rioTime"></div>
                    <p class="text-[10px] text-green-500 font-bold mt-2 uppercase tracking-widest">Local Time / BR</p>
                </div>
            </div>

            <div class="lg:col-span-6 space-y-10">
                <template x-for="n in newsData">
                    <div @click="viewItem(n)" class="glass-panel overflow-hidden group cursor-pointer">
                        <div class="flex flex-col md:flex-row h-full">
                            <div class="md:w-1/3 overflow-hidden">
                                <img :src="n.img" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                            </div>
                            <div class="p-10 md:w-2/3">
                                <div class="flex justify-between items-center mb-4">
                                    <span class="text-gold font-black text-[9px] tracking-[0.3em]" x-text="n.region"></span>
                                    <span class="text-slate-600 text-[9px]" x-text="n.date"></span>
                                </div>
                                <h3 class="text-2xl font-black leading-tight mb-4 group-hover:text-gold transition" x-text="n.title"></h3>
                                <p class="text-slate-400 text-sm line-clamp-2 italic" x-text="n.body"></p>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <div class="lg:col-span-3 space-y-8">
                <div class="glass-panel p-10 bg-blue-600/10 border-none">
                    <h3 class="font-sync text-xs mb-8 italic">CORE_ANALYTICS</h3>
                    <div class="space-y-6">
                        <div class="flex justify-between items-end border-b border-white/5 pb-2">
                            <span class="text-[10px] text-slate-500">Global Flow</span>
                            <span class="text-green-500 font-black">+84.2%</span>
                        </div>
                        <div class="flex justify-between items-end border-b border-white/5 pb-2">
                            <span class="text-[10px] text-slate-500">Mardin Strategy</span>
                            <span class="text-blue-500 font-black uppercase italic text-[9px]">Active</span>
                        </div>
                    </div>
                    <button class="w-full mt-10 bg-white text-black py-4 rounded-2xl font-black text-[10px] tracking-widest hover:bg-gold transition">FULL_REPORT.PDF</button>
                </div>
            </div>

        </div>
    </main>

    <div x-show="currentPage === 'reader'" class="fixed inset-0 z-[2000] bg-[#020617] overflow-y-auto" x-cloak x-transition>
        <div class="max-w-[1000px] mx-auto py-40 px-10">
            <button @click="currentPage = 'home'" class="fixed top-10 right-10 text-white/50 hover:text-white text-2xl transition-all">
                <i class="fas fa-times-circle"></i>
            </button>
            <span class="text-gold font-black text-xs tracking-[0.5em] mb-4 block" x-text="selectedItem?.region || 'OPERATIVE_PROFILE'"></span>
            <h1 class="font-sync text-5xl md:text-8xl italic mb-12 leading-none" x-text="selectedItem?.title || selectedItem?.name"></h1>
            <div class="w-32 h-2 bg-gold mb-16"></div>
            <img :src="selectedItem?.img || selectedItem?.photo" class="w-full h-auto rounded-[60px] shadow-2xl border border-white/10 mb-20">
            <div class="text-2xl md:text-3xl text-slate-300 leading-relaxed font-light italic space-y-10" x-html="selectedItem?.body || selectedItem?.bio"></div>
        </div>
    </div>

    <div x-show="currentPage === 'admin'" class="fixed inset-0 z-[3000] bg-black p-10 overflow-y-auto" x-cloak>
        <div class="max-w-[1200px] mx-auto">
            <div class="flex justify-between items-center mb-16 border-b border-white/10 pb-8">
                <h2 class="font-sync text-2xl">ASC <span class="text-gold">CORE_PANEL</span></h2>
                <button @click="currentPage = 'home'" class="text-red-500 font-black text-[10px] tracking-widest border border-red-500/20 px-8 py-3 rounded-full">SHUTDOWN</button>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-20">
                <div class="space-y-6">
                    <div class="flex gap-4">
                        <button @click="editorType = 'news'" :class="editorType === 'news' ? 'bg-gold text-black' : 'bg-white/5'" class="px-8 py-3 rounded-xl font-black text-[10px]">NEW_BROADCAST</button>
                        <button @click="editorType = 'author'" :class="editorType === 'author' ? 'bg-gold text-black' : 'bg-white/5'" class="px-8 py-3 rounded-xl font-black text-[10px]">NEW_OPERATIVE</button>
                    </div>
                    <input x-model="newsForm.title" type="text" placeholder="Headline" class="w-full bg-white/5 p-6 rounded-2xl outline-none border border-white/5 focus:border-gold">
                    <textarea x-model="newsForm.body" placeholder="Log entry content..." class="w-full bg-white/5 p-6 rounded-2xl h-48 outline-none border border-white/5"></textarea>
                    <div class="border-2 border-dashed border-white/10 p-10 rounded-3xl text-center relative group">
                        <input type="file" @change="handleUpload" class="absolute inset-0 opacity-0 cursor-pointer">
                        <span class="text-[10px] font-black text-slate-500">UPLOAD_ASSET</span>
                    </div>
                    <button @click="saveData()" class="w-full bg-white text-black py-6 rounded-2xl font-black tracking-widest text-xs">EXECUTE_SYNC</button>
                </div>
                <div class="bg-white/5 p-8 rounded-3xl">
                    <h3 class="text-gold font-black text-[10px] tracking-widest mb-10">ACTIVE_DATABASE</h3>
                    <div class="space-y-4 max-h-[500px] overflow-y-auto">
                        <template x-for="(n, idx) in newsData">
                            <div class="flex items-center justify-between p-4 bg-black/40 rounded-xl border border-white/5">
                                <span class="text-[10px] font-bold truncate max-w-[200px]" x-text="n.title"></span>
                                <button @click="deleteNews(idx)" class="text-red-500"><i class="fas fa-trash"></i></button>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function portalCore() {
            return {
                currentPage: 'home', editorType: 'news', selectedItem: null,
                mardinTime: '', rioTime: '',
                newsForm: { title: '', region: 'Global', body: '', img: '', date: '' },
                authorForm: { name: '', title: '', bio: '', photo: '' },

                newsData: JSON.parse(localStorage.getItem('asc_v13_news')) || [
                    { id: 1, title: 'Mardin Intelligence Hub Online', region: 'Mardin', body: 'The historical corridor is now reinforced with the latest digital sovereignty protocols...', img: 'https://images.unsplash.com/photo-1582236894056-e918b9588667?w=1600', date: '02.03.2026' },
                    { id: 2, title: 'Sao Paulo Financial Integration', region: 'Sao Paulo', body: 'New trans-continental economic agreements signed between Brazil and Mesopotamian nodes...', img: 'https://images.unsplash.com/photo-1543059180-87383af5bd1f?w=1600', date: '02.03.2026' }
                ],
                authors: JSON.parse(localStorage.getItem('asc_v13_authors')) || [
                    { id: 1, name: 'Ahmet Çınarbaş', title: 'Political Scientist', bio: 'Strategic Lead at ASC Global. Specializing in trans-continental political intelligence.', photo: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=800' },
                    { id: 2, name: 'M. Beşir Ayanoğlu', title: 'Legal Counsel', bio: 'Head of Legal Governance. Expert in international digital law and sovereignty.', photo: 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=800' }
                ],

                init() { 
                    this.updateClocks();
                    setInterval(() => this.updateClocks(), 1000);
                    this.sync(); 
                },
                updateClocks() {
                    const now = new Date();
                    this.mardinTime = now.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                    this.rioTime = new Date(now.getTime() - (6 * 60 * 60 * 1000)).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                },
                handleUpload(e) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        if(this.editorType === 'news') this.newsForm.img = reader.result;
                        else this.authorForm.photo = reader.result;
                    };
                    reader.readAsDataURL(e.target.files[0]);
                },
                openAdmin() { if(prompt("ACCESS_KEY:") === "Mardin47**") this.currentPage = 'admin'; },
                saveData() {
                    if(this.editorType === 'news') this.newsData.unshift({...this.newsForm, id: Date.now(), date: new Date().toLocaleDateString('tr-TR')});
                    else this.authors.push({...this.authorForm, id: Date.now()});
                    this.sync(); this.resetForms(); alert("DATABASE_SYNCHRONIZED");
                },
                deleteNews(idx) { this.newsData.splice(idx, 1); this.sync(); },
                viewItem(item) { this.selectedItem = item; this.currentPage = 'reader'; window.scrollTo(0,0); },
                sync() { localStorage.setItem('asc_v13_news', JSON.stringify(this.newsData)); localStorage.setItem('asc_v13_authors', JSON.stringify(this.authors)); },
                resetForms() { this.newsForm = { title: '', region: 'Global', body: '', img: '', date: '' }; this.authorForm = { name: '', title: '', bio: '', photo: '' }; }
            }
        }
    </script>
</body>
</html>
