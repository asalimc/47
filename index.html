<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Global Culture & News</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfbf7; --text: #1a1a1a; --muted: #718096; --accent: #c49b66;
            --white: #ffffff; --transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; scroll-behavior: smooth; overflow-x: hidden; }
        #progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent); width: 0%; z-index: 10001; }
        
        nav { background: rgba(253, 251, 247, 0.9); backdrop-filter: blur(15px); padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.03); }
        .logo { font-family: 'Marcellus', serif; font-size: 2rem; letter-spacing: 3px; cursor: pointer; text-transform: uppercase; }
        .admin-trigger { cursor: pointer; opacity: 0.05; font-size: 10px; padding: 10px; }

        .authors-strip { background: var(--white); padding: 30px 0; display: flex; justify-content: center; gap: 40px; border-bottom: 1px solid #f1f1f1; flex-wrap: wrap; }
        .author-item { cursor: pointer; text-align: center; width: 90px; transition: var(--transition); }
        .author-item img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 1px solid var(--accent); padding: 4px; }
        .author-item span { display: block; font-size: 0.75rem; font-weight: 700; margin-top: 10px; font-family: 'Marcellus'; }

        .container { max-width: 1400px; margin: 40px auto; display: grid; grid-template-columns: 250px 1fr; gap: 40px; padding: 0 25px; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }

        .news-card { background: var(--white); border-radius: 24px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.02); cursor: pointer; transition: var(--transition); border: 1px solid rgba(0,0,0,0.02); display: flex; flex-direction: column; height: 100%; }
        .news-card:hover { transform: translateY(-10px); box-shadow: 0 30px 60px rgba(0,0,0,0.06); }
        .news-img { width: 100%; height: 250px; object-fit: cover; }
        .card-body { padding: 25px; flex-grow: 1; }
        .card-body h2 { font-family: 'Marcellus', serif; font-size: 1.5rem; margin: 15px 0; line-height: 1.3; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: none; overflow-y: auto; }
        .close-btn { position: fixed; top: 30px; right: 40px; cursor: pointer; background: var(--text); color: #fff; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .article-wrap { max-width: 800px; margin: 60px auto; padding: 0 20px; }

        /* ADMİN PANEL (YENİ PENCERE TASARIMI) */
        .admin-body { background: #f4f7f6; padding: 40px; font-family: 'Plus Jakarta Sans', sans-serif; }
        .admin-card { background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .admin-card h3 { font-family: 'Marcellus'; color: var(--accent); margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; }
        .btn { padding: 12px 25px; border-radius: 50px; border: none; cursor: pointer; font-weight: 700; width: 100%; transition: 0.3s; }
        .btn-gold { background: var(--accent); color: white; }
        .btn-dark { background: #1a1a1a; color: white; }
        .mgmt-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f9f9f9; font-size: 14px; }
        .del-btn { color: #ff7675; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="progress-bar"></div>

<div id="main-ui">
    <nav>
        <div class="logo" onclick="location.reload()">LUMINA</div>
        <div style="display:flex; align-items:center; gap:20px;">
            <div id="loc-tag" style="font-size: 0.8rem; letter-spacing: 2px; font-weight: 700;">DETECTING...</div>
            <div class="admin-trigger" onclick="openAdminWindow()">[L_CORE]</div>
        </div>
    </nav>

    <div class="authors-strip" id="authors-container"></div>

    <div class="container">
        <aside class="sidebar-left">
            <div class="side-title" style="font-family:'Marcellus'; border-bottom:1px solid #eee; padding-bottom:10px; margin-bottom:20px;">KATEGORİLER</div>
            <div id="cat-list" style="font-size: 0.9rem; line-height: 2.8; cursor: pointer;"></div>
            <div id="ad-area" style="margin-top:40px; border-radius:15px; overflow:hidden;"></div>
        </aside>
        <main class="news-grid" id="news-feed"></main>
    </div>
</div>

<div id="overlay" class="overlay">
    <div class="close-btn" onclick="closeAll()">✕</div>
    <div id="overlay-content" class="article-wrap"></div>
</div>

<script>
    const PASS = "47";
    let db = JSON.parse(localStorage.getItem('lumina_v20')) || {
        news: [{id:1, title: "Mardin Gümüşü", text: "Telkari sanatı detayları...", img: "https://images.unsplash.com/photo-1582738411706-bfc8e691d1c2?w=800", cat: "Kültür"}],
        authors: [{id:1, name: "VEDAT M.", bio: "Kültür Yazarı", img: "https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=200"}],
        cats: ['Mardin', 'Brezilya', 'Gastronomi'],
        ad: "https://via.placeholder.com/300x500"
    };

    function sync() { localStorage.setItem('lumina_v20', JSON.stringify(db)); renderApp(); }

    // --- YEREL DOSYA OKUYUCU ---
    function getBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }

    // --- ADMİN PENCERESİ ---
    function openAdminWindow() {
        if(prompt("Sistem Şifresi:") !== PASS) return;
        
        const adminWin = window.open("", "LuminaAdmin", "width=1000,height=800");
        adminWin.document.write(`
            <html><head><title>Lumina Admin</title>
            <style>${document.querySelector('style').innerHTML}</style></head>
            <body class="admin-body">
                <h1 style="font-family:Marcellus; text-align:center;">Lumina Studio Control</h1>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:30px;">
                    <div class="admin-card">
                        <h3>Haber Yönetimi</h3>
                        <input type="text" id="n-title" placeholder="Haber Başlığı">
                        <textarea id="n-text" placeholder="İçerik..." rows="4"></textarea>
                        <select id="n-cat">${db.cats.map(c=>`<option>${c}</option>`).join('')}</select>
                        <button class="btn btn-gold" onclick="window.opener.postMessage('saveNews', '*')">Haber Ekle</button>
                        <div id="news-list"></div>
                    </div>
                    <div class="admin-card">
                        <h3>Yazar & Reklam (Yerel Görsel)</h3>
                        <input type="text" id="auth-n" placeholder="Yazar Adı">
                        <textarea id="auth-b" placeholder="Biyografi"></textarea>
                        <label>Yazar Fotoğrafı Seç:</label>
                        <input type="file" id="auth-img" accept="image/*">
                        <button class="btn btn-gold" onclick="window.opener.postMessage('saveAuth', '*')">Yazar Ekle</button>
                        <hr>
                        <label>Reklam Görseli Seç:</label>
                        <input type="file" id="ad-img" accept="image/*">
                        <button class="btn btn-dark" onclick="window.opener.postMessage('saveAd', '*')">Reklamı Güncelle</button>
                    </div>
                </div>
                <script>
                    window.onmessage = (e) => { if(e.data === 'refresh') location.reload(); };
                <\/script>
            </body></html>
        `);
    }

    // Pencereden gelen emirleri dinle
    window.addEventListener("message", async (event) => {
        const win = event.source;
        const doc = win.document;

        if(event.data === 'saveNews') {
            const n = { id: Date.now(), title: doc.getElementById('n-title').value, text: doc.getElementById('n-text').value, cat: doc.getElementById('n-cat').value, img: "https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?w=800" };
            db.news.unshift(n); sync(); win.alert("Haber Eklendi!");
        }

        if(event.data === 'saveAuth') {
            const file = doc.getElementById('auth-img').files[0];
            const imgData = file ? await getBase64(file) : "https://via.placeholder.com/200";
            db.authors.push({ id: Date.now(), name: doc.getElementById('auth-n').value.toUpperCase(), bio: doc.getElementById('auth-b').value, img: imgData });
            sync(); win.alert("Yazar Eklendi!");
        }

        if(event.data === 'saveAd') {
            const file = doc.getElementById('ad-img').files[0];
            if(file) { db.ad = await getBase64(file); sync(); win.alert("Reklam Güncellendi!"); }
        }
    });

    // --- RENDER ---
    function renderApp() {
        document.getElementById('loc-tag').innerText = navigator.language.includes('tr') ? "MARDİN • YEREL" : "SAO PAULO • LOCAL";
        document.getElementById('authors-container').innerHTML = db.authors.map(a => `
            <div class="author-item" onclick="openAuthor('${a.name}', '${a.bio}', '${a.img}')">
                <img src="${a.img}"><span>${a.name}</span>
            </div>`).join('');
        document.getElementById('cat-list').innerHTML = db.cats.map(c => `<div>• ${c}</div>`).join('');
        document.getElementById('ad-area').innerHTML = `<img src="${db.ad}" style="width:100%;">`;
        document.getElementById('news-feed').innerHTML = db.news.map(n => `
            <article class="news-card" onclick="openNews('${n.title}', '${n.text}', '${n.img}')">
                <img src="${n.img}" class="news-img">
                <div class="card-body">
                    <small style="color:var(--accent); font-weight:bold;">${n.cat.toUpperCase()}</small>
                    <h2>${n.title}</h2>
                </div>
            </article>`).join('');
    }

    function openNews(t, txt, img) {
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('overlay-content').innerHTML = `<h1>${t}</h1><img src="${img}" style="width:100%; border-radius:20px;"><p style="font-size:1.2rem; line-height:1.8;">${txt}</p>`;
    }

    function openAuthor(n, b, img) {
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('overlay-content').innerHTML = `<div style="text-align:center"><img src="${img}" style="width:150px; border-radius:50%;"><h1 style="font-family:Marcellus">${n}</h1><p>${b}</p></div>`;
    }

    function closeAll() { document.getElementById('overlay').style.display = 'none'; }

    window.onscroll = () => {
        let winScroll = document.documentElement.scrollTop;
        let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        document.getElementById("progress-bar").style.width = (winScroll / height) * 100 + "%";
    };

    renderApp();
</script>
</body>
</html>
