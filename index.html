<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MB Journal | Ahmet Çınarbaş</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@700;900&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F8F6F2; --ink: #1A1A1A; --accent: #B08D57; --white: #FFFFFF; }
        body { background: var(--bg); color: var(--ink); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .bento { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; }
        .card { background: var(--white); border-radius: 30px; position: relative; overflow: hidden; min-height: 480px; cursor: pointer; transition: 0.4s; border: 1px solid rgba(0,0,0,0.05); }
        .card:hover { transform: translateY(-10px); box-shadow: 0 30px 60px rgba(0,0,0,0.1); }
        .card-bg { position: absolute; inset: 0; background-size: cover; background-position: center; z-index: 0; }
        .card-overlay { position: absolute; inset: 0; background: linear-gradient(transparent, rgba(0,0,0,0.85)); z-index: 1; }
        .card-content { position: relative; z-index: 2; color: white; padding: 40px; height: 100%; display: flex; flex-direction: column; justify-content: flex-end; }
        .tag { font-size: 0.7rem; font-weight: 800; letter-spacing: 2px; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; }
        .tr-t { font-family: 'Bodoni Moda', serif; font-size: 2.2rem; display: block; line-height: 1.1; }
        
        #modal { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: none; overflow-y: auto; padding: 60px 20px; }
        .modal-inner { max-width: 900px; margin: 0 auto; }
        .close { position: fixed; top: 20px; right: 20px; background: var(--ink); color: white; border: none; padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="bento" id="grid">
            </div>
    </div>

    <div id="modal">
        <button class="close" onclick="document.getElementById('modal').style.display='none'">KAPAT</button>
        <div class="modal-inner" id="modal-content"></div>
    </div>

    <script>
        async function loadJournal() {
            // Cache engellemek için timestamp ekledik
            const res = await fetch('https://raw.githubusercontent.com/asalimc/47/main/articles.json?v=' + Date.now());
            const data = await res.json();
            const grid = document.getElementById('grid');
            
            // Verileri ayıkla
            const meta = data.find(i => i.type === "metadata") || { author: { name: "Ahmet Çınarbaş", bio: "Kültürel Arşivci", img: "https://pbs.twimg.com/media/GifApT2XEAAqees.jpg" }};
            const posts = data.filter(i => i.type === "post");

            // 1. Yazar Kartını oluştur
            grid.innerHTML = `
                <div class="card" style="display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding: 20px;">
                    <img src="${meta.author.img}" style="width:140px; height:140px; border-radius:50%; margin-bottom:20px; object-fit:cover; border: 4px solid var(--bg);">
                    <span class="tag">YAZAR ● ${meta.author.bio.toUpperCase()}</span>
                    <span style="font-family:'Bodoni Moda'; font-size:2.4rem;">${meta.author.name}</span>
                </div>`;

            // 2. Makaleleri oluştur (Her makale yeni bir div/kart olur)
            posts.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => {
                    document.getElementById('modal').style.display = 'block';
                    document.getElementById('modal-content').innerHTML = `
                        <span class="tag">${item.category}</span>
                        <h1 class="tr-t" style="color:black; font-size:3.5rem;">${item.tr.title}</h1>
                        <p style="color:var(--accent); font-weight:bold; margin-bottom:40px;">${item.date}</p>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:40px; line-height:1.8; font-size:1.1rem;">
                            <div style="text-align:justify;">${item.tr.body.replace(/\n/g, '<br>')}</div>
                            <div style="color:#666; font-style:italic;">${item.pt.body.replace(/\n/g, '<br>')}</div>
                        </div>`;
                };
                card.innerHTML = `
                    <div class="card-bg" style="background-image:url('${item.image}')"></div>
                    <div class="card-overlay"></div>
                    <div class="card-content">
                        <span class="tag" style="color:white;">${item.category}</span>
                        <span class="tr-t">${item.tr.title}</span>
                    </div>`;
                grid.appendChild(card);
            });
        }
        window.onload = loadJournal;
    </script>
</body>
</html>
