<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MB | Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #f0f0f0; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background: white; padding: 15px; margin: 10px auto; max-width: 400px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        img { width: 100%; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>MARDIN BRAZIL</h1>
    <div id="durum">Bağlanıyor...</div>
    <div id="liste"></div>

    <script>
        const URL = "https://toomlocgdhkwrypuveof.supabase.co";
        const M_KEY = "ZXlKaGJHY2lPaUpJVXpJMk5pSXNJblI1Y0NJNklrcFhWQ0o5LmV5SnBjU01pT2lKemRYQmhiR0Z6WlNJc0luSmxaaUk2SW5SdmIyMXNiMjVuWkdoｃｍQzSjVjSFYyWlc5bklpd2ljbTlzWlNJNkltRnViMjRpTENKcG群众R2NpT2pFM056STJOamcwT0RRc0ltVjRjQ0k2TWpBNE9ESTBORFE0TkgwLmtraXdLVHNmWU9DSUlfZGZ1SnBhRWx5SnF4VGhya0duS2lLNy1Sak9zcUk=";
        const KEY = atob(M_KEY.replace(/[^A-Za-z0-9+/=]/g, ""));

        const supabaseClient = supabase.createClient(URL, KEY);

        async function verileriGetir() {
            try {
                // Tablonun adı 'articles'
                const { data, error } = await supabaseClient.from('articles').select('*');
                
                if (error) throw error;

                document.getElementById('durum').style.display = 'none';
                document.getElementById('liste').innerHTML = data.map(item => `
                    <div class="card">
                        <img src="${item.img}">
                        <h3>${item.tr}</h3>
                        <p>${item.tag}</p>
                    </div>
                `).join('');

            } catch (hata) {
                document.getElementById('durum').innerHTML = "Hata Detayı: " + hata.message;
            }
        }
        verileriGetir();
    </script>
</body>
</html>
