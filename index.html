<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASC GLOBAL | Yeni Nesil Medya Portalı</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
        
        .premium-card { 
            background: white; border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 4px 20px -2px rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .premium-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }

        .admin-input {
            width: 100%; background: #f8fafc; border: 1px solid #e2e8f0; padding: 0.85rem; border-radius: 0.75rem;
            outline: none; transition: all 0.2s; font-size: 0.875rem;
        }
        .admin-input:focus { border-color: #3b82f6; ring: 2px; ring-color: #3b82f6; background: white; }

        .ticker-wrap { overflow: hidden; background: #0f172a; color: white; padding: 8px 0; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .ticker { display: inline-block; white-space: nowrap; animation: ticker 30s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="portalApp()" x-init="init()" class="min-h-screen">

    <div class="ticker-wrap fixed top-0 w-full z-[110]">
        <div class="ticker">
            <span class="mx-4">USD/TRY: 31.45 <i class="fas fa-caret-up text-green-400"></i></span>
            <span class="mx-4">EUR/TRY: 34.12 <i class="fas fa-caret-up text-green-400"></i></span>
            <span class="mx-4">BTC/USD: 64,250 <i class="fas fa-caret-down text-red-400"></i></span>
            <span class="mx-4">MARDIN/WEATHER: 18°C <i class="fas fa-sun text-yellow-400"></i></span>
            <span class="mx-4">RIO/WEATHER: 29°C <i class="fas fa-cloud-sun text-orange-400"></i></span>
        </div>
    </div>

    <nav class="fixed top-7 w-full z-[100] bg-white/90 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-[1600px] mx-auto px-6 py-4 flex justify-between items-center">
            <div @click="currentPage = 'home'" class="flex items-center gap-3 cursor-pointer">
                <div class="bg-blue-600 text-white font-black px-4 py-1 rounded-lg text-xl">ASC</div>
                <span class="text-2xl font-black tracking-tighter uppercase italic">Global Portal</span>
            </div>
            
            <div class="hidden lg:flex gap-8 text-[11px] font-bold uppercase tracking-widest text-slate-500">
                <template x-for="cat in categories.slice(0, 5)">
                    <a href="#" class="hover:text-blue-600 transition" x-text="cat"></a>
                </template>
            </div>

            <div class="flex items-center gap-4">
                <span class="hidden md:block text-[10px] font-bold text-slate-400" x-text="todayDate"></span>
                <button @click="loginAdmin()" class="bg-slate-900 text-white px-5 py-2 rounded-full text-xs font-bold hover:bg-blue-600 transition shadow-xl">YÖNETİM</button>
            </div>
        </div>
    </nav>

    <main class="pt-32">
        <div x-show="currentPage === 'home'" class="max-w-[1600px] mx-auto px-6 animate-in fade-in duration-700">
            
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-16">
                <div @click="openNews(newsData.find(n => n.region === 'Mardin'))" class="lg:col-span-7 relative group rounded-[2.5rem] overflow-hidden shadow-2xl h-[600px] cursor-pointer">
                    <img src="https://images.unsplash.com/photo-1544830154-1505c215f79a?q=80&w=2000" class="w-full h-full object-cover group-hover:scale-105 transition duration-1000">
                    <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-transparent to-transparent"></div>
                    <div class="absolute bottom-10 left-10 right-10">
                        <span class="bg-blue-600 text-white px-4 py-1 rounded-full text-[10px] font-black uppercase mb-4 inline-block tracking-widest">Mardin Odaklı Haberler</span>
                        <h2 class="text-5xl font-extrabold text-white tracking-tighter italic leading-none" x-text="newsData.find(n => n.region === 'Mardin')?.title || 'Mardin Haberleri'"></h2>
                    </div>
                </div>

                <div class="lg:col-span-5 flex flex-col gap-6">
                    <div @click="openNews(newsData.find(n => n.region === 'Rio'))" class="relative group rounded-[2.5rem] overflow-hidden shadow-xl h-[285px] cursor-pointer">
                        <img src="https://images.unsplash.com/photo-1483728642387-6c3bdd6c93e5?q=80&w=2000" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-orange-950/80 to-transparent"></div>
                        <div class="absolute bottom-6 left-8">
                            <span class="bg-orange-500 text-white px-3 py-1 rounded-full text-[9px] font-black uppercase mb-2 inline-block">Rio News</span>
                            <h3 class="text-2xl font-bold text-white tracking-tight" x-text="newsData.find(n => n.region === 'Rio')?.title || 'Rio Dosyası'"></h3>
                        </div>
                    </div>
                    
                    <div class="bg-white rounded-[2.5rem] p-8 shadow-xl border border-slate-100 flex-1">
                        <h4 class="text-xs font-black uppercase text-blue-600 mb-6 tracking-widest flex items-center gap-2">
                            <span class="w-2 h-2 bg-blue-600 rounded-full animate-pulse"></span> Son Dakika
                        </h4>
                        <div class="space-y-4">
                            <template x-for="n in newsData.slice(0, 4)">
                                <div @click="openNews(n)" class="flex items-start gap-4 cursor-pointer group border-b border-slate-50 pb-4 last:border-0">
                                    <div class="bg-slate-100 text-[10px] font-bold p-2 rounded-lg text-slate-400 group-hover:bg-blue-600 group-hover:text-white transition" x-text="n.tag"></div>
                                    <p class="text-sm font-bold leading-snug group-hover:text-blue-600" x-text="n.title"></p>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-between mb-12">
                <h3 class="text-3xl font-black uppercase italic tracking-tighter">Gündem <span class="text-blue-600">Arşivi</span></h3>
                <div class="h-px flex-1 bg-slate-200 mx-10"></div>
                <div class="flex gap-2">
                    <button class="bg-white border border-slate-200 px-4 py-2 rounded-xl text-xs font-bold hover:bg-slate-50">Tümü</button>
                    <button class="bg-white border border-slate-200 px-4 py-2 rounded-xl text-xs font-bold hover:bg-slate-50 text-slate-400">Analiz</button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 mb-32">
                <template x-for="(news, index) in newsData" :key="index">
                    <div @click="openNews(news)" class="premium-card rounded-[2.5rem] overflow-hidden group cursor-pointer">
                        <div class="h-60 overflow-hidden relative">
                            <img :src="news.img || 'https://via.placeholder.com/800x600'" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                            <div class="absolute top-4 left-4 flex gap-2">
                                <span class="bg-white/95 backdrop-blur px-3 py-1 rounded-lg text-[9px] font-black uppercase text-blue-600 shadow-md" x-text="news.tag"></span>
                            </div>
                        </div>
                        <div class="p-8">
                            <h4 class="text-xl font-bold mb-6 leading-tight group-hover:text-blue-600 transition" x-text="news.title"></h4>
                            <div class="flex items-center justify-between pt-6 border-t border-slate-100 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                                <span x-text="news.date"></span>
                                <span><i class="fas fa-eye text-blue-500 mr-2"></i><span x-text="news.views"></span></span>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="currentPage === 'news-detail'" class="max-w-4xl mx-auto px-6 py-20" x-cloak>
            <button @click="currentPage = 'home'" class="mb-10 text-xs font-bold uppercase tracking-widest text-slate-400 hover:text-blue-600">← Geri Dön</button>
            <div class="relative rounded-[3rem] overflow-hidden shadow-2xl mb-12">
                <img :src="selectedNews?.img" class="w-full h-[500px] object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                <div class="absolute bottom-8 left-8">
                    <span class="bg-blue-600 text-white px-4 py-1 rounded-full text-xs font-bold uppercase mb-4 inline-block" x-text="selectedNews?.tag"></span>
                    <h1 class="text-4xl md:text-6xl font-black text-white leading-none tracking-tighter" x-text="selectedNews?.title"></h1>
                </div>
            </div>
            <div class="prose max-w-none text-xl text-slate-600 leading-relaxed font-light italic border-l-4 border-blue-600 pl-8 mb-10" x-html="selectedNews?.body"></div>
        </div>

        <div x-show="currentPage === 'admin'" class="max-w-[1500px] mx-auto px-6 py-20" x-cloak>
            <div class="flex items-center justify-between mb-16">
                <h2 class="text-4xl font-black uppercase italic tracking-tighter">İçerik <span class="text-blue-600">Terminali</span></h2>
                <button @click="currentPage = 'home'" class="bg-red-50 text-red-600 px-6 py-3 rounded-2xl text-xs font-bold uppercase hover:bg-red-600 hover:text-white transition">Paneli Kilitle</button>
            </div>

            <div class="grid grid-cols-1 xl:grid-cols-12 gap-10">
                <div class="xl:col-span-5">
                    <div class="bg-white p-10 rounded-[3rem] shadow-2xl border border-slate-100 sticky top-40">
                        <div class="flex gap-2 mb-8 bg-slate-50 p-1 rounded-2xl">
                            <button @click="formMode = 'news'" :class="formMode === 'news' ? 'bg-white shadow text-blue-600' : 'text-slate-400'" class="flex-1 py-3 rounded-xl text-xs font-bold uppercase transition">Haber</button>
                            <button @click="formMode = 'author'" :class="formMode === 'author' ? 'bg-white shadow text-blue-600' : 'text-slate-400'" class="flex-1 py-3 rounded-xl text-xs font-bold uppercase transition">Yazar</button>
                        </div>

                        <div class="space-y-4">
                            <template x-if="formMode === 'news'">
                                <div class="space-y-4">
                                    <input x-model="formData.title" type="text" placeholder="Haber Başlığı" class="admin-input">
                                    <div class="grid grid-cols-2 gap-4">
                                        <select x-model="formData.tag" class="admin-input">
                                            <option value="">Kategori Seç</option>
                                            <template x-for="cat in categories">
                                                <option :value="cat" x-text="cat"></option>
                                            </template>
                                        </select>
                                        <select x-model="formData.region" class="admin-input">
                                            <option value="Global">Bölge: Global</option>
                                            <option value="Mardin">Bölge: Mardin</option>
                                            <option value="Rio">Bölge: Rio</option>
                                        </select>
                                    </div>
                                    <textarea x-model="formData.body" placeholder="Haber İçeriği (HTML Kullanabilirsiniz)" class="admin-input h-40"></textarea>
                                </div>
                            </template>

                            <template x-if="formMode === 'author'">
                                <div class="space-y-4">
                                    <input x-model="formData.name" type="text" placeholder="Yazar İsim Soyisim" class="admin-input">
                                    <input x-model="formData.title" type="text" placeholder="Ünvan (Örn: Ekonomist)" class="admin-input">
                                    <textarea x-model="formData.bio" placeholder="Kısa Biyografi" class="admin-input h-32"></textarea>
                                </div>
                            </template>

                            <div class="bg-blue-50 border-2 border-dashed border-blue-200 p-6 rounded-2xl text-center relative hover:bg-blue-100 transition">
                                <input type="file" @change="handleUpload($event)" class="absolute inset-0 opacity-0 cursor-pointer">
                                <p class="text-[10px] font-black text-blue-600 uppercase">Görsel Seç / Güncelle</p>
                            </div>

                            <button @click="saveData()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase tracking-widest hover:bg-slate-900 transition-all shadow-xl shadow-blue-200">
                                <span x-text="isEdit ? 'DEĞİŞİKLİKLERİ KAYDET' : 'SİSTEME YAYINLA'"></span>
                            </button>
                            <button x-show="isEdit" @click="resetForm()" class="w-full text-slate-400 text-[10px] font-bold uppercase mt-2 hover:underline">Düzenlemeyi İptal Et</button>
                        </div>
                    </div>
                </div>

                <div class="xl:col-span-7 space-y-8">
                    <div class="bg-white p-10 rounded-[3rem] shadow-xl border border-slate-100">
                        <div class="flex items-center justify-between mb-8 pb-4 border-b border-slate-50">
                            <h4 class="text-xl font-black uppercase italic">Aktif Haber Akışı</h4>
                            <span class="bg-slate-100 px-3 py-1 rounded-lg text-[10px] font-black text-slate-500 uppercase" x-text="'TOPLAM: ' + newsData.length"></span>
                        </div>
                        
                        <div class="space-y-3 h-[700px] overflow-y-auto pr-4">
                            <template x-for="(n, idx) in newsData" :key="idx">
                                <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl hover:bg-white border border-transparent hover:border-blue-100 transition group">
                                    <div class="flex items-center gap-4">
                                        <img :src="n.img" class="w-14 h-14 rounded-xl object-cover shadow-md">
                                        <div>
                                            <p class="font-bold text-sm text-slate-900 group-hover:text-blue-600 transition" x-text="n.title"></p>
                                            <div class="flex gap-2 mt-1">
                                                <span class="text-[8px] font-black uppercase px-2 py-0.5 bg-blue-100 text-blue-600 rounded" x-text="n.tag"></span>
                                                <span class="text-[8px] font-black uppercase px-2 py-0.5 bg-slate-200 text-slate-500 rounded" x-text="n.region"></span>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition translate-x-2 group-hover:translate-x-0">
                                        <button @click="editData('news', idx)" class="w-10 h-10 rounded-xl bg-blue-100 text-blue-600 hover:bg-blue-600 hover:text-white transition"><i class="fas fa-edit"></i></button>
                                        <button @click="deleteData('news', idx)" class="w-10 h-10 rounded-xl bg-red-100 text-red-600 hover:bg-red-600 hover:text-white transition"><i class="fas fa-trash"></i></button>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function portalApp() {
            return {
                currentPage: 'home', formMode: 'news', isEdit: false, editIdx: null,
                selectedNews: null, todayDate: '',
                categories: ['Ekonomi', 'Kültür', 'Teknoloji', 'Siyaset', 'Analiz', 'Yaşam'],
                formData: { title:'', tag:'', body:'', img:'', name:'', bio:'', region:'Global', photo:'' },

                // Yerel Depolama ile Verileri Getir
                newsData: JSON.parse(localStorage.getItem('asc_v15_news')) || [
                    { title: 'Mardin de Arkeolojik Sensation: Kayıp Şehir Bulundu', tag: 'Kültür', region: 'Mardin', img: 'https://images.unsplash.com/photo-1582236894056-e918b9588667?w=800', body: 'Detaylı arkeoloji haberi...', views: 4200, date: '02.03.2026' },
                    { title: 'Rio Carnival 2026: Teknolojik Devrim Kapıda', tag: 'Analiz', region: 'Rio', img: 'https://images.unsplash.com/photo-1516307361401-e323ad26de92?w=800', body: 'Rio hazırlıkları tam gaz...', views: 8900, date: '01.03.2026' },
                    { title: 'Yapay Zeka Portalları Ele Geçiriyor mu?', tag: 'Teknoloji', region: 'Global', img: 'https://images.unsplash.com/photo-1518186239717-2e9b1bd67b9b?w=800', body: 'AI üzerine büyük dosya...', views: 12500, date: '28.02.2026' }
                ],
                
                authors: JSON.parse(localStorage.getItem('asc_v15_authors')) || [],

                init() {
                    this.updateDate();
                    setInterval(() => this.updateDate(), 60000);
                },

                updateDate() {
                    const n = new Date();
                    this.todayDate = n.toLocaleDateString('tr-TR', { day:'numeric', month:'long', year:'numeric', weekday:'long' });
                },

                handleUpload(e) {
                    const file = e.target.files[0];
                    const reader = new FileReader();
                    reader.onloadend = () => { 
                        if(this.formMode === 'news') this.formData.img = reader.result;
                        else this.formData.photo = reader.result;
                    }
                    if(file) reader.readAsDataURL(file);
                },

                loginAdmin() {
                    if (prompt("Giriş Şifresi:") === "Mardin47**") this.currentPage = 'admin';
                },

                saveData() {
                    if(this.formMode === 'news') {
                        if(this.isEdit) {
                            this.newsData[this.editIdx] = {...this.formData};
                        } else {
                            this.newsData.unshift({...this.formData, views: 0, date: new Date().toLocaleDateString('tr-TR')});
                        }
                    } else {
                        if(this.isEdit) {
                            this.authors[this.editIdx] = {...this.formData};
                        } else {
                            this.authors.push({...this.formData, reads: 0});
                        }
                    }
                    this.sync();
                    this.resetForm();
                    alert("Sistem başarıyla güncellendi!");
                },

                editData(type, idx) {
                    this.formMode = type;
                    this.isEdit = true;
                    this.editIdx = idx;
                    this.formData = type === 'news' ? {...this.newsData[idx]} : {...this.authors[idx]};
                    window.scrollTo({top: 0, behavior: 'smooth'});
                },

                deleteData(type, idx) {
                    if(confirm("Bu içeriği kalıcı olarak silmek istediğinize emin misiniz?")) {
                        if(type === 'news') this.newsData.splice(idx, 1);
                        else this.authors.splice(idx, 1);
                        this.sync();
                    }
                },

                resetForm() {
                    this.formData = { title:'', tag:'', body:'', img:'', name:'', bio:'', region:'Global', photo:'' };
                    this.isEdit = false;
                    this.editIdx = null;
                },

                sync() {
                    localStorage.setItem('asc_v15_news', JSON.stringify(this.newsData));
                    localStorage.setItem('asc_v15_authors', JSON.stringify(this.authors));
                },

                openNews(news) {
                    if(!news) return;
                    news.views++;
                    this.selectedNews = news;
                    this.currentPage = 'news-detail';
                    this.sync();
                    window.scrollTo(0,0);
                }
            }
        }
    </script>
</body>
</html>
