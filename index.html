<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Global Culture & News</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #fdfbf7; --text: #1a1a1a; --muted: #718096; --accent: #c49b66; --white: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; scroll-behavior: smooth; }
        #progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent); width: 0%; z-index: 10001; }
        nav { background: rgba(253, 251, 247, 0.9); backdrop-filter: blur(15px); padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.03); }
        .logo { font-family: 'Marcellus', serif; font-size: 2rem; letter-spacing: 3px; cursor: pointer; text-transform: uppercase; }

        .authors-strip { background: var(--white); padding: 30px 0; display: flex; justify-content: center; gap: 40px; border-bottom: 1px solid #f1f1f1; overflow-x: auto; scrollbar-width: none; }
        .author-item { cursor: pointer; text-align: center; width: 90px; flex-shrink: 0; }
        .author-item img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 1px solid var(--accent); padding: 4px; margin: 0 auto; }
        .author-item span { display: block; font-size: 0.75rem; font-weight: 700; margin-top: 10px; font-family: 'Marcellus'; text-transform: uppercase; }

        /* Haber Akışı: Alt Alta ve Sıralı Gelmesi İçin */
        .container-main { max-width: 1400px; margin: 40px auto; display: grid; grid-template-columns: 280px 1fr 300px; gap: 40px; padding: 0 25px; }
        #news-feed { display: flex; flex-direction: column; gap: 40px; }
        
        .news-card { background: var(--white); border-radius: 24px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.02); cursor: pointer; transition: 0.4s; border: 1px solid rgba(0,0,0,0.02); opacity: 0; transform: translateY(20px); animation: fadeInUp 0.6s forwards; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        .news-img { width: 100%; height: 500px; object-fit: cover; }
        .card-body { padding: 35px; }
        .card-body h2 { font-family: 'Marcellus', serif; font-size: 2.2rem; margin: 0 0 15px 0; line-height: 1.2; }

        /* Admin Paneli Sabitleme */
        #admin-panel { display: none; background: #0f172a; color: white; position: fixed; inset: 0; z-index: 11000; overflow-y: auto; padding: 40px; }
        .input-dark { width: 100%; padding: 12px; margin-bottom: 15px; background: #1e293b; border-radius: 12px; border: 1px solid #334155; color: white; outline: none; }
        .admin-nav button { color: #64748b; font-weight: 700; font-size: 0.8rem; letter-spacing: 1px; padding: 10px; border-radius: 8px; transition: 0.3s; }
        .admin-nav button.active { color: var(--accent); background: rgba(196, 155, 102, 0.1); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: none; overflow-y: auto; padding-bottom: 100px; }
        .close-overlay { position: fixed; top: 30px; right: 40px; cursor: pointer; background: var(--text); color: #fff; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10000; }

        @media (max-width: 1024px) {
            .container-main { grid-template-columns: 1fr; }
            .sidebar-left, .sidebar-right { display: none; }
        }
    </style>
</head>
<body>

<div id="progress-bar"></div>
<nav><div class="logo" onclick="location.reload()">LUMINA</div><div id="current-city" style="font-size: 0.8rem; letter-spacing: 2px; font-weight: 700;">MARDİN • LIVE</div></nav>
<div id="authors-list" class="authors-strip"></div>

<div class="container-main">
    <aside class="sidebar-left"><div id="categories-list" style="font-size: 0.9rem; line-height: 2.8; cursor: pointer;"></div></aside>
    <main id="news-feed"></main>
    <aside class="sidebar-right"><div id="ad-sidebar" style="background:#f0f0f0; min-height:450px; border-radius:24px; overflow:hidden;"></div></aside>
</div>

<footer style="padding: 60px; text-align: center; opacity: 0.3;"><button onclick="toggleAdmin()" style="font-size: 10px; letter-spacing: 2px;">PANEL</button></footer>

<div id="overlay" class="overlay"><div class="close-overlay" onclick="closeAll()">✕</div><div id="overlay-content" class="max-w-4xl mx-auto mt-20 p-5"></div></div>

<div id="admin-panel">
    <div class="flex justify-between items-center mb-10 border-b border-slate-800 pb-5">
        <h2 class="text-2xl font-black text-accent tracking-tighter">LUMINA ENGINE v3.1</h2>
        <button onclick="toggleAdmin()" class="bg-red-500/20 text-red-500 px-6 py-2 rounded-full font-bold text-xs uppercase">Paneli Kapat</button>
    </div>
    <div class="admin-nav flex gap-4 mb-10">
        <button onclick="setTab('haber')" id="btn-haber" class="active">HABERLER</button>
        <button onclick="setTab('yazar')" id="btn-yazar">YAZARLAR</button>
        <button onclick="setTab('cat')" id="btn-cat">KATEGORİLER</button>
        <button onclick="setTab('reklam')" id="btn-reklam">REKLAM</button>
    </div>
    <div id="admin-content" class="grid grid-cols-1 lg:grid-cols-3 gap-10"></div>
</div>

<script>
    // Dinamik DB yapısı ve Örnek Veriler
    const defaultDB = {
        cats: [{id: 'c1', name: 'Siyaset'}, {id: 'c2', name: 'Analiz'}, {id: 'c3', name: 'Yaşam'}],
        yazarlar: [
            {id: 'y1', isim: 'Ahmet ÇINARBAŞ', bio: 'Siyasi Analiz', img: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400'},
            {id: 'y2', isim: 'Adriana Silva', bio: 'Moda Editörü', img: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=400'}
        ],
        haberler: [
            {id: 'h1', title: "Analiz: Yerel Seçim Sonuçları", text: "Mardin ve çevresindeki seçim atmosferini Ahmet Çınarbaş değerlendiriyor...", img: 'https://images.unsplash.com/photo-1529107386315-e1a2ed48a620?w=1200', cid: 'c1', yid: 'y1'}
        ],
        reklamlar: [{img: 'https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=500'}]
    };

    let db = JSON.parse(localStorage.getItem('lumina_db_stable')) || defaultDB;
    let activeTab = 'haber', tempImg = "", editingId = null;

    function handleImg(e) {
        const reader = new FileReader();
        reader.onload = () => { tempImg = reader.result; };
        reader.readAsDataURL(e.target.files[0]);
    }

    function toggleAdmin() {
        const p = document.getElementById('admin-panel');
        p.style.display = (p.style.display === 'block') ? 'none' : 'block';
        if(p.style.display === 'block') { editingId = null; tempImg = ""; renderAdmin(); }
    }

    function setTab(tab) {
        activeTab = tab; editingId = null; tempImg = "";
        document.querySelectorAll('.admin-nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + tab).classList.add('active');
        renderAdmin();
    }

    function renderAdmin() {
        const content = document.getElementById('admin-content');
        let form = "", list = "";

        if(activeTab === 'haber') {
            const cO = db.cats.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            const yO = db.yazarlar.map(y => `<option value="${y.id}">${y.isim}</option>`).join('');
            form = `<div class="bg-slate-900 p-6 rounded-3xl"><h3 class="text-accent font-bold mb-4 uppercase text-xs">Yeni Haber</h3>
                <input type="text" id="h-t" placeholder="Başlık" class="input-dark">
                <select id="h-c" class="input-dark">${cO}</select>
                <select id="h-y" class="input-dark">${yO}</select>
                <textarea id="h-x" placeholder="İçerik" class="input-dark h-32"></textarea>
                <input type="file" onchange="handleImg(event)" class="text-xs mb-4">
                <button onclick="saveHaber()" class="w-full bg-accent py-3 rounded-xl font-bold">YAYINLA</button></div>`;
            list = db.haberler.map(h => `<div class="flex justify-between p-3 border-b border-slate-800 text-xs"><span>${h.title}</span><button onclick="del('haberler','${h.id}')" class="text-red-400">SİL</button></div>`).join('');
        }
        else if(activeTab === 'yazar') {
            const editY = editingId ? db.yazarlar.find(y => y.id === editingId) : null;
            form = `<div class="bg-slate-900 p-6 rounded-3xl"><h3 class="text-accent font-bold mb-4 uppercase text-xs">${editY ? 'Yazarı Düzenle' : 'Yazar Ekle'}</h3>
                <input type="text" id="y-i" value="${editY?.isim || ''}" placeholder="İsim" class="input-dark">
                <input type="text" id="y-b" value="${editY?.bio || ''}" placeholder="Bio" class="input-dark">
                <input type="file" onchange="handleImg(event)" class="text-xs mb-4">
                <button onclick="saveYazar()" class="w-full bg-accent py-3 rounded-xl font-bold">${editY ? 'GÜNCELLE' : 'KAYDET'}</button>
                ${editingId ? `<button onclick="setTab('yazar')" class="mt-2 text-xs opacity-50 block w-full">İPTAL</button>` : ''}</div>`;
            list = db.yazarlar.map(y => `<div class="flex items-center justify-between p-3 border-b border-slate-800">
                <div class="flex items-center gap-3 cursor-pointer" onclick="editY('${y.id}')">
                <img src="${y.img}" class="w-8 h-8 rounded-full object-cover">
                <span class="text-xs font-bold">${y.isim}</span></div>
                <button onclick="del('yazarlar','${y.id}')" class="text-red-400 text-xs">SİL</button></div>`).join('');
        }
        else if(activeTab === 'cat') {
            form = `<div class="bg-slate-900 p-6 rounded-3xl"><input type="text" id="c-n" placeholder="Kategori Adı" class="input-dark"><button onclick="saveCat()" class="w-full bg-accent py-3 rounded-xl font-bold">EKLE</button></div>`;
            list = db.cats.map(c => `<div class="flex justify-between p-3 border-b border-slate-800 text-xs"><span>${c.name}</span><button onclick="del('cats','${c.id}')" class="text-red-400">SİL</button></div>`).join('');
        }
        else if(activeTab === 'reklam') {
            form = `<div class="bg-slate-900 p-6 rounded-3xl"><input type="file" onchange="handleImg(event)" class="mb-4"><button onclick="saveReklam()" class="w-full bg-accent py-3 rounded-xl font-bold">REKLAMI GÜNCELLE</button></div>`;
            list = db.reklamlar[0] ? `<img src="${db.reklamlar[0].img}" class="w-full rounded-2xl">` : '';
        }

        content.innerHTML = form + `<div class="lg:col-span-2 bg-slate-900 p-6 rounded-3xl overflow-y-auto max-h-[500px]">
            <h3 class="text-xs text-slate-500 mb-4 uppercase">Kayıtlar</h3>${list || '<p class="text-xs opacity-30">Henüz kayıt yok.</p>'}</div>`;
    }

    function saveHaber() {
        const h = { id: 'h'+Date.now(), title: document.getElementById('h-t').value, cid: document.getElementById('h-c').value, yid: document.getElementById('h-y').value, text: document.getElementById('h-x').value, img: tempImg || 'https://via.placeholder.com/1200' };
        if(!h.title || !h.text) return alert("Eksik bilgi!");
        db.haberler.unshift(h); fin();
    }

    function editY(id) { editingId = id; renderAdmin(); }

    function saveYazar() {
        const isim = document.getElementById('y-i').value;
        const bio = document.getElementById('y-b').value;
        if(editingId) {
            let y = db.yazarlar.find(x => x.id === editingId);
            y.isim = isim; y.bio = bio; if(tempImg) y.img = tempImg;
        } else {
            db.yazarlar.push({ id: 'y'+Date.now(), isim, bio, img: tempImg || 'https://via.placeholder.com/400' });
        }
        fin();
    }

    function saveCat() { db.cats.push({id: 'c'+Date.now(), name: document.getElementById('c-n').value}); fin(); }
    function saveReklam() { if(tempImg) { db.reklamlar = [{img: tempImg}]; fin(); } }

    function del(k, i) { 
        if(!confirm('Silinsin mi?')) return;
        if(k === 'yazarlar') db.haberler = db.haberler.filter(h => h.yid !== i);
        db[k] = db[k].filter(x => x.id !== i); 
        fin(); 
    }

    function fin() {
        localStorage.setItem('lumina_db_stable', JSON.stringify(db));
        tempImg = ""; editingId = null;
        renderAdmin(); renderPortal();
    }

    function renderPortal() {
        document.getElementById('categories-list').innerHTML = `<div onclick="filterPortal('all')" class="font-bold mb-4 opacity-50">TÜMÜ</div>` + db.cats.map(c => `<div onclick="filterPortal('${c.id}')">• ${c.name}</div>`).join('');
        document.getElementById('authors-list').innerHTML = db.yazarlar.map(y => `<div class="author-item" onclick="openAuthor('${y.id}')"><img src="${y.img}"><span>${y.isim}</span></div>`).join('');
        if(db.reklamlar[0]) document.getElementById('ad-sidebar').innerHTML = `<img src="${db.reklamlar[0].img}" class="w-full h-full object-cover">`;
        filterPortal('all');
    }

    function filterPortal(cid) {
        const feed = document.getElementById('news-feed');
        feed.innerHTML = "";
        let items = cid === 'all' ? db.haberler : db.haberler.filter(h => h.cid === cid);
        
        items.forEach((h, index) => {
            const card = document.createElement('article');
            card.className = "news-card";
            card.style.animationDelay = `${index * 0.1}s`;
            card.onclick = () => openNews(h.id);
            card.innerHTML = `<img src="${h.img}" class="news-img"><div class="card-body">
                <small class="text-accent font-bold uppercase tracking-widest">${db.cats.find(c=>c.id===h.cid)?.name || 'Haber'}</small>
                <h2>${h.title}</h2><p class="text-muted">${h.text.substring(0, 120)}...</p></div>`;
            feed.appendChild(card);
        });
    }

    function openNews(hid) {
        const h = db.haberler.find(x => x.id === hid);
        const y = db.yazarlar.find(x => x.id === h.yid);
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('overlay-content').innerHTML = `
            <h1 class="text-5xl font-serif mb-8 leading-tight">${h.title}</h1>
            <div class="flex items-center gap-4 mb-10 border-b pb-10">
                <img src="${y.img}" class="w-14 h-14 rounded-full object-cover">
                <div><div class="font-bold text-lg">${y.isim}</div><div class="text-sm text-slate-400">${y.bio}</div></div>
            </div>
            <img src="${h.img}" class="w-full rounded-3xl mb-12 shadow-2xl">
            <div class="text-xl leading-relaxed text-slate-800">${h.text}</div>`;
    }

    function openAuthor(yid) {
        const y = db.yazarlar.find(x => x.id === yid);
        const yH = db.haberler.filter(h => h.yid === yid);
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('overlay-content').innerHTML = `
            <div class="text-center mb-16"><img src="${y.img}" class="w-32 h-32 rounded-full mx-auto mb-4 object-cover border-4 border-accent">
            <h1 class="text-4xl font-serif">${y.isim}</h1><p class="text-muted">${y.bio}</p></div>
            <div class="space-y-4">${yH.map(h => `<div onclick="openNews('${h.id}')" class="p-6 bg-white border rounded-2xl cursor-pointer hover:shadow-lg transition font-bold text-lg">${h.title}</div>`).join('')}</div>`;
    }

    function closeAll() { document.getElementById('overlay').style.display = 'none'; }
    
    window.onscroll = () => {
        let scroll = document.documentElement.scrollTop;
        let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        document.getElementById("progress-bar").style.width = (scroll / height) * 100 + "%";
    };

    window.onload = renderPortal;
</script>
</body>
</html>
