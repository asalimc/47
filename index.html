<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARDINRIO | Global Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;1,400&family=Montserrat:wght@300;700;900&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --mardin: #d4a373; --rio: #0077b6; --dark: #0f0f0f; 
            --white: #ffffff; --accent: #ff003c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #fdfdfb; font-family: 'Montserrat', sans-serif; 
            color: var(--dark); overflow-x: hidden;
        }

        /* --- RESPONSIVE TICKER --- */
        .ticker-container {
            background: var(--dark); color: white; padding: 12px 0;
            font-size: 11px; font-weight: 900; letter-spacing: 2px;
            position: sticky; top: 0; z-index: 5000;
            overflow: hidden; white-space: nowrap;
        }
        .ticker-wrapper {
            display: inline-block; animation: slide 25s linear infinite;
        }
        .ticker-wrapper:hover { animation-play-state: paused; }
        @keyframes slide {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* --- HEADER & NAVIGATION --- */
        header { 
            padding: 60px 5%; text-align: center; background: white;
            border-bottom: 5px solid var(--mardin);
        }
        .brand { font-family: 'Playfair Display'; font-size: clamp(3rem, 10vw, 8rem); letter-spacing: -5px; }
        
        nav {
            background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);
            padding: 20px; position: sticky; top: 40px; z-index: 4000;
            border-bottom: 1px solid #eee;
        }
        nav ul { display: flex; justify-content: center; gap: 30px; list-style: none; flex-wrap: wrap; }
        nav a { text-decoration: none; color: var(--dark); font-weight: 900; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }

        /* --- RESPONSIVE GRID --- */
        .main-container {
            max-width: 1400px; margin: 40px auto; padding: 0 20px;
            display: grid; grid-template-columns: repeat(12, 1fr); gap: 30px;
        }

        .hero-section {
            grid-column: span 12; position: relative; height: 70vh;
            border-radius: 30px; overflow: hidden;
        }
        @media (min-width: 1024px) { .hero-section { grid-column: span 8; } }

        .hero-section img { width: 100%; height: 100%; object-fit: cover; }
        .hero-overlay {
            position: absolute; inset: 0; background: linear-gradient(transparent, rgba(0,0,0,0.8));
            padding: 40px; display: flex; flex-direction: column; justify-content: flex-end; color: white;
        }

        .side-news { grid-column: span 12; display: flex; flex-direction: column; gap: 20px; }
        @media (min-width: 1024px) { .side-news { grid-column: span 4; } }

        .news-card {
            background: white; padding: 25px; border-radius: 20px;
            border: 1px solid #eee; transition: 0.3s;
        }
        .news-card:hover { transform: translateY(-5px); border-color: var(--rio); }

        /* --- VIDEO & DATA --- */
        .video-box {
            grid-column: span 12; height: 500px; border-radius: 30px;
            overflow: hidden; background: #000; position: relative;
        }
        .video-box iframe { width: 100%; height: 100%; border: none; opacity: 0.7; }

        footer { 
            margin-top: 60px; padding: 60px 5%; background: var(--dark); color: white;
            text-align: center;
        }

        /* --- MOBIL DUZELTMELER --- */
        @media (max-width: 600px) {
            header { padding: 40px 20px; }
            .hero-section { height: 50vh; }
            nav ul { gap: 15px; }
        }
    </style>
</head>
<body>

    <div class="ticker-container">
        <div class="ticker-wrapper" id="ticker-text">
            </div>
    </div>

    <header>
        <p id="lang-sub" style="font-size: 10px; font-weight: 900; letter-spacing: 5px; opacity: 0.5; margin-bottom: 10px;">GLOBAL CULTURE & DATA</p>
        <div class="brand">MARDIN<span style="color:var(--rio)">RIO</span></div>
    </header>

    <nav>
        <ul id="nav-links">
            </ul>
    </nav>

    <div class="main-container">
        <div class="hero-section">
            <img src="https://images.unsplash.com/photo-1548013146-72479768bbaa?auto=format&fit=crop&w=1200" alt="Mardin Rio">
            <div class="hero-overlay">
                <h2 id="hero-title" style="font-family: 'Playfair Display'; font-size: clamp(2rem, 5vw, 4rem);">...</h2>
                <p id="hero-desc" style="font-family: 'Lora'; opacity: 0.8;"></p>
            </div>
        </div>

        <div class="side-news" id="news-container">
            </div>

        <div class="video-box">
            <iframe src="https://www.youtube.com/embed/S_8qMvT2MvA?autoplay=1&mute=1&loop=1&playlist=S_8qMvT2MvA&controls=0"></iframe>
            <div style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none;">
                <h3 id="video-title" style="color: white; font-family: 'Playfair Display'; font-size: 2.5rem;">...</h3>
            </div>
        </div>
    </div>

    <footer>
        <h2 style="font-family: 'Playfair Display'; font-size: 3rem;">M|R</h2>
        <p id="footer-note" style="font-size: 10px; letter-spacing: 3px; margin-top: 20px; opacity: 0.5;"></p>
    </footer>

    <script>
        // --- DİL VERİTABANI ---
        const translations = {
            tr: {
                ticker: "● CANLI: RIO KARNAVALI HAZIRLIKLARI TAM GAZ ● MARDİN TAŞ İŞÇİLİĞİ DÜNYA MİRASI LİSTESİNDE ● 2026 VİZYONU AKTİF ●",
                nav: ["HABERLER", "VERİ", "MAGAZİN", "KÜLTÜR"],
                heroTitle: "İki Kıta, Tek Ruh",
                heroDesc: "Mardin'in sessizliği ile Rio'nun enerjisi dijital bir köprüde buluşuyor.",
                videoTitle: "Sentezin Ritmi",
                footer: "© 2026 MARDINRIO DİJİTAL DENEYİM PORTALI",
                sideNews: [
                    { t: "Gastro Diplomasi", d: "Mezopotamya lezzetleri Rio sahillerinde." },
                    { t: "Dijital Miras", d: "3000 yıllık tarih bulut sisteminde." }
                ]
            },
            en: {
                ticker: "● LIVE: RIO CARNIVAL PREPARATIONS ● MARDIN STONE MASONRY ON WORLD HERITAGE LIST ● 2026 VISION ACTIVE ●",
                nav: ["NEWS", "DATA", "MAGAZINE", "CULTURE"],
                heroTitle: "Two Continents, One Soul",
                heroDesc: "The silence of Mardin and the energy of Rio meet on a digital bridge.",
                videoTitle: "Rhythm of Synthesis",
                footer: "© 2026 MARDINRIO DIGITAL EXPERIENCE PORTAL",
                sideNews: [
                    { t: "Gastro Diplomacy", d: "Mesopotamian flavors on Rio shores." },
                    { t: "Digital Heritage", d: "3000 years of history in the cloud." }
                ]
            },
            pt: {
                ticker: "● AO VIVO: PREPARAÇÕES PARA O CARNAVAL DO RIO ● CANTARIA DE MARDIN NA LISTA DO PATRIMÔNIO MUNDIAL ● VISÃO 2026 ATIVA ●",
                nav: ["NOTÍCIAS", "DADOS", "REVISTA", "CULTURA"],
                heroTitle: "Dois Continentes, Uma Alma",
                heroDesc: "O silêncio de Mardin e a energia do Rio encontram-se numa ponte digital.",
                videoTitle: "Ritmo da Síntese",
                footer: "© 2026 PORTAL DE EXPERIÊNCIA DIGITAL MARDINRIO",
                sideNews: [
                    { t: "Gastro Diplomacia", d: "Sabores mesopotâmicos nas costas do Rio." },
                    { t: "Herança Digital", d: "3000 anos de história na nuvem." }
                ]
            }
        };

        // --- DİL ALGILAMA VE UYGULAMA ---
        function applyLanguage() {
            const userLang = navigator.language.split('-')[0]; // Örn: 'tr' veya 'en'
            const lang = translations[userLang] ? userLang : 'en'; // Desteklenmiyorsa İngilizce yap
            const data = translations[lang];

            document.getElementById('ticker-text').innerText = (data.ticker + " ").repeat(5);
            document.getElementById('hero-title').innerText = data.heroTitle;
            document.getElementById('hero-desc').innerText = data.heroDesc;
            document.getElementById('video-title').innerText = data.videoTitle;
            document.getElementById('footer-note').innerText = data.footer;

            // Navigasyon
            const navUl = document.getElementById('nav-links');
            navUl.innerHTML = data.nav.map(item => `<li><a href="#">${item}</a></li>`).join('');

            // Yan Haberler
            const newsCont = document.getElementById('news-container');
            newsCont.innerHTML = data.sideNews.map(news => `
                <div class="news-card">
                    <h4 style="font-family: 'Playfair Display'; margin-bottom: 10px;">${news.t}</h4>
                    <p style="font-size: 13px; color: #666;">${news.d}</p>
                </div>
            `).join('');
        }

        window.onload = applyLanguage;
    </script>
</body>
</html>
