<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mardin Akıllı Rehber | Navigasyon Asistanı</title>
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f8fafc; --panel: #ffffff; --line: #e2e8f0;
      --text: #0f172a; --primary: #1e3a8a; --accent: #eab308;
      --white: #ffffff; --shadow: 0 10px 40px rgba(0,0,0,0.1);
      --radius: 24px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

    /* --- Hero Alanı --- */
    .hero {
      position: relative; height: 75vh; display: flex; align-items: center; justify-content: center;
      background: #000; color: white; text-align: center;
    }
    .hero-bg {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(30,58,138,0.6)), 
                  url('https://asalimc.github.io/1.webp') center/cover no-repeat;
      opacity: 0.9; z-index: 1;
    }
    .hero-content { position: relative; z-index: 2; padding: 20px; }
    .hero-content h1 { font-family: 'Playfair Display', serif; font-size: clamp(3rem, 10vw, 5.5rem); line-height: 1; margin-bottom: 10px; }

    /* --- Akıllı Harita Bölümü --- */
    .map-section { position: relative; padding: 40px 0; }
    .map-container { 
      display: grid; grid-template-columns: 1fr 380px; gap: 20px; height: 650px; 
      background: var(--panel); padding: 15px; border-radius: var(--radius); box-shadow: var(--shadow);
    }
    #map { height: 100%; border-radius: 18px; z-index: 10; }

    /* --- Sidebar & Mobil Bilgi --- */
    .sidebar { display: flex; flex-direction: column; gap: 12px; overflow-y: auto; padding-right: 5px; }
    .loc-card {
      background: #f1f5f9; padding: 20px; border-radius: 20px; border: 1px solid var(--line);
      cursor: pointer; transition: 0.3s;
    }
    .loc-card:hover { transform: scale(0.98); background: white; border-color: var(--accent); }
    .loc-card h4 { color: var(--primary); font-size: 1.1rem; margin-bottom: 5px; }
    .distance-tag { font-size: 0.75rem; font-weight: 800; color: #16a34a; background: #dcfce7; padding: 2px 8px; border-radius: 5px; }

    /* --- Mobil Navigasyon Kontrolleri --- */
    .nav-controls {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px; z-index: 1000; width: 90%; max-width: 400px;
    }
    .btn-nav {
      flex: 1; padding: 16px; border-radius: 16px; border: none; font-weight: 800;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-gps { background: var(--white); color: var(--primary); }
    .btn-go { background: var(--accent); color: var(--primary); display: none; } /* Bir yer seçilince çıkar */

    /* --- Gurme Galeri --- */
    .food-container { display: flex; gap: 20px; overflow-x: auto; padding: 20px; scroll-snap-type: x mandatory; }
    .food-item { 
      min-width: 280px; background: white; border-radius: 20px; overflow: hidden; 
      box-shadow: var(--shadow); scroll-snap-align: start;
    }
    .food-img { height: 180px; width: 100%; object-fit: cover; }

    @media (max-width: 992px) {
      .map-container { grid-template-columns: 1fr; height: 500px; }
      .sidebar { display: none; } /* Mobilde yan menü yerine harita üstü etkileşim */
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <p style="letter-spacing: 4px; font-weight: 600;">AKILLI ASİSTAN</p>
      <h1>MARDİN</h1>
      <p style="opacity: 0.8;">Canlı konum takibi ve sesli navigasyon desteği</p>
    </div>
  </section>

  <div class="container" style="padding: 60px 20px;">
    <h2 style="font-family: 'Playfair Display', serif; color: var(--primary); margin-bottom: 30px;">Tadına Bakmalısın</h2>
    <div class="food-container">
      <div class="food-item">
        <img src="https://images.unsplash.com/photo-1626700051175-656fc77eea3a?auto=format&fit=crop&w=400" class="food-img">
        <div style="padding: 15px;"><h4>İçli Köfte (Irok)</h4><button onclick="focusOn(37.3142, 40.7360)" style="border:none; color:var(--accent); font-weight:700; background:none;">Mir Han'da Tat ➜</button></div>
      </div>
      <div class="food-item">
        <img src="https://images.unsplash.com/photo-1603048588665-791ca8aea617?auto=format&fit=crop&w=400" class="food-img">
        <div style="padding: 15px;"><h4>Sembusek</h4><button onclick="focusOn(37.3142, 40.7360)" style="border:none; color:var(--accent); font-weight:700; background:none;">Mir Han'da Tat ➜</button></div>
      </div>
      <div class="food-item">
        <img src="https://images.unsplash.com/photo-1541167760496-162955ed8a9f?auto=format&fit=crop&w=400" class="food-img">
        <div style="padding: 15px;"><h4>Dibek Kahvesi</h4><button onclick="focusOn(37.3129, 40.7355)" style="border:none; color:var(--accent); font-weight:700; background:none;">Yaşarbey'de Tat ➜</button></div>
      </div>
    </div>

    <h2 style="font-family: 'Playfair Display', serif; color: var(--primary); margin-top: 50px;">Akıllı Harita</h2>
    <div class="map-container">
      <div id="map"></div>
      <div class="sidebar" id="sidebar"></div>
    </div>
  </div>

  <div class="nav-controls">
    <button class="btn-nav btn-gps" onclick="findMe()">📍 Konumumu Aç</button>
    <button id="goBtn" class="btn-nav btn-go" onclick="openNav()">🚗 Yol Tarifi Al</button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const MARDIN_COORD = [37.3125, 40.7350];
    let userLoc = null;
    let selectedLoc = null;

    const locations = [
      { name: "Mir Han Restorant", lat: 37.3142, lon: 40.7360, icon: "🍴", info: "Yöresel Yemekler" },
      { name: "Yaşarbey Kahve", lat: 37.3129, lon: 40.7355, icon: "☕", info: "Meşhur Kahveci" },
      { name: "Zinciriye Medresesi", lat: 37.3150, lon: 40.7380, icon: "🏛️", info: "Tarihi Yapı" },
      { name: "Kasımiye Medresesi", lat: 37.3065, lon: 40.7180, icon: "🏛️", info: "Eşsiz Mimari" },
      { name: "Ulu Cami", lat: 37.3125, lon: 40.7405, icon: "🕌", info: "Sembol Cami" }
    ];

    // Harita Teması (Gece Modu Kontrolü)
    const hours = new Date().getHours();
    const mapStyle = (hours >= 19 || hours <= 6) 
      ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png' 
      : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';

    const map = L.map('map', { attributionControl: false }).setView(MARDIN_COORD, 15);
    L.tileLayer(mapStyle).addTo(map);

    const sidebar = document.getElementById('sidebar');

    function calculateDistance(lat1, lon1, lat2, lon2) {
      const R = 6371; // km
      const dLat = (lat2-lat1) * Math.PI / 180;
      const dLon = (lon2-lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return (R * c).toFixed(2);
    }

    function renderList() {
      sidebar.innerHTML = '';
      locations.forEach(loc => {
        const dist = userLoc ? `${calculateDistance(userLoc.lat, userLoc.lng, loc.lat, loc.lon)} km` : "Konum Bekleniyor";
        
        // Marker Ekleme
        const customIcon = L.divIcon({
          className: 'custom-div-icon',
          html: `<div style="background:white; border:2px solid #1e3a8a; border-radius:50%; width:35px; height:35px; display:grid; place-items:center; font-size:18px; box-shadow:0 5px 15px rgba(0,0,0,0.2)">${loc.icon}</div>`,
          iconSize: [35, 35],
          iconAnchor: [17, 35]
        });

        const marker = L.marker([loc.lat, loc.lon], {icon: customIcon}).addTo(map)
          .bindPopup(`<b>${loc.name}</b><br>${loc.info}`);

        const card = document.createElement('div');
        card.className = 'loc-card';
        card.innerHTML = `
          <div style="display:flex; justify-content:space-between; align-items:start;">
            <h4>${loc.icon} ${loc.name}</h4>
            <span class="distance-tag">${dist}</span>
          </div>
          <small>${loc.info}</small>
        `;
        card.onclick = () => {
          map.flyTo([loc.lat, loc.lon], 18);
          marker.openPopup();
          selectedLoc = loc;
          document.getElementById('goBtn').style.display = 'flex';
          document.getElementById('goBtn').innerHTML = `🚗 ${loc.name} Yol Tarifi`;
        };
        sidebar.appendChild(card);
      });
    }

    function findMe() {
      map.locate({setView: true, maxZoom: 16});
    }

    map.on('locationfound', (e) => {
      userLoc = e.latlng;
      L.circle(e.latlng, e.accuracy).addTo(map);
      L.marker(e.latlng).addTo(map).bindPopup("Buradasınız").openPopup();
      renderList();
    });

    function openNav() {
      if(selectedLoc) {
        window.open(`https://www.google.com/maps/dir/?api=1&destination=${selectedLoc.lat},${selectedLoc.lon}&travelmode=walking`);
      }
    }

    function focusOn(lat, lon) {
      map.flyTo([lat, lon], 18);
      const loc = locations.find(l => l.lat === lat);
      if(loc) {
        selectedLoc = loc;
        document.getElementById('goBtn').style.display = 'flex';
        document.getElementById('goBtn').innerHTML = `🚗 ${loc.name} Yol Tarifi`;
      }
    }

    renderList();
  </script>
</body>
</html>
