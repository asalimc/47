<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Global Culture & News</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #fdfbf7; --text: #1a1a1a; --muted: #718096; --accent: #c49b66; --white: #ffffff; --sepia: #f4ecd8; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; scroll-behavior: smooth; }
        
        /* Kağıt Dokusu */
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.04; pointer-events: none; z-index: 9999; background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png'); }

        #progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent); width: 0%; z-index: 10001; }
        nav { background: rgba(253, 251, 247, 0.9); backdrop-filter: blur(15px); padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.03); }
        .logo { font-family: 'Marcellus', serif; font-size: 2rem; letter-spacing: 3px; cursor: pointer; text-transform: uppercase; }

        .authors-strip { background: var(--white); padding: 30px 0; display: flex; justify-content: center; gap: 40px; border-bottom: 1px solid #f1f1f1; overflow-x: auto; scrollbar-width: none; }
        .author-item { cursor: pointer; text-align: center; width: 90px; flex-shrink: 0; }
        .author-item img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 1px solid var(--accent); padding: 4px; margin: 0 auto; }
        .author-item span { display: block; font-size: 0.75rem; font-weight: 700; margin-top: 10px; font-family: 'Marcellus'; text-transform: uppercase; }

        .container-main { max-width: 1400px; margin: 40px auto; display: grid; grid-template-columns: 280px 1fr 300px; gap: 40px; padding: 0 25px; }
        #news-feed { display: flex; flex-direction: column; gap: 40px; }
        
        .news-card { background: var(--white); border-radius: 24px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.02); cursor: pointer; transition: 0.4s; border: 1px solid rgba(0,0,0,0.02); opacity: 0; transform: translateY(20px); animation: fadeInUp 0.6s forwards; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        .news-img { width: 100%; height: 500px; object-fit: cover; }
        .card-body { padding: 35px; }
        .card-body h2 { font-family: 'Marcellus', serif; font-size: 2.2rem; margin: 0 0 15px 0; line-height: 1.2; }

        /* Metin Kontrolleri */
        .text-controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .control-btn { cursor: pointer; font-weight: bold; border: 1px solid #ddd; padding: 6px 14px; border-radius: 8px; font-size: 0.7rem; transition: 0.3s; background: white; text-transform: uppercase; }
        .control-btn:hover { background: var(--accent); color: white; }
        .sepia-mode { background: var(--sepia) !important; color: #433422 !important; }

        /* Admin & Overlay */
        #admin-panel { display: none; background: #0f172a; color: white; position: fixed; inset: 0; z-index: 11000; overflow-y: auto; padding: 40px; }
        .input-dark { width: 100%; padding: 12px; margin-bottom: 15px; background: #1e293b; border-radius: 12px; border: 1px solid #334155; color: white; outline: none; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: none; overflow-y: auto; padding-bottom: 100px; }
        .close-overlay { position: fixed; top: 30px; right: 40px; cursor: pointer; background: var(--text); color: #fff; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10000; }

        /* Bookmark Style */
        .bookmarked { color: var(--accent) !important; }

        @media (max-width: 1024px) {
            .container-main { grid-template-columns: 1fr; }
            .sidebar-left, .sidebar-right { display: none; }
        }
    </style>
</head>
<body>

<div id="progress-bar"></div>
<nav>
    <div class="logo" onclick="location.reload()">LUMINA</div>
    <div id="weather" style="font-size: 0.8rem; letter-spacing: 2px; font-weight: 700; color: var(--accent);">MARDİN 18°C • SUNNY</div>
</nav>
<div id="authors-list" class="authors-strip"></div>

<div class="container-main">
    <aside class="sidebar-left">
        <div class="bg-white p-6 rounded-2xl mb-8 border border-gray-100">
            <div class="font-serif text-xs mb-4 opacity-40 uppercase tracking-widest">Günün Alıntısı</div>
            <p id="quote-text" class="italic text-sm leading-relaxed text-gray-600">"Kültür, bir toplumun hafızasıdır."</p>
        </div>
        <div class="font-serif mb-4 border-b pb-2">KATEGORİLER</div>
        <div id="categories-list" style="font-size: 0.9rem; line-height: 2.8; cursor: pointer;"></div>
    </aside>

    <main id="news-feed"></main>

    <aside class="sidebar-right">
        <div class="font-serif mb-4 border-b pb-2">ÖNE ÇIKAN</div>
        <div id="ad-sidebar" style="background:#f0f0f0; min-height:450px; border-radius:24px; overflow:hidden;"></div>
    </aside>
</div>

<footer style="padding: 60px; text-align: center; opacity: 0.3;"><button onclick="toggleAdmin()" style="font-size: 10px; letter-spacing: 2px;">PANELİ AÇ</button></footer>

<div id="overlay" class="overlay"><div class="close-overlay" onclick="closeAll()">✕</div><div id="overlay-content" class="max-w-4xl mx-auto mt-20 p-5"></div></div>

<div id="admin-panel">
    <div class="flex justify-between items-center mb-10 border-b border-slate-800 pb-5">
        <h2 class="text-2xl font-black text-accent tracking-tighter">LUMINA ENGINE v3.8</h2>
        <button onclick="toggleAdmin()" class="bg-red-500/20 text-red-500 px-6 py-2 rounded-full font-bold text-xs uppercase">Paneli Kapat</button>
    </div>
    <div class="admin-nav flex gap-4 mb-10 overflow-x-auto">
        <button onclick="setTab('haber')" id="btn-haber" class="bg-slate-800 px-4 py-2 rounded">HABERLER</button>
        <button onclick="setTab('yazar')" id="btn-yazar" class="bg-slate-800 px-4 py-2 rounded">YAZARLAR</button>
        <button onclick="setTab('cat')" id="btn-cat" class="bg-slate-800 px-4 py-2 rounded">KATEGORİLER</button>
        <button onclick="setTab('reklam')" id="btn-reklam" class="bg-slate-800 px-4 py-2 rounded">REKLAM</button>
    </div>
    <div id="admin-content" class="grid grid-cols-1 lg:grid-cols-3 gap-10"></div>
</div>

<script>
    // Genişletilmiş Örnek Veriler
    const defaultDB = {
        cats: [{id: 'c1', name: 'Mardin Arşivi'}, {id: 'c2', name: 'Dünya Kültürü'}, {id: 'c3', name: 'Siyaset'}, {id: 'c4', name: 'Gastronomi'}],
        yazarlar: [
            {id: 'y1', isim: 'Ahmet ÇINARBAŞ', bio: 'Siyasi Analiz', img: 'https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=400'},
            {id: 'y2', isim: 'Adriana Silva', bio: 'Brezilya Kültür Editörü', img: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=400'},
            {id: 'y3', isim: 'Vedat Mardinli', bio: 'Gastronomi Yazarı', img: 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=400'}
        ],
        haberler: [
            {id: 'h1', title: "Eski Mardin'in Gümüş İşçiliği", text: "Mezopotamya'nın kalbinde telkari sanatı yüzyıllardır yaşamaya devam ediyor. Ustalar gümüşü bir dantel gibi işleyerek tarihe not düşüyorlar.", img: 'https://images.unsplash.com/photo-1582738411706-bfc8e691d1c2?w=1200', cid: 'c1', yid: 'y3'},
            {id: 'h2', title: "Sao Paulo'nun Modern Sanatı", text: "Brezilya sokak sanatı ve modern müzeleriyle dünya kültür başkentlerinden biri olma yolunda hızla ilerliyor. Oscar Niemeyer'in izleri her yerde.", img: 'https://images.unsplash.com/photo-1564399539135-7f763ece6c0a?w=1200', cid: 'c2', yid: 'y2'},
            {id: 'h3', title: "Küresel Ekonomide Yeni Dengeler", text: "Siyasi krizlerin gölgesinde kalan ticaret yolları ve enerji koridorları üzerine kapsamlı bir analiz. Gelecek 10 yılı neler bekliyor?", img: 'https://images.unsplash.com/photo-1529107386315-e1a2ed48a620?w=1200', cid: 'c3', yid: 'y1'}
        ],
        reklamlar: [{img: 'https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=500'}]
    };

    let db = JSON.parse(localStorage.getItem('lumina_db_final_v3.8')) || defaultDB;
    let activeTab = 'haber', tempImg = "", editingId = null, currentFontSize = 1.25, isSepia = false;

    const quotes = [
        "Sadelik, en yüksek gelişmişlik düzeyidir.",
        "Kültür, hayata anlam katan her şeydir.",
        "Mardin'in taşları, tarihin sessiz tanıklarıdır.",
        "Sanat, ruhun ekmeğidir."
    ];

    function handleImg(e) { const reader = new FileReader(); reader.onload = () => { tempImg = reader.result; }; reader.readAsDataURL(e.target.files[0]); }
    function toggleAdmin() { const p = document.getElementById('admin-panel'); p.style.display = (p.style.display === 'block') ? 'none' : 'block'; if(p.style.display === 'block') { editingId = null; renderAdmin(); } }
    function setTab(tab) { activeTab = tab; editingId = null; tempImg = ""; renderAdmin(); }

    function renderAdmin() {
        const content = document.getElementById('admin-content');
        let form = "", list = "";
        
        if(activeTab === 'haber') {
            const editH = editingId ? db.haberler.find(h => h.id === editingId) : null;
            form = `<div class="bg-slate-900 p-6 rounded-3xl"><h3 class="text-accent mb-4 font-bold uppercase text-xs">${editH ? 'Haberi Düzenle' : 'Yeni Haber'}</h3>
                <input type="text" id="h-t" value="${editH?.title || ''}" placeholder="Başlık" class="input-dark">
                <textarea id="h-x" placeholder="İçerik" class="input-dark h-32">${editH?.text || ''}</textarea>
                <select id="h-c" class="input-dark">${db.cats.map(c=>`<option value="${c.id}" ${editH?.cid===c.id?'selected':''}>${c.name}</option>`).join('')}</select>
                <select id="h-y" class="input-dark">${db.yazarlar.map(y=>`<option value="${y.id}" ${editH?.yid===y.id?'selected':''}>${y.isim}</option>`).join('')}</select>
                <input type="file" onchange="handleImg(event)" class="text-xs mb-4">
                <button onclick="saveHaber()" class="w-full bg-accent py-3 rounded-xl font-bold uppercase">${editH ? 'Güncelle' : 'Yayınla'}</button></div>`;
            list = db.haberler.map(h => `<div class="flex justify-between items-center p-3 border-b border-slate-800 text-xs"><span onclick="loadToEditH('${h.id}')" class="cursor-pointer hover:text-accent font-bold">${h.title}</span><button onclick="del('haberler','${h.id}')" class="text-red-400 font-bold">SİL</button></div>`).join('');
        }
        else if(activeTab === 'yazar') {
            const editY = editingId ? db.yazarlar.find(y => y.id === editingId) : null;
            form = `<div class="bg-slate-900 p-6 rounded-3xl"><h3 class="text-accent mb-4 font-bold uppercase text-xs">${editY ? 'Yazarı Düzenle' : 'Yeni Yazar'}</h3>
                <input type="text" id="y-i" value="${editY?.isim || ''}" placeholder="İsim" class="input-dark"><input type="text" id="y-b" value="${editY?.bio || ''}" placeholder="Bio" class="input-dark"><input type="file" onchange="handleImg(event)" class="text-xs mb-4"><button onclick="saveYazar()" class="w-full bg-accent py-3 rounded-xl font-bold uppercase">Kaydet</button></div>`;
            list = db.yazarlar.map(y => `<div class="flex items-center justify-between p-3 border-b border-slate-800 text-xs"><span onclick="loadToEditY('${y.id}')" class="cursor-pointer hover:text-accent font-bold">${y.isim}</span><button onclick="del('yazarlar','${y.id}')" class="text-red-400 font-bold">SİL</button></div>`).join('');
        }
        // Diğer Tablar (Cat, Reklam) görselde olduğu gibi korunur...
        else if(activeTab === 'cat') {
            form = `<div class="bg-slate-900 p-6 rounded-3xl"><input type="text" id="c-n" placeholder="Kategori" class="input-dark"><button onclick="saveCat()" class="w-full bg-accent py-3 rounded-xl font-bold uppercase">Ekle</button></div>`;
            list = db.cats.map(c => `<div class="flex justify-between p-3 border-b border-slate-800 text-xs"><span>${c.name}</span><button onclick="del('cats','${c.id}')" class="text-red-400 font-bold">SİL</button></div>`).join('');
        }
        else if(activeTab === 'reklam') {
            form = `<div class="bg-slate-900 p-6 rounded-3xl"><input type="file" onchange="handleImg(event)" class="mb-4"><button onclick="saveReklam()" class="w-full bg-accent py-3 rounded-xl font-bold uppercase">Güncelle</button></div>`;
            list = db.reklamlar[0] ? `<img src="${db.reklamlar[0].img}" class="w-full rounded-2xl">` : '';
        }

        content.innerHTML = form + `<div class="lg:col-span-2 bg-slate-900 p-6 rounded-3xl overflow-y-auto max-h-[600px]"><h4 class="text-xs text-slate-500 mb-4 font-bold uppercase">Kayıtlı Veriler (Düzenlemek İçin Tıkla)</h4>${list}</div>`;
    }

    function loadToEditH(id) { editingId = id; renderAdmin(); }
    function loadToEditY(id) { editingId = id; renderAdmin(); }

    function saveHaber() {
        const t = document.getElementById('h-t').value;
        const x = document.getElementById('h-x').value;
        if(editingId) {
            let h = db.haberler.find(i => i.id === editingId);
            h.title = t; h.text = x; h.cid = document.getElementById('h-c').value; h.yid = document.getElementById('h-y').value;
            if(tempImg) h.img = tempImg;
        } else {
            db.haberler.unshift({id: 'h'+Date.now(), title: t, text: x, cid: document.getElementById('h-c').value, yid: document.getElementById('h-y').value, img: tempImg || 'https://via.placeholder.com/1200'});
        }
        fin();
    }

    function saveYazar() {
        const i = document.getElementById('y-i').value;
        const b = document.getElementById('y-b').value;
        if(editingId) {
            let y = db.yazarlar.find(x => x.id === editingId);
            y.isim = i; y.bio = b; if(tempImg) y.img = tempImg;
        } else {
            db.yazarlar.push({id: 'y'+Date.now(), isim: i, bio: b, img: tempImg || 'https://via.placeholder.com/400'});
        }
        fin();
    }

    function saveCat() { db.cats.push({id: 'c'+Date.now(), name: document.getElementById('c-n').value}); fin(); }
    function saveReklam() { if(tempImg) { db.reklamlar = [{img: tempImg}]; fin(); } }
    function del(k, i) { if(confirm('Silinsin mi?')) { db[k] = db[k].filter(x => x.id !== i); fin(); } }
    function fin() { localStorage.setItem('lumina_db_final_v3.8', JSON.stringify(db)); tempImg = ""; editingId = null; renderAdmin(); renderPortal(); }

    function renderPortal() {
        document.getElementById('categories-list').innerHTML = `<div onclick="filterPortal('all')" class="font-bold mb-4 opacity-50 cursor-pointer">TÜMÜ</div>` + db.cats.map(c => `<div onclick="filterPortal('${c.id}')">• ${c.name}</div>`).join('');
        document.getElementById('authors-list').innerHTML = db.yazarlar.map(y => `<div class="author-item" onclick="openAuthor('${y.id}')"><img src="${y.img}"><span>${y.isim}</span></div>`).join('');
        document.getElementById('quote-text').innerText = quotes[Math.floor(Math.random() * quotes.length)];
        if(db.reklamlar[0]) document.getElementById('ad-sidebar').innerHTML = `<img src="${db.reklamlar[0].img}" class="w-full h-full object-cover">`;
        filterPortal('all');
    }

    function filterPortal(cid) {
        const feed = document.getElementById('news-feed'); feed.innerHTML = "";
        let items = cid === 'all' ? db.haberler : db.haberler.filter(h => h.cid === cid);
        items.forEach((h, i) => {
            const card = document.createElement('article'); card.className = "news-card"; card.style.animationDelay = `${i * 0.1}s`;
            card.onclick = () => openNews(h.id);
            card.innerHTML = `<img src="${h.img}" class="news-img"><div class="card-body">
                <div class="flex justify-between items-center mb-2"><small class="text-accent font-bold uppercase tracking-widest">${db.cats.find(c=>c.id===h.cid)?.name}</small><small class="opacity-40 text-[10px] font-bold">${Math.ceil(h.text.length/600)} DK OKUMA</small></div>
                <h2>${h.title}</h2><p class="text-muted leading-relaxed">${h.text.substring(0, 140)}...</p></div>`;
            feed.appendChild(card);
        });
    }

    function openNews(hid) {
        const h = db.haberler.find(x => x.id === hid); const y = db.yazarlar.find(x => x.id === h.yid);
        const related = db.haberler.filter(rh => rh.cid === h.cid && rh.id !== h.id).slice(0, 2);
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('overlay-content').innerHTML = `
            <div class="text-controls mb-10">
                <button class="control-btn" onclick="changeFontSize(0.1)">A+</button>
                <button class="control-btn" onclick="changeFontSize(-0.1)">A-</button>
                <button class="control-btn" onclick="toggleSepia()">SEPIA MOD</button>
                <button class="control-btn" onclick="speakText()">YAZIYI DİNLE</button>
                <button class="control-btn" id="save-btn" onclick="bookmarkH('${h.id}')">KAYDET</button>
            </div>
            <h1 class="text-5xl font-serif mb-8 leading-tight">${h.title}</h1>
            <div class="flex items-center gap-4 mb-10 border-b pb-10">
                <img src="${y.img}" class="w-14 h-14 rounded-full object-cover">
                <div><div class="font-bold text-lg">${y.isim}</div><div class="text-sm text-slate-400 font-bold uppercase">${y.bio}</div></div>
            </div>
            <img src="${h.img}" class="w-full rounded-3xl mb-12 shadow-2xl">
            <div id="article-text" style="font-size:${currentFontSize}rem" class="leading-relaxed mb-20 text-slate-800">${h.text}</div>
            
            <div class="mt-10 border-t pt-10">
                <h3 class="font-serif text-2xl mb-6">Benzer Analizler</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    ${related.map(r => `<div onclick="openNews('${r.id}')" class="cursor-pointer border-b pb-4 hover:text-accent font-bold text-lg">${r.title}</div>`).join('') || '<small class="opacity-30">Benzer içerik bulunamadı.</small>'}
                </div>
            </div>`;
    }

    function toggleSepia() { isSepia = !isSepia; document.getElementById('overlay').classList.toggle('sepia-mode', isSepia); }
    function changeFontSize(delta) { currentFontSize += delta; const t = document.getElementById('article-text'); if(t) t.style.fontSize = currentFontSize + 'rem'; }
    function speakText() { const t = document.getElementById('article-text').innerText; const m = new SpeechSynthesisUtterance(t); m.lang = 'tr-TR'; window.speechSynthesis.speak(m); }
    function bookmarkH(id) { document.getElementById('save-btn').classList.toggle('bookmarked'); alert("Haber Kaydedildi."); }

    function openAuthor(yid) {
        const y = db.yazarlar.find(x => x.id === yid); const yH = db.haberler.filter(h => h.yid === yid);
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('overlay-content').innerHTML = `
            <div class="text-center mb-16"><img src="${y.img}" class="w-32 h-32 rounded-full mx-auto mb-4 object-cover border-4 border-accent">
            <h1 class="text-4xl font-serif">${y.isim}</h1><p class="text-muted font-bold">${y.bio}</p></div>
            <div class="space-y-4">${yH.map(h => `<div onclick="openNews('${h.id}')" class="p-6 bg-white border rounded-2xl cursor-pointer hover:shadow-lg font-bold text-xl">${h.title}</div>`).join('')}</div>`;
    }

    function closeAll() { window.speechSynthesis.cancel(); document.getElementById('overlay').style.display = 'none'; isSepia = false; document.getElementById('overlay').classList.remove('sepia-mode'); }
    window.onscroll = () => { let s = document.documentElement.scrollTop; let h = document.documentElement.scrollHeight - document.documentElement.clientHeight; document.getElementById("progress-bar").style.width = (s / h) * 100 + "%"; };
    window.onload = renderPortal;
</script>
</body>
</html>
