<style>
    /* DİNAMİK FİLTRELEME SINIFLARI */
    .card { transition: all 0.5s var(--ease); }
    .dimmed { opacity: 0.2; filter: grayscale(1); transform: scale(0.95); }
    
    /* GÜN/GECE GEÇİŞİ İÇİN TEMELLER */
    body.night-mode {
        --bg: #121212;
        --ink: #F8F6F2;
        --white: #1A1A1A;
        --clay: #2A2A2A;
    }

    /* DİNAMİK SCROLL İNDİKATÖRÜ */
    #scroll-progress {
        position: fixed; top: 0; left: 0; height: 3px;
        background: var(--accent); z-index: 9999;
        width: 0%; transition: width 0.1s linear;
    }
</style>

<div id="scroll-progress"></div>

<script>
    // 1. DİNAMİK SCROLL TAKİBİ
    window.onscroll = function() {
        let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
        let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        let scrolled = (winScroll / height) * 100;
        document.getElementById("scroll-progress").style.width = scrolled + "%";
    };

    // 2. DİNAMİK COĞRAFYA ODAKLAMA (HOVER SENSITIVE)
    function focusRegion(region) {
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            if (!card.innerText.includes(region)) {
                card.classList.add('dimmed');
            } else {
                card.classList.remove('dimmed');
            }
        });
    }

    function resetFocus() {
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => card.classList.remove('dimmed'));
    }

    // 3. DİNAMİK GECE MODU (OTOMATİK SAAT KONTROLÜ)
    function checkTime() {
        const hour = new Date().getHours();
        if (hour < 6 || hour > 19) {
            document.body.classList.add('night-mode');
        } else {
            document.body.classList.remove('night-mode');
        }
    }
    checkTime(); // Sayfa yüklendiğinde çalıştır
</script>
