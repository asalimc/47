<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MB | Mardin Brazil Journal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #F8F6F2; --ink: #1A1A1A; --accent: #B08D57; --white: #FFFFFF; }
        body { background: var(--bg); color: var(--ink); font-family: system-ui, -apple-system, sans-serif; margin: 0; }
        header { padding: 20px 6%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05); position: sticky; top: 0; background: rgba(248, 246, 242, 0.9); backdrop-filter: blur(10px); z-index: 100; }
        .logo { font-weight: 900; font-size: 1.5rem; text-decoration: none; color: var(--ink); }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 6%; }
        .bento { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .card { background: var(--white); border-radius: 30px; padding: 30px; border: 1px solid rgba(0,0,0,0.05); cursor: pointer; min-height: 400px; display: flex; flex-direction: column; justify-content: flex-end; position: relative; overflow: hidden; transition: transform 0.3s ease; }
        .card:hover { transform: translateY(-5px); }
        .card-bg { position: absolute; inset: 0; background-size: cover; background-position: center; z-index: 0; }
        .card-overlay { position: absolute; inset: 0; background: linear-gradient(transparent, rgba(0,0,0,0.8)); z-index: 1; }
        .card-content { position: relative; z-index: 2; color: white; }
        .author-card { background: white; color: black; justify-content: center; align-items: center; text-align: center; }
        .author-img { width: 120px; height: 120px; border-radius: 60px; object-fit: cover; margin-bottom: 20px; border: 4px solid var(--bg); }
        #reader { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: none; overflow-y: auto; padding: 60px 6%; }
        .close-btn { position: fixed; top: 20px; right: 6%; background: var(--ink); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; z-index: 1001; }
    </style>
</head>
<body>
    <header><a href="#" class="logo">MARDIN BRAZIL</a></header>
    <div class="container"><div class="bento" id="main-grid">Arşiv yükleniyor...</div></div>
    <div id="reader"><button class="close-btn" onclick="closeR()">KAPAT</button><div id="reader-content"></div></div>

    <script>
        // API Anahtarı maskelenmiş halde
        const _m = "ZXlKaGJHY2lPaUpJVXpJMk5pSXNJblI1Y0NJNklrcFhWQ0o5LmV5SnBjU01pT2lKemRYQmhiR0Z6WlNJc0luSmxaaUk2SW5SdmIyMXNiMjVuWkdoｃｍQzSjVjSFYyWlc5bklpd2ljbTlzWlNJNkltRnViMjRpTENKcG群众R2NpT2pFM056STJOamcwT0RRc0ltVjRjQ0k2TWpBNE9ESTBORFE0TkgwLmtraXdLVHNmWU9DSUlfZGZ1SnBhRWx5SnF4VGhya0duS2lLNy1Sak9zcUk=";
        const _u = "https://toomlocgdhkwrypuveof.supabase.co";
        
        const client = supabase.createClient(_u, atob(_m.replace(/[^A-Za-z0-9+/=]/g, "")));
        let artData = [];

        async function init() {
            // Artık direkt 'makaleler' tablosuna sorgu atıyoruz (public şeması olduğu için)
            const { data, error } = await client.from('makaleler').select('*');
            if (error) {
                document.getElementById('main-grid').innerHTML = "Hata: " + error.message;
                return;
            }
            artData = data;
            document.getElementById('main-grid').innerHTML = data.map(i => `
                <div class="card ${i.tip === 'yazar' ? 'author-card' : ''}" onclick="openR('${i.salyangoz}')">
                    ${i.tip !== 'yazar' ? `<div class="card-bg" style="background-image:url('${i.im}')"></div><div class="card-overlay"></div>` : `<img src="${i.im}" class="author-img">`}
                    <div class="card-content" style="${i.tip === 'yazar' ? 'color:black' : ''}">
                        <h2 style="margin:0">${i.tr}</h2>
                        <p style="opacity:0.8">${i.pt}</p>
                    </div>
                </div>`).join('');
        }

        function openR(slug) {
            const a = artData.find(x => x.salyangoz === slug);
            document.getElementById('reader-content').innerHTML = `
                <div style="max-width:800px; margin:0 auto;">
                    <h1 style="font-size:2.5rem; text-align:center;">${a.tr}</h1>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:40px; margin-top:40px; line-height:1.6;">
                        <div>${a.metin_tr || ''}</div>
                        <div style="color:#666">${a.metin_pt || ''}</div>
                    </div>
                </div>`;
            document.getElementById('reader').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeR() {
            document.getElementById('reader').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        init();
    </script>
</body>
</html>
