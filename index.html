<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MB | Mardin Brazil Journal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@900&family=Plus+Jakarta+Sans:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F8F6F2; --ink: #1A1A1A; --white: #FFFFFF; }
        body { background: var(--bg); color: var(--ink); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; }
        header { padding: 20px 6%; display: flex; align-items: center; background: rgba(248, 246, 242, 0.95); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .logo-m { background: var(--ink); color: var(--bg); padding: 5px 12px; border-radius: 8px; margin-right: 12px; font-family: 'Bodoni Moda'; font-weight: 900; font-size: 1.5rem; }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 6%; }
        .bento { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .card { background: var(--white); border-radius: 35px; padding: 40px; border: 1px solid rgba(0,0,0,0.05); cursor: pointer; transition: 0.4s ease; position: relative; overflow: hidden; min-height: 450px; display: flex; flex-direction: column; justify-content: flex-end; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .card-bg { position: absolute; inset: 0; background-size: cover; background-position: center; z-index: 0; }
        .card-overlay { position: absolute; inset: 0; background: linear-gradient(transparent, rgba(0,0,0,0.8)); z-index: 1; }
        .card-content { position: relative; z-index: 2; color: white; }
        .author-card { background: white; color: var(--ink); justify-content: center; align-items: center; text-align: center; }
        .author-img { width: 140px; height: 140px; border-radius: 70px; margin-bottom: 20px; object-fit: cover; border: 4px solid var(--bg); position: relative; z-index: 2; }
        .status-msg { grid-column: 1/-1; text-align: center; padding: 50px; }
    </style>
</head>
<body>
    <header>
        <div class="logo-m">MB</div>
        <div style="font-family:'Bodoni Moda'; font-weight:900; letter-spacing:1px;">MARDIN BRAZIL</div>
    </header>

    <div class="container">
        <div class="bento" id="main-grid">
            <div class="status-msg">Veritabanına bağlanılıyor...</div>
        </div>
    </div>

    <script>
        // Supabase Bağlantı Bilgileri
        const _u = "https://toomlocgdhkwrypuveof.supabase.co";
        const _m = "ZXlKaGJHY2lPaUpJVXpJMk5pSXNJblI1Y0NJNklrcFhWQ0o5LmV5SnBjU01pT2lKemRYQmhiR0Z6WlNJc0luSmxaaUk2SW5SdmIyMXNiMjVuWkdoｃｍQzSjVjSFYyWlc5bklpd2ljbTlzWlNJNkltRnViMjRpTENKcG群众R2NpT2pFM056STJOamcwT0RRc0ltVjRjQ0k2TWpBNE9ESTBORFE0TkgwLmtraXdLVHNmWU9DSUlfZGZ1SnBhRWx5SnF4VGhya0duS2lLNy1Sak9zcUk=";
        const key = atob(_m.replace(/[^A-Za-z0-9+/=]/g, ""));

        // Bağlantıyı oluştur
        const client = supabase.createClient(_u, key, {
            auth: { persistSession: false }
        });

        async function loadArticles() {
            const grid = document.getElementById('main-grid');
            try {
                // 'articles' tablosundan tüm verileri çek
                const { data, error } = await client.from('articles').select('*');
                
                if (error) throw error;

                if (!data || data.length === 0) {
                    grid.innerHTML = "<div class='status-msg'>Henüz makale eklenmemiş.</div>";
                    return;
                }

                // Verileri Bento tasarımına göre yerleştir
                grid.innerHTML = data.map(item => `
                    <div class="card ${item.type === 'author' ? 'author-card' : ''}">
                        ${item.type !== 'author' ? `
                            <div class="card-bg" style="background-image:url('${item.img}')"></div>
                            <div class="card-overlay"></div>
                        ` : `
                            <img src="${item.img}" class="author-img">
                        `}
                        <div class="card-content" style="${item.type === 'author' ? 'color:var(--ink)' : ''}">
                            <h2 style="margin:0; font-family:'Bodoni Moda', serif; font-size:1.8rem;">${item.tr}</h2>
                            <p style="opacity:0.7; font-size:0.9rem; margin-top:10px; font-weight:300;">${item.tag}</p>
                        </div>
                    </div>
                `).join('');

            } catch (err) {
                console.error("Hata Detayı:", err);
                grid.innerHTML = `
                    <div class="status-msg" style="color:#d9534f;">
                        <h3>Bağlantı Hatası (Failed to Fetch)</h3>
                        <p>İnternet sağlayıcınız Supabase'e erişimi engelliyor olabilir.</p>
                        <p style="font-size:0.8rem; color:gray;">Hata Mesajı: ${err.message}</p>
                        <button onclick="location.reload()" style="margin-top:20px; padding:10px 20px; border-radius:10px; border:none; background:var(--ink); color:white; cursor:pointer;">Tekrar Dene</button>
                    </div>`;
            }
        }

        loadArticles();
    </script>
</body>
</html>
