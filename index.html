<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Global Culture & News</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfbf7; --text: #1a1a1a; --muted: #718096; --accent: #c49b66;
            --white: #ffffff; --transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; scroll-behavior: smooth; }

        /* --- UI COMPONENTS (DOKUNULMADI) --- */
        #progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent); width: 0%; z-index: 10001; }
        nav { background: rgba(253, 251, 247, 0.9); backdrop-filter: blur(15px); padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.03); }
        .logo { font-family: 'Marcellus', serif; font-size: 2rem; letter-spacing: 3px; cursor: pointer; text-transform: uppercase; }
        .admin-trigger { cursor: pointer; opacity: 0.02; font-size: 10px; }

        .authors-strip { background: var(--white); padding: 30px 0; display: flex; justify-content: center; gap: 40px; border-bottom: 1px solid #f1f1f1; overflow-x: auto; scrollbar-width: none; }
        .author-item { cursor: pointer; text-align: center; width: 90px; transition: var(--transition); flex: 0 0 auto; }
        .author-item img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 1px solid var(--accent); padding: 4px; }
        .author-item span { display: block; font-size: 0.75rem; font-weight: 700; margin-top: 10px; font-family: 'Marcellus'; }

        .container { max-width: 1400px; margin: 40px auto; display: grid; grid-template-columns: 280px 1fr 300px; gap: 40px; padding: 0 25px; }

        .news-card { background: var(--white); border-radius: 24px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.02); cursor: pointer; transition: var(--transition); border: 1px solid rgba(0,0,0,0.02); margin-bottom: 40px; }
        .news-card:hover { transform: translateY(-10px); box-shadow: 0 30px 60px rgba(0,0,0,0.06); }
        .news-img { width: 100%; height: 480px; object-fit: cover; }
        .card-body { padding: 35px; }
        .card-body h2 { font-family: 'Marcellus', serif; font-size: 2.2rem; margin: 0 0 15px 0; line-height: 1.2; }
        .card-body p { color: var(--muted); font-size: 1.1rem; line-height: 1.7; }

        /* --- ADMIN CMS (GELİŞTİRİLDİ) --- */
        .admin-panel { display: none; position: fixed; inset: 0; background: #f8f9fa; z-index: 12000; padding: 40px; overflow-y: auto; }
        .cms-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }
        .cms-card { background: #fff; padding: 25px; border-radius: 20px; border: 1px solid #ddd; }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 10px; font-family: inherit; }
        .btn { padding: 12px 20px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; }
        .btn-gold { background: var(--accent); color: white; }
        .btn-ai { background: #6c5ce7; color: white; }
        .btn-del { background: #ff7675; color: white; font-size: 10px; padding: 4px 8px; border-radius: 4px; }

        /* Overlay & Reader */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: none; overflow-y: auto; padding-bottom: 100px; }
        .close-overlay { position: fixed; top: 30px; right: 40px; cursor: pointer; background: var(--text); color: #fff; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .article-wrap { max-width: 800px; margin: 60px auto; padding: 0 20px; }
        .article-title { font-family: 'Marcellus', serif; font-size: 3.8rem; line-height: 1.1; margin-bottom: 30px; }
        .article-text { font-size: 1.35rem; line-height: 2; color: #2d3436; }
        
        .ad-space { background: #eee; min-height: 500px; border-radius: 20px; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 1px dashed #ccc; position: sticky; top: 100px; }

        @media (max-width: 1100px) { .container { grid-template-columns: 1fr; } .sidebar-left, .sidebar-right { display: none; } }
    </style>
</head>
<body>

<div id="progress-bar"></div>

<nav>
    <div class="logo" onclick="location.reload()">LUMINA</div>
    <div style="display:flex; align-items:center; gap:20px;">
        <div id="current-city" style="font-size: 0.8rem; letter-spacing: 2px; font-weight: 700;">DETECTING...</div>
        <div class="admin-trigger" onclick="openCMS()">[L_CORE]</div>
    </div>
</nav>

<div id="authors-view" class="authors-strip"></div>

<div class="container">
    <aside class="sidebar-left">
        <h4 style="font-family:'Marcellus'; border-bottom:1px solid #eee; padding-bottom:10px; margin-bottom:15px;">KATEGORİLER</h4>
        <div id="cat-list" style="font-size: 0.9rem; line-height: 2.8;"></div>
        <div class="ad-space" id="ad-left-view" style="margin-top:30px;">SOL REKLAM</div>
    </aside>

    <main id="news-feed"></main>

    <aside class="sidebar-right">
        <div class="ad-space" id="ad-right-view">SAĞ REKLAM</div>
    </aside>
</div>

<div id="adminPanel" class="admin-panel">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #ddd; padding-bottom:20px; margin-bottom:20px;">
        <h1 style="font-family:'Marcellus'">Lumina Enterprise CMS</h1>
        <button class="btn btn-ai" onclick="generateAINews()">AI İle Mardin/Brezilya Haberi Üret</button>
        <button class="btn btn-dark" style="background:#000; color:#fff" onclick="closeCMS()">Kaydet ve Çık</button>
    </div>

    <div class="cms-grid">
        <div class="cms-card">
            <h3>Haberler</h3>
            <input type="hidden" id="edit-id">
            <input type="text" id="newsTitle" placeholder="Başlık">
            <textarea id="newsContent" placeholder="İçerik..." rows="4"></textarea>
            <select id="newsCatSelect"></select>
            <input type="file" id="newsImg" accept="image/*">
            <button class="btn btn-gold" style="width:100%" onclick="saveNews()">Yayınla / Güncelle</button>
            <div id="mgmt-news-list" style="margin-top:15px; max-height:200px; overflow-y:auto;"></div>
        </div>

        <div class="cms-card">
            <h3>Kategori Yönetimi</h3>
            <div style="display:flex; gap:5px;">
                <input type="text" id="newCatName" placeholder="Kategori Adı">
                <button class="btn btn-gold" style="width:auto; height:42px" onclick="addCategory()">Ekle</button>
            </div>
            <div id="mgmt-cat-list" style="margin-top:15px; max-height:250px; overflow-y:auto;"></div>
        </div>

        <div class="cms-card">
            <h3>Yazarlar & Reklamlar</h3>
            <input type="text" id="authName" placeholder="Yazar Adı">
            <button class="btn btn-dark" style="width:100%; background:#1a1a1a; color:#fff" onclick="saveAuthor()">Yazar Ekle</button>
            <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
            <select id="adSide"><option value="left">Sol Alan</option><option value="right">Sağ Alan</option></select>
            <input type="text" id="adUrl" placeholder="Reklam Linki">
            <button class="btn btn-gold" style="width:100%" onclick="saveAd()">Reklamı Güncelle</button>
        </div>
    </div>
</div>

<div id="overlay" class="overlay">
    <div class="close-overlay" onclick="closeAll()">✕</div>
    <div id="overlay-content" class="article-wrap"></div>
</div>

<script>
    const _KEY = "NzQ=";
    let db = JSON.parse(localStorage.getItem('lumina_v11')) || {
        news: [{id:1, title: "Mardin'in Gümüş İşlemeli Geceleri", text: "Telkari sanatı artık Sao Paulo podyumlarında...", img: "https://images.unsplash.com/photo-1582738411706-bfc8e691d1c2?w=1200", cat: "Kültür"}],
        authors: [{id:1, name: "VEDAT M.", bio: "Kültür Yazarı", img: "https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=200"}],
        ads: { left: {img: '', url: '#'}, right: {img: '', url: '#'} },
        cats: ['Mardin Ekspres', 'Sao Paulo Night', 'Gastronomi', 'Tasarım']
    };

    function openCMS() { if(prompt("Şifre:") === atob(_KEY).split("").reverse().join("")) document.getElementById('adminPanel').style.display='block'; renderAdmin(); }
    function closeCMS() { document.getElementById('adminPanel').style.display='none'; }
    function sync() { localStorage.setItem('lumina_v11', JSON.stringify(db)); renderApp(); renderAdmin(); }
    function toB64(f) { return new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => r(rd.result); }); }

    // --- AI HABER MOTORU (BEDAVA ARAÇ SİMÜLASYONU) ---
    function generateAINews() {
        const topics = [
            {t: "Mardin'in Taş Evleri Sao Paulo Mimarisine İlham Oluyor", c: "Mardin'den Brezilya'ya uzanan bu mimari köprüde, taşın soğukluğu Sao Paulo'nun enerjisiyle birleşiyor."},
            {t: "Amazon Ormanlarından Mardin Bahçelerine: Egzotik Tohum Takası", c: "Brezilya'nın bereketli topraklarından gelen kahve çekirdekleri, Mezopotamya güneşiyle buluşuyor."},
            {t: "Samba ve Reyhani: İki Kültürün Dans Festivali Başlıyor", c: "Sao Paulo sokaklarında Reyhani tınıları yükselirken, Mardin kalesinde Samba rüzgarları esecek."}
        ];
        const pick = topics[Math.floor(Math.random() * topics.length)];
        db.news.unshift({ id: Date.now(), title: pick.t, text: pick.c + " Bu haber Yapay Zeka botu tarafından otomatik üretilmiştir.", img: "https://images.unsplash.com/photo-1493132530182-358b975d00d7?w=1200", cat: "Global" });
        sync(); alert("AI Haberi Başarıyla Üretildi ve Yayınlandı!");
    }

    // --- KATEGORİ YÖNETİMİ ---
    function addCategory() {
        const name = document.getElementById('newCatName').value;
        if(name) { db.cats.push(name); document.getElementById('newCatName').value=''; sync(); }
    }
    function deleteCat(index) { if(confirm("Kategoriyi silmek istediğine emin misin?")) { db.cats.splice(index, 1); sync(); } }

    // --- HABER & YAZAR ---
    async function saveNews() {
        const id = document.getElementById('edit-id').value;
        const file = document.getElementById('newsImg').files[0];
        let img = id ? db.news.find(x=>x.id==id).img : "https://via.placeholder.com/1200";
        if(file) img = await toB64(file);
        const data = { id: id ? Number(id) : Date.now(), title: document.getElementById('newsTitle').value, text: document.getElementById('newsContent').value, img: img, cat: document.getElementById('newsCatSelect').value };
        if(id) { const idx = db.news.findIndex(x=>x.id==id); db.news[idx] = data; } else { db.news.unshift(data); }
        document.getElementById('edit-id').value = ""; sync();
    }

    async function saveAuthor() {
        db.authors.push({ id: Date.now(), name: document.getElementById('authName').value.toUpperCase(), bio: 'Lumina Yazarı', img: "https://via.placeholder.com/200" });
        sync();
    }

    async function saveAd() {
        const side = document.getElementById('adSide').value;
        const file = document.getElementById('adFile').files[0];
        if(file) db.ads[side].img = await toB64(file);
        db.ads[side].url = document.getElementById('adUrl').value;
        sync();
    }

    function deleteItem(type, id) { if(confirm("Silinsin mi?")) { db[type] = db[type].filter(x=>x.id != id); sync(); } }
    function editNews(id) {
        const n = db.news.find(x=>x.id==id);
        document.getElementById('edit-id').value = n.id;
        document.getElementById('newsTitle').value = n.title;
        document.getElementById('newsContent').value = n.text;
    }

    // --- RENDER ---
    function renderApp() {
        document.getElementById('authors-view').innerHTML = db.authors.map(a => `
            <div class="author-item" onclick="openAuthor('${a.name}', '${a.bio}', '${a.img}')">
                <img src="${a.img}"><span>${a.name}</span>
            </div>`).join('');

        document.getElementById('news-feed').innerHTML = db.news.map(n => `
            <article class="news-card" onclick="openNews('${n.title.replace(/'/g, "\\'")}', '${n.text.replace(/'/g, "\\'")}', '${n.img}')">
                <img src="${n.img}" class="news-img">
                <div class="card-body">
                    <small style="color:var(--accent); font-weight:bold;">${n.cat.toUpperCase()} • GLOBAL</small>
                    <h2>${n.title}</h2>
                    <p>${n.text.substring(0,100)}...</p>
                </div>
            </article>`).join('');

        document.getElementById('cat-list').innerHTML = db.cats.map((c, i) => `<div style="cursor:pointer">• ${c}</div>`).join('');
        document.getElementById('ad-left-view').innerHTML = db.ads.left.img ? `<a href="${db.ads.left.url}"><img src="${db.ads.left.img}" style="width:100%"></a>` : 'SOL REKLAM';
        document.getElementById('ad-right-view').innerHTML = db.ads.right.img ? `<a href="${db.ads.right.url}"><img src="${db.ads.right.img}" style="width:100%"></a>` : 'SAĞ REKLAM';
        document.getElementById('current-city').innerText = navigator.language.includes('pt') ? "SAO PAULO • LOCAL" : "MARDİN • YEREL";
    }

    function renderAdmin() {
        document.getElementById('newsCatSelect').innerHTML = db.cats.map(c => `<option value="${c}">${c}</option>`).join('');
        document.getElementById('mgmt-news-list').innerHTML = db.news.map(n => `
            <div style="font-size:11px; padding:8px 0; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">
                <span>${n.title.substring(0,25)}...</span>
                <div>
                    <button onclick="editNews(${n.id})" style="border:none; cursor:pointer;">✏️</button>
                    <button onclick="deleteItem('news', ${n.id})" class="btn-del">SİL</button>
                </div>
            </div>`).join('');
        
        document.getElementById('mgmt-cat-list').innerHTML = db.cats.map((c, i) => `
            <div style="font-size:12px; padding:8px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">
                <span>${c}</span>
                <button onclick="deleteCat(${i})" class="btn-del">SİL</button>
            </div>`).join('');
    }

    // --- UTILS ---
    function openNews(title, text, img) {
        document.getElementById('overlay').style.display = 'block';
        document.body.style.overflow = 'hidden';
        document.getElementById('overlay-content').innerHTML = `
            <h1 class="article-title">${title}</h1>
            <button class="btn btn-gold" onclick="speakText('article-main-text')" style="margin-bottom:20px">Yazıyı Dinle</button>
            <img src="${img}" style="width:100%; border-radius:30px; margin-bottom:40px;">
            <div id="article-main-text" class="article-text">${text}</div>`;
    }
    function openAuthor(name, bio, img) {
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('overlay-content').innerHTML = `<div style="text-align:center;"><img src="${img}" style="width:180px; height:180px; border-radius:50%; border:4px solid var(--accent); padding:5px; margin-bottom:20px;"><h1 class="article-title">${name}</h1><p>${bio}</p></div>`;
    }
    function speakText(id) { const u = new SpeechSynthesisUtterance(document.getElementById(id).innerText); u.lang = navigator.language; speechSynthesis.speak(u); }
    function closeAll() { speechSynthesis.cancel(); document.getElementById('overlay').style.display = 'none'; document.body.style.overflow = 'auto'; }
    window.onscroll = () => { document.getElementById("progress-bar").style.width = (document.documentElement.scrollTop / (document.documentElement.scrollHeight - document.documentElement.clientHeight)) * 100 + "%"; };

    renderApp();
</script>
</body>
</html>
