<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Portal | Mardin & Brazil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        .glass { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(15px); }
        .page-fade { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Tüm italik (eğik) yazı stillerini küresel olarak kaldırır */
        * { 
            font-style: normal !important; 
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans" x-data="portalApp()" x-init="init()">

    <nav class="sticky top-0 z-[100] glass border-b border-slate-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div @click="currentPage = 'home'" class="text-3xl font-black tracking-tighter uppercase cursor-pointer text-blue-800">ASC PORTAL</div>
            
            <div class="hidden md:flex space-x-8 text-[11px] font-black uppercase tracking-widest">
                <button @click="currentPage = 'home'" class="hover:text-blue-600 transition">Ana Sayfa</button>
                <button @click="currentPage = 'news-archive'" class="hover:text-blue-600 transition">Haber Arşivi</button>
                <button @click="currentPage = 'contact'" class="hover:text-blue-600 transition">İletişim</button>
            </div>

            <div class="flex space-x-6 text-[10px] font-bold border-l pl-6 border-slate-200 text-slate-500">
                <div class="text-right uppercase">Mardin<br><span class="text-blue-600 text-sm" x-text="mardinTime"></span></div>
                <div class="text-left uppercase">Brazil<br><span class="text-emerald-600 text-sm" x-text="brazilTime"></span></div>
            </div>
        </div>
    </nav>

    <main class="min-h-screen">

        <div x-show="currentPage === 'home'" class="page-fade">
            
            <section class="bg-slate-900 py-10">
                <div class="max-w-7xl mx-auto px-6">
                    <div class="flex items-center space-x-3 mb-6">
                        <div class="h-4 w-1 bg-blue-500"></div>
                        <h2 class="text-white text-[10px] font-black uppercase tracking-[0.3em]">Köşe Yazarları</h2>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <template x-for="author in authors" :key="author.id">
                            <div @click="openAuthor(author)" class="bg-slate-800/50 p-5 rounded-2xl flex items-center space-x-5 cursor-pointer hover:bg-slate-800 transition border border-slate-700 hover:border-blue-500 group">
                                <img :src="author.photo" class="w-14 h-14 rounded-full object-cover border-2 border-slate-600 group-hover:border-blue-500 transition shadow-lg">
                                <div>
                                    <h3 class="text-white font-black uppercase text-base" x-text="author.name"></h3>
                                    <span class="text-blue-400 text-[9px] font-bold uppercase tracking-widest" x-text="author.title"></span>
                                </div>
                                <div class="ml-auto text-slate-600 group-hover:text-white transition">
                                    <i class="fas fa-arrow-right"></i>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </section>

            <header class="relative h-[45vh] bg-black flex items-center justify-center overflow-hidden border-b border-slate-200">
                <img src="https://images.unsplash.com/photo-1590424744295-827054f76785?auto=format&fit=crop&q=80&w=1600" class="absolute w-full h-full object-cover opacity-50">
                <div class="relative text-center px-4">
                    <h1 class="text-white text-5xl md:text-7xl font-black uppercase tracking-tighter">KÜRESEL VİZYON</h1>
                    <p class="text-emerald-400 font-bold tracking-[0.4em] uppercase text-xs mt-3">Mardin ve Brezilya'nın Dijital Köprüsü</p>
                </div>
            </header>
            
            <section class="max-w-7xl mx-auto px-6 py-16">
                <h2 class="text-2xl font-black uppercase tracking-tighter mb-10 border-l-4 border-blue-700 pl-4">Öne Çıkan Haberler</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <template x-for="news in newsData" :key="news.id">
                        <div @click="openNews(news)" class="bg-white rounded-[2rem] overflow-hidden shadow-sm hover:shadow-xl transition-all cursor-pointer border border-slate-100 group">
                            <img :src="news.img" class="h-56 w-full object-cover group-hover:scale-105 transition duration-500">
                            <div class="p-8">
                                <span class="text-blue-600 text-[9px] font-black uppercase tracking-widest" x-text="news.tag"></span>
                                <h3 class="font-black text-lg my-3 group-hover:text-blue-700" x-text="news.title"></h3>
                                <p class="text-slate-500 text-sm line-clamp-2 leading-relaxed" x-text="news.desc"></p>
                            </div>
                        </div>
                    </template>
                </div>
            </section>
        </div>

        <div x-show="currentPage === 'author-detail'" class="page-fade max-w-4xl mx-auto px-6 py-16" x-cloak>
            <button @click="currentPage = 'home'" class="mb-8 text-[10px] font-black uppercase tracking-widest text-blue-600 flex items-center gap-2 hover:bg-blue-50 px-4 py-2 rounded-full w-fit transition">
                <i class="fas fa-chevron-left"></i> Geri Dön
            </button>
            <div class="bg-white rounded-[3rem] p-10 md:p-16 shadow-2xl border border-slate-100 text-center">
                <img :src="selectedAuthor?.photo" class="w-40 h-40 rounded-full mx-auto border-8 border-slate-50 shadow-2xl mb-8 object-cover">
                <h1 class="text-4xl font-black uppercase mb-2" x-text="selectedAuthor?.name"></h1>
                <span class="text-blue-600 font-black uppercase text-sm tracking-widest mb-10 block" x-text="selectedAuthor?.title"></span>
                <div class="h-[2px] w-12 bg-slate-200 mx-auto mb-10"></div>
                <p class="text-slate-700 text-lg leading-loose font-medium max-w-2xl mx-auto" x-text="selectedAuthor?.bio"></p>
                
                <div class="mt-16 pt-12 border-t border-slate-100 text-left">
                    <h4 class="font-black uppercase text-xs mb-8 tracking-[0.2em] text-slate-400 uppercase">Yazarın Son Makaleleri</h4>
                    <div class="space-y-4">
                        <div class="p-6 bg-slate-50 rounded-2xl font-bold hover:bg-blue-50 transition border border-transparent hover:border-blue-100 cursor-pointer uppercase text-sm tracking-tight">İki Coğrafya Tek Ruh: Mardin ve Rio</div>
                        <div class="p-6 bg-slate-50 rounded-2xl font-bold hover:bg-blue-50 transition border border-transparent hover:border-blue-100 cursor-pointer uppercase text-sm tracking-tight">Modern Zamanda Geleneksel Mimari</div>
                    </div>
                </div>
            </div>
        </div>

        <div x-show="currentPage === 'news-detail'" class="page-fade max-w-4xl mx-auto px-6 py-16" x-cloak>
            <button @click="currentPage = 'home'" class="mb-8 text-[10px] font-black uppercase tracking-widest text-blue-600 flex items-center gap-2 hover:bg-blue-50 px-4 py-2 rounded-full w-fit transition">
                <i class="fas fa-chevron-left"></i> Geri Dön
            </button>
            <img :src="selectedNews?.img" class="w-full h-[50vh] object-cover rounded-[3rem] shadow-2xl mb-10 border-4 border-white">
            <h1 class="text-4xl md:text-6xl font-black leading-tight mb-8 uppercase tracking-tighter" x-text="selectedNews?.title"></h1>
            <div class="text-slate-800 text-xl leading-relaxed space-y-6 font-medium" x-html="selectedNews?.body"></div>
        </div>

    </main>

    <footer class="bg-white border-t border-slate-200 py-12 text-center mt-12">
        <p class="text-[10px] font-black uppercase tracking-[0.5em] text-slate-400">ASC GLOBAL PORTAL © 2026 | MARDIN - BRAZIL</p>
    </footer>

    <script>
        function portalApp() {
            return {
                currentPage: 'home',
                selectedNews: null,
                selectedAuthor: null,
                mardinTime: '',
                brazilTime: '',
                authors: [
                    { id: 1, name: 'Prof. Dr. Ahmet Salim', title: 'Kurucu Editör / Tarihçi', bio: 'Mezopotamya medeniyetleri ve dünya mirası üzerine 25 yıllık akademik kariyere sahiptir. Mardin ve Brezilya arasındaki kültürel bağların güçlendirilmesi için çalışmaktadır. Birçok uluslararası makalesi bulunmaktadır.', photo: 'https://i.pravatar.cc/150?u=asalim' },
                    { id: 2, name: 'Dr. Isabella Mendes', title: 'Uluslararası Analist', bio: 'Kültürlerarası diplomasi ve küresel ticaret stratejileri üzerine uzmanlaşmış kıdemli yazar. Sao Paulo Üniversitesi’nde misafir öğretim üyesidir ve Latin Amerika perspektifini temsil eder.', photo: 'https://i.pravatar.cc/150?u=isabella' }
                ],
                newsData: [
                    { id: 101, tag: 'Mardin', title: 'Artuklu Sarayı Restorasyonu Tamamlandı', desc: 'Binlerce yıllık saray, modern bir müze konseptiyle kapılarını ziyaretçilere açtı.', img: 'https://images.unsplash.com/photo-1528642463366-20ba5d3f000c?w=1200', body: 'Artuklu mimarisinin en nadide örneklerinden biri olan saray, 4 yıl süren titiz bir çalışmanın ardından eski görkemine kavuştu. Müzede Mardin tarihine ışık tutan 500 adet yeni eser sergilenecek. Ziyaretçiler tarihi dokuyu koruyan modern bir sunumla geçmişe yolculuk yapacak.' },
                    { id: 102, tag: 'Brazil', title: 'Amazonlarda Yenilenebilir Enerji Devrimi', desc: 'Brezilya, Amazon bölgesindeki köylere güneş enerjisi sağlamak için dev bir proje başlattı.', img: 'https://images.unsplash.com/photo-1516307361401-e323ad26de92?w=1200', body: 'Proje kapsamında uzak bölgelerdeki yerleşim yerlerine 50.000 adet güneş paneli kurulacak. Bu sayede bölgenin doğal yapısı korunurken, enerji ihtiyacı %100 temiz kaynaklardan karşılanmış olacak. Brezilya hükümeti bu projeyle sürdürülebilir enerji alanında dünyaya örnek olmayı hedefliyor.' }
                ],
                init() {
                    this.updateClocks();
                    setInterval(() => this.updateClocks(), 1000);
                },
                updateClocks() {
                    const now = new Date();
                    this.mardinTime = new Intl.DateTimeFormat('tr-TR', { hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'Europe/Istanbul' }).format(now);
                    this.brazilTime = new Intl.DateTimeFormat('tr-TR', { hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'America/Sao_Paulo' }).format(now);
                },
                openNews(news) {
                    this.selectedNews = news;
                    this.currentPage = 'news-detail';
                    window.scrollTo(0, 0);
                },
                openAuthor(author) {
                    this.selectedAuthor = author;
                    this.currentPage = 'author-detail';
                    window.scrollTo(0, 0);
                }
            }
        }
    </script>
</body>
</html>
