<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MB | Ahmet Çınarbaş Journal - Mardin & Brazil Cultural Bridge</title>
    
    <meta name="description" content="Ahmet Çınarbaş ile Mardin'den Brezilya'ya kültürel yolculuk. Gastronomi, sanat, Rio Karnavalı ve Mezopotamya hikayeleri.">
    <meta name="keywords" content="Mardin, Brezilya, Ahmet Çınarbaş, Rio de Janeiro, Mezopotamya, Telkari, Samba, Reyhani, Kültür Sanat, Gastronomi">
    
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,900&family=Plus+Jakarta+Sans:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #F8F6F2; 
            --ink: #1A1A1A; 
            --accent: #B08D57; 
            --white: #FFFFFF;
            --ease: cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* SEO İÇİN GİZLİ KELİME HAVUZU */
        .seo-hidden {
            position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
            overflow: hidden; clip: rect(0, 0, 0, 0); border: 0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--ink); font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

        header {
            padding: 30px 6%; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; background: rgba(248, 246, 242, 0.95); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo-box { display: flex; align-items: center; text-decoration: none; color: var(--ink); }
        .logo-m { 
            font-family: 'Bodoni Moda', serif; font-size: 2.2rem; font-weight: 900; 
            background: var(--ink); color: var(--bg); padding: 0 12px; border-radius: 10px; margin-right: 12px;
        }
        .logo-text { font-family: 'Bodoni Moda', serif; font-size: 1.1rem; font-weight: 900; line-height: 1; }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 6%; }
        .bento { display: flex; flex-direction: column; gap: 40px; }

        /* KART TASARIMI */
        .card {
            background: var(--white); border-radius: 45px; padding: 50px;
            transition: var(--ease) 0.6s; cursor: pointer; border: 1px solid rgba(0,0,0,0.03);
            display: flex; flex-direction: column; justify-content: space-between; 
            min-height: 550px; width: 100%; position: relative; overflow: hidden;
        }
        .card:hover { transform: translateY(-8px); box-shadow: 0 40px 80px rgba(0,0,0,0.08); }

        .card-author { align-items: center; text-align: center; justify-content: center; min-height: 500px; }
        .author-img { width: 160px; height: 160px; border-radius: 50%; object-fit: cover; margin-bottom: 25px; border: 6px solid var(--bg); }

        /* ANA SAYFA BAŞLIKLARI (BODONI MODA) */
        .tr-line { font-family: 'Bodoni Moda', serif; font-size: 3.8rem; line-height: 1.05; margin-bottom: 15px; display: block; font-weight: 900; letter-spacing: -1.5px; }
        .pt-line { font-family: 'Bodoni Moda', serif; font-size: 3.8rem; line-height: 1.05; display: block; font-weight: 900; letter-spacing: -1.5px; color: var(--ink); }
        .tag-dual { font-size: 0.8rem; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); margin-bottom: 30px; display: block; }

        /* READER MODAL - OKUNAKLI TİPOGRAFİ */
        .reader {
            position: fixed; inset: 0; background: var(--bg); z-index: 2000;
            display: none; overflow-y: auto; padding: 120px 8% 120px;
        }
        .reader-header { text-align: center; margin-bottom: 80px; }
        .reader-grid { 
            max-width: 1400px; margin: 0 auto; 
            display: grid; grid-template-columns: 1fr auto 1fr; 
            gap: 60px; align-items: start;
        }
        
        /* OKUMA METNİ - PLUS JAKARTA SANS (DÜNYA STANDARTI) */
        .reader-text { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            font-size: 1.6rem; /* Haber siteleri için ideal okuma boyutu */
            line-height: 1.7; 
            color: #2D2D2D; 
            font-weight: 400; 
            letter-spacing: -0.2px;
        }

        /* AYRAÇ */
        .divider {
            width: 2px; background: var(--accent); height: 100%; min-height: 450px; opacity: 0.4;
        }
        
        .close-btn { position: fixed; top: 40px; right: 6%; background: var(--ink); color: white; border: none; padding: 18px 40px; border-radius: 50px; font-weight: 800; cursor: pointer; z-index: 2100; }

        footer { padding: 100px 6%; background: white; text-align: center; border-top: 1px solid #eee; }

        @media (max-width: 1200px) {
            .reader-grid { grid-template-columns: 1fr; gap: 40px; }
            .divider { width: 100%; height: 2px; min-height: 2px; margin: 20px 0; }
            .tr-line, .pt-line { font-size: 2.2rem; }
            .reader-text { font-size: 1.25rem; }
        }
    </style>
</head>
<body>

    <div class="seo-hidden">
        <h1>Mardin Brezilya Kültür ve Gazetecilik Portalı</h1>
        <p>Ahmet Çınarbaş Mardin Brezilya yazıları, Mezopotamya kültürü, Rio de Janeiro yaşamı, Sao Paulo rehberi, Portekizce Türkçe haberler, kültürel benzerlikler, gastronomi ve sanat arşivi.</p>
    </div>

    <header>
        <a href="#" class="logo-box">
            <div class="logo-m">MB</div>
            <div class="logo-text">MARDIN<br>BRAZIL</div>
        </a>
    </header>

    <main class="container">
        <div class="bento" id="bento-grid"></div>
    </main>

    <div id="reader-modal" class="reader">
        <button class="close-btn" onclick="closeR()">KAPAT ● FECHAR</button>
        <div id="reader-content"></div>
    </div>

    <footer>
        <div class="logo-text" style="font-size: 1.8rem; margin-bottom: 20px;">MARDINBRAZIL</div>
        <p style="font-size: 0.75rem; font-weight: 800; opacity: 0.5; letter-spacing: 3px;">AHMET ÇINARBAŞ JOURNAL ● ARCHIVE 2026</p>
    </footer>

    <script>
        const myContent = [
            {
                type: "author",
                name: "Ahmet Çınarbaş",
                title: "Kültürel Arşivci ● Arquivista Cultural",
                bio: "Mardin'den Brezilya'ya uzanan 9 yıllık gazetecilik serüveni boyunca iki kültürün ruhunu fotoğraflarla ve kelimelerle harmanladı.",
                img: "https://pbs.twimg.com/media/GifApT2XEAAqees.jpg",
                columnTitleTR: "Taşın Fısıltısı",
                columnTitlePT: "Sussurro da Pedra",
                columnTextTR: "Taşın hafızası vardır. Mardin'in sarı kalker taşlarına dokunduğunuzda, binlerce yıllık bir hikaye anlatır. Mezopotamya'nın bu sessiz tanıkları, Rio'nun granit tepeleriyle aynı dili konuşur: Sabır.",
                columnTextPT: "A pedra tem memória. Quando você toca nas pedras de calcário amarelo de Mardin, elas contam uma história de milhares de anos. Estas testemunhas silenciosas da Mesopotâmia falam a mesma língua que as colinas de granito do Rio: Paciência."
            },
            {
                type: "main",
                tag: "MAGAZİN ● CELEBRIDADE",
                tr: "Rio Karnavalı'nda Mardin Rüzgarı",
                pt: "Vento de Mardin no Carnaval do Rio",
                desc: "ÜNLÜ TASARIMCININ YENİ KOLEKSİYONU →",
                img: "https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?q=80&w=1000",
                contentTR: "Brezilyalı ünlü moda tasarımcısı, son koleksiyonunda Mardin'in gümüş telkari işçiliğinden ilham aldığını açıkladı. Rio sokaklarında Mezopotamya esintileri yankılanıyor.",
                contentPT: "O famoso designer de moda brasileiro revelou que sua última coleção foi inspirada no trabalho de filigrana de prata de Mardin. Ecos da Mesopotâmia ressoam nas ruas do Rio."
            },
            {
                type: "main",
                tag: "GASTRONOMİ ● GASTRONOMIA",
                tr: "Kültürlerin Lezzet Buluşması",
                pt: "Encontro de Sabores das Culturas",
                desc: "SAO PAULO'DA MARDİN MUTFAĞI →",
                img: "https://images.unsplash.com/photo-1555939594-58d7cb561ad1?q=80&w=1000",
                contentTR: "Sao Paulo'nun merkezinde açılan yeni restoran, Mardin içli köftesi ile Brezilya'nın ünlü lezzetlerini aynı masada buluşturuyor.",
                contentPT: "Um novo restaurante aberto no centro de São Paulo reúne o kibe de Mardin e os sabores famosos do Brasil na mesma mesa."
            }
        ];

        function renderCards(data) {
            const grid = document.getElementById('bento-grid');
            grid.innerHTML = '';
            data.forEach(item => {
                const card = document.createElement('section');
                card.className = 'card';
                if(item.type === 'author') {
                    card.classList.add('card-author');
                    card.innerHTML = `<img src="${item.img}" class="author-img"><span class="tr-line" style="font-size:3.2rem;">${item.name}</span><span class="pt-line" style="font-size:1.8rem; opacity:0.6;">${item.title}</span><p style="font-size:1.1rem; margin:30px 0; opacity:0.8; max-width:600px; line-height:1.6;">${item.bio}</p><div style="font-size:0.8rem; font-weight:900; background:var(--ink); color:white; padding:20px 50px; border-radius:100px; letter-spacing:1px;">KÖŞE YAZISINI OKU ● LER COLUNA</div>`;
                } else {
                    card.style.background = `linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.85)), url('${item.img}') center/cover`;
                    card.style.color = "white";
                    card.innerHTML = `<div><span class="tag-dual" style="color:white; border-color:white;">${item.tag}</span><span class="tr-line">${item.tr}</span><span class="pt-line" style="color:white;">${item.pt}</span></div><div style="font-weight:800; font-size:0.8rem; letter-spacing:3px;">${item.desc}</div>`;
                }
                card.onclick = () => openR(item);
                grid.appendChild(card);
            });
        }

        function openR(item) {
            const modal = document.getElementById('reader-modal');
            const content = document.getElementById('reader-content');
            content.innerHTML = `<div class="reader-header"><span class="tag-dual">${item.tag || 'YAZAR ● AUTOR'}</span><h1 class="tr-line">${item.columnTitleTR || item.tr}</h1><h2 class="pt-line">${item.columnTitlePT || item.pt}</h2></div><div class="reader-grid"><div class="reader-text">${item.columnTextTR || item.contentTR}</div><div class="divider"></div><div class="reader-text">${item.columnTextPT || item.contentPT}</div></div>`;
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeR() { document.getElementById('reader-modal').style.display = 'none'; document.body.style.overflow = 'auto'; }
        window.onload = () => renderCards(myContent);
    </script>
</body>
</html>
