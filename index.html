<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Global Culture & News</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #fdfbf7;
            --text: #1a1a1a;
            --muted: #718096;
            --accent: #c49b66;
            --white: #ffffff;
            --transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; scroll-behavior: smooth; }
        #progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent); width: 0%; z-index: 10001; }
        nav { background: rgba(253, 251, 247, 0.9); backdrop-filter: blur(15px); padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.03); }
        .logo { font-family: 'Marcellus', serif; font-size: 2rem; letter-spacing: 3px; cursor: pointer; text-transform: uppercase; }

        .authors-strip { background: var(--white); padding: 30px 0; display: flex; justify-content: center; gap: 40px; border-bottom: 1px solid #f1f1f1; overflow-x: auto; }
        .author-item { cursor: pointer; text-align: center; width: 90px; flex-shrink: 0; transition: var(--transition); }
        .author-item:hover { transform: translateY(-5px); }
        .author-item img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 1px solid var(--accent); padding: 4px; margin: 0 auto; }
        .author-item span { display: block; font-size: 0.75rem; font-weight: 700; margin-top: 10px; font-family: 'Marcellus'; text-transform: uppercase; }

        .container-main { max-width: 1400px; margin: 40px auto; display: grid; grid-template-columns: 280px 1fr 300px; gap: 40px; padding: 0 25px; }
        .news-card { background: var(--white); border-radius: 24px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.02); cursor: pointer; transition: var(--transition); border: 1px solid rgba(0,0,0,0.02); margin-bottom: 40px; }
        .news-card:hover { transform: translateY(-10px); box-shadow: 0 30px 60px rgba(0,0,0,0.06); }
        .news-img { width: 100%; height: 480px; object-fit: cover; }
        .card-body { padding: 35px; }
        .card-body h2 { font-family: 'Marcellus', serif; font-size: 2.2rem; margin: 0 0 15px 0; line-height: 1.2; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: none; overflow-y: auto; padding-bottom: 100px; }
        .close-overlay { position: fixed; top: 30px; right: 40px; cursor: pointer; background: var(--text); color: #fff; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10000; }

        #admin-panel { display: none; background: #0f172a; color: white; position: fixed; inset: 0; z-index: 11000; overflow-y: auto; padding: 40px; }
        .admin-nav { display: flex; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid #1e293b; padding-bottom: 15px; }
        .admin-nav button { color: #64748b; font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }
        .admin-nav button.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        .author-manage-card { background: #1e293b; padding: 20px; border-radius: 20px; transition: 0.3s; cursor: pointer; border: 1px solid transparent; }
        .author-manage-card:hover { border-color: var(--accent); background: #26334d; }
    </style>
</head>
<body>

<div id="progress-bar"></div>

<nav>
    <div class="logo" onclick="renderPortal()">LUMINA</div>
    <div id="current-city" style="font-size: 0.8rem; letter-spacing: 2px; font-weight: 700;">MARDİN • YEREL</div>
</nav>

<div id="authors-list" class="authors-strip"></div>

<div class="container-main">
    <aside class="sidebar-left">
        <div class="side-title">KATEGORİLER</div>
        <div id="categories-list" style="font-size: 0.9rem; line-height: 2.5; cursor: pointer;"></div>
    </aside>

    <main id="news-feed"></main>

    <aside class="sidebar-right">
        <div class="side-title">SPONSORLU</div>
        <div id="ad-sidebar" class="ad-space" style="background:#eee; height:400px; border-radius:20px; display:flex; align-items:center; justify-content:center; overflow:hidden;"></div>
    </aside>
</div>

<footer style="padding: 60px 5%; text-align: center;">
    <button onclick="toggleAdmin()" style="opacity: 0.2; font-size: 10px; letter-spacing: 2px;">ADMİN TERMİNALİ</button>
</footer>

<div id="overlay" class="overlay">
    <div class="close-overlay" onclick="closeAll()">✕</div>
    <div id="overlay-content" class="max-w-4xl mx-auto mt-20 p-5"></div>
</div>

<div id="admin-panel">
    <div class="flex justify-between items-center mb-10">
        <h2 class="text-2xl font-black italic text-accent">LUMINA CMS v2.0</h2>
        <button onclick="toggleAdmin()" class="text-xs bg-white/10 px-4 py-2 rounded-lg">KAPAT</button>
    </div>

    <div id="admin-main-view">
        <div class="admin-nav">
            <button onclick="setTab('haber')" id="btn-haber" class="active">HABERLER</button>
            <button onclick="setTab('yazar')" id="btn-yazar">YAZARLAR</button>
            <button onclick="setTab('cat')" id="btn-cat">KATEGORİLER</button>
            <button onclick="setTab('reklam')" id="btn-reklam">REKLAM</button>
        </div>
        <div id="admin-content" class="grid grid-cols-1 lg:grid-cols-3 gap-8"></div>
    </div>

    <div id="admin-author-detail-view" class="hidden">
        </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('lumina_db_v2')) || {
        cats: [{id: 'c1', name: 'Kültür'}, {id: 'c2', name: 'Yaşam'}],
        yazarlar: [{id: 'y1', isim: 'Vedat Mardinli', bio: 'Tarihçi', img: 'https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=200'}],
        haberler: [],
        reklamlar: []
    };

    let activeTab = 'haber';
    let tempImg = "";
    let editingId = null;

    function handleImg(e) {
        const reader = new FileReader();
        reader.onload = () => { tempImg = reader.result; };
        reader.readAsDataURL(e.target.files[0]);
    }

    function toggleAdmin() {
        const p = document.getElementById('admin-panel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
        document.getElementById('admin-main-view').classList.remove('hidden');
        document.getElementById('admin-author-detail-view').classList.add('hidden');
        renderAdmin();
    }

    function setTab(tab) {
        activeTab = tab;
        document.querySelectorAll('.admin-nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + tab).classList.add('active');
        renderAdmin();
    }

    // ADMIN RENDER
    function renderAdmin() {
        const content = document.getElementById('admin-content');
        let form = "";
        let list = "";

        if(activeTab === 'haber') {
            let cOpts = db.cats.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            let yOpts = db.yazarlar.map(y => `<option value="${y.id}">${y.isim}</option>`).join('');
            form = `<div class="bg-slate-900 p-6 rounded-3xl">
                <h3 class="mb-4 font-bold text-accent">YENİ HABER</h3>
                <input type="text" id="h-title" placeholder="Başlık" class="w-full p-3 mb-3 bg-slate-800 rounded-xl">
                <select id="h-cat" class="w-full p-3 mb-3 bg-slate-800 rounded-xl">${cOpts}</select>
                <select id="h-yazar" class="w-full p-3 mb-3 bg-slate-800 rounded-xl">${yOpts}</select>
                <textarea id="h-text" placeholder="İçerik" class="w-full p-3 mb-3 bg-slate-800 rounded-xl h-32"></textarea>
                <input type="file" onchange="handleImg(event)" class="text-xs mb-4">
                <button onclick="saveHaber()" class="w-full bg-accent text-white py-3 rounded-xl font-bold">YAYINLA</button>
            </div>`;
            list = db.haberler.map(h => `<div class="flex justify-between p-3 border-b border-slate-800 text-sm"><span>${h.title}</span><button onclick="deleteItem('haberler', '${h.id}')" class="text-red-400">Sil</button></div>`).join('');
        } 
        else if(activeTab === 'yazar') {
            form = `<div class="bg-slate-900 p-6 rounded-3xl">
                <h3 class="mb-4 font-bold text-accent">YAZAR EKLE</h3>
                <input type="text" id="y-isim" placeholder="İsim Soyisim" class="w-full p-3 mb-3 bg-slate-800 rounded-xl">
                <input type="text" id="y-bio" placeholder="Unvan / Bio" class="w-full p-3 mb-3 bg-slate-800 rounded-xl">
                <input type="file" onchange="handleImg(event)" class="text-xs mb-4">
                <button onclick="saveYazar()" class="w-full bg-accent text-white py-3 rounded-xl font-bold">KAYDET</button>
            </div>`;
            list = db.yazarlar.map(y => `
                <div onclick="manageAuthor('${y.id}')" class="author-manage-card mb-3 flex items-center gap-4">
                    <img src="${y.img || ''}" class="w-10 h-10 rounded-full object-cover bg-slate-700">
                    <div class="flex-1">
                        <div class="font-bold text-sm">${y.isim}</div>
                        <div class="text-[10px] text-slate-500 uppercase">Yönetmek için tıkla</div>
                    </div>
                </div>`).join('');
        }
        else if(activeTab === 'cat') {
            form = `<div class="bg-slate-900 p-6 rounded-3xl"><input type="text" id="c-name" placeholder="Kategori Adı" class="w-full p-3 mb-3 bg-slate-800 rounded-xl"><button onclick="saveCat()" class="w-full bg-accent py-3 rounded-xl font-bold">EKLE</button></div>`;
            list = db.cats.map(c => `<div class="p-3 border-b border-slate-800 flex justify-between"><span>${c.name}</span><button onclick="deleteItem('cats', '${c.id}')" class="text-red-400">Sil</button></div>`).join('');
        }
        else if(activeTab === 'reklam') {
            form = `<div class="bg-slate-900 p-6 rounded-3xl"><input type="file" onchange="handleImg(event)" class="mb-4"><button onclick="saveReklam()" class="w-full bg-accent py-3 rounded-xl font-bold">GÜNCELLE</button></div>`;
        }

        content.innerHTML = form + `<div class="lg:col-span-2 bg-slate-900 p-6 rounded-3xl"><h3>LİSTE</h3><div class="mt-4">${list}</div></div>`;
    }

    // YAZAR ÖZEL YÖNETİM SAYFASI
    function manageAuthor(yid) {
        const yazar = db.yazarlar.find(y => y.id === yid);
        const yazarHaberleri = db.haberler.filter(h => h.yid === yid);
        
        document.getElementById('admin-main-view').classList.add('hidden');
        const detailView = document.getElementById('admin-author-detail-view');
        detailView.classList.remove('hidden');

        detailView.innerHTML = `
            <button onclick="toggleAdmin()" class="mb-6 text-accent font-bold text-sm">← Geri Dön</button>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                <div class="bg-slate-900 p-8 rounded-3xl">
                    <img src="${yazar.img}" class="w-32 h-32 rounded-full mx-auto mb-4 object-cover border-4 border-accent">
                    <h3 class="text-center font-bold text-xl">${yazar.isim}</h3>
                    <p class="text-center text-slate-400 text-sm mb-6">${yazar.bio}</p>
                    <div class="space-y-3">
                        <button onclick="deleteItem('yazarlar', '${yazar.id}')" class="w-full py-3 bg-red-500/20 text-red-500 rounded-xl text-xs font-bold">YAZARI SİL</button>
                        <p class="text-[10px] text-center text-slate-500 uppercase">Yazar silinirse tüm haberleri de silinir.</p>
                    </div>
                </div>
                <div class="lg:col-span-2 bg-slate-900 p-8 rounded-3xl">
                    <h3 class="font-bold mb-6 text-accent">YAZARA AİT HABERLER (${yazarHaberleri.length})</h3>
                    <div class="space-y-4">
                        ${yazarHaberleri.length ? yazarHaberleri.map(h => `
                            <div class="bg-slate-800 p-4 rounded-2xl flex justify-between items-center">
                                <div>
                                    <h4 class="font-bold text-sm">${h.title}</h4>
                                    <small class="text-slate-500">${h.id}</small>
                                </div>
                                <div class="flex gap-3">
                                    <button onclick="deleteItem('haberler', '${h.id}')" class="text-red-400 text-xs">SİL</button>
                                </div>
                            </div>
                        `).join('') : '<p class="text-slate-600">Henüz haber eklenmemiş.</p>'}
                    </div>
                </div>
            </div>
        `;
    }

    // VERİ KAYITLARI
    function saveHaber() {
        const h = { id: 'h'+Date.now(), title: document.getElementById('h-title').value, cid: document.getElementById('h-cat').value, yid: document.getElementById('h-yazar').value, text: document.getElementById('h-text').value, img: tempImg };
        db.haberler.unshift(h);
        finalize();
    }

    function saveYazar() {
        const y = { id: 'y'+Date.now(), isim: document.getElementById('y-isim').value, bio: document.getElementById('y-bio').value, img: tempImg };
        db.yazarlar.push(y);
        finalize();
    }

    function saveCat() {
        db.cats.push({id: 'c'+Date.now(), name: document.getElementById('c-name').value});
        finalize();
    }

    function saveReklam() {
        db.reklamlar = [{img: tempImg}];
        finalize();
    }

    function deleteItem(key, id) {
        if(!confirm('Bu işlem geri alınamaz. Silmek istediğine emin misin?')) return;
        
        if(key === 'yazarlar') {
            db.haberler = db.haberler.filter(h => h.yid !== id);
        }
        db[key] = db[key].filter(x => x.id !== id);
        finalize();
        if(key === 'yazarlar') toggleAdmin();
    }

    function finalize() {
        localStorage.setItem('lumina_db_v2', JSON.stringify(db));
        tempImg = "";
        renderAdmin();
        renderPortal();
    }

    // ÖN YÜZ RENDER
    function renderPortal() {
        document.getElementById('categories-list').innerHTML = db.cats.map(c => `<div onclick="filterPortal('${c.id}')">• ${c.name}</div>`).join('');
        document.getElementById('authors-list').innerHTML = db.yazarlar.map(y => `
            <div class="author-item" onclick="openAuthor('${y.id}')">
                <img src="${y.img}">
                <span>${y.isim}</span>
            </div>`).join('');
        
        const ad = db.reklamlar[0];
        if(ad) document.getElementById('ad-sidebar').innerHTML = `<img src="${ad.img}" class="w-full h-full object-cover">`;

        filterPortal('all');
    }

    function filterPortal(cid) {
        let items = cid === 'all' ? db.haberler : db.haberler.filter(h => h.cid === cid);
        document.getElementById('news-feed').innerHTML = items.map(h => `
            <article class="news-card" onclick="openNews('${h.id}')">
                <img src="${h.img}" class="news-img">
                <div class="card-body">
                    <small class="text-accent font-bold uppercase">${db.cats.find(c=>c.id===h.cid)?.name}</small>
                    <h2 class="font-serif">${h.title}</h2>
                    <p class="text-slate-500">${h.text.substring(0, 100)}...</p>
                </div>
            </article>`).join('');
    }

    function openNews(hid) {
        const h = db.haberler.find(x => x.id === hid);
        const y = db.yazarlar.find(x => x.id === h.yid);
        const content = document.getElementById('overlay-content');
        document.getElementById('overlay').style.display = 'block';
        content.innerHTML = `
            <h1 class="text-5xl font-serif mb-6">${h.title}</h1>
            <div class="flex items-center gap-4 mb-8">
                <img src="${y.img}" class="w-12 h-12 rounded-full object-cover">
                <div><div class="font-bold">${y.isim}</div><div class="text-xs text-slate-400">${y.bio}</div></div>
            </div>
            <img src="${h.img}" class="w-full rounded-3xl mb-10">
            <div class="text-xl leading-loose">${h.text}</div>
        `;
    }

    function openAuthor(yid) {
        const y = db.yazarlar.find(x => x.id === yid);
        const yHaberler = db.haberler.filter(h => h.yid === yid);
        const content = document.getElementById('overlay-content');
        document.getElementById('overlay').style.display = 'block';
        content.innerHTML = `
            <div class="text-center mb-10">
                <img src="${y.img}" class="w-32 h-32 rounded-full mx-auto mb-4 object-cover border-4 border-accent">
                <h1 class="text-4xl font-serif">${y.isim}</h1>
                <p class="text-slate-500">${y.bio}</p>
            </div>
            <hr class="mb-10">
            <h3 class="font-bold mb-6">YAZARA AİT TÜM İÇERİKLER</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                ${yHaberler.map(h => `<div onclick="openNews('${h.id}')" class="cursor-pointer bg-white p-4 rounded-2xl shadow-sm border font-bold">${h.title}</div>`).join('')}
            </div>
        `;
    }

    function closeAll() { document.getElementById('overlay').style.display = 'none'; }
    window.onload = renderPortal;
</script>

</body>
</html>
