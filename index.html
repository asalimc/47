<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Executive CMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfbf7; --text: #1a1a1a; --muted: #718096; --accent: #c49b66;
            --white: #ffffff; --glass: rgba(253, 251, 247, 0.98); --transition: all 0.4s ease;
        }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        
        /* Arayüz Elemanları (Bozulmadı) */
        nav { background: var(--glass); backdrop-filter: blur(15px); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.03); }
        .logo { font-family: 'Marcellus', serif; font-size: 1.8rem; letter-spacing: 3px; cursor: pointer; }
        .admin-entry { cursor: pointer; opacity: 0.03; font-size: 0.7rem; }
        .authors-strip { background: var(--white); padding: 20px 0; display: flex; justify-content: flex-start; gap: 25px; border-bottom: 1px solid #f1f1f1; overflow-x: auto; scrollbar-width: none; padding-left: 5%; }
        .author-item { flex: 0 0 auto; text-align: center; width: 80px; cursor: pointer; }
        .author-item img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); padding: 2px; }
        
        .container { max-width: 1400px; margin: 20px auto; display: grid; grid-template-columns: 250px 1fr 300px; gap: 30px; padding: 0 20px; }
        .main-stage { position: relative; background: #fff; border-radius: 40px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.03); height: 600px; }
        .slide { position: absolute; inset: 0; opacity: 0; transition: var(--transition); display: none; cursor: pointer; }
        .slide.active { opacity: 1; display: flex; flex-direction: column; }
        .slide-img { width: 100%; height: 55%; object-fit: cover; }
        .slide-content { padding: 40px; }

        /* Admin Paneli (Geliştirildi) */
        .admin-panel { display: none; position: fixed; inset: 0; background: #f4f4f2; z-index: 11001; padding: 30px; overflow-y: auto; }
        .admin-card { background: #fff; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #ddd; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; }
        .btn { padding: 10px 20px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; }
        .btn-gold { background: var(--accent); color: white; }
        .btn-edit { background: #3498db; color: white; margin-right: 5px; }
        .btn-del { background: #e74c3c; color: white; }
        
        .mgmt-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .mgmt-table td { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.9rem; }

        /* Overlay */
        .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 10005; display: none; overflow-y: auto; padding: 40px 20px; }
        .close-btn { position: fixed; top: 20px; right: 20px; background: #000; color: #fff; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        @media (max-width: 1100px) { .container { grid-template-columns: 1fr; } .sidebar-left, .sidebar-right { display: none; } }
    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="location.reload()">LUMINA</div>
    <div class="admin-entry" onclick="authAdmin()">[CORE]</div>
</nav>

<div id="authors-view" class="authors-strip"></div>

<div class="container">
    <aside class="sidebar-left"><div id="cat-view"></div></aside>
    <main class="main-stage" id="slider-view"></main>
    <aside class="sidebar-right"><div id="ad-view" style="height:500px; background:#eee; border-radius:25px; overflow:hidden;"></div></aside>
</div>

<div id="adminPanel" class="admin-panel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="font-family:'Marcellus'">Lumina Yönetim Merkezi</h2>
        <button class="btn" onclick="closeAdmin()" style="background:#000; color:#fff;">Paneli Kapat</button>
    </div>

    <div class="admin-card" id="form-container">
        <h3 id="form-title">Yeni İçerik Ekle</h3>
        <input type="hidden" id="editId">
        <select id="dataType">
            <option value="news">Haber (Slider)</option>
            <option value="articles">Makale</option>
            <option value="columns">Köşe Yazısı</option>
        </select>
        <input type="text" id="dataTitle" placeholder="Başlık / Yazar Adı">
        <textarea id="dataContent" placeholder="İçerik / Biyografi" rows="4"></textarea>
        <select id="dataCatSelect"></select>
        <input type="file" id="dataImg" accept="image/*">
        <div style="display:flex; gap:10px;">
            <button class="btn btn-gold" id="saveBtn" onclick="processData()">Sisteme Kaydet</button>
            <button class="btn" id="cancelBtn" onclick="resetForm()" style="display:none; background:#95a5a6; color:white;">İptal</button>
        </div>
    </div>

    <div class="admin-card">
        <h3>İçerik & Yazar Listesi (Düzenle / Sil)</h3>
        <div id="management-view"></div>
    </div>
</div>

<div id="overlay" class="overlay">
    <div class="close-btn" onclick="closeOverlay()">✕</div>
    <div id="overlay-content" style="max-width:800px; margin:auto;"></div>
</div>

<script>
    const _K = "NzQ=";
    function authAdmin() { if(prompt("Kod:") === atob(_K).split("").reverse().join("")) { document.getElementById('adminPanel').style.display='block'; renderAdmin(); } }

    let db = JSON.parse(localStorage.getItem('lumina_v4')) || {
        news: [{id:1, title: 'Antik Tasarımlar', content: 'Geçmişin izleri bugünle buluşuyor.', img: 'https://images.unsplash.com/photo-1582738411706-bfc8e691d1c2', cat: 'Tasarım'}],
        articles: [], columns: [],
        authors: [{id:1, name: 'Vedat M.', bio: 'Yazar', img: 'https://images.unsplash.com/photo-1472099645785-5658abf4ff4e'}],
        categories: ['Kültür', 'Tasarım', 'Gastronomi'],
        ad: {img: '', link: '#'}
    };

    function sync() { localStorage.setItem('lumina_v4', JSON.stringify(db)); renderApp(); renderAdmin(); }
    function toB64(file) { return new Promise(r => { const reader = new FileReader(); reader.readAsDataURL(file); reader.onload = () => r(reader.result); }); }

    // --- CORE İŞLEMLER ---
    async function processData() {
        const id = document.getElementById('editId').value;
        const type = document.getElementById('dataType').value;
        const title = document.getElementById('dataTitle').value;
        const content = document.getElementById('dataContent').value;
        const cat = document.getElementById('dataCatSelect').value;
        const file = document.getElementById('dataImg').files[0];

        let img = id ? (db[type].find(x => x.id == id).img) : "https://via.placeholder.com/800";
        if(file) img = await toB64(file);

        if(id) { // DÜZENLEME
            let index = db[type].findIndex(x => x.id == id);
            db[type][index] = { id: Number(id), title, content, cat, img };
            alert("Güncellendi!");
        } else { // YENİ EKLEME
            db[type].push({ id: Date.now(), title, content, cat, img });
            alert("Eklendi!");
        }
        resetForm(); sync();
    }

    function editItem(type, id) {
        const item = db[type].find(x => x.id == id);
        document.getElementById('editId').value = item.id;
        document.getElementById('dataType').value = type;
        document.getElementById('dataTitle').value = item.title || item.name;
        document.getElementById('dataContent').value = item.content || item.bio;
        document.getElementById('dataCatSelect').value = item.cat || "";
        document.getElementById('form-title').innerText = "İçeriği Düzenle";
        document.getElementById('saveBtn').innerText = "Değişiklikleri Kaydet";
        document.getElementById('cancelBtn').style.display = "block";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function resetForm() {
        document.getElementById('editId').value = "";
        document.getElementById('dataTitle').value = "";
        document.getElementById('dataContent').value = "";
        document.getElementById('form-title').innerText = "Yeni İçerik Ekle";
        document.getElementById('saveBtn').innerText = "Sisteme Kaydet";
        document.getElementById('cancelBtn').style.display = "none";
    }

    function deleteItem(type, id) { if(confirm("Silmek istediğinize emin misiniz?")) { db[type] = db[type].filter(x => x.id != id); sync(); } }

    // --- RENDER ---
    function renderApp() {
        document.getElementById('authors-view').innerHTML = db.authors.map(a => `<div class="author-item" onclick="openDetail('authors', ${a.id})"><img src="${a.img}"><span>${a.name}</span></div>`).join('');
        document.getElementById('slider-view').innerHTML = db.news.map((n, i) => `<div class="slide ${i===0?'active':''}" onclick="openDetail('news', ${n.id})"><img src="${n.img}" class="slide-img"><div class="slide-content"><h2>${n.title}</h2><p>Okumak için tıklayın...</p></div></div>`).join('');
        document.getElementById('cat-view').innerHTML = db.categories.map(c => `<div style="padding:10px 0;">• ${c}</div>`).join('');
        document.getElementById('dataCatSelect').innerHTML = db.categories.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    function renderAdmin() {
        const sections = ['news', 'articles', 'columns', 'authors'];
        let html = '<table class="mgmt-table">';
        sections.forEach(s => {
            db[s].forEach(item => {
                html += `<tr><td><b>[${s.toUpperCase()}]</b> ${item.title || item.name}</td>
                <td style="text-align:right;">
                    <button class="btn btn-edit" onclick="editItem('${s}', ${item.id})">Düzenle</button>
                    <button class="btn btn-del" onclick="deleteItem('${s}', ${item.id})">Sil</button>
                </td></tr>`;
            });
        });
        html += '</table>';
        document.getElementById('management-view').innerHTML = html;
    }

    function openDetail(type, id) {
        const item = db[type].find(x => x.id == id);
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('overlay-content').innerHTML = `
            <h1>${item.title || item.name}</h1>
            <img src="${item.img}" style="width:100%; border-radius:20px; margin:20px 0;">
            <p style="font-size:1.3rem; line-height:1.8;">${item.content || item.bio}</p>
        `;
    }

    function closeOverlay() { document.getElementById('overlay').style.display = 'none'; }
    function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }

    renderApp();
    setInterval(() => {
        let active = document.querySelector('.slide.active');
        if(!active) return;
        active.classList.remove('active');
        let next = active.nextElementSibling || document.querySelector('.slide');
        next.classList.add('active');
    }, 5000);
</script>
</body>
</html>
