<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Global Culture & News</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfbf7; --text: #1a1a1a; --muted: #718096; --accent: #c49b66;
            --white: #ffffff; --transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; scroll-behavior: smooth; }

        /* --- UI COMPONENTS --- */
        #progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent); width: 0%; z-index: 10001; }
        nav { background: rgba(253, 251, 247, 0.9); backdrop-filter: blur(15px); padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.03); }
        .logo { font-family: 'Marcellus', serif; font-size: 2rem; letter-spacing: 3px; cursor: pointer; text-transform: uppercase; }
        .admin-trigger { cursor: pointer; opacity: 0.02; font-size: 10px; }

        .authors-strip { background: var(--white); padding: 30px 0; display: flex; justify-content: center; gap: 40px; border-bottom: 1px solid #f1f1f1; overflow-x: auto; scrollbar-width: none; }
        .author-item { cursor: pointer; text-align: center; width: 90px; transition: var(--transition); flex: 0 0 auto; }
        .author-item img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 1px solid var(--accent); padding: 4px; }
        .author-item span { display: block; font-size: 0.75rem; font-weight: 700; margin-top: 10px; font-family: 'Marcellus'; }

        /* --- HABER DİZİLİMİ: GRID (SIRALI) SİSTEMİ --- */
        .container { max-width: 1400px; margin: 40px auto; display: grid; grid-template-columns: 250px 1fr; gap: 40px; padding: 0 25px; }
        
        /* Haberlerin Yan Yana Geldiği Alan */
        #news-feed { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 
            gap: 30px; 
            align-content: start;
        }

        .news-card { 
            background: var(--white); 
            border-radius: 24px; 
            overflow: hidden; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.02); 
            cursor: pointer; 
            transition: var(--transition); 
            border: 1px solid rgba(0,0,0,0.02); 
            display: flex;
            flex-direction: column;
            height: 100%; /* Kart boylarını eşitlemek için */
        }
        .news-card:hover { transform: translateY(-10px); box-shadow: 0 30px 60px rgba(0,0,0,0.06); }
        .news-img { width: 100%; height: 250px; object-fit: cover; } /* Grid yapısında görsel boyutu optimize edildi */
        .card-body { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-body h2 { font-family: 'Marcellus', serif; font-size: 1.6rem; margin: 10px 0; line-height: 1.2; }
        .card-body p { color: var(--muted); font-size: 0.95rem; line-height: 1.6; }

        /* --- ADMIN PANEL --- */
        .admin-panel { display: none; position: fixed; inset: 0; background: #f8f9fa; z-index: 12000; padding: 40px; overflow-y: auto; }
        .cms-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .cms-card { background: #fff; padding: 25px; border-radius: 20px; border: 1px solid #ddd; }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 10px; }
        .btn { padding: 12px 20px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; }
        .btn-gold { background: var(--accent); color: white; }
        .btn-ai { background: #6c5ce7; color: white; margin-bottom: 20px; }
        .btn-del { background: #ff7675; color: white; font-size: 10px; padding: 4px 8px; }

        /* Overlay & Reader */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: none; overflow-y: auto; padding-bottom: 100px; }
        .close-overlay { position: fixed; top: 30px; right: 40px; cursor: pointer; background: var(--text); color: #fff; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .article-wrap { max-width: 800px; margin: 60px auto; padding: 0 20px; }
        .article-title { font-family: 'Marcellus', serif; font-size: 3.2rem; line-height: 1.1; margin-bottom: 30px; }
        .article-text { font-size: 1.3rem; line-height: 1.9; color: #2d3436; }

        @media (max-width: 850px) { 
            .container { grid-template-columns: 1fr; } 
            .sidebar-left { display: none; }
            #news-feed { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="progress-bar"></div>

<nav>
    <div class="logo" onclick="location.reload()">LUMINA</div>
    <div style="display:flex; align-items:center; gap:20px;">
        <div id="current-city" style="font-size: 0.8rem; letter-spacing: 2px; font-weight: 700;">DETECTING...</div>
        <div class="admin-trigger" onclick="openCMS()">[L_CORE]</div>
    </div>
</nav>

<div id="authors-view" class="authors-strip"></div>

<div class="container">
    <aside class="sidebar-left">
        <h4 style="font-family:'Marcellus'; border-bottom:1px solid #eee; padding-bottom:10px; margin-bottom:15px;">KATEGORİLER</h4>
        <div id="cat-list" style="font-size: 0.9rem; line-height: 2.8;"></div>
    </aside>

    <main id="news-feed"></main>
</div>

<div id="adminPanel" class="admin-panel">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #ddd; padding-bottom:20px; margin-bottom:20px;">
        <h1 style="font-family:'Marcellus'">Lumina Control Center</h1>
        <button class="btn btn-dark" style="background:#000; color:#fff" onclick="closeCMS()">Kaydet ve Çık</button>
    </div>

    <button class="btn btn-ai" onclick="generateAINews()">Mardin/Brezilya AI Haberi Üret</button>

    <div class="cms-grid">
        <div class="cms-card">
            <h3>Haber Yönetimi</h3>
            <input type="hidden" id="edit-id">
            <input type="text" id="newsTitle" placeholder="Başlık">
            <textarea id="newsContent" placeholder="İçerik..." rows="4"></textarea>
            <select id="newsCatSelect"></select>
            <input type="file" id="newsImg" accept="image/*">
            <button class="btn btn-gold" style="width:100%" onclick="saveNews()">Yayınla / Güncelle</button>
            <div id="mgmt-news-list" style="margin-top:15px; max-height:200px; overflow-y:auto;"></div>
        </div>

        <div class="cms-card">
            <h3>Kategoriler</h3>
            <div style="display:flex; gap:5px;"><input type="text" id="newCatName" placeholder="Yeni Kategori"><button class="btn btn-gold" onclick="addCategory()">+</button></div>
            <div id="mgmt-cat-list" style="margin-top:15px;"></div>
        </div>

        <div class="cms-card">
            <h3>Yazarlar</h3>
            <input type="text" id="authName" placeholder="Yazar Adı"><button class="btn btn-dark" style="width:100%; margin-top:10px; background:#111; color:#fff;" onclick="saveAuthor()">Ekle</button>
            <div id="mgmt-auth-list" style="margin-top:15px;"></div>
        </div>
    </div>
</div>

<div id="overlay" class="overlay">
    <div class="close-overlay" onclick="closeAll()">✕</div>
    <div id="overlay-content" class="article-wrap"></div>
</div>

<script>
    const _KEY = "NzQ=";
    let db = JSON.parse(localStorage.getItem('lumina_v12')) || {
        news: [{id:1, title: "Mardin'in Gümüş İşlemeli Geceleri", text: "Telkari sanatı artık Sao Paulo podyumlarında bir dünya markası haline geliyor. Genç tasarımcılar bu kadim sanatı modern dokunuşlarla yeniden yorumluyor.", img: "https://images.unsplash.com/photo-1582738411706-bfc8e691d1c2?w=1200", cat: "Kültür"}],
        authors: [{id:1, name: "VEDAT M.", bio: "Kültür Yazarı", img: "https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=200"}],
        cats: ['Mardin Ekspres', 'Sao Paulo Night', 'Gastronomi', 'Tasarım']
    };

    function openCMS() { if(prompt("Şifre:") === atob(_KEY).split("").reverse().join("")) document.getElementById('adminPanel').style.display='block'; renderAdmin(); }
    function closeCMS() { document.getElementById('adminPanel').style.display='none'; }
    function sync() { localStorage.setItem('lumina_v12', JSON.stringify(db)); renderApp(); renderAdmin(); }
    function toB64(f) { return new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => r(rd.result); }); }

    function generateAINews() {
        const pick = {t: "Samba ve Reyhani: İki Kültürün Dans Festivali", c: "Mardin kalesinde Samba rüzgarları eserken, Sao Paulo sokakları Reyhani tınılarıyla yankılanıyor. Bu kültürel buluşma dünya basınında geniş yer buldu."};
        db.news.unshift({ id: Date.now(), title: pick.t, text: pick.c, img: "https://images.unsplash.com/photo-1493132530182-358b975d00d7?w=1200", cat: "Global" });
        sync();
    }

    function addCategory() { const n = document.getElementById('newCatName').value; if(n){ db.cats.push(n); sync(); } }
    function deleteCat(i) { db.cats.splice(i, 1); sync(); }

    async function saveNews() {
        const id = document.getElementById('edit-id').value;
        const file = document.getElementById('newsImg').files[0];
        let img = id ? db.news.find(x=>x.id==id).img : "https://via.placeholder.com/800";
        if(file) img = await toB64(file);
        const data = { id: id ? Number(id) : Date.now(), title: document.getElementById('newsTitle').value, text: document.getElementById('newsContent').value, img: img, cat: document.getElementById('newsCatSelect').value };
        if(id) { const idx = db.news.findIndex(x=>x.id==id); db.news[idx] = data; } else { db.news.unshift(data); }
        document.getElementById('edit-id').value = ""; sync();
    }

    async function saveAuthor() { db.authors.push({ id: Date.now(), name: document.getElementById('authName').value.toUpperCase(), bio: 'Yazar', img: "https://via.placeholder.com/200" }); sync(); }
    function deleteItem(type, id) { db[type] = db[type].filter(x=>x.id != id); sync(); }
    function editNews(id) {
        const n = db.news.find(x=>x.id==id);
        document.getElementById('edit-id').value = n.id;
        document.getElementById('newsTitle').value = n.title;
        document.getElementById('newsContent').value = n.text;
    }

    function renderApp() {
        document.getElementById('authors-view').innerHTML = db.authors.map(a => `<div class="author-item" onclick="openAuthor('${a.name}', '${a.bio}', '${a.img}')"><img src="${a.img}"><span>${a.name}</span></div>`).join('');
        document.getElementById('news-feed').innerHTML = db.news.map(n => `
            <article class="news-card" onclick="openNews('${n.title.replace(/'/g, "\\'")}', '${n.text.replace(/'/g, "\\'")}', '${n.img}')">
                <img src="${n.img}" class="news-img">
                <div class="card-body">
                    <small style="color:var(--accent); font-weight:bold;">${n.cat.toUpperCase()}</small>
                    <h2>${n.title}</h2>
                    <p>${n.text.substring(0,80)}...</p>
                </div>
            </article>`).join('');
        document.getElementById('cat-list').innerHTML = db.cats.map(c => `<div>• ${c}</div>`).join('');
        document.getElementById('current-city').innerText = navigator.language.includes('pt') ? "SAO PAULO • LOCAL" : "MARDİN • YEREL";
    }

    function renderAdmin() {
        document.getElementById('newsCatSelect').innerHTML = db.cats.map(c => `<option value="${c}">${c}</option>`).join('');
        document.getElementById('mgmt-news-list').innerHTML = db.news.map(n => `<div style="font-size:11px; padding:5px 0; border-bottom:1px solid #eee;">${n.title.substring(0,20)}... <button onclick="editNews(${n.id})">✏️</button><button onclick="deleteItem('news', ${n.id})" class="btn-del">X</button></div>`).join('');
        document.getElementById('mgmt-cat-list').innerHTML = db.cats.map((c, i) => `<div style="font-size:11px; padding:3px 0;">${c} <button onclick="deleteCat(${i})" class="btn-del">X</button></div>`).join('');
        document.getElementById('mgmt-auth-list').innerHTML = db.authors.map(a => `<div style="font-size:11px; padding:3px 0;">${a.name} <button onclick="deleteItem('authors', ${a.id})" class="btn-del">X</button></div>`).join('');
    }

    function openNews(title, text, img) {
        document.getElementById('overlay').style.display = 'block';
        document.body.style.overflow = 'hidden';
        document.getElementById('overlay-content').innerHTML = `<h1 class="article-title">${title}</h1><button class="btn btn-gold" onclick="speakText('atxt')">Yazıyı Dinle</button><img src="${img}" style="width:100%; border-radius:30px; margin:30px 0;"><div id="atxt" class="article-text">${text}</div>`;
    }
    function openAuthor(n, b, i) {
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('overlay-content').innerHTML = `<div style="text-align:center;"><img src="${i}" style="width:150px; height:150px; border-radius:50%; margin-bottom:20px;"><h1 class="article-title">${n}</h1><p>${b}</p></div>`;
    }
    function speakText(id) { const u = new SpeechSynthesisUtterance(document.getElementById(id).innerText); u.lang = navigator.language; speechSynthesis.speak(u); }
    function closeAll() { speechSynthesis.cancel(); document.getElementById('overlay').style.display = 'none'; document.body.style.overflow = 'auto'; }
    window.onscroll = () => { document.getElementById("progress-bar").style.width = (document.documentElement.scrollTop / (document.documentElement.scrollHeight - document.documentElement.clientHeight)) * 100 + "%"; };

    renderApp();
</script>
</body>
</html>
