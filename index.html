<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASC GLOBAL | Profesyonel Yönetim Portalı</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        .goog-te-banner-frame, .goog-te-balloon-frame, .skiptranslate, #google_translate_element { display: none !important; opacity: 0 !important; }
        body { top: 0px !important; font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; overflow-x: hidden; }
        
        .light-mesh {
            background-image: radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.03) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(249, 115, 22, 0.03) 0px, transparent 50%);
        }

        .premium-card { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 10px 30px -5px rgba(0,0,0,0.04);
            transition: all 0.3s ease;
        }
        .premium-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.08); }

        .admin-input {
            width: 100%; background: #f1f5f9; border: 2px solid transparent; padding: 1rem; border-radius: 1rem;
            outline: none; transition: all 0.2s; font-weight: 500;
        }
        .admin-input:focus { border-color: #3b82f6; background: white; }

        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="portalApp()" x-init="init()" class="light-mesh min-h-screen">

    <nav class="fixed top-0 w-full z-[100] bg-white/80 backdrop-blur-md border-b border-slate-200/50">
        <div class="max-w-[1600px] mx-auto px-8 py-4 flex justify-between items-center">
            <div @click="currentPage = 'home'" class="flex items-center gap-3 cursor-pointer">
                <div class="bg-slate-950 text-white font-black px-4 py-1.5 rounded-xl text-xl">ASC</div>
                <span class="text-2xl font-extrabold tracking-tighter uppercase">Global</span>
            </div>
            <div class="flex items-center gap-6">
                <div class="hidden md:flex gap-4 text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400">
                    <span x-text="todayDate"></span>
                </div>
                <button @click="loginAdmin()" class="bg-blue-600 text-white px-6 py-2.5 rounded-full text-xs font-bold uppercase hover:bg-slate-900 transition-all shadow-lg shadow-blue-200">Panel</button>
            </div>
        </div>
    </nav>

    <main class="pt-24">
        <div x-show="currentPage === 'home'" class="animate-in fade-in duration-700">
            
            <header class="max-w-[1600px] mx-auto px-6 mb-12">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 h-[550px]">
                    <div class="relative group rounded-[3rem] overflow-hidden shadow-2xl bg-slate-200">
                        <img src="https://images.unsplash.com/photo-1544830154-1505c215f79a?q=80&w=2000" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-950/90 via-slate-950/20 to-transparent"></div>
                        <div class="absolute bottom-10 left-10 right-10">
                            <span class="bg-blue-600 text-white px-4 py-1 rounded-full text-[10px] font-black uppercase mb-4 inline-block">Mardin Terminal</span>
                            <h2 class="text-4xl font-extrabold text-white tracking-tighter mb-4 italic">KADİM ŞEHİR: MARDİN</h2>
                            <div class="space-y-2 border-t border-white/20 pt-4">
                                <template x-for="n in newsData.filter(i => i.region === 'Mardin').slice(0, 2)">
                                    <div @click="openNews(n)" class="flex items-center justify-between text-white/80 hover:text-white cursor-pointer group/item">
                                        <p class="text-sm font-medium truncate pr-4" x-text="n.title"></p>
                                        <i class="fas fa-arrow-right text-xs transform group-hover/item:translate-x-2 transition"></i>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                    <div class="relative group rounded-[3rem] overflow-hidden shadow-2xl bg-slate-200">
                        <img src="https://images.unsplash.com/photo-1483728642387-6c3bdd6c93e5?q=80&w=2000" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-orange-950/90 via-orange-950/20 to-transparent"></div>
                        <div class="absolute bottom-10 right-10 left-10 text-right">
                            <span class="bg-orange-500 text-white px-4 py-1 rounded-full text-[10px] font-black uppercase mb-4 inline-block">Rio De Janeiro</span>
                            <h2 class="text-4xl font-extrabold text-white tracking-tighter mb-4 italic">RIO 2026 ANALİZ</h2>
                            <div class="space-y-2 border-t border-white/20 pt-4">
                                <template x-for="n in newsData.filter(i => i.region === 'Rio').slice(0, 2)">
                                    <div @click="openNews(n)" class="flex items-center justify-between flex-row-reverse text-white/80 hover:text-white cursor-pointer group/item">
                                        <p class="text-sm font-medium truncate pl-4" x-text="n.title"></p>
                                        <i class="fas fa-arrow-left text-xs transform group-hover/item:-translate-x-2 transition"></i>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <section class="max-w-[1600px] mx-auto px-6 mb-20 grid grid-cols-2 lg:grid-cols-4 gap-6">
                <div class="premium-card p-8 rounded-[2rem] border-l-4 border-l-blue-600">
                    <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-2">Portal Trafiği</p>
                    <p class="text-3xl font-black" x-text="totalReads"></p>
                </div>
                <div class="premium-card p-8 rounded-[2rem] border-l-4 border-l-orange-500">
                    <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-2">Yazar Okunma</p>
                    <p class="text-3xl font-black" x-text="totalReads - 1000"></p>
                </div>
                <div class="premium-card p-8 rounded-[2rem]">
                    <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-2">Mardin Veri</p>
                    <p class="text-3xl font-black text-blue-600" x-text="mTime"></p>
                </div>
                <div class="premium-card p-8 rounded-[2rem]">
                    <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-2">Rio Veri</p>
                    <p class="text-3xl font-black text-orange-500" x-text="bTime"></p>
                </div>
            </section>

            <section class="max-w-[1600px] mx-auto px-6 mb-32">
                <div class="flex items-center justify-between mb-12">
                    <h3 class="text-3xl font-black tracking-tighter uppercase italic">Global <span class="text-blue-600">Haber Merkezi</span></h3>
                    <div class="flex gap-2">
                        <template x-for="cat in categories">
                            <span class="px-4 py-1.5 bg-white border border-slate-200 rounded-full text-[10px] font-bold text-slate-500 uppercase cursor-pointer hover:bg-blue-600 hover:text-white transition" x-text="cat"></span>
                        </template>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
                    <template x-for="(news, index) in newsData" :key="index">
                        <div @click="openNews(news)" class="premium-card rounded-[2.5rem] overflow-hidden group cursor-pointer">
                            <div class="h-64 overflow-hidden relative">
                                <img :src="news.img" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                                <div class="absolute top-6 left-6 flex gap-2">
                                    <span class="bg-white/90 backdrop-blur px-3 py-1 rounded-lg text-[9px] font-black uppercase text-blue-600 shadow-sm" x-text="news.tag"></span>
                                    <span class="bg-slate-900 text-white px-3 py-1 rounded-lg text-[9px] font-black uppercase" x-text="news.region"></span>
                                </div>
                            </div>
                            <div class="p-8">
                                <h4 class="text-xl font-extrabold mb-6 leading-tight group-hover:text-blue-600 transition" x-text="news.title"></h4>
                                <div class="flex items-center justify-between pt-6 border-t border-slate-100">
                                    <span class="text-slate-400 text-[10px] font-bold uppercase tracking-widest" x-text="news.date"></span>
                                    <span class="text-slate-900 font-bold text-xs"><i class="fas fa-eye text-blue-500 mr-2"></i><span x-text="news.views"></span></span>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </section>

            <section class="bg-slate-900 py-32 text-white">
                <div class="max-w-[1600px] mx-auto px-6">
                    <h3 class="text-4xl font-black tracking-tighter mb-20 text-center italic uppercase">Global <span class="text-blue-500">Perspektif</span></h3>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
                        <template x-for="author in authors">
                            <div @click="openAuthor(author)" class="bg-white/5 border border-white/10 p-10 rounded-[3rem] text-center hover:bg-white/10 transition cursor-pointer">
                                <img :src="author.photo" class="w-24 h-24 rounded-[2rem] object-cover mx-auto mb-6 grayscale hover:grayscale-0 transition duration-500 shadow-2xl">
                                <h4 class="text-lg font-bold uppercase tracking-tight" x-text="author.name"></h4>
                                <p class="text-blue-400 text-[10px] font-black uppercase mb-6 tracking-widest" x-text="author.title"></p>
                                <span class="text-[10px] text-white/40 font-bold uppercase italic">Okunma: <span class="text-white" x-text="author.reads"></span></span>
                            </div>
                        </template>
                    </div>
                </div>
            </section>
        </div>

        <div x-show="currentPage === 'news-detail'" class="max-w-4xl mx-auto px-6 py-20" x-cloak>
            <button @click="currentPage = 'home'" class="mb-8 font-bold text-xs uppercase tracking-widest text-slate-400 hover:text-blue-600 transition">← Geri Dön</button>
            <img :src="selectedNews?.img" class="w-full h-[500px] object-cover rounded-[3rem] mb-12 shadow-2xl">
            <div class="bg-blue-600 text-white px-4 py-1 rounded-full text-[10px] font-black uppercase inline-block mb-4" x-text="selectedNews?.tag"></div>
            <h1 class="text-5xl font-extrabold tracking-tighter mb-8 leading-[0.95]" x-text="selectedNews?.title"></h1>
            <div class="prose max-w-none text-xl text-slate-600 leading-relaxed font-light" x-html="selectedNews?.body"></div>
        </div>

        <div x-show="currentPage === 'author-detail'" class="max-w-4xl mx-auto px-6 py-20" x-cloak>
            <button @click="currentPage = 'home'" class="mb-8 font-bold text-xs uppercase tracking-widest text-slate-400 hover:text-blue-600 transition">← Geri Dön</button>
            <div class="premium-card p-12 rounded-[3.5rem] flex flex-col md:flex-row gap-12 items-center">
                <img :src="selectedAuthor?.photo" class="w-48 h-48 rounded-[3rem] object-cover shadow-2xl">
                <div>
                    <h1 class="text-4xl font-black uppercase tracking-tighter mb-2" x-text="selectedAuthor?.name"></h1>
                    <p class="text-blue-600 font-bold uppercase text-sm mb-6 tracking-widest" x-text="selectedAuthor?.title"></p>
                    <div class="text-xl text-slate-600 leading-relaxed italic" x-text="selectedAuthor?.bio"></div>
                </div>
            </div>
        </div>

        <div x-show="currentPage === 'admin'" class="max-w-[1600px] mx-auto px-6 py-20 animate-in slide-in-from-bottom duration-500" x-cloak>
            <div class="flex items-center justify-between mb-16">
                <h2 class="text-4xl font-black tracking-tighter uppercase italic">Sistem <span class="text-blue-600">Terminali</span></h2>
                <div class="flex gap-4">
                    <button @click="resetForm(); isEdit=false" class="bg-white border border-slate-200 px-6 py-3 rounded-2xl text-xs font-bold uppercase">Temizle</button>
                    <button @click="currentPage = 'home'" class="bg-red-50 text-red-600 px-6 py-3 rounded-2xl text-xs font-bold uppercase hover:bg-red-600 hover:text-white transition">Kapat</button>
                </div>
            </div>

            <div class="grid grid-cols-1 xl:grid-cols-12 gap-10">
                <div class="xl:col-span-5">
                    <div class="premium-card p-10 rounded-[3rem] sticky top-32">
                        <div class="flex gap-2 mb-8 bg-slate-100 p-1.5 rounded-2xl">
                            <button @click="formType='news'" :class="formType==='news'?'bg-white shadow-sm text-blue-600':'text-slate-500'" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase transition">Haber Editörü</button>
                            <button @click="formType='author'" :class="formType==='author'?'bg-white shadow-sm text-blue-600':'text-slate-500'" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase transition">Yazar Editörü</button>
                            <button @click="formType='category'" :class="formType==='category'?'bg-white shadow-sm text-blue-600':'text-slate-500'" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase transition">Kategoriler</button>
                        </div>

                        <div x-show="formType === 'news'" class="space-y-4 animate-in fade-in">
                            <input x-model="formData.title" type="text" placeholder="Haber Başlığı" class="admin-input">
                            <div class="grid grid-cols-2 gap-4">
                                <select x-model="formData.tag" class="admin-input">
                                    <option value="">Kategori Seçin</option>
                                    <template x-for="cat in categories">
                                        <option :value="cat" x-text="cat"></option>
                                    </template>
                                </select>
                                <select x-model="formData.region" class="admin-input">
                                    <option value="Global">Bölge: Global</option>
                                    <option value="Mardin">Bölge: Mardin</option>
                                    <option value="Rio">Bölge: Rio</option>
                                </select>
                            </div>
                            <textarea x-model="formData.body" placeholder="Haber İçeriği (HTML Kullanabilirsiniz)" class="admin-input h-48"></textarea>
                            <div class="bg-blue-50 border-2 border-dashed border-blue-200 p-8 rounded-2xl text-center relative group">
                                <input type="file" @change="handleUpload($event)" class="absolute inset-0 opacity-0 cursor-pointer">
                                <i class="fas fa-image text-blue-400 text-2xl mb-2 group-hover:scale-110 transition"></i>
                                <p class="text-[10px] font-black text-blue-600 uppercase">Görsel Yükle</p>
                            </div>
                        </div>

                        <div x-show="formType === 'author'" class="space-y-4 animate-in fade-in">
                            <input x-model="formData.name" type="text" placeholder="İsim Soyisim" class="admin-input">
                            <input x-model="formData.title" type="text" placeholder="Uzmanlık / Ünvan" class="admin-input">
                            <textarea x-model="formData.bio" placeholder="Kısa Biyografi" class="admin-input h-32"></textarea>
                            <div class="bg-slate-100 border-2 border-dashed border-slate-300 p-8 rounded-2xl text-center relative">
                                <input type="file" @change="handleUpload($event)" class="absolute inset-0 opacity-0 cursor-pointer">
                                <p class="text-[10px] font-black text-slate-500 uppercase">Yazar Fotoğrafı</p>
                            </div>
                        </div>

                        <div x-show="formType === 'category'" class="space-y-4 animate-in fade-in">
                            <div class="flex gap-2">
                                <input x-model="newCatName" type="text" placeholder="Yeni Kategori Adı" class="admin-input">
                                <button @click="addCategory()" class="bg-blue-600 text-white px-6 rounded-xl font-bold">+</button>
                            </div>
                            <div class="flex flex-wrap gap-2 pt-4">
                                <template x-for="(cat, idx) in categories">
                                    <span class="bg-slate-100 px-4 py-2 rounded-lg text-xs font-bold flex items-center gap-3">
                                        <span x-text="cat"></span>
                                        <i @click="categories.splice(idx,1); sync()" class="fas fa-times text-red-400 cursor-pointer"></i>
                                    </span>
                                </template>
                            </div>
                        </div>

                        <button @click="saveData()" class="w-full mt-8 bg-blue-600 text-white py-5 rounded-2xl font-black uppercase tracking-widest hover:bg-slate-900 transition-all shadow-xl shadow-blue-200">
                            <span x-text="isEdit ? 'Veriyi Güncelle' : 'Sisteme Gönder'"></span>
                        </button>
                    </div>
                </div>

                <div class="xl:col-span-7 space-y-6">
                    <div class="premium-card p-10 rounded-[3rem]">
                        <h3 class="text-xl font-black mb-8 border-b pb-4 italic">İçerik Arşivi</h3>
                        <div class="space-y-4 h-[600px] overflow-y-auto pr-4">
                            <p class="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-4">Haberler</p>
                            <template x-for="(n, idx) in newsData">
                                <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl hover:bg-white border border-transparent hover:border-blue-100 transition group">
                                    <div class="flex items-center gap-4">
                                        <img :src="n.img" class="w-12 h-12 rounded-xl object-cover">
                                        <div>
                                            <p class="font-bold text-xs" x-text="n.title"></p>
                                            <div class="flex gap-2 mt-1">
                                                <span class="text-[8px] font-black uppercase text-blue-500" x-text="n.tag"></span>
                                                <span class="text-[8px] font-black uppercase text-slate-400" x-text="n.region"></span>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition">
                                        <button @click="editData('news', idx)" class="w-8 h-8 rounded-lg bg-blue-100 text-blue-600 text-xs"><i class="fas fa-edit"></i></button>
                                        <button @click="deleteData('news', idx)" class="w-8 h-8 rounded-lg bg-red-100 text-red-600 text-xs"><i class="fas fa-trash"></i></button>
                                    </div>
                                </div>
                            </template>

                            <hr class="my-8">

                            <p class="text-[10px] font-black text-orange-500 uppercase tracking-widest mb-4">Yazarlar</p>
                            <template x-for="(a, idx) in authors">
                                <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl hover:bg-white border border-transparent hover:border-orange-100 transition group">
                                    <div class="flex items-center gap-4">
                                        <img :src="a.photo" class="w-12 h-12 rounded-xl object-cover">
                                        <div>
                                            <p class="font-bold text-xs" x-text="a.name"></p>
                                            <p class="text-[8px] font-black uppercase text-slate-400" x-text="a.title"></p>
                                        </div>
                                    </div>
                                    <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition">
                                        <button @click="editData('author', idx)" class="w-8 h-8 rounded-lg bg-blue-100 text-blue-600 text-xs"><i class="fas fa-edit"></i></button>
                                        <button @click="deleteData('author', idx)" class="w-8 h-8 rounded-lg bg-red-100 text-red-600 text-xs"><i class="fas fa-trash"></i></button>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function portalApp() {
            return {
                currentPage: 'home', formType: 'news', isEdit: false, editIdx: null,
                selectedNews: null, selectedAuthor: null, newCatName: '',
                mTime: '', bTime: '', todayDate: '', totalReads: 0,
                formData: { title:'', tag:'', body:'', img:'', name:'', bio:'', photo:'', region:'Global' },

                categories: JSON.parse(localStorage.getItem('asc_v14_cats')) || ['Ekonomi', 'Kültür', 'Teknoloji', 'Analiz', 'Siyaset'],
                
                authors: JSON.parse(localStorage.getItem('asc_v14_authors')) || [
                    { name: 'Dr. Ahmet Salim', title: 'Tarihçi', bio: 'Mezopotamya üzerine uzmanlaşmış kıdemli araştırmacı.', photo: 'https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=400', reads: 14500 },
                    { name: 'Isabella Mendes', title: 'Ekonomist', bio: 'Güney Amerika pazarları ve Rio dijital dönüşüm analisti.', photo: 'https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=400', reads: 8900 }
                ],
                
                newsData: JSON.parse(localStorage.getItem('asc_v14_news')) || [
                    { title: 'Mardin Turizminde Bahar Yoğunluğu', tag: 'Kültür', region: 'Mardin', img: 'https://images.unsplash.com/photo-1582236894056-e918b9588667?w=800', body: 'Detaylı içerik...', views: 520, date: '02.03.2026' },
                    { title: 'Rio Carnival 2026 Hazırlıkları Başladı', tag: 'Analiz', region: 'Rio', img: 'https://images.unsplash.com/photo-1516307361401-e323ad26de92?w=800', body: 'Detaylı içerik...', views: 890, date: '01.03.2026' },
                    { title: 'Global Ekonomide Dijital Para Dönemi', tag: 'Ekonomi', region: 'Global', img: 'https://images.unsplash.com/photo-1518186239717-2e9b1bd67b9b?w=800', body: 'Detaylı içerik...', views: 1200, date: '28.02.2026' }
                ],

                init() {
                    this.updateTime();
                    this.calculateTotal();
                    setInterval(() => this.updateTime(), 1000);
                },

                updateTime() {
                    const n = new Date();
                    this.mTime = new Intl.DateTimeFormat('tr-TR', { hour: '2-digit', minute: '2-digit', second:'2-digit', timeZone: 'Europe/Istanbul' }).format(n);
                    this.bTime = new Intl.DateTimeFormat('tr-TR', { hour: '2-digit', minute: '2-digit', second:'2-digit', timeZone: 'America/Sao_Paulo' }).format(n);
                    this.todayDate = n.toLocaleDateString('tr-TR', { day:'numeric', month:'long', year:'numeric', weekday:'long' });
                },

                calculateTotal() {
                    this.totalReads = this.newsData.reduce((s, i) => s + (i.views || 0), 0) + this.authors.reduce((s, i) => s + (i.reads || 0), 0);
                },

                handleUpload(e) {
                    const file = e.target.files[0];
                    const reader = new FileReader();
                    reader.onloadend = () => { 
                        if(this.formType === 'news') this.formData.img = reader.result;
                        else this.formData.photo = reader.result;
                    }
                    if(file) reader.readAsDataURL(file);
                },

                addCategory() {
                    if(this.newCatName) {
                        this.categories.push(this.newCatName);
                        this.newCatName = '';
                        this.sync();
                    }
                },

                loginAdmin() {
                    if (prompt("Terminal Şifresi:") === "Mardin47**") this.currentPage = 'admin';
                },

                saveData() {
                    if(this.formType === 'news') {
                        if(this.isEdit) this.newsData[this.editIdx] = {...this.formData};
                        else this.newsData.unshift({...this.formData, views: 0, date: new Date().toLocaleDateString('tr-TR')});
                    } else if(this.formType === 'author') {
                        if(this.isEdit) this.authors[this.editIdx] = {...this.formData};
                        else this.authors.push({...this.formData, reads: 0});
                    }
                    this.sync();
                    this.resetForm();
                    alert("Sistem Güncellendi!");
                },

                editData(type, idx) {
                    this.formType = type;
                    this.isEdit = true;
                    this.editIdx = idx;
                    this.formData = type === 'news' ? {...this.newsData[idx]} : {...this.authors[idx]};
                    window.scrollTo({top: 0, behavior: 'smooth'});
                },

                deleteData(type, idx) {
                    if(confirm("Siliniyor?")) {
                        if(type === 'news') this.newsData.splice(idx, 1);
                        else this.authors.splice(idx, 1);
                        this.sync();
                    }
                },

                resetForm() {
                    this.formData = { title:'', tag:'', body:'', img:'', name:'', bio:'', photo:'', region:'Global' };
                    this.isEdit = false;
                    this.editIdx = null;
                },

                sync() {
                    localStorage.setItem('asc_v14_news', JSON.stringify(this.newsData));
                    localStorage.setItem('asc_v14_authors', JSON.stringify(this.authors));
                    localStorage.setItem('asc_v14_cats', JSON.stringify(this.categories));
                    this.calculateTotal();
                },

                openNews(news) {
                    news.views++;
                    this.selectedNews = news;
                    this.currentPage = 'news-detail';
                    this.sync();
                    window.scrollTo(0,0);
                },

                openAuthor(author) {
                    author.reads++;
                    this.selectedAuthor = author;
                    this.currentPage = 'author-detail';
                    this.sync();
                    window.scrollTo(0,0);
                }
            }
        }
    </script>
</body>
</html>
