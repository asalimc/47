<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERIDIAN PORTAL | Master Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --meridian-orange: #f59e0b; 
            --meridian-dark: #0f172a;
            --gold-gradient: linear-gradient(45deg, #d4af37, #f7e7ce, #b8860b);
        }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; color: var(--meridian-dark); }
        .meridian-header { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }
        
        /* Yazarların Altın Çerçeve Tasarımı (Görseldeki gibi) */
        .author-circle-wrapper {
            position: relative;
            width: 80px; height: 80px;
            padding: 4px;
            background: var(--gold-gradient);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .author-circle-img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--meridian-dark);
        }

        /* Admin Kartları */
        .glass-ui { background: rgba(255,255,255,0.9); backdrop-blur: 10px; border-radius: 2rem; border: 1px solid white; }
        .view-node { display: none; animation: slideUp 0.4s ease-out; }
        .active-view { display: block; }
        @keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
        
        /* Modern Scroll */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--meridian-orange); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="h-14 bg-[#f59e0b] flex items-center justify-center shadow-lg">
        <h1 class="meridian-header text-xl font-black text-black uppercase">MERIDIAN PORTAL</h1>
    </div>

    <header class="h-20 bg-white border-b sticky top-0 z-50 flex items-center px-8 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div onclick="router('home')" class="cursor-pointer flex items-center gap-3">
                <div class="w-10 h-10 bg-black rounded-lg flex items-center justify-center text-white font-black italic">M</div>
                <span class="text-xl font-black tracking-tighter">MSP<span class="text-orange-500">.</span>GLOBAL</span>
            </div>
            <div class="flex gap-4">
                <button onclick="router('home')" class="text-xs font-bold uppercase hover:text-orange-500 transition">Portal</button>
                <button onclick="router('admin')" class="bg-black text-white text-[10px] font-black px-6 py-3 rounded-full hover:bg-orange-500 transition uppercase tracking-widest">DashBoard</button>
            </div>
        </div>
    </header>

    <main id="view-home" class="view-node active-view container mx-auto px-4 py-10">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div class="lg:col-span-8 grid grid-cols-1 md:grid-cols-2 gap-8" id="news-grid">
                </div>

            <aside class="lg:col-span-4 space-y-8">
                <div class="glass-ui p-8 shadow-xl">
                    <div class="flex items-center gap-3 mb-8 border-l-4 border-orange-500 pl-4">
                        <h3 class="text-sm font-black uppercase tracking-widest">KÖŞE YAZARLARI</h3>
                    </div>
                    <div id="author-grid" class="space-y-6">
                        </div>
                </div>

                <div id="ad-banner" class="rounded-[2.5rem] overflow-hidden shadow-2xl relative h-96">
                    </div>
            </aside>
        </div>
    </main>

    <main id="view-admin" class="view-node min-h-screen bg-slate-900 text-white">
        <div class="flex h-screen overflow-hidden">
            <nav class="w-64 bg-black p-8 flex flex-col gap-2">
                <p class="text-[10px] font-black text-slate-600 uppercase mb-10 tracking-[0.3em]">Meridian Admin</p>
                <button onclick="setMod('haber')" id="m-haber" class="p-4 rounded-xl text-left font-bold text-xs uppercase hover:bg-orange-500 transition">Haber Yönetimi</button>
                <button onclick="setMod('yazar')" id="m-yazar" class="p-4 rounded-xl text-left font-bold text-xs uppercase hover:bg-orange-500 transition">Yazar Kadrosu</button>
                <button onclick="setMod('reklam')" id="m-reklam" class="p-4 rounded-xl text-left font-bold text-xs uppercase hover:bg-orange-500 transition">Reklam Slotları</button>
                <button onclick="router('home')" class="mt-auto p-4 bg-orange-500 text-black font-black text-[10px] rounded-xl uppercase">Portala Dön</button>
            </nav>

            <section class="flex-1 p-12 overflow-y-auto">
                <div class="flex justify-between items-center mb-10">
                    <h2 id="adm-title" class="text-4xl font-black italic uppercase">Modül</h2>
                    <button onclick="openModal()" class="bg-white text-black px-8 py-4 rounded-xl font-black text-xs hover:bg-orange-500 transition tracking-widest">+ YENİ KAYIT</button>
                </div>
                
                <div class="bg-white/5 rounded-3xl p-6 border border-white/10">
                    <table class="w-full text-left">
                        <thead class="text-orange-500 text-[10px] font-black uppercase border-b border-white/10">
                            <tr><th class="p-4">Görsel</th><th class="p-4">Başlık / İsim</th><th class="p-4 text-right">İşlemler</th></tr>
                        </thead>
                        <tbody id="adm-tbody" class="divide-y divide-white/5"></tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <main id="view-detail" class="view-node container mx-auto px-4 py-16 max-w-4xl">
        <button onclick="router('home')" class="mb-10 text-[10px] font-black uppercase text-orange-500 tracking-widest">← Geri Dön</button>
        <div id="detail-render"></div>
    </main>

    <div id="modal" class="fixed inset-0 z-[100] bg-black/90 backdrop-blur-xl flex items-center justify-center p-6 hidden">
        <div class="bg-white text-black w-full max-w-xl rounded-[3rem] p-10 shadow-2xl relative overflow-y-auto max-h-[90vh]">
            <h3 class="text-2xl font-black italic mb-8 border-b pb-4">Meridian İçerik Girişi</h3>
            <div class="space-y-5">
                <div class="relative group h-40 bg-slate-100 rounded-3xl overflow-hidden flex items-center justify-center border-2 border-dashed">
                    <img id="prev" src="" class="absolute inset-0 w-full h-full object-cover hidden">
                    <input type="file" onchange="encode(event)" class="opacity-0 absolute inset-0 cursor-pointer">
                    <span class="text-[10px] font-black uppercase text-slate-400">Resim Seç (PC'den)</span>
                </div>
                
                <select id="in-loc" class="w-full p-4 bg-slate-100 rounded-2xl font-bold text-xs outline-none">
                    <option value="Mardin">Mardin Sütunu</option>
                    <option value="Brezilya">Brezilya Sütunu</option>
                </select>

                <input id="in-title" type="text" placeholder="Başlık veya İsim" class="w-full p-5 bg-slate-100 rounded-2xl font-black outline-none border-none">
                <textarea id="in-text" placeholder="İçerik detayı..." class="w-full p-5 bg-slate-100 rounded-2xl h-32 outline-none border-none"></textarea>
                <input id="in-sub" type="text" placeholder="Alt Başlık / Kategori / Branş" class="w-full p-5 bg-slate-100 rounded-2xl text-xs font-bold outline-none border-none">
            </div>
            <div class="mt-10 flex gap-4">
                <button onclick="closeModal()" class="flex-1 font-bold text-slate-400">VAZGEÇ</button>
                <button onclick="save()" class="flex-[2] bg-black text-white p-5 rounded-2xl font-black uppercase text-xs hover:bg-orange-500 transition">KAYDET VE SENKRONİZE ET</button>
            </div>
        </div>
    </div>

    <script>
        // MASTER DATABASE (KALICI HAFIZA)
        let masterDB = JSON.parse(localStorage.getItem('meridian_v10')) || { haber: [], yazar: [], reklam: [] };
        let activeMod = 'haber';
        let editingId = null;
        let imgTemp = "";

        function router(v) {
            document.querySelectorAll('.view-node').forEach(n => n.classList.remove('active-view'));
            document.getElementById('view-'+v).classList.add('active-view');
            if(v==='home') renderHome();
            if(v==='admin') renderAdmin();
            window.scrollTo(0,0);
        }

        function encode(e) {
            const r = new FileReader();
            r.onload = () => { imgTemp = r.result; document.getElementById('prev').src = imgTemp; document.getElementById('prev').classList.remove('hidden'); };
            r.readAsDataURL(e.target.files[0]);
        }

        // ADMIN ENGINE
        function setMod(m) {
            activeMod = m;
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('bg-orange-500', 'text-black'));
            document.getElementById('m-'+m).classList.add('bg-orange-500', 'text-black');
            document.getElementById('adm-title').innerText = m.toUpperCase() + " YÖNETİMİ";
            renderAdmin();
        }

        function renderAdmin() {
            const tbody = document.getElementById('adm-tbody');
            tbody.innerHTML = '';
            masterDB[activeMod].forEach(item => {
                tbody.innerHTML += `
                    <tr>
                        <td class="p-4"><img src="${item.img}" class="w-12 h-12 rounded-lg object-cover"></td>
                        <td class="p-4"><p class="font-bold text-sm">${item.title}</p><p class="text-[9px] opacity-40 uppercase">${item.loc || ''}</p></td>
                        <td class="p-4 text-right">
                            <button onclick="editItem('${item.id}')" class="text-blue-400 mr-4 hover:text-white"><i class="fas fa-edit"></i></button>
                            <button onclick="delItem('${item.id}')" class="text-red-500 hover:text-white"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
            });
        }

        function save() {
            const data = {
                id: editingId || 'UID' + Date.now(),
                title: document.getElementById('in-title').value,
                text: document.getElementById('in-text').value,
                sub: document.getElementById('in-sub').value,
                loc: document.getElementById('in-loc').value,
                img: imgTemp || 'https://via.placeholder.com/800'
            };

            if(editingId) {
                const idx = masterDB[activeMod].findIndex(x => x.id === editingId);
                masterDB[activeMod][idx] = data;
            } else {
                masterDB[activeMod].unshift(data);
            }

            localStorage.setItem('meridian_v10', JSON.stringify(masterDB));
            closeModal();
            renderAdmin();
        }

        function delItem(id) {
            if(confirm('Veriyi kalıcı olarak silmek istiyor musunuz?')) {
                masterDB[activeMod] = masterDB[activeMod].filter(x => x.id !== id);
                localStorage.setItem('meridian_v10', JSON.stringify(masterDB));
                renderAdmin();
            }
        }

        function editItem(id) {
            editingId = id;
            const item = masterDB[activeMod].find(x => x.id === id);
            document.getElementById('in-title').value = item.title;
            document.getElementById('in-text').value = item.text;
            document.getElementById('in-sub').value = item.sub;
            imgTemp = item.img;
            document.getElementById('prev').src = item.img;
            document.getElementById('prev').classList.remove('hidden');
            document.getElementById('modal').classList.remove('hidden');
        }

        // PORTAL RENDER ENGINE
        function renderHome() {
            const nGrid = document.getElementById('news-grid');
            const aGrid = document.getElementById('author-grid');
            const rBox = document.getElementById('ad-banner');

            nGrid.innerHTML = ''; aGrid.innerHTML = '';

            masterDB.haber.forEach(h => {
                nGrid.innerHTML += `
                <div onclick="openDetail('haber','${h.id}')" class="bg-white rounded-[2.5rem] p-6 shadow-sm hover:shadow-2xl transition-all cursor-pointer group border border-slate-100">
                    <img src="${h.img}" class="w-full h-52 object-cover rounded-[2rem] mb-6 group-hover:scale-95 transition duration-500">
                    <span class="text-[9px] font-black uppercase tracking-widest px-3 py-1 rounded-full ${h.loc === 'Mardin' ? 'bg-orange-500 text-black' : 'bg-slate-900 text-white'}">${h.loc}</span>
                    <h3 class="text-xl font-black mt-4 leading-tight">${h.title}</h3>
                    <p class="text-[10px] font-bold text-slate-400 mt-2 uppercase">${h.sub}</p>
                </div>`;
            });

            masterDB.yazar.forEach(y => {
                aGrid.innerHTML += `
                <div onclick="openDetail('yazar','${y.id}')" class="flex items-center gap-5 group cursor-pointer p-2 hover:bg-slate-50 rounded-3xl transition">
                    <div class="author-circle-wrapper">
                        <img src="${y.img}" class="author-circle-img">
                    </div>
                    <div>
                        <h4 class="text-[11px] font-black uppercase text-slate-800 group-hover:text-orange-500 transition">${y.title}</h4>
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">${y.sub}</p>
                    </div>
                </div>`;
            });

            if(masterDB.reklam.length > 0) {
                const r = masterDB.reklam[0];
                rBox.innerHTML = `
                <img src="${r.img}" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black p-8 flex flex-col justify-end text-white">
                    <h4 class="text-2xl font-black italic">${r.title}</h4>
                    <p class="text-xs opacity-60 mt-2">${r.sub}</p>
                </div>`;
            }
        }

        function openDetail(type, id) {
            const item = masterDB[type].find(x => x.id === id);
            const render = document.getElementById('detail-render');
            if(type === 'haber') {
                render.innerHTML = `
                    <h1 class="text-5xl font-black mb-10 leading-tight tracking-tighter">${item.title}</h1>
                    <img src="${item.img}" class="w-full rounded-[3.5rem] shadow-2xl mb-12 border-[12px] border-white">
                    <div class="text-xl leading-relaxed text-slate-700 font-medium">${item.text}</div>`;
            } else {
                render.innerHTML = `
                    <div class="flex flex-col md:flex-row gap-16 items-center">
                        <div class="author-circle-wrapper !w-64 !h-64 shadow-2xl">
                            <img src="${item.img}" class="author-circle-img">
                        </div>
                        <div class="flex-1">
                            <h1 class="text-5xl font-black mb-4">${item.title}</h1>
                            <p class="text-orange-500 font-black uppercase tracking-[0.3em] text-sm mb-8">${item.sub}</p>
                            <div class="text-xl italic text-slate-600 border-l-4 border-orange-500 pl-8">${item.text}</div>
                        </div>
                    </div>`;
            }
            router('detail');
        }

        function openModal() { 
            editingId = null; imgTemp = ""; 
            document.getElementById('prev').classList.add('hidden');
            document.querySelectorAll('#modal input, #modal textarea').forEach(i => i.value = '');
            document.getElementById('modal').classList.remove('hidden'); 
        }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        window.onload = () => { renderHome(); setMod('haber'); };
    </script>
</body>
</html>
