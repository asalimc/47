<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mardin Brazil Journal</title>
    <style>
        :root { --primary: #f39c12; --bg: #121212; --card-bg: #1e1e1e; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        header { text-align: center; padding: 40px 0; border-bottom: 1px solid #333; margin-bottom: 40px; }
        h1 { font-family: 'Georgia', serif; color: var(--primary); font-size: 2.8rem; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid #2a2a2a; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-content { padding: 15px; }
        .tag { color: var(--primary); font-size: 11px; font-weight: bold; text-transform: uppercase; }
        h2 { margin: 10px 0 0; font-size: 1.3rem; color: #fff; }
        .error-msg { color: #ff6b6b; text-align: center; padding: 20px; background: #2c1a1a; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="container">
        <header><h1>Mardin Brazil Journal</h1></header>
        <div id="main-grid" class="grid">
            <p id="loader">Veritabanına bağlanılıyor...</p>
        </div>
    </div>

    <script>
        async function loadData() {
            const grid = document.getElementById('main-grid');
            
            // DİKKAT: URL'nin sonundaki /neondb kısmını ve parametreleri kontrol et
            const url = 'https://ep-plain-block-aicnajey.us-east-1.aws.neon.tech/v1/sql';
            const token = 'npg_UqmxRMF6zyb2';

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        // SQL sorgusunu bu şekilde gönderiyoruz
                        sql: "SELECT * FROM articles ORDER BY id DESC;"
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.message || 'Bağlantı hatası');
                }

                const data = await response.json();
                
                // Neon v1/sql API'si sonucu 'rows' içinde döndürür
                if (!data.rows || data.rows.length === 0) {
                    grid.innerHTML = "<p>Henüz veri eklenmemiş.</p>";
                    return;
                }

                grid.innerHTML = data.rows.map(item => `
                    <div class="card">
                        <img src="${item.img || 'https://via.placeholder.com/300'}" alt="Görsel">
                        <div class="card-content">
                            <span class="tag">${item.tag || 'HABER'}</span>
                            <h2>${item.tr || 'Başlık Yok'}</h2>
                        </div>
                    </div>
                `).join('');

            } catch (err) {
                console.error("Hata ayrıntısı:", err);
                grid.innerHTML = `<div class="error-msg">Bağlantı Hatası: ${err.message}</div>`;
            }
        }

        loadData();
    </script>
</body>
</html>
