<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MB | Mardin Brazil Journal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@700;900&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F8F6F2; --ink: #1A1A1A; --white: #FFFFFF; }
        body { background: var(--bg); color: var(--ink); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; overflow-x: hidden; }
        header { padding: 20px 6%; display: flex; align-items: center; background: rgba(248, 246, 242, 0.95); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(0,0,0,0.05); backdrop-filter: blur(10px); }
        .logo-box { display: flex; align-items: center; text-decoration: none; color: var(--ink); }
        .logo-m { background: var(--ink); color: var(--bg); padding: 0 10px; border-radius: 8px; margin-right: 12px; font-family: 'Bodoni Moda', serif; font-weight: 900; font-size: 1.5rem; }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 6%; }
        .bento { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .card { background: var(--white); border-radius: 35px; padding: 40px; border: 1px solid rgba(0,0,0,0.05); cursor: pointer; transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1); position: relative; overflow: hidden; min-height: 450px; display: flex; flex-direction: column; justify-content: flex-end; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 30px 60px rgba(0,0,0,0.1); }
        .card-bg { position: absolute; inset: 0; background-size: cover; background-position: center; z-index: 0; transition: 0.5s; }
        .card-overlay { position: absolute; inset: 0; background: linear-gradient(transparent, rgba(0,0,0,0.85)); z-index: 1; }
        .card-content { position: relative; z-index: 2; color: white; }
        .author-card { background: white; color: var(--ink); justify-content: center; align-items: center; text-align: center; }
        .author-img { width: 140px; height: 140px; border-radius: 70px; margin-bottom: 25px; object-fit: cover; border: 5px solid var(--bg); position: relative; z-index: 2; }
    </style>
</head>
<body>

    <header>
        <div class="logo-box">
            <div class="logo-m">MB</div>
            <div style="font-family:'Bodoni Moda', serif; font-weight:900; letter-spacing:1px;">MARDIN BRAZIL</div>
        </div>
    </header>

    <main class="container">
        <div class="bento" id="main-grid">
            <p style="text-align:center; grid-column: 1/-1; padding: 50px;">Arşiv yükleniyor...</p>
        </div>
    </main>

    <script>
        // Supabase Bağlantı Bilgileri
        const _u = "https://toomlocgdhkwrypuveof.supabase.co";
        const _m = "ZXlKaGJHY2lPaUpJVXpJMk5pSXNJblI1Y0NJNklrcFhWQ0o5LmV5SnBjU01pT2lKemRYQmhiR0Z6WlNJc0luSmxaaUk2SW5SdmIyMXNiMjVuWkdoｃｍQzSjVjSFYyWlc5bklpd2ljbTlzWlNJNkltRnViMjRpTENKcG群众R2NpT2pFM056STJOamcwT0RRc0ltVjRjQ0k2TWpBNE9ESTBORFE0TkgwLmtraXdLVHNmWU9DSUlfZGZ1SnBhRWx5SnF4VGhya0duS2lLNy1Sak9zcUk=";
        
        // Anahtarı güvenli şekilde çöz
        const key = atob(_m.replace(/[^A-Za-z0-9+/=]/g, ""));
        const client = supabase.createClient(_u, key);

        async function init() {
            try {
                // 'articles' tablosundaki verileri çek
                const { data, error } = await client
                    .from('articles')
                    .select('*');
                
                if (error) throw error;

                if (!data || data.length === 0) {
                    document.getElementById('main-grid').innerHTML = "Henüz içerik eklenmemiş.";
                    return;
                }

                // Bento Grid'i verilerle oluştur
                document.getElementById('main-grid').innerHTML = data.map(item => `
                    <div class="card ${item.type === 'author' ? 'author-card' : ''}">
                        ${item.type !== 'author' ? `
                            <div class="card-bg" style="background-image:url('${item.img}')"></div>
                            <div class="card-overlay"></div>
                        ` : `
                            <img src="${item.img}" class="author-img">
                        `}
                        <div class="card-content" style="${item.type === 'author' ? 'color:var(--ink)' : ''}">
                            <h2 style="margin:0; font-family:'Bodoni Moda', serif; font-size:1.8rem;">${item.tr}</h2>
                            <p style="opacity:0.7; font-size:0.9rem; margin-top:10px;">${item.tag}</p>
                        </div>
                    </div>
                `).join('');

            } catch (err) {
                console.error("Hata ayrıntısı:", err);
                document.getElementById('main-grid').innerHTML = "Bağlantı Hatası: " + err.message;
            }
        }

        init();
    </script>
</body>
</html>
