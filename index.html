<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASC GLOBAL | Dark High-Contrast v22</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:wght@700;900&display=swap');
        
        :root { 
            --deep-navy: #0f172a; 
            --pure-black: #000000;
            --pure-white: #ffffff;
            --brand-gold: #c5a358;
            --error-red: #dc2626;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f1f5f9; 
            color: var(--pure-black); 
            line-height: 1.5;
        }

        .font-serif { font-family: 'Playfair Display', serif; }

        /* OKUNABİLİRLİK ZORUNLULUĞU: TÜM YAZILAR SİYAH */
        h1, h2, h3, h4, p, span, label { color: var(--pure-black) !important; }
        .text-white { color: var(--pure-white) !important; } /* Sadece koyu zemin üzerindekiler beyaz */

        /* ADMIN GİRİŞ ALANLARI - NET VE KESKİN */
        .admin-input {
            background: var(--pure-white) !important;
            color: var(--pure-black) !important;
            border: 3px solid var(--pure-black) !important;
            font-weight: 700 !important;
            font-size: 16px !important;
            padding: 12px !important;
            border-radius: 8px !important;
            width: 100%;
        }

        .admin-input:focus {
            border-color: var(--brand-gold) !important;
            outline: none;
        }

        /* REKLAM KUTUSU */
        .ad-frame {
            width: 300px;
            height: 300px;
            background: var(--pure-white);
            border: 4px solid var(--pure-black);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 10px 10px 0px var(--pure-black);
        }
        .ad-frame img { max-width: 100%; max-height: 100%; object-fit: contain; }

        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="ascEngine()" x-init="init()">

    <nav class="bg-white border-b-4 border-black p-6 flex justify-between items-center sticky top-0 z-[100]">
        <div @click="currentPage = 'home'" class="flex items-center gap-4 cursor-pointer">
            <div class="bg-black text-white w-12 h-12 flex items-center justify-center rounded font-black text-2xl">A</div>
            <h1 class="font-serif text-3xl font-black uppercase tracking-tighter">ASC <span class="text-yellow-600">GLOBAL</span></h1>
        </div>
        <button @click="openAdmin()" class="bg-black text-white px-8 py-3 rounded font-black text-sm uppercase border-2 border-black hover:bg-yellow-600 hover:text-black transition-all">
            ADMİN PANELİ
        </button>
    </nav>

    <main x-show="currentPage === 'home'" x-cloak class="max-w-7xl mx-auto p-6 space-y-12">
        
        <section class="bg-black p-10 rounded-3xl border-4 border-yellow-600 shadow-2xl relative overflow-hidden">
            <h2 class="text-white font-black text-center text-xs tracking-[1em] mb-10 uppercase opacity-70">Meridian Portal</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <template x-for="author in authors" :key="author.id">
                    <div @click="viewItem(author, 'author')" class="bg-zinc-900 border-2 border-yellow-600/50 p-6 rounded-2xl flex items-center gap-6 cursor-pointer hover:border-yellow-600 transition-all group">
                        <img :src="author.photo" class="w-24 h-24 rounded-full object-cover border-4 border-yellow-600 group-hover:scale-105 transition-transform">
                        <div>
                            <p class="text-yellow-600 font-black text-xs uppercase" x-text="author.title"></p>
                            <h3 class="text-white text-3xl font-black" x-text="author.name"></h3>
                        </div>
                    </div>
                </template>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
            <div class="lg:col-span-8 space-y-10">
                <h2 class="text-4xl font-black border-b-8 border-black pb-2 inline-block">GÜNCEL ANALİZLER</h2>
                <div class="grid gap-12">
                    <template x-for="news in newsData" :key="news.id">
                        <article @click="viewItem(news, 'news')" class="cursor-pointer group">
                            <div class="relative overflow-hidden rounded-3xl border-4 border-black mb-6">
                                <img :src="news.img" class="w-full h-[400px] object-cover group-hover:scale-105 transition-all duration-700">
                                <div class="absolute top-4 left-4 bg-black text-white px-4 py-2 font-black text-xs rounded" x-text="news.region"></div>
                            </div>
                            <h3 class="text-4xl font-black leading-tight group-hover:underline" x-text="news.title"></h3>
                        </article>
                    </template>
                </div>
            </div>

            <div class="lg:col-span-4 space-y-12">
                <div>
                    <h4 class="font-black text-xs uppercase mb-4 text-center">İş Ortağı Reklamı</h4>
                    <div class="ad-frame mx-auto">
                        <img :src="adImage || 'https://via.placeholder.com/300x300?text=REKLAM+ALANI'" alt="Reklam">
                    </div>
                </div>

                <div class="bg-white border-4 border-black p-8 rounded-3xl shadow-xl">
                    <div class="flex items-center gap-2 mb-6">
                        <div class="w-3 h-3 bg-red-600 rounded-full animate-pulse"></div>
                        <h4 class="font-black text-sm uppercase">Canlı Bilgi Akışı</h4>
                    </div>
                    <ul class="space-y-4 font-bold text-sm">
                        <li class="border-b-2 border-gray-100 pb-2">● Artuklu Sarayı Raporu Tamamlandı</li>
                        <li class="border-b-2 border-gray-100 pb-2">● Brezilya Ticaret Heyeti Mardin'de</li>
                        <li>● Yeni Lojistik Merkezi Onaylandı</li>
                    </ul>
                </div>
            </div>
        </div>
    </main>

    <div x-show="currentPage === 'admin'" class="fixed inset-0 z-[2000] bg-white overflow-y-auto p-10" x-cloak>
        <div class="max-w-4xl mx-auto">
            <div class="flex justify-between items-center border-b-4 border-black pb-8 mb-10">
                <h2 class="text-4xl font-black uppercase">SİSTEM YÖNETİMİ</h2>
                <div class="flex gap-4">
                    <button @click="adminTab = 'news'" class="bg-black text-white px-6 py-2 font-black rounded">HABER</button>
                    <button @click="adminTab = 'authors'" class="bg-black text-white px-6 py-2 font-black rounded">YAZAR</button>
                    <button @click="adminTab = 'ads'" class="bg-yellow-600 text-black px-6 py-2 font-black rounded">REKLAM</button>
                    <button @click="currentPage = 'home'" class="bg-red-600 text-white px-6 py-2 font-black rounded">KAPAT</button>
                </div>
            </div>

            <div x-show="adminTab === 'ads'" class="text-center py-10">
                <div class="ad-frame mx-auto mb-8">
                    <img :src="adImage">
                </div>
                <input type="file" @change="handleAdUpload" id="adFile" class="hidden">
                <label for="adFile" class="bg-black text-white px-10 py-5 rounded-xl font-black cursor-pointer inline-block text-xl">FOTOĞRAF SEÇ VE YÜKLE</label>
            </div>

            <div x-show="adminTab !== 'ads'" class="space-y-8 bg-gray-50 p-10 rounded-3xl border-4 border-black">
                <div>
                    <label class="block font-black text-sm mb-2 uppercase">BAŞLIK VEYA İSİM</label>
                    <input x-model="form.main" type="text" class="admin-input" placeholder="Buraya yazın...">
                </div>
                <div>
                    <label class="block font-black text-sm mb-2 uppercase">BÖLGE VEYA ÜNVAN</label>
                    <input x-model="form.sub" type="text" class="admin-input" placeholder="Örn: Mardin / Siyaset Bilimci">
                </div>
                <div>
                    <label class="block font-black text-sm mb-2 uppercase">DETAYLI METİN İÇERİĞİ</label>
                    <textarea x-model="form.content" class="admin-input h-48" placeholder="İçeriği buraya girin..."></textarea>
                </div>
                <div>
                    <label class="block font-black text-sm mb-2 uppercase">GÖRSEL (DOSYA)</label>
                    <input type="file" @change="handleFile" class="w-full font-bold">
                </div>
                <button @click="save()" class="w-full bg-black text-white py-6 rounded-2xl font-black text-2xl hover:bg-yellow-600 hover:text-black transition-all shadow-xl">VERİYİ KAYDET</button>
            </div>

            <div x-show="adminTab !== 'ads'" class="mt-12 space-y-4">
                <template x-for="item in (adminTab === 'news' ? newsData : authors)" :key="item.id">
                    <div class="bg-white border-2 border-black p-4 rounded-xl flex justify-between items-center shadow-md">
                        <div class="flex items-center gap-4 text-black font-black">
                            <img :src="item.img || item.photo" class="w-12 h-12 rounded object-cover border-2 border-black">
                            <span x-text="item.title || item.name"></span>
                        </div>
                        <button @click="deleteItem(item.id)" class="text-red-600 font-black uppercase text-xs">SİL</button>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <div x-show="currentPage === 'reader'" class="fixed inset-0 z-[3000] bg-white overflow-y-auto p-6 md:p-20" x-cloak>
        <button @click="currentPage = 'home'" class="fixed top-10 right-10 bg-black text-white w-14 h-14 rounded-full font-black text-2xl shadow-2xl">X</button>
        <div class="max-w-4xl mx-auto">
            <p class="text-yellow-600 font-black text-xl mb-4" x-text="selectedItem?.region || selectedItem?.title"></p>
            <h1 class="font-serif text-6xl md:text-8xl font-black mb-12 leading-none" x-text="selectedItem?.title || selectedItem?.name"></h1>
            <img :src="selectedItem?.img || selectedItem?.photo" class="w-full h-auto rounded-[50px] border-8 border-black mb-16 shadow-2xl">
            <div class="text-2xl font-bold leading-relaxed text-black space-y-8" x-html="selectedItem?.body || selectedItem?.bio"></div>
        </div>
    </div>

    <script>
        function ascEngine() {
            return {
                currentPage: 'home', adminTab: 'news', editingId: null, selectedItem: null,
                form: { main: '', sub: '', content: '', media: '' },
                adImage: localStorage.getItem('asc_ad_v22') || '',
                
                newsData: JSON.parse(localStorage.getItem('asc_news_v22')) || [
                    { id: 1, title: 'Mardin - Sao Paulo Ticaret Hattı Açıldı', region: 'Mardin / TR', body: 'Küresel ticaretin yeni kalbi olan bu hat bugün resmi törenle hizmete girdi...', img: 'https://images.unsplash.com/photo-1582236894056-e918b9588667?w=1600' }
                ],
                authors: JSON.parse(localStorage.getItem('asc_authors_v22')) || [
                    { id: 1, name: 'Ahmet Çınarbaş', title: 'Siyaset Bilimci', bio: 'Küresel jeopolitik analizler uzmanı.', photo: 'https://i.ibb.co/LhqZz4H/ahmet.jpg' },
                    { id: 2, name: 'M. Beşir Ayanoğlu', title: 'Hukukçu', bio: 'Uluslararası hukuk ve kurumsal yönetim danışmanı.', photo: 'https://i.ibb.co/vYm6D6T/besir.jpg' }
                ],

                init() { this.sync(); },
                openAdmin() { if(prompt("GÜVENLİK KODU:") === "47") this.currentPage = 'admin'; },
                
                handleFile(e) {
                    const reader = new FileReader();
                    reader.onload = (f) => this.form.media = f.target.result;
                    reader.readAsDataURL(e.target.files[0]);
                },
                handleAdUpload(e) {
                    const reader = new FileReader();
                    reader.onload = (f) => {
                        this.adImage = f.target.result;
                        localStorage.setItem('asc_ad_v22', this.adImage);
                    };
                    reader.readAsDataURL(e.target.files[0]);
                },

                save() {
                    const isNews = this.adminTab === 'news';
                    const payload = isNews ? 
                        { id: Date.now(), title: this.form.main, region: this.form.sub, body: this.form.content, img: this.form.media } :
                        { id: Date.now(), name: this.form.main, title: this.form.sub, bio: this.form.content, photo: this.form.media };

                    if (isNews) this.newsData.unshift(payload);
                    else this.authors.push(payload);
                    
                    this.sync(); this.resetForm();
                    alert("Kayıt Başarılı!");
                },

                deleteItem(id) {
                    if(confirm('Veriyi silelim mi?')) {
                        if(this.adminTab === 'news') this.newsData = this.newsData.filter(n => n.id !== id);
                        else this.authors = this.authors.filter(a => a.id !== id);
                        this.sync();
                    }
                },

                viewItem(item) { this.selectedItem = item; this.currentPage = 'reader'; window.scrollTo(0,0); },
                sync() { 
                    localStorage.setItem('asc_news_v22', JSON.stringify(this.newsData)); 
                    localStorage.setItem('asc_authors_v22', JSON.stringify(this.authors)); 
                },
                resetForm() { this.form = { main: '', sub: '', content: '', media: '' }; }
            }
        }
    </script>
</body>
</html>
