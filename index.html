<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARDIN | BRAZIL - Intelligent Interface 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;1,400&family=Montserrat:wght@300;700;900&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --mardin: #d4a373; --brazil: #009b3a; --ocean: #002776; --dark: #050505; 
            --white: #ffffff; --accent: #ff003c;
            --dynamic-weight: 900;
        }

        /* --- THEMES --- */
        body.theme-mardin { --theme-accent: var(--mardin); --bg: #fdfaf5; }
        body.theme-brazil { --theme-accent: var(--brazil); --bg: #f5fdf7; }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        
        body { 
            background: var(--bg, #fafaf9); font-family: 'Montserrat', sans-serif; 
            color: var(--dark); overflow-x: hidden; transition: background 1s ease;
        }

        /* --- 2. GLASSMORPHISM TICKER (Responsive) --- */
        .glass-ticker {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            width: 95%; max-width: 1200px; padding: 12px 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px; z-index: 5000;
            display: flex; overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
        }
        .ticker-content { 
            display: flex; white-space: nowrap; font-size: clamp(8px, 1.5vw, 10px); 
            font-weight: 900; letter-spacing: 2px; color: var(--dark);
            animation: ticker-move 30s linear infinite;
        }
        @keyframes ticker-move { 0% { transform: translateX(10%); } 100% { transform: translateX(-100%); } }

        /* --- 3. MAGNETIC CURSOR (Hidden on Mobile) --- */
        #cursor-dot { position: fixed; width: 6px; height: 6px; background: var(--dark); border-radius: 50%; pointer-events: none; z-index: 10000; }
        #cursor-outline {
            position: fixed; width: 40px; height: 40px; border: 1.5px solid var(--dark);
            border-radius: 50%; pointer-events: none; z-index: 9999;
            transition: width 0.3s, height 0.3s, background 0.3s, border 0.3s;
        }
        @media (max-width: 1024px) { #cursor-dot, #cursor-outline { display: none; } * { cursor: auto; } }

        /* --- 4. DATA-DRIVEN TYPOGRAPHY (Responsive) --- */
        header { 
            padding: clamp(100px, 15vh, 180px) 5% 40px; 
            display: flex; justify-content: space-between; align-items: flex-end; 
        }
        .brand-title { 
            font-family: 'Playfair Display'; font-size: clamp(3rem, 12vw, 10rem); 
            line-height: 0.8; letter-spacing: -0.05em; 
        }
        .brand-title span { font-weight: var(--dynamic-weight); transition: font-weight 0.5s ease; }

        /* --- MASTER WRAPPER (Responsive Grid) --- */
        .master-wrapper { 
            padding: 0 5% 80px; 
            display: grid; grid-template-columns: repeat(12, 1fr); gap: 30px; 
        }

        .featured-mask { 
            grid-column: span 12; height: 60vh; position: relative; 
            border-radius: 40px; overflow: hidden; 
        }
        @media (min-width: 1024px) { .featured-mask { grid-column: span 8; height: 85vh; border-radius: 60px; } }

        .featured-mask img { width: 100%; height: 100%; object-fit: cover; transition: 1.5s ease; opacity: 0; }
        
        .overlay-content {
            position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent 70%);
            padding: clamp(20px, 5vw, 60px); display: flex; flex-direction: column; justify-content: flex-end; color: white;
        }
        .overlay-content h2 { font-family: 'Playfair Display'; font-size: clamp(2rem, 5vw, 4.5rem); line-height: 1; }

        /* --- SIDE STACK (Responsive) --- */
        .mag-stack { grid-column: span 12; display: flex; flex-direction: column; gap: 20px; }
        @media (min-width: 1024px) { .mag-stack { grid-column: span 4; gap: 40px; } }

        .mag-item { 
            background: white; padding: 30px; border-radius: 30px; 
            border: 1px solid rgba(0,0,0,0.05); transition: 0.4s;
        }
        @media (min-width: 1024px) { .mag-item { padding: 40px; border-radius: 40px; } }
        .mag-item:hover { transform: translateY(-10px); border-color: var(--theme-accent); }

        /* Kinetic Background */
        .kinetic-bg { position: fixed; inset: 0; z-index: -1; opacity: 0.4; pointer-events: none; }
    </style>
</head>
<body class="theme-mardin">

    <div id="cursor-dot"></div>
    <div id="cursor-outline"></div>
    <div class="kinetic-bg"></div>

    <div class="glass-ticker">
        <div class="ticker-content" id="dynamic-ticker">
            INITIALIZING GLOBAL SYNERGY... ● FETCHING MARDIN DATA... ● CONNECTING BRAZIL BIOMES... ●
        </div>
    </div>

    <header>
        <div class="brand-title" id="main-brand">MARDIN<br><span id="brazil-text" style="color:var(--brazil)">BRAZIL</span></div>
        <div style="writing-mode: vertical-rl; font-size: 10px; font-weight: 900; letter-spacing: 5px; opacity: 0.3; height: 100px;">
            <span id="local-time">00:00</span> © 2026
        </div>
    </header>

    <div class="master-wrapper">
        <div class="featured-mask" id="main-hero" style="background: #eee;">
            <img src="https://images.unsplash.com/photo-1483728642387-6c3bdd6c93e5?auto=format&fit=crop&w=1600" id="hero-img" onload="this.style.opacity=1">
            <div class="overlay-content">
                <span style="font-size: 10px; font-weight: 900; letter-spacing: 5px; color: var(--mardin); margin-bottom: 15px; display: block;">2026 EDITION</span>
                <h2 id="hero-title">...</h2>
                <p id="hero-desc" style="font-family: 'Lora'; margin-top: 20px; opacity: 0.7; max-width: 500px; font-size: clamp(0.9rem, 1.5vw, 1.1rem);"></p>
            </div>
        </div>

        <div class="mag-stack">
            <div class="mag-item magnetic">
                <span id="tag-1" style="font-weight:900; font-size:10px; color:var(--accent)">CROSS-CULTURE</span>
                <h4 id="title-1" style="font-family: 'Playfair Display'; font-size: 1.8rem; margin-top: 15px;">...</h4>
                <p style="font-size: 13px; color: #666; margin-top: 10px;">Connecting Mesopotamian echoes with Amazonian rhythms.</p>
            </div>
            
            <div class="mag-item magnetic" style="background:var(--ocean); color:white; border:none;">
                <span style="font-weight:900; font-size:10px; opacity: 0.8;">BRAZIL REPORT</span>
                <h4 id="title-2" style="font-family: 'Playfair Display'; font-size: 1.8rem; margin-top: 15px;">...</h4>
                <p style="font-size: 13px; opacity: 0.7; margin-top: 10px;">Exploring the digital future of the Southern Hemisphere.</p>
            </div>
        </div>
    </div>

    <script>
        const dot = document.getElementById('cursor-dot');
        const outline = document.getElementById('cursor-outline');
        
        // --- 1. LOCAL INTELLIGENCE & 4. TYPOGRAPHY ---
        async function initIntelligence() {
            // Dil ve Konum Simülasyonu
            const userLang = navigator.language.startsWith('tr') ? 'tr' : 'en';
            const isBrazilContext = Math.random() > 0.5; // Demo için rastgele tema seçimi
            
            // Hava Durumu/Sıcaklık Verisi (Tipografi için)
            const temp = isBrazilContext ? 29 : 18; 
            
            // Tema ve Tipografi
            document.body.className = isBrazilContext ? "theme-brazil" : "theme-mardin";
            const weight = Math.min(900, Math.max(300, temp * 28));
            document.documentElement.style.setProperty('--dynamic-weight', weight);

            const content = {
                tr: { 
                    hero: "Kadim Topraklar, Yeni Dünyalar",
                    desc: "Mardin'in taş işçiliği ile Brezilya'nın biyolojik çeşitliliği arasındaki görünmez bağı keşfedin.",
                    ticker: "● SİSTEM ÇALIŞIYOR ● KONUM: BREZİLYA / MARDİN AKTİF ● VERİ SENKRONİZASYONU %100 ●",
                    t1: "Mezopotamya'nın Sesi", t2: "Amazon Dijital Arşivi"
                },
                en: { 
                    hero: "Ancient Lands, New Worlds",
                    desc: "Discover the invisible bond between Mardin's stonework and Brazil's biodiversity.",
                    ticker: "● SYSTEM ACTIVE ● LOCATION: BRAZIL / MARDIN ● DATA SYNC 100% ●",
                    t1: "Echoes of Mesopotamia", t2: "Amazon Digital Archive"
                }
            };

            const active = content[userLang];
            document.getElementById('hero-title').innerText = active.hero;
            document.getElementById('hero-desc').innerText = active.desc;
            document.getElementById('dynamic-ticker').innerText = (active.ticker + " ").repeat(8);
            document.getElementById('title-1').innerText = active.t1;
            document.getElementById('title-2').innerText = active.t2;
        }

        // --- 3. MAGNETIC INTERACTION & CURSOR ---
        document.addEventListener('mousemove', (e) => {
            const { clientX: x, clientY: y } = e;
            if (dot) dot.style.transform = `translate(${x}px, ${y}px)`;
            
            let target = e.target.closest('.magnetic');
            if(target && window.innerWidth > 1024) {
                const rect = target.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                outline.style.transform = `translate(${centerX - 20}px, ${centerY - 20}px) scale(1.8)`;
                outline.style.background = 'rgba(255,255,255,0.1)';
                outline.style.borderColor = 'var(--theme-accent)';
            } else if (outline) {
                outline.style.transform = `translate(${x - 20}px, ${y - 20}px) scale(1)`;
                outline.style.background = 'transparent';
                outline.style.borderColor = 'var(--dark)';
            }
        });

        // Time Update
        setInterval(() => {
            const now = new Date();
            document.getElementById('local-time').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        }, 1000);

        window.onload = initIntelligence;
    </script>
</body>
</html>
