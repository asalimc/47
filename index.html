<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Global Culture & Heritage</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --bg: #f4ecd8; 
            --card-bg: #fdfbf7;
            --text: #433422; 
            --muted: #8c7b6a; 
            --accent: #a67c52; 
        }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; scroll-behavior: smooth; }
        
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.05; pointer-events: none; z-index: 9999; background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png'); }

        #progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent); width: 0%; z-index: 10001; }
        
        nav { background: rgba(244, 236, 216, 0.8); backdrop-filter: blur(15px); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 1000; border-bottom: 1px solid rgba(67, 52, 34, 0.1); }
        .logo { font-family: 'Marcellus', serif; font-size: 1.8rem; letter-spacing: 4px; cursor: pointer; text-transform: uppercase; font-weight: bold; }

        .authors-strip { background: var(--card-bg); padding: 25px 0; display: flex; justify-content: center; gap: 30px; border-bottom: 1px solid rgba(0,0,0,0.05); overflow-x: auto; scrollbar-width: none; }
        .author-item { cursor: pointer; text-align: center; width: 110px; flex-shrink: 0; transition: 0.3s; }
        .author-item:hover { transform: translateY(-5px); }
        .author-item img { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); padding: 3px; margin: 0 auto; }
        
        .author-item span { 
            display: block; font-size: 0.7rem; font-weight: 800; margin-top: 8px; font-family: 'Marcellus'; text-transform: uppercase;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 5px;
        }

        .container-main { max-width: 1500px; margin: 40px auto; padding: 0 30px; }
        #news-feed { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 40px; align-items: start; }

        .news-card { background: var(--card-bg); border-radius: 28px; overflow: hidden; box-shadow: 0 10px 30px rgba(67, 52, 34, 0.05); cursor: pointer; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(0,0,0,0.03); opacity: 0; transform: translateY(30px) scale(0.98); filter: blur(5px); }
        .news-card.show { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        .news-card:hover { transform: translateY(-15px); box-shadow: 0 30px 60px rgba(67, 52, 34, 0.15); }

        .news-img { width: 100%; height: 280px; object-fit: cover; transition: 0.8s; }
        .news-card:hover .news-img { transform: scale(1.1); }
        .card-body { padding: 30px; }
        .card-body h2 { font-family: 'Marcellus', serif; font-size: 1.6rem; margin: 12px 0; line-height: 1.3; color: var(--text); }

        /* Admin CMS */
        #admin-panel { display: none; background: #1a1a1a; color: #e2e2e2; position: fixed; inset: 0; z-index: 11000; overflow-y: auto; padding: 30px; }
        .admin-btn { background: #333; padding: 10px 20px; border-radius: 8px; font-size: 0.8rem; font-weight: bold; transition: 0.3s; }
        .admin-btn.active { background: var(--accent); color: white; }
        .input-cms { width: 100%; padding: 12px; margin-bottom: 12px; background: #2a2a2a; border: 1px solid #444; border-radius: 10px; color: white; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: none; overflow-y: auto; }
        
        /* Reader Controls */
        .reader-bar { display: flex; gap: 15px; align-items: center; background: rgba(0,0,0,0.03); padding: 10px 20px; border-radius: 50px; margin-bottom: 20px; width: fit-content; }
        .reader-btn { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; opacity: 0.6; transition: 0.3s; }
        .reader-btn:hover { opacity: 1; color: var(--accent); }
    </style>
</head>
<body>

<div id="progress-bar"></div>
<nav>
    <div class="logo" onclick="location.reload()">LUMINA</div>
    <div class="text-[10px] tracking-widest font-black uppercase opacity-60">Mardin 24°C • Kehribar Gökyüzü</div>
</nav>

<div id="authors-list" class="authors-strip"></div>

<div class="container-main">
    <main id="news-feed"></main>
</div>

<footer class="py-20 text-center opacity-30 hover:opacity-100 transition">
    <button onclick="toggleAdmin()" class="text-[10px] font-black tracking-[5px] uppercase">Sistem Paneli</button>
</footer>

<div id="overlay" class="overlay">
    <button onclick="stopReading(); closeAll();" class="fixed top-8 right-8 z-[10001] bg-black text-white w-12 h-12 rounded-full font-bold">✕</button>
    <div id="overlay-content" class="max-w-4xl mx-auto py-24 px-8"></div>
</div>

<div id="admin-panel">
    <div class="flex justify-between items-center mb-10 border-b border-white/10 pb-6">
        <h2 class="text-2xl font-serif tracking-widest text-accent italic">LUMINA MASTER CMS</h2>
        <button onclick="toggleAdmin()" class="text-xs font-bold border border-red-500/50 text-red-500 px-4 py-2 rounded-full">PANELİ KAPAT</button>
    </div>
    <div class="flex gap-3 mb-8 overflow-x-auto pb-2">
        <button onclick="setTab('haber')" id="btn-haber" class="admin-btn active">HABER YÖNETİMİ</button>
        <button onclick="setTab('yazar')" id="btn-yazar" class="admin-btn">YAZARLAR</button>
        <button onclick="setTab('cat')" id="btn-cat" class="admin-btn">KATEGORİLER</button>
        <button onclick="setTab('reklam')" id="btn-reklam" class="admin-btn">REKLAM</button>
    </div>
    <div id="admin-content" class="grid grid-cols-1 lg:grid-cols-3 gap-8"></div>
</div>

<script>
    const defaultDB = {
        cats: [{id:'c1',name:'Mardin'},{id:'c2',name:'Dünya'},{id:'c3',name:'Analiz'},{id:'c4',name:'Mutfak'}],
        yazarlar: [
            {id:'y1', isim:'Ahmet ÇINARBAŞ', bio:'Siyasi Analist', img:'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=400'},
            {id:'y2', isim:'Selin IŞIK', bio:'Kültür Sanat Yazarı', img:'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=400'},
            {id:'y3', isim:'Marco Polo', bio:'Gastronomi Gezgini', img:'https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=400'}
        ],
        haberler: [
            {id:'h1', title:"Taşın Belleği: Mardin'in Mimari Mirası", text:"Mardin, sadece bir şehir değil; Mezopotamya'nın kalbinde yükselen bir açık hava müzesidir. Şehrin dar sokaklarında yürürken, her taşın altında binlerce yıllık bir hikaye yatar. Artuklu mimarisinin en zarif örneklerini sunan evler, güneşin batışıyla birlikte altın rengine bürünür. Bu şehirde pencereler komşuya değil, uçsuz bucaksız bir denize benzeyen ovaya açılır. Geleneksel taş işçiliği, sadece estetik bir kaygı değil, aynı zamanda iklimle kurulan bir dostluğun sonucudur.", img:'https://images.unsplash.com/photo-1582738411706-bfc8e691d1c2?w=1000', cid:'c1', yid:'y1'},
            {id:'h2', title:"Tokyo'nun Sessizliği: Modernite ve Gelenek", text:"Shibuya Kavşağı'nın bitmek bilmeyen gürültüsünden sadece on dakika uzaklıkta, Meiji Tapınağı'nın ormanında tam bir sessizlik hakimdir. Tokyo, bu zıtlıkların şehridir. Bir yanda gökyüzünü delen neon ışıklı gökdelenler, diğer yanda ise yüzyıllardır dokunulmamış ahşap çay evleri. Japon kültürü, hızı ve sükuneti aynı potada eritebilen nadir sistemlerden biridir.", img:'https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?w=1000', cid:'c2', yid:'y2'}
        ],
        reklamlar: [{img: 'https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=500'}]
    };

    let db = JSON.parse(localStorage.getItem('lumina_v5_core')) || defaultDB;
    let activeTab = 'haber', tempImg = "", editingId = null;
    let currentFontSize = 20;
    let synth = window.speechSynthesis;
    let utterance = null;

    // --- SESLİ OKUMA VE FONT FONKSİYONLARI ---
    function changeFont(delta) {
        currentFontSize += delta;
        if(currentFontSize < 14) currentFontSize = 14;
        if(currentFontSize > 40) currentFontSize = 40;
        document.getElementById('article-body').style.fontSize = currentFontSize + 'px';
    }

    function startReading() {
        stopReading();
        const text = document.getElementById('article-body').innerText;
        utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'tr-TR';
        utterance.rate = 1;
        synth.speak(utterance);
    }

    function stopReading() {
        if (synth.speaking) synth.cancel();
    }

    // --- PANEL VE PORTAL YÖNETİMİ ---
    function toggleAdmin() {
        const p = document.getElementById('admin-panel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
        if(p.style.display === 'block') { editingId = null; renderAdmin(); }
    }

    function setTab(t) {
        activeTab = t; editingId = null; tempImg = "";
        document.querySelectorAll('.admin-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-'+t).classList.add('active');
        renderAdmin();
    }

    function renderAdmin() {
        const content = document.getElementById('admin-content');
        let form = "", list = "";

        if(activeTab === 'haber') {
            const h = editingId ? db.haberler.find(x => x.id === editingId) : null;
            form = `<div class="bg-stone-900 p-6 rounded-2xl">
                <h3 class="text-accent text-xs mb-4 uppercase font-bold">${h ? 'Haberi Düzenle' : 'Yeni İçerik Ekle'}</h3>
                <input type="text" id="h-t" value="${h?.title || ''}" placeholder="Haber Başlığı" class="input-cms">
                <textarea id="h-x" placeholder="Haber İçeriği..." class="input-cms h-48">${h?.text || ''}</textarea>
                <select id="h-c" class="input-cms">${db.cats.map(c=>`<option value="${c.id}" ${h?.cid===c.id?'selected':''}>${c.name}</option>`).join('')}</select>
                <select id="h-y" class="input-cms">${db.yazarlar.map(y=>`<option value="${y.id}" ${h?.yid===y.id?'selected':''}>${y.isim}</option>`).join('')}</select>
                <input type="file" onchange="hImg(event)" class="text-[10px] mb-4">
                <button onclick="saveH()" class="w-full bg-accent py-3 rounded-lg font-bold">KAYDET</button>
            </div>`;
            list = db.haberler.map(x => `<div class="flex justify-between p-3 border-b border-white/5">
                <span onclick="editH('${x.id}')" class="cursor-pointer truncate pr-4 text-sm font-semibold">${x.title}</span>
                <button onclick="del('haberler','${x.id}')" class="text-red-500 text-xs font-bold">SİL</button>
            </div>`).join('');
        } else if(activeTab === 'yazar') {
            const y = editingId ? db.yazarlar.find(x => x.id === editingId) : null;
            form = `<div class="bg-stone-900 p-6 rounded-2xl">
                <input type="text" id="y-i" value="${y?.isim || ''}" placeholder="Yazar Adı Soyadı" class="input-cms">
                <input type="text" id="y-b" value="${y?.bio || ''}" placeholder="Uzmanlık" class="input-cms">
                <input type="file" onchange="hImg(event)" class="mb-4 text-xs">
                <button onclick="saveY()" class="w-full bg-accent py-3 rounded-lg font-bold">YAZARI KAYDET</button>
            </div>`;
            list = db.yazarlar.map(y => `<div class="flex justify-between p-3 border-b border-white/5">
                <span onclick="editY('${y.id}')" class="cursor-pointer font-bold">${y.isim}</span>
                <button onclick="del('yazarlar','${y.id}')" class="text-red-500 text-xs">SİL</button>
            </div>`).join('');
        } else if(activeTab === 'cat') {
            form = `<div class="bg-stone-900 p-6 rounded-2xl"><input type="text" id="c-n" placeholder="Kategori Adı" class="input-cms"><button onclick="saveC()" class="w-full bg-accent py-3 rounded-lg font-bold">EKLE</button></div>`;
            list = db.cats.map(c => `<div class="flex justify-between p-3 border-b border-white/5 text-sm"><span>${c.name}</span><button onclick="del('cats','${c.id}')" class="text-red-500">SİL</button></div>`).join('');
        } else if(activeTab === 'reklam') {
            form = `<div class="bg-stone-900 p-6 rounded-2xl"><input type="file" onchange="hImg(event)" class="mb-4"><button onclick="saveR()" class="w-full bg-accent py-3 rounded-lg font-bold">REKLAMI GÜNCELLE</button></div>`;
            list = db.reklamlar[0] ? `<img src="${db.reklamlar[0].img}" class="w-full rounded-xl">` : '';
        }

        content.innerHTML = form + `<div class="lg:col-span-2 bg-stone-950 p-6 rounded-2xl overflow-y-auto max-h-[600px] border border-white/5">${list}</div>`;
    }

    function editH(id) { editingId = id; renderAdmin(); }
    function editY(id) { editingId = id; renderAdmin(); }
    function hImg(e) { const fr = new FileReader(); fr.onload = () => { tempImg = fr.result; }; fr.readAsDataURL(e.target.files[0]); }

    function saveH() {
        const t = document.getElementById('h-t').value;
        const x = document.getElementById('h-x').value;
        if(editingId) {
            let item = db.haberler.find(i => i.id === editingId);
            item.title = t; item.text = x; item.cid = document.getElementById('h-c').value; item.yid = document.getElementById('h-y').value;
            if(tempImg) item.img = tempImg;
        } else {
            db.haberler.unshift({id:'h'+Date.now(), title:t, text:x, cid:document.getElementById('h-c').value, yid:document.getElementById('h-y').value, img:tempImg || 'https://via.placeholder.com/1000'});
        }
        sync();
    }

    function saveY() {
        const i = document.getElementById('y-i').value;
        const b = document.getElementById('y-b').value;
        if(editingId) {
            let item = db.yazarlar.find(x => x.id === editingId);
            item.isim = i; item.bio = b; if(tempImg) item.img = tempImg;
        } else {
            db.yazarlar.push({id:'y'+Date.now(), isim:i, bio:b, img:tempImg || 'https://via.placeholder.com/400'});
        }
        sync();
    }

    function saveC() { db.cats.push({id:'c'+Date.now(), name:document.getElementById('c-n').value}); sync(); }
    function saveR() { if(tempImg) db.reklamlar = [{img:tempImg}]; sync(); }
    function del(k, id) { if(confirm('Silsin mi?')) { db[k] = db[k].filter(x => x.id !== id); sync(); } }
    function sync() { localStorage.setItem('lumina_v5_core', JSON.stringify(db)); editingId = null; tempImg = ""; renderAdmin(); renderPortal(); }

    function renderPortal() {
        document.getElementById('authors-list').innerHTML = db.yazarlar.map(y => `<div class="author-item" onclick="openAuthor('${y.id}')"><img src="${y.img}"><span>${y.isim}</span></div>`).join('');
        const feed = document.getElementById('news-feed'); 
        feed.innerHTML = "";
        
        db.haberler.forEach((h, i) => {
            const card = document.createElement('article'); 
            card.className = "news-card"; 
            card.onclick = () => openNews(h.id);
            card.innerHTML = `<img src="${h.img}" class="news-img"><div class="card-body">
                <div class="flex justify-between items-center mb-2"><small class="text-accent font-black uppercase tracking-widest text-[10px]">${db.cats.find(c=>c.id===h.cid)?.name}</small>
                <small class="opacity-40 font-bold text-[9px]">${Math.ceil(h.text.length/600)} DK</small></div>
                <h2>${h.title}</h2><p class="opacity-70 text-sm leading-relaxed">${h.text.substring(0, 100)}...</p></div>`;
            feed.appendChild(card);
            setTimeout(() => card.classList.add('show'), i * 120);
        });
    }

    function openNews(hid) {
        const h = db.haberler.find(x => x.id === hid); const y = db.yazarlar.find(x => x.id === h.yid);
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('overlay-content').innerHTML = `
            <div class="mb-6"><small class="text-accent font-black tracking-[4px] uppercase text-xs">${db.cats.find(c=>c.id===h.cid)?.name}</small></div>
            
            <div class="reader-bar">
                <div class="reader-btn" onclick="startReading()">🔊 Sesli Oku</div>
                <div class="reader-btn" onclick="stopReading()">🛑 Durdur</div>
                <div class="reader-btn border-l border-black/10 pl-4" onclick="changeFont(2)">A+</div>
                <div class="reader-btn" onclick="changeFont(-2)">A-</div>
            </div>

            <h1 class="text-6xl font-serif mb-8 leading-tight">${h.title}</h1>
            <div class="flex items-center gap-4 mb-12 py-6 border-y border-black/5">
                <img src="${y.img}" class="w-12 h-12 rounded-full object-cover">
                <div><div class="font-bold">${y.isim}</div><div class="text-[10px] opacity-40 uppercase font-black tracking-widest">${y.bio}</div></div>
            </div>
            <img src="${h.img}" class="w-full rounded-[40px] mb-12 shadow-2xl">
            <div id="article-body" class="leading-relaxed font-light text-stone-700 space-y-6" style="font-size: ${currentFontSize}px">
                ${h.text.split('. ').join('.<br><br>')}
            </div>`;
    }

    function openAuthor(yid) {
        const y = db.yazarlar.find(x => x.id === yid); const yH = db.haberler.filter(h => h.yid === yid);
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('overlay-content').innerHTML = `<div class="text-center mb-10"><img src="${y.img}" class="w-32 h-32 rounded-full mx-auto mb-4 object-cover border-4 border-accent p-1"><h1 class="text-4xl font-serif">${y.isim}</h1><p class="opacity-50 uppercase tracking-widest text-xs font-bold">${y.bio}</p></div><div class="grid grid-cols-1 md:grid-cols-2 gap-4">${yH.map(h => `<div onclick="openNews('${h.id}')" class="p-8 bg-white/40 rounded-[30px] cursor-pointer hover:bg-accent hover:text-white transition"><h3>${h.title}</h3></div>`).join('')}</div>`;
    }

    function closeAll() { document.getElementById('overlay').style.display = 'none'; }
    window.onscroll = () => { let s = document.documentElement.scrollTop; let h = document.documentElement.scrollHeight - document.documentElement.clientHeight; document.getElementById("progress-bar").style.width = (s / h) * 100 + "%"; };
    window.onload = renderPortal;
</script>
</body>
</html>
