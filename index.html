<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASC GLOBAL | Veri Odaklı Yeni Nesil Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        /* GOOGLE TEMİZLİĞİ */
        .goog-te-banner-frame, .goog-te-balloon-frame, .skiptranslate, #google_translate_element {
            display: none !important; opacity: 0 !important;
        }
        body { top: 0px !important; font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        
        /* Modern Işık Teması Arka Planı */
        .light-mesh {
            background-color: #f8fafc;
            background-image: radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.05) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(249, 115, 22, 0.05) 0px, transparent 50%);
        }

        .hero-text { font-size: clamp(2.5rem, 10vw, 8rem); font-weight: 800; line-height: 0.9; letter-spacing: -0.05em; color: #0f172a; }
        
        .premium-card { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .premium-card:hover { transform: translateY(-5px); box-shadow: 0 30px 40px -10px rgba(0, 0, 0, 0.1); }

        .img-container { overflow: hidden; position: relative; }
        .img-container img { transition: transform 0.6s ease; }
        .group:hover .img-container img { transform: scale(1.05); }

        [x-cloak] { display: none !important; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body x-data="portalApp()" x-init="init()" class="light-mesh min-h-screen">

    <nav class="fixed top-0 w-full z-[100] bg-white/70 backdrop-blur-xl border-b border-slate-200">
        <div class="max-w-[1600px] mx-auto px-6 py-4 flex justify-between items-center">
            <div @click="currentPage = 'home'" class="flex items-center gap-3 cursor-pointer group">
                <div class="bg-blue-600 text-white font-extrabold px-4 py-1.5 rounded-xl text-xl shadow-lg shadow-blue-200 group-hover:bg-blue-700 transition">ASC</div>
                <span class="text-2xl font-extrabold tracking-tighter text-slate-900 uppercase">Global</span>
            </div>
            
            <div class="flex items-center gap-6">
                <div class="hidden md:flex gap-4 text-[10px] font-bold uppercase tracking-widest text-slate-400">
                    <span x-text="todayDate"></span>
                </div>
                <button @click="loginAdmin()" class="bg-slate-900 text-white px-6 py-2.5 rounded-full text-xs font-bold uppercase hover:bg-blue-600 transition-all shadow-xl">Yönetim</button>
            </div>
        </div>
    </nav>

    <main class="pt-24">
        <div x-show="currentPage === 'home'" class="animate-in fade-in duration-700">
            
            <header class="max-w-[1600px] mx-auto px-6 mb-20">
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 h-[600px]">
                    <div class="lg:col-span-8 relative group rounded-[2.5rem] overflow-hidden shadow-2xl">
                        <img src="https://images.unsplash.com/photo-1544830154-1505c215f79a?q=80&w=2000" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                        <div class="absolute bottom-12 left-12">
                            <span class="bg-blue-600 text-white px-4 py-1 rounded-full text-[10px] font-bold uppercase mb-4 inline-block">Mardin Özel</span>
                            <h2 class="text-5xl font-extrabold text-white tracking-tighter italic">KADİM ŞEHİR: MARDİN</h2>
                        </div>
                    </div>
                    <div class="lg:col-span-4 relative group rounded-[2.5rem] overflow-hidden shadow-2xl">
                        <img src="https://images.unsplash.com/photo-1483728642387-6c3bdd6c93e5?q=80&w=2000" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                        <div class="absolute bottom-12 right-12 text-right">
                            <span class="bg-orange-500 text-white px-4 py-1 rounded-full text-[10px] font-bold uppercase mb-4 inline-block">Rio De Janeiro</span>
                            <h2 class="text-5xl font-extrabold text-white tracking-tighter italic">RIO 2026</h2>
                        </div>
                    </div>
                </div>
            </header>

            <section class="max-w-[1600px] mx-auto px-6 mb-20">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                    <div class="premium-card p-6 rounded-3xl flex items-center justify-between">
                        <div><p class="text-slate-400 text-[10px] font-bold uppercase">Mardin Saat</p><p class="text-2xl font-black text-blue-600" x-text="mTime"></p></div>
                        <i class="fas fa-clock text-blue-100 text-3xl"></i>
                    </div>
                    <div class="premium-card p-6 rounded-3xl flex items-center justify-between">
                        <div><p class="text-slate-400 text-[10px] font-bold uppercase">Rio Saat</p><p class="text-2xl font-black text-orange-500" x-text="bTime"></p></div>
                        <i class="fas fa-sun text-orange-100 text-3xl"></i>
                    </div>
                    <div class="premium-card p-6 rounded-3xl flex items-center justify-between">
                        <div><p class="text-slate-400 text-[10px] font-bold uppercase">Toplam Okunma</p><p class="text-2xl font-black text-slate-800" x-text="totalReads"></p></div>
                        <i class="fas fa-chart-line text-slate-100 text-3xl"></i>
                    </div>
                    <div class="premium-card p-6 rounded-3xl flex items-center justify-between">
                        <div><p class="text-slate-400 text-[10px] font-bold uppercase">Aktif Yazarlar</p><p class="text-2xl font-black text-slate-800" x-text="authors.length"></p></div>
                        <i class="fas fa-users text-slate-100 text-3xl"></i>
                    </div>
                </div>
            </section>

            <section class="max-w-[1600px] mx-auto px-6 mb-32">
                <div class="flex items-center justify-between mb-12">
                    <h3 class="text-4xl font-extrabold tracking-tighter">Günün <span class="text-blue-600">Manşetleri</span></h3>
                    <div class="h-px flex-1 bg-slate-200 mx-10"></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                    <template x-for="(news, index) in newsData" :key="index">
                        <div @click="openNews(news, index)" class="premium-card rounded-[2rem] overflow-hidden group cursor-pointer border border-slate-100">
                            <div class="h-60 overflow-hidden relative">
                                <img :src="news.img" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                                <div class="absolute top-4 left-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[9px] font-black uppercase text-blue-600" x-text="news.tag"></div>
                            </div>
                            <div class="p-8">
                                <h4 class="text-xl font-extrabold mb-4 leading-tight text-slate-900 group-hover:text-blue-600 transition" x-text="news.title"></h4>
                                <div class="flex items-center justify-between text-slate-400 text-[10px] font-bold uppercase tracking-widest">
                                    <span x-text="news.date"></span>
                                    <span><i class="fas fa-eye mr-1"></i> <span x-text="news.views || 0"></span></span>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </section>

            <section class="bg-slate-100 py-32">
                <div class="max-w-[1600px] mx-auto px-6">
                    <h3 class="text-4xl font-extrabold tracking-tighter mb-16 text-center">Köşe <span class="text-blue-600">Yazarları</span></h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8">
                        <template x-for="(author, index) in authors" :key="index">
                            <div @click="openAuthor(author, index)" class="premium-card p-8 rounded-[2.5rem] text-center border-none">
                                <img :src="author.photo" class="w-24 h-24 rounded-3xl object-cover mx-auto mb-6 shadow-xl grayscale hover:grayscale-0 transition duration-500">
                                <h4 class="text-lg font-extrabold text-slate-900 uppercase tracking-tighter" x-text="author.name"></h4>
                                <p class="text-blue-600 text-[10px] font-black uppercase mb-4 tracking-widest" x-text="author.title"></p>
                                <div class="bg-slate-50 py-2 px-4 rounded-full inline-flex items-center gap-2">
                                    <i class="fas fa-feather text-slate-300 text-xs"></i>
                                    <span class="text-[10px] font-bold text-slate-500 uppercase">Okunma: <span x-text="author.reads || 0"></span></span>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </section>
        </div>

        <div x-show="currentPage === 'author-detail'" class="max-w-4xl mx-auto px-6 py-20" x-cloak>
            <button @click="currentPage = 'home'" class="mb-10 text-xs font-bold uppercase tracking-widest text-slate-400 hover:text-blue-600">← Geri Dön</button>
            <div class="premium-card p-12 rounded-[3rem]">
                <div class="flex flex-col md:flex-row gap-10 items-center mb-10">
                    <img :src="selectedAuthor?.photo" class="w-40 h-40 rounded-[2.5rem] object-cover shadow-2xl">
                    <div>
                        <h1 class="text-4xl font-extrabold text-slate-900 mb-2" x-text="selectedAuthor?.name"></h1>
                        <p class="text-blue-600 font-bold uppercase tracking-widest text-sm mb-4" x-text="selectedAuthor?.title"></p>
                        <span class="bg-slate-100 px-4 py-2 rounded-full text-xs font-bold text-slate-500"><i class="fas fa-eye mr-2"></i>Bu yazar <span x-text="selectedAuthor?.reads"></span> kez okundu</span>
                    </div>
                </div>
                <div class="text-xl text-slate-600 leading-relaxed font-light italic" x-text="selectedAuthor?.bio"></div>
            </div>
        </div>

        <div x-show="currentPage === 'news-detail'" class="max-w-5xl mx-auto px-6 py-20" x-cloak>
            <button @click="currentPage = 'home'" class="mb-10 text-xs font-bold uppercase tracking-widest text-slate-400 hover:text-blue-600">← Geri Dön</button>
            <img :src="selectedNews?.img" class="w-full h-[500px] object-cover rounded-[3rem] mb-12 shadow-2xl">
            <div class="max-w-3xl mx-auto">
                <span class="text-blue-600 font-black uppercase tracking-widest text-xs" x-text="selectedNews?.tag"></span>
                <h1 class="text-5xl font-extrabold text-slate-900 mt-4 mb-8 leading-tight" x-text="selectedNews?.title"></h1>
                <div class="flex items-center gap-6 mb-12 py-6 border-y border-slate-100">
                    <div class="text-xs font-bold text-slate-400 uppercase">Yayın: <span class="text-slate-900" x-text="selectedNews?.date"></span></div>
                    <div class="text-xs font-bold text-slate-400 uppercase">Görüntülenme: <span class="text-slate-900" x-text="selectedNews?.views"></span></div>
                </div>
                <div class="text-2xl text-slate-600 leading-relaxed font-light" x-html="selectedNews?.body"></div>
            </div>
        </div>

        <div x-show="currentPage === 'admin'" class="max-w-[1600px] mx-auto px-6 py-20" x-cloak>
            <div class="flex items-center justify-between mb-12">
                <h2 class="text-4xl font-extrabold tracking-tighter">İçerik <span class="text-blue-600">Yönetim Merkezi</span></h2>
                <button @click="currentPage = 'home'" class="bg-red-50 text-red-600 px-8 py-3 rounded-full text-xs font-bold uppercase hover:bg-red-600 hover:text-white transition">Paneli Kapat</button>
            </div>

            <div class="grid grid-cols-1 xl:grid-cols-3 gap-10">
                <div class="xl:col-span-1 space-y-8">
                    <div class="premium-card p-8 rounded-[2.5rem]">
                        <h3 class="text-lg font-bold mb-6 flex items-center gap-3">
                            <i class="fas fa-plus-circle text-blue-600"></i>
                            <span x-text="isEdit ? 'İçeriği Güncelle' : 'Yeni İçerik Ekle'"></span>
                        </h3>
                        
                        <div class="space-y-4">
                            <select x-model="formType" class="w-full bg-slate-50 p-4 rounded-2xl border border-slate-200 outline-none focus:border-blue-500 font-bold text-xs uppercase">
                                <option value="news">Haber Ekle</option>
                                <option value="author">Yazar Ekle</option>
                            </select>

                            <template x-if="formType === 'news'">
                                <div class="space-y-4">
                                    <input x-model="formData.title" type="text" placeholder="Haber Başlığı" class="w-full bg-slate-50 p-4 rounded-2xl border border-slate-200">
                                    <input x-model="formData.tag" type="text" placeholder="Kategori (Örn: Kültür)" class="w-full bg-slate-50 p-4 rounded-2xl border border-slate-200">
                                    <textarea x-model="formData.body" placeholder="Haber İçeriği" class="w-full bg-slate-50 p-4 rounded-2xl border border-slate-200 h-32"></textarea>
                                </div>
                            </template>

                            <template x-if="formType === 'author'">
                                <div class="space-y-4">
                                    <input x-model="formData.name" type="text" placeholder="Yazar Adı Soyadı" class="w-full bg-slate-50 p-4 rounded-2xl border border-slate-200">
                                    <input x-model="formData.title" type="text" placeholder="Ünvan" class="w-full bg-slate-50 p-4 rounded-2xl border border-slate-200">
                                    <textarea x-model="formData.bio" placeholder="Kısa Biyografi" class="w-full bg-slate-50 p-4 rounded-2xl border border-slate-200 h-32"></textarea>
                                </div>
                            </template>

                            <div class="bg-blue-50 p-6 rounded-2xl border-2 border-dashed border-blue-200 text-center relative">
                                <input type="file" @change="handleUpload($event)" class="absolute inset-0 opacity-0 cursor-pointer">
                                <p class="text-[10px] font-bold text-blue-600 uppercase">Görsel Yükle (Dosya Seçin)</p>
                            </div>

                            <button @click="saveData()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold uppercase tracking-widest hover:bg-slate-900 transition shadow-xl shadow-blue-100" x-text="isEdit ? 'Değişiklikleri Kaydet' : 'Sisteme Gönder'"></button>
                            <button x-show="isEdit" @click="resetForm()" class="w-full text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-2">Düzenlemeyi İptal Et</button>
                        </div>
                    </div>
                </div>

                <div class="xl:col-span-2 space-y-10">
                    <div class="premium-card p-10 rounded-[2.5rem]">
                        <h4 class="text-xl font-extrabold mb-8 flex items-center justify-between">
                            <span>Haber Akışı</span>
                            <span class="text-[10px] bg-slate-100 px-3 py-1 rounded-full text-slate-500 uppercase">Toplam: <span x-text="newsData.length"></span></span>
                        </h4>
                        <div class="space-y-3">
                            <template x-for="(n, index) in newsData" :key="index">
                                <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100 hover:border-blue-300 transition">
                                    <div class="flex items-center gap-4">
                                        <img :src="n.img" class="w-12 h-12 rounded-xl object-cover">
                                        <div>
                                            <p class="font-bold text-sm text-slate-900" x-text="n.title"></p>
                                            <p class="text-[10px] text-slate-400 uppercase font-bold"><i class="fas fa-eye mr-1 text-blue-500"></i> <span x-text="n.views || 0"></span> Görüntülenme</p>
                                        </div>
                                    </div>
                                    <div class="flex gap-2">
                                        <button @click="editData('news', index)" class="p-3 bg-blue-100 text-blue-600 rounded-xl hover:bg-blue-600 hover:text-white transition"><i class="fas fa-edit"></i></button>
                                        <button @click="deleteData('news', index)" class="p-3 bg-red-100 text-red-600 rounded-xl hover:bg-red-600 hover:text-white transition"><i class="fas fa-trash"></i></button>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>

                    <div class="premium-card p-10 rounded-[2.5rem]">
                        <h4 class="text-xl font-extrabold mb-8 flex items-center justify-between">
                            <span>Yazar Kadrosu</span>
                            <span class="text-[10px] bg-slate-100 px-3 py-1 rounded-full text-slate-500 uppercase">Toplam: <span x-text="authors.length"></span></span>
                        </h4>
                        <div class="space-y-3">
                            <template x-for="(a, index) in authors" :key="index">
                                <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100 hover:border-blue-300 transition">
                                    <div class="flex items-center gap-4">
                                        <img :src="a.photo" class="w-12 h-12 rounded-xl object-cover">
                                        <div>
                                            <p class="font-bold text-sm text-slate-900" x-text="a.name"></p>
                                            <p class="text-[10px] text-slate-400 uppercase font-bold"><i class="fas fa-feather mr-1 text-orange-500"></i> <span x-text="a.reads || 0"></span> Okunma</p>
                                        </div>
                                    </div>
                                    <div class="flex gap-2">
                                        <button @click="editData('author', index)" class="p-3 bg-blue-100 text-blue-600 rounded-xl hover:bg-blue-600 hover:text-white transition"><i class="fas fa-edit"></i></button>
                                        <button @click="deleteData('author', index)" class="p-3 bg-red-100 text-red-600 rounded-xl hover:bg-red-600 hover:text-white transition"><i class="fas fa-trash"></i></button>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function portalApp() {
            return {
                currentPage: 'home',
                formType: 'news',
                isEdit: false,
                editIdx: null,
                selectedAuthor: null,
                selectedNews: null,
                mTime: '', bTime: '', todayDate: '',
                formData: { title:'', tag:'', body:'', img:'', name:'', bio:'' },
                totalReads: 0,

                authors: JSON.parse(localStorage.getItem('asc_light_authors')) || [
                    { name: 'Ahmet Salim', title: 'Tarihçi', bio: 'Mardin üzerine derin araştırmalar...', photo: 'https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=400', reads: 1250 },
                    { name: 'Isabella Mendes', title: 'Analist', bio: 'Rio ekonomisi hakkında makaleler...', photo: 'https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=400', reads: 940 }
                ],
                newsData: JSON.parse(localStorage.getItem('asc_light_news')) || [
                    { title: 'Mardin de Yeni Arkeolojik Buluşlar', tag: 'Kültür', img: 'https://images.unsplash.com/photo-1582236894056-e918b9588667?w=800', body: 'Detaylı haber içeriği...', views: 4500, date: '02.03.2026' },
                    { title: 'Rio Karnavalı nda Dijital Dönüşüm', tag: 'Teknoloji', img: 'https://images.unsplash.com/photo-1516307361401-e323ad26de92?w=800', body: 'Haber içeriği burada...', views: 3200, date: '01.03.2026' }
                ],

                init() {
                    this.updateTime();
                    this.calculateTotal();
                    setInterval(() => this.updateTime(), 1000);
                },

                updateTime() {
                    const n = new Date();
                    this.mTime = new Intl.DateTimeFormat('tr-TR', { hour: '2-digit', minute: '2-digit', second:'2-digit', timeZone: 'Europe/Istanbul' }).format(n);
                    this.bTime = new Intl.DateTimeFormat('tr-TR', { hour: '2-digit', minute: '2-digit', second:'2-digit', timeZone: 'America/Sao_Paulo' }).format(n);
                    this.todayDate = n.toLocaleDateString('tr-TR', { day:'numeric', month:'long', year:'numeric', weekday:'long' });
                },

                calculateTotal() {
                    let newsViews = this.newsData.reduce((sum, item) => sum + (item.views || 0), 0);
                    let authorReads = this.authors.reduce((sum, item) => sum + (item.reads || 0), 0);
                    this.totalReads = newsViews + authorReads;
                },

                handleUpload(e) {
                    const file = e.target.files[0];
                    const reader = new FileReader();
                    reader.onloadend = () => { this.formData.img = reader.result; this.formData.photo = reader.result; }
                    if(file) reader.readAsDataURL(file);
                },

                loginAdmin() {
                    if (prompt("Terminal Şifresi:") === "Mardin47**") this.currentPage = 'admin';
                },

                saveData() {
                    if(this.formType === 'news') {
                        if(this.isEdit) this.newsData[this.editIdx] = {...this.formData};
                        else this.newsData.push({...this.formData, views: 0, date: new Date().toLocaleDateString('tr-TR')});
                    } else {
                        if(this.isEdit) this.authors[this.editIdx] = {...this.formData};
                        else this.authors.push({...this.formData, reads: 0});
                    }
                    this.sync();
                    this.resetForm();
                },

                editData(type, idx) {
                    this.formType = type;
                    this.isEdit = true;
                    this.editIdx = idx;
                    this.formData = type === 'news' ? {...this.newsData[idx]} : {...this.authors[idx]};
                    window.scrollTo({top: 0, behavior: 'smooth'});
                },

                deleteData(type, idx) {
                    if(confirm("Silmek istediğinize emin misiniz?")) {
                        if(type === 'news') this.newsData.splice(idx, 1);
                        else this.authors.splice(idx, 1);
                        this.sync();
                    }
                },

                resetForm() {
                    this.formData = { title:'', tag:'', body:'', img:'', name:'', bio:'' };
                    this.isEdit = false;
                    this.editIdx = null;
                },

                sync() {
                    localStorage.setItem('asc_light_news', JSON.stringify(this.newsData));
                    localStorage.setItem('asc_light_authors', JSON.stringify(this.authors));
                    this.calculateTotal();
                },

                openNews(news, idx) {
                    news.views = (news.views || 0) + 1;
                    this.selectedNews = news;
                    this.currentPage = 'news-detail';
                    this.sync();
                    window.scrollTo(0,0);
                },

                openAuthor(author, idx) {
                    author.reads = (author.reads || 0) + 1;
                    this.selectedAuthor = author;
                    this.currentPage = 'author-detail';
                    this.sync();
                    window.scrollTo(0,0);
                }
            }
        }
    </script>
</body>
</html>
