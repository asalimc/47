<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Global Culture & Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfbf7; --text: #1a1a1a; --muted: #718096; --accent: #c49b66;
            --white: #ffffff; --transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Navigasyon */
        nav { background: rgba(253, 251, 247, 0.9); backdrop-filter: blur(15px); padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.03); }
        .logo { font-family: 'Marcellus', serif; font-size: 2rem; letter-spacing: 3px; cursor: pointer; text-transform: uppercase; }
        .admin-trigger { cursor: pointer; opacity: 0.1; font-size: 10px; }

        /* Ana İçerik */
        .container { max-width: 1400px; margin: 40px auto; display: grid; grid-template-columns: 250px 1fr; gap: 40px; padding: 0 25px; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }
        .news-card { background: var(--white); border-radius: 24px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.02); cursor: pointer; transition: var(--transition); border: 1px solid rgba(0,0,0,0.02); }
        .news-card img { width: 100%; height: 250px; object-fit: cover; }
        .card-body { padding: 25px; }

        /* YENİ MODAL ADMIN PANELİ */
        #admin-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 20000; display: none;
            overflow-y: auto; padding: 40px 0;
        }
        .admin-content {
            background: #f4f7f6; width: 90%; max-width: 1200px; margin: 0 auto;
            border-radius: 20px; padding: 30px; position: relative;
        }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .admin-box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .admin-box h2 { font-size: 1rem; color: var(--accent); border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
        input, textarea, select { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; }
        .btn-black { background: #1a1a1a; color: white; border: none; padding: 12px; border-radius: 25px; cursor: pointer; width: 100%; font-weight: bold; }
        .close-admin { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 24px; font-weight: bold; }

        /* Haber Detay Overlay */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: none; overflow-y: auto; }
        .article-wrap { max-width: 800px; margin: 60px auto; padding: 0 20px; }
    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="location.reload()">LUMINA</div>
    <div class="admin-trigger" onclick="toggleAdmin(true)">[MOD_v23]</div>
</nav>

<div class="container">
    <aside class="sidebar">
        <h4>KATEGORİLER</h4>
        <div id="cat-nav"></div>
        <div id="ad-sidebar" style="margin-top:40px; border-radius:15px; overflow:hidden;"></div>
    </aside>
    <main class="news-grid" id="main-feed"></main>
</div>

<div id="admin-modal">
    <div class="admin-content">
        <span class="close-admin" onclick="toggleAdmin(false)">✕</span>
        <h1 style="text-align:center; margin-bottom:30px;">Lumina Studio Control</h1>
        
        <div class="admin-grid">
            <div class="admin-box">
                <h2>Haber Yayınla (Yazar: ASC)</h2>
                <input type="text" id="nt" placeholder="Başlık">
                <textarea id="nc" placeholder="İçerik" rows="4"></textarea>
                <select id="ncat"></select>
                <input type="file" id="ni" accept="image/*">
                <button class="btn-black" onclick="saveNews()">Yayına Al</button>
            </div>

            <div class="admin-box">
                <h2>Kategori Yönetimi</h2>
                <input type="text" id="newCat" placeholder="Yeni Kategori Adı">
                <button class="btn-black" onclick="addCategory()">Ekle</button>
                <div id="admin-cats" style="margin-top:15px; font-size:12px;"></div>
            </div>

            <div class="admin-box">
                <h2>Reklam Yönetimi</h2>
                <p style="font-size:11px; color:gray;">Yan panel reklam görselini değiştirin.</p>
                <input type="file" id="adi" accept="image/*">
                <button class="btn-black" onclick="updateAd()">Reklamı Güncelle</button>
            </div>
        </div>
    </div>
</div>

<div id="overlay" class="overlay">
    <div style="padding:40px; cursor:pointer;" onclick="closeOverlay()">✕ KAPAT</div>
    <div id="overlay-content" class="article-wrap"></div>
</div>

<script>
    const PASS = "47";
    let db = JSON.parse(localStorage.getItem('lumina_v23')) || {
        news: [],
        authors: [{id:1, name: "ASC", img: "https://via.placeholder.com/150"}],
        cats: ['Mardin', 'Dünya'],
        ad: "https://via.placeholder.com/300x500"
    };

    function sync() { localStorage.setItem('lumina_v23', JSON.stringify(db)); renderApp(); }

    async function toBase64(file) {
        return new Promise((res) => {
            const r = new FileReader();
            r.readAsDataURL(file);
            r.onload = () => res(r.result);
        });
    }

    function toggleAdmin(show) {
        if(show && prompt("Şifre:") !== PASS) return;
        document.getElementById('admin-modal').style.display = show ? 'block' : 'none';
        if(show) renderAdminLists();
    }

    // Admin Fonksiyonları
    async function saveNews() {
        const file = document.getElementById('ni').files[0];
        const img = file ? await toBase64(file) : "https://via.placeholder.com/800";
        db.news.unshift({
            id: Date.now(),
            title: document.getElementById('nt').value,
            text: document.getElementById('nc').value,
            cat: document.getElementById('ncat').value,
            author: "ASC",
            img: img
        });
        sync();
        alert("Haber eklendi!");
    }

    function addCategory() {
        const val = document.getElementById('newCat').value;
        if(val) { db.cats.push(val); sync(); renderAdminLists(); }
    }

    function deleteCat(index) {
        db.cats.splice(index, 1); sync(); renderAdminLists();
    }

    async function updateAd() {
        const file = document.getElementById('adi').files[0];
        if(file) {
            db.ad = await toBase64(file);
            sync();
            alert("Reklam güncellendi!");
        }
    }

    function renderAdminLists() {
        document.getElementById('ncat').innerHTML = db.cats.map(c => `<option>${c}</option>`).join('');
        document.getElementById('admin-cats').innerHTML = db.cats.map((c, i) => `
            <div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #eee;">
                <span>${c}</span><span style="color:red; cursor:pointer;" onclick="deleteCat(${i})">SİL</span>
            </div>`).join('');
    }

    // Uygulama Render
    function renderApp() {
        // Kategoriler
        document.getElementById('cat-nav').innerHTML = db.cats.map(c => `
            <div onclick="filterCat('${c}')" style="cursor:pointer; padding:5px 0; color:var(--muted)">• ${c}</div>
        `).join('') + `<div onclick="renderApp()" style="cursor:pointer; font-weight:bold; margin-top:10px;">• TÜMÜ</div>`;
        
        // Reklam
        document.getElementById('ad-sidebar').innerHTML = `<img src="${db.ad}" style="width:100%; border-radius:15px;">`;
        
        // Haberler
        const feed = document.getElementById('main-feed');
        feed.innerHTML = db.news.map(n => `
            <div class="news-card" onclick="openNews(${n.id})">
                <img src="${n.img}">
                <div class="card-body">
                    <small style="color:var(--accent); font-weight:bold;">${n.cat.toUpperCase()}</small>
                    <h2 style="font-family:Marcellus; font-size:1.4rem; margin:10px 0;">${n.title}</h2>
                </div>
            </div>`).join('');
    }

    function openNews(id) {
        const n = db.news.find(x=>x.id==id);
        const overlay = document.getElementById('overlay');
        overlay.style.display = 'block';
        document.getElementById('overlay-content').innerHTML = `
            <h1 style="font-family:Marcellus; font-size:3rem;">${n.title}</h1>
            <p style="color:var(--accent); font-weight:bold;">${n.cat}</p>
            <img src="${n.img}" style="width:100%; border-radius:20px; margin:20px 0;">
            <div style="line-height:1.8; font-size:1.1rem;">${n.text.replace(/\n/g, '<br>')}</div>
        `;
    }

    function filterCat(c) {
        const filtered = db.news.filter(n => n.cat === c);
        // Render feed logic
    }

    function closeOverlay() { document.getElementById('overlay').style.display = 'none'; }

    renderApp();
</script>
</body>
</html>
