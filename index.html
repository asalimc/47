<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASC GLOBAL | v35 Absolute Authority</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@1,900&family=Plus+Jakarta+Sans:wght@200;400;700;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fff; color: #111; overflow-x: hidden; }
        .font-serif { font-family: 'Crimson Pro', serif; }
        
        /* ANA SAYFA STİLİ (image_0ab09a referanslı) */
        .main-title { font-size: clamp(2.5rem, 8vw, 6rem); line-height: 1.1; letter-spacing: -0.02em; font-weight: 900; }
        
        /* ADMIN DASHBOARD (image_0abf5c referanslı) */
        .sidebar-nav { @apply flex items-center gap-4 px-8 py-4 text-sm font-bold transition-all cursor-pointer border-l-4 border-transparent text-gray-400; }
        .sidebar-nav.active { @apply bg-orange-50 text-orange-700 border-orange-700; }
        
        [x-cloak] { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body x-data="ascEngine()" x-init="init()">

    <div x-show="!adminOpen" class="min-h-screen flex flex-col items-center justify-start pt-20 px-6">
        <header class="text-center mb-32 relative w-full max-w-7xl">
            <h1 class="font-serif text-7xl italic font-black tracking-tighter">ASC <span class="text-orange-700 not-italic uppercase text-4xl">Global</span></h1>
            <p class="text-[10px] font-black uppercase tracking-[0.6em] mt-4 text-gray-300">Intelligence Syndicate</p>
            
            <button @click="authModal = true" class="absolute right-0 top-0 text-gray-100 hover:text-black transition-all">
                <i class="fas fa-lock text-xs"></i>
            </button>
        </header>

        <main class="w-full max-w-5xl text-center space-y-40 pb-40">
            <template x-for="news in newsData" :key="news.id">
                <article class="group cursor-pointer">
                    <span class="text-orange-700 font-black text-[10px] uppercase tracking-[0.4em] mb-8 block" x-text="news.region"></span>
                    <h2 class="main-title font-serif italic mb-8 group-hover:text-orange-800 transition-colors" x-text="news.title"></h2>
                    <p class="text-xl text-gray-400 font-light max-w-2xl mx-auto leading-relaxed mb-12" x-text="news.body"></p>
                    <div class="w-full h-[1px] bg-gray-100 max-w-xs mx-auto"></div>
                </article>
            </template>
        </main>
    </div>

    <template x-if="authModal">
        <div class="fixed inset-0 z-[9000] bg-white/95 backdrop-blur-xl flex items-center justify-center p-6">
            <div class="w-full max-w-sm text-center">
                <div class="font-serif italic text-4xl mb-12">Security Terminal</div>
                <input x-model="tempPass" type="password" @keyup.enter="authenticate()" placeholder="ENTRY CODE" 
                       class="w-full text-center text-2xl border-b-2 border-black py-4 mb-8 outline-none tracking-[0.8em] font-bold">
                <button @click="authenticate()" class="w-full bg-black text-white py-5 font-black uppercase tracking-widest hover:bg-orange-700 transition-all">Authorize Access</button>
                <p @click="authModal = false" class="mt-10 text-[10px] font-black text-gray-300 uppercase cursor-pointer tracking-widest">Abort</p>
            </div>
        </div>
    </template>

    <div x-show="adminOpen" x-cloak class="fixed inset-0 z-[9999] bg-[#f4f7fe] flex overflow-hidden">
        
        <aside class="w-80 bg-white border-r border-gray-100 flex flex-col shadow-2xl">
            <div class="p-10 border-b border-gray-50">
                <div class="font-serif italic text-3xl font-black">Atelier <span class="text-orange-700 not-italic text-[10px] font-black uppercase">Admin v35</span></div>
            </div>
            <nav class="flex-1 py-8">
                <div class="sidebar-nav" :class="adminTab === 'news' ? 'active' : ''" @click="adminTab = 'news'">
                    <i class="fas fa-edit w-5"></i> <span>Haberleri Yönet</span>
                </div>
                <div class="sidebar-nav" :class="adminTab === 'authors' ? 'active' : ''" @click="adminTab = 'authors'">
                    <i class="fas fa-user-circle w-5"></i> <span>Yazarları Yönet</span>
                </div>
                <div class="sidebar-nav" :class="adminTab === 'ads' ? 'active' : ''" @click="adminTab = 'ads'">
                    <i class="fas fa-ad w-5"></i> <span>Reklam Alanı</span>
                </div>
            </nav>
            <div class="p-8 border-t border-gray-50">
                <button @click="adminOpen = false" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-red-600 transition-all text-center">Panelden Çık</button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-16 no-scrollbar">
            <div class="max-w-5xl mx-auto">
                <header class="flex justify-between items-center mb-16">
                    <div>
                        <h2 class="text-3xl font-black uppercase tracking-tighter" x-text="adminTab === 'news' ? 'Article Desk' : (adminTab === 'authors' ? 'Editorial Board' : 'Sponsorship')"></h2>
                        <p class="text-gray-400 text-[10px] font-bold uppercase tracking-widest mt-1">Syndicate Control Panel</p>
                    </div>
                    <div class="bg-white px-6 py-3 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-3">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                        <span class="text-[10px] font-black text-gray-500 uppercase">System Status: Active</span>
                    </div>
                </header>

                <div class="grid grid-cols-12 gap-10">
                    <div class="col-span-12 lg:col-span-8 space-y-8">
                        <div class="bg-white p-12 rounded-[40px] shadow-sm border border-gray-50 space-y-8">
                            <div x-show="adminTab !== 'ads'">
                                <label class="text-[10px] font-black text-gray-300 uppercase tracking-widest mb-4 block">Ana Başlık / İsim</label>
                                <input x-model="form.main" type="text" class="w-full text-2xl font-bold border-b-2 border-gray-50 focus:border-orange-700 outline-none py-4 transition-all">
                            </div>
                            <div x-show="adminTab !== 'ads'">
                                <label class="text-[10px] font-black text-gray-300 uppercase tracking-widest mb-4 block">Kategori / Ünvan</label>
                                <input x-model="form.sub" type="text" class="w-full text-sm border-b border-gray-50 focus:border-orange-700 outline-none py-3 transition-all">
                            </div>
                            <div x-show="adminTab !== 'ads'">
                                <label class="text-[10px] font-black text-gray-300 uppercase tracking-widest mb-4 block">İçerik Detayı</label>
                                <textarea x-model="form.content" class="w-full h-80 text-lg outline-none border-none resize-none no-scrollbar font-light leading-relaxed"></textarea>
                            </div>
                            <div x-show="adminTab === 'ads'" class="py-20 text-center space-y-4">
                                <i class="fas fa-image text-5xl text-gray-100"></i>
                                <h3 class="text-lg font-bold">Reklam Görseli Güncelleme</h3>
                                <p class="text-xs text-gray-400">Yüklediğiniz görsel yan sütunlardaki 300x300 alanına otomatik işlenir.</p>
                            </div>
                        </div>
                    </div>

                    <div class="col-span-12 lg:col-span-4 space-y-8">
                        <div class="bg-white p-8 rounded-[40px] shadow-sm border border-gray-50 text-center">
                            <input type="file" @change="handleFile" id="v35upload" class="hidden">
                            <label for="v35upload" class="cursor-pointer group block">
                                <div class="w-full aspect-square rounded-3xl bg-gray-50 border-2 border-dashed border-gray-200 flex items-center justify-center overflow-hidden group-hover:border-orange-700 transition-all">
                                    <img x-show="form.media || (adminTab === 'ads' && adImage)" :src="adminTab === 'ads' ? adImage : form.media" class="w-full h-full object-cover">
                                    <div x-show="!form.media && !(adminTab === 'ads' && adImage)" class="text-gray-300 font-bold text-[10px]">GÖRSEL SEÇ</div>
                                </div>
                            </label>
                        </div>
                        <button @click="save()" class="w-full bg-black text-white py-8 rounded-[40px] font-black uppercase tracking-[0.2em] shadow-2xl hover:bg-orange-700 transition-all">
                            Sistemi Güncelle
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function ascEngine() {
            return {
                adminOpen: false, authModal: false, adminTab: 'news',
                tempPass: '',
                form: { main: '', sub: '', content: '', media: '' },
                adImage: localStorage.getItem('asc_ad_v35') || '',
                
                newsData: JSON.parse(localStorage.getItem('asc_news_v35')) || [
                    { id: 1, title: 'Brezilya Ormanlarından Mardin Sokaklarına', region: 'STRATEJİ', body: 'Küresel ticaretin yeni rotası üzerine derinlemesine bir analiz....', img: '' }
                ],
                authors: JSON.parse(localStorage.getItem('asc_authors_v35')) || [
                    { id: 1, name: 'Ahmet Çınarbaş', title: 'Siyaset Bilimci', photo: 'https://i.ibb.co/LhqZz4H/ahmet.jpg' }
                ],

                init() { this.sync(); },

                authenticate() {
                    // Fail-safe authentication
                    if(this.tempPass.trim() === "47") {
                        this.authModal = false;
                        this.adminOpen = true;
                        this.tempPass = '';
                        console.log("Authority Verified.");
                    } else {
                        alert("ERİŞİM REDDEDİLDİ: Geçersiz Kod.");
                        this.tempPass = '';
                    }
                },

                handleFile(e) {
                    const reader = new FileReader();
                    reader.onload = (f) => {
                        if(this.adminTab === 'ads') {
                            this.adImage = f.target.result;
                            localStorage.setItem('asc_ad_v35', this.adImage);
                        } else { this.form.media = f.target.result; }
                    };
                    reader.readAsDataURL(e.target.files[0]);
                },

                save() {
                    if(this.adminTab === 'ads') { alert("Reklam Güncellendi."); return; }
                    
                    const isNews = this.adminTab === 'news';
                    const payload = {
                        id: Date.now(),
                        title: isNews ? this.form.main : undefined,
                        name: !isNews ? this.form.main : undefined,
                        region: isNews ? this.form.sub : undefined,
                        title: !isNews ? this.form.sub : (isNews ? this.form.sub : undefined),
                        body: isNews ? this.form.content : undefined,
                        bio: !isNews ? this.form.content : undefined,
                        img: isNews ? this.form.media : undefined,
                        photo: !isNews ? this.form.media : undefined
                    };

                    if (isNews) this.newsData.unshift(payload);
                    else this.authors.push(payload);
                    
                    this.sync();
                    this.form = { main: '', sub: '', content: '', media: '' };
                    alert("Yayın Başarıyla Tamamlandı.");
                },

                sync() {
                    localStorage.setItem('asc_news_v35', JSON.stringify(this.newsData));
                    localStorage.setItem('asc_authors_v35', JSON.stringify(this.authors));
                }
            }
        }
    </script>
</body>
</html>
