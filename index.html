<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Global Culture & Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfbf7; --text: #1a1a1a; --muted: #718096; --accent: #c49b66;
            --white: #ffffff; --transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; scroll-behavior: smooth; overflow-x: hidden; }
        #progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent); width: 0%; z-index: 10001; }
        
        nav { background: rgba(253, 251, 247, 0.9); backdrop-filter: blur(15px); padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.03); }
        .logo { font-family: 'Marcellus', serif; font-size: 2rem; letter-spacing: 3px; cursor: pointer; text-transform: uppercase; }
        .admin-trigger { cursor: pointer; opacity: 0.1; font-size: 10px; padding: 10px; transition: 0.3s; }
        .admin-trigger:hover { opacity: 1; color: var(--accent); }

        .authors-strip { background: var(--white); padding: 30px 0; display: flex; justify-content: center; gap: 40px; border-bottom: 1px solid #f1f1f1; flex-wrap: wrap; }
        .author-item { cursor: pointer; text-align: center; width: 90px; transition: var(--transition); }
        .author-item img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 1px solid var(--accent); padding: 4px; }
        .author-item span { display: block; font-size: 0.75rem; font-weight: 700; margin-top: 10px; font-family: 'Marcellus'; }

        .container { max-width: 1400px; margin: 40px auto; display: grid; grid-template-columns: 250px 1fr; gap: 40px; padding: 0 25px; }
        .sidebar h4 { font-family: 'Marcellus'; border-bottom: 1px solid #eee; padding-bottom: 10px; letter-spacing: 1px; }
        .cat-item { cursor: pointer; padding: 5px 0; transition: 0.3s; color: var(--muted); }
        .cat-item:hover { color: var(--accent); padding-left: 5px; }

        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }
        .news-card { background: var(--white); border-radius: 24px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.02); cursor: pointer; transition: var(--transition); border: 1px solid rgba(0,0,0,0.02); display: flex; flex-direction: column; }
        .news-card:hover { transform: translateY(-10px); box-shadow: 0 30px 60px rgba(0,0,0,0.06); }
        .news-img { width: 100%; height: 250px; object-fit: cover; }
        .card-body { padding: 25px; flex-grow: 1; }
        .card-body h2 { font-family: 'Marcellus', serif; font-size: 1.5rem; margin: 15px 0; line-height: 1.3; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: none; overflow-y: auto; }
        .close-btn { position: fixed; top: 30px; right: 40px; cursor: pointer; background: var(--text); color: #fff; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10000; transition: 0.3s; }
        .close-btn:hover { background: var(--accent); transform: rotate(90deg); }
        .article-wrap { max-width: 800px; margin: 60px auto; padding: 0 20px; animation: fadeIn 0.8s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 1024px) { .container { grid-template-columns: 1fr; } .sidebar { display: none; } }
    </style>
</head>
<body>

<div id="progress-bar"></div>

<div id="app">
    <nav>
        <div class="logo" onclick="location.reload()">LUMINA</div>
        <div style="display:flex; align-items:center; gap:20px;">
            <div id="loc-tag" style="font-size: 0.8rem; letter-spacing: 2px; font-weight: 700;">MARDİN • GLOBAL</div>
            <div class="admin-trigger" onclick="openAdmin()">[L_CORE_v23]</div>
        </div>
    </nav>

    <div class="authors-strip" id="authors-list"></div>

    <div class="container">
        <aside class="sidebar">
            <h4>KATEGORİLER</h4>
            <div id="cat-nav" style="line-height: 2.2; font-size: 0.9rem;"></div>
            <div id="ad-sidebar" style="margin-top:40px; border-radius:15px; overflow:hidden;"></div>
        </aside>
        <main class="news-grid" id="main-feed"></main>
    </div>
</div>

<div id="overlay" class="overlay">
    <div class="close-btn" onclick="closeOverlay()">✕</div>
    <div id="overlay-content" class="article-wrap"></div>
</div>

<script>
    const PASS = "47";
    let db = JSON.parse(localStorage.getItem('lumina_v23')) || {
        news: [{id:1, title: "Mardin'in Gümüş Kalbi", text: "Binlerce yıllık telkari sanatı, genç ustaların ellerinde modern tasarımlarla buluşuyor...", img: "https://images.unsplash.com/photo-1582738411706-bfc8e691d1c2?w=800", cat: "Kültür", author: "ASC"}],
        authors: [{id:1, name: "ASC", bio: "Kültür Araştırmacısı ve Editör", img: "https://via.placeholder.com/150"}],
        cats: ['Mardin', 'Kültür', 'Gastronomi', 'Tasarım'],
        ad: "https://via.placeholder.com/300x500"
    };

    function sync() { localStorage.setItem('lumina_v23', JSON.stringify(db)); renderApp(); }

    async function toBase64(file) {
        return new Promise((res) => {
            const r = new FileReader();
            r.readAsDataURL(file);
            r.onload = () => res(r.result);
        });
    }

    function openAdmin() {
        if(prompt("Sistem Şifresi:") !== PASS) return;
        const win = window.open("", "LuminaAdmin", "width=1300,height=900");
        
        const renderAdminUI = () => {
            win.document.body.innerHTML = `
            <html><head><title>Lumina Studio | Admin</title>
            <style>
                body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; padding: 30px; color: #1e293b; }
                .grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 25px; }
                .box { background: #fff; padding: 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; margin-bottom: 25px; }
                h2 { color: #c49b66; font-size: 1.2rem; margin-top:0; border-bottom: 2px solid #f8fafc; padding-bottom: 10px; }
                input, textarea, select { width: 100%; padding: 12px; margin: 8px 0 18px 0; border: 1.5px solid #e2e8f0; border-radius: 10px; font-family: inherit; transition: 0.3s; }
                input:focus { border-color: #c49b66; outline: none; box-shadow: 0 0 0 3px rgba(196,155,102,0.1); }
                button { background: #1a1a1a; color: #fff; border: none; padding: 14px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: 700; transition: 0.3s; }
                button:hover { background: #c49b66; transform: translateY(-2px); }
                .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #f8fafc; margin-bottom: 8px; border-radius: 8px; font-size: 13px; }
                .del-btn { color: #ef4444; cursor: pointer; font-weight: bold; }
                .cat-tag { background: #e2e8f0; padding: 4px 10px; border-radius: 20px; font-size: 11px; }
            </style></head>
            <body>
                <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
                    <h1>Lumina Studio <span style="font-weight:300; font-size:0.5em; opacity:0.6;">v23.5 Professional</span></h1>
                    <button onclick="window.close()" style="width:auto; padding:10px 20px; background:#ef4444;">Paneli Kapat</button>
                </header>
                
                <div class="grid">
                    <div class="left-col">
                        <div class="box">
                            <h2>Yeni Haber Yayınla</h2>
                            <input type="text" id="nt" placeholder="Haber Başlığı">
                            <select id="ncat">${db.cats.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
                            <select id="nauth">${db.authors.map(a=>`<option value="${a.name}">${a.name}</option>`).join('')}</select>
                            <textarea id="nc" placeholder="Haber İçeriği (Markdown veya HTML destekler)" rows="8"></textarea>
                            <label style="font-size:12px; font-weight:bold;">Kapak Görseli:</label>
                            <input type="file" id="ni" accept="image/*">
                            <button id="saveNewsBtn">Haberi Yayına Al</button>
                        </div>
                    </div>
                    
                    <div class="right-col">
                        <div class="box">
                            <h2>Kategori Yönetimi</h2>
                            <div style="display:flex; gap:10px;">
                                <input type="text" id="newCatInput" placeholder="Kategori adı..." style="margin:0;">
                                <button id="addCatBtn" style="width:auto;">Ekle</button>
                            </div>
                            <div style="margin-top:15px; max-height:150px; overflow-y:auto;">
                                ${db.cats.map((c, i)=>`
                                    <div class="list-item">
                                        <span>${c}</span>
                                        <span class="del-btn" id="delCat-${i}">SİL</span>
                                    </div>`).join('')}
                            </div>
                        </div>

                        <div class="box">
                            <h2>Yazar Kaydı</h2>
                            <input type="text" id="an" placeholder="Yazar Adı Soyadı">
                            <textarea id="ab" placeholder="Kısa Biyografi" rows="2"></textarea>
                            <input type="file" id="ai" accept="image/*">
                            <button id="saveAuthBtn">Yazarı Tanımla</button>
                        </div>

                        <div class="box">
                            <h2>Aktif Haberler</h2>
                            <div style="max-height:300px; overflow-y:auto;">
                                ${db.news.map(n=>`
                                    <div class="list-item">
                                        <span><b>[${n.cat}]</b> ${n.title.substring(0,25)}...</span>
                                        <span class="del-btn" id="delNews-${n.id}">SİL</span>
                                    </div>`).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            </body></html>`;

            // Event Listeners (AJAX Simülasyonu)
            win.document.getElementById('saveNewsBtn').onclick = async () => {
                const img = win.document.getElementById('ni').files[0] ? await toBase64(win.document.getElementById('ni').files[0]) : "https://via.placeholder.com/800";
                const newsData = {
                    t: 'addNews',
                    data: {
                        id: Date.now(),
                        title: win.document.getElementById('nt').value,
                        text: win.document.getElementById('nc').value,
                        cat: win.document.getElementById('ncat').value,
                        author: win.document.getElementById('nauth').value,
                        img: img
                    }
                };
                window.postMessage(newsData, '*');
                win.alert("Haber başarıyla eklendi!");
                win.location.reload();
            };

            win.document.getElementById('addCatBtn').onclick = () => {
                const val = win.document.getElementById('newCatInput').value;
                if(val) {
                    window.postMessage({t: 'addCat', val: val}, '*');
                    win.location.reload();
                }
            };

            win.document.getElementById('saveAuthBtn').onclick = async () => {
                const img = win.document.getElementById('ai').files[0] ? await toBase64(win.document.getElementById('ai').files[0]) : "https://via.placeholder.com/150";
                window.postMessage({
                    t: 'addAuth',
                    data: { id: Date.now(), name: win.document.getElementById('an').value, bio: win.document.getElementById('ab').value, img: img }
                }, '*');
                win.location.reload();
            };

            // Silme İşlemleri
            db.cats.forEach((c, i) => {
                const btn = win.document.getElementById(`delCat-${i}`);
                if(btn) btn.onclick = () => { window.postMessage({t:'delCat', index: i}, '*'); win.location.reload(); };
            });

            db.news.forEach(n => {
                const btn = win.document.getElementById(`delNews-${n.id}`);
                if(btn) btn.onclick = () => { window.postMessage({t:'delNews', id: n.id}, '*'); win.location.reload(); };
            });
        };

        renderAdminUI();
    }

    // --- ANA PENCERE MESAJ MERKEZİ (AJAX HANDLER) ---
    window.onmessage = (e) => {
        if(e.data.t === 'addNews') { db.news.unshift(e.data.data); sync(); }
        if(e.data.t === 'delNews') { db.news = db.news.filter(n=>n.id !== e.data.id); sync(); }
        if(e.data.t === 'addAuth') { db.authors.push(e.data.data); sync(); }
        if(e.data.t === 'addCat') { db.cats.push(e.data.val); sync(); }
        if(e.data.t === 'delCat') { db.cats.splice(e.data.index, 1); sync(); }
    };

    function renderApp() {
        // Yazarlar
        document.getElementById('authors-list').innerHTML = db.authors.map(a => `
            <div class="author-item" onclick="openAuthor(${a.id})">
                <img src="${a.img}"><span>${a.name}</span>
            </div>`).join('');
        
        // Kategoriler
        document.getElementById('cat-nav').innerHTML = db.cats.map(c => `
            <div class="cat-item" onclick="filterCat('${c}')">• ${c}</div>
        `).join('') + `<div class="cat-item" onclick="renderApp()" style="font-weight:bold; margin-top:10px;">• TÜMÜ</div>`;
        
        // Reklam
        document.getElementById('ad-sidebar').innerHTML = `<img src="${db.ad}" style="width:100%; border-radius:15px; filter: grayscale(0.2);">`;
        
        // Haber Akışı
        renderFeed(db.news);
    }

    function renderFeed(newsArray) {
        document.getElementById('main-feed').innerHTML = newsArray.map(n => `
            <article class="news-card" onclick="openNews(${n.id})">
                <img src="${n.img}" class="news-img">
                <div class="card-body">
                    <small style="color:var(--accent); font-weight:bold; letter-spacing:1px;">${n.cat.toUpperCase()} • ${n.author}</small>
                    <h2>${n.title}</h2>
                </div>
            </article>`).join('');
    }

    function filterCat(category) {
        const filtered = db.news.filter(n => n.cat === category);
        renderFeed(filtered);
    }

    function openNews(id) {
        const n = db.news.find(x=>x.id==id);
        const overlay = document.getElementById('overlay');
        overlay.style.display = 'block';
        document.body.style.overflow = 'hidden';
        document.getElementById('overlay-content').innerHTML = `
            <button class="audio-btn" style="background:var(--accent); color:white; border:none; padding:12px 25px; border-radius:50px; cursor:pointer; margin-bottom:30px; font-weight:700;" onclick="speak('${n.title.replace(/'/g,"")}. ${n.text.replace(/'/g,"")}')">🔊 Yazıyı Sesli Dinle</button>
            <h1 style="font-family:Marcellus; font-size:3.5rem; margin-bottom:10px;">${n.title}</h1>
            <p style="color:var(--accent); font-weight:bold; margin-bottom:30px;">Kategori: ${n.cat} | Yazar: ${n.author}</p>
            <img src="${n.img}" style="width:100%; border-radius:32px; margin-bottom:40px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);">
            <div style="font-size:1.25rem; line-height:1.8; color:#333;">${n.text.replace(/\n/g, '<br>')}</div>
        `;
    }

    function openAuthor(id) {
        const a = db.authors.find(x=>x.id==id);
        const overlay = document.getElementById('overlay');
        overlay.style.display = 'block';
        document.body.style.overflow = 'hidden';
        document.getElementById('overlay-content').innerHTML = `
            <div style="text-align:center; padding-top:40px;">
                <img src="${a.img}" style="width:180px; height:180px; border-radius:50%; border:4px solid var(--accent); padding:5px; object-fit:cover; margin-bottom:20px;">
                <h1 style="font-family:Marcellus; font-size:3rem; margin:0;">${a.name}</h1>
                <p style="font-size:1.1rem; color:var(--muted); max-width:500px; margin:20px auto;">${a.bio}</p>
            </div>
            <hr style="margin:50px 0; border:0; border-top:1px solid #eee;">
            <h3 style="font-family:Marcellus; margin-bottom:30px;">Yazarın Portfolyosu</h3>
            <div class="news-grid">${db.news.filter(n=>n.author === a.name).map(n=>`
                <div class="news-card" onclick="openNews(${n.id})">
                    <img src="${n.img}" style="height:180px; width:100%; object-fit:cover;">
                    <div style="padding:20px;"><h4>${n.title}</h4></div>
                </div>`).join('')}</div>
        `;
    }

    function closeOverlay() { 
        window.speechSynthesis.cancel();
        document.getElementById('overlay').style.display = 'none'; 
        document.body.style.overflow = 'auto';
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'tr-TR'; u.rate = 0.9;
        window.speechSynthesis.speak(u);
    }

    window.onscroll = () => {
        let winScroll = document.documentElement.scrollTop;
        let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        document.getElementById("progress-bar").style.width = (winScroll / height) * 100 + "%";
    };

    renderApp();
</script>
</body>
</html>
