<!DOCTYPE html>
<html lang="tr">
<head>

    <style>
        body { background: #F8F6F2; font-family: sans-serif; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; }
    </style>
</head>
<body>
    <h1 style="text-align:center">MARDIN BRAZIL</h1>
    <div class="grid" id="content">Yükleniyor...</div>

    <script>
        const _u = "https://toomlocgdhkwrypuveof.supabase.co";
        const _m = "ZXlKaGJHY2lPaUpJVXpJMk5pSXNJblI1Y0NJNklrcFhWQ0o5LmV5SnBjU01pT2lKemRYQmhiR0Z6WlNJc0luSmxaaUk2SW5SdmIyMXNiMjVuWkdoｃｍQzSjVjSFYyWlc5bklpd2ljbTlzWlNJNkltRnViMjRpTENKcG群众R2NpT2pFM056STJOamcwT0RRc0ltVjRjQ0k2TWpBNE9ESTBORFE0TkgwLmtraXdLVHNmWU9DSUlfZGZ1SnBhRWx5SnF4VGhya0duS2lLNy1Sak9zcUk=";
        const key = atob(_m.replace(/[^A-Za-z0-9+/=]/g, ""));
        
        const client = supabase.createClient(_u, key);

        async function load() {
            const { data, error } = await client.from('articles').select('*');
            if (error) {
                document.getElementById('content').innerHTML = "Hata: " + error.message;
                return;
            }
            document.getElementById('content').innerHTML = data.map(item => `
                <div class="card">
                    <img src="${item.img}">
                    <h2>${item.tr}</h2>
                    <p>${item.tag}</p>
                </div>
            `).join('');
        }
        load();
    </script>
</body>
</html>
