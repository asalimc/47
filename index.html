<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASC GLOBAL | The Ultimate Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap');
        
        /* GOOGLE ENGELLEYİCİ */
        .goog-te-banner-frame, .goog-te-balloon-frame, .goog-te-menu-value span:nth-child(2), 
        .goog-te-menu-value img, .goog-te-menu-frame, .skiptranslate, #google_translate_element {
            display: none !important;
        }
        body { top: 0px !important; font-family: 'Outfit', sans-serif; background-color: #020617; color: #f8fafc; overflow-x: hidden; }
        
        .bg-ultra {
            background: radial-gradient(circle at 0% 0%, #1e1b4b 0%, transparent 50%),
                        radial-gradient(circle at 100% 100%, #064e3b 0%, transparent 50%),
                        #020617;
        }

        .hero-title { font-size: clamp(3rem, 15vw, 10rem); font-weight: 900; line-height: 0.75; letter-spacing: -0.07em; }
        
        .glass-panel { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(30px); 
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .img-zoom { width: 100%; height: 100%; object-fit: cover; transition: transform 3s cubic-bezier(0.4, 0, 0.2, 1); }
        .group:hover .img-zoom { transform: scale(1.15); }

        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="portalApp()" x-init="init()" class="bg-ultra">

    <nav class="fixed top-0 w-full z-[100] bg-black/40 backdrop-blur-md border-b border-white/5">
        <div class="max-w-[1800px] mx-auto px-8 py-5 flex justify-between items-center">
            <div @click="currentPage = 'home'" class="flex items-center gap-4 cursor-pointer">
                <div class="bg-blue-600 text-white font-black px-5 py-2 rounded-2xl text-2xl tracking-tighter shadow-2xl">ASC</div>
                <span class="text-3xl font-black italic tracking-tighter text-white">PORTAL</span>
            </div>
            <button @click="loginAdmin()" class="bg-white text-black px-10 py-3.5 rounded-full text-xs font-black uppercase hover:bg-blue-600 hover:text-white transition-all shadow-2xl">Terminal</button>
        </div>
    </nav>

    <main>
        <div x-show="currentPage === 'home'" class="animate-in fade-in duration-1000">
            <header class="relative h-screen w-full flex items-center justify-center overflow-hidden">
                <div class="absolute inset-0 flex flex-col md:flex-row">
                    <div class="relative w-full md:w-1/2 h-full group">
                        <img src="https://images.unsplash.com/photo-1544830154-1505c215f79a?q=80&w=2000" class="img-zoom brightness-50">
                        <div class="absolute bottom-24 left-16"><h2 class="text-5xl font-black italic text-white">MARDİN</h2></div>
                    </div>
                    <div class="relative w-full md:w-1/2 h-full group border-l border-white/10">
                        <img src="https://images.unsplash.com/photo-1483728642387-6c3bdd6c93e5?q=80&w=2000" class="img-zoom brightness-50">
                        <div class="absolute bottom-24 left-16"><h2 class="text-5xl font-black italic text-white">RIO</h2></div>
                    </div>
                </div>
                <div class="relative z-10 text-center pointer-events-none">
                    <h1 class="hero-title italic text-white uppercase">ASC<br><span class="text-transparent" style="-webkit-text-stroke: 1.5px white;">GLOBAL</span></h1>
                </div>
            </header>

            <section class="max-w-[1800px] mx-auto px-8 py-40">
                <h2 class="text-7xl font-black uppercase italic mb-20">Global <span class="text-blue-600 text-transparent" style="-webkit-text-stroke: 1px #2563eb;">Yazarlar</span></h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12">
                    <template x-for="(author, index) in authors" :key="index">
                        <div @click="openAuthor(author)" class="group cursor-pointer">
                            <div class="relative aspect-[3/4] rounded-[4rem] overflow-hidden glass-panel p-3 mb-8 group-hover:border-blue-500 transition-all duration-700">
                                <img :src="author.photo" class="w-full h-full object-cover rounded-[3.5rem] grayscale group-hover:grayscale-0 transition duration-700">
                                <div class="absolute bottom-12 left-10">
                                    <h3 class="text-3xl font-black text-white uppercase italic" x-text="author.name"></h3>
                                    <p class="text-blue-500 text-[10px] font-black uppercase tracking-[0.3em]" x-text="author.title"></p>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </section>
        </div>

        <div x-show="currentPage === 'author-detail'" class="max-w-[1400px] mx-auto px-8 py-48" x-cloak x-transition>
            <button @click="currentPage = 'home'" class="mb-16 font-black text-xs uppercase tracking-widest text-slate-500 border border-white/10 px-8 py-4 rounded-full hover:bg-white hover:text-black transition">← Portal'a Dön</button>
            
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-20 items-start">
                <div class="lg:col-span-5">
                    <div class="sticky top-40">
                        <div class="relative aspect-square rounded-[5rem] overflow-hidden glass-panel p-4">
                            <img :src="selectedAuthor?.photo" class="w-full h-full object-cover rounded-[4rem] shadow-2xl">
                        </div>
                        <div class="mt-12 flex gap-4">
                            <div class="glass-panel p-6 rounded-3xl flex-1 text-center"><i class="fab fa-twitter text-blue-400 text-2xl"></i></div>
                            <div class="glass-panel p-6 rounded-3xl flex-1 text-center"><i class="fab fa-linkedin text-blue-600 text-2xl"></i></div>
                            <div class="glass-panel p-6 rounded-3xl flex-1 text-center"><i class="fas fa-envelope text-white text-2xl"></i></div>
                        </div>
                    </div>
                </div>
                
                <div class="lg:col-span-7">
                    <span class="text-blue-600 font-black uppercase tracking-[0.5em] text-sm" x-text="selectedAuthor?.title"></span>
                    <h1 class="text-8xl font-black uppercase italic mt-4 mb-12 leading-none tracking-tighter text-white" x-text="selectedAuthor?.name"></h1>
                    
                    <div class="glass-panel p-16 rounded-[4rem] border border-white/10">
                        <h4 class="text-blue-400 font-bold uppercase tracking-widest text-xs mb-6">Biyografi & Vizyon</h4>
                        <div class="text-2xl text-slate-300 leading-relaxed font-light italic" x-text="selectedAuthor?.bio"></div>
                    </div>

                    <div class="mt-12 p-12 border-l-4 border-blue-600 bg-white/5 rounded-r-[3rem]">
                        <p class="text-slate-400 text-lg">"Küresel bağlamda Mardin ve Rio de Janeiro arasındaki kültürel köprüleri inşa etmek, sadece bir iş değil, bir medeniyet misyonudur."</p>
                    </div>
                </div>
            </div>
        </div>

        <div x-show="currentPage === 'admin'" class="max-w-7xl mx-auto px-8 py-48" x-cloak>
            <div class="glass-panel p-16 rounded-[5rem]">
                <div class="flex justify-between items-center mb-10 pb-10 border-b border-white/10">
                    <h2 class="text-4xl font-black italic">SİSTEM <span class="text-blue-500">ADMİN</span></h2>
                    <button @click="currentPage = 'home'" class="text-xs font-black uppercase bg-red-600 px-8 py-3 rounded-full">Kapat</button>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                    <div class="space-y-4">
                        <input x-model="newAuthor.name" type="text" placeholder="İsim" class="w-full bg-white/5 p-6 rounded-3xl border border-white/10 outline-none">
                        <input x-model="newAuthor.title" type="text" placeholder="Ünvan" class="w-full bg-white/5 p-6 rounded-3xl border border-white/10 outline-none">
                        <textarea x-model="newAuthor.bio" placeholder="Biyografi" class="w-full bg-white/5 p-6 rounded-3xl border border-white/10 outline-none h-32"></textarea>
                        <input type="file" @change="handleFileUpload($event, 'author')" class="text-xs">
                        <button @click="addAuthor()" class="w-full bg-blue-600 py-6 rounded-3xl font-black uppercase">Kaydet</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function portalApp() {
            return {
                currentPage: 'home',
                selectedAuthor: null,
                mTime: '', bTime: '',
                newAuthor: { name: '', title: '', bio: '', photo: '' },

                authors: JSON.parse(localStorage.getItem('asc_v10_authors')) || [
                    { name: 'Dr. Ahmet Salim', title: 'Senior Historian', bio: 'Mezopotamya mimarisi ve Mardin in kadim tarihi üzerine 20 yılı aşkın süredir araştırmalar yapmaktadır. Küresel tarih projelerinde danışmanlık yapmaktadır.', photo: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=800' },
                    { name: 'Isabella Mendes', title: 'Macro Strategist', bio: 'Rio de Janeiro merkezli ekonomi analisti. Güney Amerika pazarları ve küresel ticaret rotaları üzerine uzmanlaşmış bir stratejisttir.', photo: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=800' }
                ],

                init() {
                    setInterval(() => {
                        const n = new Date();
                        this.mTime = new Intl.DateTimeFormat('tr-TR', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Istanbul' }).format(n);
                        this.bTime = new Intl.DateTimeFormat('tr-TR', { hour: '2-digit', minute: '2-digit', timeZone: 'America/Sao_Paulo' }).format(n);
                    }, 1000);
                },

                handleFileUpload(event, type) {
                    const file = event.target.files[0];
                    const reader = new FileReader();
                    reader.onloadend = () => { if(type === 'author') this.newAuthor.photo = reader.result; }
                    if(file) reader.readAsDataURL(file);
                },

                loginAdmin() {
                    if (prompt("Key:") === "Mardin47**") this.currentPage = 'admin';
                },

                addAuthor() {
                    this.authors.push({...this.newAuthor});
                    localStorage.setItem('asc_v10_authors', JSON.stringify(this.authors));
                    this.newAuthor = {name:'', title:'', bio:'', photo:''};
                    alert("Eklendi!");
                },

                openAuthor(author) {
                    this.selectedAuthor = author;
                    this.currentPage = 'author-detail';
                    window.scrollTo(0,0);
                }
            }
        }
    </script>
</body>
</html>
