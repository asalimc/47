<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASC GLOBAL | Signature Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Inter:wght@300;400;500;700&display=swap');
        
        :root { --bg: #0a0c10; --text: #f1f5f9; --accent: #3b82f6; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
        .serif { font-family: 'Cormorant Garamond', serif; }
        
        /* Artistik Dokunuşlar */
        .glass-nav { background: rgba(10, 12, 16, 0.8); backdrop-filter: saturate(180%) blur(15px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .author-line { border-left: 1px solid rgba(59, 130, 246, 0.3); padding-left: 20px; transition: 0.4s; }
        .author-line:hover { border-left-color: var(--accent); background: rgba(59, 130, 246, 0.03); }
        
        .main-card-img { filter: brightness(0.8) contrast(1.1); transition: 0.8s cubic-bezier(0.2, 0, 0.2, 1); }
        .group:hover .main-card-img { filter: brightness(1) contrast(1); transform: scale(1.03); }

        /* Göz yormayan yumuşak geçişli scroll */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }

        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="ascApp()" x-init="init()">

    <nav class="fixed top-0 w-full z-[100] glass-nav">
        <div class="max-w-[1400px] mx-auto px-6 py-5 flex justify-between items-center">
            <div @click="currentPage = 'home'" class="cursor-pointer group">
                <h1 class="text-2xl font-bold tracking-tighter uppercase italic group-hover:text-blue-500 transition">ASC<span class="text-blue-500">.</span>GLOBAL</h1>
            </div>
            
            <div class="hidden md:flex gap-10 text-[10px] font-bold uppercase tracking-[0.3em] text-slate-500">
                <a href="#" class="hover:text-white transition">Arşiv</a>
                <a href="#" class="hover:text-white transition">Mardin</a>
                <a href="#" class="hover:text-white transition">Sao Paulo</a>
            </div>

            <button @click="openAdmin()" class="text-[10px] font-black uppercase tracking-widest border border-white/10 px-5 py-2 rounded-full hover:bg-white hover:text-black transition">
                Yönetim
            </button>
        </div>
    </nav>

    <main x-show="currentPage === 'home'" class="pt-32 pb-20 px-6 max-w-[1400px] mx-auto animate-in fade-in duration-1000" x-cloak>
        
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-16">
            
            <div class="lg:col-span-3 space-y-12">
                <div>
                    <h3 class="serif text-3xl italic mb-8 text-slate-400">Görüşler</h3>
                    <div class="space-y-10">
                        <template x-for="author in authors" :key="author.id">
                            <div class="author-line group cursor-pointer">
                                <h4 class="font-bold text-sm mb-1 group-hover:text-blue-400 transition" x-text="author.name"></h4>
                                <p class="text-[9px] font-black uppercase tracking-widest text-blue-600 mb-3" x-text="author.title"></p>
                                <p class="text-xs text-slate-500 italic leading-relaxed line-clamp-2" x-text="author.bio"></p>
                            </div>
                        </template>
                    </div>
                </div>
                
                <div class="pt-8 border-t border-white/5">
                    <p class="text-[10px] font-bold text-slate-600 uppercase tracking-widest">Global Status</p>
                    <div class="mt-4 flex items-center gap-2">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                        <span class="text-xs font-medium text-slate-400">Sistemler Aktif</span>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-9">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                    
                    <div @click="viewNews(getNews('Mardin'))" class="md:col-span-2 group cursor-pointer border-b border-white/5 pb-12">
                        <div class="overflow-hidden rounded-sm mb-8 aspect-[21/9]">
                            <img :src="getNews('Mardin').img" class="main-card-img w-full h-full object-cover">
                        </div>
                        <div class="max-w-3xl">
                            <span class="text-[10px] font-black text-blue-500 uppercase tracking-[0.4em] mb-4 block">Mardin Raporu</span>
                            <h2 class="serif text-5xl md:text-7xl leading-[1.1] text-white group-hover:text-blue-500 transition-colors" x-text="getNews('Mardin').title"></h2>
                            <p class="mt-6 text-slate-400 text-lg leading-relaxed italic" x-text="getNews('Mardin').body.substring(0, 150) + '...'"></p>
                        </div>
                    </div>

                    <div @click="viewNews(getNews('Sao Paulo'))" class="group cursor-pointer">
                        <div class="overflow-hidden rounded-sm mb-6 aspect-video">
                            <img :src="getNews('Sao Paulo').img" class="main-card-img w-full h-full object-cover">
                        </div>
                        <span class="text-[9px] font-black text-yellow-600 uppercase tracking-widest mb-3 block">Brezilya / Ekonomi</span>
                        <h3 class="serif text-3xl text-white group-hover:text-blue-400 transition" x-text="getNews('Sao Paulo').title"></h3>
                    </div>

                    <div class="space-y-8">
                        <h4 class="text-[10px] font-black uppercase text-slate-600 tracking-widest border-b border-white/5 pb-2">Son Gelişmeler</h4>
                        <template x-for="n in newsData.filter(x => x.region === 'Global').slice(0, 3)">
                            <div @click="viewNews(n)" class="group cursor-pointer">
                                <p class="text-xs text-slate-500 font-bold mb-1" x-text="n.date"></p>
                                <h4 class="text-lg font-bold leading-tight group-hover:text-blue-500 transition" x-text="n.title"></h4>
                            </div>
                        </template>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <div x-show="currentPage === 'reader'" class="fixed inset-0 z-[200] bg-[#0a0c10] overflow-y-auto px-6 py-20 animate-in slide-in-from-bottom duration-700" x-cloak>
        <div class="max-w-[800px] mx-auto">
            <button @click="currentPage = 'home'" class="mb-20 text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-white flex items-center gap-2">
                <i class="fas fa-arrow-left"></i> Geri Dön
            </button>
            
            <span class="text-blue-500 font-black text-xs uppercase tracking-[0.5em] mb-4 block" x-text="selectedNews?.region"></span>
            <h1 class="serif text-6xl md:text-8xl text-white leading-none mb-12" x-text="selectedNews?.title"></h1>
            
            <img :src="selectedNews?.img" class="w-full h-auto rounded-sm mb-16 shadow-2xl grayscale hover:grayscale-0 transition duration-1000">
            
            <div class="serif text-3xl md:text-4xl text-slate-300 leading-relaxed space-y-8" x-html="selectedNews?.body"></div>
        </div>
    </div>

    <div x-show="currentPage === 'admin'" class="pt-32 pb-20 px-6 max-w-[1400px] mx-auto" x-cloak>
        <div class="flex justify-between items-center mb-12">
            <h2 class="text-3xl font-black italic uppercase tracking-tighter">Yönetim <span class="text-blue-600">Konsolu</span></h2>
            <button @click="currentPage = 'home'" class="text-xs font-bold text-red-500 uppercase border border-red-500/20 px-4 py-2 rounded-lg">Çıkış</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            <div class="bg-slate-900/50 p-8 rounded-2xl border border-white/5">
                <div class="flex gap-4 mb-8">
                    <button @click="editorType = 'news'" :class="editorType === 'news' ? 'text-blue-500 border-b-2 border-blue-500' : 'text-slate-500'" class="pb-2 font-bold uppercase text-xs">Haber</button>
                    <button @click="editorType = 'author'" :class="editorType === 'author' ? 'text-blue-500 border-b-2 border-blue-500' : 'text-slate-500'" class="pb-2 font-bold uppercase text-xs">Yazar</button>
                </div>
                
                <div class="space-y-4">
                    <template x-if="editorType === 'news'">
                        <div class="space-y-4">
                            <input x-model="newsForm.title" type="text" placeholder="Haber Başlığı" class="w-full bg-black/50 border border-white/10 p-4 rounded-lg outline-none focus:border-blue-500">
                            <select x-model="newsForm.region" class="w-full bg-black/50 border border-white/10 p-4 rounded-lg">
                                <option value="Global">Global</option>
                                <option value="Mardin">Mardin</option>
                                <option value="Sao Paulo">Sao Paulo</option>
                            </select>
                            <textarea x-model="newsForm.body" placeholder="Metin..." class="w-full bg-black/50 border border-white/10 p-4 rounded-lg h-32 outline-none"></textarea>
                        </div>
                    </template>
                    <template x-if="editorType === 'author'">
                        <div class="space-y-4">
                            <input x-model="authorForm.name" type="text" placeholder="İsim" class="w-full bg-black/50 border border-white/10 p-4 rounded-lg outline-none">
                            <input x-model="authorForm.title" type="text" placeholder="Ünvan" class="w-full bg-black/50 border border-white/10 p-4 rounded-lg outline-none">
                            <textarea x-model="authorForm.bio" placeholder="Biyografi..." class="w-full bg-black/50 border border-white/10 p-4 rounded-lg h-24 outline-none"></textarea>
                        </div>
                    </template>
                    <input type="file" @change="handleUpload" class="text-xs text-slate-500 mt-4">
                    <button @click="saveData()" class="w-full bg-blue-600 py-4 rounded-lg font-black text-xs uppercase tracking-widest mt-4">Sisteme Gönder</button>
                </div>
            </div>

            <div class="space-y-6 overflow-y-auto max-h-[600px] pr-4">
                <h3 class="text-xs font-black uppercase text-slate-500 tracking-widest">İçerik Listesi</h3>
                <template x-for="(n, idx) in newsData" :key="n.id">
                    <div class="flex items-center justify-between p-4 bg-white/5 rounded-xl border border-white/5">
                        <span class="text-xs font-bold truncate max-w-[200px]" x-text="n.title"></span>
                        <div class="flex gap-2">
                            <button @click="deleteNews(idx)" class="text-red-500 hover:text-white transition"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </template>
                <div class="h-px bg-white/5 my-6"></div>
                <template x-for="(a, idx) in authors" :key="a.id">
                    <div class="flex items-center justify-between p-4 bg-white/5 rounded-xl border border-white/5">
                        <span class="text-xs font-bold italic" x-text="a.name"></span>
                        <button @click="deleteAuthor(idx)" class="text-red-500"><i class="fas fa-trash"></i></button>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <script>
        function ascApp() {
            return {
                currentPage: 'home', editorType: 'news', selectedNews: null,
                newsForm: { title: '', region: 'Global', body: '', img: '' },
                authorForm: { name: '', title: '', bio: '', photo: '' },
                newsData: JSON.parse(localStorage.getItem('asc_v7_news')) || [
                    { id: 1, title: 'Mezopotamya Havzasında Yeni Teknoloji Koridoru', region: 'Mardin', body: 'Kadim kentin mimarisi, dijital göçebe toplulukları için yeniden tasarlanıyor. Mardin artık sadece tarihin değil, geleceğin de merkezi...', img: 'https://images.unsplash.com/photo-1582236894056-e918b9588667?w=1600', date: '02.03.2026' },
                    { id: 2, title: 'Sao Paulo Finansal Teknoloji Devrimi', region: 'Sao Paulo', body: 'Latin Amerika nın kalbinde kripto varlıklar ve borsa entegrasyonu tamamlandı. Yeni ekonomi modelleri burada test ediliyor...', img: 'https://images.unsplash.com/photo-1543059180-87383af5bd1f?w=1600', date: '02.03.2026' }
                ],
                authors: JSON.parse(localStorage.getItem('asc_v7_authors')) || [
                    { id: 1, name: 'Caner Özdemir', title: 'Strateji Yazarı', bio: 'Küresel jeopolitik ve Mardin-Global ticaret hatları uzmanı.', photo: '' },
                    { id: 2, name: 'Sofia Silva', title: 'Ekonomi Analisti', bio: 'Brezilya ve yükselen pazarlar üzerine uzmanlaşmış kıdemli analist.', photo: '' }
                ],

                init() { this.sync(); },
                getNews(region) { return this.newsData.find(n => n.region === region) || { title: region + ' İçeriği Bekleniyor', img: '', body: '' }; },
                handleUpload(e) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        if(this.editorType === 'news') this.newsForm.img = reader.result;
                        else this.authorForm.photo = reader.result;
                    };
                    reader.readAsDataURL(e.target.files[0]);
                },
                openAdmin() { if(prompt("Sistem Anahtarı:") === "Mardin47**") this.currentPage = 'admin'; },
                saveData() {
                    if(this.editorType === 'news') this.newsData.unshift({...this.newsForm, id: Date.now(), date: new Date().toLocaleDateString('tr-TR')});
                    else this.authors.push({...this.authorForm, id: Date.now()});
                    this.sync(); this.resetForms(); alert("Sistem Güncellendi.");
                },
                deleteNews(idx) { this.newsData.splice(idx, 1); this.sync(); },
                deleteAuthor(idx) { this.authors.splice(idx, 1); this.sync(); },
                viewNews(news) { this.selectedNews = news; this.currentPage = 'reader'; window.scrollTo(0,0); },
                sync() { localStorage.setItem('asc_v7_news', JSON.stringify(this.newsData)); localStorage.setItem('asc_v7_authors', JSON.stringify(this.authors)); },
                resetForms() { this.newsForm = { title: '', region: 'Global', body: '', img: '' }; this.authorForm = { name: '', title: '', bio: '', photo: '' }; }
            }
        }
    </script>
</body>
</html>
