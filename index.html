<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumina | Mardin & Brazil Culture Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #f4ecd8; --card-bg: #fdfbf7; --text: #433422; --accent: #a67c52; }
        * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; line-height: 1.6; transition: background 0.5s ease; }
        #progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent); width: 0%; z-index: 10001; }
        nav { background: rgba(244, 236, 216, 0.95); backdrop-filter: blur(15px); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 1000; border-bottom: 1px solid rgba(67, 52, 34, 0.1); }
        .logo { font-family: 'Marcellus', serif; font-size: 1.5rem; letter-spacing: 3px; font-weight: bold; text-transform: uppercase; }
        
        /* Kültürel Pusula Üst Bar */
        .culture-hub-bar { background: #1a1a1a; color: #f4ecd8; padding: 8px 5%; display: flex; justify-content: space-between; font-size: 10px; font-weight: bold; letter-spacing: 1px; }

        .authors-strip { background: var(--card-bg); padding: 25px 0; display: flex; gap: 20px; border-bottom: 1px solid rgba(0,0,0,0.05); overflow-x: auto; scrollbar-width: none; padding-left: 5%; }
        .author-item { text-align: center; width: 90px; flex-shrink: 0; cursor: pointer; }
        .author-item img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); padding: 2px; margin: 0 auto; }
        .author-item span { display: block; font-size: 0.65rem; font-weight: 700; margin-top: 8px; font-family: 'Marcellus'; text-transform: uppercase; }

        .container-main { max-width: 1440px; margin: 20px auto; padding: 0 15px; }
        #news-feed { display: grid; grid-template-columns: 1fr; gap: 25px; }
        @media (min-width: 768px) { #news-feed { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1100px) { #news-feed { grid-template-columns: repeat(3, 1fr); } }

        .news-card { background: var(--card-bg); border-radius: 24px; overflow: hidden; border: 1px solid rgba(0,0,0,0.04); transition: 0.4s; position: relative; cursor: pointer; }
        .news-img { width: 100%; height: 260px; object-fit: cover; transition: 0.5s; }
        .news-card:hover .news-img { transform: scale(1.05); }
        .card-body { padding: 24px; }
        .card-body h2 { font-family: 'Marcellus', serif; font-size: 1.25rem; margin: 10px 0; color: #1a1a1a; }
        .dna-match { font-size: 9px; color: var(--accent); font-weight: 800; border: 1px solid var(--accent); padding: 2px 8px; border-radius: 4px; float: right; }

        .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; overflow-y: auto; padding-bottom: 80px; }
        #art-body { font-size: 1.15rem; line-height: 1.9; max-width: 720px; margin: 0 auto; text-align: justify; }

        #admin-panel { display: none; background: #080808; color: #eee; position: fixed; inset: 0; z-index: 11000; overflow-y: auto; padding: 30px; }
        .input-cms { width: 100%; padding: 12px; margin-bottom: 10px; background: #121212; border: 1px solid #222; border-radius: 10px; color: white; }
    </style>
</head>
<body>

<div class="culture-hub-bar">
    <div>MARDİN: <span id="time-mardin">--:--</span> | 18°C</div>
    <div class="hidden md:block">MESAFE: 10.844 KM | KÜLTÜREL DNA: %88</div>
    <div>RIO: <span id="time-rio">--:--</span> | 29°C</div>
</div>

<nav>
    <div class="logo">LUMINA</div>
    <div class="flex gap-4">
        <span onclick="filterCity('c1')" class="cursor-pointer">🏛️</span>
        <span onclick="filterCity('c2')" class="cursor-pointer">🦜</span>
    </div>
</nav>

<div id="authors-list" class="authors-strip"></div>

<div class="container-main">
    <main id="news-feed"></main>
</div>

<footer class="py-12 text-center opacity-30">
    <button onclick="toggleAdmin()" class="text-[9px] font-bold tracking-[5px] border-b border-black/20 pb-1">CMS MASTER v5.0</button>
</footer>

<div id="overlay" class="overlay">
    <div class="sticky top-0 bg-[#f4ecd8]/95 p-5 flex justify-between items-center z-[10002]">
        <div class="text-[10px] font-black tracking-widest opacity-50 uppercase">Kültürel Analiz</div>
        <button onclick="closeAll()" class="bg-black text-white w-10 h-10 rounded-full">✕</button>
    </div>
    <div id="overlay-content" class="max-w-3xl mx-auto py-12 px-6"></div>
</div>

<div id="admin-panel">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-xl font-serif text-accent uppercase">Lumina Master CMS</h2>
            <button onclick="toggleAdmin()" class="bg-red-900 text-white px-6 py-2 rounded-xl text-xs">KAPAT</button>
        </div>
        <div id="admin-content" class="grid grid-cols-1 lg:grid-cols-12 gap-10"></div>
    </div>
</div>

<script>
    const db = {
        yazarlar: [
            {id:'y1', isim:'Gabriel Garcia', bio:'Kültür Yazarı', img:'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=200'},
            {id:'y2', isim:'Leyla Mardini', bio:'Tarihçi', img:'https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=200'},
            {id:'y3', isim:'Chef Rodrigo', bio:'Gastronomi', img:'https://images.unsplash.com/photo-1583394238182-6f71f218a66e?w=200'}
        ],
        haberler: [
            {id:'h1', dna:'%92', title:"Güneşin İki Yüzü: Mardin ve Rio'da Gün Batımı", text:"Mezopotamya ovasında güneş batarken taşlar kızıla bürünür. Aynı his, Rio'nun Sugarloaf tepesinde okyanusa karşı yaşanır. Işığın bu iki coğrafyadaki mistik dansı, insan ruhunda benzer bir dinginlik uyandırır.", img:'https://images.unsplash.com/photo-1582738411706-bfc8e691d1c2?w=800', cid:'c1', yid:'y2'},
            {id:'h2', dna:'%85', title:"Kahvenin Yolculuğu: Mırra'dan Cafezinho'ya", text:"Mardin'in acı mırrası ile Brezilya'nın sert cafezinho'su... Her ikisi de küçük fincanlarda devasa bir kültür taşır. Misafirperverliğin en sert ve en samimi göstergesidir kahve.", img:'https://images.unsplash.com/photo-1506368249639-73a05d6f6488?w=800', cid:'c2', yid:'y3'},
            {id:'h3', dna:'%95', title:"Kutsal Taşlar: Mardin Evleri ve Paraty Mimarisi", text:"Mardin'in kalker taşları ile Brezilya'nın kolonyal kasabası Paraty'deki taş döşemeli sokaklar... Taşın soğukluğu, her iki kültürde de sıcak bir yuvaya dönüşür.", img:'https://images.unsplash.com/photo-1563802379532-62886477e098?w=800', cid:'c1', yid:'y2'},
            {id:'h4', dna:'%80', title:"Ritim ve İnanç: Reyhani'den Samba'ya", text:"Reyhani oyunundaki o vakur duruş ile Samba'daki özgürlük aslında aynı yerden doğar: İnsanın toprağa ve gökyüzüne olan teşekkürü.", img:'https://images.unsplash.com/photo-1596707323136-22442436f903?w=800', cid:'c2', yid:'y1'},
            {id:'h5', dna:'%88', title:"Baharatın İzi: İpek Yolu'ndan Amazon'a", text:"Mardin mutfağının mahlebi ile Amazon ormanlarının egzotik meyveleri, mutfakta birer şifa kaynağıdır. Baharat, her iki halkın da karakterini belirler.", img:'https://images.unsplash.com/photo-1506459225024-1428097a7e18?w=800', cid:'c1', yid:'y3'},
            {id:'h6', dna:'%90', title:"Mistik Hayvanlar: Şahmeran ve Jaguar", text:"Mezopotamya'nın yılanlar kraliçesi Şahmeran, Amazon'un kutsal jaguarı ile aynı tahtta oturur: Doğanın gizemli ve korunması gereken kalbi.", img:'https://images.unsplash.com/photo-1516026672322-bc52d61a55d5?w=800', cid:'c2', yid:'y1'},
            {id:'h7', dna:'%75', title:"Gümüşün Sanatı: Telkari ve Brezilya Takıları", text:"Mardinli ustaların elinde hayat bulan gümüş teller, Brezilya yerlilerinin el işçiliğiyle birleştiğinde ortaya tek bir sonuç çıkar: Sabır ve zarafet.", img:'https://images.unsplash.com/photo-1535556116002-6281ff3e9f36?w=800', cid:'c1', yid:'y2'},
            {id:'h8', dna:'%82', title:"Suya Yazılan Yazı: Sarnıçlar ve Şelaleler", text:"Dara'nın devasa su sarnıçları ile Iguazu'nun gürleyen suları... Su, her iki coğrafyada da hem bereketin hem de gücün simgesidir.", img:'https://images.unsplash.com/photo-1590523277543-a94d2e4eb00b?w=800', cid:'c2', yid:'y1'},
            {id:'h9', dna:'%98', title:"Toprak Kokusu: Mezopotamya Ovası ve Pantanal", text:"Dünyanın en bereketli iki ovası. Toprak burada sadece tarım değil, üzerinde yaşayan insanların kaderini yazan bir mürekkeptir.", img:'https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=800', cid:'c1', yid:'y2'},
            {id:'h10', dna:'%91', title:"Sokak Karnavalı vs. Köy Düğünü", text:"Rio'nun karnavalındaki o kolektif neşe ile Mardin'in köy düğünlerindeki o devasa sofralar ve zılgıtlar; insanlığın 'birlikte mutlu olma' arzusunun kanıtıdır.", img:'https://images.unsplash.com/photo-1483729558449-99ef09a8c325?w=800', cid:'c2', yid:'y1'}
        ]
    };

    function updateClocks() {
        const now = new Date();
        document.getElementById('time-mardin').innerText = now.toLocaleTimeString('tr-TR', {timeZone: 'Europe/Istanbul', hour: '2-digit', minute: '2-digit'});
        document.getElementById('time-rio').innerText = now.toLocaleTimeString('tr-TR', {timeZone: 'America/Sao_Paulo', hour: '2-digit', minute: '2-digit'});
    }

    function renderPortal() {
        document.getElementById('authors-list').innerHTML = db.yazarlar.map(y => `
            <div class="author-item"><img src="${y.img}"><span>${y.isim}</span></div>
        `).join('');

        document.getElementById('news-feed').innerHTML = db.haberler.map(h => `
            <article class="news-card" onclick="openNews('${h.id}')">
                <img src="${h.img}" class="news-img">
                <div class="card-body">
                    <span class="dna-match">DNA ${h.dna}</span>
                    <small class="text-accent font-bold text-[9px] uppercase tracking-widest">${h.cid === 'c1' ? 'Mardin' : 'Brezilya'}</small>
                    <h2 class="font-serif text-lg mt-2">${h.title}</h2>
                    <p class="line-clamp-2 mt-2 opacity-70">${h.text}</p>
                </div>
            </article>
        `).join('');
    }

    function openNews(hid) {
        const h = db.haberler.find(x => x.id === hid);
        const y = db.yazarlar.find(x => x.id === h.yid);
        document.getElementById('overlay').style.display = 'block';
        document.body.style.overflow = 'hidden';
        document.getElementById('overlay-content').innerHTML = `
            <h1 class="text-4xl font-serif mb-6">${h.title}</h1>
            <div class="flex items-center gap-3 mb-8 pb-4 border-b border-black/5">
                <img src="${y.img}" class="w-10 h-10 rounded-full border border-accent">
                <div class="text-xs"><strong>${y.isim}</strong><br><span class="opacity-50">${y.bio}</span></div>
            </div>
            <img src="${h.img}" class="w-full rounded-2xl mb-8">
            <div id="art-body">${h.text}</div>
        `;
    }

    function toggleAdmin() { 
        const p = document.getElementById('admin-panel'); 
        p.style.display = p.style.display === 'block' ? 'none' : 'block'; 
        if(p.style.display === 'block') {
            document.getElementById('admin-content').innerHTML = `
                <div class="lg:col-span-12">
                    <h3 class="text-accent mb-4 text-xs font-bold uppercase">Mevcut Veri Katmanları (10 Aktif Haber)</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${db.haberler.map(h => `<div class="bg-[#111] p-3 rounded-lg text-[10px] flex justify-between"><span>${h.title}</span><span class="text-accent">${h.dna} Match</span></div>`).join('')}
                    </div>
                    <div class="mt-8 p-6 bg-[#111] rounded-2xl border border-white/5">
                        <p class="text-xs opacity-50 mb-4">Yeni içerik girişi için veri şeması JSON formatında optimize edildi.</p>
                        <button class="bg-accent text-white px-8 py-3 rounded-xl font-bold text-[10px]">YENİ VERİ EKLE</button>
                    </div>
                </div>`;
        }
    }

    function closeAll() { document.getElementById('overlay').style.display = 'none'; document.body.style.overflow = 'auto'; }
    setInterval(updateClocks, 1000);
    window.onload = () => { updateClocks(); renderPortal(); };
</script>
</body>
</html>
