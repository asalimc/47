<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Global Culture & Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfbf7; --text: #1a1a1a; --muted: #718096; --accent: #c49b66;
            --white: #ffffff; --transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; scroll-behavior: smooth; overflow-x: hidden; }
        #progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent); width: 0%; z-index: 10001; }
        
        nav { background: rgba(253, 251, 247, 0.9); backdrop-filter: blur(15px); padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.03); }
        .logo { font-family: 'Marcellus', serif; font-size: 2rem; letter-spacing: 3px; cursor: pointer; text-transform: uppercase; }
        .admin-trigger { cursor: pointer; opacity: 0.1; font-size: 10px; padding: 10px; transition: 0.3s; }

        .authors-strip { background: var(--white); padding: 30px 0; display: flex; justify-content: center; gap: 40px; border-bottom: 1px solid #f1f1f1; flex-wrap: wrap; }
        .author-item { cursor: pointer; text-align: center; width: 90px; transition: var(--transition); }
        .author-item img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 1px solid var(--accent); padding: 4px; }
        .author-item span { display: block; font-size: 0.75rem; font-weight: 700; margin-top: 10px; font-family: 'Marcellus'; }

        .container { max-width: 1400px; margin: 40px auto; display: grid; grid-template-columns: 250px 1fr; gap: 40px; padding: 0 25px; }
        .sidebar h4 { font-family: 'Marcellus'; border-bottom: 1px solid #eee; padding-bottom: 10px; letter-spacing: 1px; }
        .cat-item { cursor: pointer; padding: 5px 0; transition: 0.3s; color: var(--muted); }
        .cat-item:hover { color: var(--accent); padding-left: 5px; }

        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }
        .news-card { background: var(--white); border-radius: 24px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.02); cursor: pointer; transition: var(--transition); border: 1px solid rgba(0,0,0,0.02); display: flex; flex-direction: column; }
        .news-card:hover { transform: translateY(-10px); box-shadow: 0 30px 60px rgba(0,0,0,0.06); }
        .news-img { width: 100%; height: 250px; object-fit: cover; }
        .card-body { padding: 25px; flex-grow: 1; }
        .card-body h2 { font-family: 'Marcellus', serif; font-size: 1.5rem; margin: 15px 0; line-height: 1.3; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: none; overflow-y: auto; }
        .close-btn { position: fixed; top: 30px; right: 40px; cursor: pointer; background: var(--text); color: #fff; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10000; transition: 0.3s; }
        .article-wrap { max-width: 800px; margin: 60px auto; padding: 0 20px; animation: fadeIn 0.8s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 1024px) { .container { grid-template-columns: 1fr; } .sidebar { display: none; } }
    </style>
</head>
<body>

<div id="progress-bar"></div>

<div id="app">
    <nav>
        <div class="logo" onclick="location.reload()">LUMINA</div>
        <div style="display:flex; align-items:center; gap:20px;">
            <div id="loc-tag" style="font-size: 0.8rem; letter-spacing: 2px; font-weight: 700;">MARDİN • GLOBAL</div>
            <div class="admin-trigger" onclick="openAdmin()">[L_CORE_v23]</div>
        </div>
    </nav>

    <div class="authors-strip" id="authors-list"></div>

    <div class="container">
        <aside class="sidebar">
            <h4>KATEGORİLER</h4>
            <div id="cat-nav" style="line-height: 2.2; font-size: 0.9rem;"></div>
            <div id="ad-sidebar" style="margin-top:40px; border-radius:15px; overflow:hidden;"></div>
        </aside>
        <main class="news-grid" id="main-feed"></main>
    </div>
</div>

<div id="overlay" class="overlay">
    <div class="close-btn" onclick="closeOverlay()">✕</div>
    <div id="overlay-content" class="article-wrap"></div>
</div>

<script>
    const PASS = "47";
    let db = JSON.parse(localStorage.getItem('lumina_v23')) || {
        news: [{id:1, title: "Mardin'in Gümüş Kalbi", text: "Binlerce yıllık telkari sanatı...", img: "https://images.unsplash.com/photo-1582738411706-bfc8e691d1c2?w=800", cat: "Kültür", author: "ASC"}],
        authors: [{id:1, name: "ASC", bio: "Kültür Araştırmacısı ve Editör", img: "https://via.placeholder.com/150"}],
        cats: ['Mardin', 'Kültür', 'Gastronomi', 'Tasarım'],
        ad: "https://via.placeholder.com/300x500"
    };

    function sync() { localStorage.setItem('lumina_v23', JSON.stringify(db)); renderApp(); }

    async function toBase64(file) {
        return new Promise((res) => {
            const r = new FileReader();
            r.readAsDataURL(file);
            r.onload = () => res(r.result);
        });
    }

    function openAdmin() {
        if(prompt("Sistem Şifresi:") !== PASS) return;
        const win = window.open("", "LuminaAdmin", "width=1300,height=900");
        if (!win) return alert("Lütfen pop-up engelleyicisini kapatın.");

        const adminHtml = `
            <html><head><title>Lumina Studio | Admin</title>
            <style>
                body { font-family: sans-serif; background: #f8fafc; padding: 30px; color: #1e293b; }
                .grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 25px; }
                .box { background: #fff; padding: 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 25px; }
                h2 { color: #c49b66; border-bottom: 2px solid #f8fafc; padding-bottom: 10px; }
                input, textarea, select { width: 100%; padding: 12px; margin: 8px 0 18px 0; border: 1.5px solid #e2e8f0; border-radius: 10px; }
                button { background: #1a1a1a; color: #fff; border: none; padding: 14px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: 700; }
                .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #f8fafc; margin-bottom: 8px; border-radius: 8px; }
                .del-btn { color: #ef4444; cursor: pointer; font-weight: bold; }
            </style></head>
            <body>
                <h1>Lumina Studio Admin</h1>
                <div class="grid">
                    <div class="left-col">
                        <div class="box">
                            <h2>Yeni Haber Yayınla (Yazar: ASC)</h2>
                            <input type="text" id="nt" placeholder="Haber Başlığı">
                            <select id="ncat">${db.cats.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
                            <textarea id="nc" placeholder="Haber İçeriği" rows="8"></textarea>
                            <label>Kapak Görseli:</label>
                            <input type="file" id="ni" accept="image/*">
                            <button id="saveNewsBtn">Haberi Yayına Al</button>
                        </div>
                    </div>
                    <div class="right-col">
                        <div class="box">
                            <h2>Kategori Yönetimi</h2>
                            <input type="text" id="newCatInput" placeholder="Yeni kategori...">
                            <button id="addCatBtn">Ekle</button>
                            <div style="margin-top:15px;">
                                ${db.cats.map((c, i)=>`<div class="list-item"><span>${c}</span><span class="del-btn" onclick="window.opener.postMessage({t:'delCat', index:${i}}, '*')">SİL</span></div>`).join('')}
                            </div>
                        </div>
                        <div class="box">
                            <h2>Aktif Haberler</h2>
                            ${db.news.map(n=>`<div class="list-item"><span><b>[${n.author}]</b> ${n.title.substring(0,20)}...</span><span class="del-btn" onclick="window.opener.postMessage({t:'delNews', id:${n.id}}, '*')">SİL</span></div>`).join('')}
                        </div>
                    </div>
                </div>
            <script>
                document.getElementById('saveNewsBtn').onclick = async () => {
                    const imgFile = document.getElementById('ni').files[0];
                    const img = imgFile ? await window.opener.toBase64(imgFile) : "https://via.placeholder.com/800";
                    window.opener.postMessage({
                        t: 'addNews',
                        data: {
                            id: Date.now(),
                            title: document.getElementById('nt').value,
                            text: document.getElementById('nc').value,
                            cat: document.getElementById('ncat').value,
                            author: "ASC",
                            img: img
                        }
                    }, '*');
                    location.reload();
                };
                document.getElementById('addCatBtn').onclick = () => {
                    window.opener.postMessage({t: 'addCat', val: document.getElementById('newCatInput').value}, '*');
                    location.reload();
                };
            <\/script></body></html>`;
        
        win.document.open();
        win.document.write(adminHtml);
        win.document.close();
    }

    window.onmessage = (e) => {
        if(e.data.t === 'addNews') { db.news.unshift(e.data.data); sync(); }
        if(e.data.t === 'delNews') { db.news = db.news.filter(n=>n.id !== e.data.id); sync(); }
        if(e.data.t === 'addCat') { db.cats.push(e.data.val); sync(); }
        if(e.data.t === 'delCat') { db.cats.splice(e.data.index, 1); sync(); }
    };

    function renderApp() {
        document.getElementById('authors-list').innerHTML = db.authors.map(a => `
            <div class="author-item" onclick="openAuthor(${a.id})">
                <img src="${a.img}"><span>${a.name}</span>
            </div>`).join('');
        
        document.getElementById('cat-nav').innerHTML = db.cats.map(c => `
            <div class="cat-item" onclick="filterCat('${c}')">• ${c}</div>
        `).join('') + `<div class="cat-item" onclick="renderApp()" style="font-weight:bold; margin-top:10px;">• TÜMÜ</div>`;
        
        document.getElementById('ad-sidebar').innerHTML = `<img src="${db.ad}" style="width:100%; border-radius:15px;">`;
        renderFeed(db.news);
    }

    function renderFeed(newsArray) {
        document.getElementById('main-feed').innerHTML = newsArray.map(n => `
            <article class="news-card" onclick="openNews(${n.id})">
                <img src="${n.img}" class="news-img">
                <div class="card-body">
                    <small style="color:var(--accent); font-weight:bold;">${n.cat.toUpperCase()}</small>
                    <h2>${n.title}</h2>
                </div>
            </article>`).join('');
    }

    function filterCat(category) {
        renderFeed(db.news.filter(n => n.cat === category));
    }

    function openNews(id) {
        const n = db.news.find(x=>x.id==id);
        const overlay = document.getElementById('overlay');
        overlay.style.display = 'block';
        document.body.style.overflow = 'hidden';
        document.getElementById('overlay-content').innerHTML = `
            <button class="audio-btn" style="background:var(--accent); color:white; border:none; padding:12px 25px; border-radius:50px; cursor:pointer; margin-bottom:30px;" onclick="speak('${n.title.replace(/'/g,"")}. ${n.text.replace(/'/g,"")}')">🔊 Dinle</button>
            <h1 style="font-family:Marcellus; font-size:3.5rem;">${n.title}</h1>
            <p style="color:var(--accent); font-weight:bold;">${n.cat}</p>
            <img src="${n.img}" style="width:100%; border-radius:32px; margin-bottom:40px;">
            <div style="font-size:1.25rem; line-height:1.8;">${n.text.replace(/\n/g, '<br>')}</div>
        `;
    }

    function openAuthor(id) {
        const a = db.authors.find(x=>x.id==id);
        const overlay = document.getElementById('overlay');
        overlay.style.display = 'block';
        document.getElementById('overlay-content').innerHTML = `
            <div style="text-align:center;">
                <img src="${a.img}" style="width:180px; height:180px; border-radius:50%; object-fit:cover;">
                <h1 style="font-family:Marcellus; font-size:3rem;">${a.name}</h1>
                <p>${a.bio}</p>
            </div>
            <hr style="margin:40px 0; border:0; border-top:1px solid #eee;">
            <div class="news-grid">${db.news.filter(n=>n.author === a.name).map(n=>`
                <div class="news-card" onclick="openNews(${n.id})">
                    <img src="${n.img}" style="height:150px; width:100%; object-fit:cover;">
                    <div style="padding:15px;"><h4>${n.title}</h4></div>
                </div>`).join('')}</div>
        `;
    }

    function closeOverlay() { window.speechSynthesis.cancel(); document.getElementById('overlay').style.display = 'none'; document.body.style.overflow = 'auto'; }
    function speak(text) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.lang = 'tr-TR'; window.speechSynthesis.speak(u); }

    window.onscroll = () => {
        let winScroll = document.documentElement.scrollTop;
        let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        document.getElementById("progress-bar").style.width = (winScroll / height) * 100 + "%";
    };

    renderApp();
</script>
</body>
</html>
