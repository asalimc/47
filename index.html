<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Flight Price Intelligence</title>

<style>
:root{
  --bg:#050814;
  --card:#0b1224;
  --border:#1e293b;

  --text:#f8fafc;
  --muted:#94a3b8;

  --accent:#38bdf8;

  --up:#22c55e;
  --down:#ef4444;

  --low:#052e1c;
  --mid:#0b1224;
  --high:#3f0a0a;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header{
  padding:14px;
  background:#020617;
  border-bottom:1px solid var(--border);
  display:flex;
  flex-direction:column;
  gap:10px;
}

.header h3{
  margin:0;
  font-size:18px;
  font-weight:900;
}

.small{font-size:12px;color:var(--muted)}

.monthPicker{
  padding:10px;
  border-radius:12px;
  background:#020617;
  color:white;
  border:1px solid var(--border);
  font-weight:700;
}

/* CONTENT */
.container{padding:12px}

/* CARD */
.routeCard{
  background:var(--card);
  border-radius:18px;
  padding:14px;
  margin-bottom:16px;
  border:1px solid var(--border);
}

.title{font-weight:900}
.info{font-size:12px;color:var(--muted)}

/* CALENDAR */
.calendar{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-top:12px;
}

.day{
  background:#020617;
  border-radius:14px;
  padding:8px;
  text-align:center;
  cursor:pointer;
  transition:.2s;
  border:1px solid #020617;
}

.day:hover{border-color:var(--accent)}

.hm-low{background:var(--low)}
.hm-mid{background:var(--mid)}
.hm-high{background:var(--high)}

.price{font-weight:900}

.tag{
  font-size:10px;
  font-weight:800;
  margin-top:2px;
  color:#e5e7eb;
}

.cheapest{outline:2px solid var(--accent)}

.flash-up{animation:flashUp .6s}
.flash-down{animation:flashDown .6s}

@keyframes flashUp{
  0%{box-shadow:0 0 0 4px rgba(34,197,94,.9)}
}
@keyframes flashDown{
  0%{box-shadow:0 0 0 4px rgba(239,68,68,.9)}
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(2,6,23,.85);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:99;
}

.modalContent{
  background:#020617;
  width:95%;
  max-width:520px;
  border-radius:20px;
  padding:16px;
  border:1px solid var(--border);
}

.modalHeader{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:900;
}

.closeBtn{cursor:pointer;font-size:20px}

.detailGrid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:12px;
  font-size:14px;
}

.box{
  background:#0b1224;
  border-radius:12px;
  padding:10px;
  border:1px solid var(--border);
  text-align:center;
  font-weight:800;
}

/* RESPONSIVE */
@media(min-width:700px){
  .calendar{grid-template-columns:repeat(7,1fr)}
  .header{flex-direction:row;justify-content:space-between}
}
</style>
</head>

<body>

<div class="header">
  <div>
    <h3>✈️ Flight Price Intelligence</h3>
    <div class="small">Live pricing • Heatmap • Flash arrows</div>
  </div>
  <input type="month" id="monthPicker" class="monthPicker"/>
</div>

<div class="container">
  <div id="app"></div>
</div>

<div class="modal" id="modal">
  <div class="modalContent" id="modalContent"></div>
</div>

<script>
let usdTry=0;
const memory={};

async function fx(){
  const r=await fetch("https://open.er-api.com/v6/latest/USD");
  const d=await r.json();
  usdTry=d.rates.TRY;
}

const routes=[
{
  name:"São Paulo (GRU) → Istanbul (IST)",
  airline:"Turkish Airlines",
  stop:"Direct / Doha",
  transit:"Transit vize gerekmez",
  base:720,
  demand:1.1
},
{
  name:"Brasília (BSB) → Istanbul (IST)",
  airline:"LATAM + Turkish Airlines",
  stop:"Paris (CDG)",
  transit:"Transit vize gerekebilir",
  base:690,
  demand:.95
}
];

let activeDate=new Date();

function price(b,d,dm){
  return b+Math.sin(d/6)*25+(Math.random()-.5)*20+dm*Math.cos(d/10)*30;
}

function tag(date){
  const t=new Date();
  const diff=Math.floor((date-t)/(86400000));
  if(diff===0) return "BUGÜN";
  if(diff===1) return "YARIN";
  if(date.getDay()==0||date.getDay()==6) return "HAFTA SONU";
  return "";
}

function openModal(r,date,usd){
  const m=document.getElementById("modal");
  const c=document.getElementById("modalContent");
  c.innerHTML=`
    <div class="modalHeader">
      <div>${r.name}</div>
      <div class="closeBtn" onclick="modal.style.display='none'">✕</div>
    </div>
    <div class="detailGrid">
      <div class="box">${date}</div>
      <div class="box">$${usd.toFixed(0)} / ₺${(usd*usdTry).toFixed(0)}</div>
      <div class="box">${r.airline}</div>
      <div class="box">${r.stop}</div>
      <div class="box" style="grid-column:span 2">${r.transit}</div>
    </div>
  `;
  m.style.display="flex";
}

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  const y=activeDate.getFullYear(), m=activeDate.getMonth();
  const days=new Date(y,m+1,0).getDate();

  routes.forEach(r=>{
    const prices=[];
    for(let i=1;i<=days;i++) prices.push(price(r.base,i,r.demand));
    const min=Math.min(...prices);

    const card=document.createElement("div");
    card.className="routeCard";
    card.innerHTML=`<div class="title">${r.name}</div>
    <div class="info">${r.airline} • ${r.stop}</div>
    <div class="calendar"></div>`;
    app.appendChild(card);

    const cal=card.querySelector(".calendar");

    prices.forEach((usd,i)=>{
      const d=i+1;
      const date=new Date(y,m,d);
      const label=date.toLocaleDateString("tr-TR",{weekday:"short",day:"numeric"});
      const key=r.name+y+m+d;
      const prev=memory[key];
      memory[key]=usd;

      let arrow="";
      let flash="";
      if(prev){
        if(usd>prev){arrow="▲ ";flash="flash-up"}
        if(usd<prev){arrow="▼ ";flash="flash-down"}
      }

      const div=document.createElement("div");
      div.className=`day ${usd==min?"hm-low":"hm-mid"} ${flash}`;
      if(usd==min) div.classList.add("cheapest");

      div.innerHTML=`
        <div>${label}</div>
        <div class="price">${arrow}$${usd.toFixed(0)}</div>
        <div class="price">₺${(usd*usdTry).toFixed(0)}</div>
        ${usd==min?'<div class="tag">⭐ EN UCUZ</div>':""}
        ${tag(date)?`<div class="tag">${tag(date)}</div>`:""}
      `;

      div.onclick=()=>openModal(r,label,usd);
      cal.appendChild(div);
    });
  });
}

const mp=document.getElementById("monthPicker");
mp.value=new Date().toISOString().slice(0,7);
mp.onchange=()=>{activeDate=new Date(mp.value);render();};

async function start(){await fx();render();}
start();
setInterval(start,30000);
</script>

</body>
</html>
