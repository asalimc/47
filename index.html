<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Global Culture & Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfbf7; --text: #1a1a1a; --muted: #718096; --accent: #c49b66;
            --white: #ffffff; --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }

        /* --- ANA SAYFA TASARIMI --- */
        nav { background: rgba(253, 251, 247, 0.98); backdrop-filter: blur(15px); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .logo { font-family: 'Marcellus', serif; font-size: 1.8rem; letter-spacing: 3px; cursor: pointer; }
        .admin-trigger { cursor: pointer; opacity: 0.1; font-size: 10px; padding: 10px; }
        
        .main-container { max-width: 1400px; margin: 20px auto; display: grid; grid-template-columns: 280px 1fr; gap: 30px; padding: 0 20px; }
        #news-feed { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .sidebar-left h4 { font-family: 'Marcellus'; border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 15px; }

        /* --- ADMİN PANEL (BAĞIMSIZ SAYFA MANTIĞI) --- */
        #adminView { display: none; position: fixed; inset: 0; background: #f0f2f5; z-index: 99999; overflow-y: auto; padding: 20px; }
        .dash-wrapper { max-width: 1400px; margin: 0 auto; }
        .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #e1e4e8; padding-bottom: 15px; }
        
        .dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; align-items: start; }
        .cms-card { background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #e1e4e8; }
        .cms-card h3 { font-family: 'Marcellus'; color: var(--accent); margin-top: 0; margin-bottom: 20px; }

        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-box { background: var(--accent); color: white; padding: 15px; border-radius: 12px; text-align: center; }
        .stat-box b { display: block; font-size: 22px; }

        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 10px; font-family: inherit; font-size: 14px; }
        .btn { padding: 12px 25px; border-radius: 50px; border: none; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .btn-gold { background: var(--accent); color: white; width: 100%; }
        .btn-dark { background: #1a1a1a; color: white; }
        .btn-ai { background: #6c5ce7; color: white; margin-bottom: 15px; width: 100%; }

        .item-list { font-size: 13px; max-height: 150px; overflow-y: auto; margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f9f9f9; }
        .del-x { color: #ff7675; cursor: pointer; font-weight: bold; }

        @media (max-width: 900px) {
            .main-container { grid-template-columns: 1fr; }
            .sidebar-left { display: none; }
            .dash-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="homeView">
    <nav>
        <div class="logo" onclick="location.reload()">LUMINA</div>
        <div style="display:flex; align-items:center; gap:20px;">
            <div id="local-info" style="font-size: 0.75rem; font-weight: 700; letter-spacing: 1px;">LOCATING...</div>
            <div class="admin-trigger" onclick="tryAdmin()">[L_CORE]</div>
        </div>
    </nav>

    <div class="main-container">
        <aside class="sidebar-left">
            <h4 id="ui-cat-title">CATEGORIES</h4>
            <div id="cat-nav" style="line-height: 2.8; font-size: 0.95rem;"></div>
            <div id="ad-slot" onclick="track('ad')" style="margin-top:40px; border-radius:20px; overflow:hidden; cursor:pointer; border:1px solid #eee;"></div>
        </aside>
        <main id="news-feed"></main>
    </div>
</div>

<div id="adminView">
    <div class="dash-wrapper">
        <div class="dash-header">
            <h1 style="font-family:'Marcellus'; margin:0;">Lumina Intelligence Dashboard</h1>
            <button class="btn btn-dark" onclick="exitAdmin()">Geri Dön</button>
        </div>

        <div class="dash-grid">
            <div class="cms-card">
                <h3>Analiz & Trafik</h3>
                <div class="stat-grid">
                    <div class="stat-box"><small>Ziyaret</small><b id="st-total">0</b></div>
                    <div class="stat-box"><small>Haber</small><b id="st-news">0</b></div>
                    <div class="stat-box"><small>Reklam</small><b id="st-ad">0</b></div>
                </div>
                <div id="log-list" class="item-list" style="font-family: monospace;"></div>
            </div>

            <div class="cms-card">
                <h3>İçerik Yönetimi</h3>
                <button class="btn btn-ai" onclick="generateAI()">AI Haber Üret (Brezilya-Mardin)</button>
                <input type="hidden" id="edit-id">
                <input type="text" id="n-title" placeholder="Haber Başlığı">
                <textarea id="n-content" placeholder="Haber İçeriği..." rows="3"></textarea>
                <select id="n-cat"></select>
                <button class="btn btn-gold" onclick="saveNews()">Yayınla / Güncelle</button>
                <div id="news-mgmt" class="item-list"></div>
            </div>

            <div class="cms-card">
                <h3>Kategori & Reklam</h3>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="cat-in" placeholder="Yeni Kategori" style="margin:0;">
                    <button class="btn btn-gold" style="width:auto;" onclick="addCat()">+</button>
                </div>
                <div id="cat-mgmt" class="item-list"></div>
                
                <h4 style="margin:20px 0 10px;">Reklam Ayarları</h4>
                <input type="text" id="ad-img-url" placeholder="Görsel URL">
                <input type="text" id="ad-link-url" placeholder="Hedef Link">
                <button class="btn btn-dark" style="width:100%" onclick="saveAd()">Reklamı Güncelle</button>
            </div>

            <div class="cms-card">
                <h3>Yazarlar</h3>
                <input type="text" id="auth-n" placeholder="Yazar Adı">
                <textarea id="auth-b" placeholder="Yazar Biyografisi..." rows="2"></textarea>
                <button class="btn btn-gold" onclick="addAuthor()">Yazar Ekle</button>
                <div id="auth-mgmt" class="item-list"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const PASS = "47";
    let db = JSON.parse(localStorage.getItem('lumina_v18')) || {
        news: [{id:1, title: "Mardin Gümüşü", text: "Telkari sanatı canlanıyor...", img: "https://via.placeholder.com/800", cat: "Kültür", clicks: 0}],
        authors: [{id:1, name: "VEDAT M.", bio: "Kültür Yazarı."}],
        cats: ['Mardin', 'Brezilya', 'Tasarım'],
        ad: { img: 'https://via.placeholder.com/300x400?text=Lumina+Ad', url: '#', clicks: 0 },
        stats: { total: 0, nClick: 0, aClick: 0, logs: [] }
    };

    const userLang = navigator.language || 'en';

    // --- STATE MANAGEMENT (SAYFA YENİLEME KORUMASI) ---
    function checkState() {
        if(window.location.hash === "#admin") {
            document.getElementById('homeView').style.display = 'none';
            document.getElementById('adminView').style.display = 'block';
            renderAdmin();
        } else {
            document.getElementById('homeView').style.display = 'block';
            document.getElementById('adminView').style.display = 'none';
        }
    }

    function tryAdmin() {
        if(prompt("Giriş Şifresi:") === PASS) {
            window.location.hash = "admin";
            checkState();
        }
    }

    function exitAdmin() {
        window.location.hash = "";
        checkState();
    }

    window.addEventListener('hashchange', checkState);

    // --- ANALYTICS ---
    function initVisit() {
        db.stats.total++;
        db.stats.logs.unshift({t: new Date().toLocaleTimeString(), loc: userLang.toUpperCase()});
        if(db.stats.logs.length > 20) db.stats.logs.pop();
        sync();
    }

    function track(type, id) {
        if(type==='news') { db.stats.nClick++; const n = db.news.find(x=>x.id==id); if(n) n.clicks++; }
        if(type==='ad') { db.stats.aClick++; db.ad.clicks++; if(db.ad.url !== '#') window.open(db.ad.url); }
        sync();
    }

    // --- CMS CORE ---
    function sync() { localStorage.setItem('lumina_v18', JSON.stringify(db)); renderApp(); renderAdmin(); }

    function saveNews() {
        const id = document.getElementById('edit-id').value;
        const data = { id: id ? Number(id) : Date.now(), title: document.getElementById('n-title').value, text: document.getElementById('n-content').value, img: "https://via.placeholder.com/800", cat: document.getElementById('n-cat').value, clicks: 0 };
        if(id) { const i = db.news.findIndex(x=>x.id==id); db.news[i]=data; } else db.news.unshift(data);
        document.getElementById('edit-id').value=''; sync();
    }

    function addCat() { const v = document.getElementById('cat-in').value; if(v){ db.cats.push(v); document.getElementById('cat-in').value=''; sync(); } }
    function addAuthor() { const n = document.getElementById('auth-n').value; if(n){ db.authors.push({id:Date.now(), name: n.toUpperCase(), bio: document.getElementById('auth-b').value}); sync(); } }
    function saveAd() { db.ad.img = document.getElementById('ad-img-url').value; db.ad.url = document.getElementById('ad-link-url').value; sync(); }
    function generateAI() { db.news.unshift({id:Date.now(), title:"AI: Kültür Köprüsü", text:"Brezilya ve Mardin arasındaki sanatsal bağlar...", img:"https://via.placeholder.com/800", cat:"AI Analiz", clicks:0}); sync(); }

    // --- RENDERS ---
    function renderApp() {
        document.getElementById('local-info').innerText = userLang.includes('tr') ? "MARDİN • YEREL" : "SAO PAULO • LOCAL";
        document.getElementById('ui-cat-title').innerText = userLang.includes('tr') ? "KATEGORİLER" : "CATEGORIES";
        document.getElementById('cat-nav').innerHTML = db.cats.map(c => `<div>• ${c}</div>`).join('');
        document.getElementById('ad-slot').innerHTML = `<img src="${db.ad.img}" style="width:100%; display:block;">`;
        document.getElementById('news-feed').innerHTML = db.news.map(n => `
            <article class="cms-card" style="cursor:pointer; padding:15px;" onclick="track('news', ${n.id})">
                <img src="${n.img}" style="width:100%; height:180px; object-fit:cover; border-radius:12px;">
                <small style="color:var(--accent); font-weight:bold; display:block; margin-top:10px;">${n.cat.toUpperCase()}</small>
                <h2 style="font-family:'Marcellus'; font-size:1.2rem; margin:10px 0;">${n.title}</h2>
                <p style="font-size:0.85rem; color:var(--muted);">${n.text.substring(0,80)}...</p>
            </article>`).join('');
    }

    function renderAdmin() {
        document.getElementById('st-total').innerText = db.stats.total;
        document.getElementById('st-news').innerText = db.stats.nClick;
        document.getElementById('st-ad').innerText = db.stats.aClick;
        document.getElementById('n-cat').innerHTML = db.cats.map(c => `<option value="${c}">${c}</option>`).join('');
        document.getElementById('log-list').innerHTML = db.stats.logs.map(l => `<div class="row"><span>${l.t}</span><span>${l.loc} - Giriş</span></div>`).join('');
        document.getElementById('news-mgmt').innerHTML = db.news.map(n => `<div class="row"><span>${n.title.substring(0,20)}.. (${n.clicks})</span> <span class="del-x" onclick="del('news',${n.id})">X</span></div>`).join('');
        document.getElementById('cat-mgmt').innerHTML = db.cats.map((c,i) => `<div class="row"><span>${c}</span> <span class="del-x" onclick="db.cats.splice(${i},1);sync()">X</span></div>`).join('');
        document.getElementById('auth-mgmt').innerHTML = db.authors.map(a => `<div class="row"><span>${a.name}</span> <span class="del-x" onclick="del('authors',${a.id})">X</span></div>`).join('');
    }

    function del(type, id) { db[type] = db[type].filter(x=>x.id!==id); sync(); }

    // Başlat
    checkState();
    initVisit();
    renderApp();
</script>
</body>
</html>
