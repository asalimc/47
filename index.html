<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Pro Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfbf7; --text: #1a1a1a; --muted: #718096; --accent: #c49b66;
            --white: #ffffff; --glass: rgba(253, 251, 247, 0.95); --transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Nav & Progress */
        #progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent); width: 0%; z-index: 10001; }
        nav { background: var(--glass); backdrop-filter: blur(15px); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.03); }
        .logo { font-family: 'Marcellus', serif; font-size: 1.8rem; letter-spacing: 3px; cursor: pointer; }
        .admin-entry { cursor: pointer; opacity: 0.1; font-size: 0.7rem; }

        /* YAZARLAR ŞERİDİ (Story Modu - Geri Geldi) */
        .authors-strip { background: var(--white); padding: 25px 0; display: flex; justify-content: center; gap: 35px; border-bottom: 1px solid #f1f1f1; }
        .author-item { cursor: pointer; text-align: center; width: 90px; transition: var(--transition); }
        .author-item:hover { transform: translateY(-5px); }
        .author-item img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); padding: 3px; background: #fff; }
        .author-item span { display: block; font-size: 0.75rem; font-weight: 700; margin-top: 8px; font-family: 'Marcellus'; letter-spacing: 1px; }

        /* Konteynır */
        .container { max-width: 1400px; margin: 30px auto; display: grid; grid-template-columns: 280px 1fr 300px; gap: 40px; padding: 0 25px; }

        /* MERMER SLIDER (Ana Haberler) */
        .main-stage { position: relative; background: #fff; border-radius: 40px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.03); height: 650px; }
        .slide { position: absolute; inset: 0; opacity: 0; transition: var(--transition); display: none; cursor: pointer; }
        .slide.active { opacity: 1; display: flex; flex-direction: column; }
        .slide-img { width: 100%; height: 60%; object-fit: cover; }
        .slide-content { padding: 40px; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .slide-content h2 { font-family: 'Marcellus', serif; font-size: 2.5rem; margin: 0 0 15px 0; line-height: 1.1; }

        /* OVERLAY (Detay Sayfası) */
        .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; overflow-y: auto; }
        .close-btn { position: fixed; top: 30px; right: 40px; background: #1a1a1a; color: #fff; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10000; }
        .article-wrap { max-width: 800px; margin: 80px auto; padding: 0 25px; }
        .article-title { font-family: 'Marcellus', serif; font-size: 3.5rem; line-height: 1.1; margin-bottom: 20px; }
        .article-main-img { width: 100%; border-radius: 30px; margin-bottom: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .article-text { font-size: 1.35rem; line-height: 2; color: #2d3436; text-align: justify; }

        /* ADMİN PANELİ */
        .admin-panel { display: none; position: fixed; inset: 0; background: #f4f4f2; z-index: 10002; padding: 40px; overflow-y: auto; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .admin-card { background: #fff; padding: 25px; border-radius: 20px; border: 1px solid #ddd; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; font-family: inherit; }
        .btn { padding: 12px 24px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-gold { background: var(--accent); color: #fff; }
        .data-list { margin-top: 20px; max-height: 300px; overflow-y: auto; border-top: 1px solid #eee; }
        .list-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; align-items: center; }

        .sidebar-right { position: sticky; top: 100px; height: fit-content; }
        .ad-box { background: #eee; border-radius: 30px; height: 500px; overflow: hidden; border: 1px dashed #ccc; }

        @media (max-width: 1100px) { .container { grid-template-columns: 1fr; } .sidebar-left, .sidebar-right { display: none; } }
    </style>
</head>
<body>

<div id="progress-bar"></div>

<nav>
    <div class="logo" onclick="location.reload()">LUMINA</div>
    <div class="admin-entry" onclick="authAdmin()">[SYSTEM]</div>
</nav>

<div class="authors-strip" id="authors-view"></div>

<div class="container">
    <aside class="sidebar-left">
        <h3 style="font-family:'Marcellus'">Kategoriler</h3>
        <div id="cat-view" style="line-height: 2.5; cursor: pointer; color: var(--muted);"></div>
    </aside>

    <main class="main-stage" id="slider-view"></main>

    <aside class="sidebar-right">
        <div id="ad-view" class="ad-box"></div>
    </aside>
</div>

<div id="adminPanel" class="admin-panel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1 style="font-family:'Marcellus'">Lumina Control Panel</h1>
        <button class="btn" onclick="closeAdmin()" style="background:#000; color:#fff;">Kapat</button>
    </div>

    <div class="admin-grid">
        <div class="admin-card">
            <h3>İçerik Ekle (Haber/Makale/Yazı)</h3>
            <select id="dataType">
                <option value="news">Haber (Slider'da Görünür)</option>
                <option value="article">Makale (Bilgi Odaklı)</option>
                <option value="column">Köşe Yazısı (Yazar Bazlı)</option>
            </select>
            <input type="text" id="dataTitle" placeholder="Başlık">
            <textarea id="dataContent" placeholder="İçerik Metni" rows="6"></textarea>
            <input type="file" id="dataImg" accept="image/*">
            <select id="dataCatSelect"></select>
            <button class="btn btn-gold" onclick="saveData()">Sisteme Yükle</button>
        </div>

        <div class="admin-card">
            <h3>Yazar & Reklam Yönetimi</h3>
            <input type="text" id="authName" placeholder="Yazar Adı">
            <input type="text" id="authBio" placeholder="Yazar Kısa Notu">
            <input type="file" id="authImg" accept="image/*">
            <button class="btn btn-gold" onclick="saveAuthor()">Yazar Ekle</button>
            <hr>
            <input type="text" id="adLink" placeholder="Reklam Linki (http...)">
            <input type="file" id="adImg" accept="image/*">
            <button class="btn btn-gold" onclick="saveAd()">Reklamı Güncelle</button>
        </div>
    </div>

    <div class="admin-card" style="margin-top:20px;">
        <h3>Mevcut Verileri Düzenle / Sil</h3>
        <div id="management-view"></div>
    </div>
</div>

<div id="overlay" class="overlay">
    <div class="close-btn" onclick="closeOverlay()">✕</div>
    <div id="overlay-content"></div>
</div>

<script>
    // --- GÜVENLİK (Şifre: 47) ---
    const _ENC = "NzQ="; 
    function authAdmin() {
        const p = prompt("Giriş Kodu:");
        if (p === atob(_ENC).split("").reverse().join("")) {
            document.getElementById('adminPanel').style.display = 'block';
            renderAdmin();
        }
    }

    // --- VERİTABANI (Local) ---
    let db = JSON.parse(localStorage.getItem('lumina_v2')) || {
        news: [{id:1, title: 'Mardin\'de Altın Saatler', content: 'Mardin\'in taş sokaklarında güneş batarken...', img: 'https://images.unsplash.com/photo-1541532713592-79a0317b6b77', cat: 'Kültür'}],
        articles: [],
        columns: [],
        authors: [{id:1, name: 'Vedat M.', bio: 'Kadim Şehir Yazarı', img: 'https://images.unsplash.com/photo-1472099645785-5658abf4ff4e'}],
        categories: ['Kültür', 'Moda', 'Gastronomi', 'Seyahat'],
        ad: {img: '', link: 'https://google.com'}
    };

    function sync() { localStorage.setItem('lumina_v2', JSON.stringify(db)); renderApp(); }

    // Dosya Okuma
    function toBase64(file) {
        return new Promise((r, j) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => r(reader.result);
        });
    }

    // --- KAYIT FONKSİYONLARI ---
    async function saveData() {
        const type = document.getElementById('dataType').value;
        const title = document.getElementById('dataTitle').value;
        const content = document.getElementById('dataContent').value;
        const cat = document.getElementById('dataCatSelect').value;
        const file = document.getElementById('dataImg').files[0];
        
        let img = "https://via.placeholder.com/800x500";
        if(file) img = await toBase64(file);

        db[type].push({ id: Date.now(), title, content, img, cat });
        sync(); alert("İçerik Eklendi!");
    }

    async function saveAuthor() {
        const name = document.getElementById('authName').value;
        const bio = document.getElementById('authBio').value;
        const file = document.getElementById('authImg').files[0];
        let img = "https://via.placeholder.com/200";
        if(file) img = await toBase64(file);
        db.authors.push({id: Date.now(), name, bio, img});
        sync(); renderAdmin();
    }

    async function saveAd() {
        const link = document.getElementById('adLink').value;
        const file = document.getElementById('adImg').files[0];
        if(file) db.ad.img = await toBase64(file);
        db.ad.link = link;
        sync(); alert("Reklam Güncellendi!");
    }

    function deleteItem(type, id) {
        if(confirm("Silmek istediğinize emin misiniz?")) {
            db[type] = db[type].filter(x => x.id !== id);
            sync(); renderAdmin();
        }
    }

    // --- RENDER ---
    function renderApp() {
        // Yazarlar
        document.getElementById('authors-view').innerHTML = db.authors.map(a => `
            <div class="author-item" onclick="openAuthor(${a.id})">
                <img src="${a.img}">
                <span>${a.name.toUpperCase()}</span>
            </div>
        `).join('');

        // Slider (Sadece Haberler)
        document.getElementById('slider-view').innerHTML = db.news.map((n, i) => `
            <div class="slide ${i === 0 ? 'active' : ''}" onclick="openDetail('news', ${n.id})">
                <img src="${n.img}" class="slide-img">
                <div class="slide-content">
                    <small style="color:var(--accent); font-weight:800;">${n.cat.toUpperCase()}</small>
                    <h2>${n.title}</h2>
                    <p style="color:var(--muted)">Okumak için tıklayın...</p>
                </div>
            </div>
        `).join('');

        // Kategoriler
        const cats = db.categories.map(c => `<div>• ${c}</div>`).join('');
        document.getElementById('cat-view').innerHTML = cats;
        document.getElementById('dataCatSelect').innerHTML = db.categories.map(c => `<option value="${c}">${c}</option>`).join('');

        // Reklam
        document.getElementById('ad-view').innerHTML = `
            <a href="${db.ad.link}" target="_blank" style="display:block; height:100%; background: url('${db.ad.img}') center/cover #eee;">
                <div style="background:rgba(0,0,0,0.4); color:#fff; padding:5px; font-size:10px; text-align:center;">REKLAM</div>
            </a>
        `;
    }

    function openDetail(type, id) {
        const item = db[type].find(x => x.id === id);
        const overlay = document.getElementById('overlay-content');
        document.getElementById('overlay').style.display = 'block';
        document.body.style.overflow = 'hidden';

        overlay.innerHTML = `
            <div class="article-wrap">
                <small style="color:var(--accent); font-weight:bold; letter-spacing:2px;">${item.cat.toUpperCase()}</small>
                <h1 class="article-title">${item.title}</h1>
                <div style="background:#f1f2f6; padding:15px; border-radius:15px; margin-bottom:25px; display:flex; align-items:center; gap:15px;">
                    <button class="btn btn-gold" onclick="speak('txt-main')">▶ Dinle</button>
                    <span>Profesyonel Seslendirme Aktif</span>
                </div>
                <img src="${item.img}" class="article-main-img">
                <div id="txt-main" class="article-text">${item.content}</div>
            </div>
        `;
    }

    function openAuthor(id) {
        const a = db.authors.find(x => x.id === id);
        const overlay = document.getElementById('overlay-content');
        document.getElementById('overlay').style.display = 'block';
        overlay.innerHTML = `
            <div class="article-wrap" style="text-align:center;">
                <img src="${a.img}" style="width:180px; height:180px; border-radius:50%; border:4px solid var(--accent); padding:5px; margin-bottom:20px;">
                <h1 class="article-title">${a.name}</h1>
                <p class="article-text" id="auth-bio-txt">${a.bio}</p>
                <button class="btn btn-gold" onclick="speak('auth-bio-txt')">Biyografiyi Dinle</button>
                <hr style="margin:40px 0;">
                <h3 style="font-family:'Marcellus'">Yazarın Köşe Yazıları</h3>
                <div id="auth-articles">Henüz yazı bulunamadı.</div>
            </div>
        `;
    }

    function renderAdmin() {
        const types = ['news', 'articles', 'columns', 'authors'];
        let html = '';
        types.forEach(t => {
            html += `<h4>${t.toUpperCase()} Listesi</h4>`;
            db[t].forEach(item => {
                html += `
                    <div class="list-item">
                        <span>${item.title || item.name}</span>
                        <button class="btn" style="background:red; color:white; padding:5px 10px;" onclick="deleteItem('${t}', ${item.id})">Sil</button>
                    </div>
                `;
            });
        });
        document.getElementById('management-view').innerHTML = html;
    }

    function closeOverlay() { speechSynthesis.cancel(); document.getElementById('overlay').style.display = 'none'; document.body.style.overflow = 'auto'; }
    function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }
    function speak(id) { const msg = new SpeechSynthesisUtterance(document.getElementById(id).innerText); msg.lang = 'tr-TR'; speechSynthesis.speak(msg); }

    // Init App
    renderApp();

    // Auto Slider
    setInterval(() => {
        const slides = document.querySelectorAll('.slide');
        if(slides.length < 2) return;
        let active = document.querySelector('.slide.active');
        active.classList.remove('active');
        let next = active.nextElementSibling || slides[0];
        next.classList.add('active');
    }, 5000);

    // Progress Bar Logic
    window.onscroll = () => {
        let winScroll = document.documentElement.scrollTop;
        let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        document.getElementById("progress-bar").style.width = (winScroll / height) * 100 + "%";
    };
</script>

</body>
</html>
