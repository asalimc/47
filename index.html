<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSP Global | Mardin - Brazil Bridge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --msp-dark: #0f172a; --mardin: #b45309; --brazil: #15803d; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; overflow-x: hidden; }
        .msp-title { font-family: 'Playfair Display', serif; }
        .view-node { display: none; min-height: 100vh; }
        .active-view { display: block; }
        
        /* Görsel Kilitleme */
        .img-fixed { width: 100%; aspect-ratio: 16/10; object-fit: cover; border-radius: 2.5rem; }
        .author-card-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 2rem; }
        
        /* Geçişler */
        .page-anim { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Admin */
        .admin-nav-active { background: white; color: var(--msp-dark); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="text-slate-900">

    <header class="h-20 bg-white/80 backdrop-blur-md border-b sticky top-0 z-[100] flex items-center">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <div onclick="router('home')" class="cursor-pointer">
                <h1 class="text-2xl font-black tracking-tighter italic uppercase">MSP<span class="text-red-600">.</span>GLOBAL</h1>
            </div>
            <div class="flex gap-4">
                <button onclick="router('admin')" class="bg-blue-600 text-white text-[10px] font-black px-6 py-3 rounded-full shadow-lg uppercase hover:scale-105 transition">Yönetim Paneli</button>
            </div>
        </div>
    </header>

    <main id="view-home" class="view-node active-view page-anim container mx-auto px-4 py-10">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
            <div class="space-y-8">
                <div class="flex items-center gap-4 mb-6"><span class="w-12 h-1 bg-amber-600"></span><h2 class="msp-title text-3xl font-black italic">Mardin News</h2></div>
                <div id="mardin-flow" class="space-y-10"></div>
            </div>
            <div class="space-y-8 md:border-l md:pl-12 border-slate-200">
                <div class="flex items-center gap-4 mb-6"><span class="w-12 h-1 bg-green-700"></span><h2 class="msp-title text-3xl font-black italic">Brazil News</h2></div>
                <div id="brazil-flow" class="space-y-10"></div>
            </div>
        </div>

        <section class="mt-20 pt-10 border-t grid grid-cols-12 gap-8">
            <div id="ad-spot" class="col-span-12 lg:col-span-8 bg-slate-900 rounded-[3rem] h-64 overflow-hidden relative shadow-2xl"></div>
            <div class="col-span-12 lg:col-span-4 bg-white p-8 rounded-[3rem] shadow-sm border">
                <h3 class="text-[10px] font-black uppercase text-slate-400 mb-6 tracking-widest border-l-4 border-red-600 pl-4">Elit Yazarlar</h3>
                <div id="author-spot" class="flex flex-wrap gap-4"></div>
            </div>
        </section>
    </main>

    <main id="view-detail" class="view-node page-anim container mx-auto px-4 py-12 max-w-4xl">
        <button onclick="router('home')" class="text-xs font-black uppercase text-slate-400 mb-10 hover:text-black">← Geri Dön</button>
        <div id="detail-content"></div>
    </main>

    <main id="view-admin" class="view-node bg-slate-100">
        <div class="flex flex-col lg:flex-row min-h-screen">
            <nav class="w-full lg:w-72 bg-slate-900 p-8 flex flex-col gap-2">
                <p class="text-[10px] font-black text-slate-500 uppercase mb-6">Yönetim</p>
                <button onclick="setMod('haber')" id="btn-haber" class="flex items-center gap-4 p-4 rounded-2xl text-slate-400 font-bold hover:text-white transition uppercase text-xs">Haberler</button>
                <button onclick="setMod('yazar')" id="btn-yazar" class="flex items-center gap-4 p-4 rounded-2xl text-slate-400 font-bold hover:text-white transition uppercase text-xs">Yazarlar</button>
                <button onclick="setMod('reklam')" id="btn-reklam" class="flex items-center gap-4 p-4 rounded-2xl text-slate-400 font-bold hover:text-white transition uppercase text-xs">Reklamlar</button>
                <button onclick="router('home')" class="mt-auto p-4 bg-white/10 text-white rounded-2xl font-black text-xs uppercase">Siteden Çık</button>
            </nav>
            <section class="flex-1 p-8 lg:p-12">
                <div class="flex justify-between items-center mb-10">
                    <h2 id="mod-title" class="text-3xl font-black italic uppercase">Modül</h2>
                    <button onclick="openModal()" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-black text-xs shadow-xl">+ EKLE</button>
                </div>
                <div class="bg-white rounded-[3rem] shadow-sm border overflow-hidden">
                    <table class="w-full text-left"><tbody id="admin-table" class="divide-y"></tbody></table>
                </div>
            </section>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 z-[200] bg-slate-900/90 backdrop-blur-md flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-xl rounded-[3rem] p-10 shadow-2xl max-h-[90vh] overflow-y-auto">
            <h3 class="text-2xl font-black italic mb-8">Yeni İçerik Kaydı</h3>
            <div class="space-y-4">
                <img id="m-preview" src="" class="w-full h-40 object-cover rounded-2xl hidden border">
                <input type="file" onchange="encodeImg(event)" class="w-full p-4 bg-slate-50 rounded-xl text-[10px] font-black uppercase border-2 border-dashed">
                <select id="in-loc" class="w-full p-5 bg-slate-100 rounded-2xl font-bold text-xs outline-none">
                    <option value="Mardin">Mardin (Sütunu)</option>
                    <option value="Brezilya">Brezilya (Sütunu)</option>
                </select>
                <input id="in-title" type="text" placeholder="Başlık / İsim" class="w-full p-5 bg-slate-100 rounded-2xl font-bold outline-none">
                <textarea id="in-text" placeholder="Detaylı İçerik..." class="w-full p-5 bg-slate-100 rounded-2xl h-40 outline-none"></textarea>
                <input id="in-sub" type="text" placeholder="Alt Bilgi / Branş" class="w-full p-5 bg-slate-100 rounded-2xl text-xs font-bold outline-none">
            </div>
            <div class="mt-8 flex gap-4">
                <button onclick="closeModal()" class="flex-1 font-bold text-slate-400">İptal</button>
                <button onclick="saveData()" class="flex-[2] bg-blue-600 text-white p-5 rounded-2xl font-black uppercase text-[10px]">Kaydet ve Yayınla</button>
            </div>
        </div>
    </div>

    <script>
        // VERİ TABANI KİLİDİ
        let mspDB = JSON.parse(localStorage.getItem('msp_bridge_v5')) || { haber: [], yazar: [], reklam: [] };
        let activeMod = 'haber';
        let editId = null;
        let activeImg = "";

        function router(id) {
            document.querySelectorAll('.view-node').forEach(v => v.classList.remove('active-view'));
            document.getElementById('view-' + id).classList.add('active-view');
            if(id === 'home') renderHome();
            if(id === 'admin') renderAdmin();
            window.scrollTo(0,0);
        }

        // RESİM İŞLEME
        function encodeImg(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                activeImg = reader.result;
                const p = document.getElementById('m-preview');
                p.src = activeImg; p.classList.remove('hidden');
            };
            if(file) reader.readAsDataURL(file);
        }

        // ADMIN İŞLEMLERİ
        function setMod(m) {
            activeMod = m;
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('admin-nav-active'));
            document.getElementById('btn-' + m).classList.add('admin-nav-active');
            document.getElementById('mod-title').innerText = m.toUpperCase() + " LİSTESİ";
            renderAdmin();
        }

        function renderAdmin() {
            const table = document.getElementById('admin-table');
            table.innerHTML = '';
            mspDB[activeMod].forEach(item => {
                table.innerHTML += `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-6 w-20"><img src="${item.img}" class="w-12 h-12 rounded-xl object-cover bg-slate-100"></td>
                        <td class="p-6 font-bold text-sm">${item.title} <br> <span class="text-[9px] text-slate-400 uppercase">${item.loc || ''}</span></td>
                        <td class="p-6 text-right space-x-4">
                            <button onclick="editItem('${item.id}')" class="text-blue-500"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteItem('${item.id}')" class="text-red-500"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });
        }

        function saveData() {
            const id = editId || 'ID_' + Date.now();
            const entry = {
                id,
                title: document.getElementById('in-title').value,
                text: document.getElementById('in-text').value,
                sub: document.getElementById('in-sub').value,
                loc: document.getElementById('in-loc').value,
                img: activeImg || "https://via.placeholder.com/600"
            };

            if(editId) {
                const idx = mspDB[activeMod].findIndex(x => x.id === editId);
                mspDB[activeMod][idx] = entry;
            } else {
                mspDB[activeMod].unshift(entry);
            }

            localStorage.setItem('msp_bridge_v5', JSON.stringify(mspDB));
            closeModal();
            renderAdmin();
            alert("Başarıyla kaydedildi!");
        }

        function deleteItem(id) {
            if(confirm('Silmek istediğine emin misin?')) {
                mspDB[activeMod] = mspDB[activeMod].filter(x => x.id !== id);
                localStorage.setItem('msp_bridge_v5', JSON.stringify(mspDB));
                renderAdmin();
            }
        }

        function editItem(id) {
            editId = id;
            const itm = mspDB[activeMod].find(x => x.id === id);
            document.getElementById('in-title').value = itm.title;
            document.getElementById('in-text').value = itm.text;
            document.getElementById('in-sub').value = itm.sub;
            document.getElementById('in-loc').value = itm.loc || 'Mardin';
            activeImg = itm.img;
            document.getElementById('m-preview').src = itm.img;
            document.getElementById('m-preview').classList.remove('hidden');
            document.getElementById('modal').classList.remove('hidden');
        }

        // PORTAL RENDER
        function renderHome() {
            const mFlow = document.getElementById('mardin-flow');
            const bFlow = document.getElementById('brazil-flow');
            const aFlow = document.getElementById('author-spot');
            const adFlow = document.getElementById('ad-spot');

            mFlow.innerHTML = ''; bFlow.innerHTML = ''; aFlow.innerHTML = ''; 

            mspDB.haber.forEach(h => {
                const card = `
                    <div onclick="openDetail('haber', '${h.id}')" class="bg-white p-6 rounded-[2.5rem] shadow-sm hover:shadow-xl transition-all cursor-pointer group">
                        <img src="${h.img}" class="img-fixed mb-6 group-hover:scale-95 transition duration-500 shadow-md">
                        <span class="text-[9px] font-black uppercase tracking-widest px-3 py-1 rounded-full ${h.loc === 'Mardin' ? 'bg-amber-600' : 'bg-green-700'} text-white">${h.loc}</span>
                        <h2 class="msp-title text-2xl font-black mt-4 leading-tight">${h.title}</h2>
                        <p class="text-xs text-slate-500 mt-4 line-clamp-3">${h.text}</p>
                    </div>
                `;
                if(h.loc === 'Mardin') mFlow.innerHTML += card; else bFlow.innerHTML += card;
            });

            mspDB.yazar.forEach(y => {
                aFlow.innerHTML += `<img onclick="openDetail('yazar', '${y.id}')" src="${y.img}" class="w-14 h-14 rounded-2xl object-cover border-4 border-white shadow-lg cursor-pointer hover:rotate-6 transition">`;
            });

            if(mspDB.reklam.length > 0) {
                const ad = mspDB.reklam[0];
                adFlow.innerHTML = `<img src="${ad.img}" class="w-full h-full object-cover"><div class="absolute inset-0 bg-black/40 p-10 flex flex-col justify-end text-white"><h3 class="msp-title text-4xl italic">${ad.title}</h3><p class="text-xs opacity-70">${ad.sub}</p></div>`;
            }
        }

        function openDetail(type, id) {
            const itm = mspDB[type].find(x => x.id === id);
            const cont = document.getElementById('detail-content');
            
            if(type === 'haber') {
                cont.innerHTML = `
                    <h1 class="msp-title text-5xl font-black mb-8">${itm.title}</h1>
                    <img src="${itm.img}" class="w-full rounded-[3rem] shadow-2xl mb-12">
                    <div class="text-xl leading-relaxed text-slate-700">${itm.text}</div>
                `;
            } else {
                cont.innerHTML = `
                    <div class="flex flex-col md:flex-row gap-12 items-start">
                        <img src="${itm.img}" class="w-64 h-64 author-card-img shadow-2xl">
                        <div>
                            <h1 class="msp-title text-5xl font-black mb-2">${itm.title}</h1>
                            <p class="text-red-600 font-black uppercase tracking-widest text-sm mb-8">${itm.sub}</p>
                            <div class="text-xl leading-relaxed text-slate-700">${itm.text}</div>
                        </div>
                    </div>
                `;
            }
            router('detail');
        }

        function openModal() { 
            editId = null; activeImg = ""; 
            document.getElementById('m-preview').classList.add('hidden');
            document.getElementById('in-title').value = '';
            document.getElementById('in-text').value = '';
            document.getElementById('in-sub').value = '';
            document.getElementById('modal').classList.remove('hidden'); 
        }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        window.onload = () => { setMod('haber'); renderHome(); };
    </script>
</body>
</html>
