<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="description" content="Brasília - Brezilya için anlık veri paneli. 25+ kategori, hava durumu, döviz, deprem, haberler ve daha fazlası.">
    <title>Brasília Paneli | Anlık Veri | Brezilya</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fb;
            color: #1a2a3a;
            line-height: 1.4;
            -webkit-tap-highlight-color: transparent;
        }

        /* Header - Mobil dostu */
        .header {
            background: white;
            padding: 16px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #e0e6ed;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #009c3b;
        }

        .header p {
            font-size: 0.7rem;
            color: #6c7a8a;
            margin-top: 4px;
        }

        .live-badge {
            background: #e74c3c;
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            animation: pulse 1.5s infinite;
            white-space: nowrap;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* Ana container - mobil padding */
        .container {
            max-width: 100%;
            padding: 12px;
        }

        /* Grid - Mobil öncelikli */
        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        /* Kartlar */
        .card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid #eef2f8;
            transition: transform 0.2s;
        }

        .card:active {
            transform: scale(0.99);
        }

        .card-header {
            background: #f8fafc;
            padding: 14px 16px;
            border-bottom: 2px solid #009c3b;
            font-weight: 700;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-header-icon {
            font-size: 1.2rem;
        }

        .card-content {
            padding: 14px;
            max-height: 400px;
            overflow-y: auto;
        }

        /* Liste stilleri */
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eef2f8;
            flex-wrap: wrap;
            gap: 6px;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .item-label {
            font-weight: 600;
            color: #2c3e50;
            font-size: 0.85rem;
        }

        .item-value {
            color: #009c3b;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .item-sub {
            font-size: 0.65rem;
            color: #94a3b8;
        }

        .change-up {
            color: #27ae60;
            font-size: 0.7rem;
        }

        .change-down {
            color: #e74c3c;
            font-size: 0.7rem;
        }

        /* 3'lu grid mobilde 1'e düşüyor */
        .status-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .status-item {
            background: #f8fafc;
            border-radius: 14px;
            padding: 12px;
            text-align: center;
            border: 1px solid #eef2f8;
        }

        .status-icon {
            font-size: 28px;
            margin-bottom: 6px;
        }

        .status-value {
            font-size: 1rem;
            font-weight: 700;
            color: #1a2a3a;
        }

        .status-label {
            font-size: 0.65rem;
            color: #6c7a8a;
            margin-top: 4px;
        }

        /* Etiketler */
        .tag-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            background: #f0f4f9;
            padding: 5px 12px;
            border-radius: 25px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #2c3e50;
        }

        /* ANMA BÖLÜMÜ - VEFAT EDENLER ÖZEL */
        .anma-card {
            background: linear-gradient(135deg, #fef9f0 0%, #fff 100%);
            border-left: 4px solid #e74c3c;
        }

        .vefat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0e6d2;
            flex-wrap: wrap;
            gap: 8px;
        }

        .vefat-item:last-child {
            border-bottom: none;
        }

        .vefat-name {
            font-weight: 700;
            color: #2c3e50;
            font-size: 0.9rem;
        }

        .vefat-detail {
            font-size: 0.65rem;
            color: #7f8c8d;
            margin-top: 2px;
        }

        .vefat-age {
            background: #e74c3c;
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        /* Arama çubuğu */
        .search-bar {
            background: white;
            border-radius: 30px;
            padding: 8px 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #e0e6ed;
        }

        .search-bar input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 0.9rem;
            background: transparent;
        }

        .search-bar button {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
        }

        /* Bildirim badge */
        .notification-badge {
            background: #e74c3c;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 0.6rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: -5px;
            right: -5px;
        }

        /* Bottom navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 16px;
            border-top: 1px solid #e0e6ed;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 0.6rem;
            color: #6c7a8a;
            background: none;
            border: none;
            cursor: pointer;
        }

        .nav-item.active {
            color: #009c3b;
        }

        .nav-item span:first-child {
            font-size: 1.2rem;
        }

        /* Footer */
        .footer {
            margin: 12px;
            padding: 16px;
            background: white;
            border-radius: 16px;
            text-align: center;
            font-size: 0.6rem;
            color: #94a3b8;
            border: 1px solid #eef2f8;
        }

        /* Tablet ve üzeri */
        @media (min-width: 600px) {
            .container {
                padding: 20px;
            }
            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }
            .status-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Scrollbar */
        .card-content::-webkit-scrollbar {
            width: 3px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <div>
                <h1>🇧🇷 Brasília Paneli</h1>
                <p>Anlık Veri | 25+ Kategori | Brezilya</p>
            </div>
            <div class="live-badge" id="liveBadge">🔴 CANLI</div>

    <div class="container">

            <button onclick="clearSearch()">✖</button>

        <div class="grid" id="panelGrid"></div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <button class="nav-item active" onclick="scrollToTop()"><span>🏠</span><span>Ana</span></button>
        <button class="nav-item" onclick="showAnma()"><span>🕯️</span><span>Anma</span></button>

        🕐 <span id="updateTime"></span> • Her 10 dakikada güncellenir
    </div>

            spor: { baslik: "Spor", ikon: "⚽", veri: { Takimlar: "Brasília FC, Gama, Ceilândia", Mac: "Brasília FC x Gama - Pazar", Stadyum: "Mané Garrincha - 72.788" } },

            istatistik: { baslik: "İstatistik", ikon: "📊", veri: { Nufus: "3.050.000", Yuzolcumu: "5.802 km²", GSYIH: "285 milyar BRL", Gelir: "4.250 BRL/ay" } },
            harita: { baslik: "Harita", ikon: "🗺️", veri: { Merkez: "Praça dos Três Poderes", Noktalar: "Congresso, Catedral, Planalto", Ulasim: "Rodoviária, Aeroporto BSB" } }
        };

        // ============ PANEL OLUŞTURMA ============
        function renderCard(id, item) {
            let content = '';
            const data = item.veri;
            
            if (Array.isArray(data)) {
                content = data.map(d => `<div class="list-item"><span class="item-label">📌</span><span class="item-value">${d}</span></div>`).join('');
            } else {
                content = Object.entries(data).map(([k, v]) => `
                    <div class="list-item">
                        <span class="item-label">${k}</span>
                        <span class="item-value">${v}</span>
                    </div>
                `).join('');
            }
            
            return `
                <div class="card" data-category="${id}" data-name="${item.baslik}">
                    <div class="card-header">
                        <span class="card-header-icon">${item.ikon}</span>
                        <span>${item.baslik}</span>
                    </div>
                    <div class="card-content">
                        ${content}
                    </div>
                </div>
            `;
        }

        function renderAnmaCard() {
            return `
                <div class="card anma-card" data-category="anma" data-name="Anma Paneli">
                    <div class="card-header">
                        <span class="card-header-icon">🕯️</span>
                        <span>Anma Paneli - Vefat Edenler</span>
                    </div>
                    <div class="card-content">
                        ${vefatEdenler.map(v => `
                            <div class="vefat-item">
                                <div>
                                    <div class="vefat-name">${v.ad}</div>
                                    <div class="vefat-detail">${v.meslek} | ${v.tarih} | ${v.aciklama}</div>
                                </div>
                                <div class="vefat-age">${v.yas} yaş</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderAllCards() {
            let html = renderAnmaCard();
            for (const [id, item] of Object.entries(panelData)) {
                html += renderCard(id, item);
            }
            document.getElementById('panelGrid').innerHTML = html;
        }

        // ============ ARAMA ============
        function clearSearch() {
            document.getElementById('searchInput').value = '';
            filterCards('');
        }

        function filterCards(searchTerm) {
            const term = searchTerm.toLowerCase();
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                const name = card.getAttribute('data-name') || '';
                const category = card.getAttribute('data-category') || '';
                if (name.toLowerCase().includes(term) || category.toLowerCase().includes(term)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            filterCards(e.target.value);
        });

        // ============ BOTTOM NAV ============
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showAnma() {
            const anmaCard = document.querySelector('.anma-card');
            if (anmaCard) {
                anmaCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function showFavorites() {
            alert("⭐ Favoriler özelliği: Beğendiğiniz kartları yıldızlayarak buradan görüntüleyebilirsiniz. Yakında!");
        }

        function showSettings() {
            alert("⚙️ Ayarlar: Tema değiştirme, bildirim tercihleri ve dil seçenekleri yakında eklenecek.");
        }

        // ============ SAYFA BAŞLATMA ============
        function init() {
            renderAllCards();
            updateTime();
            setInterval(updateTime, 60000);
        }

        init();
    </script>
</body>
</html>
