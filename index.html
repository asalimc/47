<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina v20 | Neural Cultural OS</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Inter:wght@100;300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { --bg: #F9F9F7; --accent: #C5A059; --text: #1A1A1A; --glass: rgba(255, 255, 255, 0.7); }
        * { -webkit-font-smoothing: antialiased; box-sizing: border-box; scroll-behavior: smooth; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; margin: 0; }
        .serif { font-family: 'Cormorant Garamond', serif; }
        
        /* --- Authors Strip (Yeni Eklenen Sabit Şerit) --- */
        .authors-strip { border-bottom: 1px solid rgba(0,0,0,0.05); padding: 15px 5%; display: flex; align-items: center; gap: 40px; background: white; white-space: nowrap; overflow-x: auto; scrollbar-width: none; }
        .authors-strip::-webkit-scrollbar { display: none; }
        .author-node { display: flex; align-items: center; gap: 12px; }
        .author-avatar { width: 32px; height: 32px; border-radius: 50%; background: #eee; border: 1px solid rgba(0,0,0,0.1); object-fit: cover; }
        .author-name { font-[10px]; font-weight: 800; text-transform: uppercase; tracking: 2px; opacity: 0.6; }

        /* Bento Grid */
        .bento-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px; padding: 40px 5%; }
        .bento-item { border-radius: 40px; overflow: hidden; position: relative; cursor: pointer; border: 1px solid rgba(0,0,0,0.05); height: 500px; transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .bento-item:hover { transform: scale(0.98); box-shadow: 0 40px 80px rgba(0,0,0,0.08); }

        /* --- THE NEURAL ADMIN (Dünyanın En İyisi) --- */
        #admin-panel { display: none; position: fixed; inset: 0; background: rgba(244, 244, 241, 0.95); backdrop-filter: blur(40px); z-index: 200000; padding: 40px; animation: neuralReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes neuralReveal { from { opacity: 0; transform: scale(1.05); } to { opacity: 1; transform: scale(1); } }
        
        .admin-window { background: white; width: 100%; height: 100%; border-radius: 50px; display: flex; overflow: hidden; box-shadow: 0 50px 100px rgba(0,0,0,0.1); border: 1px solid white; }
        .admin-sidebar { width: 300px; background: #fafafa; border-right: 1px solid rgba(0,0,0,0.03); padding: 60px 40px; }
        .admin-content { flex: 1; padding: 80px; overflow-y: auto; }
        
        .nav-link { padding: 20px 0; display: flex; align-items: center; gap: 15px; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; color: rgba(0,0,0,0.2); transition: 0.3s; width: 100%; text-align: left; }
        .nav-link.active { color: var(--accent); }
        
        .input-neural { background: #f5f5f3; border: 1px solid transparent; border-radius: 24px; padding: 22px 30px; width: 100%; transition: 0.4s; font-size: 15px; }
        .input-neural:focus { background: white; border-color: var(--accent); box-shadow: 0 10px 40px rgba(197, 160, 89, 0.1); outline: none; }

        /* Atlas Koruma */
        .atlas-container { background: #0A0A0A; padding: 60px 5%; border-radius: 60px; margin: 20px 5%; position: relative; height: 350px; overflow: hidden; }
        .pulse-point { position: absolute; width: 10px; height: 10px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 20px var(--accent); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }

        .highlight { color: var(--accent); font-weight: 700; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<nav class="sticky top-0 z-[5000] px-10 py-6 flex justify-between items-center bg-white/80 backdrop-blur-2xl border-b border-black/5">
    <div class="flex items-center gap-12">
        <h1 class="serif text-4xl font-light uppercase tracking-tighter">Lumina</h1>
        <div id="ui-global-clock" class="hidden lg:flex gap-6 text-[10px] font-black uppercase tracking-[3px] opacity-40"></div>
    </div>
    <div class="flex items-center gap-6">
        <button onclick="toggleAdmin('flex')" class="w-12 h-12 rounded-full bg-black text-white flex items-center justify-center hover:bg-accent transition-all shadow-xl shadow-black/10">
            <i data-lucide="command" class="w-5 h-5"></i>
        </button>
    </div>
</nav>

<div class="authors-strip no-scrollbar">
    <div class="text-[9px] font-black uppercase tracking-[4px] opacity-20 mr-4">Active Authors</div>
    <div class="author-node"><img class="author-avatar" src="https://i.pravatar.cc/100?img=11"><span class="author-name">M. Al-Khafaji</span></div>
    <div class="author-node"><img class="author-avatar" src="https://i.pravatar.cc/100?img=32"><span class="author-name">Lara Santos</span></div>
    <div class="author-node"><img class="author-avatar" src="https://i.pravatar.cc/100?img=44"><span class="author-name">Elias Thorne</span></div>
    <div class="author-node"><img class="author-avatar" src="https://i.pravatar.cc/100?img=51"><span class="author-name">Yasmine B.</span></div>
    <div class="author-node"><img class="author-avatar" src="https://i.pravatar.cc/100?img=17"><span class="author-name">Julian Rocha</span></div>
</div>

<section class="atlas-container">
    <div class="pulse-point" style="top: 42%; left: 58%;"></div> 
    <div class="pulse-point" style="top: 75%; left: 32%;"></div> 
    <svg class="absolute inset-0 w-full h-full opacity-20" style="stroke: var(--accent); stroke-width: 1; stroke-dasharray: 6;">
        <path d="M 720 120 Q 550 200 400 250" fill="transparent"/>
    </svg>
    <div class="absolute bottom-10 left-10 flex gap-10 items-end">
        <div>
            <p class="text-[8px] font-black uppercase tracking-[4px] text-accent mb-2">Distance Engine</p>
            <p id="ui-distance" class="serif text-5xl text-white font-light">10.604 KM</p>
        </div>
        <div class="h-12 w-[1px] bg-white/10 mb-2"></div>
        <div class="text-white/30 serif italic text-xl mb-1">Mardin — Sao Paulo</div>
    </div>
</section>

<section id="ui-feed" class="bento-grid"></section>

<div id="admin-panel">
    <div class="admin-window">
        <div class="admin-sidebar">
            <div class="serif text-3xl italic text-accent mb-20">Neural Control</div>
            <nav class="space-y-4">
                <button onclick="switchTab('dash')" class="nav-link active" id="btn-dash"><i data-lucide="layout-grid" class="w-4 h-4"></i> Overview</button>
                <button onclick="switchTab('news')" class="nav-link" id="btn-news"><i data-lucide="plus-circle" class="w-4 h-4"></i> New Entry</button>
                <button onclick="switchTab('sys')" class="nav-link" id="btn-sys"><i data-lucide="settings" class="w-4 h-4"></i> System</button>
            </nav>
            <button onclick="toggleAdmin('none')" class="mt-40 text-[9px] font-black uppercase tracking-[4px] opacity-30 hover:opacity-100 transition">Exit Console</button>
        </div>
        
        <div class="admin-content no-scrollbar">
            <div id="tab-dash" class="admin-tab">
                <h2 class="serif text-7xl font-light mb-12 leading-none">Intelligence <br><i>Report</i></h2>
                <div class="grid grid-cols-2 gap-6">
                    <div class="p-10 border border-black/5 rounded-[40px] bg-gray-50">
                        <p class="text-[10px] font-black uppercase opacity-30 mb-4 tracking-widest">Global IQ</p>
                        <p class="text-6xl serif text-accent">99.8%</p>
                    </div>
                    <div class="p-10 border border-black/5 rounded-[40px] bg-gray-50">
                        <p class="text-[10px] font-black uppercase opacity-30 mb-4 tracking-widest">Active Links</p>
                        <p class="text-6xl serif">1.2k</p>
                    </div>
                </div>
            </div>

            <div id="tab-news" class="admin-tab hidden">
                <h2 class="serif text-7xl font-light mb-12">Composer</h2>
                <div class="space-y-6">
                    <input id="in-news-title" placeholder="Story Title" class="input-neural serif text-3xl">
                    <textarea id="in-news-text" placeholder="Deep dive into the culture..." class="input-neural h-64 resize-none"></textarea>
                    
                    <div class="flex gap-4">
                        <input type="file" id="in-news-file" class="hidden" onchange="handleFile(this)">
                        <label for="in-news-file" class="flex-1 p-6 border-2 border-dashed border-black/5 rounded-3xl text-center cursor-pointer hover:border-accent transition">
                            <i data-lucide="image" class="mx-auto mb-2 opacity-20"></i>
                            <span class="text-[9px] font-black uppercase opacity-40">Add Visual Asset</span>
                        </label>
                        <button onclick="addNews()" class="px-20 bg-black text-white rounded-3xl font-black text-[10px] uppercase tracking-[4px] hover:bg-accent transition">Publish</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="article-modal" class="modal-overlay" style="display:none; position:fixed; inset:0; background:white; z-index:100000; overflow-y:auto;">
    <div class="p-10 flex justify-between items-center sticky top-0 bg-white/90 backdrop-blur-md">
        <button onclick="closeModals()" class="font-black text-[10px] uppercase opacity-40 tracking-widest">Close</button>
        <button onclick="toggleKaraoke()" class="bg-black text-white px-10 py-4 rounded-full font-black text-[10px] uppercase tracking-[3px]">Voice Mode</button>
    </div>
    <div id="article-content" class="max-w-4xl mx-auto py-24 px-10"></div>
</div>

<script>
    let DB = JSON.parse(localStorage.getItem('LUMINA_V20_DB')) || {
        global: { mardin: '26°C', sp: '22°C', dist: '10.604 KM' },
        news: [
            { id: 1, title: 'Mezopotamya\'nın Sessiz Yankısı', text: 'Mardin taşlarının her birinde Sao Paulo gökdelenlerinin betonarme dürüstlüğünü bulabilirsiniz.', img: 'https://images.unsplash.com/photo-1582738411706-bfc8e691d1c2?w=1200', type: 'Architecture' }
        ]
    };

    function sync() { localStorage.setItem('LUMINA_V20_DB', JSON.stringify(DB)); render(); }

    function updateClocks() {
        const t1 = new Date().toLocaleTimeString('tr-TR', { timeZone: 'Europe/Istanbul', hour: '2-digit', minute: '2-digit' });
        const t2 = new Date().toLocaleTimeString('tr-TR', { timeZone: 'America/Sao_Paulo', hour: '2-digit', minute: '2-digit' });
        document.getElementById('ui-global-clock').innerHTML = `MARDIN ${t1} • ${DB.global.mardin} <span class="mx-4 opacity-10">/</span> SAO PAULO ${t2} • ${DB.global.sp}`;
    }
    setInterval(updateClocks, 1000);

    function render() {
        lucide.createIcons();
        document.getElementById('ui-distance').innerText = DB.global.dist;
        const feed = document.getElementById('ui-feed');
        feed.innerHTML = DB.news.map((n, idx) => `
            <div class="bento-item ${idx % 3 === 0 ? 'col-span-8' : 'col-span-4'}" onclick="openArticle(${n.id})">
                <img src="${n.img}" class="absolute inset-0 w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                <div class="absolute bottom-0 p-12 text-white">
                    <span class="text-[9px] font-black uppercase tracking-[5px] text-accent mb-4 block">${n.type}</span>
                    <h3 class="serif text-5xl leading-tight tracking-tighter">${n.title}</h3>
                </div>
            </div>
        `).join('');
    }

    let lastImg = "";
    function handleFile(input) {
        const reader = new FileReader();
        reader.onload = (e) => lastImg = e.target.result;
        reader.readAsDataURL(input.files[0]);
    }

    function openArticle(id) {
        const n = DB.news.find(x => x.id === id);
        document.getElementById('article-content').innerHTML = `
            <h1 class="serif text-8xl leading-[0.85] tracking-tighter mb-16 text-center">${n.title}</h1>
            <div id="karaoke-text" class="serif text-4xl leading-relaxed text-justify opacity-80">
                ${n.text.split(' ').map(word => `<span>${word}</span>`).join(' ')}
            </div>
        `;
        document.getElementById('article-modal').style.display = 'block';
    }

    function toggleAdmin(val) { document.getElementById('admin-panel').style.display = val; }
    
    function switchTab(t) { 
        document.querySelectorAll('.admin-tab').forEach(x => x.classList.add('hidden'));
        document.querySelectorAll('.nav-link').forEach(x => x.classList.remove('active'));
        document.getElementById('tab-'+t).classList.remove('hidden');
        document.getElementById('btn-'+t).classList.add('active');
    }

    function addNews() {
        const n = { id: Date.now(), title: document.getElementById('in-news-title').value, text: document.getElementById('in-news-text').value, img: lastImg || 'https://via.placeholder.com/1200', type: 'Culture' };
        DB.news.unshift(n); sync(); toggleAdmin('none');
    }

    function closeModals() { document.getElementById('article-modal').style.display='none'; window.speechSynthesis.cancel(); }

    window.onload = () => { render(); updateClocks(); };
</script>
</body>
</html>
