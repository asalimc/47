<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina v17 | Soft Intelligence</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Inter:wght@100;300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { --bg: #F9F9F7; --soft-admin: #F4F4F1; --accent: #C5A059; --text: #1A1A1A; }
        * { -webkit-font-smoothing: antialiased; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; }
        .serif { font-family: 'Cormorant Garamond', serif; }

        /* Reklam Alanı Tasarımı (Eski Başlık Yerine) */
        .ad-container { width: 100%; max-width: 1200px; margin: 0 auto; height: 220px; border-radius: 40px; background: #fff; overflow: hidden; border: 1px solid rgba(0,0,0,0.03); display: flex; align-items: center; position: relative; }
        
        /* Bento Grid Koruma */
        .bento-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px; padding: 40px 5%; }
        .bento-item { border-radius: 40px; overflow: hidden; position: relative; cursor: pointer; height: 500px; }

        /* Yeni Soft Admin Paneli */
        #admin-panel { display: none; position: fixed; inset: 0; background: var(--soft-admin); z-index: 200000; flex-direction: row; animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .admin-sidebar { width: 300px; background: #fff; border-right: 1px solid rgba(0,0,0,0.05); padding: 50px 30px; }
        .admin-main { flex: 1; padding: 60px 5%; overflow-y: auto; }
        
        .admin-btn { width: 100%; text-align: left; padding: 16px 20px; border-radius: 15px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: rgba(0,0,0,0.4); margin-bottom: 8px; display: flex; items-center: center; gap: 12px; }
        .admin-btn.active { background: var(--bg); color: var(--accent); box-shadow: 0 10px 20px rgba(0,0,0,0.02); }
        
        .input-lux { background: #fff; border: 1px solid rgba(0,0,0,0.05); border-radius: 20px; padding: 18px 25px; width: 100%; outline: none; }
        .admin-card { background: #fff; border-radius: 30px; padding: 30px; border: 1px solid rgba(0,0,0,0.03); margin-bottom: 24px; }

        /* Diğerleri */
        .modal-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 100000; overflow-y: auto; }
        .highlight { color: var(--accent); font-weight: 900; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="no-scrollbar">

<nav class="sticky top-0 z-[5000] px-10 py-6 flex justify-between items-center bg-white/70 backdrop-blur-2xl border-b border-black/5">
    <div class="flex items-center gap-12">
        <h1 class="serif text-4xl font-light uppercase tracking-tighter cursor-pointer">Lumina</h1>
        <div id="ui-meta" class="hidden lg:flex gap-6 text-[10px] font-black uppercase tracking-[3px] opacity-20"></div>
    </div>
    <button onclick="toggleAdmin('flex')" class="w-12 h-12 rounded-full bg-black text-white flex items-center justify-center hover:bg-accent transition shadow-xl">
        <i data-lucide="settings-2" class="w-5 h-5"></i>
    </button>
</nav>

<section class="px-[5%] py-10 flex justify-center gap-12 border-b border-black/5 bg-white/20 overflow-hidden">
    <div id="ui-authors" class="flex gap-12 items-center"></div>
</section>

<header class="px-[5%] py-20">
    <div class="ad-container group cursor-pointer shadow-sm hover:shadow-2xl transition-all duration-700">
        <img id="ad-img" src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1600" class="absolute inset-0 w-full h-full object-cover opacity-10 group-hover:opacity-20">
        <div class="z-10 px-16 w-full flex justify-between items-center">
            <div class="max-w-xl">
                <p class="text-[9px] font-black uppercase tracking-[5px] opacity-30 mb-2">Premium Partner</p>
                <h2 id="ad-text" class="serif text-5xl italic opacity-70 group-hover:opacity-100">Yeni Nesil Estetik & Kültür Vizyonu</h2>
            </div>
            <div class="hidden md:block">
                <button class="px-10 py-4 border border-black/10 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-black hover:text-white transition-all">Detayları Gör</button>
            </div>
        </div>
    </div>
</header>

<section id="ui-feed" class="bento-grid"></section>

<div id="admin-panel">
    <div class="admin-sidebar shadow-2xl">
        <div class="mb-16">
            <h2 class="serif text-4xl italic text-accent">Lumina OS</h2>
            <p class="text-[9px] font-black uppercase tracking-widest opacity-20">Master Console v17</p>
        </div>
        <nav>
            <button onclick="switchTab('news')" class="admin-btn active" id="btn-news"><i data-lucide="file-text" class="w-4 h-4"></i> İçerik Editörü</button>
            <button onclick="switchTab('authors')" class="admin-btn" id="btn-authors"><i data-lucide="users" class="w-4 h-4"></i> Yazarlar</button>
            <button onclick="switchTab('ads')" class="admin-btn" id="btn-ads"><i data-lucide="layout" class="w-4 h-4"></i> Reklam Modülü</button>
        </nav>
        <button onclick="toggleAdmin('none')" class="absolute bottom-12 left-10 text-[10px] font-black uppercase text-red-400 hover:text-red-600 tracking-widest">Sistemi Kilitle</button>
    </div>

    <div class="admin-main">
        <div id="tab-news" class="admin-tab">
            <h3 class="serif text-6xl mb-12">Haber Düzenle</h3>
            <div class="admin-card">
                <div class="grid grid-cols-2 gap-6 mb-6">
                    <input id="in-news-title" placeholder="Başlık" class="input-lux">
                    <select id="in-news-author" class="input-lux"></select>
                </div>
                <textarea id="in-news-text" placeholder="İçerik..." class="input-lux h-48 mb-6"></textarea>
                <div class="flex gap-4">
                    <input type="file" id="in-news-file" class="hidden" onchange="handleFile(this, 'news')">
                    <label for="in-news-file" class="flex-1 p-6 border-2 border-dashed border-black/5 rounded-3xl text-center text-[10px] font-black uppercase opacity-40 cursor-pointer">Görsel Seç</label>
                    <button onclick="saveNews()" class="flex-1 bg-black text-white rounded-3xl font-black text-[10px] uppercase tracking-widest">Yayınla / Güncelle</button>
                </div>
            </div>
            <div id="adm-news-list" class="space-y-4"></div>
        </div>

        <div id="tab-authors" class="admin-tab hidden">
            <h3 class="serif text-6xl mb-12">Yazarlar</h3>
            <div class="admin-card">
                <input id="in-auth-name" placeholder="Yazar İsmi" class="input-lux mb-4">
                <button onclick="saveAuthor()" class="w-full bg-accent text-white py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest">Yazar Ekle</button>
            </div>
            <div id="adm-auth-list" class="grid grid-cols-2 gap-6"></div>
        </div>

        <div id="tab-ads" class="admin-tab hidden">
            <h3 class="serif text-6xl mb-12">Reklam Modülü</h3>
            <div class="admin-card">
                <input id="in-ad-text" placeholder="Reklam Yazısı" class="input-lux mb-6">
                <input type="file" id="in-ad-file" class="hidden" onchange="handleFile(this, 'ad')">
                <label for="in-ad-file" class="block p-10 border-2 border-dashed border-black/5 rounded-3xl text-center text-[10px] font-black uppercase opacity-40 cursor-pointer mb-6">Reklam Görseli Güncelle</label>
                <button onclick="saveAd()" class="w-full bg-black text-white py-5 rounded-2xl font-black text-[10px] uppercase">Reklamı Yayına Al</button>
            </div>
        </div>
    </div>
</div>

<div id="article-modal" class="modal-overlay">
    <div class="p-10 flex justify-between items-center sticky top-0 bg-white/90 backdrop-blur-xl z-10">
        <button onclick="closeModals()" class="text-[10px] font-black uppercase opacity-40"><i data-lucide="arrow-left"></i> Geri Dön</button>
        <button onclick="toggleKaraoke()" class="bg-black text-white px-10 py-4 rounded-full text-[10px] font-black uppercase tracking-widest">Sesli Deneyim</button>
    </div>
    <div id="article-content" class="max-w-4xl mx-auto py-24 px-10"></div>
</div>

<script>
    let DB = JSON.parse(localStorage.getItem('LUMINA_V17_FINAL')) || {
        ad: { text: "PREMIUM CULTURE INTERFACE", img: "https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1600" },
        authors: [{ id: 1, name: "Zeynep Mardin", img: "https://i.pravatar.cc/150?u=44" }],
        news: [{ id: 101, authId: 1, title: "Sarı Taşların Şiiri", text: "Zaman burada farklı akar...", img: "https://images.unsplash.com/photo-1582738411706-bfc8e691d1c2?w=1200", type: "KÜLTÜR" }]
    };

    let currentImgs = { news: "", auth: "", ad: "" };

    function sync() { localStorage.setItem('LUMINA_V17_FINAL', JSON.stringify(DB)); render(); }

    function render() {
        lucide.createIcons();
        document.getElementById('ui-meta').innerText = `MARDİN 26°C • SAO PAULO 22°C • 10.604 KM`;
        
        // UI Ads
        document.getElementById('ad-img').src = DB.ad.img;
        document.getElementById('ad-text').innerText = DB.ad.text;

        // UI Authors
        document.getElementById('ui-authors').innerHTML = DB.authors.map(a => `
            <div class="flex items-center gap-4 cursor-pointer group" onclick="openAuthorDetail(${a.id})">
                <img src="${a.img}" class="w-12 h-12 rounded-full object-cover group-hover:scale-110">
                <span class="text-[10px] font-black uppercase tracking-widest opacity-30 group-hover:opacity-100">${a.name}</span>
            </div>
        `).join('');

        // UI Feed
        document.getElementById('ui-feed').innerHTML = DB.news.map((n, idx) => `
            <div class="bento-item h-[500px] rounded-[40px] overflow-hidden relative cursor-pointer group ${idx % 3 === 0 ? 'col-span-8' : 'col-span-4'}" onclick="openArticle(${n.id})">
                <img src="${n.img}" class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
                <div class="absolute bottom-0 p-12 text-white">
                    <p class="text-[9px] font-black uppercase tracking-[5px] text-accent mb-4">${n.type}</p>
                    <h3 class="serif text-6xl leading-tight">${n.title}</h3>
                </div>
            </div>
        `).join('');

        // Admin News List
        document.getElementById('in-news-author').innerHTML = DB.authors.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
        document.getElementById('adm-news-list').innerHTML = DB.news.map(n => `
            <div class="admin-card flex justify-between items-center py-4">
                <span class="text-xs font-bold uppercase opacity-60">${n.title}</span>
                <div class="flex gap-4">
                    <button onclick="deleteNews(${n.id})" class="text-red-400 text-[9px] font-black uppercase">Sil</button>
                </div>
            </div>
        `).join('');

        // Admin Auth List
        document.getElementById('adm-auth-list').innerHTML = DB.authors.map(a => `
            <div class="admin-card flex justify-between items-center" onclick="openAuthorDetail(${a.id})">
                <div class="flex items-center gap-4">
                    <img src="${a.img}" class="w-10 h-10 rounded-full">
                    <span class="text-[10px] font-black uppercase">${a.name}</span>
                </div>
                <button onclick="deleteAuth(${a.id})" class="text-red-400 text-[9px] font-black uppercase">Kaldır</button>
            </div>
        `).join('');
    }

    // HANDLERS
    function handleFile(input, key) {
        const r = new FileReader();
        r.onload = e => currentImgs[key] = e.target.result;
        r.readAsDataURL(input.files[0]);
    }

    function saveNews() {
        const n = { id: Date.now(), authId: parseInt(document.getElementById('in-news-author').value), title: document.getElementById('in-news-title').value, text: document.getElementById('in-news-text').value, img: currentImgs.news || "https://via.placeholder.com/1200", type: "KÜLTÜR" };
        DB.news.unshift(n); sync();
    }

    function saveAuthor() {
        const a = { id: Date.now(), name: document.getElementById('in-auth-name').value, img: currentImgs.auth || "https://i.pravatar.cc/150" };
        DB.authors.push(a); sync();
    }

    function saveAd() {
        if(document.getElementById('in-ad-text').value) DB.ad.text = document.getElementById('in-ad-text').value;
        if(currentImgs.ad) DB.ad.img = currentImgs.ad;
        sync();
    }

    function deleteNews(id) { DB.news = DB.news.filter(x => x.id !== id); sync(); }
    function deleteAuth(id) { DB.authors = DB.authors.filter(x => x.id !== id); sync(); }

    function openArticle(id) {
        const n = DB.news.find(x => x.id === id);
        document.getElementById('article-content').innerHTML = `<h1 class="serif text-8xl text-center mb-12">${n.title}</h1><div id="karaoke-text" class="serif text-4xl leading-relaxed text-justify opacity-80">${n.text.split(' ').map(w => `<span>${w}</span>`).join(' ')}</div>`;
        document.getElementById('article-modal').style.display = 'block';
    }

    function openAuthorDetail(id) {
        const a = DB.authors.find(x => x.id === id);
        const aNews = DB.news.filter(n => n.authId === id);
        document.getElementById('article-content').innerHTML = `
            <div class="text-center">
                <img src="${a.img}" class="w-40 h-40 rounded-full mx-auto mb-10 object-cover">
                <h2 class="serif text-8xl mb-24">${a.name}</h2>
                <div class="text-left space-y-12">
                    <p class="text-[10px] font-black uppercase tracking-[5px] opacity-20">Yazarın Yazıları</p>
                    ${aNews.map(n => `<h4 class="serif text-5xl hover:text-accent cursor-pointer" onclick="openArticle(${n.id})">${n.title}</h4>`).join('')}
                </div>
            </div>`;
        document.getElementById('article-modal').style.display = 'block';
    }

    function toggleAdmin(s) { document.getElementById('admin-panel').style.display = s; }
    function switchTab(t) {
        document.querySelectorAll('.admin-tab').forEach(x => x.classList.add('hidden'));
        document.querySelectorAll('.admin-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-'+t).classList.remove('hidden');
        document.getElementById('btn-'+t).classList.add('active');
    }
    function closeModals() { window.speechSynthesis.cancel(); document.querySelectorAll('.modal-overlay').forEach(m => m.style.display='none'); }

    window.onload = render;
</script>
</body>
</html>
