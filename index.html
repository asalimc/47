<script>
    const data = [
        { id: "01", tr_t: "Manifesto", pt_t: "O Manifesto", img: "1490730141103-6cac27aaab94",
          tr: ["Ben Ahmet Çınarbaş; Mezopotamya’nın kadim sarı taşlarından Brezilya’nın sonsuz yeşil ormanlarına uzanan bir köprü inşa ediyorum.", "Bu arşiv, sadece bir gözlem değil, aynı zamanda ruhun coğrafi sınırları nasıl aştığının bir kanıtı olarak tasarlanmıştır.", "Mizahı, en ağır hüzünlerin üzerine örtülen ipek bir şal gibi görüyorum; bu şal sayesinde hayatın zorlukları estetik bir değere dönüşür.", "Mardin’in sessiz bilgeliği ile Rio’nun gürültülü neşesi, aslında aynı insani arzunun farklı dillerdeki tezahürleridir.", "Kalite, ayrıntılarda gizlenen o küçük sırlar toplamıdır; bu yüzden her paragrafı bir kuyumcu titizliğiyle işliyorum.", "Geleceğe bıraktığım bu miras, unutmaya karşı verilmiş bir savaştır; her kayıt, kolektif hafızanın birer hücresidir."],
          pt: ["Eu sou Ahmet Çınarbaş; estou construindo uma ponte que vai das pedras amarelas da Mesopotâmia às florestas verdes do Brasil.", "Este arquivo não é apenas uma observação, mas uma prova de como a alma transcende as fronteiras geográficas tradicionais.", "Vejo o humor como um xale de seda sobre as tristezas; através dele, as dificuldades da vida tornam-se valores estéticos.", "A sabedoria silenciosa de Mardin e a alegria barulhenta do Rio são manifestações do mesmo desejo humano em línguas diferentes.", "A qualidade é a soma de pequenos segredos nos detalhes; por isso, escrevo cada parágrafo com a precisão de um joalheiro.", "Este legado que deixo para o futuro é uma guerra contra o esquecimento; cada registro é uma célula da nossa memória."]

        { id: "02", tr_t: "Ritüeller", pt_t: "Os Rituais", img: "1516450360452-9312f5e86fc7",
          tr: ["Samba ritimleri Rio sokaklarında yankılanırken, Mardin’in zılgıtları bin yıllık bir direncin sesini semaya yükseltir.", "Her iki kültür de acıyı dansla ve müzikle sağaltma konusunda doğuştan gelen bir yeteneğe ve derin bir mirasa sahiptir.", "Karnaval, Brezilya için sadece bir eğlence değil; hayata karşı atılmış toplumsal ve kolektif bir kahkahanın kendisidir.", "Mardin’in dar sokaklarında yankılanan Reyhani ezgileri, toprağa duyulan aşkın ve saygının en naif ifadesidir.", "Kostümlerin altındaki her hikaye, aslında bir hayatta kalma mücadelesinin payetlerle süslenmiş birer yansımasıdır.", "Ritim, kelimelerin bittiği yerde başlar ve insanı dilini bilmediği bir yabancıyla aynı duyguda birleştiren tek dildir."],
          pt: ["Enquanto os ritmos do samba ecoam no Rio, os 'zılgıt' de Mardin elevam a voz de uma resistência milenar aos céus.", "Ambas as culturas possuem um talento inato e uma herança profunda para curar a dor através da dança e da música.", "O Carnaval não é apenas diversão para o Brasil; é o próprio riso social e coletivo lançado contra as dificuldades da vida.", "As melodias Reyhani nas ruas de Mardin são a expressão mais ingênua de amor e respeito pela terra e pelos antepassados.", "Cada história sob os trajes é, na verdade, um reflexo de uma luta pela sobrevivência adornada com lantejoulas brilhantes.", "O ritmo começa onde as palavras terminam; é a única língua que une pessoas de nações diferentes na mesma emoção pura."]

        { id: "03", tr_t: "Telkari Sanatı", pt_t: "Arte em Filigrana", img: "1515562141207-7a18b5ce7142",
          tr: ["Mardin’in gümüş telkari sanatı, sabrın metalle imtihanıdır; her ince tel, ustanın nefesiyle şekil bulur.", "Amazon yerlilerinin tohum işçiliği ile bu kadim gümüş sanatı, ellerin emeğe duyduğu ortak aşkın kanıtıdır.", "Bir kolyenin kıvrımında bin yıllık bir medeniyetin izlerini bulabilirsiniz; bu sanat, zamanın donmuş halidir.", "Ustalık, sadece teknik bir beceri değil, aynı zamanda nesiller arası aktarılan bir ruhun bedene bürünmesidir.", "Zanaatın estetiği, modern dünyanın seri üretim çarklarına karşı duran en zarif ve en güçlü kale gibidir.", "Ahmet Çınarbaş olarak bu ayrıntıları kaydetmek, kaybolmaya yüz tutan bu zarafete duyduğum bir saygı duruşudur."],
          pt: ["A arte da filigrana de prata de Mardin é o teste da paciência com o metal; cada fio ganha forma com o mestre.", "O trabalho de sementes dos nativos da Amazônia e esta antiga arte em prata provam o amor comum pelo trabalho manual.", "Nas curvas de um colar, pode-se encontrar vestígios de uma civilização milenar; esta arte é o tempo congelado.", "A maestria não é apenas habilidade técnica, mas a personificação de uma alma transmitida entre gerações.", "A estética do artesanato é como um castelo elegante que resiste às rodas da produção em massa moderna.", "Como Ahmet Çınarbaş, registrar estes detalhes é uma homenagem à elegância que corre o risco de desaparecer."]

        { id: "04", tr_t: "Mutfak Köprüsü", pt_t: "Ponte Culinária", img: "1541518763669-27fef04b14ea",

          pt: ["O 'Irok' temperado de Mardin e o 'Quibe' brasileiro são as provas mais saborosas da migração no prato.", "As especiarias carregam a memória da terra; o coentro e a pimenta-da-jamaica unem culturas distantes à mesa.", "No sabor de um prato, sente-se a tristeza e a alegria da geografia de onde vêm as mãos que o cozinharam.", "A cozinha é um terreno de acordo universal onde as fronteiras desaparecem e as línguas dão lugar ao paladar.", "Receitas trazidas do calor árido de Mardin para o ar úmido do Brasil encontram novas almas em terras novas.", "A cultura alimentar é uma das formas mais estéticas e duradouras de sobrevivência e expressão de um povo."]

        { id: "05", tr_t: "Kahve Kültürü", pt_t: "Cultura do Café", img: "1495474472287-4d71bcdd2085",

          pt: ["O 'mırra' de Mardin é a testemunha do momento em que o hóspede é coroado; seu amargor sela a amizade.", "Os grãos das vastas fazendas do Brasil despertam o mundo moderno todas as manhãs com sua energia única.", "No vapor de uma xícara de café, milhares de quilômetros e vidas diferentes conseguem se unir no mesmo aroma.", "O café não é apenas uma bebida, mas um ritual social e o iniciador mais sincero de qualquer conversa profunda.", "A paciência nas cafeteiras de cobre de Mardin e a alegria da colheita brasileira deixam histórias em cada gole.", "O tempo para com o café; como Ahmet Çınarbaş, arquivar esses momentos é um elogio ao prazer comum humano."]

        { id: "06", tr_t: "Sokak Futbolu", pt_t: "Futebol de Rua", img: "1526232761682-d26e03ac148e",
          tr: ["Rio'nun favelalarından Mardin'in dar taş sokaklarına kadar futbol, yoksul çocukların en büyük hayal kapısıdır.", "Bir topun peşinden koşmak, hayatın getirdiği tüm zorlukları ve eşitsizlikleri o an için tamamen unutturmayı başarır.", "Pelé'nin mirası sadece bir spor dalı değil, bir halkın özgüveni ve dünyaya attığı en güçlü sportif imzadır.", "Mardin'in taşlı zeminlerinde yapılan maçlar, çocukluğun en masum zaferlerini ve en samimi arkadaşlıklarını kurar.", "Futbol, hiçbir dil bilmenize gerek kalmadan, tüm dünyayla aynı heyecanı paylaşabildiğiniz devasa bir tiyatrodur.", "Her gol, bir umudun yeşermesidir; bu arşivi futbolla taçlandırmak, insan ruhunun dayanıklılığına selam durmaktır."],
          pt: ["Das favelas do Rio às ruas estreitas de Mardin, o futebol é o maior portal de sonhos para as crianças humildes.", "Correr atrás de uma bola permite esquecer completamente, por um momento, todas as dificuldades e desigualdades.", "O legado de Pelé não é apenas um desporto, mas a autoconfiança de um povo e sua assinatura desportiva no mundo.", "Os jogos nos solos pedregosos de Mardin constroem as vitórias mais inocentes e as amizades mais sinceras.", "O futebol é um teatro imenso onde se pode partilhar a mesma emoção com o mundo sem precisar de falar nada.", "Cada golo é o florescer de uma esperança; coroar este arquivo com o futebol é saudar a resiliência humana."]

        { id: "07", tr_t: "Mimari Hafıza", pt_t: "Memória Arquitetônica", img: "1449034446853-66c86144b0ad",
          tr: ["Mardin'in bin yıllık taş konakları, doğaya hükmetmek yerine onunla uyum içinde yaşamanın en somut dersidir.", "Brezilya'nın modern çizgileri, Niemeyer'in elinde betonun nasıl bir şiire dönüşebileceğinin en büyük örneğidir.", "Mimari, bir toplumun dünyaya bakış açısını yansıtan, taşa ve betona kazınmış kalıcı birer ideoloji ve sanattır.", "Mardin evlerinin avlularındaki serinlik, Ortadoğu bilgeliğinin güneşle olan kadim pazarlığının bir sonucudur.", "Brezilya'nın geniş ve ferah binaları ise geleceğin vizyonunu bugünden inşa eden cesur bir hayal gücünün eseridir.", "Binalar sadece barınak değildir; Ahmet Çınarbaş için onlar, medeniyetlerin ayakta kalan en dürüst şahitleridir."],
          pt: ["Os casarões de pedra milenares de Mardin são a lição mais concreta de viver em harmonia com a natureza.", "As linhas modernas do Brasil, nas mãos de Niemeyer, mostram como o betão pode ser transformado em poesia.", "A arquitetura é uma ideologia e arte permanente gravada na pedra e no betão, refletindo a visão de mundo.", "O frescor nos pátios das casas de Mardin é o resultado de uma antiga negociação da sabedoria com o sol.", "Os edifícios amplos e arejados do Brasil são obra de uma imaginação audaz que constrói a visão do futuro hoje.", "Edifícios não são apenas abrigos; para Ahmet Çınarbaş, eles são as testemunhas mais honestas das civilizações."]

        { id: "08", tr_t: "Ritim Kardeşliği", pt_t: "Irmandade do Ritmo", img: "1514525253361-b83fcd06912c",
          tr: ["Mezopotamya'nın darbukası ile Brezilya'nın pandeirosu, ritmin kalbinde birleşen iki yakın ve kadim dosttur.", "Müzik, kelimelerin bittiği yerde başlar ve insanı ruhsal bir yolculuğa çıkaran en etkili ve en evrensel araçtır.", "Rio'nun batucada ritimleri ile Mardin'in Reyhani ezgileri arasındaki uyum, insan ruhunun tek bir kaynaktan beslendiğini gösterir.", "Vurmalı çalgıların çıkardığı her ses, kalbin atışına eşlik ederek bizi doğanın ana ritmine geri döndürür.", "Köy meydanlarında ve şehir köşelerinde yükselen bu sesler, toplumsal birliğin ve ortak sevincin en saf halidir.", "Ritim kardeştir; Ahmet Çınarbaş olarak bu seslerin kaydını tutmak, dünya barışına atılmış sessiz bir notadır."],
          pt: ["O 'darbuka' da Mesopotâmia e o 'pandeiro' do Brasil são dois amigos íntimos que se unem no coração do ritmo.", "A música começa onde as palavras terminam e é a ferramenta mais eficaz para nos levar numa viagem espiritual.", "A harmonia entre os ritmos da batucada e as melodias Reyhani mostra que a alma humana bebe de uma única fonte.", "Cada som dos instrumentos de percussão acompanha o batimento cardíaco, devolvendo-nos ao ritmo da natureza.", "Estes sons que sobem das praças das aldeias e cantos das cidades são a forma mais pura de unidade social.", "O ritmo é irmão; como Ahmet Çınarbaş, manter o registo destes sons é uma nota silenciosa para a paz mundial."]
        },
        { id: "09", tr_t: "Melankoli ve Umut", pt_t: "Melancolia e Esperança", img: "1511379938547-c1f69419868d",

          pt: ["As melodias tristes da Bossa Nova e os lamentos de Mardin narram as dores mais profundas do coração humano.", "A tristeza, em ambas as culturas, não é um fim, mas a porta mais larga que se abre para a arte e a esperança.", "Quando a dor se transforma numa estética melancólica, torna o ser humano mais resiliente e sábio em vez de o destruir.", "O pôr do sol nas praias do Rio e o frescor da tarde nos castelos de Mardin sussurram a mesma melancolia.", "A esperança nasce como um sol desta tristeza; as canções são as mãos mais fortes que nos tiram da escuridão.", "A melancolia, para Ahmet Çınarbaş, não é fraqueza, mas a postura nobre de uma alma que compreende a vida."]

        { id: "10", tr_t: "İnanç Işığı", pt_t: "Luz da Fé", img: "1519074069444-1ba4fff66d16",

          pt: ["Os mosteiros seculares de Mardin e as catedrais do Brasil são monumentos da busca humana pela eternidade.", "A fé imortaliza-se quando gravada na pedra; preces em línguas diferentes desenham um quadro de paz no céu.", "Estas geografias onde religiões se entrelaçam são espaços sagrados onde a tolerância passa da teoria à prática.", "No silêncio dos templos, testemunha-se o confronto mais sincero e profundo do ser humano com o seu interior.", "Os sinos de Mardin e os hinos do Brasil lembram que, embora os caminhos sejam diferentes, o destino é o mesmo.", "A fé é uma; como Ahmet Çınarbaş, arquivar esta herança espiritual é uma homenagem à espiritualidade comum."]

          pt: ["A fertilidade do Eufrates e o verde do Amazonas são os maiores milagres da natureza em dois extremos do mundo.", "Os rios não levam apenas água; levam memórias, dores e esperanças das civilizações que floresceram em suas margens.", "A água é a fonte da vida e o ponto de união das culturas; as margens dos rios são bibliotecas antigas da história.", "As águas da Mesopotâmia e os caminhos fluviais do Brasil espalham a vida como se fossem as veias da terra.", "Este fascínio pela natureza lembra quão pequenos somos, mas ao mesmo tempo quão parte importante dela somos.", "Para Ahmet Çınarbaş, os rios são narradores de história viva que representam o fluxo do tempo e nunca param."]

    const root = document.getElementById('root');
    data.forEach(item => {
        const sec = document.createElement('div');
        sec.className = 'section';
        sec.innerHTML = `
            <div class="img-frame"><img src="https://images.unsplash.com/photo-${item.img}?auto=format&fit=crop&q=80&w=1500" alt=""></div>
            <div class="content-card">
                <div class="section-header">
                    <div class="num">${item.id}</div>
                    <div class="title-box">
                        <span class="title-tr">${item.tr_t}</span>
                        <span class="title-pt">${item.pt_t}</span>
                    </div>
                </div>
                <div class="grid-text">
                    <div class="lang-col tr">${item.tr.map(p => `<p>${p}</p>`).join('')}</div>
                    <div class="lang-col pt">${item.pt.map(p => `<p>${p}</p>`).join('')}</div>
                </div>
                <div class="seal-area">
                    <div class="s-circle">AÇ</div>
                    <div class="s-text">Ahmet Çınarbaş // Archive Series // Complete Edition 2026</div>
                </div>
            </div>
        `;
        root.appendChild(sec);
    });

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('active'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.section').forEach(s => observer.observe(s));
</script>
